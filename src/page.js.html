    }

    showLoadingOverlay(message = '') {
      document.body.classList.add('loading-active');
      if (this.elements.answersContainer) {
        this.elements.answersContainer.classList.add('loading-active');
        if (this.elements.answersContainer.classList.contains('render-optimized')) {
          this.elements.answersContainer.classList.add('loading-safe');
        }
      }
    }

    hideLoadingOverlay() {
      document.body.classList.remove('loading-active');
      if (this.elements.answersContainer) {
        this.elements.answersContainer.classList.remove('loading-active');
        this.elements.answersContainer.classList.remove('loading-safe');
      }
    }

    async loadSheetData(options = {}) {
      const config = {
        showLoading: options.showLoading !== false, // default true
        bypassCache: options.bypassCache || false,
        isInitialLoad: options.isInitialLoad || false,
        requestedSheetName: options.requestedSheetName || null,
        ...options
      };

      if (config.isInitialLoad && options.bypassCache === undefined) {
        config.bypassCache = false;
      } else if (config.isInitialLoad && options.bypassCache === true) {
        config.bypassCache = true;
      }

      // Option B: 過去フェーズ閲覧中は、classFilter / sortOrder / refreshContent 等から
      //   loadSheetData が呼ばれても「現在フェーズに戻る」のではなく「同じ過去フェーズで再フェッチ」
      //   が UX 上正しい。viewingPastProfile を解除してから __vizLoadPastProfile に分岐し、新しい
      //   filter / sort をサーバへ渡す。isInitialLoad は初回起動のときだけ通常経路へ。
      if (!config.isInitialLoad && this.state && this.state.viewingPastProfile &&
          typeof this.__vizLoadPastProfile === 'function') {
        const name = this.state.viewingPastProfile;
        this.state.viewingPastProfile = null;  // ガード解除 (同名 no-op をスキップして再フェッチ)
        this.__vizLoadPastProfile(name);
        return Promise.resolve();
      }

      if (this.state.isLoading && config.showLoading) {
        return Promise.resolve(); // Return resolved Promise to prevent hanging .then() chains
      }

      try {
        this.state.isLoading = true;
        if (config.showLoading) {
          this.showLoadingOverlay();
        }

        const oldAnswers = [...this.state.currentAnswers];

        if (config.bypassCache || this.shouldClearCache(config)) {
          this.clearCache({ includeReactions: true, includeLocalStorage: config.bypassCache && config.isInitialLoad });
        }

        await this.performDataLoad(config, oldAnswers);

      } catch (error) {
        console.error('❌ loadSheetData error:', error);
        this.handleError(error, 'data_load', true);
      } finally {
        this.state.isLoading = false;
        this.hideLoadingOverlay();

        if (config.preserveAdminMode) {
          this.state.showAdminFeatures = true;
          this.updateAdminButtonUI();
        }
      }
    }

    shouldClearCache(config) {
      return config.showLoading && !config.isInitialLoad;
    }

    async performDataLoad(config, oldAnswers) {
      try {
        const loadConfig = this.buildLoadConfiguration(config);
        this.showLoadingState(loadConfig);

        const fetchParams = this.prepareFetchParameters(loadConfig);

        const result = await this.getUserData(fetchParams, loadConfig.isInitialLoad);

        if (!result || !result.success) {
          this.handleError(new Error(result?.error || 'データ取得に失敗しました'), 'api', true);
          return;
        }

        const responseData = result.data || [];

        // Why: ランダム順選択中はサーバーは newest 順で返してくるので、
        //      クライアント側で seeded shuffle して見た目を安定させる。
        //      filter/sort 変更時は loadSheetData 経由で再評価されるのでここで一元処理。
        const sortOrderValue = this.elements.sortOrder ? this.elements.sortOrder.value : 'newest';
        this.state.currentAnswers = sortOrderValue === 'random'
          ? this.seededShuffle(responseData, this.state.randomSeed)
          : responseData;

        // Why: 可視化モード切替に必要なメタデータを state に保存。
        //      backend で 'auto' → 具体モードに解決済みなので、ここでは値を信用するだけ。
        //      axisConfig は M1/M2 で軸ラベル・象限ラベル・allowResubmit を描画する。
        const serverMode = (result.displaySettings && typeof result.displaySettings.boardMode === 'string')
          ? result.displaySettings.boardMode
          : 'board';

        // boardMode は profile (= server) が決める。teacher の手動 override 機構は撤去済。
        //   ?boardMode=X URL パラメータだけは検証 / プレビュー用途で残す。
        let overrideMode = null;
        try {
          const urlMode = new URLSearchParams(window.location.search).get('boardMode');
          if (urlMode && /^(auto|board|numberline|matrix|wordcloud|pie)$/.test(urlMode)) {
            overrideMode = urlMode;
          }
        } catch (_) { /* URL parse 失敗時は server mode をそのまま使用 */ }

        this.state.boardMode = overrideMode || serverMode;
        this.state.serverBoardMode = serverMode;
        // 診断ログ：本番でも 1 回だけ出力（dev console で確認用）
        try {
          if (!this._modeLogged || this._modeLogged !== this.state.boardMode) {
            console.info('[viz] mode resolved:', {
              chosen: this.state.boardMode,
              server: serverMode,
              override: overrideMode,
              activeProfile: serverActiveProfile,
              viewerIsTeacher: result.viewerIsTeacher
            });
            this._modeLogged = this.state.boardMode;
          }
        } catch (_) {}
        this.state.axisConfig = result.axisConfig || null;
        // Why: server が判定した teacher フラグ (isOwnBoard || isAdmin) を尊重。
        //      client の window.isEditor / state.isAdminUser は bootstrap 時の値で、
        //      poll のたびにサーバ側の最新権限状態と整合させる。
        if (result.viewerIsTeacher === true) {
          this.state.isEditor = true;
        }
        // multi-board: profile セレクタが使うメタ情報
        if (result.profiles && result.profiles.list) {
          this.state.profiles = result.profiles.list;
          this.state.activeProfile = result.profiles.active || null;
          // teacher pill の「✓ 過去 active 経験あり」表示に使う。server profileSummary に同梱。
          this.state.profileHistory = Array.isArray(result.profiles.history) ? result.profiles.history : [];
        } else {
          this.state.profiles = [];
          this.state.activeProfile = null;
          this.state.profileHistory = [];
        }

        // Option B: 生徒は studentProfileNav 経由で過去フェーズへ navigate できる。
        //   teacher は state.profiles + state.activeProfile を見るのでこれは不要。
        //   getPublishedSheetData が studentProfileNav を返したときだけ student として扱う。
        if (result.studentProfileNav && Array.isArray(result.studentProfileNav.history)) {
          this.state.studentProfileNav = result.studentProfileNav;
          // student の active も同期しておく（pills の current 判定用）
          if (!this.state.activeProfile && result.studentProfileNav.active) {
            this.state.activeProfile = result.studentProfileNav.active;
          }
        } else if (!result.studentProfileNav) {
          // 教師経路など studentProfileNav が来ない場合は state からも消す（一貫性）
          this.state.studentProfileNav = null;
        }
        // 過去フェーズを閲覧中かのフラグ。getPublishedSheetData 経由なら null （= 現在）。
        //   getPublishedSheetDataForProfile 経由でロードしたときだけ profile 名が入る。
        if (typeof result.viewingPastProfile !== 'undefined') {
          this.state.viewingPastProfile = result.viewingPastProfile || null;
        }

        // Why: profile 切替 / 教師が formUrl 変更 → 生徒のボタンも即時更新（次の poll で）。
        //      従来は init で 1 回だけ getActiveFormInfo を呼んでいたが、それでは
        //      授業中に profile 切替されても生徒は古い Forms を指したまま。
        //      polling のたびに wire の formMeta を反映することで同期される。
        if (result.formMeta) {
          // profile 切替検知: 生徒に「新しいボードに切替わりました」通知（5秒で自動消滅）。
          // Why: 教師が黒板で切替えても、生徒の小さい端末では変化に気づきにくい。
          //      短いトーストで「新フォームに切替わった」ことを明示する。
          // ただし viewer 自身が pill click で switch した直後は、 すでに右上トースト
          //  「切替えました」 が出ているため、 ここで中央バナーを重ねると 3 メッセージ
          //   pile-up になる。 __suppressBoardSwitchToast 1-shot flag で抑制する。
          const prevUrl = this.state.lastSeenFormUrl;
          const newUrl = result.formMeta.formUrl || '';
          if (this.state.__suppressBoardSwitchToast) {
            this.state.__suppressBoardSwitchToast = false;  // consume 1 回
          } else if (prevUrl && newUrl && prevUrl !== newUrl) {
            this.__showBoardSwitchedToast(result.formMeta.formTitle || '新しいボード');
          }
          this.state.lastSeenFormUrl = newUrl;
          this.__updateFormLinkButton(result.formMeta);
        }

        if (result.header && this.elements.headingLabel) {
          this.elements.headingLabel.textContent = result.header;
        }

        await this.renderBoard(false, loadConfig.isInitialLoad, oldAnswers);

        // Why: viz モードのとき変化の軌跡用 snapshot を採取（60秒間隔で sampling）。
        //      board モードでは不要。F#2 タイムライン / F#4 ビフォー・アフター の基盤。
        if (this.state.boardMode && this.state.boardMode !== 'board' &&
            typeof this.vizMaybeCaptureSnapshot === 'function') {
          this.vizMaybeCaptureSnapshot();
          if (typeof this.__vizRefreshControls === 'function') this.__vizRefreshControls();
        }

        // Why: 毎回 classFilter を再構築する。refreshContent 経由でデータ更新されたとき、
        //      新しく現れたクラス（生徒が初めて投稿した）を選択肢に加えるため。
        //      populateClassFilter は現在選択中のクラスを保持するので UX は壊れない。
        this.populateClassFilter(this.state.currentAnswers);

        if (loadConfig.isInitialLoad) {
          // Why: 初回ロードで全件描画されているので、localStorage の前回値を残すと
          //      polling が既表示分を「新着」と誤検知する。基準を現在時刻にリセット。
          this.updateLastSeenTimestamp();
        }

      } catch (error) {
        this.handleError(error, 'data_load', true);
      }
    }

    buildLoadConfiguration(config) {
      const isInitialLoad = config.isInitialLoad;
      // Why: 初回ロードでも sessionStorage に保存された前回のクラスフィルター選択を適用する。
      //      これが無いと、DOM だけ前回選択が見えているのに表示データは全件という不一致になる。
      const persistedClass = this.loadPersistedClassFilter();
      const filterState = isInitialLoad
        ? {
            rawClassFilter: persistedClass,
            classFilter: persistedClass === 'すべて' ? null : persistedClass,
            sortOrder: 'newest'
          }
        : this.getCurrentFilterState();

      return {
        isInitialLoad,
        requestedSheetName: config.requestedSheetName,
        selectedClass: filterState.rawClassFilter,
        sortOrder: filterState.sortOrder,
        showLoading: config.showLoading,
        bypassCache: config.bypassCache || false
      };
    }

    showLoadingState(config) {
      if (config.showLoading && !config.isInitialLoad) {
        const count = Math.min(parseInt(this.elements.sizeSlider.value, 10), 4);
        const frag = document.createDocumentFragment();
        for (let i = 0; i < count; i++) {
          frag.appendChild(this.createSkeletonCard());
        }
        const container = this.elements.answersContainer;
        container.className = 'grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-' + this.elements.sizeSlider.value;
        container.innerHTML = '';
        container.appendChild(frag);
      }
    }

    prepareFetchParameters(config) {
      const classFilter = !config.selectedClass || config.selectedClass === 'すべて' ?
        null : config.selectedClass;

      const params = {
        userId: this.state.userId,
        classFilter,
        sortOrder: config.sortOrder,
        showAdminFeatures: this.state.showAdminFeatures,
        requestedSheetName: config.requestedSheetName,
        bypassCache: config.bypassCache || false
      };

      return params;
    }

    populateClassFilter(rows) {
      const classFilter = this.elements.classFilter;
      if (!classFilter) return;
      const escape = window.sharedUtilities.security.escapeHtml;
      const uniqueClasses = ['すべて', ...new Set(Array.isArray(rows) ? rows.map(r => r.class).filter(Boolean) : [])];
      // 優先順: 現在 DOM 値 > sessionStorage 前回値 > 'すべて'
      // 選択していたクラスが新データに存在しなければ 'すべて' にフォールバック。
      const desired = classFilter.value || this.loadPersistedClassFilter() || 'すべて';
      classFilter.innerHTML = uniqueClasses.map(c => '<option value="' + escape(c) + '">' + escape(c) + '</option>').join('');
      classFilter.value = uniqueClasses.includes(desired) ? desired : 'すべて';
      classFilter.classList.remove('hidden');
      // 降格時は sessionStorage も同期。これがないと次回 fetch も古い filter で空結果を引き続ける。
      if (classFilter.value !== desired && typeof this.persistClassFilter === 'function') {
        this.persistClassFilter(classFilter.value);
      }
    }

    applyReactionStyles(element, data) {
      if (!element || !data || !(element instanceof HTMLElement)) return;

      const reactionClasses = [
        'reaction-bg-like', 'reaction-bg-understand', 'reaction-bg-curious',
        'reaction-bg-like-understand', 'reaction-bg-like-curious', 'reaction-bg-understand-curious',
        'reaction-bg-like-understand-curious', 'reaction-border-1', 'reaction-border-2', 'reaction-border-3',
        'highlighted'
      ];
      reactionClasses.forEach(cls => element.classList.remove(cls));

      if (data.highlight) {
        element.classList.add('highlighted');
        return;
      } else {
      }

      const active = this.reactionTypes.filter(rt =>
        data.reactions && data.reactions[rt.key] && data.reactions[rt.key].count > 0
      ).map(rt => rt.key);

      if (active.length === 1) {
        if (active[0] === 'LIKE') element.classList.add('reaction-bg-like');
        else if (active[0] === 'UNDERSTAND') element.classList.add('reaction-bg-understand');
        else if (active[0] === 'CURIOUS') element.classList.add('reaction-bg-curious');
      } else if (active.length === 2) {
        const sorted = active.sort();
        if (sorted[0] === 'CURIOUS' && sorted[1] === 'LIKE') element.classList.add('reaction-bg-like-curious');
        else if (sorted[0] === 'LIKE' && sorted[1] === 'UNDERSTAND') element.classList.add('reaction-bg-like-understand');
        else if (sorted[0] === 'CURIOUS' && sorted[1] === 'UNDERSTAND') element.classList.add('reaction-bg-understand-curious');
      } else if (active.length === 3) {
        element.classList.add('reaction-bg-like-understand-curious');
      }

      const totalReactions = this.reactionTypes.reduce((sum, rt) => sum + (data.reactions?.[rt.key]?.count || 0), 0);
      if (totalReactions >= 10) {
        element.classList.add('reaction-border-3');
      } else if (totalReactions >= 5) {
        element.classList.add('reaction-border-2');
      } else if (totalReactions > 0) {
        element.classList.add('reaction-border-1');
      }
    }

    getCurrentFilterState() {
      const classFilter = this.elements.classFilter ? this.elements.classFilter.value : 'すべて';
      const sortOrder = this.elements.sortOrder ? this.elements.sortOrder.value : 'newest';

      return {
        classFilter: classFilter === 'すべて' ? null : classFilter,
        sortOrder,
        rawClassFilter: classFilter // Keep original for UI purposes
      };
    }

    /**
     * Render dispatcher: branches by this.state.boardMode (set in performDataLoad
     * from the server's resolved boardMode — 'auto' was already collapsed server-side).
     *
     * Why: visualization modes (M1 numberline / M2 matrix) share data ingestion and
     *      polling with the existing card board. Splitting at render-time keeps the
     *      data path single-source while letting renderers diverge freely.
     *
     * Fallback: if a viz renderer isn't loaded (page.viz.js missing or skipped) or
     *      throws, we degrade to the card board so the page never goes blank.
     */
    async renderBoard(isLayoutChange = false, isInitialLoad = false, oldRows = []) {
      const mode = this.state && this.state.boardMode ? this.state.boardMode : 'board';

      // Why: タイムラインで過去 snapshot を選んでいるとき、currentAnswers を一時的に
      //      過去の値に差し替えて renderer を呼び、終了後に元に戻す。各 renderer の
      //      コードを変更せずに「時間旅行」を実現する低結合な実装。
      const runWithTimeline = (fn) => {
        if (typeof this.__vizWithTimelineSwap === 'function') {
          return this.__vizWithTimelineSwap(fn);
        }
        return fn();
      };

      const renderOne = async () => {
        if (mode === 'numberline' && typeof this.renderNumberLine === 'function') {
          return await this.renderNumberLine(isInitialLoad, oldRows);
        }
        if (mode === 'matrix' && typeof this.renderMatrix === 'function') {
          return await this.renderMatrix(isInitialLoad, oldRows);
        }
        if (mode === 'wordcloud' && typeof this.renderWordRanking === 'function') {
          return await this.renderWordRanking(isInitialLoad, oldRows);
        }
        if (mode === 'pie' && typeof this.renderPie === 'function') {
          return await this.renderPie(isInitialLoad, oldRows);
        }
        return await this.renderBoardCards(isLayoutChange, isInitialLoad, oldRows);
      };

      try {
        // Compare モード（左=過去 ↔ 右=現在）: viz mode のときのみ 2 ペイン描画。
        // 入る条件 (どちらか満たせば左ペインに何かを出せる):
        //   - 議論前 anchor が保存されている (loadBeforeSnapshot)、または
        //   - timestamp 履歴 snapshot が 1 件以上ある (vizGetSnapshots)
        // → __vizRenderCompare 内部で leftSource を 4 段階フォールバックで決定。
        if (this.state && this.state.vizCompareMode && mode !== 'board' &&
            typeof this.__vizRenderCompare === 'function') {
          const hasBefore = typeof this.__vizGetBeforeSnapshot === 'function' && this.__vizGetBeforeSnapshot();
          const hasSnaps = typeof this.vizGetSnapshots === 'function' && this.vizGetSnapshots().length > 0;
          if (hasBefore || hasSnaps) {
            return await this.__vizRenderCompare(renderOne, mode);
          }
        }

        // タイムライン位置が指定されていれば、その snapshot で描画
        const result = await runWithTimeline(renderOne);

        // toolbar (profile pills + 議論ツール) は冪等に再注入。inject → refresh の順で OK。
        if (typeof this.__vizInjectModeBar === 'function') this.__vizInjectModeBar();
        if (typeof this.__vizRefreshModeBar === 'function') this.__vizRefreshModeBar();
        if (typeof this.__vizInjectProfileSelector === 'function') this.__vizInjectProfileSelector();
        // viz モード時のみ議論ツール (議論前 / 比較 / タイムライン) の state を再計算
        if (mode !== 'board' && typeof this.__vizRefreshControls === 'function') {
          this.__vizRefreshControls();
        }

        // Why: 初回描画成功を Cloud Logging に通知（mode/profile ごと 1 回のみ）。
        //      CLI から「全機能が動いた」を確認するための telemetry。
        try {
          if (!this._renderedHeartbeats) this._renderedHeartbeats = new Set();
          const beaconKey = (this.state.activeProfile || 'noprofile') + ':' + mode;
          if (!this._renderedHeartbeats.has(beaconKey) &&
              window.ClientErrorReporter && typeof window.ClientErrorReporter.report === 'function') {
            this._renderedHeartbeats.add(beaconKey);
            window.ClientErrorReporter.report({
              level: 'log',
              message: '[viz/dispatched] ' + mode + ' rendered',
              context: 'dispatcher',
              source: JSON.stringify({
                profile: this.state.activeProfile || null,
                rowCount: (this.state.currentAnswers || []).length,
                viewerIsTeacher: this.state.isEditor === true
              }).substring(0, 200)
            });
          }
        } catch (_) {}
        return result;
      } catch (error) {
        console.error('❌ renderBoard: dispatcher error (mode=' + mode + '), falling back to cards:', error);
        // Why: viz レンダラーが落ちた場合は Cloud Logging まで届けないと debug できない。
        //      window.ErrorHandler 経由で reportClientError を呼び、サーバの
        //      `[client/error]` ログに記録する。falling-back そのものは UX を壊さない。
        try {
          if (window.ErrorHandler && typeof window.ErrorHandler.logError === 'function') {
            window.ErrorHandler.logError(error, 'renderBoard dispatcher (mode=' + mode + ')', {
              filename: 'page.js.html',
              boardMode: mode,
              rowCount: (this.state && this.state.currentAnswers && this.state.currentAnswers.length) || 0,
              d3Loaded: typeof window.d3 !== 'undefined'
            });
          }
        } catch (_) { /* never break on telemetry */ }
        try {
          return await this.renderBoardCards(isLayoutChange, isInitialLoad, oldRows);
        } catch (fallbackError) {
          console.error('❌ renderBoard: fallback also failed:', fallbackError);
          this.handleRenderingError(fallbackError);
        }
      }
    }

    /**
     * Card-grid rendering (the original bulletin board mode).
     * Was previously named renderBoard; renamed to make the dispatcher's branch
     * explicit. Behaviour is unchanged.
     */
    async renderBoardCards(isLayoutChange = false, isInitialLoad = false, oldRows = []) {
      try {
        const newRows = this.state.currentAnswers;

        if (!newRows || newRows.length === 0) {
          await this.renderEmptyState();
          return;
        }

        this.prepareRenderingState(newRows);

        this.performMainRendering(newRows, oldRows, isLayoutChange, isInitialLoad);

        this.finalizeRenderingState();

        requestIdleCallback(() => {
          this.validatePostLoadState();
        }, { timeout: 300 });

      } catch (error) {
        console.error('❌ renderBoardCards: レンダリングエラー:', error);
        this.handleRenderingError(error);
      }
    }

    async renderEmptyState() {
      await this.clearAllCardsForEmptyData();
      this.displayEmptyState();
    }

    prepareRenderingState(newRows) {
      const container = this.elements.answersContainer;
      container.querySelectorAll('.skeleton').forEach(el => el.remove());

      this.updateLayoutControls(newRows);
    }

    updateLayoutControls(newRows) {
      const updates = [];
      if (this.elements.sliderValue && this.elements.sizeSlider &&
        this.elements.sliderValue.textContent !== this.elements.sizeSlider.value) {
        updates.push(() => this.elements.sliderValue.textContent = this.elements.sizeSlider.value);
      }
      if (this.elements.sizeSlider) {
        const className = 'grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-' + this.elements.sizeSlider.value;
        if (this.elements.answersContainer.className !== className) {
          updates.push(() => this.elements.answersContainer.className = className);
        }
      }
      if (this.elements.answerCount) {
        const countHtml = this.getIcon('users', 'w-4 h-4 inline-block -mt-1') + '<span>' + newRows.length + '件</span>';
        if (this.elements.answerCount.innerHTML !== countHtml) {
          updates.push(() => this.elements.answerCount.innerHTML = countHtml);
        }
      }

      this.batchDOMUpdates(updates);
    }

    performMainRendering(newRows, oldRows, isLayoutChange, isInitialLoad) {
      const container = this.elements.answersContainer;

      const existingMap = new Map();
      container.querySelectorAll('.answer-card').forEach(card => {
        existingMap.set(card.dataset.rowIndex, card);
      });

      // Why: newRows に無くなった行のカードを DOM から削除。
      existingMap.forEach((card, id) => {
        if (!newRows.some(r => String(r.rowIndex) === id)) {
          card.remove();
          existingMap.delete(id);
        }
      });

      // Why: 並び順を変える必要があるとき (= isLayoutChange / 初期ロード) のみ全クリア。
      //   通常のポーリング更新では、既存カードは適切な位置に既に存在するので
      //   container.innerHTML = '' で剥がして再 append するのは無駄。レイアウト
      //   再計算 + GPU テクスチャ再生成が毎ポーリングで走り、Chromebook での polling
      //   tick 中の描画ジャンクを引き起こしていた。差分更新でこれを回避。
      const needsReorder = isLayoutChange || isInitialLoad;
      if (needsReorder) {
        container.innerHTML = '';
      }

      // Why: 以前は newRows.length > RENDER_BATCH_SIZE で仮想スクロールに切り替えていたが、
      //      続きを読み込む setupScrollObserver / loadMoreItems 経路がどこからも呼ばれず
      //      視界外のカードが永久に出てこないデッドパスだった。教室規模（数十〜数百件）では
      //      renderDirectly で全件出す方が速く確実。
      this.renderDirectly(newRows, oldRows, container, existingMap, needsReorder);
    }

    renderDirectly(newRows, oldRows, container, existingMap, needsReorder) {
      const fragment = this.getReusableFragment();
      // Why: 初期ロード（oldRows 空）では全件が "new" なので pulse を全カードに
      //      掛けると視覚的ノイズ。更新差分があるときだけ new-card マークを付ける。
      const markNew = Array.isArray(oldRows) && oldRows.length > 0;

      newRows.forEach((row) => {
        const rowId = String(row.rowIndex);
        let card = existingMap.get(rowId);
        const oldData = oldRows.find(r => r.rowIndex === row.rowIndex);

        if (!card) {
          card = this.createAnswerCard(row);
          if (card) {
            if (markNew) card.classList.add('new-card');
            fragment.appendChild(card);
          }
        } else {
          if (this.shouldUpdateCard(row, oldData)) {
            this.updateAnswerCard(card, row, oldData);
          }
          // Why needsReorder: container.innerHTML = '' で剥がした後は、既存カードも
          //   fragment に再 append する必要がある。reorder 不要の場合はカードは DOM
          //   に既にあるのでスキップ。
          if (needsReorder) {
            fragment.appendChild(card);
          }
        }
      });

      if (fragment.children.length > 0) {
        container.appendChild(fragment);
      }
    }

    shouldUpdateCard(newData, oldData) {
      if (!oldData) return true;

      const newReactionCount = this.reactionTypes.reduce((sum, rt) =>
        sum + (newData.reactions?.[rt.key]?.count || 0), 0);
      const oldReactionCount = this.reactionTypes.reduce((sum, rt) =>
        sum + (oldData.reactions?.[rt.key]?.count || 0), 0);

      return newReactionCount !== oldReactionCount ||
        newData.highlight !== oldData.highlight ||
        newData.opinion !== oldData.opinion ||
        newData.reason !== oldData.reason ||
        newData.name !== oldData.name;
    }

    finalizeRenderingState() {
      this.updateAnswerCount();
      this.applyAnimations();
    }

    updateAnswerCount() {
      if (!this.elements.answerCount) return;

      const count = Array.isArray(this.state.currentAnswers)
        ? this.state.currentAnswers.length
        : 0;
      const userIcon = this.getIcon('users', 'w-4 h-4 inline-block -mt-1');
      this.elements.answerCount.innerHTML =
        userIcon + '<span>' + count + '件</span>';
    }

    applyAnimations() {
      if (!this.elements.answersContainer) return;
      // Why: CSS newCardPulse は 2.5s 継続。animationend を待ち、上限 NEW_CARD_FALLBACK_MS
      //      で確実に剥がして DOM を綺麗に保つ。setTimeout 集合は destroy() で一括クリア
      //      してフィルタ高頻度切替時の bounded memory を保証する。
      const NEW_CARD_FALLBACK_MS = 3000;
      const newCards = this.elements.answersContainer.querySelectorAll('.new-card');
      newCards.forEach(card => {
        let timeoutId = null;
        const cleanup = () => {
          card.classList.remove('new-card');
          if (timeoutId !== null) {
            this.animationCleanupTimeouts.delete(timeoutId);
            timeoutId = null;
          }
        };
        card.addEventListener('animationend', cleanup, { once: true });
        timeoutId = setTimeout(cleanup, NEW_CARD_FALLBACK_MS);
        this.animationCleanupTimeouts.add(timeoutId);
      });
    }

    handleRenderingError(error) {
      console.error('レンダリングエラーの詳細:', error);

      try {
        const container = this.elements.answersContainer;
        container.innerHTML = `
        <div class="text-center py-8 col-span-full">
          <p class="text-theme-status-error">表示エラーが発生しました</p>
          <button data-action="reload" class="mt-2 px-4 py-2 bg-blue-600 text-white rounded">
            再読み込み
          </button>
        </div>
      `;
      } catch (fallbackError) {
        console.error('フォールバック表示も失敗:', fallbackError);
      }
    }

    updateAnswerCard(card, newData, oldData) {
      if (!card || !newData) return;

      try {
        const oldHasReason = oldData && oldData.reason && oldData.reason.trim();
        const newHasReason = newData.reason && newData.reason.trim();

        if (oldHasReason !== newHasReason) {
          const newCard = this.createAnswerCard(newData);
          if (newCard && card.parentNode) {
            card.parentNode.replaceChild(newCard, card);
          }
          return;
        }

        if (!oldData || oldData.opinion !== newData.opinion) {
          const opinionElement = card.querySelector('.opinion-text');
          if (opinionElement) {
            opinionElement.textContent = newData.opinion || '';
          }
        }

        if (newHasReason && (!oldData || oldData.reason !== newData.reason)) {
          const reasonElement = card.querySelector('.answer-preview p');
          if (reasonElement) {
            reasonElement.textContent = newData.reason;
          }
        }

        if (!oldData || oldData.name !== newData.name) {
          const nameElement = card.querySelector('.font-bold');
          if (nameElement) {
            nameElement.textContent = newData.name || '';
          }
        }

        this.updateCardReactions(card, newData);

        this.updateCardHighlight(card, newData);

      } catch (error) {
        console.error('updateAnswerCard error:', error);
      }
    }

    updateCardReactions(card, data) {

      const reactionContainer = card.querySelector('.reaction-container');
      if (!reactionContainer) {
        return;
      }

      const updates = [];

      this.reactionTypes.forEach(reactionType => {
        const newCount = data.reactions?.[reactionType.key]?.count || 0;
        const reacted = data.reactions?.[reactionType.key]?.reacted || false;

        updates.push({
          rowIndex: data.rowIndex,
          reaction: reactionType.key,
          count: newCount,
          reacted,
          shouldDisplay: true  // ✅ リアクションボタンは常に表示（UI一貫性のため）
        });
      });

      this.batchUpdateReactionButtons(updates, { immediate: true });
      this.updateCardReactionBackground(card, data);
    }

    batchUpdateReactionButtons(updates, options = {}) {
      const { immediate = false } = options;

      const executeUpdate = () => {
        try {
          updates.forEach(update => {
            const buttons = document.querySelectorAll(`[data-row-index="${update.rowIndex}"][data-reaction="${update.reaction}"]`);

            buttons.forEach(btn => {
              const countEl = btn.querySelector('.reaction-count');
              if (countEl && this.state.showCounts) {
                countEl.textContent = update.count;
              }

              const rt = this.reactionTypes.find(r => r.key === update.reaction);
              const svgEl = btn.querySelector('svg');
              if (svgEl && rt) {
                const newIcon = this.getIcon(rt.icon, 'w-5 h-5', update.reacted);
                svgEl.outerHTML = newIcon;
              }

              const colorClass = update.reaction === 'LIKE' ? 'text-red-500' :
                update.reaction === 'UNDERSTAND' ? 'text-yellow-500' : 'text-green-500';
              btn.classList.remove('text-red-500', 'text-yellow-500', 'text-green-500');
              btn.classList.add(colorClass);
              btn.classList.toggle('reacted', update.reacted);
              btn.setAttribute('aria-pressed', update.reacted.toString());

              const reactionNames = { 'LIKE': 'いいね！', 'UNDERSTAND': 'なるほど！', 'CURIOUS': 'もっと知りたい！' };
              const reactionName = reactionNames[update.reaction] || update.reaction;
              btn.setAttribute('aria-label', `${reactionName}${update.reacted ? 'を取り消す' : 'する'}${this.state.showCounts ? ` (現在${update.count}件)` : ''}`);
            });
          });

        } catch (error) {
          console.error('batchUpdateReactionButtons error:', error);
        }
      };

      if (immediate) {
        executeUpdate();
      } else {
        requestAnimationFrame(executeUpdate);
      }
    }

    updateCardReactionBackground(card, data) {
      this.applyReactionStyles(card, data);
    }

    updateCardHighlight(card, data) {
      const isHighlighted = data.highlight;

      if (isHighlighted) {
        card.classList.add('highlighted');
      } else {
        card.classList.remove('highlighted');
      }

      const highlightBtn = card.querySelector('.highlight-btn');
      if (highlightBtn) {
        highlightBtn.classList.toggle('active', isHighlighted);
        highlightBtn.innerHTML = this.getIcon('star', '', isHighlighted);
      }
    }

    createAnswerCard(data) {
      try {
        const safeData = this.validateCardData(data);
        if (!safeData) return null;

        const cacheKey = this.generateCardCacheKey(safeData);
        const cachedCard = this.checkCardCache(cacheKey, safeData);
        if (cachedCard) return cachedCard;

        const card = this.createCardElement(safeData);
        const { nameHtml, containerClass } = this.createNameDisplay(safeData);
        const reactionButtonsHtml = this.createReactionButtons(safeData);

        this.buildCardContent(card, safeData, reactionButtonsHtml, nameHtml, containerClass);
        this.finalizeCard(card, safeData, cacheKey);

        return card;
      } catch (error) {
        return this.createErrorCard(error, data);
      }
    }

    validateCardData(data) {
      if (!data || typeof data !== 'object') {
        return null;
      }

      if (!data.opinion) {
        console.warn('createAnswerCard: 回答データ（opinion）がありません:', {
          rowIndex: data.rowIndex,
          hasOpinion: !!data.opinion,
          dataKeys: Object.keys(data)
        });
      }

      // Why: opinion/name は数値（線形尺度モード時の numericX 値 1-5）の場合があるが、
      //      後段の .slice() / .substring() / escapeHtml() は string を前提とするので、
      //      ここで必ず文字列に正規化する。これがないと renderBoardCards にフォールバック
      //      した際に「TypeError: safeData.opinion.slice is not a function」で全カードが
      //      createErrorCard に倒れる（道徳本時 numberline 用 Form で観測されたバグ）。
      const toStr = (v) => (v === null || v === undefined) ? '' : String(v);
      return {
        rowIndex: data.rowIndex || 0,
        opinion: toStr(data.opinion),
        reason: this.validateReasonText(data.reason),
        name: toStr(data.name),
        email: toStr(data.email),
        reactions: data.reactions || {},
        highlight: Boolean(data.highlight)
      };
    }

    generateCardCacheKey(safeData) {
      const userIdentifier = window.UNIFIED_CONFIG?.email ?
        window.UNIFIED_CONFIG.email.replace(/[^a-zA-Z0-9]/g, '').slice(-8) : 'anon';
      return `${userIdentifier}-${safeData.rowIndex}-${safeData.opinion.slice(0, 50)}-${safeData.reason.slice(0, 30)}-${safeData.name}-${JSON.stringify(safeData.reactions)}-${safeData.highlight}-${this.state.showCounts}-${this.state.displayMode}-${this.state.isEditor}`;
    }

    checkCardCache(cacheKey, safeData) {
      const cachedCard = this.cache.get(`render-${cacheKey}`);
      if (cachedCard) {
        try {
          const clonedCard = cachedCard.cloneNode(true);
          clonedCard.dataset.rowIndex = safeData.rowIndex;

          const reactionButtons = clonedCard.querySelectorAll('.reaction-btn');
          reactionButtons.forEach(btn => {
            btn.dataset.rowIndex = safeData.rowIndex;
          });

          return clonedCard;
        } catch (cacheError) {
          console.warn('createAnswerCard: Cache clone error, creating new card:', cacheError);
        }
      }
      return null;
    }

    createCardElement(safeData) {
      const card = document.createElement('div');
      const highlightClass = safeData.highlight ? ' highlighted' : '';
      card.className = 'relative answer-card glass-panel rounded-xl p-4 flex flex-col justify-between shadow-lg border-2 border-cyan-400/80 cursor-pointer' + highlightClass;
      card.dataset.rowIndex = safeData.rowIndex;
      card.setAttribute('role', 'article');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', '回答カード: ' + safeData.opinion.substring(0, 50) + (safeData.opinion.length > 50 ? '...' : ''));
      return card;
    }

    createHighlightButton(safeData) {
      if (!this.state.isEditor) return '';

      const cls = safeData.highlight ? 'reacted' : '';
      const highlightAriaLabel = safeData.highlight ? 'ハイライトを解除する' : 'ハイライトする';
      return `<button type="button" class="highlight-btn like-btn text-theme-status-warning ${cls}" aria-label="${highlightAriaLabel}" aria-pressed="${safeData.highlight}" data-row-index="${safeData.rowIndex}">${this.getIcon('star', 'w-5 h-5', safeData.highlight)}</button>`;
    }

    createHighlightToggle(safeData) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'highlight-badge highlight-btn';
      btn.dataset.rowIndex = safeData.rowIndex;
      btn.setAttribute('aria-label', safeData.highlight ? 'ハイライトを解除する' : 'ハイライトする');
      btn.setAttribute('aria-pressed', String(safeData.highlight));
      btn.innerHTML = this.getIcon('star', '', safeData.highlight);
      if (safeData.highlight) btn.classList.add('active');
      return btn;
    }

    createHighlightBadge() {
      const badge = document.createElement('span');
      badge.className = 'highlight-badge';
      badge.innerHTML = this.getIcon('star', '', true);
      return badge;
    }

    createNameDisplay(safeData) {
      const showName = this.state.displayMode === 'named';
      let displayName = '';

      if (showName) {
        if (safeData.name) {
          displayName = safeData.name;
        } else if (safeData.email) {
          try {
            displayName = safeData.email.split('@')[0];
          } catch (emailError) {
            console.warn('createAnswerCard: Email parsing error:', emailError);
            displayName = 'ユーザー';
          }
        }
      }

      const nameHtml = showName && displayName ?
        `<div class="name-display flex-shrink-0 mr-2"><span class="font-bold text-sm text-theme-accent-cyan bg-theme-card-1 px-2 py-1 rounded border border-cyan-400">${window.sharedUtilities.security.escapeHtml(displayName)}</span></div>` : '';

      const containerClass = nameHtml ?
        'text-xs text-theme-muted pt-3 border-t-2 border-cyan-400/80 border-dashed flex flex-col sm:flex-row justify-between items-start sm:items-center gap-y-1 min-h-[2rem]' :
        'text-xs text-theme-muted pt-3 border-t-2 border-cyan-400/80 border-dashed flex justify-end items-center';

      return { nameHtml, containerClass };
    }

    createReactionButtons(safeData) {
      return this.reactionTypes.map(rt => {
        try {
          const info = safeData.reactions && safeData.reactions[rt.key] ? safeData.reactions[rt.key] : { count: 0, reacted: false };
          const cls = info.reacted ? 'reacted' : '';
          const colorClass = rt.key === 'LIKE' ? 'text-red-500' : rt.key === 'UNDERSTAND' ? 'text-yellow-500' : 'text-green-500';
          const countSpan = this.state.showCounts ? `<span class="reaction-count font-bold text-lg text-theme" aria-hidden="true">${info.count || 0}</span>` : '';
          const reactionNames = { 'LIKE': 'いいね！', 'UNDERSTAND': 'なるほど！', 'CURIOUS': 'もっと知りたい！' };
          const reactionName = reactionNames[rt.key] || rt.key;
          const ariaLabel = `${reactionName}${info.reacted ? 'を取り消す' : 'する'}${this.state.showCounts ? ` (現在${info.count || 0}件)` : ''}`;

          return `<button type="button" class="reaction-btn like-btn flex items-center gap-1 ${colorClass} ${cls}" data-row-index="${safeData.rowIndex}" data-reaction="${rt.key}" aria-label="${ariaLabel}" aria-pressed="${info.reacted}">${this.getIcon(rt.icon, 'w-5 h-5', info.reacted)}${countSpan}</button>`;
        } catch (reactionError) {
          console.warn('createAnswerCard: Reaction button creation error:', reactionError);
          return '';
        }
      }).join('');
    }

    buildCardContent(card, safeData, reactionButtonsHtml, nameHtml, containerClass) {

        deleteBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>

    finalizeCard(card, safeData, cacheKey) {
      if (this.state.isEditor) {
        card.appendChild(this.createHighlightToggle(safeData));
      } else if (safeData.highlight) {
        card.appendChild(this.createHighlightBadge());
      }

      this.applyReactionStyles(card, safeData);

      try {
        if (this.cache.size > 100) {
          this.cache.cleanup();
        }
        this.cache.set(`render-${cacheKey}`, card.cloneNode(true));

    createErrorCard(error, data) {
      console.error('createAnswerCard: Critical error creating card:', error, 'Data:', data);

      try {
        const errorCard = document.createElement('div');
        errorCard.className = 'answer-card glass-panel rounded-xl p-4 border-2 border-theme-status-error-strong bg-theme-status-error-soft';
        errorCard.innerHTML = `
        <div class="text-theme-status-error text-center">
          <div class="mb-2">⚠️ カード表示エラー</div>

        </div>

    createSkeletonCard() {

      card.className = 'answer-card glass-panel rounded-xl p-4 opacity-50 skeleton';

      return card;

    /**
     * Generate unique request ID for operation tracking
     * @returns {string} UUID-like unique identifier
     */
    generateRequestId() {
      return 'req_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);
    }

    /**
     * Staged error recovery strategy with escalating levels
     * @param {number} rowIndex - Row index of the failed operation
     * @param {string} reaction - Reaction type that failed
     * @param {Error} error - Original error
     * @returns {Promise<Object>} Recovery result
     */
    async performStagedRecovery(rowIndex, reaction, error) {
      const reactionKey = `${rowIndex}-${reaction}`;

      const pendingRequest = this.pendingReactions.get(reactionKey);
      if (pendingRequest) {
        pendingRequest.retryCount = (pendingRequest.retryCount || 0) + 1;
      }

      try {
        this.clearCache({ includeReactions: true });
        await this.loadSheetData({ bypassCache: true, silent: true });
        return { success: true, level: 1, method: 'cache_clear_reload' };
      } catch (level1Error) {
        console.warn('⚠️ Level 1 recovery failed:', level1Error.message);
      }

      try {
        const localRestoreResult = this.restoreLocalReactionState(rowIndex, reaction, pendingRequest);
        if (localRestoreResult.success) {
          return { success: true, level: 2, method: 'local_restore' };
        }
      } catch (level2Error) {
        console.error('❌ Level 2 recovery failed:', level2Error.message);
      }

      return {
        success: false,
        message: `All recovery levels failed for ${reactionKey}`,
        originalError: error.message
      };
    }

    /**
     * Restore local reaction state as final fallback
     * @param {number} rowIndex - Row index
     * @param {string} reaction - Reaction type
     * @param {Object} pendingRequest - Pending request context
     * @returns {Object} Restoration result
     */
    async restoreLocalReactionState(rowIndex, reaction, pendingRequest) {
      const item = this.state.currentAnswers.find(i => i.rowIndex == rowIndex);
      if (!item || !item.reactions || !item.reactions[reaction]) {
        return { success: false, message: 'No local state to restore' };
      }

      const card = document.querySelector(`[data-row-index="${item.rowIndex}"]`);

      if (pendingRequest && typeof pendingRequest.originalState === 'boolean') {
        item.reactions[reaction].reacted = pendingRequest.originalState;
        if (pendingRequest.originalState) {
          item.reactions[reaction].count = (item.reactions[reaction].count || 0) + 1;
        } else {
          item.reactions[reaction].count = Math.max(0, (item.reactions[reaction].count || 1) - 1);
        }
      } else {
        const wasReacted = item.reactions[reaction].reacted;
        item.reactions[reaction].reacted = !wasReacted;
        if (wasReacted) {
          item.reactions[reaction].count = Math.max(0, (item.reactions[reaction].count || 1) - 1);
        } else {
          item.reactions[reaction].count = (item.reactions[reaction].count || 0) + 1;
        }
      }

      if (card) {
        this.updateCardReactions(card, item);
      }

      return { success: true, message: 'Local state restored successfully' };
    }

    /**
     * Simulate server-side exclusive reaction logic for optimistic updates
     * @param {Object} item - The answer item
     * @param {string} reaction - The reaction type being clicked
     * @returns {Object} Predicted server response
     */
    simulateServerExclusiveReaction(item, reaction) {
      if (!item.reactions) item.reactions = {};

      const predictedReactions = JSON.parse(JSON.stringify(item.reactions));

      this.reactionTypes.forEach(rt => {
        if (!predictedReactions[rt.key]) {
          predictedReactions[rt.key] = { count: 0, reacted: false };
        }
      });

      let userCurrentReaction = null;
      const reactedReactions = [];

      Object.keys(predictedReactions).forEach(key => {
        if (predictedReactions[key].reacted) {
          reactedReactions.push(key);
        }
      });

      if (reactedReactions.length >= 1) {
        userCurrentReaction = reactedReactions[0];

      }

      let changed = false;

      if (userCurrentReaction === reaction) {
        predictedReactions[reaction].reacted = false;
        predictedReactions[reaction].count = Math.max(0, predictedReactions[reaction].count - 1);
        changed = true;
      } else {
        if (userCurrentReaction) {
          predictedReactions[userCurrentReaction].reacted = false;
          predictedReactions[userCurrentReaction].count = Math.max(0, predictedReactions[userCurrentReaction].count - 1);
        }
        predictedReactions[reaction].reacted = true;
        predictedReactions[reaction].count = (predictedReactions[reaction].count || 0) + 1;
        changed = true;
      }

      return {
        changed,
        reactions: predictedReactions,
        action: userCurrentReaction === reaction ? 'removed' :
          userCurrentReaction ? 'changed' : 'added',
        userReaction: userCurrentReaction === reaction ? null : reaction
      };
    }

    /**
     * 🚀 フェーズ2: デバウンシング方式リアクション処理（CLAUDE.md準拠最適化）
     */
    async addReaction(rowIndex, reaction) {
      // Option B / Phase 2 lesson review: 過去状態を閲覧中は read-only。
      //   サーバ側でも判別できないので client が gate するのが必須。
      if (this.state && (this.state.viewingPastProfile || this.state.isReviewMode)) {
        if (typeof this.showToast === 'function') {
          this.showToast(this.state.isReviewMode ? '振り返り中はリアクションできません' : '過去のフェーズを閲覧中はリアクションできません');
        }
        return;
      }
      const numericRowIndex = parseInt(rowIndex, 10);
      const reactionKey = `${numericRowIndex}-${reaction}`;
      const rowKey = `row_${numericRowIndex}`; // 行単位のデバウンシング用

      const requestId = this.generateRequestId();

      if (this.pendingReactions.has(reactionKey)) {
        const pendingRequest = this.pendingReactions.get(reactionKey);
        return;
      }

      const item = this.state.currentAnswers.find(i => i.rowIndex == numericRowIndex);
      if (!item) {
        return;
      }

      const buttons = document.querySelectorAll(`[data-row-index="${numericRowIndex}"][data-reaction="${reaction}"]`);

      this.setReactionButtonsLoading(buttons, true, requestId);

      // Why: originalState は楽観更新の「前」に捕捉する必要がある。以前は
      //      simulateServerExclusiveReaction で item.reactions を書き換えた後に
      //      currentState を取っていたため、ロールバック時に楽観値をそのまま復元 → 差分が
      //      効かずカウントが+1 ズレる現象が起きていた。
      const originalState = item.reactions?.[reaction]
        ? { count: item.reactions[reaction].count, reacted: item.reactions[reaction].reacted }
        : { count: 0, reacted: false };

      const optimisticUpdate = this.simulateServerExclusiveReaction(item, reaction);

      if (optimisticUpdate.changed) {
        item.reactions = optimisticUpdate.reactions;

        const card = document.querySelector(`[data-row-index="${item.rowIndex}"]`);

        if (card) {
          this.updateCardReactions(card, item);
        }
      }

      this.pendingReactions.set(reactionKey, {
        requestId,
        rowIndex: numericRowIndex,
        reaction,
        timestamp: Date.now(),
        originalState,
        retryCount: 0
      });

      this.debounceReactionByRow(rowKey, numericRowIndex, reaction, reactionKey);
    }

    /**
     * 行単位デバウンシング処理（300ms）
     *
     * Why store the reactionKey with the timeout: if the user clicks LIKE
     * and then CURIOUS on the same row within 300ms, the LIKE debounce is
     * superseded. Previously we only cleared the timeout but left the
     * 'row_N_LIKE' entry in pendingReactions as an orphan, which the
     * reactionKey-based guard at addReaction() would then treat as
     * "already in flight" and silently ignore any future click on LIKE
     * for that row. Cleaning up the superseded entry fixes that.
     */
    debounceReactionByRow(rowKey, rowIndex, reaction, reactionKey) {
      const previous = this.reactionDebounceTimeouts.get(rowKey);
      if (previous) {
        clearTimeout(previous.timeoutId);
        if (previous.reactionKey && previous.reactionKey !== reactionKey) {
          this.pendingReactions.delete(previous.reactionKey);
          // Why: 300ms 以内に別のリアクションに切り替えた場合、前のリアクションは
          //      サーバー送信されないまま消える。しかし setReactionButtonsLoading(..., true)
          //      で disabled+.loading を付けたボタンはその後どこからも戻されず永久ロード中になる。
          //      該当ボタンを探して明示的に解放する。
          if (previous.reaction) {
            const stale = document.querySelectorAll(
              `[data-row-index="${rowIndex}"][data-reaction="${previous.reaction}"]`
            );
            if (stale.length > 0) this.setReactionButtonsLoading(stale, false);
          }
        }
      }

      const timeoutId = setTimeout(async () => {
        try {
          this.reactionDebounceTimeouts.delete(rowKey);

          await this.sendReactionToServerDirect(rowIndex, reaction, reactionKey);

        } catch (error) {
          console.error(`❌ デバウンス実行エラー (${reactionKey}):`, error);

          this.ensureReactionCleanup(rowIndex, reaction, reactionKey, error);

        } finally {
          this.reactionDebounceTimeouts.delete(rowKey);
        }
      }, 300);

      this.reactionDebounceTimeouts.set(rowKey, { timeoutId, reactionKey, reaction });
    }

    /**
     * 🚀 直接リアクション送信（デバウンシング後）
     */
    async sendReactionToServerDirect(rowIndex, reaction, reactionKey) {
      let success = false;
      let errorMessage = null;

      try {
        const item = this.state.currentAnswers.find(i => i.rowIndex == rowIndex);
        if (!item) {
          throw new Error(`Item not found for rowIndex: ${rowIndex}`);
        }

        await this.executeWithRetry(async (attempt) => {

          const response = await this.sendReactionToServer(rowIndex, reaction);
          await this.processResponse(item, response, reaction);

          await this.updateReactionUI(item, false);

          return response;
        }, {
          maxRetries: 2,
          baseDelay: 500,
          context: `デバウンスリアクション処理 (${reactionKey})`,
          retryCondition: (error) => {
            return error.message && !error.message.includes('権限') && !error.message.includes('無効');
          }
        });

        success = true;

      } catch (error) {
        success = false;
        errorMessage = error.message;
        console.error(`❌ デバウンス処理エラー (${reactionKey}):`, error);

        await this.handleReactionError(error, rowIndex, reaction);

      } finally {
        const buttons = document.querySelectorAll(`[data-row-index="${rowIndex}"][data-reaction="${reaction}"]`);
        this.setReactionButtonsLoading(buttons, false);
        this.pendingReactions.delete(reactionKey);

        this.notifyReactionComplete(reactionKey, {
          success,
          error: errorMessage,
          rowIndex,
          reaction
        });
      }
    }

    /**
     * 🛡️ 共通クリーンアップ関数 - UI状態とサーバー処理の確実な同期
     */
    ensureReactionCleanup(rowIndex, reaction, reactionKey, error = null) {
      try {

        const buttons = document.querySelectorAll(`[data-row-index="${rowIndex}"][data-reaction="${reaction}"]`);
        if (buttons.length > 0) {
          this.setReactionButtonsLoading(buttons, false);
        } else {
        }

        if (this.pendingReactions.has(reactionKey)) {
          this.pendingReactions.delete(reactionKey);
        }

        if (error) {

          buttons.forEach(btn => {
            if (btn.disabled || btn.classList.contains('loading') || btn.getAttribute('aria-busy') === 'true') {
              btn.disabled = false;
              btn.classList.remove('loading');
              btn.setAttribute('aria-busy', 'false');
              btn.removeAttribute('data-request-id');
            }
          });
        }

        if (!this.reactionEventListeners.has(reactionKey)) {
          this.notifyReactionComplete(reactionKey, {
            success: !error,
            error: error?.message,
            rowIndex,
            reaction,
            cleanupReason: 'ensureReactionCleanup'
          });
        }

      } catch (cleanupError) {
        console.error(`❌ クリーンアップ処理自体でエラー: ${reactionKey}`, cleanupError);
        try {
          const buttons = document.querySelectorAll(`[data-row-index="${rowIndex}"][data-reaction="${reaction}"]`);
          buttons.forEach(btn => {
            btn.disabled = false;
            btn.classList.remove('loading');
            btn.setAttribute('aria-busy', 'false');
          });
        } catch (finalError) {
          console.error(`❌ 最終UI復旧もエラー: ${reactionKey}`, finalError);
        }
      }
    }

    notifyReactionComplete(reactionKey, result) {
      const listeners = this.reactionEventListeners.get(reactionKey);
      if (listeners && listeners.length > 0) {
        listeners.forEach(listener => {
          try {
            listener(result);
          } catch (error) {
            console.error('❌ リアクション完了リスナーエラー:', error);
          }
        });
        this.reactionEventListeners.delete(reactionKey);
      }
    }

    setReactionButtonsLoading(buttons, isLoading, requestId = null) {
      buttons.forEach(btn => {
        btn.disabled = isLoading;
        if (isLoading) {
          btn.classList.add('loading');
          btn.setAttribute('aria-busy', 'true');
          if (requestId) {
            btn.setAttribute('data-request-id', requestId);
          }

        } else {
          btn.classList.remove('loading');
          btn.setAttribute('aria-busy', 'false');
          if (requestId) {
            btn.removeAttribute('data-request-id');
          }
        }
      });
    }

    async sendReactionToServer(rowIndex, reaction) {
      try {
        const response = await this.runGas('addReaction', this.state.userId, rowIndex, reaction);

        if (!response) {
          throw new Error('サーバーからの応答がありません');
        }

        if (response.success !== true) {
          throw new Error(response.message || 'リアクション送信に失敗しました');
        }

        return response;
      } catch (error) {
        if (error.userMessage) {
          throw new Error(error.userMessage);
        } else if (error.message && error.message.includes('timeout')) {
          throw new Error('サーバーへの接続がタイムアウトしました。ネットワーク接続を確認してください。');
        } else if (error.message && error.message.includes('無効')) {
          throw new Error('無効なリアクションです。ページを更新してください。');
        } else {
          throw error; // 元のエラーをそのまま投げる
        }
      }
    }

    async processResponse(item, response, reaction) {
      if (response.success && response.reactions && typeof response.reactions === 'object') {
        const serverReactions = JSON.parse(JSON.stringify(response.reactions));

        const validatedReactions = this.validateAndFixReactionExclusivity(serverReactions);

        item.reactions = validatedReactions;

        this.saveReactionState(item.rowIndex, item.reactions);
      } else {
        console.error('❌ Invalid server response format:', response);
        throw new Error('Server returned invalid response format');
      }
    }

    /**
     * リアクション状態の排他性を検証し、必要に応じて修正
     * @param {Object} reactions - 検証するリアクション状態
     * @returns {Object} 修正済みのリアクション状態
     */
    validateAndFixReactionExclusivity(reactions) {
      if (!reactions || typeof reactions !== 'object') {
        return {};
      }

      const validatedReactions = JSON.parse(JSON.stringify(reactions));
      const reactedKeys = [];

      Object.keys(validatedReactions).forEach(key => {
        if (validatedReactions[key] && validatedReactions[key].reacted) {
          reactedKeys.push(key);
        }
      });

      if (reactedKeys.length > 1) {

        const keepReaction = reactedKeys[0];
        reactedKeys.slice(1).forEach(key => {
          validatedReactions[key].reacted = false;
          validatedReactions[key].count = Math.max(0, validatedReactions[key].count - 1);
        });

      }

      return validatedReactions;
    }

    async updateReactionUI(item, immediate = false) {
      const lastUpdateKey = `ui_update_${item.rowIndex}`;
      const currentStateHash = this.calculateStateHash(item);
      const lastStateHash = this.lastUIStates?.get(lastUpdateKey);

      if (lastStateHash === currentStateHash && !immediate) {
        return;
      }

      if (!this.lastUIStates) this.lastUIStates = new Map();
      this.lastUIStates.set(lastUpdateKey, currentStateHash);

      if (immediate) {
        try {
          this._applyReactionUIUpdate(item);
        } catch (error) {
          console.error('❌ UI即座更新エラー:', error);
        }
        return;
      }

      return new Promise(resolve => {
        requestAnimationFrame(() => {
          try {
            this._applyReactionUIUpdate(item);
            resolve();
          } catch (error) {
            console.error('UI更新エラー:', error);
            resolve();
          }
        });
      });
    }

    // card + (開いていれば) modal のリアクション表示を item で更新。
    //   immediate path と requestAnimationFrame path で同一だったロジックを集約。
    _applyReactionUIUpdate(item) {
      const card = document.querySelector(`[data-row-index="${item.rowIndex}"]`);
      if (card && card instanceof HTMLElement) {
        this.updateCardReactions(card, item);
        this.applyReactionStyles(card, item);
      }
      if (!this.elements.answerModalContainer.classList.contains('hidden')) {
        // updateModalReactionButtons 内で rowIndex 一致チェックするので不一致なら no-op。
        const modalRowIndex = this.elements.modalReactionContainer
          .querySelector('[data-row-index]')?.dataset.rowIndex;
        if (modalRowIndex == item.rowIndex) {
          this.updateModalReactionButtons(item);
          this.applyReactionStyles(this.elements.answerModalCard, item);
        }
      }
    }

    getScopedKey(base) {
      const userId = this.state?.userId || window.USER_ID;
      return `${base}_${userId}_${window.SHEET_NAME}`;
    }

    isFirstTimeBoardAccess() {
      try {
        const hasLastSeenTimestamp = localStorage.getItem(this.getScopedKey('lastSeenTimestamp')) !== null;
        const hasDiffCards = localStorage.getItem(this.getScopedKey('differentialCards')) !== null;
        const container = this.elements?.answersContainer;
        const hasDOMCards = container && container.querySelectorAll('.answer-card').length > 0;
        return !hasLastSeenTimestamp && !hasDiffCards && !hasDOMCards;
      } catch (error) {
        console.warn('⚠️ 初回判定エラー:', error);
        return false;
      }
    }

    loadLastSeenTimestamp() {
      try {
        const key = this.getScopedKey('lastSeenTimestamp');
        const stored = localStorage.getItem(key);
        const timestamp = stored || new Date(0).toISOString();

        return timestamp;
      } catch (error) {
        console.warn('⚠️ lastSeenTimestamp読み込みエラー:', error);
        return new Date(0).toISOString();
      }
    }

    saveLastSeenTimestamp(timestamp) {
      try {
        const key = this.getScopedKey('lastSeenTimestamp');
        localStorage.setItem(key, timestamp);

      } catch (error) {
        console.warn('⚠️ lastSeenTimestamp保存エラー:', error);
      }
    }

    updateLastSeenTimestamp(timestamp = null) {
      const newTimestamp = timestamp || new Date().toISOString();
      this.state.lastSeenTimestamp = newTimestamp;
      this.saveLastSeenTimestamp(newTimestamp);
    }

    /**
     * Why: クラスフィルターの選択を sessionStorage で保存。ページリロードや
     *      新しいタブで開いたときに前回の選択を自動復元する。
     *      localStorage 採用でも良いが、授業中の一時的な絞り込みを次回も引きずると
     *      混乱するので、タブ閉鎖で消える session スコープを選ぶ。
     */
    loadPersistedClassFilter() {
      try {
        return sessionStorage.getItem(this.getScopedKey('classFilter')) || 'すべて';
      } catch (_) { return 'すべて'; }
    }
    persistClassFilter(value) {
      try {
        sessionStorage.setItem(this.getScopedKey('classFilter'), value);
      } catch (_) { /* quota / privacy mode など: 無視して次回に委ねる */ }
    }

    /**
     * Why: ランダム順のシードをセッション単位で固定。ポーリングで再取得するたびに
     *      シャッフルされるとカードが跳ね回って読みづらいので、session 内では
     *      同じ並びを維持する。タブを閉じれば次回は別の並びになる。
     */
    loadRandomSeed() {
      try {
        const key = 'studyquest-randomSeed';
        let seed = sessionStorage.getItem(key);
        if (!seed) {
          seed = String(Date.now() ^ Math.floor(Math.random() * 0x7fffffff));
          sessionStorage.setItem(key, seed);
        }
        return Number(seed) >>> 0;
      } catch (_) {
        return (Date.now() ^ Math.floor(Math.random() * 0x7fffffff)) >>> 0;
      }
    }

    /**
     * seeded PRNG (mulberry32). ランダム順の表示に使う。
     * Why: 同じ seed なら常に同じ並びになる。サーバー側では新着順で返ってくるので、
     *      クライアントで決定的にシャッフルして見た目を安定させる。
     */
    seededShuffle(array, seed) {
      const a = array.slice();
      let s = seed >>> 0;
      const rand = () => {
        s |= 0; s = (s + 0x6D2B79F5) | 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
      // Why: rowIndex を seed にミックスしてから shuffle。同一 seed + 同一 rowIndex なら
      //      位置が決定論的になるので、ポーリング再描画しても並びが維持される。
      // Fisher-Yates
      for (let i = a.length - 1; i > 0; i -= 1) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    async handleReactionError(error, rowIndex, reaction) {
      console.error('リアクションエラーの詳細:', {
        error: error.message,
        rowIndex,
        reaction,
        timestamp: new Date().toISOString()
      });

      const recoveryResult = await this.performStagedRecovery(rowIndex, reaction, error);

      // Recovery succeeded (cache reload or local restore restored a coherent
      // state). Skip the scary error toast — the user's UI already matches
      // reality again, and showing "リアクション更新エラーが発生しました" would
      // confuse them into thinking the retry didn't work.
      if (recoveryResult.success) {
        console.log('✅ Recovery succeeded:', recoveryResult.method);
        return;
      }

      console.error('❌ All recovery attempts failed:', recoveryResult.message);

      let userMessage = 'リアクション更新エラーが発生しました';
      if (error.message.includes('timeout') || error.message.includes('タイムアウト')) {
        userMessage = 'ネットワークが遅いため、リアクションの更新に時間がかかっています';
      } else if (error.message.includes('network') || error.message.includes('ネットワーク')) {
        userMessage = 'ネットワーク接続を確認してください';
      } else if (error.message.includes('permission') || error.message.includes('権限')) {
        userMessage = 'リアクション機能への権限がありません';
      }

      if (window.notifications) {
        window.notifications.error(userMessage, 4000);
      } else {
        this.showNotification(userMessage, 'error');
      }

      console.error('🔍 Reaction Error:', error.message, { rowIndex, reaction });
    }

    async handleHighlight(rowIndex) {
      // Option B / Phase 2 lesson review: 過去状態閲覧中は read-only。
      if (this.state && (this.state.viewingPastProfile || this.state.isReviewMode)) {
        if (typeof this.showToast === 'function') {
          this.showToast(this.state.isReviewMode ? '振り返り中は操作できません' : '過去のフェーズを閲覧中は操作できません');
        }
        return;
      }
      const numericRowIndex = parseInt(rowIndex, 10);
      const highlightKey = `${numericRowIndex}-highlight`;

      const now = Date.now();
      const lastHighlightTime = this.lastReactionTimes?.get(highlightKey) || 0;
      if (now - lastHighlightTime < StudyQuestApp.CONSTANTS.HIGHLIGHT_RATE_LIMIT_MS) {
        return;
      }

      if (this.pendingReactions.has(highlightKey)) {
        return;
      }

      this.pendingReactions.set(highlightKey, { type: 'highlight', rowIndex: numericRowIndex, timestamp: Date.now() });
      if (!this.lastReactionTimes) this.lastReactionTimes = new Map();
      this.lastReactionTimes.set(highlightKey, now);

      const btns = document.querySelectorAll('.highlight-btn[data-row-index="' + numericRowIndex + '"]');
      const item = this.state.currentAnswers.find(i => i.rowIndex == numericRowIndex);

      if (!item) {
        this.pendingReactions.delete(highlightKey);
        return;
      }

      btns.forEach(btn => {
        btn.classList.add('loading');
        btn.disabled = true;
      });

      try {
        const res = await this.executeWithRetry(async (attempt) => {

          const response = await this.runGas('toggleHighlight', this.state.userId, numericRowIndex);

          if (response && response.success === true) {
            return response;
          } else {
            throw new Error(response?.message || 'ハイライトの処理に失敗しました');
          }
        }, {
          maxRetries: 2,
          baseDelay: 300,
          context: `ハイライト処理 (${highlightKey})`,
          retryCondition: (error) => {
            if (error.message && (error.message.includes('管理者のみ') || error.message.includes('編集者のみ'))) {
              return false;
            }
            const retryableErrors = ['network', 'timeout', 'server error', 'temporarily unavailable'];
            return retryableErrors.some(errorType =>
              error.message.toLowerCase().includes(errorType)
            );
          }
        });

        item.highlight = typeof res.highlighted === 'boolean' ? res.highlighted : !item.highlight;

        this.batchDOMUpdates([
          () => this.applyUpdates([item])
        ]);

        if (!this.elements.answerModalContainer.classList.contains('hidden')) {
          // updateModalContent は左右両カードを横断して numericRowIndex を表示中の側のみ
          // 更新するように refactor 済 (data.rowIndex 一致を内部で確認)。
          requestAnimationFrame(() => this.updateModalContent(item));
        }

        requestIdleCallback(() => {
          const highlightValue = typeof res.highlighted === 'boolean' ? res.highlighted : item.highlight;
          this.verifyHighlightSync(numericRowIndex, highlightValue);
        }, { timeout: 1000 });

      } catch (error) {
        console.error('Failed to toggle highlight:', error);

        if (error.message && (error.message.includes('管理者のみ') || error.message.includes('編集者のみ'))) {
          this.showNotification('権限エラー: ボード編集者のみ利用可能です', 'error');
        } else {
          this.showNotification('ハイライトに失敗しました', 'error');
        }
      } finally {
        btns.forEach(btn => {
          btn.classList.remove('loading');
          btn.disabled = false;
        });
        this.pendingReactions.delete(highlightKey);
      }
    }

    async verifyHighlightSync(rowIndex, expectedHighlight) {
      try {
        const item = this.state.currentAnswers.find(i => i.rowIndex == rowIndex);
        if (!item) return;

        if (typeof expectedHighlight === 'undefined') {
          return;
        }

        if (item.highlight !== expectedHighlight) {

          item.highlight = expectedHighlight;
          requestAnimationFrame(() => this.applyUpdates([item]));

        } else {
        }
      } catch (error) {
        console.error('ハイライト状態同期確認エラー:', error);
      }
    }

    calculateStateHash(item) {
      const state = {
        reactions: item.reactions,
        highlight: item.highlight,
        rowIndex: item.rowIndex
      };
      return JSON.stringify(state);
    }

    /**
     * 回答を削除する
     * @param {string} rowIndex - 削除対象の行インデックス
     * @param {string} [expectedTimestamp] - 対象行の timestamp（サーバの identity verification 用）
     */
    async deleteAnswer(rowIndex, expectedTimestamp) {
      try {
        if (window.notifications) {
          window.notifications.info('回答を削除中...', 2000);
        }

        const result = await runServer('deleteAnswerRow', this.state.userId, parseInt(rowIndex), expectedTimestamp);

        if (result.success) {
          if (window.notifications) {
            window.notifications.success('回答を削除しました', 3000);
          }

          this.dismissNewContentBanner();

          await this.refreshAfterDelete(rowIndex);

        } else {
          throw new Error(result.message || '削除に失敗しました');
        }
      } catch (error) {
        console.error('削除処理エラー:', error);
        if (window.notifications) {
          window.notifications.error(`削除に失敗しました: ${error.message}`, 5000);
        }

      }
    }

    /**
     * 削除後の画面更新（最適化版 - 不要な全リセット削除）
     * @param {string} deletedRowIndex - 削除された行インデックス
     */
    async refreshAfterDelete(deletedRowIndex) {
      try {
        const currentAdminState = this.state.showAdminFeatures;

        const initialCount = this.state.currentAnswers?.length || 0;

        if (this.state.currentAnswers) {
          this.state.currentAnswers = this.state.currentAnswers.filter(answer =>
            String(answer.rowIndex) !== String(deletedRowIndex)
          );
        }
        if (this.state.allAnswers) {
          this.state.allAnswers = this.state.allAnswers.filter(answer =>
            String(answer.rowIndex) !== String(deletedRowIndex)
          );
        }

        const cardToRemove = document.querySelector(`[data-row-index="${deletedRowIndex}"]`);
        if (cardToRemove) {
          cardToRemove.style.transition = 'all 0.3s ease-out';
          cardToRemove.style.transform = 'scale(0.8)';
          cardToRemove.style.opacity = '0';

          setTimeout(() => {
            cardToRemove.remove();
            this.updateAnswerCount();

            if (currentAdminState) {
              this.state.showAdminFeatures = true;
              this.updateAdminButtonUI();
            }
          }, 300);
        } else {
          this.updateAnswerCount();

          if (currentAdminState) {
            this.state.showAdminFeatures = true;
            this.updateAdminButtonUI();
          }
        }

        const finalCount = this.state.currentAnswers?.length || 0;
        const isDataConsistent = (initialCount - finalCount) === 1;

        if (!isDataConsistent) {
          setTimeout(() => {
            this.loadSheetData({ preserveAdminMode: true, bypassCache: true });
          }, 500);
        }

      } catch (error) {
        console.error('削除後更新エラー:', error);
        if (window.notifications) {
          window.notifications.warning('削除後の更新でエラーが発生しました。画面を更新します。', 3000);
        }
        setTimeout(() => {
          const preserveAdminMode = this.state.showAdminFeatures;
          this.loadSheetData({ preserveAdminMode, bypassCache: true });
        }, 500);
      }
    }

    async toggleAdminMode() {
      if (this.elements.adminToggleBtn) {
        this.elements.adminToggleBtn.disabled = true;
      }

      try {
        const enable = !this.state.showAdminFeatures;

        if (enable) {
          if (!this.state.isEditor || !window.hasAdminCapability) {
            return;
          }

          const confirmed = await this.showAdminModeConfirmation();
          if (!confirmed) {
            return; // ユーザーがキャンセルした場合
          }

          if (!this.adminModeVerified) {
            try {
              const authResult = await this.runGas('checkUserAuthentication');
              const ok = authResult && authResult.isAdministrator;
              if (!ok) {
              }
              this.adminModeVerified = true;
            } catch (e) {
              console.warn('権限確認API呼び出しに失敗しました', e);
            }
          }
        }

        window.showAdminFeatures = enable;

        // body.admin-mode を toggle して `.admin-mode-only` 要素を CSS で出し入れ。
        //   destructive action (公開を終了) は通常表示から外し、⚙ → 確認 → 管理モード ON
        //   の二段階で開く (電子黒板で生徒視線に destructive ボタンを入れないため)。
        document.body.classList.toggle('admin-mode', enable);

        if (enable) {
          window.showCounts = true;
          window.displayMode = 'named';
        } else {
          const displaySettings = window.UNIFIED_CONFIG?.displaySettings || {};

          window.showCounts = displaySettings.showReactions || false;
          window.displayMode = displaySettings.showNames ? 'named' : 'anonymous';
        }

        window.isStudentMode = !enable;

        this.updateConfigFromGlobals();

        this.cache.clear();

        this.elements.answersContainer.innerHTML = '';

        this.updateSortOptions();
        this.updateAdminButtonUI();
        this.updateEndPublicationButtonUI();
        this.loadSheetData({ bypassCache: true }).then(() => {
          this.updateLastSeenTimestamp();

        });
      } finally {
        if (this.elements.adminToggleBtn) {
          this.elements.adminToggleBtn.disabled = false;
        }
      }
    }
