<script>
  /* =====================================================================
   * page.js — 生徒・教師向け回答ボードのメインクラス (StudyQuestApp)
   *
   * 責任範囲:
   *   - ボードデータ取得・描画 (mode=view / review)
   *   - リアクション・ハイライト UI (debounce + optimistic update)
   *   - クラスフィルタ / ソート / カードサイズスライダー
   *   - ポーリング (新着検知) + 増分マージ
   *   - 公開終了ボタン (owner のみ)
   *   - mode 切替 (board / numberline / matrix / pie / wordcloud / auto)
   *
   * gasRun (line ~921): cache + retry + withUserObject + null guard を組み込んだ
   *   コア API wrapper。 runServer より高機能なので、 page.js 内では gasRun を使う。
   *   ボード関連以外の単発 API 呼び出し (deleteAnswerRow 等) は runServer を直接使う。
   *
   * 可視化モードの実装は別ファイル: page.viz.js.html (prototype 拡張)。
   * ===================================================================== */

  class StudyQuestApp {
    static get CONSTANTS() {
      const perfLevel = window.getPerformanceLevel?.() || 'medium';
      const isLowEndDevice = window.isLowEndDevice?.() || false;

      return {
        REACTION_RATE_LIMIT_MS: isLowEndDevice ? 800 : 500,
        HIGHLIGHT_RATE_LIMIT_MS: isLowEndDevice ? 800 : 500,
        CACHE_TTL_MS: perfLevel === 'high' ? 2000 : perfLevel === 'low' ? 500 : 1000,
        RETRY_DELAY_MS: perfLevel === 'low' ? 3000 : 2000,
        POLLING_INTERVAL_MS: perfLevel === 'high' ? 5000 : perfLevel === 'low' ? 12000 : 8000,
        INIT_TIMEOUT_MS: isLowEndDevice ? 45000 : 30000
      };
    }

    /**
     * ユーザーIDを検証し、必要に応じてフォールバック値を提供
     * @param {string} userId - 検証するユーザーID
     * @returns {string} 有効なユーザーID、またはフォールバック値
     */
    validId(userId) {
      if (!userId || typeof userId !== 'string' || userId.trim() === '') {
        try {
          const urlParams = new URLSearchParams(window.location.search);
          const fallbackUserId = urlParams.get('userId');
          if (fallbackUserId && fallbackUserId.trim()) {
            return fallbackUserId.trim();
          }
        } catch (_) {}

        try {
          if (typeof window.USER_ID !== 'undefined' && window.USER_ID && window.USER_ID.trim()) {
            return window.USER_ID.trim();
          }
        } catch (_) {}

        return '';
      }

      return userId;
    }

    constructor() {

      this.cache = new window.UnifiedCache();
      this.activeRequests = 0;

      this.perf = { frameTime: 0, domOperations: 0 };
      this.visibilityObserver = null;
      this.resizeObserver = null;
      this.animationFrameId = null;
      this.idleCallbackId = null;
      // Why Set: applyAnimations は新着カードごとに 3s fallback timeout を仕掛けるが、
      //   filter 切替で旧カードが DOM から消えても closure が card 参照を保持し続ける。
      //   フィルタ高頻度切替時の memory pressure を抑えるため、destroy()/フィルタ変更で
      //   一括クリアできるよう全タイムアウト ID を集合管理する。
      this.animationCleanupTimeouts = new Set();
      this.domFragmentPool = [];
      // Why: false で始めないと detectLowPerformance の判定が空回りする。
      this.isLowPerformanceMode = false;

      this.elements = {
        body: document.body,
        mainContainer: document.getElementById('main-container'),
        answersContainer: document.getElementById('answers'),
        sizeSlider: document.getElementById('sizeSlider'),
        sliderValue: document.getElementById('sliderValue'),
        headingLabel: document.getElementById('headingLabel'),
        endPublicationBtn: document.getElementById('endPublicationBtn'),
        adminToggleBtn: document.getElementById('adminToggleBtn'),
        themeToggleHost: document.getElementById('themeToggleHost'),
        answerCount: document.getElementById('answerCount'),
        answerModalContainer: document.getElementById('answerModalContainer'),
        answerModalCloseBtn: document.getElementById('answerModalCloseBtn'),
        answerModalCard: document.getElementById('answerModalCard'),
        modalAnswer: document.getElementById('modalAnswer'),
        modalStudentName: document.getElementById('modalStudentName'),
        modalReactionContainer: document.getElementById('modalReactions'),
        modalFooter: document.getElementById('modalFooter'),
        infoModalContainer: document.getElementById('infoModalContainer'),
        infoModalCard: document.getElementById('infoModalCard'),
        infoModalConfirmBtn: document.getElementById('infoModalConfirmBtn'),
        infoIconLike: document.getElementById('infoIconLike'),
        infoIconUnderstand: document.getElementById('infoIconUnderstand'),
        infoIconCurious: document.getElementById('infoIconCurious'),
        infoIconHighlight: document.getElementById('infoIconHighlight'),
        newContentBanner: document.getElementById('newContentBanner'),
        newContentIcon: document.getElementById('newContentIcon'),
        newContentText: document.getElementById('newContentText'),
        refreshContentBtn: document.getElementById('refreshContentBtn'),
        dismissBannerBtn: document.getElementById('dismissBannerBtn'),
        iconClose: document.getElementById('iconClose'),
        iconGrid: document.getElementById('iconGrid'),
        classFilter: document.getElementById('classFilter'),
        sortOrder: document.getElementById('sortOrder'),
        scoreOption: document.getElementById('scoreOption'),
        footer: document.getElementById('controlsFooter')
      };

      this.state = {
        allAnswers: [],        // Full dataset cache for client-side filtering
        currentAnswers: [],    // Currently displayed filtered/sorted data
        isLoading: false,
        lastFocusedElement: null,
        isEditor: window.isEditor,
        isAdminUser: false,
        showCounts: window.showCounts,
        displayMode: window.displayMode,
        sheetName: window.SHEET_NAME,
        userId: this.validId(window.USER_ID),
        initializationComplete: false,
        isInitializing: true,
        lastSeenTimestamp: this.loadLastSeenTimestamp(),
        startTime: Date.now(),
        // Why: ランダム順をセッション内で固定するためのシード。
        //      sessionStorage に保存することで、タブを開いている間はポーリング等で
        //      再フェッチしてもカードが跳ね回らない。タブを閉じれば新しい並びになる。
        randomSeed: this.loadRandomSeed(),
        isOnline: typeof navigator !== 'undefined' ? navigator.onLine !== false : true,
        // Why: 可視化モード（M1/M2）切替用の state。デフォルトは既存挙動の 'board'。
        //      server の displaySettings.boardMode（auto→具体モード解決済み）で上書きされる。
        boardMode: 'board',
        axisConfig: null
      };

      this.lastActivityTime = Date.now();

      this.state.showCounts = window.showCounts;
      this.state.displayMode = window.displayMode;

      this.handlers = {};
      this.adminModeVerified = false; // 管理モード切り替え時の権限確認フラグ
      this.pendingReactions = new Map();
      this.reactionDebounceTimeouts = new Map(); // 行単位デバウンシング用（300ms）
      this.reactionEventListeners = new Map(); // 処理完了通知用

      this.eventDelegationSetup = false;
      this.nonCriticalListenersSetup = false;
      this.reactionTypes = [
        { key: 'LIKE', icon: 'hand-thumb-up' },
        { key: 'UNDERSTAND', icon: 'lightbulb' },
        { key: 'CURIOUS', icon: 'magnifying-glass-plus' }
      ];

      const currentUserIdentifier = window.UNIFIED_CONFIG?.email ?
        window.UNIFIED_CONFIG.email.replace(/[^a-zA-Z0-9]/g, '').slice(-8) : 'anon';
      const safeSheetName = (typeof window.SHEET_NAME !== 'undefined' && window.SHEET_NAME) ?
        window.SHEET_NAME.trim() : 'default';
      this.reactionStorageKey = 'reactions_' + currentUserIdentifier + '_' + safeSheetName;

      this.gas = {
        getPublishedSheetData: (classFilter, sort, adminMode, targetUserId) =>
          this.runGas('getPublishedSheetData', classFilter, sort, adminMode, targetUserId),
        getNotificationUpdate: (targetUserId, options) =>
          this.runGas('getNotificationUpdate', targetUserId, options),
        addReaction: (rowIndex, reaction, sheetName) => this.runGas('addReaction', this.state.userId, rowIndex, reaction),
        toggleHighlight: (rowIndex, sheetName) => this.runGas('toggleHighlight', this.state.userId, rowIndex),
        checkAdmin: () => this.runGas('isAdmin'),
        validateData: () => this.validData()
      };

      this.initializeSimplePolling();

      this.init().catch(error => {
        console.error('❌ StudyQuestApp: Fatal initialization error:', error);
        this.displayInitializationError('アプリケーションの起動に失敗しました: ' + error.message);
      });
    }

    initializeSimplePolling() {
      this.polling = {
        isActive: false,
        timerId: null,
        errorCount: 0
      };

      const savedCols = localStorage.getItem('boardColumns');
      if (savedCols && this.elements.sizeSlider && this.elements.sliderValue) {
        this.elements.sizeSlider.value = savedCols;
        this.elements.sliderValue.textContent = savedCols;
        this.updateSliderBackground(this.elements.sizeSlider);
      }
    }

    resetStateForCleanInit() {

      this.state.allAnswers = [];        // Clear full dataset cache
      this.state.currentAnswers = [];
      this.dismissNewContentBanner();

      this._clearAnswerCards();
    }

    async executeWithRetry(operation, options = {}) {
      const {
        maxRetries = 3,
        baseDelay = 1000,
        maxDelay = 10000,
        backoffMultiplier = 2,
        jitter = true,
        retryCondition = () => true,
        context = 'operation'
      } = options;

      let lastError = null;

      for (let attempt = 0; attempt <= maxRetries; attempt++) {
        try {
          const result = await operation(attempt);
          if (attempt > 0) {
          }
          return result;
        } catch (error) {
          lastError = error;

          if (attempt === maxRetries || !retryCondition(error, attempt)) {
            break;
          }

          let delay = Math.min(baseDelay * Math.pow(backoffMultiplier, attempt), maxDelay);

          if (error && error.message && error.message.includes('429')) {
            delay = Math.max(delay, 15000 + (attempt * 10000)); // Start at 15s, add 10s per attempt
          }

          if (jitter) {
            delay = delay * (0.5 + Math.random() * 0.5); // Add 50% jitter
          }

          await new Promise(resolve => requestIdleCallback(resolve, { timeout: delay }));
        }
      }

      throw lastError;
    }

    async init() {
      try {
        this.resetStateForCleanInit();
        this.setupCriticalElements();
        this.showMinimalSkeleton();
        this.optimizeForLowPerformance();

        // テーマ切替トグル: 投影中の教師が教室の明るさに応じて切替えられるよう
        //   sort/filter 行末尾 (eab-actions 内) に sun/moon アイコンボタンを mount。
        //   themeManager は SharedUtilities でロード時に init 済み (FOUC 防止)。
        if (this.elements.themeToggleHost && window.themeManager) {
          window.themeManager.mountToggle(this.elements.themeToggleHost);
        }

        this.state.isAdminUser = window.UNIFIED_CONFIG?.isAdminUser || false;
        // Phase 2 lesson archive: review mode の検出 + read-only state。
        //   isReviewMode が立っていれば polling を止め、reactions / highlight は no-op に。
        this.state.isReviewMode = Boolean(window.UNIFIED_CONFIG?.isReviewMode);
        this.state.reviewLesson = window.UNIFIED_CONFIG?.reviewLesson || null;

        // Phase 2 lesson review: snapshots を delta-encoded 形式に hydrate して sessionStorage に書く。
        //   これで既存の viz timeline スライダー / 比較モードが live polling 無しで動く。
        if (this.state.isReviewMode && this.state.reviewLesson && typeof this.__vizHydrateReview === 'function') {
          try {
            const hydratedCount = this.__vizHydrateReview(this.state.reviewLesson);
            console.info(`[lesson/review] hydrated ${hydratedCount} snapshot entries`);
          } catch (hydrateErr) {
            console.warn('[lesson/review] hydration failed:', hydrateErr && hydrateErr.message);
          }
          // 振り返り banner を表示。lesson name は server side の reviewLesson.name から。
          const banner = document.getElementById('lesson-review-banner');
          const nameEl = document.getElementById('lesson-review-name');
          if (banner) banner.classList.remove('hidden');
          if (nameEl) nameEl.textContent = (this.state.reviewLesson.name || '無題');
          // Heading は最終 phase の question を初期値に (banner=固定文脈 / heading=動的内容 の役割分離)。
          if (typeof this.__updateReviewHeading === 'function') this.__updateReviewHeading(null);
        }

        this.renderIcons(); // 静的アイコンの即座読み込み（モーダル内のアイコンを含む）
        this.showInfoModal(); // デジタルシティズンシップモーダル

        // form-link-btn は <a target="_blank">。連打で複数タブが開かないよう capture click で gate。
        const formLinkAnchor = document.getElementById('form-link-btn');
        if (formLinkAnchor && window.sharedUtilities?.buttons) {
          formLinkAnchor.addEventListener('click', (e) => {
            if (!window.sharedUtilities.buttons.navOnce(formLinkAnchor)) {
              e.preventDefault();
            }
          });
        }

        try {
          // Run both fetches in parallel: the form-link button and the main
          // board data are independent, so there's no reason to add the
          // getActiveFormInfo round trip to the critical path before
          // loadSheetData starts.
          await Promise.all([
            this.initializeFormButton(),
            this.loadSheetData({ showLoading: false, isInitialLoad: true, bypassCache: false })
          ]);
        } catch (error) {
          console.error('Data loading failed during initialization:', error);
          this.showInfoModal(); // Show modal even on error
        }

        this.state.initializationComplete = true;
        this.state.isInitializing = false;
        this.hideLoadingOverlay();

        if (this.elements.infoModalConfirmBtn) {
          this.elements.infoModalConfirmBtn.disabled = false;
        }

        this.setupNonCriticalEventListeners();
        this.adjustLayout();
        this.updateSortOptions();
        this.setupObservers();
        // Why: OPS（電子黒板用の低スペック PC、Celeron 4c + 4GB + 統合 GPU が典型）
        //      では backdrop-filter / box-shadow アニメーションが致命的にカクつく。
        //      静的スペックでまず判定し、ボーダーラインなら FPS 監視で動的判定する。
        this.detectLowPerformance();

        this.setupEditorState();

        this.setupMessageListeners();

      } catch (error) {
        console.error('❌ StudyQuestApp: Critical error in init():', error);
        this.handleError(error, 'initialization', true);
        this.hideLoadingOverlay();
      }
    }

    /**
     * ✅ Restore form button display functionality
     * Initialize form button display in the UI
     */
    async initializeFormButton() {
      try {
        await loadFormLink();
      } catch (_) {}
    }

    /**
     * ✅ CLAUDE.md準拠: Simplified editor state setup
     */
    setupEditorState() {
      // body class で editor/viewer 表示制御を統一。.editor-only クラスが CSS で
      //   body:not(.is-editor) のとき display:none になるので JS の hidden トグルは不要。
      const isEditor = !!window.isEditor;
      this.state.isEditor = isEditor;
      document.body.classList.toggle('is-editor', isEditor);
      document.body.classList.toggle('is-viewer', !isEditor);
      if (this.elements.adminToggleBtn) {
        if (isEditor) {
          this.elements.adminToggleBtn.classList.remove('hidden');
          this.elements.adminToggleBtn.removeAttribute('hidden');
          this.elements.adminToggleBtn.style.display = '';
        } else {
          this.elements.adminToggleBtn.classList.add('hidden');
          this.elements.adminToggleBtn.setAttribute('hidden', '');
          this.elements.adminToggleBtn.style.display = 'none';
        }
      }
    }

    /**
     * Unified message listener setup
     */
    setupMessageListeners() {
      // Why: ハンドラ参照を保持しないと destroy() 時に removeEventListener できず、
      //      SPA 的な再初期化や HMR で stale listener が累積するリークになる。
      this.handlers.onWindowMessage = (event) => this.handleMessage(event.data);
      window.addEventListener('message', this.handlers.onWindowMessage);

      if (typeof BroadcastChannel !== 'undefined') {
        this.broadcastChannel = new BroadcastChannel('board-updates');
        this.handlers.onBroadcastMessage = (event) => this.handleMessage(event.data);
        this.broadcastChannel.addEventListener('message', this.handlers.onBroadcastMessage);
      }
    }

    /**
     * ✅ CLAUDE.md準拠: Unified message handler (no duplicate code)
     */
    async handleMessage(data) {
      if (!data || !data.type) return;

      try {
        switch (data.type) {
          case 'REFRESH_BOARD_DATA':
          case 'BOARD_PUBLISHED':
            await this.loadSheetData({ bypassCache: true });
            this.showInfoModal();
            break;

          case 'FORM_CREATED':
            // Why gate on https:// : postMessage payloads can be forged by
            //      any frame/window we accept messages from. Without this
            //      check a javascript: URL would fire when the user clicks
            //      the form-link button.
            if (data.formUrl && typeof data.formUrl === 'string' && /^https:\/\//i.test(data.formUrl)) {
              const formLinkBtn = document.getElementById('form-link-btn');
              if (formLinkBtn) {
                formLinkBtn.href = data.formUrl;
                formLinkBtn.classList.remove('hidden');
              }
            }
            break;
        }
      } catch (error) {
        console.warn('Message handling error:', error);
        try {
          await this.loadSheetData({ bypassCache: true });
          this.showInfoModal();
        } catch (fallbackError) {
          console.error('Fallback data loading failed:', fallbackError);
        }
      }
    }

    setupCriticalElements() {
      if (this.elements.headingLabel) {
        const initialText = window.UNIFIED_CONFIG?.questionText || '読み込み中...';
        this.elements.headingLabel.textContent = initialText;
      }

      this.setupEventDelegation();
      this.handlers.onAnswerModalCloseClick = () => this.hideAnswerModal();
      if (this.elements.answerModalCloseBtn) {
        this.elements.answerModalCloseBtn.addEventListener('click', this.handlers.onAnswerModalCloseClick);
      }
      const debouncedRender = this.debounce(() => this.renderBoard(true, false), 200);
      this.handlers.onSizeSliderInput = this.throttle((e) => {
        localStorage.setItem('boardColumns', e.target.value);
        this.updateSliderBackground(e.target);
        debouncedRender();
      }, 100); // Throttle to 100ms

      if (this.elements.sizeSlider) {
        this.elements.sizeSlider.addEventListener('input', this.handlers.onSizeSliderInput, { passive: true });
      }
    }

    setupNonCriticalEventListeners() {
      if (this.nonCriticalListenersSetup) {
        return;
      }

      this.handlers.onAnswerModalContainerClick = (e) => {
        if (e.target === e.currentTarget) {
          this.hideAnswerModal();
        }
      };
      if (this.elements.answerModalContainer) {
        this.elements.answerModalContainer.addEventListener('click', this.handlers.onAnswerModalContainerClick);
      }
      if (this.elements.infoModalConfirmBtn) {
        this.handlers.onInfoModalConfirmClick = () => this.hideInfoModal();
        this.elements.infoModalConfirmBtn.addEventListener('click', this.handlers.onInfoModalConfirmClick);
      }
      this.handlers.onModalReactionClick = (e) => {
        const btn = e.target.closest('.reaction-btn');
        const highlightBtn = e.target.closest('.highlight-btn');

        if (highlightBtn) {
          const id = highlightBtn.dataset.rowIndex;
          if (id) {
            this.handleHighlight(id);
          }
        } else if (btn) {
          const id = btn.dataset.rowIndex;
          const reaction = btn.dataset.reaction;
          if (id && reaction) {
            this.addReaction(id, reaction);
          }
        }
      };
      if (this.elements.modalReactionContainer) {
        this.elements.modalReactionContainer.addEventListener('click', this.handlers.onModalReactionClick);
      }
      this.handlers.onClassFilterChange = async () => {
        try {
          this.persistClassFilter(this.elements.classFilter ? this.elements.classFilter.value : 'すべて');
          await this.loadSheetData({ bypassCache: true, isInitialLoad: false });
          this.updateLastSeenTimestamp();
        } catch (error) {
          console.error('クラスフィルター変更時のデータ読み込みエラー:', error);
        }
      };
      this.handlers.onSortOrderChange = async () => {
        try {
          await this.loadSheetData({ bypassCache: true, isInitialLoad: false });
          this.updateLastSeenTimestamp();
        } catch (error) {
          console.error('ソート順変更時のデータ読み込みエラー:', error);
        }
      };
      if (this.elements.classFilter) {
        this.elements.classFilter.addEventListener('change', this.handlers.onClassFilterChange);
      }
      if (this.elements.sortOrder) {
        this.elements.sortOrder.addEventListener('change', this.handlers.onSortOrderChange);
      }
      if (this.elements.endPublicationBtn) {
        this.handlers.onEndPublicationClick = () => this.endPublication();
        this.elements.endPublicationBtn.addEventListener('click', this.handlers.onEndPublicationClick);
      }
      if (this.elements.adminToggleBtn) {
        if (this.handlers.onAdminToggleClick) {
          this.elements.adminToggleBtn.removeEventListener('click', this.handlers.onAdminToggleClick);
        }
        this.handlers.onAdminToggleClick = () => this.toggleAdminMode();
        this.elements.adminToggleBtn.addEventListener('click', this.handlers.onAdminToggleClick);
      }

      if (this.elements.refreshContentBtn) {
        const refreshBtn = this.elements.refreshContentBtn;
        this.handlers.onRefreshContentClick = async () => {
          // withBusy: 連打抑制 + spinner。refreshContent 自体は短時間処理だが、
          //   遅延ネットワーク下で 2 回以上呼ばれると banner state が破綻するため gate。
          const busy = window.sharedUtilities?.buttons;
          if (busy) {
            await busy.withBusy(refreshBtn, async () => {
              try { await this.refreshContent(); }
              catch (e) { console.error('コンテンツ更新エラー:', e); }
            });
          } else {
            try { await this.refreshContent(); }
            catch (e) { console.error('コンテンツ更新エラー:', e); }
          }
        };
        refreshBtn.addEventListener('click', this.handlers.onRefreshContentClick);
      }
      if (this.elements.dismissBannerBtn) {
        this.handlers.onDismissBannerClick = () => this.dismissNewContentBanner();
        this.elements.dismissBannerBtn.addEventListener('click', this.handlers.onDismissBannerClick);
      }
      this.handlers.onDocumentKeydown = (e) => {
        if (e.key === 'Escape') {
          if (this.elements.newContentBanner && !this.elements.newContentBanner.classList.contains('hidden')) {
            this.dismissNewContentBanner();
            e.preventDefault();
            return;
          }
          this.hideAnswerModal();
        }
      };
      document.addEventListener('keydown', this.handlers.onDocumentKeydown);
      this.handlers.onWindowResize = this.debounce(() => this.adjustLayout(), 100);
      window.addEventListener('resize', this.handlers.onWindowResize, { passive: true });
      this.handlers.onVisibilityChange = () => {
        if (document.hidden) {
          this.stopSimplePolling();
          this.cleanup();
        } else if (this.state.initializationComplete) {
          Promise.resolve().then(() => {
            this.startSimplePolling();
          });
        } else {
        }
      };
      document.addEventListener('visibilitychange', this.handlers.onVisibilityChange, { passive: true });

      this.handlers.onActivityDetection = () => {
        this.lastActivityTime = Date.now();
        if (!this.polling.isActive && this.state.initializationComplete) {
          this.startSimplePolling();
        }
      };
      document.addEventListener('click', this.handlers.onActivityDetection, { passive: true });

      // Why: オフラインからオンラインに戻ったとき、ポーリングの次回起動を待たず
      //      即座にスケジュールし直す。生徒の Wi-Fi が不安定な場面で復帰が早い。
      this.handlers.onOnline = () => {
        this.state.isOnline = true;
        if (this.state.initializationComplete && !this.polling.isActive) {
          this.startSimplePolling();
        }
      };
      this.handlers.onOffline = () => { this.state.isOnline = false; };
      window.addEventListener('online', this.handlers.onOnline, { passive: true });
      window.addEventListener('offline', this.handlers.onOffline, { passive: true });

      this.setupScrollHeader();
      this.setupPullToRefresh();

      if (this.state.initializationComplete && !this.polling.isActive) {
        this.startSimplePolling();
      }

      this.nonCriticalListenersSetup = true;
    }

    /**
     * 下スクロールでヘッダーを隠し、上スクロールで復帰させる。
     * Why: 回答カードを縦に多く見せる。連続スクロール時の小さな揺り戻しで
     *      ヘッダーがパタパタしないよう、しきい値と方向の両方で判定する。
     */
    setupScrollHeader() {
      const header = this.elements.header || document.getElementById('main-header');
      if (!header) return;
      this.elements.header = header;

      const HIDE_AFTER_PX = 80;  // この距離以内は絶対に隠さない（最上部のブレ対策）
      const DELTA_PX = 8;        // 方向変化とみなす最小差分

      let lastY = window.scrollY || 0;
      let ticking = false;

      const update = () => {
        ticking = false;
        const y = window.scrollY || 0;
        const delta = y - lastY;

        if (y <= HIDE_AFTER_PX) {
          header.classList.remove('header-hidden');
        } else if (delta > DELTA_PX) {
          header.classList.add('header-hidden');     // 下スクロール
        } else if (delta < -DELTA_PX) {
          header.classList.remove('header-hidden');  // 上スクロール
        }
        lastY = y;
      };

      this.handlers.onScrollHeader = () => {
        if (!ticking) {
          requestAnimationFrame(update);
          ticking = true;
        }
      };
      window.addEventListener('scroll', this.handlers.onScrollHeader, { passive: true });
    }

    /**
     * モバイルの「引き下げて更新」ジェスチャー。
     * Why: 通知バナー経由の更新は分かりにくい。標準的な SNS アプリと同じ
     *      下方向プルで refreshContent を発火させて、触って覚えてもらう。
     *      native scroll を阻害しないよう、scrollY===0 + 指が下向き移動の
     *      条件を揃えたときだけ preventDefault する。
     */
    setupPullToRefresh() {
      const indicator = document.getElementById('pull-to-refresh-indicator');
      const textEl = document.getElementById('pull-to-refresh-text');
      const body = document.getElementById('main-container');
      if (!indicator || !textEl || !body) return;

      // Why: ネイティブ（iOS Safari / SNS アプリ）の引き下げ更新は、ボディそのものが
      //      指に追随してラバーバンドで戻る体験が核。インジケーターだけ動かしてもボディが
      //      静止していると「上から通知が出た」だけに感じて違和感が残る。ボディも
      //      translateY させ、指数関数減衰で「引くほど重い」抵抗感を出し、release 時は
      //      CSS transition の spring 風 easing で 0 に戻す。
      const THRESHOLD_PX = 70;   // これを超えて離すと発火
      const MAX_PULL_PX = 120;   // ここ以上は伸びない（視覚上の上限）
      const DIRECTIONAL_SLOP = 8; // 縦方向として認識する最小 dy（水平スワイプとの衝突回避）
      const RELEASE_RESET_MS = 250; // refresh 完了から「ローディング感」を残す追加表示時間

      // Why: 一定倍率だと引くほど軽く感じる。指数関数減衰 f(x) = MAX * (1 - e^(-x/MAX))
      //      は x が小さいとほぼ線形、x が MAX に近づくと漸近して頭打ちになり、iOS の
      //      ラバーバンドと同じ "重さが増す" 体感になる。
      const dampedBodyOffset = (pull) => {
        return MAX_PULL_PX * (1 - Math.exp(-pull / MAX_PULL_PX)) * 0.75;
      };

      let startY = null;
      let startX = null;
      let pulling = false;
      let triggered = false;
      let directionLocked = false; // start 時点では縦横未判定、最初の数 px で確定する

      const setBodyOffset = (px) => {
        body.style.transform = px > 0 ? `translate3d(0, ${px}px, 0)` : '';
      };

      const reset = () => {
        indicator.style.transform = 'translate(-50%, -120%)';
        indicator.classList.remove('active', 'ready');
        textEl.textContent = '引き下げて更新';
        body.classList.add('ptr-releasing');
        setBodyOffset(0);
        setTimeout(() => {
          body.classList.remove('ptr-releasing', 'ptr-pulling');
        }, 400);
        startY = null;
        startX = null;
        pulling = false;
        triggered = false;
        directionLocked = false;
      };

      const hapticPulse = () => {
        // Why: しきい値到達で触覚フィードバックを出す。Android 実機と一部 iOS デバイスで
        //      効く。非対応ブラウザは silent (undefined を返す) のでガードだけでよい。
        if (typeof navigator !== 'undefined' && typeof navigator.vibrate === 'function') {
          try { navigator.vibrate(10); } catch (_) { /* privacy mode: ignore */ }
        }
      };

      this.handlers.onPtrStart = (e) => {
        if ((window.scrollY || 0) > 0) return;
        if (this.state.isLoading) return;
        if (!e.touches || e.touches.length !== 1) return;
        startY = e.touches[0].clientY;
        startX = e.touches[0].clientX;
        pulling = false;
        triggered = false;
        directionLocked = false;
        body.classList.remove('ptr-releasing');
        // ドラッグ中のみ will-change でレイヤー昇格。終わったら外して GPU メモリを解放。
        body.classList.add('ptr-pulling');
      };

      this.handlers.onPtrMove = (e) => {
        if (startY == null) return;
        const dy = e.touches[0].clientY - startY;
        const dx = e.touches[0].clientX - startX;

        // Why: 最初の数 px で縦/横を判定。横スワイプ（ブラウザの戻る操作や横スクロール）なら
        //      以降 PTR は起動しない。これを入れないと斜めでも PTR が勝ってしまう。
        if (!directionLocked) {
          if (Math.abs(dy) < DIRECTIONAL_SLOP && Math.abs(dx) < DIRECTIONAL_SLOP) return;
          if (Math.abs(dx) >= Math.abs(dy)) {
            // 横方向が支配的 → PTR をキャンセルして native スワイプに譲る
            startY = null;
            return;
          }
          directionLocked = true;
        }

        if (dy <= 0) {
          if (pulling) reset();
          return;
        }
        if ((window.scrollY || 0) > 0) { reset(); return; }

        pulling = true;
        const pull = Math.min(dy, MAX_PULL_PX);

        // インジケーター: 画面外 -120% から指追随で 0 付近まで
        const indicatorY = (pull / MAX_PULL_PX) * 100 - 120;
        indicator.style.transform = `translate(-50%, ${indicatorY}%)`;
        indicator.classList.add('active');

        // ボディ: 指数減衰で指に追随しつつ「重み」を演出
        setBodyOffset(dampedBodyOffset(pull));

        // しきい値到達で触覚 + 見た目切り替え
        const prevTriggered = triggered;
        triggered = pull >= THRESHOLD_PX;
        if (triggered !== prevTriggered) {
          indicator.classList.toggle('ready', triggered);
          textEl.textContent = triggered ? '離して更新' : '引き下げて更新';
          if (triggered) hapticPulse();
        }

        if (e.cancelable) e.preventDefault();
      };

      this.handlers.onPtrEnd = async () => {
        if (!pulling) { reset(); return; }
        if (!triggered) { reset(); return; }
        textEl.textContent = '更新中...';
        indicator.classList.remove('ready');
        indicator.style.transform = 'translate(-50%, 12px)';
        // ローディング中は少しだけボディを下げたまま保持して "読み込んでいる感" を残す
        body.classList.add('ptr-releasing');
        setBodyOffset(24);
        try {
          await this.refreshContent();
        } finally {
          setTimeout(reset, RELEASE_RESET_MS);
        }
      };

      document.addEventListener('touchstart', this.handlers.onPtrStart, { passive: true });
      document.addEventListener('touchmove', this.handlers.onPtrMove, { passive: false });
      document.addEventListener('touchend', this.handlers.onPtrEnd, { passive: true });
      document.addEventListener('touchcancel', this.handlers.onPtrEnd, { passive: true });
    }
    /**
   * イベント委譲の設定（安定版の堅牢なロジックを採用）
   * これにより、クリックイベントが他のイベントと競合しなくなります。
   */
    setupEventDelegation() {
      if (this.eventDelegationSetup) {
        return;
      }

      this.handlers.onAnswersContainerClick = (e) => {

        // Error/limited-mode screens rendered into answersContainer carry
        // a data-action attribute rather than inline onclick="..." (keeps
        // us out of CSP-unsafe territory and makes the handlers testable).
        const actionEl = e.target.closest('[data-action]');
        if (actionEl && this.elements.answersContainer.contains(actionEl)) {
          e.stopPropagation();
          this.runContainerAction(actionEl.dataset.action, actionEl);
          return;
        }

        const answerCard = e.target.closest('.answer-card');

        if (!answerCard || answerCard.classList.contains('hidden-card')) {
          return;
        }

        const rowIndex = answerCard.dataset.rowIndex;
        if (!rowIndex) {
          return;
        }

        const reactionBtn = e.target.closest('.reaction-btn');
        if (reactionBtn) {
          e.stopPropagation(); // ★重要: イベントの伝播を止め、カード本体のクリックと分離
          if (!reactionBtn.disabled) {
            this.addReaction(rowIndex, reactionBtn.dataset.reaction);
          }
          return;
        }

        const deleteBtn = e.target.closest('.delete-answer-btn');
        if (deleteBtn) {
          e.stopPropagation(); // イベントの伝播を止める
          this.confirmDeleteAnswer(rowIndex);
          return;
        }

        const highlightBtn = e.target.closest('.highlight-btn');
        if (highlightBtn) {
          e.stopPropagation(); // ★重要: 同様にイベントの伝播を停止
          if (!highlightBtn.disabled) {
            this.handleHighlight(rowIndex);
          }
          return;
        }

        this.showAnswerModal(rowIndex);
      };

      if (this.elements.answersContainer) {
        this.elements.answersContainer.removeEventListener('click', this.handlers.onAnswersContainerClick);
        this.elements.answersContainer.addEventListener('click', this.handlers.onAnswersContainerClick);
        this.eventDelegationSetup = true;
      } else {
        console.error('No answers container found for event delegation');
      }
    }

    runContainerAction(action, _element) {
      switch (action) {
        case 'reload':
          if (typeof window.safeReload === 'function') window.safeReload();
          else window.location.reload();
          return;
        case 'retry-load':
          if (typeof this.loadSheetData === 'function') {
            this.loadSheetData({ bypassCache: true, isInitialLoad: true });
          }
          return;
        default:
          console.warn('runContainerAction: unknown action', action);
      }
    }

    adjustLayout() {
      if (this.baseBodyPadding === undefined) {
        this.baseBodyPadding = parseFloat(getComputedStyle(this.elements.body).paddingBottom) || 0;
      }
      const footerHeight = this.elements.footer.offsetHeight;
      this.elements.body.style.paddingBottom = footerHeight + this.baseBodyPadding + 'px';
    }
    runGas(funcName, ...args) {
      if (this.activeRequests >= 3) {
        return Promise.reject(new Error('Too many concurrent requests'));
      }

      const mappedArgs = args;

      const cacheKey = funcName + JSON.stringify(mappedArgs);
      const isStateChanging = ['toggleHighlight', 'addReaction'].includes(funcName);

      if (!isStateChanging) {
        const cached = this.cache.get(cacheKey);
        if (cached) {
          return Promise.resolve(cached);
        }
      }

      const promise = this.executeWithRetry(async () => {
        this.activeRequests++;
        return new Promise((resolve, reject) => {
          const handleSuccess = (result) => {
            this.activeRequests--;

            if (!isStateChanging && result !== null && result !== undefined) {
              this.cache.set(cacheKey, result, StudyQuestApp.CONSTANTS.CACHE_TTL_MS);
            }
            resolve(result);
          };

          const handleError = (error) => {
            this.activeRequests--;

            if (!isStateChanging && this.cache.has(cacheKey)) {
              this.cache.delete(cacheKey);
            }

            console.error(`❌ handleError for ${funcName}`, {
              error: error.message || error.toString(),
              errorType: typeof error,
              isEnhanced: !!error.functionName,
              cacheCleared: !isStateChanging,
              timestamp: new Date().toISOString(),
              activeRequests: this.activeRequests
            });

            reject(error);
          };

          if (typeof google !== 'undefined' && google.script && google.script.run) {
            if (!google.script.run[funcName] || typeof google.script.run[funcName] !== 'function') {
              const safeFuncName = funcName || 'unknown';
              handleError(new Error(`API function '${safeFuncName}' not available`));
              return;
            }

            google.script.run
              .withSuccessHandler((result) => {

                if (result === null || result === undefined) {
                  handleError(new Error(`Function ${funcName} returned null/undefined response`));
                  return;
                }

                if (typeof result === 'object' && result.hasOwnProperty('success') && typeof result.success !== 'boolean') {
                  result.success = Boolean(result.success);
                }

                handleSuccess(result);
              })
              .withFailureHandler((error) => {
                console.error(`❌ google.script.run failure for ${funcName}:`, {
                  funcName,
                  originalArgs: args,
                  mappedArgs,
                  error,
                  timestamp: new Date().toISOString()
                });
                handleError(this.enhanceError(error, funcName, args));
              })
              .withUserObject({ userId: this.state.userId })
            [funcName](...mappedArgs);
          } else {
            this.getMockData(funcName, ...mappedArgs).then((result) => {
              if (!isStateChanging) {
                this.cache.set(cacheKey, result, StudyQuestApp.CONSTANTS.CACHE_TTL_MS);
              }
              resolve(result);
            }).catch(reject);
          }
        });
      }, {
        maxRetries: isStateChanging ? 1 : 2, // State-changing operations get fewer retries
        baseDelay: 500,
        maxDelay: 5000, // Reduced max delay for faster failure
        context: `GAS API (${funcName || 'unknown'})`,
        retryCondition: (error) => {
          // 🔧 CRITICAL FIX: Don't retry on timeout errors
          if (error.message.includes('timeout')) {
            return false;
          }

          const retryableErrors = [
            'network', 'temporarily unavailable',
            'script runtime', 'service invoked'
          ];
          const shouldRetry = retryableErrors.some(errorType =>
            error.message.toLowerCase().includes(errorType)
          );

          return shouldRetry;
        }
      });

      return promise;
    }

    enhanceError(error, funcName, args) {
      const enhancedError = new Error(error.message || error);
      enhancedError.originalError = error;
      enhancedError.functionName = funcName;
      enhancedError.arguments = args;

      switch (funcName) {
        case 'addReaction':
          enhancedError.userMessage = 'リアクション処理エラー';
          break;
        case 'toggleHighlight':
          enhancedError.userMessage = 'ハイライト処理エラー';
          break;
        default:
          enhancedError.userMessage = '通信エラー';
      }

      return enhancedError;
    }

    updateAdminButtonUI() {
      if (this.elements.adminToggleBtn && this.state.isEditor) {
        this.elements.adminToggleBtn.classList.remove('hidden');
        this.elements.adminToggleBtn.removeAttribute('hidden');

        if (this.state.showAdminFeatures) {
          this.elements.adminToggleBtn.classList.remove('text-theme-muted');
          this.elements.adminToggleBtn.classList.add('bg-cyan-600', 'hover:bg-cyan-700', 'text-white', 'shadow-lg', 'ring-2', 'ring-cyan-400/50');
        } else {
          this.elements.adminToggleBtn.classList.remove('bg-cyan-600', 'hover:bg-cyan-700', 'text-white', 'shadow-lg', 'ring-2', 'ring-cyan-400/50');
          this.elements.adminToggleBtn.classList.add('text-theme-muted');
        }
      } else {
        if (this.elements.adminToggleBtn) {
          this.elements.adminToggleBtn.classList.add('hidden');
          this.elements.adminToggleBtn.setAttribute('hidden', '');
        }
      }
    }

    updateEndPublicationButtonUI() {
      if (this.elements.endPublicationBtn) {
        if (this.state.showAdminFeatures) {
          this.elements.endPublicationBtn.classList.remove('hidden');
          this.elements.endPublicationBtn.removeAttribute('hidden');
        } else {
          this.elements.endPublicationBtn.classList.add('hidden');
          this.elements.endPublicationBtn.setAttribute('hidden', '');
        }
      }
    }

    handleError(error, type = 'general', showUser = false) {

      const errorMsg = error.message || error;

      console.error(`❌ ${type} error:`, errorMsg);

      if (showUser) {
        this.showNotification(`操作に失敗しました: ${errorMsg}`, 'error');
      }

      return error;
    }

    clearCache(options = {}) {
      const { includeReactions = false, includeLocalStorage = false } = options;

      try {
        if (this.cache) {
          this.cache.clear();
        }

        if (window.unifiedCache && typeof window.unifiedCache.clear === 'function') {
          window.unifiedCache.clear();
        }

        if (includeReactions && this.reactionCache) {
          this.reactionCache.clear();
        }

        if (includeLocalStorage) {
          try {
            Object.keys(localStorage).forEach(key => {
              if (key.startsWith('reaction_state_') || key.startsWith('cache_')) {
                localStorage.removeItem(key);
              }
            });
          } catch (lsError) {
            this.handleCacheError('localStorage clear', lsError);
          }
        }

      } catch (error) {
        console.warn('⚠️ Cache clear failed:', error.message);
      }
    }

    showNewContentBanner(newItemsCount, filterState = null) {
      if (!this.elements.newContentBanner || !newItemsCount || newItemsCount <= 0) {
        return;
      }

      const message = newItemsCount === 1
        ? '新しい意見が投稿されました'
        : `${newItemsCount}件の新しい意見が投稿されました`;

      this.elements.newContentText.textContent = message;
      this.elements.newContentBanner.classList.remove('hidden', 'notification-banner-exit');
      this.elements.newContentBanner.classList.add('notification-banner-enter');

      this.elements.newContentBanner.setAttribute('aria-hidden', 'false');
    }

    dismissNewContentBanner() {
      if (!this.elements.newContentBanner) {
        return;
      }

      this.elements.newContentBanner.classList.remove('notification-banner-enter');
      this.elements.newContentBanner.classList.add('notification-banner-exit');
      setTimeout(() => {
        this.elements.newContentBanner.classList.add('hidden');
        this.elements.newContentBanner.setAttribute('aria-hidden', 'true');
      }, 300);
    }

    async refreshContent() {
      try {
        await this.loadSheetData({
          showLoading: true,
          bypassCache: true
        });

        this.updateLastSeenTimestamp(); // 新着通知の無限ループを防止

        this.dismissNewContentBanner();

        this.showNotification('コンテンツを更新しました', 'success');

      } catch (error) {
        console.error('コンテンツ更新エラー:', error);
        this.showNotification('コンテンツの更新に失敗しました', 'error');
      }
    }

    startSimplePolling() {
      if (this.polling.isActive) return;
      // Phase 2 lesson review: 振り返り画面は frozen snapshot を見ているので polling 不要 + 有害。
      if (this.state && this.state.isReviewMode) return;

      this.polling.isActive = true;
      this.polling.errorCount = 0;

      this.schedulePollingCheck();
    }

    schedulePollingCheck() {
      if (!this.polling.isActive) return;

      const interval = this.getPollingInterval();
      const timeSinceActivity = Date.now() - this.lastActivityTime;

      this.polling.timerId = setTimeout(async () => {
        if (!this.polling.isActive) return;

        // Why: Wi-Fi が不安定な教室環境では online=false が発生しやすい。
        //      このとき fetch を叩いても必ずネットワークエラーになるだけ。
        //      errorCount を進めず次の interval でリトライする（online 復帰で 'online' event が発火して即座に再開される）。
        if (typeof navigator !== 'undefined' && navigator.onLine === false) {
          this.schedulePollingCheck();
          return;
        }

        try {
          const response = await this.runGas('getNotificationUpdate', this.state.userId, {
            lastUpdateTime: this.state.lastSeenTimestamp
          });

          // Why: 以前は response.success が false でも errorCount=0 にリセットしていたため、
          //      サーバー側の「スプレッドシートアクセス拒否」のような継続的失敗が
          //      永久にポーリングされ、大量の ERROR ログとサーバー時間を浪費していた。
          //      失敗時は throw して下の catch 経路に載せ、3 回で 5 分停止する
          //      既存の exponential backoff を効かせる。
          if (!response || !response.success) {
            throw new Error(response?.message || 'getNotificationUpdate failed');
          }

          // Option B: 過去フェーズ閲覧中は polling 経由のデータ更新を止める。
          //   生徒が過去フェーズを開いている間に teacher が新着で auto-reload すると、
          //   学習の振り返りが強制中断される。formMeta による profile 切替検知も同様に skip。
          const viewingPast = !!(this.state && this.state.viewingPastProfile);

          if (response.hasNewContent && !viewingPast) {
            // Why: モード別の更新戦略。
            //   - viz 系 (numberline / matrix / pie): リアルタイム可視化が教育価値の核心
            //     ("いま誰が回答したか" を黒板で共有)。silent auto-reload で dot/slice を即時反映。
            //   - board (掲示板): 児童が個別意見を精読中なので、自動更新は集中を奪う。バナー方式維持。
            //   - wordcloud: 棒の順序が頻繁に変わると視覚疲労 → バナー方式で教師判断。
            const mode = this.state.boardMode || 'board';
            const autoUpdateModes = ['numberline', 'matrix', 'pie'];
            if (autoUpdateModes.includes(mode)) {
              if (typeof this.loadSheetData === 'function') {
                this.loadSheetData({ bypassCache: true, isInitialLoad: false, showLoading: false });
              }
            } else {
              this.showNewContentBanner(response.newItemsCount);
            }
          }

          // Why: 教師が profile 切替したとき、生徒の 5 秒 polling で即時に検知する。
          //   getNotificationUpdate に formMeta/activeProfile を載せたので、ここで前回値と
          //   比較して URL 変更があれば「新しいボードに切り替わりました」トースト + 自動再読込。
          //   これがないと polling は新着投稿しか拾えず、profile 切替は気付かれない。
          if (response.formMeta && !viewingPast) {
            const newUrl = response.formMeta.formUrl || '';
            const prevUrl = this.state.lastSeenFormUrl || '';
            if (prevUrl && newUrl && prevUrl !== newUrl) {
              this.__showBoardSwitchedToast(response.formMeta.formTitle || '新しいボード');
              // 自動でデータ再読込し、ボード本体も新 profile の中身に切替える
              if (typeof this.loadSheetData === 'function') {
                this.loadSheetData({ bypassCache: true, isInitialLoad: false });
              }
            }
            // 初回 polling や同一 URL の場合も lastSeenFormUrl は最新に追従させる
            this.state.lastSeenFormUrl = newUrl;
          } else if (response.formMeta && viewingPast) {
            // 過去閲覧中は lastSeenFormUrl を更新するだけ（戻ったときに 2 度 toast しないように）
            this.state.lastSeenFormUrl = response.formMeta.formUrl || this.state.lastSeenFormUrl || '';
          }

          this.polling.errorCount = 0;

        } catch (error) {
          this.polling.errorCount++;

          console.warn('❌ 通知ポーリングエラー:', {
            errorCount: `${this.polling.errorCount}/3`,
            errorMessage: error.message,
            errorStack: error.stack?.substring(0, 200) + '...',
            userId: this.state.userId,
            lastSeenTimestamp: this.state.lastSeenTimestamp,
            timestamp: new Date().toISOString()
          });

          if (this.polling.errorCount >= 3) {
            console.error('💥 通知ポーリング: 連続エラー上限に達したため5分間停止');
            this.stopSimplePolling();
            // Capture the resume timer on polling state so stopSimplePolling
            // during the cooldown can cancel it (otherwise a user navigating
            // away or signing out would see polling resume 5 minutes later).
            this.polling.resumeTimerId = setTimeout(() => {
              this.polling.resumeTimerId = null;
              this.startSimplePolling();
            }, 300000);
            return;
          }
        }

        this.schedulePollingCheck();
      }, interval);
    }

    stopSimplePolling() {
      this.polling.isActive = false;
      if (this.polling.timerId) {
        clearTimeout(this.polling.timerId);
        this.polling.timerId = null;
      }
      if (this.polling.resumeTimerId) {
        clearTimeout(this.polling.resumeTimerId);
        this.polling.resumeTimerId = null;
      }
    }

    getPollingInterval() {
      // On consecutive errors, apply exponential backoff before the
      // 3-error hard stop in schedulePollingCheck takes over. 30s → 60s
      // keeps us from hammering getNotificationUpdate when the server is
      // returning 429 or transient 500s.
      if (this.polling.errorCount > 0) {
        return Math.min(30000 * Math.pow(2, this.polling.errorCount - 1), 120000);
      }

      const timeSinceActivity = Date.now() - this.lastActivityTime;

      // Why (授業テンポ優先): 道徳の 45 分授業で教師が profile 切替したとき、
      //   生徒側で 15 秒以上待つと授業がもたつく。直近アクティブ (1 分以内) のときは
      //   5 秒間隔で getNotificationUpdate を呼ぶ。アイドル時はバックオフ。
      //   GAS quota は 1 ユーザー 90 sec/min なので、5 sec interval = 12 calls/min で余裕。
      if (timeSinceActivity < 60000) return 5000;       // 1分以内: 5秒（授業中）
      if (timeSinceActivity < 300000) return 15000;     // 5分以内: 15秒
      if (timeSinceActivity < 900000) return 60000;     // 15分以内: 1分
      return 300000;                                     // 15分超: 5分
    }

      try {
        if (includeCache && this.cache) {
          const cacheSize = (typeof this.cache.size === 'function') ? this.cache.size() : 'unknown';

          if (typeof this.cache.cleanup === 'function') {
            this.cache.cleanup();
          } else if (typeof this.cache.clear === 'function') {
            this.cache.clear();
          }

        }

        if (includeDOMReferences) {
          const elementsToCheck = ['answersContainer', 'loadingOverlay', 'newContentBanner'];
          elementsToCheck.forEach(key => {
            const element = this.elements[key];
            if (element && !document.contains(element)) {
              delete this.elements[key];
            }
          });
        }

        if (includeEventListeners) {
          if (this.handlers) {
            Object.keys(this.handlers).forEach(key => {
              if (typeof this.handlers[key] !== 'function') {
                delete this.handlers[key];
              }
            });
          }

        }

        if (includeDOMFragments && this.domFragmentPool) {

     *      対策として `https://` 先頭の strict check を維持。

    __updateFormLinkButton(formMeta) {
      const btn = document.getElementById('form-link-btn');
      if (!btn || !formMeta) return;
      const url = formMeta.formUrl;
      const title = formMeta.formTitle || '';
      const safe = typeof url === 'string' && /^https:\/\//i.test(url);
      if (!safe) {
        btn.classList.add('hidden');
        return;
      }
      // 値が同じなら何もしない（DOM 更新を最小化）
      if (btn.href !== url) btn.href = url;
      const span = btn.querySelector('span');
      const labelText = title ? '📝 ' + title : '📝 回答フォーム';
      if (span && span.textContent !== labelText) span.textContent = labelText;
      // ellipsis 表示時の full text 確認用に title 属性に格納 (変更時のみ更新で DOM 触らない)。
      const tooltipText = title ? title : '回答フォーム';
      if (btn.title !== tooltipText) btn.title = tooltipText;
      btn.classList.remove('hidden');
    }

    isValidDataResult(result) {

        if (!Array.isArray(result.data)) {

        if (result.sheetName && typeof result.sheetName !== 'string') {

    /**
     * データ検証失敗の理由を取得
     * @param {object} result - 検証対象のレスポンス
     * @returns {string} 失敗理由
     */
    getFailureReason(result) {
      if (!result) {
        return 'レスポンスがnull/undefined';
      }
      if (typeof result !== 'object') {
        return `レスポンスがオブジェクトではない (${typeof result})`;
      }

      if (!('data' in result)) {
        return 'dataフィールドが存在しない';
      }
      if (!Array.isArray(result.data)) {
        return `dataが配列ではない (${typeof result.data})`;
      }

      if (result.header && typeof result.header !== 'string') {
        return `ヘッダーの型が不正 (${typeof result.header})`;
      }
      if (result.sheetName && typeof result.sheetName !== 'string') {
        return `シート名の型が不正 (${typeof result.sheetName})`;
      }

      return '不明な検証失敗';
    }

    /**
     * シンプルなデータ取得（複雑なリトライロジック削除）
     * @param {object} fetchParams - データ取得パラメータ
     * @param {boolean} isInitialLoad - 初期ロードかどうか
     * @returns {Promise} データ取得結果
     */
    async getUserData(fetchParams, isInitialLoad) {
      if (fetchParams.showAdminFeatures == null || fetchParams.showAdminFeatures === undefined) {
        fetchParams.showAdminFeatures = window.UNIFIED_CONFIG?.isAdminUser || this.state?.isAdminUser || false;
      }

      try {
        let result;

        if (fetchParams.userId) {
          result = await this.runGas('getPublishedSheetData',
            fetchParams.classFilter,
            fetchParams.sortOrder,
            fetchParams.showAdminFeatures || false,  // adminMode
            fetchParams.userId  // targetUserId（クロスユーザーアクセス）
          );
        } else {
          result = await this.runGas('getPublishedSheetData',
            fetchParams.classFilter,
            fetchParams.sortOrder,
            fetchParams.showAdminFeatures || false,  // adminMode
            null  // null for self-access
          );
        }

        if (result && result.success && Array.isArray(result.data)) {
          if (result.displaySettings) {
            this.updateDisplaySettingsFromAPI(result.displaySettings);
          }
          return result;
        }

        if (result && result.error) {
          const errorMessage = (result.error && typeof result.error === 'string') ? result.error : 'Unknown backend error';

          if (errorMessage.includes('timeout') || errorMessage.includes('タイムアウト')) {
            return {
              success: false,
              error: 'データの読み込みがタイムアウトしました。ページを再読み込みしてください。',
              errorType: 'timeout_error',
              data: [],
              header: 'タイムアウト'
            };
          }

          return {
            success: false,
            error: errorMessage,
            errorType: 'backend_error',
            data: [],
            header: (result.header && typeof result.header === 'string') ? result.header : 'エラー'
          };
        }

        return {
          success: false,
          error: 'データ形式が正しくありません',
          errorType: 'format_error',
          data: [],
          header: 'フォーマットエラー'
        };

      } catch (error) {
        let errorInfo;
        if (error && error.message) {
          errorInfo = `Error: ${error.message}`;
          console.error('getUserData error:', errorInfo);
        } else {
          errorInfo = 'データ取得中にエラーが発生しました';
          console.error('getUserData error: Unknown error occurred');
        }

        return {
          success: false,
          error: errorInfo,
          errorType: 'network_error',
          data: [],
          header: 'ネットワークエラー'
        };
      }
    }

    /**

        <p class="mt-2 text-xs text-theme-muted">エラー詳細: ${window.sharedUtilities.security.escapeHtml(errorMessage)}</p>
        <div class="mt-6 space-x-3">
          <button 
            data-action="reload" 
            class="inline-flex items-center px-4 py-2 border border-theme-normal text-sm font-medium rounded-md text-theme-secondary bg-theme-elevated hover:bg-theme-elevated-hover focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 focus:ring-offset-theme-base"
          >
            <svg class="-ml-1 mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
