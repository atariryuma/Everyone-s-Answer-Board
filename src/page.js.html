     * リアクション状態をlocalStorageに保存
     * @param {number} rowIndex - 行インデックス
     * @param {object} reactions - リアクション状態オブジェクト
     */
    saveReactionState(rowIndex, reactions) {
      try {
        const existingData = JSON.parse(localStorage.getItem(this.reactionStorageKey) || '{}');

        existingData[rowIndex] = {};
        Object.keys(reactions).forEach(reactionType => {
          const reaction = reactions[reactionType];
          if (reaction && reaction.reacted) {
            existingData[rowIndex][reactionType] = {
              reacted: true,
              timestamp: new Date().toISOString()
            };
          }
        });

        if (Object.keys(existingData[rowIndex]).length === 0) {
          delete existingData[rowIndex];
        }

        localStorage.setItem(this.reactionStorageKey, JSON.stringify(existingData));
      } catch (error) {
        console.warn('リアクション状態の保存に失敗:', error);
      }
    }

    updateModalReactionButtons(item) {
      if (!this.elements.modalReactionContainer) return;
      const containerRowIdx = this.elements.modalReactionContainer.querySelector('[data-row-index]')?.dataset.rowIndex;
      if (containerRowIdx == null || containerRowIdx != item.rowIndex) return;

      this.reactionTypes.forEach(rt => {
        const info = item.reactions?.[rt.key] || { count: 0, reacted: false };
        const modalBtn = this.elements.modalReactionContainer.querySelector(`[data-reaction="${rt.key}"]`);
        if (!modalBtn) return;

        const countEl = modalBtn.querySelector('.reaction-count');
        if (countEl && this.state.showCounts) {
          countEl.textContent = info.count;
        }

        const svgEl = modalBtn.querySelector('svg');
        if (svgEl) {
          const newIcon = this.getIcon(rt.icon, 'w-5 h-5', info.reacted);
          svgEl.outerHTML = newIcon;
        }

        const colorClass = rt.key === 'LIKE' ? 'text-red-500' : rt.key === 'UNDERSTAND' ? 'text-yellow-500' : 'text-green-500';
        modalBtn.classList.remove('text-red-500', 'text-yellow-500', 'text-green-500');
        modalBtn.classList.add(colorClass);
        modalBtn.classList.toggle('reacted', info.reacted);
        modalBtn.setAttribute('aria-pressed', info.reacted.toString());

        const reactionNames = { 'LIKE': 'いいね！', 'UNDERSTAND': 'なるほど！', 'CURIOUS': 'もっと知りたい！' };
        const reactionName = reactionNames[rt.key] || rt.key;
        const ariaLabel = `${reactionName}${info.reacted ? 'を取り消す' : 'する'}${this.state.showCounts ? ` (現在${info.count}件)` : ''}`;
        modalBtn.setAttribute('aria-label', ariaLabel);
      });
    }
    applyUpdates(items) {
      const itemsToUpdate = items.filter(item => {
        const updateKey = `apply_update_${item.rowIndex}`;
        const currentHash = this.calculateStateHash(item);
        const lastHash = this.lastApplyStates?.get(updateKey);

        if (lastHash === currentHash) {
          return false; // 変更なし - スキップ
        }

        if (!this.lastApplyStates) this.lastApplyStates = new Map();
        this.lastApplyStates.set(updateKey, currentHash);
        return true; // 変更あり - 更新対象
      });

      if (itemsToUpdate.length === 0) {
        return;
      }

      const reactionUpdates = [];

      itemsToUpdate.forEach(item => {
        this.reactionTypes.forEach(rt => {
          const reaction = item.reactions && item.reactions[rt.key] ? item.reactions[rt.key] : { count: 0, reacted: false };
          reactionUpdates.push({
            rowIndex: item.rowIndex,
            reaction: rt.key,
            count: reaction.count,
            reacted: reaction.reacted,
            shouldDisplay: true  // ✅ リアクションボタンは常に表示（UI一貫性のため）
          });
        });
        const card = document.querySelector('.answer-card[data-row-index="' + item.rowIndex + '"]');
        if (card) {
          card.classList.toggle('highlighted', item.highlight);
          this.applyReactionStyles(card, item);
          const highlightBtn = card.querySelector('.highlight-btn');
          if (highlightBtn) {
            highlightBtn.classList.toggle('reacted', item.highlight);
            highlightBtn.classList.toggle('active', item.highlight);
            highlightBtn.setAttribute('aria-pressed', String(item.highlight));
            const label = item.highlight ? 'ハイライトを解除する' : 'ハイライトする';
            highlightBtn.setAttribute('aria-label', label);
            highlightBtn.innerHTML = this.getIcon('star', '', item.highlight);
          }
          if (!this.state.isEditor) {
            let badge = card.querySelector('.highlight-badge');
            if (item.highlight && !badge) {
              card.appendChild(this.createHighlightBadge());
            } else if (!item.highlight && badge) {
              badge.remove();
            }
          }
        }
      });

      if (reactionUpdates.length > 0) {
        this.batchUpdateReactionButtons(reactionUpdates);
      }
    }
    /**
     * matrix / numberline モードのモーダル上部に「軸ラベル + プログレスバー」を描く。
     *
     * Why: opinion 列が線形尺度 (1〜5 の数値) のとき、生の数字だけだと「5 が何の 5 か」が
     *   読み取れない。axisConfig.xAxisLabels (min/max) と numericX を組合せて、
     *     [そのまま出す] ━━━━━━●  [作り直す] (5/5)
     *   のように「立場の表明」として可視化する。matrix なら 2 軸 + 象限名併記。
     *
     * @param {Object} data 1 行分のデータ
     * @returns {string|null} HTML or null (該当モードでなければ null → caller がテキスト表示する)
     */
    __renderModalAxisBars(data) {
      const mode = this.state.boardMode;
      const isMatrix = mode === 'matrix';
      const isNumberline = mode === 'numberline';
      if (!isMatrix && !isNumberline) return null;
      const axis = this.state.axisConfig || {};
      const escape = window.sharedUtilities.security.escapeHtml;

      const defaultMin = typeof axis.defaultMin === 'number' ? axis.defaultMin : 1;
      const defaultMax = typeof axis.defaultMax === 'number' ? axis.defaultMax : 5;

      const renderBar = (labels, value) => {
        if (typeof value !== 'number' || !isFinite(value)) return '';
        const minLabel = (labels && labels.min) ? String(labels.min) : '';
        const maxLabel = (labels && labels.max) ? String(labels.max) : '';
        // どちらのラベルも無ければ「数字だけのバー」になって意味が薄いので表示しない
        if (!minLabel && !maxLabel) return '';
        const pct = Math.max(0, Math.min(100,
          ((value - defaultMin) / (defaultMax - defaultMin)) * 100));
        // 数値は行の右端で独立表示。ドットの右隣にラベルが来てもはみ出さず、
        //   全行で表示位置が一定 (= 視線で 5/5 を縦に追える)。
        return ''
          + '<div class="modal-axis-row" role="img" aria-label="' + escape(minLabel) + ' から ' + escape(maxLabel) + ' のうち ' + value + '/' + defaultMax + '">'
          +   '<span class="modal-axis-label-min">' + escape(minLabel) + '</span>'
          +   '<span class="modal-axis-track">'
          +     '<span class="modal-axis-dot" style="left:' + pct.toFixed(1) + '%"></span>'
          +   '</span>'
          +   '<span class="modal-axis-label-max">' + escape(maxLabel) + '</span>'
          +   '<span class="modal-axis-value" aria-hidden="true">' + value + '/' + defaultMax + '</span>'
          + '</div>';
      };

      let html = '';
      const xBar = renderBar(axis.xAxisLabels, data.numericX);
      html += xBar;
      if (isMatrix) {
        const yBar = renderBar(axis.yAxisLabels, data.numericY);
        html += yBar;

        // 象限ラベル: matrix のみ。numericX/Y が中央より上/下で象限を決定。
        const q = axis.matrixQuadrantLabels || {};
        if (typeof data.numericX === 'number' && typeof data.numericY === 'number') {
          const mid = (defaultMin + defaultMax) / 2;
          const xKey = data.numericX >= mid ? 'h' : 'l';
          const yKey = data.numericY >= mid ? 'h' : 'l';
          const quadrantName = q[xKey + yKey];
          if (quadrantName) {
            html += '<div class="modal-axis-quadrant">📍 この立場は<strong>「' + escape(quadrantName) + '」</strong></div>';
          }
        }
      }
      // 全バー無し (= ラベル未設定) なら null を返して fallback させる
      if (!html) return null;
      return '<div class="modal-axis-block">' + html + '</div>';
    }

    showAnswerModal(rowIndex) {

      this.state.lastFocusedElement = document.activeElement;

      //   軸ラベル付きプログレスバーを最上部に表示して立場を視覚化する。

      const reactionButtonsHtml = this.reactionTypes.map(rt => {

        const countSpan = this.state.showCounts ? '<span class="reaction-count font-bold text-2xl text-theme">' + info.count + '</span>' : '';
        return '<button type="button" class="reaction-btn like-btn flex items-center gap-1.5 ' + colorClass + ' ' + cls + '" ' + 'data-row-index="' + rowIndex + '" data-reaction="' + rt.key + '" aria-label="' + rt.key + '">' + this.getIcon(rt.icon, 'w-5 h-5', info.reacted) + countSpan + '</button>';

      this.elements.modalReactionContainer.innerHTML = reactionButtonsHtml + this.createHighlightButton(data);

      this.elements.answerModalContainer.classList.add('modal-fade');
      this.elements.answerModalCard.classList.add('modal-scale');

    updateModalContent(data) {

    }
    hideAnswerModal() {

    showInfoModal() {

      // we ourselves grabbed on the previous call.

          && !this.elements.infoModalContainer.classList.contains('hidden')) {
        return;

      // Why: モーダルの内容は「リアクション (いいね/なるほど/もっと知りたい) のマナー説明」。
      //  1) 教師は自分のボード準備中に毎回出されると邪魔 → 抑止
      //  2) 児童でも、リアクション機能が OFF のボードでは説明する対象が無いので抑止
      //     （数直線・散布図のみで意見投稿だけの授業など）
      const isTeacher = window.isEditor || this.state.isEditor ||
                        (window.UNIFIED_CONFIG && window.UNIFIED_CONFIG.isAdminUser) ||

      // フォームURLがある場合は「フォームで回答」ボタンを表示

      const formBtn = document.getElementById('infoModalFormBtn');

    hideInfoModal() {

      this.elements.infoModalContainer.classList.remove('modal-fade');

    getIcon(name, classes = '', solid = false) {
      if (!window.ICONS) {
        return '<svg class="' + classes + '" aria-hidden="true">⭐</svg>';
      }

      const key = solid ? name + '-solid' : name + '-outline';
      const icon = window.ICONS[key] || window.ICONS[name];

      if (!icon) {
        return '<svg class="' + classes + '" aria-hidden="true">⭐</svg>';
      }

      const result = icon.replace('<svg', `<svg class="${classes}" aria-hidden="true"`);
      return result;
    }

    debounce(func, delay) {
      const key = `studyquest-${this.instanceId || 'default'}-${Math.random().toString(36).substr(2, 9)}`;
      return (...args) => {
        window.sharedUtilities.debounce.debounce(() => func.apply(this, args), key, delay);

    throttle(func, delay) {

      return (...args) => {
        window.sharedUtilities.throttle.throttle(() => func.apply(this, args), key, delay);
      };
    }

    /**
     * スライダーの背景塗りつぶし更新
     * @param {HTMLInputElement} slider - スライダー要素
     */
    updateSliderBackground(slider) {
      if (!slider) return;

      const min = parseFloat(slider.min) || 2;
      const max = parseFloat(slider.max) || 6;
      const value = parseFloat(slider.value) || 4;

      const percentage = ((value - min) / (max - min)) * 100;

      slider.style.backgroundImage = `linear-gradient(var(--brand-primary), var(--brand-primary))`;
      slider.style.backgroundSize = `${percentage}% 100%`;
      slider.style.backgroundRepeat = 'no-repeat';

    }

    updateSortOptions() {
      if (!this.elements.scoreOption) return;
      // Why: highlight トグルと同じく、編集者（admin / own board）には常に見せる。
      //      生徒にはリアクション数を隠していても、先生はスコアで盛り上がった意見を
      //      素早く見つけたい授業運営ニーズがある。
      const canSeeScore = this.state.showScoreSort || this.state.isEditor;
      if (canSeeScore) {
        this.elements.scoreOption.style.display = 'block';
        return;
      }
      this.elements.scoreOption.style.display = 'none';
      const filterState = this.getCurrentFilterState();

    }
    updateConfigFromGlobals() {
      this.state.isStudentMode = window.isStudentMode;
      this.state.showCounts = window.showCounts;
      this.state.displayMode = window.displayMode;
      this.state.showAdminFeatures = window.showAdminFeatures;
      this.state.showScoreSort = window.showCounts;
      // 管理モード ON 時のみ表示する要素 (.admin-mode-only) を CSS でゲートするため、
      //   toggleAdminMode 以外の経路でも body.admin-mode を必ず同期させる。
      document.body.classList.toggle('admin-mode', !!this.state.showAdminFeatures);
    }

    /**
     * 低スペック端末（OPS、古い電子黒板、低 RAM の Windows タブレット等）を検出して
     * パフォーマンスモードに切り替える。
     *
     * 戦略:
     *   1. 静的スペック（RAM / コア数）で明らかに低い端末は即座に low-perf へ
     *   2. ボーダーラインは FPS 監視で動的判定（実際にカクついたら降格）
     */
    detectLowPerformance() {
      const memory = typeof navigator !== 'undefined' ? navigator.deviceMemory : undefined;
      const cores = typeof navigator !== 'undefined' ? navigator.hardwareConcurrency : undefined;

      // OPS 相当（Celeron N4020 等）は 4 コア / 4GB が典型。
      // 従来の「2 以下なら low」基準だと取りこぼしていた。4 以下の AND で絞る
      // と、ただの低 RAM ラップトップは medium のまま扱える。
      const staticLowEnd =
        (typeof memory === 'number' && memory <= 4 && typeof cores === 'number' && cores <= 4) ||
        (typeof memory === 'number' && memory <= 2) ||
        (typeof cores === 'number' && cores <= 2);

      if (staticLowEnd) {
        this.enterLowPerformanceMode('static-detect');
        return;
      }

      // 静的には普通だが実際はカクつく端末（GPU が弱い場合など）を FPS で捕まえる
      this.setupPerformanceMonitoring();
    }

    enterLowPerformanceMode(reason) {
      if (this.isLowPerformanceMode) return;
      this.isLowPerformanceMode = true;
      console.info('⚡ low-performance mode enabled:', reason);
      this.optimizeForLowPerformance();
    }

    setupPerformanceMonitoring() {
      let frameCount = 0;
      let slowFrames = 0;
      let lastTime = performance.now();

      const measurePerformance = () => {
        const now = performance.now();
        const delta = now - lastTime;

        if (frameCount > 0) {
          this.perf.frameTime = delta;
          // Why: 単発の遅延で切り替えると誤検知する。60 フレームのうち 10 フレーム以上
          //      バジェット超過なら真にカクついている → low-perf へ。
          if (delta > getPerformanceBudget()) slowFrames++;
          if (slowFrames >= 10 && !this.isLowPerformanceMode) {
            this.enterLowPerformanceMode('runtime-fps');
            return; // 以降の測定不要
          }
        }

        lastTime = now;
        frameCount++;
        if (frameCount < 60) requestAnimationFrame(measurePerformance);
      };
      requestAnimationFrame(measurePerformance);
    }

    optimizeForLowPerformance() {
      document.documentElement.style.setProperty('--transition-duration', '0.1s');
      document.documentElement.style.setProperty('--animation-duration', '0.1s');
      document.documentElement.style.setProperty('--backdrop-blur', '0px');

      const style = document.createElement('style');
      style.id = 'low-performance-optimizations';
      // Why: OPS / 統合 GPU 端末で特に重いのは backdrop-filter（フレーム合成のたびに
      //      blur 再計算）と box-shadow アニメーション。ヘッダーの scroll transition、
      //      PTR の blur、new-card のパルス、will-change の永続昇格を一括で緩和する。
      style.textContent = `
        body.low-performance .glass-panel,
        body.low-performance header,
        body.low-performance #pull-to-refresh-indicator {
          -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
          background: var(--theme-bg-surface);
        }
        body.low-performance header {
          transition: none;
        }
        body.low-performance #main-container {
          will-change: auto;
        }
        body.low-performance #main-container.ptr-releasing {
          transition: transform var(--transition-quick) linear;
        }
        body.low-performance .answer-card,
        body.low-performance .answer-card:hover {
          transform: none;
          box-shadow: var(--shadow-sm);
          transition: none;
        }
        body.low-performance .answer-card.new-card {
          animation: none;
        }
        body.low-performance .reaction-btn:hover {
          transform: none;
        }
        body.low-performance * {
          will-change: auto;
        }
      `;
      document.head.appendChild(style);
      document.body.classList.add('low-performance');
    }

    setupObservers() {
      if ('IntersectionObserver' in window) {
        const debouncedVisibilityHandler = this.debounce((entries) => {
          const cardChanges = new Map();

          entries.forEach(entry => {
            const card = entry.target;
            const rowIndex = card.dataset.rowIndex;

            cardChanges.set(rowIndex, { card, entry });
          });

          cardChanges.forEach(({ card, entry }) => {
            if (entry.isIntersecting) {
              if (!card.classList.contains('visible')) {
                card.classList.add('visible');
                card.classList.remove('hidden-card');
                if (card.style.visibility === 'hidden') {
                  card.style.visibility = 'visible';
                }
                if (card.style.display === 'none') {
                  card.style.display = '';
                }
              }
            } else {
              if (entry.intersectionRatio === 0 && card.classList.contains('visible')) {
                card.classList.remove('visible');
                card.classList.add('hidden-card');
              }
            }
          });
        }, 50); // Increased debounce to 50ms for better stability

        this.visibilityObserver = new IntersectionObserver(debouncedVisibilityHandler, {
          rootMargin: `${window.getViewportBuffer()}px`,
          threshold: [0, 1.0] // Simplified thresholds: fully out vs fully in
        });
      }

      if ('ResizeObserver' in window) {
        this.resizeObserver = new ResizeObserver(this.debounce(() => {
          this.adjustLayout();
        }, 100));
        this.resizeObserver.observe(this.elements.answersContainer);
      }
    }

    batchDOMUpdates(updates) {
      if (!updates || updates.length === 0) return;

      const fragment = this.getReusableFragment();
      const CHUNK_SIZE = 8; // Optimal chunk size for 70x performance
      let processedCount = 0;

      const processBatch = () => {
        const startTime = performance.now();
        const chunkEnd = Math.min(processedCount + CHUNK_SIZE, updates.length);

        for (let i = processedCount; i < chunkEnd; i++) {
          const update = updates[i];
          if (typeof update === 'function') {
            update.call(this, fragment);
          } else if (update && update.element && update.operation) {
            this.executeDOMOperation(update, fragment);
          }
        }

        processedCount = chunkEnd;

        if (processedCount < updates.length) {
          if (performance.now() - startTime < getPerformanceBudget()) {
            requestIdleCallback(processBatch, { timeout: 0 });
          } else {
            requestAnimationFrame(processBatch);
          }
        } else {
          this.recycleFragment(fragment);
        }
      };

      processBatch();
    }

    executeDOMOperation(update, fragment) {
      const { element, operation, data } = update;
      if (!element || !operation) return;

      // Why: 'append'/'update' の HTML 文字列ブランチ (data.content / data.html → innerHTML)
      //   はリポジトリ内に呼び出しが無いまま XSS sink になっていた。安全な代替として
      //   'append' は data.node (Node 直接) / data.text (textNode)、'update' は data.text のみを残す。
      //   呼び出しを追加する際は必ずこれらの安全な形を使うこと。
      switch (operation) {
        case 'append':
          if (data && data.node instanceof Node) {
            fragment.appendChild(data.node);
            element.appendChild(fragment);
          } else if (data && typeof data.text === 'string') {
            fragment.appendChild(document.createTextNode(data.text));
            element.appendChild(fragment);
          }
          break;
        case 'update':
          if (data && typeof data.text === 'string') {
            element.textContent = data.text;
          }
          break;
        case 'setAttribute':
          if (data && data.name && data.value !== undefined) {
            element.setAttribute(data.name, data.value);
          }
          break;
        case 'addClass':
          if (data && data.className) {
            element.classList.add(data.className);
          }
          break;
        case 'removeClass':
          if (data && data.className) {
            element.classList.remove(data.className);
          }
          break;
        default:
          if (typeof operation === 'function') {
            operation.call(this, element, data, fragment);
          }
      }
    }

    getReusableFragment() {
      if (this.domFragmentPool.length > 0) {
        return this.domFragmentPool.pop();
      }

      const fragment = document.createDocumentFragment();
      if (this.domFragmentPool.length < 3) {
        for (let i = this.domFragmentPool.length; i < 3; i++) {
          this.domFragmentPool.push(document.createDocumentFragment());
        }
      }
      return fragment;
    }

    recycleFragment(fragment) {
      if (!fragment) return;

      if (fragment.replaceChildren) {
        fragment.replaceChildren(); // Modern browsers - much faster
      } else {
        while (fragment.firstChild) {
          fragment.removeChild(fragment.firstChild);
        }
      }

      if (this.domFragmentPool.length < 8) { // Increased optimal pool size
        this.domFragmentPool.push(fragment);
      }
    }

    /**
     * 理由テキストの堅牢化検証
     * @param {any} reason - 理由データ
     * @returns {string} 検証済み理由テキスト
     */
    validateReasonText(reason) {
      try {
        if (!reason && reason !== 0) {
          return '';
        }

        const reasonStr = String(reason).trim();

        if (reasonStr.length > 10000) {
          return reasonStr.substring(0, 10000) + '...';
        }

        if (reasonStr.includes('<') || reasonStr.includes('>') || reasonStr.includes('&')) {
        }

        return reasonStr;
      } catch (error) {
        console.error('validateReasonText: Error validating reason text:', error);
        return ''; // エラー時は空文字列を返す
      }
    }

    /**
     * ボードデータの整合性をリアルタイムで検証
     * @returns {Promise<Object>} 検証結果
     */
    async validData() {
      try {

        const validationResults = {
          timestamp: new Date().toISOString(),
          totalCards: 0,
          validCards: 0,
          invalidCards: 0,
          reasonFieldIssues: 0,
          headerIssues: 0,
          errors: []
        };

        const cards = this.elements.answersContainer?.querySelectorAll('.answer-card') || [];
        validationResults.totalCards = cards.length;

        cards.forEach((card, index) => {
          try {
            const rowIndex = card.dataset.rowIndex;
            const opinionElement = card.querySelector('.opinion-text');
            const reasonElement = card.querySelector('.answer-preview p');

            if (!opinionElement || !rowIndex) {
              validationResults.invalidCards++;
              validationResults.errors.push(`Card ${index}: Missing essential elements`);
              return;
            }

            const hasReasonData = this.state.currentAnswers.find(a => a.rowIndex == rowIndex)?.reason;
            const hasReasonElement = reasonElement && reasonElement.textContent.trim();

            if (hasReasonData && !hasReasonElement) {
              validationResults.reasonFieldIssues++;
              validationResults.errors.push(`Card ${index} (row ${rowIndex}): Reason data exists but not displayed`);
            }

            validationResults.validCards++;
          } catch (cardError) {
            validationResults.invalidCards++;
            validationResults.errors.push(`Card ${index}: Validation error - ${cardError.message}`);
          }
        });

        try {
          const headerValidation = await this.runGas('validateHeaderIntegrity', this.state.userId);
          if (!headerValidation.success) {
            validationResults.headerIssues++;
            validationResults.errors.push(`Header validation failed: ${headerValidation.error}`);
          }
        } catch (headerError) {
          validationResults.headerIssues++;
          validationResults.errors.push(`Header validation error: ${headerError.message}`);
        }

        const issueCount = validationResults.invalidCards + validationResults.reasonFieldIssues + validationResults.headerIssues;
        if (issueCount > 0) {

          if (validationResults.reasonFieldIssues > 0) {
            await this.autoRecoverReasonFields();
          }
        } else {
        }

        return validationResults;
      } catch (error) {
        console.error('❌ Board data integrity validation failed:', error);
        return {
          timestamp: new Date().toISOString(),
          error: error.message,
          success: false
        };
      }
    }

    /**
     * 理由列の自動修復処理
     */
    async autoRecoverReasonFields() {
      try {

        await this.loadBoardData();

      } catch (error) {
        console.error('❌ Automatic reason field recovery failed:', error);
      }
    }

    /**
     * 🔧 API応答からdisplaySettingsを動的更新
     *
     * Why (profile 跨ぎ整合性): 管理モード OFF パスと loadFormLink 等が
     *   `UNIFIED_CONFIG.displaySettings` を「現在 active profile の値」として参照する。
     *   admin mode ON 中も含めて毎回 server 値で同期しておかないと、bootstrap 時の値が
     *   stale なまま残り、profile 切替後の管理モード OFF で「最初の profile の設定」に
     *   戻ってしまう。表示用 globals (showCounts / displayMode) は admin mode 中は
     *   forced 値で固定するため、return ガードはその更新だけに適用。
     *
     * @param {Object} newDisplaySettings - 新しい表示設定 (server 由来)
     */
    updateDisplaySettingsFromAPI(newDisplaySettings) {
      if (!newDisplaySettings || typeof newDisplaySettings !== 'object') {
        return;
      }

      // UNIFIED_CONFIG は admin mode 中でも常に最新の profile 設定で同期する。
      if (window.UNIFIED_CONFIG) {
        window.UNIFIED_CONFIG.displaySettings = newDisplaySettings;
      }

      if (window.showAdminFeatures) {
        // admin mode 中は表示用 globals は強制値で固定（toggleAdminMode が制御）。
        return;
      }

      const oldShowCounts = window.showCounts;
      const oldDisplayMode = window.displayMode;

      window.showCounts = newDisplaySettings.showReactions || false;
      window.displayMode = newDisplaySettings.showNames ? 'named' : 'anonymous';

      this.state.showCounts = window.showCounts;
      this.state.displayMode = window.displayMode;

      if (oldShowCounts !== window.showCounts || oldDisplayMode !== window.displayMode) {
        this.clearCache();
        this.renderWithCurrentData();
      }
    }

    /**
     * 現在のデータで画面を再描画する
     * 表示設定変更時やキャッシュクリア後の再描画に使用
     */
    renderWithCurrentData() {
      try {
        this.renderBoard(false, false);
      } catch (error) {
        console.error('❌ renderWithCurrentData failed:', error);
      }
    }

  }

  /**
   * フォームリンクを取得して表示する関数
   */
  async function loadFormLink() {
    try {
      let formInfo = null;
      try {
        formInfo = await runServer('getActiveFormInfo', window.UNIFIED_CONFIG?.userId);
      } catch (error) {
        console.warn('getActiveFormInfo failed:', error);
      }

      const formLinkBtn = document.getElementById('form-link-btn');
      if (formLinkBtn) {
        // Why gate on https:// : formInfo.formUrl originates from the
        //      admin-editable board config. escapeHtml / DOM assignment
        //      doesn't neutralize javascript: URLs — setting .href with
        //      such a value would still fire on click.
        const isSafeFormUrl = formInfo && typeof formInfo.formUrl === 'string'
          && /^https:\/\//i.test(formInfo.formUrl);
        if (formInfo && formInfo.shouldShow && isSafeFormUrl) {
          formLinkBtn.href = formInfo.formUrl;
          formLinkBtn.classList.remove('hidden');

          const formTitleSpan = formLinkBtn.querySelector('span');
          if (formTitleSpan) {
            formTitleSpan.textContent = `📝 ${formInfo.formTitle}`;
          }
        } else {
          formLinkBtn.classList.add('hidden');
        }
      }
    } catch (error) {
      console.warn('フォーム情報の取得に失敗しました:', error);
      const formLinkBtn = document.getElementById('form-link-btn');
      if (formLinkBtn) {
        formLinkBtn.classList.add('hidden');
      }
    }
  }

  // Why: ES6 の class 宣言は <script> トップレベルでも window に自動公開されない。
  //      page.viz.js は window.StudyQuestApp.prototype に method を追加する設計なので、
  //      ここで明示的に公開する。これがないと viz レンダラー（renderNumberLine 等）と
  //      モード切替バー / profile セレクタが全て無効化される silent bug になる。
  window.StudyQuestApp = StudyQuestApp;
  // page.viz.js から profile 切替後に form ボタンを強制リフレッシュするため公開。
  // 通常は loadSheetData の formMeta 経由で更新されるが、ある種のキャッシュ
  // パスで取りこぼすので、明示的に getActiveFormInfo を再呼出して同期する。
  window.loadFormLink = loadFormLink;

  try {
    if (!window.studyQuestApp) {
      document.addEventListener('DOMContentLoaded', () => {
        if (window.studyQuestApp) {
          return;
        }

        const app = new StudyQuestApp();
        window.studyQuestApp = app;
      });
    }

    window.addEventListener('beforeunload', () => {
      if (window.studyQuestApp && typeof window.studyQuestApp.destroy === 'function') {
        window.studyQuestApp.destroy();
      }
    });
  } catch (error) {
    console.error('Error creating StudyQuestApp instance:', error);
    const container = document.getElementById('answers');
    if (container) {
      const msg = window.sharedUtilities.security.escapeHtml(error.message || '');
      container.innerHTML = '<div class="text-theme-status-error p-4">アプリケーションの初期化に失敗しました: ' + msg + '</div>';
    }
  }

</script>
