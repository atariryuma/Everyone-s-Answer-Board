<style>
  /* =============================================================================
   みんなの回答ボード - Unified CSS Styles
   Based on AdminPanel.html with additional styles from all HTML files
   ============================================================================= */

  /* =============================================================================
   * Button "busy" 共通スタイル — ButtonBusyManager.withBusy が toggle する class
   * pointer-events: none で連打を物理的に止め、疑似要素でスピナーを右端に出す。
   * ============================================================================= */
  .btn-busy {
    opacity: 0.7;
    cursor: progress;
    position: relative;
    pointer-events: none;
    padding-right: calc(1.5em + 0.5rem); /* スピナー分の右余白を確保 */
  }
  .btn-busy::after {
    content: "";
    position: absolute;
    right: 0.6rem;
    top: 50%;
    width: 0.95em;
    height: 0.95em;
    margin-top: -0.5em;
    border: 2px solid currentColor;
    border-right-color: transparent;
    border-radius: 50%;
    animation: btn-busy-spin 0.6s linear infinite;
  }
  @keyframes btn-busy-spin {
    to { transform: rotate(360deg); }
  }

  /* CSS Variables - Comprehensive Color and Design System */
  :root {
    /* =============================================================================
     * Brand & Core Colors - Primary Design System
     *
     * Theme architecture (v2800+):
     *   - `--brand-*` はブランドアイデンティティ (theme で書き換えない不変色)。
     *   - `--theme-*` (下記) が semantic token で、 ライト/ダーク切替時に書き換える対象。
     *   - 新規 CSS は `--theme-*` を使うこと。 ハードコード hex / rgba は禁止。
     *   - `--brand-background` 等の旧 alias は段階的に `--theme-bg-base` 等に migrate 中。
     * ============================================================================= */
    --brand-primary: #3b82f6;
    --brand-primary-secondary: #1d4ed8;
    --brand-accent: #fbbf24;
    --brand-accent-light: #8be9fd;
    --brand-background: #1a1b26;
    --brand-surface: rgba(26, 27, 38, 0.7);
    --brand-text: #c0caf5;
    --brand-border: rgba(255, 255, 255, 0.1);

    /* =============================================================================
     * Semantic Theme Tokens (DARK = default, theme で書き換える対象)
     *
     * 命名規約:
     *   --theme-bg-*       背景色 (base, surface, elevated, overlay)
     *   --theme-text-*     テキスト色 (primary, secondary, muted, inverse)
     *   --theme-border-*   境界線色 (subtle, normal, strong)
     *   --theme-overlay-*  半透明オーバーレイ (white-XX, black-XX, surface-glass)
     *   --theme-spinner    スピナー色 (loading インジケーター)
     *
     * 注意: brand identity ( --brand-primary 等) は不変。 status / reaction も不変。
     *   テーマ切替で書き換わるのは「文脈依存の色」 (背景・テキスト・境界線・装飾) のみ。
     * ============================================================================= */
    /* 背景レイヤー (奥 → 手前) */
    --theme-bg-base: #1a1b26;                          /* body 直接背景 */
    --theme-bg-surface: rgba(26, 27, 38, 0.7);         /* glass-panel, card 等 */
    --theme-bg-elevated: rgba(26, 27, 38, 0.95);       /* modal, dropdown 等 */
    --theme-bg-overlay: rgba(0, 0, 0, 0.8);            /* modal backdrop */

    /* テキスト階層 */
    --theme-text-primary: #c0caf5;                     /* 通常本文 */
    --theme-text-secondary: #cbd5e1;                   /* やや弱 */
    --theme-text-muted: #94a3b8;                       /* キャプション・補助 */
    --theme-text-inverse: #1a1b26;                     /* light area 上の暗色テキスト */

    /* 境界線 */
    --theme-border-subtle: rgba(255, 255, 255, 0.1);   /* 既存 --brand-border と同値 */
    --theme-border-normal: rgba(255, 255, 255, 0.2);   /* glass-panel:hover 等で多用 */
    --theme-border-strong: rgba(255, 255, 255, 0.3);   /* spinner border, high-contrast */

    /* 半透明オーバーレイ (dark 前提の rgba(255,255,255,*) / rgba(0,0,0,*) を集約) */
    --theme-overlay-white-10: rgba(255, 255, 255, 0.1);   /* shimmer 等 */
    --theme-overlay-white-20: rgba(255, 255, 255, 0.2);   /* hover 境界線 */
    --theme-overlay-white-30: rgba(255, 255, 255, 0.3);   /* spinner border */
    --theme-overlay-black-20: rgba(0, 0, 0, 0.2);         /* card shadow base */
    --theme-overlay-black-60: rgba(0, 0, 0, 0.6);         /* heavy shadow */
    --theme-overlay-black-90: rgba(0, 0, 0, 0.9);         /* modal backdrop strong */
    --theme-overlay-surface-glass: rgba(16, 17, 28, 0.95); /* loading-content 不透明背景 */

    /* viz / インジケーター */
    --theme-spinner: #67e8f9;                          /* bright cyan, loading spinner */
    --theme-accent-cyan: #38bdf8;                      /* notification banner / viz-profile-pill 境界線 */
    --theme-accent-cyan-soft: rgba(56, 189, 248, 0.18); /* banner 背景の薄い cyan */
    --theme-overlay-white-05: rgba(255, 255, 255, 0.05); /* input 背景の極薄 */

    /* =============================================================================
     * Status Colors - System Feedback
     * ============================================================================= */
    --status-success: #10b981;
    --status-error: #ef4444;
    --status-warning: #f59e0b;
    --status-info: #3b82f6;

    /* =============================================================================
     * UI Interaction Colors - User Actions
     * ============================================================================= */
    --brand-like: #e11d48;           /* Distinct from status-error */
    --brand-understand: #fbbf24;      /* Keeping understand amber */
    --brand-curious: #059669;         /* Distinct from status-success */
    --brand-highlight: #9333ea;       /* Purple - highlighted card border glow */
    --brand-highlight-alt: #c084fc;   /* Light purple - highlighted card border gradient */

    /* =============================================================================
     * Google Workspace Integration
     * ============================================================================= */
    --google-blue: #4285f4;
    --google-green: #34a853;
    --google-yellow: #fbbc05;
    --google-red: #ea4335;

    /* =============================================================================
     * Z-Index Hierarchy System - Logical Layering
     * ============================================================================= */
    --z-base: 0;           /* Base content layer */
    --z-content: 10;       /* Regular content */
    --z-elevated: 50;      /* Elevated UI elements */
    --z-overlay: 100;      /* Page overlays */
    --z-dropdown: 500;     /* Dropdowns & menus */
    --z-modal: 1000;       /* Modal dialogs */
    --z-notification: 8000; /* Notifications */
    --z-tooltip: 9000;     /* Tooltips */
    --z-loading-overlay: 9500;  /* Loading overlays (critical but below tooltips) */
    --z-loading-quickstart: 9600; /* QuickStart loading (higher than standard loading) */
    --z-critical: 9999;    /* Critical system overlays */

    /* =============================================================================
     * Responsive Breakpoint System - Tailwind Compliant
     * ============================================================================= */
    --breakpoint-sm: 640px;   /* Small screens */
    --breakpoint-md: 768px;   /* Medium screens */
    --breakpoint-lg: 1024px;  /* Large screens */
    --breakpoint-xl: 1280px;  /* Extra large screens */
    --breakpoint-2xl: 1536px; /* 2X Extra large screens */

    /* =============================================================================
     * Alpha Values & Opacity System - Comprehensive
     * ============================================================================= */
    --alpha-invisible: 0;
    --alpha-subtle: 0.1;     /* Light backgrounds, gentle effects */
    --alpha-light: 0.2;      /* Secondary elements */
    --alpha-medium: 0.3;     /* Standard overlays */
    --alpha-visible: 0.5;    /* Balanced transparency */
    --alpha-strong: 0.6;     /* Prominent elements */
    --alpha-heavy: 0.8;      /* Modal overlays */
    --alpha-opaque: 0.95;    /* Near-solid */
    --alpha-solid: 1;

    /* =============================================================================
     * Spacing System - Systematic Sizing
     * ============================================================================= */
    --space-0: 0;
    --space-1: 0.25rem;  /* 4px */
    --space-2: 0.5rem;   /* 8px */
    --space-3: 0.75rem;  /* 12px */
    --space-4: 1rem;     /* 16px */
    --space-5: 1.25rem;  /* 20px */
    --space-6: 1.5rem;   /* 24px */
    --space-8: 2rem;     /* 32px */
    --space-10: 2.5rem;  /* 40px */
    --space-12: 3rem;    /* 48px */
    --space-16: 4rem;    /* 64px */
    --space-20: 5rem;    /* 80px */

    /* =============================================================================
     * Border System - Unified Definitions
     * ============================================================================= */
    --border-width-thin: 1px;
    --border-width-normal: 2px;
    --border-width-thick: 3px;
    --border-width-heavy: 4px;

    --border-style: solid;
    --border-primary: var(--border-width-thin) var(--border-style) var(--brand-border);
    --border-accent: var(--border-width-normal) var(--border-style) var(--brand-primary);
    --border-status-error: var(--border-width-thin) var(--border-style) var(--status-error);
    --border-status-success: var(--border-width-thin) var(--border-style) var(--status-success);

    /* Border Radius System */
    --radius-none: 0;
    --radius-sm: 0.25rem;   /* 4px */
    --radius-md: 0.5rem;    /* 8px */
    --radius-lg: 0.75rem;   /* 12px */
    --radius-xl: 1rem;      /* 16px */
    --radius-full: 9999px;

    /* =============================================================================
     * Shadow System - Optimized Calculations
     * ============================================================================= */
    --shadow-color-base: rgba(0, 0, 0, var(--alpha-subtle));
    --shadow-color-medium: rgba(0, 0, 0, 0.15);
    --shadow-sm: 0 var(--space-1) var(--space-2) var(--shadow-color-base);
    --shadow-md: 0 var(--space-4) var(--space-6) var(--shadow-color-medium);
    --shadow-lg: 0 var(--space-8) var(--space-20) var(--shadow-color-medium);

    /* =============================================================================
     * Performance Optimized Computed Values
     * ============================================================================= */
    --glass-backdrop: blur(var(--backdrop-blur));
    --transition-standard: all var(--transition-normal) var(--transition-easing);
    --transition-transform: transform var(--transition-normal) var(--transition-easing);

    /* =============================================================================
     * Animation & Transform System - Standardized Values
     * ============================================================================= */
    --transition-fast: 0.1s;
    --transition-normal: 0.2s;
    --transition-slow: 0.3s;
    --transition-easing: ease-out;

    --animation-fast: 0.15s;
    --animation-normal: 0.3s;
    --animation-slow: 0.5s;

    --transform-subtle: translateY(-1px);
    --transform-normal: translateY(-2px);
    --transform-strong: translateY(-4px);
    --transform-float: translateY(-8px);

    --scale-subtle: 1.02;
    --scale-normal: 1.05;
    --scale-strong: 1.1;

    --backdrop-blur: 12px;
  }

  /* =============================================================================
   * Light Theme Override (v2800+) - 適用方法:
   *   1. body に `theme-light` クラス付与 (themeManager.set('light'))
   *   2. または html に [data-theme="light"] 属性
   *   3. または (将来) `@media (prefers-color-scheme: light)` 自動適用
   *
   * Why class-based (not media-query default): 教師がプロジェクター投影時など
   *   明示的に切替えたい運用がある。 OS 設定追従は opt-in (themeManager の auto モード)。
   *
   * Light theme の値は **placeholder**。 実際の light mode 実装時に色を調整する。
   * ============================================================================= */
  body.theme-light,
  :root[data-theme="light"] {
    /* 背景レイヤー */
    --theme-bg-base: #f8fafc;                          /* slate-50 (placeholder) */
    --theme-bg-surface: rgba(255, 255, 255, 0.85);     /* white surface */
    --theme-bg-elevated: rgba(255, 255, 255, 0.95);
    --theme-bg-overlay: rgba(15, 23, 42, 0.4);

    /* テキスト階層 */
    --theme-text-primary: #1e293b;                     /* slate-800 */
    --theme-text-secondary: #475569;                   /* slate-600 */
    --theme-text-muted: #64748b;                       /* slate-500 */
    --theme-text-inverse: #f8fafc;

    /* 境界線 */
    --theme-border-subtle: rgba(15, 23, 42, 0.1);
    --theme-border-normal: rgba(15, 23, 42, 0.2);
    --theme-border-strong: rgba(15, 23, 42, 0.3);

    /* 半透明オーバーレイ (light 用に black-overlay は反転) */
    --theme-overlay-white-05: rgba(15, 23, 42, 0.04);
    --theme-overlay-white-10: rgba(15, 23, 42, 0.06);
    --theme-overlay-white-20: rgba(15, 23, 42, 0.1);
    --theme-overlay-white-30: rgba(15, 23, 42, 0.15);
    --theme-overlay-black-20: rgba(15, 23, 42, 0.1);
    --theme-overlay-black-60: rgba(15, 23, 42, 0.25);
    --theme-overlay-black-90: rgba(15, 23, 42, 0.5);
    --theme-overlay-surface-glass: rgba(255, 255, 255, 0.95);

    /* インジケーター / アクセント (light の cyan はやや濃く) */
    --theme-spinner: #0284c7;                          /* sky-600 */
    --theme-accent-cyan: #0284c7;
    --theme-accent-cyan-soft: rgba(56, 189, 248, 0.12);
  }

  /* Base Styles - Unified body element */
  body {
    margin: 0;
    padding: 0;
    color: var(--theme-text-primary);
    background: var(--theme-bg-base);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Google Sans', 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Glass Panel Effects */
  .glass-panel {
    background: var(--theme-bg-surface);
    -webkit-backdrop-filter: var(--glass-backdrop);
    backdrop-filter: var(--glass-backdrop);
    border: var(--border-primary);
    transition: all var(--transition-normal) var(--transition-easing);
    border-radius: 1rem;
  }

  .glass-panel:hover {
    border-color: var(--theme-border-normal);
    will-change: border-color;
  }

  .glass-panel:not(:hover) {
    will-change: auto;
  }

  /* Comprehensive Button System */
  .btn {
    /* Button-specific CSS variables for better maintainability */
    --btn-padding: 0.75rem 1.5rem;
    --btn-border-radius: 0.75rem;
    --btn-min-height: 44px;
    --btn-min-width: 44px;
    --btn-font-size: 14px;
    --btn-hover-transform: translate3d(0, -2px, 0);

    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: var(--btn-padding);
    border-radius: var(--btn-border-radius);
    font-weight: 600;
    transition: all var(--transition-normal) var(--transition-easing);
    cursor: pointer;
    border: none;
    text-decoration: none;
    min-height: var(--btn-min-height);
    min-width: var(--btn-min-width);
    position: relative;
    overflow: hidden;
    font-size: var(--btn-font-size);
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: var(--theme-overlay-white-30);  /* btn:active ripple */
    transition: all var(--animation-normal) var(--transition-easing);
    transform: translate(-50%, -50%);
    z-index: 0;
  }

  .btn:not(:disabled):active::before {
    width: 100%;
    height: 100%;
  }

  .btn > * {
    position: relative;
    z-index: 1;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
  }

  .btn:not(:disabled):hover {
    transform: var(--btn-hover-transform);
    will-change: transform;
    box-shadow: var(--shadow-lg);
  }

  .btn:not(:disabled):active {
    transform: translate3d(0, 0, 0);
    will-change: auto;
  }

  /* Button Variants */
  .btn-primary {
    background: var(--brand-primary);
    color: white;
    font-weight: 700;
  }

  .btn-secondary {
    background: var(--theme-overlay-white-10);
    color: var(--theme-text-primary);
    border: 1px solid var(--theme-border-normal);
  }

  .btn-danger {
    background: var(--status-error);
    color: white;
  }

  .btn-google {
    background: var(--google-blue);
    color: white;
    font-weight: 700;
    border: 1px solid var(--theme-border-normal);
  }

  .btn-success {
    background: var(--status-success);
    color: white;
  }

  .btn-warning {
    background: var(--status-warning);
    color: white;
  }

  /* Button Size Variants */
  .btn-sm {
    --btn-padding: 0.5rem 0.75rem;
    --btn-font-size: 12px;
    --btn-min-height: 32px;
    --btn-min-width: 32px;
    font-size: var(--btn-font-size);
    padding: var(--btn-padding);
    min-height: var(--btn-min-height);
    min-width: var(--btn-min-width);
  }

  /* Game-Style Buttons (from Page.html) */
  .game-btn {
    background: var(--brand-primary);
    color: white;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 0 var(--theme-overlay-black-20);
    transition: all 0.1s ease;
    border: 2px solid transparent;
  }

  .game-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 0 var(--theme-overlay-black-20);
  }

  .game-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--theme-overlay-black-20);
  }

  /* CTA Button with Shimmer Effect */

  /* Status Indicators */
  .status-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }

  .status-error {
    background-color: var(--status-error);
  }

  /* Answer Card System (from Page.html) */
  .answer-card {
    /* Card-specific CSS variables for better encapsulation */
    --card-hover-transform: translateY(-2px);
    --card-border-radius: 1rem;
    --card-padding: 1.5rem;
    --card-transition: all var(--transition-normal) var(--transition-easing);

    background: var(--brand-surface);
    border: var(--border-primary);
    border-radius: var(--card-border-radius);
    padding: var(--card-padding);
    transition: var(--card-transition);
    position: relative;
    overflow: hidden;
  }

  .answer-card:hover {
    transform: var(--card-hover-transform);
    box-shadow: var(--shadow-lg);
    border-color: var(--theme-border-normal);
    will-change: transform;
  }

  .answer-card:not(:hover) {
    will-change: auto;
  }


  .answer-card.loading {
    opacity: 0.7;
    pointer-events: none;
  }

  /* Reaction System styles are in page.css.html for Page-specific functionality */

  /* Admin Toggle - Subtle button for administrators only */
  .admin-toggle {
    font-size: 0.75rem;
    transition: all 0.2s ease;
  }

  .admin-toggle:hover {
    transform: translateY(-1px);
    will-change: transform;
  }

  .admin-toggle:not(:hover) {
    will-change: auto;
  }

  /* Feature Cards */
  .feature-card {
    background: var(--brand-surface);
    border: var(--border-primary);
    border-radius: 1rem;
    padding: 1.5rem;
    transition: all var(--transition-normal) var(--transition-easing);
  }

  .feature-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: var(--theme-border-normal);
    will-change: transform;
  }

  .feature-card:not(:hover) {
    will-change: auto;
  }

  /* Loading skeleton (used by Page.html skeleton-card) */
  .skeleton {
    background: linear-gradient(
      90deg,
      var(--theme-overlay-white-10) 25%,
      var(--theme-overlay-white-20) 50%,
      var(--theme-overlay-white-10) 75%
    );
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
    border-radius: 0.5rem;
  }

  /* =============================================================================
   UNIFIED LOADING OVERLAY SYSTEM
   ============================================================================= */

  /* Base loading overlay - Optimized specificity without excessive !important */
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition:
      opacity 0.3s ease,
      background-color 0.3s ease;
    z-index: var(--z-loading-overlay);
    background-color: rgba(0, 0, 0, 0);
    visibility: visible;
    opacity: 1;
    margin: 0;
    padding: 0;
    transform: none;
    /* Force isolation from any parent stacking contexts */
    isolation: isolate;
    /* Ensure the overlay is always positioned relative to viewport */
    contain: layout;
    /* Override any parent transforms that might affect positioning */
    will-change: auto;
  }

  /* High specificity override for framework conflicts (only when necessary) */
  body .loading-overlay:not(.hidden) {
    display: flex !important;
    position: fixed !important;
    z-index: var(--z-loading-overlay) !important;
  }

  /* Variant: Transparent overlay - completely invisible interaction blocker */
  .loading-overlay.transparent {
    background-color: rgba(0, 0, 0, 0); /* Completely transparent */
    backdrop-filter: none; /* No visual effects */
    -webkit-backdrop-filter: none;
  }

  /* Content container for all loading elements */
  .loading-content {
    color: var(--theme-text-primary);
    text-align: center;
    padding: 2rem;
    max-width: 400px;
    background: var(--theme-overlay-surface-glass);
    border-radius: 1rem;
    border: 1px solid rgba(139, 233, 253, 0.2);  /* brand-accent-light の薄め (loading 専用) */
    box-shadow: 0 12px 40px var(--theme-overlay-black-60);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .loading-message {
    font-size: 1.1rem;
    margin-top: 1rem;
    font-weight: 600;
    opacity: 0.95;
    animation: fadeInOut 1.5s ease-in-out infinite;
    text-align: center;
  }

  /* Improved loading message animation */
  @keyframes fadeInOut {
    0%,
    100% {
      opacity: 0.95;
    }
    50% {
      opacity: 0.75;
    }
  }

  /* Spinner for global loading */
  .global-spinner {
    width: 60px;
    height: 60px;
    border: 6px solid var(--theme-border-strong);
    border-top: 6px solid var(--theme-spinner);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 1.5rem;
  }


  /* Ensure QuickStart progress bar is visible */
  #quickstart-progress {
    position: relative;
    z-index: var(--z-tooltip) !important;
  }
  /* Variant: Modal, for critical blocking actions */
  .loading-overlay.modal {
    background-color: var(--theme-overlay-black-90);
    z-index: var(--z-notification);
  }

  /* Spinner Variants */
  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid var(--theme-border-strong);
    border-top: 3px solid var(--theme-spinner);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .spinner-small {
    width: 16px;
    height: 16px;
    border: 2px solid var(--theme-border-strong);
    border-top: 2px solid var(--theme-spinner);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 4px solid rgba(139, 233, 253, 0.3);  /* spinner-accent: brand-accent-light alpha */
    border-top: 4px solid var(--theme-spinner);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    flex-shrink: 0;
  }

  .spinner-xs {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(139, 233, 253, 0.3);  /* spinner-accent: brand-accent-light alpha */
    border-top: 2px solid var(--theme-spinner);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: inline-block;
  }

  /* Tooltip System */
  .tooltip {
    position: relative;
  }

  .tooltip::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--theme-overlay-black-90);
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition-normal);
    z-index: var(--z-modal);
    margin-bottom: 5px;
  }

  .tooltip:hover::after {
    opacity: 1;
  }

  /* Card Hover Effects */
  .card-hover {
    transition: all var(--animation-normal) var(--transition-easing);
  }

  .card-hover:hover {
    transform: translate3d(0, -2px, 0);
    box-shadow: 0 8px 25px rgba(139, 233, 253, 0.15);
    will-change: transform;
  }

  .card-hover:not(:hover) {
    will-change: auto;
  }

  /* Message System */
  .message {
    padding: 1rem;
    border-radius: 0.75rem;
    margin-bottom: 1rem;
    transform: translateY(20px);
    opacity: 0;
    transition: all var(--animation-normal) var(--transition-easing);
  }

  .message.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* Modal System */
  /* Why: background/color は呼び出し側の Tailwind クラス（bg-red-600 text-white 等）
     を尊重するため設定しない。以前は UnifiedStyles が後読みされ Tailwind の
     bg-red-600 / text-white を上書きしてボタンが半透明白背景+薄い前景色になり
     「×ボタンが透明」と報告されていた。位置・形状のみ定義する。 */
  .modal-close-btn {
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all var(--transition-normal) var(--transition-easing);
  }

  /* Performance Optimizations */
  .render-optimized {
    will-change: transform, opacity;
    transform: translate3d(0, 0, 0);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }

  /* Reset optimization when interaction ends */
  .render-optimized:not(:hover):not(:focus):not(:active):not(.animating) {
    will-change: auto;
  }

  /* Disable render optimization when global loading is active to prevent stacking context issues */
  body.gas-loading .render-optimized,
  .loading-active .render-optimized {
    transform: none;
    will-change: auto;
  }

  /* Alternative loading-safe optimization for when we need performance but loading is active */
  .render-optimized.loading-safe {
    /* Use containment instead of transform for performance without stacking context issues */
    contain: style layout;
    transform: none;
    will-change: auto;
  }

  /* Accessibility */
  :focus-visible {
    outline: 3px solid var(--brand-primary);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* Animation Classes (only used ones) */
  .fade-in {
    animation: fadeIn var(--animation-normal) ease-out;
  }

  /* Keyframe Animations */
  @keyframes fadeIn {
    0% {
      opacity: 0;
      transform: translateY(10px);
      will-change: opacity, transform;
    }
    100% {
      opacity: 1;
      transform: translateY(0);
      will-change: auto;
    }
  }

  /* 通知バナー専用: 上から下にドロップダウン */
  @keyframes fadeInFromTop {
    0% {
      opacity: 0;
      transform: translate(-50%, -20px);
      will-change: opacity, transform;
    }
    100% {
      opacity: 1;
      transform: translate(-50%, 0);
      will-change: auto;
    }
  }

  /* 通知トースト専用: 右から左にスライドイン */
  @keyframes fadeInFromRight {
    0% {
      opacity: 0;
      transform: translateX(100px);
      will-change: opacity, transform;
    }
    100% {
      opacity: 1;
      transform: translateX(0);
      will-change: auto;
    }
  }

  /* 中央上の通知バナー (NotificationSystem.banner)。 全ページで使えるよう UnifiedStyles に集約。
     旧 page.viz.css.html の .board-switched-toast を踏襲。 */
  .board-switched-toast {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    z-index: var(--z-notification);
    padding: 0.75rem 1.25rem;
    background: var(--theme-accent-cyan-soft);
    border: 1px solid var(--theme-accent-cyan);
    border-radius: 0.6rem;
    color: var(--theme-text-primary);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    max-width: 90vw;
    text-align: center;
    font-size: 1rem;
    line-height: 1.4;
  }
  .board-switched-toast strong { color: var(--theme-accent-cyan); }
  .board-switched-toast span { color: var(--theme-text-secondary); font-size: 0.92rem; }
  .board-switched-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @keyframes skeleton-loading {
    0% {
      background-position: 200% 0;
      will-change: background-position;
    }
    100% {
      background-position: -200% 0;
      will-change: auto;
    }
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
      will-change: transform;
    }
    100% {
      transform: rotate(360deg);
      will-change: auto;
    }
  }

  @keyframes pulse {
    0%,
    100% {
      transform: scale(1);
      will-change: transform;
    }
    50% {
      transform: scale(1.05);
    }
  }

  @keyframes shake {
    0%,
    100% {
      transform: translate3d(0, 0, 0);
      will-change: transform;
    }
    25% {
      transform: translate3d(-5px, 0, 0);
    }
    75% {
      transform: translate3d(5px, 0, 0);
    }
  }

  @keyframes bounce {
    0%,
    100% {
      transform: translateY(0);
      will-change: transform;
    }
    50% {
      transform: translateY(-10px);
    }
  }

  @keyframes modalFade {
    0% {
      opacity: 0;
      will-change: opacity;
    }
    100% {
      opacity: 1;
      will-change: auto;
    }
  }

  @keyframes modalScale {
    0% {
      transform: scale(0.9);
      will-change: transform;
    }
    100% {
      transform: scale(1);
      will-change: auto;
    }
  }

  @keyframes slideIn {
    0% {
      opacity: 0;
      transform: translateX(-20px);
      will-change: opacity, transform;
    }
    100% {
      opacity: 1;
      transform: translateX(0);
      will-change: auto;
    }
  }


  @keyframes slideInFromBottom {
    0% {
      opacity: 0;
      transform: translateY(20px);
      will-change: opacity, transform;
    }
    100% {
      opacity: 1;
      transform: translateY(0);
      will-change: auto;
    }
  }

  /* Media Queries */

  /* Performance optimizations for low-end devices - integrated into main mobile query */

  /* Reduced motion support */
  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* High contrast mode support */
  @media (prefers-contrast: high) {
    :root {
      --brand-border: rgba(255, 255, 255, 0.3);
      --brand-text: #ffffff;
    }
  }

  /* Mobile-first responsive design with performance optimizations */
  @media (max-width: 768px) /* md breakpoint */ {
    .btn {
      min-height: 48px;
      padding: 1rem 1.5rem;
      font-size: 16px;
    }


    .glass-panel {
      margin: 0.5rem;
      padding: 1rem;
      /* Performance optimization for low-end devices */
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      background: rgba(26, 27, 38, 0.95);
    }

    .responsive-grid {
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .answer-card {
      padding: 1rem;
    }

    .reaction-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
    }
  }

  @media (min-width: 640px) /* sm breakpoint */ {
    .responsive-grid {
      gap: 1.5rem;
      padding: 1.5rem;
    }
  }

  @media (min-width: 768px) {
    .responsive-grid {
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
  }

  @media (min-width: 1024px) /* lg breakpoint */ {
    .responsive-grid {
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
      padding: 2rem;
    }
  }

  /* High refresh rate display optimizations */
  @media (min-resolution: 120dpi) {
    .btn,
    .answer-card {
      will-change: transform;
    }
  }




  /* Large screen optimizations */
  @media (min-width: 1280px) /* xl breakpoint - unified to Tailwind */ {
    .responsive-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  /* Accessibility support - prefers-reduced-motion (btn:disabled only) */
  @media (prefers-reduced-motion: reduce) {
    .btn:disabled {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      transform: none !important;
    }
  }

  /* =============================================================================
   * AdminPanel Common Components

  /* Form Groups */

  /* Modern Select Styling */
  .modern-select {

  .modern-select:focus {

    border-color: rgba(59, 130, 246, 0.8);

  .modern-select.has-ai-selection {

  /* Modern Input Styling - modern-selectと統一デザイン */
  .modern-input {

    border: var(--border-primary);

  /* Toggle Switches */
  .toggle-group {

    flex-direction: column;
    gap: 1rem;

  .toggle-switch {
    display: flex;
    align-items: center;
    gap: 0.75rem;

    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .phase-add-btn:hover {
    background: rgba(34, 211, 238, 0.2);
    border-color: rgba(34, 211, 238, 0.8);
    color: #fff;
  }

  /* Phase preview & detail UI (Wizard Step 2) */
  .phase-preview {
    margin-bottom: 0.6rem;
    padding: 0.5rem 0.6rem;
    background: rgba(8, 145, 178, 0.1);
    border: 1px solid rgba(34, 211, 238, 0.25);
    border-radius: 0.4rem;
    font-size: 0.8rem;
    color: rgba(229, 231, 235, 0.9);

  .phase-preview-numberline {

  }
  .phase-preview-track {
    flex: 1; text-align: center; color: rgba(34, 211, 238, 0.8); letter-spacing: -2px;
  }
  .phase-preview-end {
    color: rgba(165, 243, 252, 0.9);
    max-width: 38%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;

  .phase-preview-matrix {
    display: grid;
    grid-template-columns: auto 1fr;
    grid-template-rows: auto auto auto;
    gap: 0.2rem 0.4rem;
    align-items: center;
    font-size: 0.7rem;
  }
  .matrix-y-high { grid-column: 2; color: rgba(165, 243, 252, 0.85); }
  .matrix-grid {
    grid-column: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    width: 100%; aspect-ratio: 1;
    max-height: 50px;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 0.2rem;
    overflow: hidden;

  .matrix-quad {
    border: 1px solid rgba(34, 211, 238, 0.18);

  .matrix-x-axis { grid-column: 2; color: rgba(165, 243, 252, 0.85); }
  .matrix-y-low { grid-column: 2; color: rgba(165, 243, 252, 0.85); }
  .phase-preview-pie,
  .phase-preview-board {
    display: flex; align-items: center; gap: 0.5rem;
  }

  .phase-detail {
    margin-top: 0.5rem;
    background: rgba(15, 23, 42, 0.4);
    border: 1px solid rgba(71, 85, 105, 0.4);
    border-radius: 0.4rem;
    padding: 0.4rem 0.6rem;

  .phase-detail summary {
    cursor: pointer;
    color: rgba(165, 243, 252, 0.85);
    font-size: 0.75rem;
    padding: 0.15rem 0;
    list-style: none;
  }
  .phase-detail summary::before { content: '▸ '; color: rgba(148, 163, 184, 0.7); }
  .phase-detail[open] summary::before { content: '▾ '; color: rgba(34, 211, 238, 0.8); }
  .phase-detail-row {
    display: flex; gap: 0.4rem; align-items: center; margin-top: 0.4rem;
  }
  .phase-detail-tag {
    font-size: 0.75rem; color: rgba(148, 163, 184, 0.85);
    min-width: 1.5rem;
  }
  .phase-detail-sep {
    color: rgba(148, 163, 184, 0.7); font-size: 0.9rem;
  }
  .phase-detail-row input {
    flex: 1; min-width: 0; padding: 0.3rem 0.5rem; font-size: 0.85rem;
  }
  .phase-choice-list {
    margin-top: 0.4rem;
    display: flex; flex-direction: column; gap: 0.3rem;
  }
  .phase-choice-row {
    display: flex; gap: 0.3rem; align-items: center;
  }
  .phase-choice-row input {
    flex: 1; padding: 0.3rem 0.5rem; font-size: 0.85rem;
  }
  .phase-choice-del {
    background: none; border: none;
    color: rgba(148, 163, 184, 0.7);
    font-size: 1rem; cursor: pointer; padding: 0 0.3rem;
  }
  .phase-choice-del:hover { color: #f87171; }
  .phase-choice-add {
    align-self: flex-start;
    padding: 0.25rem 0.7rem;
    background: rgba(34, 211, 238, 0.1);
    border: 1px dashed rgba(34, 211, 238, 0.4);
    border-radius: 0.3rem;
    color: rgba(165, 243, 252, 0.9);
    font-size: 0.75rem;
    cursor: pointer;
  }
  .phase-choice-add:hover {
    background: rgba(34, 211, 238, 0.2);
  }

  /* Phase scale picker (3 / 5 / 7 段階の radio 群) */
  .phase-scale-grid {
    display: flex; gap: 0.6rem; align-items: center; margin-top: 0.4rem;

  .phase-scale-opt {
    display: inline-flex; align-items: center; gap: 0.3rem;

  .phase-scale-hint {

  /* Phase image zone: drag&drop + click + paste */
  .phase-image-zone {

  .phase-image-zone .phase-image-file {

  .phase-image-hint {
    display: flex; align-items: center; gap: 0.5rem; justify-content: center;

  .phase-image-clear {

  .phase-image-note {

  /* 「+ もっと細かく」 で集約する任意拡張ブロック */
  .phase-extra-details > summary {
    color: rgba(165, 243, 252, 0.85);

  .phase-extra-badges {
    margin-left: 0.4rem;
    font-size: 0.7rem;
    color: rgba(34, 211, 238, 0.9);
    padding: 0.05rem 0.4rem;
    background: rgba(34, 211, 238, 0.12);
    border-radius: 0.3rem;
  }
  .phase-extra-list {
    display: flex; flex-direction: column; gap: 0.7rem; margin-top: 0.5rem;
  }
  .phase-extra-section {
    background: rgba(15, 23, 42, 0.35);
    border: 1px solid rgba(71, 85, 105, 0.3);
    border-radius: 0.4rem;
    padding: 0.5rem 0.6rem;
  }
  .phase-extra-label {
    font-size: 0.78rem;
    color: rgba(165, 243, 252, 0.85);
    margin-bottom: 0.35rem;
  }

  /* プレビュー上のラベル「📺 生徒に見える形:」: 「ここが結果」を明示 */
  .phase-preview-label {
    font-size: 0.78rem;

    font-weight: 600;
    margin: 0.85rem 0 0.35rem;

    border-top: 1px dashed rgba(71, 85, 105, 0.4);

  /* 「その他」 toggle */
  .phase-choice-other {
    display: flex; align-items: center; gap: 0.4rem;

    font-size: 0.78rem;

  /* board preview: サンプルカード */
  .phase-preview-sample-card {
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(96, 165, 250, 0.35);
    border-radius: 0.4rem;
    padding: 0.45rem 0.55rem;
    font-size: 0.72rem;
  }
  .sample-card-name {
    font-size: 0.65rem;
    color: rgba(148, 163, 184, 0.85);
    margin-bottom: 0.15rem;
  }
  .sample-card-answer {
    color: rgba(165, 243, 252, 0.95);
    font-weight: 600;
    margin-bottom: 0.15rem;
  }
  .sample-card-reason {

    line-height: 1.3;
  }
  .phase-preview-board-hint {
    margin-top: 0.3rem;
    font-size: 0.65rem;
    color: rgba(148, 163, 184, 0.7);
    text-align: center;
  }

  /* pie preview: SVG 円グラフ + 凡例 */
  .phase-preview-pie {
    display: flex !important; align-items: center; gap: 0.6rem;
  }
  .phase-preview-pie-svg {
    width: 36px; height: 36px; flex-shrink: 0;
  }
  .phase-preview-pie-list {
    display: flex; flex-direction: column; gap: 0.15rem;
    font-size: 0.7rem;
    color: rgba(229, 231, 235, 0.92);
  }
  .phase-preview-pie-item {
    display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .phase-preview-pie-dot {
    width: 0.55rem; height: 0.55rem; border-radius: 50%;
    display: inline-block;
  }
  .phase-preview-pie-dot-0 { background: #60a5fa; }
  .phase-preview-pie-dot-1 { background: #34d399; }
  .phase-preview-pie-dot-2 { background: #fbbf24; }
  .phase-preview-pie-dot-3 { background: #f87171; }

  /* matrix preview: サンプル点 (児童 A, B) */
  .matrix-quad { position: relative; }
  .matrix-sample-dot {
    position: absolute;
    width: 1.1rem; height: 1.1rem;
    background: rgba(96, 165, 250, 0.85);
    border-radius: 50%;
    color: #fff;
    font-size: 0.55rem; line-height: 1.1rem;
    text-align: center; font-weight: 700;
    box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.5);
  }

  /* Lesson template picker (dropdown menu on 🎒 新しい授業を作る ▾) */
  .lesson-template-picker {
    position: relative;
  }
  .lesson-template-picker > summary {
    list-style: none;
    cursor: pointer;
  }
  .lesson-template-picker > summary::-webkit-details-marker { display: none; }
  .lesson-template-menu {
    position: absolute;
    right: 0; top: 100%;

    padding: 0.55rem 0.7rem;

    border-radius: 0.4rem;
    color: #e2e8f0;
    cursor: pointer;
    margin-bottom: 0.25rem;
    transition: all 0.15s ease;
  }
  .lesson-template-item:hover {
    background: rgba(59, 130, 246, 0.15);
    border-color: rgba(96, 165, 250, 0.45);
  }
  .lesson-template-label {
    font-size: 0.92rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lesson-template-desc {
    font-size: 0.75rem;
    color: rgba(148, 163, 184, 0.85);
    margin-top: 0.15rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lesson-template-phase-count {
    color: rgba(165, 243, 252, 0.8);
    margin-left: 0.3rem;
  }
  .lesson-template-loading {
    padding: 0.4rem 0.7rem;
    font-size: 0.85rem;
    color: rgba(148, 163, 184, 0.7);
    font-style: italic;
  }

  /* ===== Profile row: アイコンボタン + 状態バッジ + 編集中バー ===== */
  .profile-badge {
    padding: 0.15rem 0.45rem;
    font-size: 0.65rem;
    border-radius: 0.25rem;
    flex-shrink: 0;
    line-height: 1.2;
  }
  .profile-badge-active {
    background: rgba(8, 145, 178, 0.4);

  }
  .profile-badge-published {
    background: rgb(5, 150, 105);
    color: #fff;
  }
  .profile-icon-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 0.3rem;
    color: rgba(229, 231, 235, 0.85);
    padding: 0.15rem 0.4rem;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.12s ease;
    flex-shrink: 0;

  .profile-icon-load:hover {
    background: rgba(59, 130, 246, 0.25);

  .profile-icon-delete {

  }
  .profile-icon-delete:hover {

  /* ロード中の行を highlight */
  .profile-row.profile-row-loading {
    background: rgba(59, 130, 246, 0.15) !important;
    border-color: rgba(96, 165, 250, 0.6) !important;
    opacity: 0.7;
    pointer-events: none;
  }
  /* 名前 (dblclick で rename 可能) */
  .profile-name {
    cursor: text;
  }
  .profile-name:hover {

  }
  .profile-rename-input {
    width: 100%;
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid rgba(96, 165, 250, 0.6);
    border-radius: 0.2rem;
    color: #fff;
    font-size: 0.75rem;
    padding: 0.1rem 0.3rem;
    outline: none;
  }

  /* 💾 更新ボタン (active row のみ表示) */
  .profile-icon-update {
    background: rgba(34, 211, 238, 0.18);
    border-color: rgba(34, 211, 238, 0.45);
    color: rgb(165, 243, 252);
  }
  .profile-icon-update:hover {
    background: rgba(34, 211, 238, 0.4);
    border-color: rgba(34, 211, 238, 0.7);
    color: #fff;
  }

  /* ===== Phase 追加 dropdown (Wizard Step 2) ===== */
  .phase-add-picker {
    position: relative;
    display: inline-block;
  }
  .phase-add-picker > summary {
    list-style: none;
    cursor: pointer;
  }
  .phase-add-picker > summary::-webkit-details-marker { display: none; }
  .phase-add-menu {
    position: absolute;

  .phase-add-menu-item {
    display: block;

    text-align: left;
    padding: 0.5rem 0.7rem;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 0.35rem;
    color: #e2e8f0;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .phase-add-menu-item:hover {
    background: rgba(34, 211, 238, 0.15);
    border-color: rgba(34, 211, 238, 0.4);
  }

  /* ===== テンプレフォーム作成 dropdown ===== */
  .template-form-picker {
    position: relative;
    display: inline-block;
  }
  .template-form-picker > summary {
    list-style: none;
    cursor: pointer;
  }
  .template-form-picker > summary::-webkit-details-marker { display: none; }
  .template-form-menu {
    position: absolute;
    left: 0; top: 100%;
    margin-top: 0.4rem;
    min-width: 280px;
    background: rgba(15, 23, 42, 0.98);
    border: 1px solid rgba(96, 165, 250, 0.5);
    border-radius: 0.5rem;

  .confirm-phase-list {
    margin: 0;
    padding-left: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;

  .confirm-phase-row {

    padding: 0.5rem 0.7rem;

  .lesson-start-error-progress {

     accent border + 微 gradient で「ここから始める」と視覚的に誘導する。 */
  .lesson-hero-card {
    border: 1px solid rgba(34, 211, 238, 0.35);

  /* 個別ボードモードへの divider (二者択一を明示) */

    gap: 0.75rem;

  .section-group-divider::after {

    border-top: 1px solid rgba(148, 163, 184, 0.2);

  .section-group-label {
    font-size: 0.8rem;
    color: rgba(148, 163, 184, 0.7);

  .step-number {

  .form-alternative-block {
    padding: 0.75rem;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 0.4rem;
  }

  /* Lesson review banner (Phase 2): Page.html 上部に固定表示 */
  #lesson-review-banner.hidden { display: none; }
  #lesson-review-banner {
