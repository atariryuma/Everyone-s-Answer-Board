  .btn-class-preset:hover {
    background: color-mix(in srgb, var(--brand-primary) 20%, transparent);
    border-color: color-mix(in srgb, var(--brand-primary-light) 50%, transparent);
    color: var(--theme-text-primary);
  }
  .btn-class-preset.active {
    background: color-mix(in srgb, var(--brand-primary) 30%, transparent);
    border-color: color-mix(in srgb, var(--brand-primary-light) 70%, transparent);
    color: var(--theme-text-primary);
  }
  .class-custom-add summary {
    cursor: pointer;
    color: var(--theme-text-muted);
    font-size: 0.875rem;
    padding: 0.3rem 0;
  }
  .class-custom-add[open] summary { color: var(--theme-text-secondary); }

  /* Wizard progress dots (Stripe 風) */
  .lesson-step-dot {
    display: inline-block;
    width: 1.5rem; height: 1.5rem;
    text-align: center; line-height: 1.5rem;
    border-radius: 9999px;
    color: var(--theme-border-strong);
    font-size: 0.875rem;
  }
  .lesson-step-dot.active {
    color: color-mix(in srgb, var(--theme-accent-cyan-strong) 95%, transparent);
    font-weight: bold;
  }
  .lesson-step[hidden] { display: none; }

  /* Phase card (Wizard Step 2 / Runner) */
  .lesson-phase-card {
    background: var(--theme-card-1);
    border: 1px solid var(--theme-border-subtle);
    border-radius: 0.75rem;
    padding: 0.85rem 1rem;
    min-width: 180px;
    transition: border-color var(--transition-quick) ease, background var(--transition-quick) ease;
  }
  .lesson-phase-card.active {
    border-color: color-mix(in srgb, var(--theme-accent-cyan-strong) 70%, transparent);
    background: color-mix(in srgb, var(--theme-accent-cyan-deep) 18%, transparent);
  }
  .lesson-phase-card.completed {
    opacity: 0.7;
    border-color: color-mix(in srgb, var(--status-success) 45%, transparent);
  }
  .lesson-phase-card .phase-number {
    font-size: 0.75rem; color: var(--theme-text-muted); font-weight: bold;
  }
  .lesson-phase-card .phase-name { font-size: 1rem; color: var(--theme-text-primary); margin: 0.2rem 0; }
  .lesson-phase-card .phase-meta { font-size: 0.75rem; color: var(--theme-text-muted); }

  /* Phase card 編集モード (Wizard Step 2) */
  .phase-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .phase-delete-btn {
    background: none;
    border: none;
    color: var(--theme-text-muted);
    font-size: 1.25rem;
    line-height: 1;
    cursor: pointer;
    padding: 0 0.3rem;
    border-radius: 0.5rem;
    transition: color var(--transition-quick) ease, background var(--transition-quick) ease;
  }
  .phase-delete-btn:hover {
    color: var(--status-error);
    background: color-mix(in srgb, var(--status-error) 10%, transparent);
  }
  .phase-field {
    margin-bottom: 0.6rem;
  }
  .phase-field:last-child { margin-bottom: 0; }
  .phase-label {
    display: block;
    font-size: 0.75rem;
    color: var(--theme-text-muted);
    margin-bottom: 0.2rem;
  }
  .phase-add-wrap {
    grid-column: 1 / -1;
    text-align: center;
    margin-top: 0.5rem;
  }
  .phase-add-btn {
    padding: 0.6rem 1.4rem;
    background: color-mix(in srgb, var(--theme-accent-cyan-strong) 12%, transparent);
    border: 1px dashed color-mix(in srgb, var(--theme-accent-cyan-strong) 50%, transparent);
    border-radius: 0.5rem;
    color: var(--theme-accent-cyan);
    font-size: 0.875rem;
    cursor: pointer;
    transition: all var(--transition-quick) ease;
  }
  .phase-add-btn:hover {
    background: color-mix(in srgb, var(--theme-accent-cyan-strong) 20%, transparent);
    border-color: color-mix(in srgb, var(--theme-accent-cyan-strong) 80%, transparent);
    /* color は base の var(--theme-accent-cyan) を継承。 旧 color:#fff は light mode の
       淡いシアン地で白文字が消えていた (theme bug)。 */
  }

  /* Phase preview & detail UI (Wizard Step 2) */
  .phase-preview {
    margin-bottom: 0.6rem;
    padding: 0.5rem 0.6rem;
    background: color-mix(in srgb, var(--theme-accent-cyan-deep) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--theme-accent-cyan-strong) 25%, transparent);
    border-radius: 0.5rem;
    font-size: 0.875rem;
    color: var(--theme-text-primary);
  }
  .phase-preview-numberline {
    display: flex; align-items: center; gap: 0.4rem; justify-content: space-between;
  }
  .phase-preview-track {
    flex: 1; text-align: center; color: color-mix(in srgb, var(--theme-accent-cyan-strong) 80%, transparent); letter-spacing: -2px;
  }
  .phase-preview-end {
    color: var(--theme-accent-cyan);
    max-width: 38%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .phase-preview-matrix {
    display: grid;
    grid-template-columns: auto 1fr;
    grid-template-rows: auto auto auto;
    gap: 0.2rem 0.4rem;
    align-items: center;
    font-size: 0.75rem;
  }
  .matrix-y-high { grid-column: 2; color: var(--theme-accent-cyan); }
  .matrix-grid {
    grid-column: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    width: 100%; aspect-ratio: 1;
    max-height: 50px;
    background: var(--theme-card-2);
    border-radius: 0.25rem;
    overflow: hidden;
  }
  .matrix-quad {
    border: 1px solid color-mix(in srgb, var(--theme-accent-cyan-strong) 18%, transparent);
  }
  .matrix-x-axis { grid-column: 2; color: var(--theme-accent-cyan); }
  .matrix-y-low { grid-column: 2; color: var(--theme-accent-cyan); }
  .phase-preview-pie,
  .phase-preview-board {
    display: flex; align-items: center; gap: 0.5rem;
  }

  .phase-detail {
    margin-top: 0.5rem;
    background: var(--theme-card-2);
    border: 1px solid var(--theme-border-subtle);
    border-radius: 0.5rem;
    padding: 0.4rem 0.6rem;
  }
  .phase-detail summary {
    cursor: pointer;
    color: var(--theme-accent-cyan);
    font-size: 0.75rem;
    padding: 0.15rem 0;
    list-style: none;
  }
  .phase-detail summary::before { content: '▸ '; color: var(--theme-text-muted); }
  .phase-detail[open] summary::before { content: '▾ '; color: color-mix(in srgb, var(--theme-accent-cyan-strong) 80%, transparent); }
  .phase-detail-row {
    display: flex; gap: 0.4rem; align-items: center; margin-top: 0.4rem;
  }
  .phase-detail-tag {
    font-size: 0.75rem; color: var(--theme-text-muted);
    min-width: 1.5rem;
  }
  .phase-detail-sep {
    color: var(--theme-text-muted); font-size: 0.875rem;
  }
  .phase-detail-row input {
    flex: 1; min-width: 0; padding: 0.3rem 0.5rem; font-size: 0.875rem;
  }
  .phase-choice-list {
    margin-top: 0.4rem;
    display: flex; flex-direction: column; gap: 0.3rem;
  }
  .phase-choice-row {
    display: flex; gap: 0.3rem; align-items: center;
  }
  .phase-choice-row input {
    flex: 1; padding: 0.3rem 0.5rem; font-size: 0.875rem;
  }
  .phase-choice-del {
    background: none; border: none;
    color: var(--theme-text-muted);
    font-size: 1rem; cursor: pointer; padding: 0 0.3rem;
  }
  .phase-choice-del:hover { color: var(--status-error); }
  .phase-choice-add {
    align-self: flex-start;
    padding: 0.25rem 0.7rem;
    background: color-mix(in srgb, var(--theme-accent-cyan-strong) 10%, transparent);
    border: 1px dashed color-mix(in srgb, var(--theme-accent-cyan-strong) 40%, transparent);
    border-radius: 0.5rem;
    color: var(--theme-accent-cyan);
    font-size: 0.75rem;
    cursor: pointer;
  }
  .phase-choice-add:hover {
    background: color-mix(in srgb, var(--theme-accent-cyan-strong) 20%, transparent);
  }

  /* Phase scale picker (3 / 5 / 7 段階の radio 群) */
  .phase-scale-grid {
    display: flex; gap: 0.6rem; align-items: center; margin-top: 0.4rem;
    flex-wrap: wrap;
  }
  .phase-scale-opt {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.25rem 0.55rem;
    background: var(--theme-card-2);
    border: 1px solid var(--theme-border-subtle);
    border-radius: 0.5rem;
    font-size: 0.75rem;
    color: var(--theme-text-primary);
    cursor: pointer;
  }
  .phase-scale-opt:hover {
    border-color: color-mix(in srgb, var(--brand-primary-light) 50%, transparent);
  }
  .phase-scale-opt input[type="radio"] { margin: 0; cursor: pointer; }
  .phase-scale-hint {
    font-size: 0.75rem;
    color: var(--theme-text-muted);
  }

  /* Phase image zone: drag&drop + click + paste */
  .phase-image-zone {
    position: relative;
    margin-top: 0.4rem;
    padding: 0.7rem;
    background: var(--theme-card-2);
    border: 1.5px dashed color-mix(in srgb, var(--brand-primary-light) 45%, transparent);
    border-radius: 0.5rem;
    cursor: pointer;
    transition: all var(--transition-quick) ease;
    min-height: 80px;
    outline: none;
  }
  .phase-image-zone:hover,
  .phase-image-zone:focus,
  .phase-image-zone.drag-hover {
    background: color-mix(in srgb, var(--theme-accent-cyan-strong) 8%, transparent);
    border-color: color-mix(in srgb, var(--theme-accent-cyan-strong) 70%, transparent);
  }
  .phase-image-zone .phase-image-file {
    display: none;
  }
  .phase-image-hint {
    display: flex; align-items: center; gap: 0.5rem; justify-content: center;
    color: var(--theme-accent-cyan);
    font-size: 0.875rem;
    text-align: center;
    padding: 0.4rem;
  }
  .phase-image-hint-icon { font-size: 1.25rem; }
  .phase-image-preview {
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
  }
  .phase-image-preview img {
    max-width: 100%; max-height: 160px;
    border-radius: 0.5rem;
    border: 1px solid var(--theme-border-subtle);
    background: var(--theme-bg-base);  /* 画像背景 (透過 PNG 用) */
  }
  .phase-image-clear {
    background: color-mix(in srgb, var(--status-error) 18%, transparent);
    border: 1px solid color-mix(in srgb, var(--status-error) 45%, transparent);
    color: var(--theme-status-error-text);
    border-radius: 0.5rem;
    padding: 0.2rem 0.6rem;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .phase-image-clear:hover {
    background: color-mix(in srgb, var(--status-error) 30%, transparent);
    color: var(--theme-text-primary);
  }
  .phase-image-note {
    text-align: center;
  }

  /* 「+ もっと細かく」 で集約する任意拡張ブロック */
  .phase-extra-details > summary {
    color: var(--theme-accent-cyan);
    font-size: 0.75rem;
  }
  .phase-extra-badges {
    margin-left: 0.4rem;
    font-size: 0.75rem;
    color: color-mix(in srgb, var(--theme-accent-cyan-strong) 90%, transparent);
    padding: 0.05rem 0.4rem;
    background: color-mix(in srgb, var(--theme-accent-cyan-strong) 12%, transparent);
    border-radius: 0.5rem;
  }
  .phase-extra-list {
    display: flex; flex-direction: column; gap: 0.7rem; margin-top: 0.5rem;
  }
  .phase-extra-section {
    background: var(--theme-card-2);
    border: 1px solid var(--theme-border-subtle);
    border-radius: 0.5rem;
    padding: 0.5rem 0.6rem;
  }
  .phase-extra-label {
    font-size: 0.75rem;
    color: var(--theme-accent-cyan);
    margin-bottom: 0.35rem;
  }

  /* プレビュー上のラベル「📺 生徒に見える形:」: 「ここが結果」を明示 */
  .phase-preview-label {
    font-size: 0.75rem;
    color: var(--theme-accent-cyan);
    font-weight: 600;
    margin: 0.85rem 0 0.35rem;
    padding-top: 0.5rem;
    border-top: 1px dashed var(--theme-border-subtle);
  }

  /* 「その他」 toggle */
  .phase-choice-other {
    display: flex; align-items: center; gap: 0.4rem;
    margin-top: 0.5rem;
    font-size: 0.75rem;
    color: var(--theme-text-primary);
    cursor: pointer;
  }
  .phase-choice-other input[type="checkbox"] { cursor: pointer; }

  /* board preview: サンプルカード */
  .phase-preview-sample-card {
    background: var(--theme-card-1);
    border: 1px solid color-mix(in srgb, var(--brand-primary-light) 35%, transparent);
    border-radius: 0.5rem;
    padding: 0.45rem 0.55rem;
    font-size: 0.75rem;
  }
  .sample-card-name {
    font-size: 0.65rem;
    color: var(--theme-text-muted);
    margin-bottom: 0.15rem;
  }
  .sample-card-answer {
    color: var(--theme-accent-cyan);
    font-weight: 600;
    margin-bottom: 0.15rem;
  }
  .sample-card-reason {
    color: var(--theme-text-secondary);
    font-size: 0.75rem;
    line-height: 1.3;
  }
  .phase-preview-board-hint {
    margin-top: 0.3rem;
    font-size: 0.65rem;
    color: var(--theme-text-muted);
    text-align: center;
  }

  /* pie preview: SVG 円グラフ + 凡例 */
  .phase-preview-pie {
    display: flex !important; align-items: center; gap: 0.6rem;
  }
  .phase-preview-pie-svg {
    width: 36px; height: 36px; flex-shrink: 0;
  }
  .phase-preview-pie-list {
    display: flex; flex-direction: column; gap: 0.15rem;
    font-size: 0.75rem;
    color: var(--theme-text-primary);
  }
  .phase-preview-pie-item {
    display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .phase-preview-pie-dot {
    width: 0.55rem; height: 0.55rem; border-radius: 50%;
    display: inline-block;
  }
  .phase-preview-pie-dot-0 { background: #60a5fa; }
  .phase-preview-pie-dot-1 { background: #34d399; }
  .phase-preview-pie-dot-2 { background: #fbbf24; }
  .phase-preview-pie-dot-3 { background: #f87171; }

  /* matrix preview: サンプル点 (児童 A, B) */
  .matrix-quad { position: relative; }
  .matrix-sample-dot {
    position: absolute;
    width: 1.1rem; height: 1.1rem;
    background: color-mix(in srgb, var(--brand-primary-light) 85%, transparent);
    border-radius: 50%;
    color: var(--theme-text-primary);
    font-size: 0.55rem; line-height: 1.1rem;
    text-align: center; font-weight: 700;
    box-shadow: 0 0 0 1px var(--theme-card-2);
  }

  /* Lesson template picker (dropdown menu on 🎒 新しい授業を作る ▾) */
  .lesson-template-picker {
    position: relative;
  }
  .lesson-template-picker > summary {
    list-style: none;
    cursor: pointer;
  }
  .lesson-template-picker > summary::-webkit-details-marker { display: none; }
  .lesson-template-menu {
    position: absolute;
    right: 0; top: 100%;
    margin-top: 0.4rem;
    width: 280px;
    background: var(--theme-card-3);
    border: 1px solid color-mix(in srgb, var(--brand-primary-light) 50%, transparent);
    border-radius: 0.5rem;
    padding: 0.4rem;
    box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
    z-index: 100;
  }
  .lesson-template-item {
    display: flex;
    flex-direction: column;
    width: 100%;
    text-align: left;
    padding: 0.55rem 0.7rem;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 0.5rem;
    color: var(--theme-text-primary);
    cursor: pointer;
    margin-bottom: 0.25rem;
    transition: all var(--transition-quick) ease;
  }
  .lesson-template-item:hover {
    background: color-mix(in srgb, var(--brand-primary) 15%, transparent);
    border-color: color-mix(in srgb, var(--brand-primary-light) 45%, transparent);
  }
  .lesson-template-label {
    font-size: 0.875rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lesson-template-desc {
    font-size: 0.75rem;
    color: var(--theme-text-muted);
    margin-top: 0.15rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lesson-template-phase-count {
    color: var(--theme-accent-cyan);
    margin-left: 0.3rem;
  }
  .lesson-template-loading {
    padding: 0.4rem 0.7rem;
    font-size: 0.875rem;
    color: var(--theme-text-muted);
    font-style: italic;
  }

  /* ===== Profile row: アイコンボタン + 状態バッジ + 編集中バー ===== */
  .profile-badge {
    padding: 0.15rem 0.45rem;
    /* 「🟢 公開中」等の機能的な状態テキスト。 旧 0.65rem(10.4px) は design system 下限
       (--font-size-xs 12px) を割っていたため、 教師が公開状態を読み取る文字として小さすぎた。 */
    font-size: var(--font-size-xs);
    border-radius: 0.25rem;
    flex-shrink: 0;
    line-height: 1.2;
  }
  .profile-badge-active {
    background: color-mix(in srgb, var(--theme-accent-cyan-deep) 40%, transparent);
    color: var(--theme-accent-cyan);
  }
  .profile-badge-published {
    background: rgb(5, 150, 105);
    color: #fff;
  }
  .profile-icon-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 0.5rem;
    color: var(--theme-text-secondary);
    padding: 0.15rem 0.4rem;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all var(--transition-fast) ease;
    flex-shrink: 0;
  }
  .profile-icon-load:hover {
    background: color-mix(in srgb, var(--brand-primary) 25%, transparent);
    border-color: color-mix(in srgb, var(--brand-primary-light) 45%, transparent);
    /* color:#fff 廃止 (light mode で淡 brand 地に白文字が消える)。 base 色を継承。 */
  }
  .profile-icon-delete {
    color: color-mix(in srgb, var(--status-error) 85%, transparent);
  }
  .profile-icon-delete:hover {
    background: color-mix(in srgb, var(--status-error) 20%, transparent);
    border-color: color-mix(in srgb, var(--status-error) 45%, transparent);
    /* color:#fff 廃止 (light mode で淡赤地に白文字が消える)。 base の status-error を継承。 */
  }
  /* ロード中の行を highlight */
  .profile-row.profile-row-loading {
    background: color-mix(in srgb, var(--brand-primary) 15%, transparent) !important;
    border-color: color-mix(in srgb, var(--brand-primary-light) 60%, transparent) !important;
    opacity: 0.7;
    pointer-events: none;
  }
  /* 名前 (dblclick で rename 可能) */
  .profile-name {
    cursor: text;
  }
  .profile-name:hover {
    text-decoration: underline dotted var(--theme-border-normal);
    text-underline-offset: 3px;
  }
  .profile-rename-input {
    width: 100%;
    background: var(--theme-card-3);
    border: 1px solid color-mix(in srgb, var(--brand-primary-light) 60%, transparent);
    border-radius: 0.25rem;
    color: var(--theme-text-primary);
    font-size: 0.75rem;
    padding: 0.1rem 0.3rem;
    outline: none;
  }

  /* 💾 更新ボタン (active row のみ表示) */
  .profile-icon-update {
    background: color-mix(in srgb, var(--theme-accent-cyan-strong) 18%, transparent);
    border-color: color-mix(in srgb, var(--theme-accent-cyan-strong) 45%, transparent);
    color: var(--theme-accent-cyan);
  }
  .profile-icon-update:hover {
    background: color-mix(in srgb, var(--theme-accent-cyan-strong) 40%, transparent);
    border-color: color-mix(in srgb, var(--theme-accent-cyan-strong) 70%, transparent);
    /* color:#fff 廃止 (light mode で淡シアン地に白文字が消える)。 base の accent-cyan を継承。 */
  }

  /* ===== Phase 追加 dropdown (Wizard Step 2) ===== */
  .phase-add-picker {
    position: relative;
    display: inline-block;
  }
  .phase-add-picker > summary {
    list-style: none;
    cursor: pointer;
  }
  .phase-add-picker > summary::-webkit-details-marker { display: none; }
  .phase-add-menu {
    position: absolute;
    left: 50%; top: 100%;
    transform: translateX(-50%);
    margin-top: 0.4rem;
    min-width: 220px;
    background: var(--theme-card-3);
    border: 1px solid color-mix(in srgb, var(--theme-accent-cyan-strong) 50%, transparent);
    border-radius: 0.5rem;
    padding: 0.35rem;
    box-shadow: 0 12px 36px rgba(0, 0, 0, 0.5);
    z-index: 50;
  }
  .phase-add-menu-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 0.5rem 0.7rem;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 0.5rem;
    color: var(--theme-text-primary);
    font-size: 0.875rem;
    cursor: pointer;
    transition: all var(--transition-fast) ease;
  }
  .phase-add-menu-item:hover {
    background: color-mix(in srgb, var(--theme-accent-cyan-strong) 15%, transparent);
    border-color: color-mix(in srgb, var(--theme-accent-cyan-strong) 40%, transparent);
  }

  /* ===== テンプレフォーム作成 dropdown ===== */
  .template-form-picker {
    position: relative;
    display: inline-block;
  }
  .template-form-picker > summary {
    list-style: none;
    cursor: pointer;
  }
  .template-form-picker > summary::-webkit-details-marker { display: none; }
  .template-form-menu {
    position: absolute;
    left: 0; top: 100%;
    margin-top: 0.4rem;
    min-width: 280px;
    background: var(--theme-card-3);
    border: 1px solid color-mix(in srgb, var(--brand-primary-light) 50%, transparent);
    border-radius: 0.5rem;
    padding: 0.4rem;
    box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
    z-index: 50;
  }
  .template-form-item {
    display: flex;
    flex-direction: column;
    width: 100%;
    text-align: left;
    padding: 0.5rem 0.7rem;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 0.5rem;
    color: var(--theme-text-primary);
    cursor: pointer;
    margin-bottom: 0.2rem;
    transition: all var(--transition-fast) ease;
  }
  .template-form-item:hover {
    background: color-mix(in srgb, var(--brand-primary) 15%, transparent);
    border-color: color-mix(in srgb, var(--brand-primary-light) 45%, transparent);
  }
  .template-form-label { font-size: 0.875rem; font-weight: 600; }
  .template-form-desc {
    font-size: 0.75rem;
    color: var(--theme-text-muted);
    margin-top: 0.1rem;
  }

  /* Step 3 confirm: phase 詳細リスト */
  .confirm-phase-list {
    margin: 0;
    padding-left: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .confirm-phase-row {
    display: flex;
    gap: 0.7rem;
    align-items: flex-start;
    padding: 0.5rem 0.7rem;
    background: var(--theme-card-1);
    border: 1px solid var(--theme-border-subtle);
    border-radius: 0.5rem;
    font-size: 0.875rem;
  }
  .confirm-phase-idx {
    color: var(--theme-accent-cyan);
    font-weight: 600;
    min-width: 5.5rem;
    font-size: 0.75rem;
  }
  .confirm-phase-body {
    flex: 1;
    color: var(--theme-text-primary);
    line-height: 1.5;
  }
