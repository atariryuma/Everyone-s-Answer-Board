<style>
/* =============================================================================
 * Page.html Specific Styles
 * Dependencies: UnifiedStyles.css.html provides CSS variables and common styles
 * Optimized: 2025-09-17 - Unified media queries and performance optimization
 * ============================================================================= */

/* =============================================================================
 * Header redesign (v2674): Bento Grid 2-3 row layout
 *   - Row 1: identity + phase pills + filters + admin actions (1行に集約)
 *   - Row 2: 設問テキスト (中央配置で focus)
 *   - Row 3: 編集者ツール (editor only, 空なら display:none)
 *   - 横幅を grid template で明示配分し、無駄な空白を解消
 *   - body.is-editor / .is-viewer で editor-only 要素を CSS で表示制御
 * ============================================================================= */
.eab-header {
  padding: 0.6rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  margin-bottom: 0.75rem;
}

.eab-row {
  width: 100%;
}

/* Row 1: identity / phase / filters / actions を 1 行に
 *   grid template:
 *     col1 auto       = identity pill (form link、未設定なら 0 幅)
 *     col2 1fr        = phase host (中央伸縮、pills が並ぶ)
 *     col3 auto       = filters (count + class + sort)
 *     col4 auto       = actions (status + admin) */
.eab-row-meta {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto auto;
  align-items: center;
  gap: 0.6rem;
  min-height: 2.25rem;
}

/* Identity (form link) */
.eab-identity-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.35rem 0.65rem;
  background: rgba(56, 189, 248, 0.1);
  border: 1px solid rgba(56, 189, 248, 0.3);
  border-radius: 0.5rem;
  color: #38bdf8;
  font-size: 0.78rem;
  font-weight: 500;
  transition: background-color 0.15s, color 0.15s, transform 0.15s;
  white-space: nowrap;
  /* v2678: 長いフォームタイトル (Forms 命名「【振り返り】... (道徳5/14 振り返り)」など)
     がヘッダーを支配しないように省略表示。フルテキストは title 属性で tooltip 表示。 */
  max-width: min(45ch, 35vw);
  overflow: hidden;
  text-overflow: ellipsis;
}
.eab-identity-pill > .eab-pill-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}
.eab-identity-pill:hover {
  background: rgba(56, 189, 248, 0.2);
  color: #67e8f9;
}
.eab-identity-pill:focus-visible {
  outline: 2px solid rgba(56, 189, 248, 0.6);
  outline-offset: 1px;
}

/* Phase pills container — JS が #vizProfilePills を中に注入 */
.eab-phase-host {
  display: flex;
  justify-content: center;
  align-items: center;
  min-width: 0;
  overflow: hidden;
}

/* Filters group */
.eab-filters {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  flex-shrink: 0;
}
.eab-count-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.35rem 0.65rem;
  background: rgba(31, 41, 55, 0.55);
  border: 1px solid rgba(75, 85, 99, 0.45);
  border-radius: 0.5rem;
  color: #e5e7eb;
  font-size: 0.78rem;
  white-space: nowrap;
}
.eab-select-wrap {
  position: relative;
  display: inline-block;
}
.eab-select {
  background: rgba(55, 65, 81, 0.9);
  border: 1px solid #4b5563;
  border-radius: 0.5rem;
  padding: 0.35rem 1.7rem 0.35rem 0.7rem;
  font-size: 0.78rem;
  color: #e5e7eb;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.eab-select:focus-visible {
  outline: none;
  border-color: rgba(56, 189, 248, 0.6);
  box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.25);
}
.eab-select-caret {
  position: absolute;
  right: 0.55rem;
  top: 50%;
  transform: translateY(-50%);
  color: #9ca3af;
  pointer-events: none;
}

/* Actions group: status + admin */
.eab-actions {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  flex-shrink: 0;
  justify-content: flex-end;
}
.eab-status {
  color: var(--brand-text-muted, #94a3b8);
  font-size: 0.7rem;
  opacity: 0.72;
  white-space: nowrap;
}
.eab-status:empty {
  display: none;
}
.eab-icon-btn {
  background: transparent;
  border: 1px solid rgba(148, 163, 184, 0.25);
  border-radius: 0.45rem;
  padding: 0.3rem 0.4rem;
  color: #94a3b8;
  transition: background-color 0.15s, color 0.15s, transform 0.15s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.eab-icon-btn:hover {
  background: rgba(56, 189, 248, 0.12);
  color: #67e8f9;
}
.eab-icon-btn:focus-visible {
  outline: 2px solid rgba(56, 189, 248, 0.6);
  outline-offset: 1px;
}
/* v2678: 「公開を終了」は destructive アクションだが終了時にしか押さないため、
   常時表示で flat orange だと頻繁な閲覧 UI で目立ちすぎる。
   通常時は subtle (border + faded orange)、hover で saturate するパターンに。 */
.eab-end-pub-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.3rem 0.55rem;
  background: rgba(234, 88, 12, 0.18);
  border: 1px solid rgba(234, 88, 12, 0.55);
  border-radius: 0.4rem;
  color: #fdba74;
  font-size: 0.73rem;
  font-weight: 500;
  transition: background-color 0.15s, color 0.15s, border-color 0.15s;
}
.eab-end-pub-btn:hover {
  background: rgba(234, 88, 12, 0.9);
  border-color: rgba(234, 88, 12, 0.9);
  color: #ffffff;
}
.eab-end-pub-btn:focus-visible {
  outline: 2px solid rgba(234, 88, 12, 0.7);
  outline-offset: 1px;
}

/* Row 2: 設問テキスト (中央配置、ピンクで focus) */
.eab-row-question {
  display: flex;
  justify-content: center;
  padding: 0.2rem 0 0.1rem;
}
.eab-question {
  font-weight: 700;
  line-height: 1.25;
  font-size: 1.5rem;
  text-align: center;
  max-width: min(100%, 60rem);
  margin: 0;
}
@media (min-width: 640px) { .eab-question { font-size: 1.65rem; } }
@media (min-width: 768px) { .eab-question { font-size: 1.85rem; } }
@media (min-width: 1024px) { .eab-question { font-size: 2.1rem; } }

/* Row 3: editor tools — viz toolbar が ensureViewToolbar で注入。空なら非表示 */
.eab-row-tools:empty {
  display: none;
}
.eab-row-tools {
  padding-top: 0.35rem;
  border-top: 1px solid rgba(148, 163, 184, 0.12);
}

/* Editor-only visibility via body class:
 *   設計: setupEditorState() で body.classList.toggle('is-editor', isEditor)。
 *   editor-only / editor-only-row クラスを CSS で hidden 制御することで
 *   従来の .hidden JS トグルを排除し、保守性向上。 */
body:not(.is-editor) .editor-only,
body:not(.is-editor) .editor-only-row {
  display: none !important;
}
/* Admin-mode-only visibility (v2680):
 *   ⚙ クリックで toggleAdminMode が body.admin-mode を toggle する。
 *   admin-mode-only 要素は管理モード ON 時のみ表示。
 *   用途: 公開を終了など destructive action を、明示的に管理モードへ
 *   入った教師にのみ表示することで、通常時の視覚ノイズと誤操作を削減。 */
body:not(.admin-mode) .admin-mode-only {
  display: none !important;
}

/* Mobile: Row 1 を縦積み (auto-flow) — タブ/フィルタが折り返さないように個別行に */
@media (max-width: 768px) {
  .eab-row-meta {
    grid-template-columns: 1fr;
    grid-auto-rows: auto;
    gap: 0.4rem;
  }
  .eab-actions { justify-content: flex-end; }
  .eab-filters { flex-wrap: wrap; }
}



/* =============================================================================
 * Page-specific Component Styles
 * ============================================================================= */

/* Game button overrides - enhanced tactile feedback */
.game-btn {
  border-bottom-width: 4px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
}
.game-btn:not(:disabled):hover {
  transform: translate3d(0, -2px, 0); 
  box-shadow: 0 8px 16px rgba(0,0,0,0.3);
}
.game-btn:active:not(:disabled) { 
  transform: translate3d(0, 2px, 0); 
  border-bottom-width: 2px; 
}
.game-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
#classFilter, #sortOrder { 
  background-color: var(--status-info); 
  border: var(--border-primary); 
  color: var(--brand-text); 
  border-radius: var(--radius-lg); 
  padding: var(--space-2) var(--space-3); 
  transition: border-color var(--transition-normal) var(--transition-easing),
              box-shadow var(--transition-normal) var(--transition-easing);
}
#classFilter:focus, #sortOrder:focus {
  border-color: var(--brand-primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}
:focus-visible { 
  outline: 3px solid var(--brand-primary); 
  outline-offset: 2px; 
  border-radius: var(--radius-lg); 
}
header {
  position: sticky;
  top: 0;
  z-index: var(--z-elevated);
  contain: layout;
  backdrop-filter: var(--glass-backdrop);
  -webkit-backdrop-filter: var(--glass-backdrop);
  transition: transform 0.25s ease-out;
  will-change: transform;
}
/* Why: 下スクロール時にヘッダーを隠して、回答カードの表示領域を最大化する。
   上スクロールで戻すことで、並び替え・クラスフィルターへのアクセスも即座に復帰する。 */
header.header-hidden {
  transform: translateY(-110%);
}
@media (prefers-reduced-motion: reduce) {
  header { transition: none; }
}

/* Pull-to-refresh indicator。
   Why: 見た目を #newContentBanner と揃える（どちらも「上から降りてくる通知系 pill」）。
        gradient + rounded-full + white text で視覚言語を統一する。 */
#pull-to-refresh-indicator {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translate(-50%, -120%);
  z-index: 70;
  background: linear-gradient(to right, #2563eb, #7c3aed);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 9999px;
  padding: 0.5rem 1rem;
  font-size: 0.875rem;
  font-weight: 500;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(8px);
  pointer-events: none;
  /* transform は JS が指に追随させるため transition から外す。opacity / border-color だけ CSS 側。 */
  transition: opacity 0.2s ease-out, border-color 0.15s ease-out, box-shadow 0.15s ease-out;
  opacity: 0;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
#pull-to-refresh-indicator.active {
  opacity: 1;
}
#pull-to-refresh-indicator.ready {
  /* しきい値到達の触覚フィードバック代替: ボーダーをハイライトして発火予告。 */
  border-color: #fde047;           /* yellow-300 */
  box-shadow: 0 10px 24px rgba(253, 224, 71, 0.45);
}
#pull-to-refresh-indicator .ptr-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255, 255, 255, 0.35);
  border-top-color: #ffffff;
  border-radius: 50%;
  animation: ptr-spin 0.8s linear infinite;
}
@keyframes ptr-spin {
  to { transform: rotate(360deg); }
}

/* 引き下げ中はボディが指に追随する（ラバーバンド効果）。
   Why: will-change はレイヤー永久昇格で低スペック GPU にはメモリ圧迫要因。
        ドラッグ中だけ .ptr-pulling を付けて昇格させ、終われば剥がす方式にする。 */
#main-container.ptr-pulling {
  will-change: transform;
}
/* Why: iOS Safari は scrollY=0 で下に引くと native rubber-band を出す。
   我々の JS と二重に動くので contain で native 側を抑止する。
   overflow-anchor: none は、新着カードが入ったときの自動スクロール調整を防ぐ。 */
html, body {
  overscroll-behavior-y: contain;
  overflow-anchor: none;
}
#main-container.ptr-releasing {
  /* リリース時のみ spring 風 easing で 0 へ戻す。引き下げ中は JS が直接 transform 操作。 */
  transition: transform 0.35s cubic-bezier(0.22, 1.35, 0.4, 1);
}
@media (prefers-reduced-motion: reduce) {
  #pull-to-refresh-indicator .ptr-spinner { animation: none; }
  #main-container.ptr-releasing { transition: transform 0.1s linear; }
}
.answer-card { 
  transition: transform var(--animation-normal) var(--transition-easing),
              box-shadow var(--animation-normal) var(--transition-easing);
  border-radius: 1rem;
  contain: layout style;
  position: relative;
  overflow: hidden;
}
.answer-card.highlighted {
  border-image: linear-gradient(45deg, var(--brand-highlight), var(--brand-highlight-alt), var(--brand-highlight)) 1 !important;
  border-width: 4px !important;
  box-shadow:
    0 0 25px rgba(147, 51, 234, 0.6),
    inset 0 0 20px rgba(192, 132, 252, 0.1),
    0 8px 32px rgba(147, 51, 234, 0.2);
  transform: scale(1.02);
  position: relative;
}
.answer-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0,0,0,0.2);
}
.answer-card.loading {
  opacity: 0.7;
}

.answer-card.loading .reaction-btn,
.answer-card.loading .highlight-btn {
  opacity: 0.5;
}
.reaction-btn {
  transition: transform var(--transition-normal) var(--transition-easing),
              background-color var(--transition-normal) var(--transition-easing),
              box-shadow var(--transition-normal) var(--transition-easing);
  position: relative;
  overflow: hidden;
}
.reaction-btn:hover {
  transform: scale(1.1);
}
.reaction-btn:active {
  transform: scale(0.95);
}
.reaction-btn.reacted {
  transform: scale(1.05);
}

/* Specific reacted styles for each reaction type - icon fill only */
.reaction-btn.reacted.text-red-500 {
  color: #ef4444 !important;
}

.reaction-btn.reacted.text-yellow-500 {
  color: #fbbf24 !important;
}

.reaction-btn.reacted.text-green-500 {
  color: #10b981 !important;
}

.reaction-btn svg,
.like-btn svg {
  transition: transform var(--transition-normal) var(--transition-easing);
  /* fill property は JavaScript の SVG 置き換えで直接設定 */
}

/* ✅ Removed conflicting CSS rules that override SVG replacement logic */
.reaction-btn.loading,
.like-btn.loading {
  opacity: 0.6;
}
.fade-in {
  animation: fadeIn 0.5s ease-out;
}
.admin-toggle {
  transition: background-color var(--animation-normal) var(--transition-easing);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
.admin-toggle:hover {
  background-color: rgba(139, 233, 253, 0.1);
}
/* Spinner definition moved to UnifiedStyles.css.html - use .spinner-medium for 40px spinner */

/* Notification Banner Base and Animation Classes */
.notification-banner-base {
  transform: translate(-50%, 0);
}

.notification-banner-enter {
  animation: fadeInFromTop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.notification-banner-exit {
  animation: fadeOut 0.3s ease-out forwards;
}

/* Removed duplicate @keyframes definitions - now using UnifiedStyles.css.html versions */

/* =============================================================================
 * Performance Optimizations - Mobile First Approach
 * Unified media queries for better maintainability and reduced CSS size
 * ============================================================================= */
@media (max-width: 768px) {
  :root {
    --backdrop-blur: 0px;
    --transition-duration: 0.1s;
    --animation-duration: 0.1s;
  }

  .glass-panel {
    -webkit-backdrop-filter: none;
    backdrop-filter: none;
    background: var(--brand-surface);
  }

  .answer-card:hover {
    transform: none;
  }

  .answer-card {
    margin-bottom: 1rem;
  }

  .game-btn {
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
  }

  header {
    padding: 1rem;
  }
}

/* High performance display optimizations */
@media (min-width: 1280px) {
  :root {
    --transition-duration: 0.15s;
    --animation-duration: 0.2s;
  }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
  :root {
    --transition-duration: 0s;
    --animation-duration: 0s;
    --backdrop-blur: 0px;
  }

  *,
  *::before,
  *::after {
    animation: none !important;
    transition: none !important;
  }
}

/* Performance optimizations for low-end devices */
.low-performance .answer-card {
  contain: layout style paint;
}

.low-performance .answer-card:hover {
  transform: none;
  box-shadow: var(--shadow-sm);
}

.low-performance .glass-panel {
  -webkit-backdrop-filter: none;
  backdrop-filter: none;
}

/* Optimize for high DPI displays */
@media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
  .answer-card {
    backface-visibility: hidden;
    perspective: 1000px;
  }
}
/* Why: 更新で新しく追加された回答を 2.5 秒だけ pulse で強調する。教師や生徒が
   「今届いた投稿」を一目で見つけられるようにする。初期ロード時は全件が new なので
   クライアント側で add せず、refresh 経由でのみ付与する（performMainRendering 側で制御）。*/
.answer-card.new-card {
  animation: newCardPulse 2.5s ease-out;
}
@keyframes newCardPulse {
  0%   { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); transform: translateY(4px); opacity: 0.6; }
  15%  { box-shadow: 0 0 0 8px rgba(251, 191, 36, 0.4); transform: translateY(0); opacity: 1; }
  100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
}
@media (prefers-reduced-motion: reduce) {
  .answer-card.new-card { animation: none; }
}
.highlight-badge {
  position: absolute;
  top: 0.25rem;
  right: 0.25rem;
  width: 1.5rem;
  height: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--brand-accent);
  background: none;
  border: none;
  padding: 0;
  transition: transform 0.2s, opacity 0.2s;
}
/* Why: 0.3 は暗い背景のカード上ではほぼ不可視で、編集者がクリック対象と
   認識できず「ハイライトができない」と報告されていた。0.65 まで上げて
   存在を明示しつつ、active との差（1.0）でハイライト済みが一目で分かるようにする。 */
button.highlight-badge {
  opacity: 0.65;
}
button.highlight-badge.active {
  opacity: 1;
}
button.highlight-badge:hover {
  transform: scale(1.3);
  opacity: 1;
}
/* Single reaction borders with higher specificity */
.answer-card.reaction-bg-like { border-color: var(--brand-like); }
.answer-card.reaction-bg-understand { border-color: var(--brand-understand); }
.answer-card.reaction-bg-curious { border-color: var(--brand-curious); }

/* Multiple reaction borders with gradient - higher specificity */
.answer-card.reaction-bg-like-understand { border-image: linear-gradient(45deg, var(--brand-like), var(--brand-understand)) 1; }
.answer-card.reaction-bg-like-curious { border-image: linear-gradient(45deg, var(--brand-like), var(--brand-curious)) 1; }
.answer-card.reaction-bg-understand-curious { border-image: linear-gradient(45deg, var(--brand-understand), var(--brand-curious)) 1; }
.answer-card.reaction-bg-like-understand-curious { border-image: linear-gradient(45deg, var(--brand-like), var(--brand-understand), var(--brand-curious)) 1; }
.reaction-border-1 { border-width: 2px; border-style: solid; }
.reaction-border-2 { border-width: 4px; border-style: solid; }
.reaction-border-3 { border-width: 6px; border-style: solid; }
.answer-card {
  height: 220px;
  min-height: 180px;
}

@media (max-width: 640px) {
  .answer-card {
    height: auto;
    min-height: 160px;
    max-height: 260px;
  }
}
.answer-preview {
  min-height: 60px;
  max-height: 140px;
  overflow: hidden;
}

.opinion-text,
.answer-preview p {
  display: -webkit-box;
  -webkit-line-clamp: 4;
  line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* ✅ 共通スピナーベーススタイル - DRY原則適用 */
.like-btn.loading::after,
.highlight-btn.loading::after {
  content: "";
  position: absolute;
  inset: 0;
  border: 2px solid transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  width: 16px;
  height: 16px;
  margin: auto;
}

/* リアクションタイプ別スピナー色 - アイコン色と完全一致 */
.like-btn.loading.text-red-500::after {
  border-top: 2px solid #ef4444; /* LIKE - 赤色 */
}

.like-btn.loading.text-yellow-500::after {
  border-top: 2px solid #fbbf24; /* UNDERSTAND - 黄色 */
}

.like-btn.loading.text-green-500::after {
  border-top: 2px solid #10b981; /* CURIOUS - 緑色 */
}

/* ハイライトボタン専用スピナー色 */
.highlight-btn.loading::after {
  border-top: 2px solid var(--brand-accent);
}

/* フォールバック: 色クラスが指定されていない場合はデフォルト色（ハイライトボタンを除外） */
.like-btn.loading:not(.text-red-500):not(.text-yellow-500):not(.text-green-500):not(.highlight-btn)::after {
  border-top: 2px solid #67e8f9; /* デフォルト - シアン */
}
.highlight-btn { 
  transition: background var(--transition-normal) var(--transition-easing),
