<script>
  /* =============================================================================
     みんなの回答ボード - Shared JavaScript Utilities
     GAS Compatible utility functions for all HTML files
     ============================================================================= */

  // GAS iframe/sandbox環境の既知の警告・エラーを抑制
  // Tailwind関連はSharedTailwindConfig.htmlで処理済み
  (function () {
    const gasSuppressPatterns = [
      'Unrecognized feature',
      'ambient-light-sensor',
      'speaker',
      'vibrate',
      'vr',
      'sandboxing',
      'iframe which has both allow-scripts',
      'can escape its sandboxing',
      'Unsafe attempt to initiate navigation',
      'about:blank'
    ];

    const originalWarn = window.console.warn;
    const originalError = window.console.error;

    window.console.warn = function (...args) {
      const message = String(args[0] || '');
      if (gasSuppressPatterns.some(p => message.includes(p))) return;
      originalWarn.apply(console, args);
    };

    window.console.error = function (...args) {
      const message = String(args[0] || '');
      if (gasSuppressPatterns.some(p => message.includes(p))) return;
      originalError.apply(console, args);
    };

    window.addEventListener('unhandledrejection', function (event) {
      const reason = event.reason?.toString() || '';
      if (gasSuppressPatterns.some(p => reason.includes(p))) {
        event.preventDefault();
        return;
      }

      const isUserImpacting = reason.includes('Failed to fetch') ||
        reason.includes('Network request failed') ||
        reason.includes('google.script.run') ||
        reason.includes('timeout');

      if (isUserImpacting && window.notifications) {
        window.notifications.warning('通信エラーが発生しました。しばらく待ってから再試行してください。', 6000);
      }

      console.warn('Unhandled promise rejection:', event.reason);
    });

  })();



  class DebounceManager {
    constructor() {
      this.timers = new Map();
    }

    debounce(func, key, delay = 1000) {
      if (this.timers.has(key)) {
        this.timers.delete(key);
      }

      const createPromiseDelay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      const debouncePromise = createPromiseDelay(delay).then(() => {
        if (this.timers.get(key) === debouncePromise) {
          func();
          this.timers.delete(key);
        }
      }).catch(() => {
        this.timers.delete(key);
      });

      this.timers.set(key, debouncePromise);
    }

    clear(key) {
      this.timers.delete(key);
    }

    clearAll() {
      this.timers.clear();
    }
  }

  class ThrottleManager {
    constructor() {
      this.timers = new Map();
      this.lastExecution = new Map();
    }

    throttle(func, key, delay = 100) {
      const now = Date.now();
      const lastRun = this.lastExecution.get(key) || 0;

      if (now - lastRun >= delay) {
        func();
        this.lastExecution.set(key, now);
      } else if (!this.timers.has(key)) {
        const createPromiseDelay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        const delayTime = delay - (now - lastRun);
        const throttlePromise = createPromiseDelay(delayTime).then(() => {
          if (this.timers.get(key) === throttlePromise) {
            func();
            this.lastExecution.set(key, Date.now());
            this.timers.delete(key);
          }
        }).catch(() => {
          this.timers.delete(key);
        });

        this.timers.set(key, throttlePromise);
      }
    }

    clear(key) {
      this.timers.delete(key);
      this.lastExecution.delete(key);
    }

    clearAll() {
      this.timers.clear();
      this.lastExecution.clear();
    }
  }



  class Cache {
    constructor(maxSize = 100, defaultTTL = 300000) {
      this.cache = new Map();
      this.timestamps = new Map();
      this.ttls = new Map();
      this.maxSize = maxSize;
      this.defaultTTL = defaultTTL;
    }

    set(key, value, ttl = null) {
      const now = Date.now();
      const actualTTL = ttl || this.defaultTTL;

      if (this.cache.size >= this.maxSize && !this.cache.has(key)) {
        this.removeOldest();
      }

      this.cache.set(key, value);
      this.timestamps.set(key, now);
      this.ttls.set(key, actualTTL);
    }

    get(key) {
      if (!this.cache.has(key)) {
        return null;
      }

      const now = Date.now();
      const timestamp = this.timestamps.get(key);
      const ttl = this.ttls.get(key);

      if (now - timestamp > ttl) {
        this.delete(key);
        return null;
      }

      return this.cache.get(key);
    }

    has(key) {
      return this.get(key) !== null;
    }

    delete(key) {
      this.cache.delete(key);
      this.timestamps.delete(key);
      this.ttls.delete(key);
    }

    clear() {
      this.cache.clear();
      this.timestamps.clear();
      this.ttls.clear();
    }

    removeOldest() {
      let oldestKey = null;
      let oldestTime = Infinity;

      for (const [key, timestamp] of this.timestamps) {
        if (timestamp < oldestTime) {
          oldestTime = timestamp;
          oldestKey = key;
        }
      }

      if (oldestKey) {
        this.delete(oldestKey);
      }
    }

    cleanup() {
      const now = Date.now();
      const expiredKeys = [];

      for (const [key, timestamp] of this.timestamps) {
        const ttl = this.ttls.get(key);
        if (now - timestamp > ttl) {
          expiredKeys.push(key);
        }
      }

      expiredKeys.forEach((key) => this.delete(key));
    }

    get size() {
      this.cleanup(); // Clean expired entries before returning size
      return this.cache.size;
    }

    getStats() {
      this.cleanup();
      return {
        size: this.cache.size,
        maxSize: this.maxSize,
        defaultTTL: this.defaultTTL,
      };
    }
  }


  /**
   * 統一データローディングAPI - GAS 2025ベストプラクティス準拠
   * 非同期データローディング、キャッシング、エラーハンドリングを統合
   */
  class UnifiedDataLoader {
    constructor() {
      this.loadingStates = new Map();
      this.cache = new Map();
      this.abortControllers = new Map();
      this.retryAttempts = new Map();
      this.maxRetries = 3;
      this.defaultTimeout = 30000;
      // Long-running sessions (admin panel) accumulate distinct cache keys per
      //   JSON.stringify(args) suffix. Cap to bound memory; LRU via insertion order.
      this.cacheMaxSize = 50;
    }

    /**
     * データ読み込みの統一エントリーポイント
     * @param {string} functionName - GAS関数名
     * @param {Object} options - 読み込みオプション
     * @param {...any} args - GAS関数への引数
     * @returns {Promise} データ読み込み結果
     */
    async loadData(functionName, options = {}, ...args) {
      const {
        cache = true,
        cacheKey = null,
        cacheTTL = 300000, // 5分
        showLoading = true,
        loadingMessage = 'データを読み込み中...',
        retryOnError = true,
        timeout = this.defaultTimeout
      } = options;

      const funcName = functionName || 'unknown';
      const finalCacheKey = cacheKey || `${funcName}_${JSON.stringify(args || []).substring(0, 50)}`;
      const requestId = `${funcName}_${Date.now()}`;

      try {
        if (cache && this.cache.has(finalCacheKey)) {
          const cached = this.cache.get(finalCacheKey);
          if (Date.now() - cached.timestamp < cacheTTL) {
            return cached.data;
          }
          this.cache.delete(finalCacheKey);
        }

        if (showLoading) {
          this.setLoadingState(requestId, true, loadingMessage);
        }

        const result = await this.executeGASCall(functionName, timeout, ...args);

        if (cache && result) {
          if (this.cache.size >= this.cacheMaxSize) {
            const oldestKey = this.cache.keys().next().value;
            if (oldestKey !== undefined) this.cache.delete(oldestKey);
          }
          this.cache.set(finalCacheKey, {
            data: result,
            timestamp: Date.now()
          });
        }

        return result;

      } catch (error) {
        console.error(`❌ [UnifiedDataLoader] ${funcName} エラー:`, error);

        if (retryOnError && this.shouldRetry(requestId)) {
          return this.loadData(functionName, { ...options, retryOnError: false }, ...args);
        }

        throw error;
      } finally {
        if (showLoading) {
          this.setLoadingState(requestId, false);
        }
        this.cleanup(requestId);
      }
    }

    /**
     * バッチデータ読み込み - 複数のGAS関数を並列実行
     * @param {Array} requests - [{functionName, args, options}] の配列
     * @returns {Promise<Array>} 各リクエストの結果配列
     */
    async loadBatchData(requests) {

      const promises = requests.map((request, index) => {
        const { functionName, args = [], options = {} } = request;
        return this.loadData(functionName, {
          ...options,
          showLoading: false, // バッチでは個別ローディングを無効化
        }, ...args).catch(error => {
          console.error(`❌ [UnifiedDataLoader] バッチ${index || 0}: ${functionName || 'unknown'} エラー:`, error);
          return { error: error.message, functionName };
        });
      });

      return Promise.all(promises);
    }

    /**
     * GAS関数の実際の実行
     * @param {string} functionName - 関数名
     * @param {number} timeout - タイムアウト時間
     * @param {...any} args - 引数
     * @returns {Promise} 実行結果
     */
    executeGASCall(functionName, timeout, ...args) {
      return new Promise((resolve, reject) => {
        if (typeof google === 'undefined' || !google.script?.run) {
          reject(new Error('Google Apps Script環境が利用できません'));
          return;
        }

        // setTimeout instead of microtask-recursion: avoid 100% CPU during
        // the wait. See matching fix in verifyAuthentication() above.
        let completed = false;
        const timeoutId = setTimeout(() => {
          if (!completed) {
            completed = true;
            reject(new Error(`タイムアウト: ${functionName || 'unknown'} (${timeout || 0}ms)`));
          }
        }, timeout);

        google.script.run
          .withSuccessHandler((result) => {
            if (!completed) {
              completed = true;
              clearTimeout(timeoutId);
              resolve(result);
            }
          })
          .withFailureHandler((error) => {
            if (!completed) {
              completed = true;
              clearTimeout(timeoutId);
              console.error(`❌ [UnifiedDataLoader] ${functionName || 'unknown'} GAS実行エラー:`, error);
              reject(new Error(error.message || error.toString()));
            }
          })
        [functionName](...args);
      });
    }

    /**
     * ローディング状態管理
     */
    setLoadingState(requestId, isLoading, message = '') {
      if (isLoading) {
        this.loadingStates.set(requestId, { message, startTime: Date.now() });
        if (window.unifiedLoading) {
          window.unifiedLoading.show(message);
        }
      } else {
        this.loadingStates.delete(requestId);
        if (window.unifiedLoading && this.loadingStates.size === 0) {
          window.unifiedLoading.hide();
        }
      }
    }

    /**
     * リトライ判定
     */
    shouldRetry(requestId) {
      const attempts = this.retryAttempts.get(requestId) || 0;
      if (attempts >= this.maxRetries) {
        return false;
      }
      this.retryAttempts.set(requestId, attempts + 1);
      return true;
    }

    /**
     * リクエスト後処理
     */
    cleanup(requestId) {
      this.loadingStates.delete(requestId);
      this.retryAttempts.delete(requestId);
      this.abortControllers.delete(requestId);
    }

    /**
     * キャッシュ管理
     */
    clearCache(pattern = null) {
      if (pattern) {
        for (const key of this.cache.keys()) {
          if (key.includes(pattern)) {
            this.cache.delete(key);
          }
        }
      } else {
        this.cache.clear();
      }
    }

    /**
     * 統計情報取得
     */
    getStats() {
      return {
        cacheSize: this.cache.size,
        activeRequests: this.loadingStates.size,
        totalRetries: Array.from(this.retryAttempts.values()).reduce((a, b) => a + b, 0)
      };
    }
  }

  window.unifiedDataLoader = new UnifiedDataLoader();

  class ErrorHandler {
    constructor() {
      this.errors = [];
      this.maxErrors = 50;
    }

    logError(error, context = '') {
      try {
        const errorInfo = {
          message: error?.message || error?.toString() || 'Unknown error',
          stack: error?.stack || 'No stack trace available',
          context: context || 'No context provided',
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent,
          errorType: typeof error,
          isObject: typeof error === 'object',
        };

        this.errors.push(errorInfo);

        if (this.errors.length > this.maxErrors) {
          this.errors.shift();
        }

        console.group('🚨 Error Logged');
        console.groupEnd();
      } catch (loggingError) {
        console.error('Error in error logging:', loggingError);
        console.error('Original error:', error);
      }
    }

    getRecentErrors(count = 10) {
      return this.errors.slice(-count);
    }

    clearErrors() {
      this.errors = [];
    }

    setupGlobalErrorHandling() {
      window.addEventListener('error', (event) => {
        this.logError(event.error, 'Global error handler');
      });

      window.addEventListener('unhandledrejection', (event) => {
        this.logError(event.reason, 'Unhandled promise rejection');
      });
    }
  }


  class LoadingManager {
    constructor() {
      this.loadingStates = new Map();
    }

    setLoading(key, isLoading, message = '') {
      this.loadingStates.set(key, { isLoading, message, timestamp: Date.now() });

      const event = new CustomEvent('loadingStateChange', {
        detail: { key, isLoading, message },
      });
      document.dispatchEvent(event);
    }

    isLoading(key) {
      const state = this.loadingStates.get(key);
      return state ? state.isLoading : false;
    }

    getLoadingMessage(key) {
      const state = this.loadingStates.get(key);
      return state ? state.message : '';
    }

    clearLoading(key) {
      this.loadingStates.delete(key);
      this.setLoading(key, false);
    }

    clearAllLoading() {
      const keys = Array.from(this.loadingStates.keys());
      keys.forEach((key) => this.clearLoading(key));
    }
  }


  // SECURITY UTILITIES

  class SecurityUtilities {
    escapeHtml(text) {
      if (!text) return '';
      // Why: div.innerHTML から得る出力は <, >, &, " はエスケープするが、ブラウザ実装に
      //      よっては ' を素通しする。HTML 属性値を build するときに `id='${escapeHtml(x)}'`
      //      のようなテンプレートが他箇所にあるため、' を明示的に &#39; に置換して XSS を防ぐ。
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML.replace(/'/g, '&#39;');
    }

    isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }
  }


  class PrivacyLogger {
    static anonymize(data) {
      if (typeof data === 'string') {
        if (data.includes('@')) {
          const parts = data.split('@');
          const safePart0 = (parts[0] && parts[0].substring) ? parts[0].substring(0, 2) : 'xx';
          const safePart1 = parts[1] || 'unknown';
          return `${safePart0}***@${safePart1}`;
        }
        if (data.length > 30) {
          const safeDataPrefix = (data && data.substring) ? data.substring(0, 15) : 'unknown';
          const safeDataLength = (data && data.length) || 0;
          return `${safeDataPrefix}...[${safeDataLength} chars]`;
        }
        return data;
      }

      if (typeof data === 'object' && data !== null) {
        const anonymized = {};
        for (const [key, value] of Object.entries(data)) {
          if (['email', 'userEmail', 'reason', 'opinion', 'answer', 'content'].includes(key)) {
            anonymized[key] = this.anonymize(value);
          } else if (key.includes('Id') && typeof value === 'string') {
            if (value && value.length && value.substring) {
              anonymized[key] = value.length > 8 ? `${value.substring(0, 4)}***` : value;
            } else {
              anonymized[key] = value;
            }
          } else {
            anonymized[key] = value;
          }
        }
        return anonymized;
      }

      return data;
    }

    static log(message, data = null) {
      if (data) {
      } else {
      }
    }

    static warn(message, data = null) {
      if (data) {
        console.warn(message, this.anonymize(data));
      } else {
        console.warn(message);
      }
    }

    static error(message, data = null) {
      if (data) {
        console.error(message, this.anonymize(data));
      } else {
        console.error(message);
      }
    }
  }

  /** Promise-based delay utility */
  window.createPromiseDelay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  /**
   * リダイレクト用モーダルを表示（GAS iFrame 対応）
   * Why: GAS iFrame ではコールバック内で window.open が動作しないため、
   *   ユーザークリックでユーザーアクティベーションを付与してから window.open する。
   *   公開ライフサイクル（公開を終了 / 再び公開）の後の遷移で共通利用。
   *
   * @param {Object} opts - { title, message, redirectUrl, buttonLabel?, variant? }
   *   variant: 'cyan' (default) | 'green'  ボタンの色
   */
  window.showRedirectModal = function (opts) {
    const { title, message, redirectUrl } = opts || {};
    const buttonLabel = (opts && opts.buttonLabel) || '回答ボードを開く';
    const variant = (opts && opts.variant) || 'cyan';
    const colorClasses = variant === 'green'
      ? 'from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700'
      : 'from-cyan-600 to-blue-600 hover:from-cyan-700 hover:to-blue-700';

    const existing = document.getElementById('redirect-modal');
    if (existing) existing.remove();

    const esc = (s) => (window.sharedUtilities && window.sharedUtilities.security)
      ? window.sharedUtilities.security.escapeHtml(s || '')
      : String(s || '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

    const modal = document.createElement('div');
    modal.id = 'redirect-modal';
    modal.className = 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-[10002]';
    modal.innerHTML = `
      <div class="glass-panel rounded-xl p-6 max-w-md w-full mx-4 text-center">
        <div class="text-theme-status-success mb-4">
          <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h3 class="text-xl font-bold text-theme mb-2">${esc(title)}</h3>
        <p class="text-theme-secondary mb-6">${esc(message)}</p>
        <button type="button" id="redirect-btn" class="w-full px-6 py-3 bg-gradient-to-r ${colorClasses} text-white rounded-lg font-semibold text-base transition-all transform hover:scale-105 shadow-lg">
          ${esc(buttonLabel)}
        </button>
      </div>
    `;
    document.body.appendChild(modal);

    const redirectBtn = document.getElementById('redirect-btn');
    redirectBtn.addEventListener('click', function () {
      if (redirectUrl) {
        window.open(redirectUrl, '_top');
      } else {
        const url = new URL(window.location.href);
        url.hash = '';
        window.open(url.toString(), '_top');
      }
    });
    redirectBtn.focus();
  };

  /**
   * window.modals.confirm/alert — ネイティブ confirm()/alert() の代替。
   *
   * Why: native confirm/alert はモバイルブラウザで OS native スタイルになり、 アプリ全体の
   *   グラスパネル UI と不一致。 さらに iframe 環境では同期ブロックを嫌う browser もある。
   * Promise を返すので `await modals.confirm('続けますか?')` で使える。
   *
   * @param {string} message
   * @param {Object} [opts] - { title?, okLabel?, cancelLabel?, variant? }
   *   variant: 'default' (cyan) | 'danger' (red) | 'success' (green)
   * @returns {Promise<boolean>}  confirm: OK で true / cancel または backdrop click で false。
   *                              alert: 常に true。
   */
  window.modals = {
    _build(opts) {
      const esc = (s) => window.sharedUtilities.security.escapeHtml(s || '');
      const variant = (opts && opts.variant) || 'default';
      const okClasses = {
        default: 'from-cyan-600 to-blue-600 hover:from-cyan-700 hover:to-blue-700',
        danger:  'from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700',
        success: 'from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700',
      }[variant] || 'from-cyan-600 to-blue-600 hover:from-cyan-700 hover:to-blue-700';

      const existing = document.getElementById('app-modal');
      if (existing) existing.remove();

      const modal = document.createElement('div');
      modal.id = 'app-modal';
      modal.className = 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-[10002]';
      const title = opts && opts.title ? `<h3 class="text-lg font-bold text-theme mb-3">${esc(opts.title)}</h3>` : '';
      const cancelBtn = (opts && opts.kind === 'confirm')
        ? `<button type="button" id="app-modal-cancel" class="flex-1 px-4 py-2.5 bg-theme-elevated hover:bg-slate-600 text-theme rounded-lg font-semibold transition-colors">${esc((opts && opts.cancelLabel) || 'キャンセル')}</button>`
        : '';
      const okLabel = (opts && opts.okLabel) || (opts && opts.kind === 'confirm' ? 'OK' : 'わかった');
      modal.innerHTML = `
        <div class="glass-panel rounded-xl p-6 max-w-md w-full mx-4">
          ${title}
          <p class="text-theme mb-5 whitespace-pre-wrap">${esc(opts && opts.message)}</p>
          <div class="flex gap-3">
            ${cancelBtn}
            <button type="button" id="app-modal-ok" class="flex-1 px-4 py-2.5 bg-gradient-to-r ${okClasses} text-white rounded-lg font-semibold transition-all">${esc(okLabel)}</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      return modal;
    },
    confirm(message, opts) {
      return new Promise((resolve) => {
        const modal = this._build({ ...(opts || {}), message, kind: 'confirm' });
        const cleanup = (result) => { modal.remove(); resolve(result); };
        modal.querySelector('#app-modal-ok').addEventListener('click', () => cleanup(true));
        modal.querySelector('#app-modal-cancel').addEventListener('click', () => cleanup(false));
        modal.addEventListener('click', (e) => { if (e.target === modal) cleanup(false); });
        modal.querySelector('#app-modal-ok').focus();
      });
    },
    alert(message, opts) {
      return new Promise((resolve) => {
        const modal = this._build({ ...(opts || {}), message, kind: 'alert' });
        const cleanup = () => { modal.remove(); resolve(true); };
        modal.querySelector('#app-modal-ok').addEventListener('click', cleanup);
        modal.addEventListener('click', (e) => { if (e.target === modal) cleanup(); });
        modal.querySelector('#app-modal-ok').focus();
      });
    },
  };

  /**
   * ButtonBusyManager — ボタン共通の「処理中」UX を一元化する。
   *
   * 採用基準 (各ページのボタン監査 2026-05-14 で確定):

  };

  window.setPartialLoading = function (loading, message) {
    if (loading) {
      const safeInfoMessage = message || '処理中...';
      window.showInfo(safeInfoMessage);

      const activeElements = document.querySelectorAll('.partial-loading-target');
      activeElements.forEach((el) => {
        el.classList.add('partial-loading');
        if (!el.dataset.originalText) {
          el.dataset.originalText = el.textContent;
        }
        el.textContent = '読み込み中...';
        el.disabled = true;
      });
    } else {
      const activeElements = document.querySelectorAll('.partial-loading');
      activeElements.forEach((el) => {
        el.classList.remove('partial-loading');
        if (el.dataset.originalText) {
          el.textContent = el.dataset.originalText;
          delete el.dataset.originalText;
        }
        el.disabled = false;
      });
    }
  };

  // WARNING SUPPRESSION は先頭のIIFE内で定義済みのため、ここでは不要


  /**
   * 通知システム（唯一の真実）。
   *
   * 全ページの通知はここを通る。 旧来の ad-hoc DOM (page.js.html の `__showBoardSwitchedToast` /
   * `showToast`, AppSetupPage の fallback 60行 DOM, Unpublished/SetupPage の local wrapper) は
   * 全て廃止し、 ここの `success/error/warning/info` (右上トースト) と `banner` (中央上バナー) に
   * 集約。
   *
   * API:
   *   notifications.success(msg, opts?)   // 右上トースト
   *   notifications.error(msg, opts?)
   *   notifications.warning(msg, opts?)
   *   notifications.info(msg, opts?)
   *   notifications.banner(msg, opts?)    // 中央上バナー (profile 切替 / 過去フェーズ閲覧 等)
   *   notifications.showMessage(msg, type, opts?)
   *
   * opts:
   *   { duration?: number, html?: string }
   *   - duration: 0 で永続。 未指定は type 別デフォルト (success/info=3s, warning=4s, error=5s, banner=3s)
   *   - html:    リッチ表示用 (XSS 注意 — 呼び出し側で escape 必須)
   *
   * 後方互換: opts が number の場合は `{ duration: number }` として扱う (旧 API)。
   */
  class NotificationSystem {
    constructor() {
      this.container = null;
      this.bannerEl = null;
      this.bannerTimer = null;
    }

    _normalizeOpts(opts) {
      if (typeof opts === 'number') return { duration: opts };
      return opts || {};
    }

    _ensureContainer() {
      if (this.container && this.container.isConnected) return;
      this.container = document.createElement('div');
      this.container.style.cssText =
        'position:fixed;top:var(--space-5);right:var(--space-5);' +
        'z-index:var(--z-notification);pointer-events:none;';
      if (document.body) document.body.appendChild(this.container);
    }

    showMessage(message, type = 'info', opts) {
      if (!message) return;
      const options = this._normalizeOpts(opts);
      this._ensureContainer();

      const el = document.createElement('div');
      el.style.cssText =
        'background:' + this._color(type) + ';color:white;' +
        'padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);' +
        'margin-bottom:var(--space-2);box-shadow:var(--shadow-md);' +
        'pointer-events:auto;cursor:pointer;font-size:14px;max-width:350px;' +
        'word-wrap:break-word;animation:fadeInFromRight .4s ease-out forwards;' +
        'will-change:transform,opacity;';
      el.textContent = this._icon(type) + ' ' + message;
      el.onclick = () => this._remove(el);
      this.container.appendChild(el);

      const duration = (typeof options.duration === 'number') ? options.duration : this._defaultDuration(type);
      if (duration > 0) setTimeout(() => this._remove(el), duration);
    }

    success(message, opts) { this.showMessage(message, 'success', opts); }
    error(message, opts)   { this.showMessage(message, 'error', opts); }
    warning(message, opts) { this.showMessage(message, 'warning', opts); }
    info(message, opts)    { this.showMessage(message, 'info', opts); }

    /**
     * 中央上のバナー (旧 `.board-switched-toast`)。
     * 1 つだけ表示され、 連続呼び出し時は最新の通知に上書き。
     */
    banner(message, opts) {
      if (!message) return;
      const options = this._normalizeOpts(opts);
      if (!this.bannerEl || !this.bannerEl.isConnected) {
        const el = document.createElement('div');
        el.id = 'globalBanner';
        el.className = 'board-switched-toast';
        document.body.appendChild(el);
        this.bannerEl = el;
      }
      if (options.html) {
        this.bannerEl.innerHTML = options.html; // lint-disable-line no-inner-html-assignment-with-variable -- 呼び出し側で escapeHtml 必須 (banner API 契約)
      } else {
        this.bannerEl.textContent = String(message);
      }
      this.bannerEl.classList.add('visible');
      clearTimeout(this.bannerTimer);
      const duration = (typeof options.duration === 'number') ? options.duration : 3000;
      if (duration > 0) {
        this.bannerTimer = setTimeout(() => {
          if (this.bannerEl) this.bannerEl.classList.remove('visible');
        }, duration);
      }
    }

    _remove(el) {
      if (!el || !el.parentNode) return;
      el.style.animation = 'fadeOut .3s ease-out forwards';
      el.style.willChange = 'transform,opacity';
      setTimeout(() => { if (el.parentNode) el.remove(); }, 300);
    }

    _color(type) {
      return ({
        success: 'var(--status-success)',
        error: 'var(--status-error)',
        warning: 'var(--status-warning)',
        info: 'var(--status-info)'
      })[type] || 'var(--status-info)';
    }

    _icon(type) {
      return ({ success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' })[type] || 'ℹ️';
    }

    _defaultDuration(type) {
      return ({ success: 3000, error: 5000, warning: 4000, info: 3000 })[type] || 3000;
    }
  }

  window.notifications = new NotificationSystem();

  // 互換性のため module-level convenience を残す (引数は同じ)。
  window.showMessage = (message, type, opts) => window.notifications.showMessage(message, type, opts);
  window.showSuccess = (message, opts) => window.notifications.success(message, opts);
  window.showError   = (message, opts) => window.notifications.error(message, opts);
  window.showWarning = (message, opts) => window.notifications.warning(message, opts);
  window.showInfo    = (message, opts) => window.notifications.info(message, opts);
  window.showBanner  = (message, opts) => window.notifications.banner(message, opts);



  window.getPerformanceLevel = function () {
    if (typeof navigator === 'undefined') return 'medium';

    const memory = navigator.deviceMemory || 4;
    const cores = navigator.hardwareConcurrency || 4;
    const connection = navigator.connection;

    if (memory >= 8 && cores >= 8) return 'high';

    if (memory <= 2 || cores <= 2) return 'low';

    if (connection) {
      const { effectiveType, downlink } = connection;
      if (effectiveType === '2g' || (downlink && downlink < 1)) return 'low';
      if (effectiveType === '4g' && downlink && downlink > 10) return 'high';
    }

    return 'medium';
  };

  window.isLowEndDevice = function () {
    if (typeof navigator === 'undefined') return false;

    const memory = navigator.deviceMemory;
    const cores = navigator.hardwareConcurrency;

    return (memory && memory <= 2) || (cores && cores <= 2);
  };

  window.getPerformanceConstants = function () {
    const perfLevel = window.getPerformanceLevel();
    const isLowEnd = window.isLowEndDevice();

    return {
      BASE_RENDER_BATCH_SIZE: perfLevel === 'high' ? 15 : perfLevel === 'low' ? 5 : 10,
      LOW_PERF_BATCH_SIZE: isLowEnd ? 3 : 5,
      HIGH_PERF_BATCH_SIZE: perfLevel === 'high' ? 25 : 15,
      VIEWPORT_BUFFER: perfLevel === 'high' ? 300 : perfLevel === 'low' ? 100 : 200,
      PERFORMANCE_BUDGET: perfLevel === 'high' ? 12 : perfLevel === 'low' ? 24 : 16,
      CHUNK_SIZE: perfLevel === 'high' ? 8 : perfLevel === 'low' ? 3 : 5,
      IDLE_TIMEOUT: isLowEnd ? 8000 : 5000
    };
  };

  window.getBatchSize = function (type = 'base') {
    const constants = window.getPerformanceConstants();
    const safeType = (type && type.toUpperCase) ? type.toUpperCase() : 'DEFAULT';
    return constants[`${safeType}_BATCH_SIZE`] || constants.BASE_RENDER_BATCH_SIZE;
  };

  window.getViewportBuffer = function () {
    return window.getPerformanceConstants().VIEWPORT_BUFFER;
  };

  window.getPerformanceBudget = function () {
    return window.getPerformanceConstants().PERFORMANCE_BUDGET;
  };

  /**
   * 統一UNIFIED_CONFIG構築関数 - CLAUDE.md準拠
   * @param {Object} CONFIG - パース済みconfigJSON
   * @param {Object} legacyVars - レガシーテンプレート変数
   * @param {Object} pageDefaults - ページ固有のデフォルト値
   * @returns {Object} 統一設定オブジェクト
   */
  window.sharedUtilities.createUnifiedConfig = function (CONFIG, legacyVars = {}, pageDefaults = {}) {
    const safeUserId = (value) => {
      return (typeof value === 'string' && !value.startsWith('<')) ? value : '';
    };

    return {
      userId: CONFIG.userId || safeUserId(legacyVars.__USER_ID__),
      targetUserId: pageDefaults.targetUserId || CONFIG.userId || safeUserId(legacyVars.__USER_ID__),
      userEmail: CONFIG.userEmail || '',
      questionText: CONFIG.questionText || '回答ボード',
      isPublished: CONFIG.isPublished || false,
      isEditor: CONFIG.isEditor !== undefined ? CONFIG.isEditor : (pageDefaults.isEditor || false),
      isAdminUser: CONFIG.isAdminUser || (pageDefaults.isAdminUser || false),
      isOwnBoard: CONFIG.isOwnBoard || (pageDefaults.isOwnBoard || false),
      formUrl: CONFIG.formUrl || '',
      formTitle: CONFIG.formTitle || '',
      showDetails: CONFIG.showDetails !== false,
      setupStatus: CONFIG.setupStatus || 'pending',
      displaySettings: CONFIG.displaySettings || { showNames: false, showReactions: false },
      columnMapping: CONFIG.columnMapping || {}
    };
  };


  if (!window.sharedUtilitiesLoaded) {
    window.sharedUtilitiesLoaded = true;
  }
</script>
