<script>
/* =====================================================================
 * page.viz.js — 可視化モード（M1 数直線 / M2 散布図）
 *
 * Why this file is separate:
 *   - 既存 page.js.html は 4000+ 行で、viz 専用ロジックを混ぜると見通しが落ちる
 *   - d3 は CDN 動的ロードする（依存追加 0、未使用ユーザーは読み込まない）
 *   - StudyQuestApp.prototype に method を追加するパターンなので、
 *     dispatcher（renderBoard）から typeof チェックで安全に呼べる
 *
 * Loaded after page.js so prototype mutation works.
 * Top-level side effects forbidden (CLAUDE.md): すべて関数定義のみ。
 *
 * Public methods added to StudyQuestApp.prototype:
 *   - ensureD3Loaded()       : d3 を遅延 CDN ロード
 *   - renderNumberLine()     : M1 ビーズワーム
 *   - renderMatrix()         : M2 散布図
 *   - vizComputeSwings()     : 揺らぎ計算（教師ダッシュボード用）
 *   - vizApplyProjectorMode(): URL クエリ ?display=projector のクラス付与
 * ===================================================================== */
(function () {
  'use strict';

  if (typeof window === 'undefined' || !window.StudyQuestApp) {
    // page.js が未ロードなら何もしない（テスト環境等）
    return;
  }

  /**
   * Viz レンダラの成功テレメトリ。各モードを初回描画したとき 1 回だけ Cloud Logging に
   * 送る。CLI から `npm run logs:cloud --severity INFO` で全機能が動いていることを確認可能。
   *
   * Why: ログから「全機能が使えるか」を判定するため、サイレントな fallback を可視化する。
   *      reportClientError の rate limit (30件/5min/email) を消費しないよう、初回のみ。
   */
  const _vizHeartbeatSeen = new Set();
  function vizHeartbeat(mode, extra) {
    try {
      const key = String(mode || '?');
      if (_vizHeartbeatSeen.has(key)) return;
      _vizHeartbeatSeen.add(key);
      if (window.ClientErrorReporter && typeof window.ClientErrorReporter.report === 'function') {
        window.ClientErrorReporter.report({
          level: 'log',
          message: '[viz/heartbeat] ' + mode + ' rendered',
          context: 'viz/' + mode,
          url: window.location.href,
          userAgent: navigator.userAgent.substring(0, 100),
          // 軽量メタ（個人情報なし）
          source: JSON.stringify(extra || {}).substring(0, 200)
        });
      }
      try { console.info('[viz/heartbeat]', mode, extra || {}); } catch (_) {}
    } catch (_) {}
  }

  // ---------------------------------------------------------------------
  // d3 v7 は src/d3.min.html で同梱しているため、すでに window.d3 が利用可能。
  // 旧 CDN 動的ロード方式は Edge のトラッキング防止 / Chrome 拡張による
  // HTMLScriptElement.src setter 干渉で「Assignment to constant variable」
  // を引き起こす環境があったため、CDN 依存を完全に排除した。
  //
  // ensureD3Loaded() は後方互換のために残し、即座に解決する Promise を返す。
  // window.d3 が無いことは通常起きないが、安全のため明示的に検査する。
  // ---------------------------------------------------------------------
  StudyQuestApp.prototype.ensureD3Loaded = function () {
    if (window.d3) return Promise.resolve(window.d3);
    return Promise.reject(new Error('d3 not bundled — src/d3.min.html include missing?'));
  };

  // ---------------------------------------------------------------------
  // 共通ヘルパ
  // ---------------------------------------------------------------------

  /**
   * 同一児童の再投稿を集約。emailHash 別に最新のみを "current" として返す。
   *
   * Why ghost を廃止: 旧設計は「最新=current(濃) + 過去=ghost(薄)」を同一画面に重ねて
   *   表示していたが、教師から「いま何が起きているのか」が読み取りにくいフィードバックを
   *   受けたため廃止。過去状態の振り返りは timeline スライダー (vizMaybeCaptureSnapshot
   *   が SS の timestamp 列から hydrate する snapshot 配列) で「時刻ごとの分布」として
   *   再生する方式に統一する。これは PDF p.5「シークバーで過去の状態を振り返る」に
   *   忠実な実装でもある。
   *
   * 後方互換: 戻り値の shape は { current, ghost } のまま（ghost は常に空配列）。
   *   呼び出し側のコードを最小変更で済ませるため。
   *
   * timestamp は string/Date 両対応。Date.parse で安全に比較し最新を採用。
   */
  // ---------------------------------------------------------------------
  // リアクション可視化ヘルパ (matrix / numberline 共通)
  //
  // Why: PDF p.5 「教師が児童間の反応を見取る」の素材として、各児童マーカーに
  //   「どんなリアクションが何件付いたか」を一目で示す。色は既存リアクション 3 種に
  //   対応 (UNDERSTAND=緑, LIKE=赤, CURIOUS=紫)。viz-dot の stroke 色を最頻 type に
  //   塗り、内部に合計数を小さく重ねる。リアクション 0 件の dot は既存挙動のまま。
  // ---------------------------------------------------------------------
  // Why: page.js の createReactionButtons と同じ Tailwind カラーに揃える
  //   (UNDERSTAND=yellow / LIKE=red / CURIOUS=green)。AdminPanel と既存カード UI に
  //   そのまま準じることで、教師・児童どちらの目線でも色のセマンティクスが統一される。
  const REACTION_TYPES = ['UNDERSTAND', 'LIKE', 'CURIOUS'];
  const REACTION_COLORS = {
    UNDERSTAND: '#eab308',  // text-yellow-500 (なるほど！)
    LIKE:       '#ef4444',  // text-red-500    (いいね！)
    CURIOUS:    '#22c55e'   // text-green-500  (もっと知りたい！)
  };

  function totalReactions(row) {
    if (!row || !row.reactions) return 0;
    let n = 0;
    for (const t of REACTION_TYPES) {
      n += (row.reactions[t] && row.reactions[t].count) || 0;
    }
    return n;
  }

  function topReactionType(row) {
    if (!row || !row.reactions) return null;
    let topType = null, topCount = 0;
    for (const t of REACTION_TYPES) {
      const c = (row.reactions[t] && row.reactions[t].count) || 0;
      if (c > topCount) { topCount = c; topType = t; }
    }
    return topType;
  }

  // ---------------------------------------------------------------------
  // 行リストポップアップ (pie のカテゴリ / wordcloud の単語 → 該当行群へリアクション)
  //
  // Why: pie のスライスや wordcloud のバーは「集計表現」なので、その背後にある
  //   個別行 (児童の回答) にリアクションする導線がないと board mode の機能が
  //   viz mode で失われる。スライス/バーをタップしたら関連する行の一覧 popup を
  //   出し、各行の既存リアクションボタンを押せるようにする。
  //
  //   実装方針: ボタン HTML は app.createReactionButtons(safeData) を流用 →
  //   AdminPanel ベースのカード UI と完全一致 (色・data 属性・aria 全て揃う)。
  //   click も page.js の handler と同じパターン (.reaction-btn / data-row-index /
  //   data-reaction)。これで「カードのリアクション体験を popup 内でそのまま再現」。
  // ---------------------------------------------------------------------
  function showRowsPopup(app, title, rows) {
    let popup = document.getElementById('vizRowsPopup');
    if (popup) popup.remove();

    popup = document.createElement('div');
    popup.id = 'vizRowsPopup';
    popup.className = 'viz-rows-popup';
    popup.setAttribute('role', 'dialog');
    popup.setAttribute('aria-modal', 'true');
    popup.setAttribute('aria-label', title);

    const safeTitle = escapeForTooltip(title);

    // 各行のリアクションボタンを「カードと完全に同じ生成器」で作る。
    //   - 色: text-yellow-500 / text-red-500 / text-green-500
    //   - SVG アイコン (絵文字ではなく)
    //   - state.showCounts で数字表示の有無
    //   - aria-pressed / .reacted クラス
    const canMakeBtns = typeof app.createReactionButtons === 'function';
    const cards = rows.map((r) => {
      const name = escapeForTooltip(r.name || '匿名');
      const text = escapeForTooltip(r.reason || r.answer || '(本文なし)');
      // createReactionButtons は safeData 形式を要求 (rowIndex / reactions)
      const safeData = {
        rowIndex: r.rowIndex,
        reactions: r.reactions || {}
      };
      const reactionBtns = canMakeBtns ? app.createReactionButtons(safeData) : '';
      return [
        '<div class="viz-rows-popup-row" data-row-index="' + r.rowIndex + '">',
        '  <div class="viz-rows-popup-name">', name, '</div>',
        '  <div class="viz-rows-popup-reason">', text, '</div>',
        '  <div class="viz-rows-popup-actions reaction-container">', reactionBtns, '</div>',
        '</div>'
      ].join('');
    }).join('');

    popup.innerHTML = [
      '<div class="viz-rows-popup-card">',
      '  <div class="viz-rows-popup-header">',
      '    <h4>', safeTitle, '</h4>',
      '    <button type="button" class="viz-rows-popup-close" aria-label="閉じる">×</button>',
      '  </div>',
      '  <div class="viz-rows-popup-body">', cards || '<p style="text-align:center;color:#94a3b8">該当する回答がありません</p>', '</div>',
      '</div>'
    ].join('');
    document.body.appendChild(popup);

    const close = () => { popup.remove(); document.removeEventListener('keydown', onKey); };
    const onKey = (e) => { if (e.key === 'Escape') close(); };
    document.addEventListener('keydown', onKey);

    popup.addEventListener('click', (e) => {
      // overlay click or × で閉じる
      if (e.target === popup || e.target.classList.contains('viz-rows-popup-close')) {
        close();
        return;
      }
      // カードと完全に同じハンドラ: .reaction-btn / data-row-index / data-reaction
      // (page.js line 772-776 と整合)
      const reactionBtn = e.target.closest('.reaction-btn');
      if (!reactionBtn || reactionBtn.disabled) return;
      const rowIdx = Number(reactionBtn.dataset.rowIndex);
      const type = reactionBtn.dataset.reaction;
      if (!rowIdx || !type) return;
      if (typeof app.addReaction !== 'function') return;

      // 楽観 UI: カードと同じく即時 toggle
      //   - reaction-count span のテキストを +/- 1
      //   - .reacted クラス + aria-pressed をトグル
      //   サーバ反映で次回 render が真値で上書きする
      const wasReacted = reactionBtn.classList.contains('reacted');
      const countSpan = reactionBtn.querySelector('.reaction-count');
      if (countSpan) {
        const cur = Number(countSpan.textContent || '0');
        countSpan.textContent = String(Math.max(0, cur + (wasReacted ? -1 : 1)));
      }
      reactionBtn.classList.toggle('reacted', !wasReacted);
      reactionBtn.setAttribute('aria-pressed', String(!wasReacted));

      app.addReaction(rowIdx, type);
    });
  }

  function groupByStudent(rows, allowResubmit) {
    if (!Array.isArray(rows)) return { current: [], ghost: [] };
    if (!allowResubmit) return { current: rows, ghost: [] };

    // emailHash 別に最新行のみ保持 (ts 比較で 1 パスで決定、sort 不要)
    const byHash = new Map();
    rows.forEach((row) => {
      const key = row.emailHash || ('row_' + row.rowIndex);
      const ts = row.timestamp ? Date.parse(row.timestamp) || 0 : 0;
      const existing = byHash.get(key);
      if (!existing || ts >= existing._ts) {
        byHash.set(key, Object.assign({}, row, { _ts: ts }));
      }
    });
    return { current: Array.from(byHash.values()), ghost: [] };
  }

  /**
   * 揺らぎ計算: 同一 emailHash の最新と過去の差分（distance）を測定。
   * Why: 教師ダッシュボードで「意見が大きく動いた児童」上位 N を提示するため。
   *      M1 は |Δx|、M2 は √(Δx² + Δy²) のユークリッド距離。
   */
  StudyQuestApp.prototype.vizComputeSwings = function (rows, mode) {
    if (!Array.isArray(rows) || rows.length === 0) return [];

    const byHash = new Map();
    rows.forEach((row) => {
      const key = row.emailHash;
      if (!key) return; // emailHash が無い行（メアド収集 OFF）はスキップ
      const ts = row.timestamp ? Date.parse(row.timestamp) || 0 : 0;
      const x = (typeof row.numericX === 'number') ? row.numericX : null;
      const y = (typeof row.numericY === 'number') ? row.numericY : null;
      if (x === null) return;
      const list = byHash.get(key) || [];
      list.push({ ts, x, y, name: row.name || '', comment: row.reason || row.answer || '' });
      byHash.set(key, list);
    });

    const swings = [];
    byHash.forEach((list, key) => {
      if (list.length < 2) return;
      list.sort((a, b) => a.ts - b.ts);
      const first = list[0];
      const last = list[list.length - 1];
      const dx = last.x - first.x;
      const dy = (mode === 'matrix' && first.y !== null && last.y !== null) ? (last.y - first.y) : 0;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance === 0) return;
      swings.push({
        emailHash: key,
        name: last.name,
        comment: last.comment,
        from: { x: first.x, y: first.y },
        to:   { x: last.x,  y: last.y  },
        distance,
        count: list.length
      });
    });

    swings.sort((a, b) => b.distance - a.distance);
    return swings;
  };

  // ---------------------------------------------------------------------
  // ツールチップ管理（M1/M2 共通）
  // ---------------------------------------------------------------------

  function ensureTooltip() {
    let tip = document.getElementById('vizTooltip');
    if (!tip) {
      tip = document.createElement('div');
      tip.id = 'vizTooltip';
      tip.className = 'viz-tooltip';
      tip.setAttribute('role', 'tooltip');
      document.body.appendChild(tip);
    }
    return tip;
  }

  function showTooltip(event, item, app) {
    const tip = ensureTooltip();
    // Why: カード実装 (page.js createNameDisplay) と同じ振舞いに揃える。
    //   サーバは isOwnBoard=true なら name を含めて送るが、教師端末でも「管理モード OFF」のときは
    //   生徒と同じ匿名表示にする（state.displayMode を参照）。displayMode='named' になるのは
    //   showAdminFeatures=true (管理モード切替) もしくは displaySettings.showNames=true のとき。
    //
    //   discriminator: emailHash の有無で「児童レコード」か「カテゴリラベル(pie slice 等)」を判定。
    //     - 児童レコード: displayMode に従う（匿名 or 実名）
    //     - カテゴリラベル: 常に label をそのまま表示（匿名化しない）
    const showName = app && app.state && app.state.displayMode === 'named';
    const isStudentRecord = item && item.emailHash !== undefined && item.emailHash !== null;
    const valueText = (item.numericY !== null && item.numericY !== undefined)
      ? `(${item.numericX}, ${item.numericY})`
      : `${item.numericX}`;
    let headerText;
    if (isStudentRecord) {
      headerText = (showName && item.name) ? escapeForTooltip(item.name) : '匿名';
    } else {
      // pie/wordcloud などのカテゴリラベル — name フィールドは「選択肢」「語」等の意味
      headerText = item.name ? escapeForTooltip(item.name) : '';
    }
    const commentText = escapeForTooltip(item.reason || item.answer || '');

    tip.innerHTML =
      `<div class="tooltip-meta">${headerText}${item.class ? ' / ' + escapeForTooltip(item.class) : ''}</div>` +
      `<div><span class="tooltip-value">${valueText}</span>${commentText || '<em style="color:#94a3b8">（コメントなし）</em>'}</div>`;
    tip.classList.add('visible');

    // 画面端ぴったりにならないよう少しオフセット
    const x = event.clientX + 14;
    const y = event.clientY + 14;
    const maxX = window.innerWidth - tip.offsetWidth - 8;
    const maxY = window.innerHeight - tip.offsetHeight - 8;
    tip.style.left = Math.min(x, Math.max(8, maxX)) + 'px';
    tip.style.top = Math.min(y, Math.max(8, maxY)) + 'px';
  }

  function hideTooltip() {
    const tip = document.getElementById('vizTooltip');
    if (tip) tip.classList.remove('visible');
  }

  // viz 要素 (dot / slice / bar) の外側をクリックしたら tooltip を消す。
  // click は capture 段階で 1 度だけ document に登録。
  if (typeof document !== 'undefined' && !document.__vizTooltipDocHandlerAttached) {
    document.__vizTooltipDocHandlerAttached = true;
    document.addEventListener('click', (e) => {
      const target = e.target;
      if (!target || !target.closest) return;
      // viz 要素 or tooltip 自体の上なら触らない
      if (target.closest('.viz-dot, .pie-slice, .word-bar, .viz-tooltip')) return;
      hideTooltip();
    });
    // Esc キーでも消えるのが UX 的に自然
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideTooltip();
    });
  }

  function escapeForTooltip(s) {
    // SharedUtilities.html の escapeHtml があるならそれを使うべきだが、
    // 名前空間が確実でないのでローカルに最小実装。
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  /**
   * SVG の幅 / viewBox を viewport にフィットさせる。matrix / pie / wordcloud
   * など 2D viz 共通。height は header 控除後 78vh 相当。
   * @returns {{width:number, height:number}}
   */
  function fitSvgToViewport(svgEl, minWidth) {
    const bounds = svgEl.getBoundingClientRect();
    const width = Math.max(minWidth, bounds.width || 800);
    const targetH = Math.max(420, Math.round(window.innerHeight * 0.78));
    const height = Math.max(targetH, bounds.height || targetH);
    svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);
    svgEl.style.height = height + 'px';
    return { width, height };
  }

  // ---------------------------------------------------------------------
  // コンテナ初期化（既存 #answers を viz 用に再利用）
  // ---------------------------------------------------------------------

  function getOrCreateVizContainer(app) {
    const answers = app.elements.answersContainer;
    if (!answers) return null;

    // Why: tooltip は body 直下に置いているため、mode 切替で SVG が消えても
    //   leftover として残ることがある（click 直後に viewport 外へカーソルが
    //   外れた、または mode 切替で hover 元の要素が消えた）。
    //   container を作り直すタイミングで明示的にクリーンアップする。
    hideTooltip();

    // Why (DOM 再利用): polling のたびに innerHTML='' で DOM を作り直すと、
    //   scroll position / tooltip / 選択 state が全リセットされる
    //   (教師フィードバック 2026-05-14「更新のたびにスクロール等がリセットされる」)。
    //   既に viz-container として初期化済みなら、子要素を再利用して参照だけ返す。
    //   SVG の中身は renderMatrix/numberline 側で `svg.selectAll('*').remove()`
    //   して再描画するため、ここでは触らない。
    if (answers.classList.contains('viz-container')) {
      const existingSvg = answers.querySelector('svg#vizSvg');
      const existingPanel = answers.querySelector('#vizTeacherPanel');
      if (existingSvg && existingPanel) {
        return { svg: existingSvg, teacherPanel: existingPanel };
      }
    }

    // 初回 or board mode → viz mode 切替時のみ DOM を再構築
    //   (renderBoardCards が答えカードを答え container に詰めていたケースを含む)。
    answers.className = 'viz-container';
    answers.innerHTML = '';

    // v2674: 統計バッジ (vizStatsPills) はヘッダー #lastUpdatedText に統合移管。
    //   旧 #vizCountPill は #answerCount と重複していたため廃止。
    //   旧 #vizUpdatedPill は board/viz の mode 横断で同位置 (header 右) に表示するため
    //   ヘッダーへ移動。renderXxx 末尾の updateStatsPills 呼び出しはそのまま再利用できる。

    // SVG
    // Why role="img" + aria-label: ビーズワーム/散布図は児童の位置プロットなのでスクリーン
    // リーダーには静的画像として扱わせ、回答件数を要約として読み上げる。本文の児童名・
    // コメントは vizTeacherPanel (下) の <ul> 経由で AT に届くので、SVG 自体は要約のみ。
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('id', 'vizSvg');
    svg.setAttribute('class', 'viz-svg');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    svg.setAttribute('role', 'img');
    svg.setAttribute('aria-label', '児童の回答分布をプロットした図');
    answers.appendChild(svg);

    // 教師パネル
    const teacherPanel = document.createElement('div');
    teacherPanel.className = 'viz-teacher-panel';
    teacherPanel.id = 'vizTeacherPanel';
    teacherPanel.innerHTML = '<h3>気になる児童（意見が動いた順）</h3><ul id="vizSwingList"></ul>';
    answers.appendChild(teacherPanel);

    return { svg, teacherPanel };
  }

  // v2674: 「最終更新 HH:MM」をヘッダー右の #lastUpdatedText に表示。
  //   旧 #vizUpdatedPill (chart 内オーバーレイ) と #vizCountPill (重複) は廃止。
  //   board/viz mode 切替で位置が変わらず、最終更新タイミングが mode 横断で読める。
  function updateStatsPills(_app, _count) {
    const updatedEl = document.getElementById('lastUpdatedText');
    if (!updatedEl) return;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    updatedEl.textContent = '最終更新 ' + hh + ':' + mm;
  }

  function maybeRenderTeacherPanel(app, swings) {
    const panel = document.getElementById('vizTeacherPanel');
    if (!panel) return;
    const list = document.getElementById('vizSwingList');
    if (!list) return;

    // Why: 「気になる児童」パネル自体は教師端末のみ。ただし表示する name は
    //   displayMode に合わせる（管理モード OFF のときは匿名 + emailHash で識別）。
    //   カード実装と同じ振舞い。
    const showAdmin = Boolean(app.state.showAdminFeatures);
    if (!showAdmin || swings.length === 0) {
      panel.classList.remove('active');
      return;
    }

    const showName = app.state.displayMode === 'named';
    const top = swings.slice(0, 5);
    list.innerHTML = top.map((s) => {
      const fromTo = (s.from.y !== null && s.to.y !== null)
        ? `(${s.from.x},${s.from.y}) → (${s.to.x},${s.to.y})`
        : `${s.from.x} → ${s.to.x}`;
      const name = (showName && s.name) ? escapeForTooltip(s.name) : '匿名(' + s.emailHash + ')';
      const comment = s.comment ? '：' + escapeForTooltip(s.comment).substring(0, 60) : '';
      return `<li><span class="swing-badge">Δ${s.distance.toFixed(1)}</span>${name} ${fromTo}${comment}</li>`;
    }).join('');
    panel.classList.add('active');
  }

  // ---------------------------------------------------------------------
  // M1: 数直線ビーズワーム
  // ---------------------------------------------------------------------

  StudyQuestApp.prototype.renderNumberLine = async function (isInitialLoad, oldRows) {
    try {
      const d3 = await this.ensureD3Loaded();
      const rows = (this.state.currentAnswers || []).filter((r) => typeof r.numericX === 'number');
      const containerRefs = getOrCreateVizContainer(this);
      if (!containerRefs) return;
      // 前回 matrix から切り替わった時のため象限パネルを除去 (numberline では使わない)
      removeQuadrantSummary(this.elements.answersContainer);

      const axis = this.state.axisConfig || {};
      const allowResubmit = Boolean(axis.allowResubmit);
      const { current, ghost } = groupByStudent(rows, allowResubmit);

      // データ範囲：実データの min/max。空なら defaultMin/Max にフォールバック。
      const xs = current.map((r) => r.numericX).concat(ghost.map((r) => r.numericX));
      const dataMin = xs.length ? Math.min(...xs) : (axis.defaultMin || 1);
      const dataMax = xs.length ? Math.max(...xs) : (axis.defaultMax || 5);
      const min = Math.min(dataMin, axis.defaultMin || 1);
      const max = Math.max(dataMax, axis.defaultMax || 5);

      const svgEl = containerRefs.svg;
      const bounds = svgEl.getBoundingClientRect();
      const width = Math.max(320, bounds.width || 800);
      const height = Math.max(280, bounds.height || 480);
      svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);

      const svg = d3.select(svgEl);
      svg.selectAll('*').remove();

      const margin = { top: 40, right: 40, bottom: 80, left: 40 };
      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;
      const yCenter = innerH / 2;

      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      const xScale = d3.scaleLinear().domain([min, max]).range([0, innerW]);

      // 軸（連続）
      const xAxis = d3.axisBottom(xScale)
        .tickValues(d3.range(min, max + 1))
        .tickFormat((d) => d);
      g.append('g')
        .attr('class', 'viz-axis')
        .attr('transform', `translate(0, ${yCenter + 70})`)
        .call(xAxis);

      // 軸ラベル（min / max）
      const xLabels = axis.xAxisLabels || {};
      g.append('text').attr('class', 'viz-axis-label')
        .attr('x', 0).attr('y', yCenter + 110)
        .attr('text-anchor', 'start')
        .text(xLabels.min || '');
      g.append('text').attr('class', 'viz-axis-label')
        .attr('x', innerW).attr('y', yCenter + 110)
        .attr('text-anchor', 'end')
        .text(xLabels.max || '');

      // 中央水平線（数直線）
      g.append('line')
        .attr('x1', 0).attr('x2', innerW)
        .attr('y1', yCenter + 70).attr('y2', yCenter + 70)
        .attr('stroke', 'rgba(148,163,184,0.4)')
        .attr('stroke-width', 1);

      // ヒストグラム（補助）：ticks の各値ごとの件数
      const counts = {};
      xs.forEach((v) => { counts[v] = (counts[v] || 0) + 1; });
      const maxCount = Math.max(1, ...Object.values(counts));
      const tickStep = innerW / Math.max(1, (max - min));
      const histH = 40;
      const histG = g.append('g').attr('class', 'viz-histogram').attr('transform', `translate(0,${yCenter + 130})`);
      for (let v = min; v <= max; v++) {
        const c = counts[v] || 0;
        const h = (c / maxCount) * histH;
        histG.append('rect')
          .attr('x', xScale(v) - tickStep * 0.3)
          .attr('y', histH - h)
          .attr('width', tickStep * 0.6)
          .attr('height', h);
        histG.append('text')
          .attr('x', xScale(v))
          .attr('y', histH + 14)
          .text(String(c));
      }

      // ゴースト点（過去投稿）— enter/exit は単純な data join。揺らぎ追跡のため。
      const ghostJoin = g.selectAll('.viz-dot.ghost').data(ghost, (d) => 'g_' + d.rowIndex);
      ghostJoin.exit().remove();
      ghostJoin.enter().append('circle')
        .attr('class', 'viz-dot ghost')
        .attr('r', 5)
        .attr('cx', (d) => xScale(d.numericX))
        .attr('cy', () => yCenter + 70);

      // Why: 揺らぎを「円の大きさ」で可視化（道徳指導案準拠）。
      //      同一児童の最初〜最新の移動距離 distance を radius に線形マップ。
      //      distance=0 (揺れなし) → base radius 7、distance>=4 → max radius 14。
      //      これにより教師が一目で「動いた児童」を判別できる。
      const swings = this.vizComputeSwings(rows, 'numberline');
      const swingByHash = new Map(swings.map(s => [s.emailHash, s.distance]));
      const BASE_R = 7, MAX_R = 14;
      const radiusFor = (d) => {
        if (!d.data || !d.data.emailHash) return BASE_R;
        const dist = swingByHash.get(d.data.emailHash) || 0;
        // 数直線の最大移動距離 = max - min = 4 (1-5 scale)
        const norm = Math.min(dist / 4, 1);
        return BASE_R + (MAX_R - BASE_R) * norm;
      };

      // 現在点（ビーズワーム配置）— force simulation で重なりを回避
      // Why: collide の半径は最大想定値で確保しないと大きい点同士が重なる。
      const COLLIDE_R = MAX_R + 1.5;
      // Why: d3.forceSimulation を 1 回 tick して final position を確定する。
      //      アニメーションは CSS の vizEnter で十分。data is static after each load。
      const nodes = current.map((r) => ({
        x: xScale(r.numericX),
        y: yCenter + 70,
        targetX: xScale(r.numericX),
        data: r
      }));
      const sim = d3.forceSimulation(nodes)
        .force('x', d3.forceX((d) => d.targetX).strength(1))
        .force('y', d3.forceY(yCenter + 70).strength(0.18))
        .force('collide', d3.forceCollide(COLLIDE_R))
        .stop();
      for (let i = 0; i < 120; i++) sim.tick();

      // 過去状態は timeline スライダーで時刻ごとの分布として再生する方式に統一
      // (PDF p.5)。trace 線/ghost マーカーを画面に重ねる UI は廃止済み。

      const dotJoin = g.selectAll('.viz-dot.current').data(nodes, (d) => d.data.rowIndex);
      dotJoin.exit().remove();
      const dotEnter = dotJoin.enter().append('circle')
        .attr('class', 'viz-dot current enter');
      const selfL = this;
      dotEnter.merge(dotJoin)
        .attr('cx', (d) => d.x)
        .attr('cy', (d) => d.y)
        .attr('r', (d) => radiusFor(d))
        .classed('swing-high', (d) => radiusFor(d) > BASE_R + 3)
        .classed('highlight', (d) => Boolean(d.data && d.data.highlight))
        // SVG presentation attribute (attr) は外部 CSS より specificity が低いため、
        //   .viz-dot { stroke: #0f172a } に上書きされて画面には出ない。
        //   インライン style (style) なら specificity 1000 相当で確実に勝てる。
        //   2026-05-14 v2654: attr → style に変更してリアクション色を実際に反映。
        //
        //   priority: HIGHLIGHT (教師注目) > REACTION (児童間人気) > none
        //   教師が意図的に「みんな見て」した意見は金縁でリアクションリングより目立たせる。
        //   DCE: 教師の促しは同調圧力ではなく多面的視点の提示なので、強調 OK。
        .style('stroke', (d) => {
          if (d.data && d.data.highlight) return '#fbbf24'; // tailwind amber-400 (gold)
          const t = topReactionType(d.data);
          return t ? REACTION_COLORS[t] : null;
        })
        // 細く・淡く: 位置情報 (=立場) を主役のままに、リング (=人気) を脇役にする
        //   2026-05-14 道徳教育 / DCE 観点でレビュー: 太い枠線は「多数派 = 正解」の
        //   暗黙シグナル化リスクがある。細く淡くすれば視認可能性は保ちつつ威圧感を下げる。
        //   ただし HIGHLIGHT (教師注目) は意図的に目立たせる: width 3 + opacity 1.0。
        .style('stroke-width', (d) => {
          if (d.data && d.data.highlight) return 3.0;
          return topReactionType(d.data) ? 2.0 : null;
        })
        .style('stroke-opacity', (d) => {
          if (d.data && d.data.highlight) return 1.0;
          return topReactionType(d.data) ? 0.85 : null;
        })
        .on('mouseenter', (event, d) => showTooltip(event, d.data, selfL))
        .on('mousemove',  (event, d) => showTooltip(event, d.data, selfL))
        .on('mouseleave', () => hideTooltip())
        .on('click', (event, d) => {
          hideTooltip();
          // v2688: 単一モーダルに統一。比較モードでも個別意見は順次に1つずつ読む。
          if (typeof selfL.showAnswerModal === 'function') {
            selfL.showAnswerModal(d.data.rowIndex);
          } else {
            showTooltip(event, d.data, selfL);
          }
        });

      // dot 中央のリアクション数バッジ
      const reactedNodes = nodes.filter((n) => totalReactions(n.data) > 0);
      const labelJoin = g.selectAll('.viz-dot-label').data(reactedNodes, (d) => 'l_' + d.data.rowIndex);
      labelJoin.exit().remove();
      labelJoin.enter().append('text')
        .attr('class', 'viz-dot-label')
        .attr('text-anchor', 'middle')
        .attr('pointer-events', 'none')
        .merge(labelJoin)
        .attr('x', (d) => d.x)
        .attr('y', (d) => d.y + 3.5)
        .text((d) => totalReactions(d.data));

      // 統計 + 教師パネル
      updateStatsPills(this, current.length);
      maybeRenderTeacherPanel(this, swings);

      // 件数バッジ（既存のヘッダ表示）も更新（updateAnswerCount は board モード前提）
      if (this.elements.answerCount && typeof this.getIcon === 'function') {
        this.elements.answerCount.innerHTML =
          this.getIcon('users', 'w-4 h-4 inline-block -mt-1') + '<span>' + current.length + '件</span>';
      }
      vizHeartbeat('numberline', { rowCount: rows.length, current: current.length, ghost: ghost.length });
    } catch (e) {
      console.error('renderNumberLine: failed', e);
      throw e;
    }
  };

  // ---------------------------------------------------------------------
  // M2: 散布図（2x2 マトリクス）
  // ---------------------------------------------------------------------

  StudyQuestApp.prototype.renderMatrix = async function (isInitialLoad, oldRows) {
    try {
      const d3 = await this.ensureD3Loaded();
      const rows = (this.state.currentAnswers || []).filter((r) =>
        typeof r.numericX === 'number' && typeof r.numericY === 'number');
      const containerRefs = getOrCreateVizContainer(this);
      if (!containerRefs) return;

      const axis = this.state.axisConfig || {};
      const allowResubmit = Boolean(axis.allowResubmit);
      const { current, ghost } = groupByStudent(rows, allowResubmit);

      const all = current.concat(ghost);
      const xs = all.map((r) => r.numericX);
      const ys = all.map((r) => r.numericY);
      const minX = xs.length ? Math.min(...xs, axis.defaultMin || 1) : (axis.defaultMin || 1);
      const maxX = xs.length ? Math.max(...xs, axis.defaultMax || 5) : (axis.defaultMax || 5);
      const minY = ys.length ? Math.min(...ys, axis.defaultMin || 1) : (axis.defaultMin || 1);
      const maxY = ys.length ? Math.max(...ys, axis.defaultMax || 5) : (axis.defaultMax || 5);

      const svgEl = containerRefs.svg;
      // 散布図は 2D なので viewport を縦いっぱい使う (78vh)。CSS min-height 55vh を上書き。
      const { width, height } = fitSvgToViewport(svgEl, 320);

      const svg = d3.select(svgEl);
      svg.selectAll('*').remove();

      const margin = { top: 24, right: 80, bottom: 60, left: 80 };
      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;
      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      const xScale = d3.scaleLinear().domain([minX, maxX]).range([0, innerW]);
      // Y は値が大きい=「高い」が上に来るよう反転
      const yScale = d3.scaleLinear().domain([minY, maxY]).range([innerH, 0]);

      // 4 象限の薄背景（X/Y 中央で分割）
      const midX = xScale((minX + maxX) / 2);
      const midY = yScale((minY + maxY) / 2);
      g.append('rect').attr('class', 'viz-quadrant hh')
        .attr('x', midX).attr('y', 0).attr('width', innerW - midX).attr('height', midY);
      g.append('rect').attr('class', 'viz-quadrant lh')
        .attr('x', 0).attr('y', 0).attr('width', midX).attr('height', midY);
      g.append('rect').attr('class', 'viz-quadrant hl')
        .attr('x', midX).attr('y', midY).attr('width', innerW - midX).attr('height', innerH - midY);
      g.append('rect').attr('class', 'viz-quadrant ll')
        .attr('x', 0).attr('y', midY).attr('width', midX).attr('height', innerH - midY);

      // 象限ラベル + 理由キーワード (v2673: 下部 HTML パネルから SVG 内統合に変更)
      //   学習者が「ドットの位置 + 言葉の意味」を視線移動なしで一目把握できるよう、
      //   各象限の上端/下端ラベル直下/直上に top-3 keyword を 1 行で配置。
      //   anchor='top' → ラベルの下に配置 (hh/lh)
      //   anchor='bottom' → ラベルの上に配置 (hl/ll)
      const q = axis.matrixQuadrantLabels || {};
      // バケット分け (renderQuadrantSummary と同じロジック)
      const buckets = { hh: [], lh: [], hl: [], ll: [] };
      for (const r of rows) {
        if (typeof r.numericX !== 'number' || typeof r.numericY !== 'number') continue;
        const xKey = r.numericX >= (minX + maxX) / 2 ? 'h' : 'l';
        const yKey = r.numericY >= (minY + maxY) / 2 ? 'h' : 'l';
        buckets[xKey + yKey].push(r);
      }
      const keywordsFor = (key) => {
        const cellRows = buckets[key];
        if (!cellRows.length) return [];
        const allWords = aggregateWords(cellRows, 'reason');
        const longWords = allWords.filter(w => w.word.length >= 2).slice(0, 3);
        const top = longWords.length > 0 ? longWords : allWords.slice(0, 3);
        return top.map(w => w.word);
      };
      const placeLabel = (text, x, y, key, anchor) => {
        if (!text) return;
        g.append('text').attr('class', 'viz-quadrant-label')
          .attr('x', x).attr('y', y).text(text);
        const kws = keywordsFor(key);
        if (kws.length > 0) {
          const kwY = anchor === 'top' ? y + 22 : y - 22;
          g.append('text').attr('class', 'viz-quadrant-keyword')
            .attr('x', x).attr('y', kwY)
            .text(kws.map(k => '#' + k).join('  '));
        }
      };
      placeLabel(q.hh, midX + (innerW - midX) / 2, 24, 'hh', 'top');
      placeLabel(q.lh, midX / 2, 24, 'lh', 'top');
      placeLabel(q.hl, midX + (innerW - midX) / 2, innerH - 8, 'hl', 'bottom');
      placeLabel(q.ll, midX / 2, innerH - 8, 'll', 'bottom');

      // 軸線（中央クロス）
      g.append('line').attr('x1', midX).attr('x2', midX).attr('y1', 0).attr('y2', innerH)
        .attr('stroke', 'rgba(148,163,184,0.4)');
      g.append('line').attr('x1', 0).attr('x2', innerW).attr('y1', midY).attr('y2', midY)
        .attr('stroke', 'rgba(148,163,184,0.4)');

      // 外枠軸
      g.append('g').attr('class', 'viz-axis').attr('transform', `translate(0,${innerH})`)
        .call(d3.axisBottom(xScale).tickValues(d3.range(minX, maxX + 1)));
      g.append('g').attr('class', 'viz-axis')
        .call(d3.axisLeft(yScale).tickValues(d3.range(minY, maxY + 1)));

      // 軸ラベル
      const xL = axis.xAxisLabels || {};
      const yL = axis.yAxisLabels || {};
      g.append('text').attr('class', 'viz-axis-label')
        .attr('x', 0).attr('y', innerH + 44).attr('text-anchor', 'start').text(xL.min || '');
      g.append('text').attr('class', 'viz-axis-label')
        .attr('x', innerW).attr('y', innerH + 44).attr('text-anchor', 'end').text(xL.max || '');
      g.append('text').attr('class', 'viz-axis-label')
        .attr('transform', `translate(-44,${innerH}) rotate(-90)`).attr('text-anchor', 'start')
        .text(yL.min || '');
      g.append('text').attr('class', 'viz-axis-label')
        .attr('transform', `translate(-44,0) rotate(-90)`).attr('text-anchor', 'end')
        .text(yL.max || '');

      // ghost 配列は groupByStudent が常に空 ([]) を返すので no-op。
      // 「揺らぎ大の子だけ」の限定 ghost + trace は下の swing-trace 描画で扱う。
      g.selectAll('.viz-dot.ghost').remove();

      // Why: M2 でも揺らぎを radius で可視化。Euclidean distance を radius にマップ。
      //      M1 と違って 2 軸（1-5）の対角線最大は √(4²+4²) ≈ 5.66。
      //
      // Why (v2666 ドット縮小): 5×5 グリッドに 70 人超を載せると BASE=7/MAX=14 では
      //   クラスタが「ブロブ化」して個別性が消えていた（教師フィードバック「間がない」）。
      //   道徳教育の核心「個の声を埋もれさせない」DCE 観点で BASE=5/MAX=9 に縮小。
      //   swing-high の存在感は MAX 9 でも保たれる（base の 1.8 倍）。
      const swings = this.vizComputeSwings(rows, 'matrix');
      const swingByHashM = new Map(swings.map(s => [s.emailHash, s.distance]));
      const BASE_R_M = 5, MAX_R_M = 9;
      const radiusForMatrix = (d) => {
        if (!d.data || !d.data.emailHash) return BASE_R_M;
        const dist = swingByHashM.get(d.data.emailHash) || 0;
        const norm = Math.min(dist / 5.66, 1);
        return BASE_R_M + (MAX_R_M - BASE_R_M) * norm;
      };

      // 現在点：軸の整数値の近傍に寄せつつ、重なりは forceCollide で押し戻し。
      //
      // Why (jitter 廃止 → 改修): 旧版は ±0.15 のランダムジッタをデータ値に加算
      //   していたが、軸の整数目盛 (1/2/3/4/5) と dot 位置が一致せず「数値が下地と
      //   完全に一致していない」フィードバック (2026-05-14) を受け、forceSimulation
      //   ベース (strength 1 + 初期位置 = target) に切替。しかし完全に同座標の
      //   ドット同士は forceCollide が「どの方向に押すか」判定できず重なったまま
      //   残るバグが発生 (70 件中 ~30 件が見えない、2026-05-14 教師フィードバック)。
      //
      //   対策:
      //   1. 初期位置に rowIndex seed の ±2px deterministic perturbation を加える。
      //      simulation の初期だけずらすので、データ値 (numericX/Y) と軸の一致は
      //      保たれる (collide が解消後は target 近傍に張り付く)。
      //      seed 由来なので polling re-render で座標がブレない。
      //   2. forceX/Y strength を 0.7 に下げ、collide が押し戻しきれるバランスに。
      //   3. tick 数 120 → 200 で収束を安定化。
      const seededOffset = (seed, salt) => {
        const s = Math.sin(seed * 9301 + salt * 49297) * 233280;
        return ((s - Math.floor(s)) - 0.5) * 4; // ±2px
      };
      const nodes = current.map((r) => {
        const seed = (r.rowIndex || 0) + 1;
        return {
          x: xScale(r.numericX) + seededOffset(seed, 1),
          y: yScale(r.numericY) + seededOffset(seed, 7919),
          targetX: xScale(r.numericX),
          targetY: yScale(r.numericY),
          data: r
        };
      });
      // collide 半径 + spread balance:
      //   strength 0.5 + 250 tick で、(3,3) に 10 件密集しても十分に散らばる。
      //   ドット縮小 (MAX 14→9) に合わせ collide も自然に小さくなり、間ができる。
      const COLLIDE_R_M = MAX_R_M + 1.5;
      const simM = d3.forceSimulation(nodes)
        .force('x', d3.forceX((d) => d.targetX).strength(0.5))
        .force('y', d3.forceY((d) => d.targetY).strength(0.5))
        .force('collide', d3.forceCollide(COLLIDE_R_M))
        .stop();
      for (let i = 0; i < 250; i++) simM.tick();

      // 揺らぎは「現在 dot の半径 + swing-high 黄色」で十分視覚化されているので、
      // 過去位置 ghost + 黄色 trace 線は採用せず（教師フィードバック 2026-05-13）。
      // 既存 .ghost / .viz-trace 要素が前回 render 残ってないよう exit clean だけ走らせる。
      g.selectAll('.viz-dot.ghost').remove();
      g.selectAll('.viz-trace').remove();
      const dotJoin = g.selectAll('.viz-dot.current').data(nodes, (d) => d.data.rowIndex);
      dotJoin.exit().remove();
      const dotEnter = dotJoin.enter().append('circle')
        .attr('class', 'viz-dot current enter');
      const self = this;
      dotEnter.merge(dotJoin)
        .attr('cx', (d) => d.x)
        .attr('cy', (d) => d.y)
        .attr('r', (d) => radiusForMatrix(d))
        .classed('swing-high', (d) => radiusForMatrix(d) > BASE_R_M + 3)
        .classed('highlight', (d) => Boolean(d.data && d.data.highlight))
        // リアクション可視化: 最頻 type の色で stroke を上書き (反応 0 なら CSS 既定)
        //   細く・淡く (2.0px / opacity 0.85): 散布図の主役は「位置 = 立場」。
        //   リング (人気) はあくまで補助情報なので、教師がチラ見できる強度に抑える。
        //   道徳教育 / DCE レビュー (2026-05-14) で「多数派 = 正解」シグナルの過剰化を避ける調整。
        //
        //   priority: HIGHLIGHT (教師注目) > REACTION (児童間人気) > none
        //   教師の意図的な「注目」は同調圧力ではないので 3.0px / 不透明で強調 OK。
        //
        //   重要: SVG では `.attr()` は presentation attribute (specificity 0) で、
        //   外部 CSS (.viz-dot { stroke: #0f172a }) に負ける。インライン style なら勝てる。
        //   2026-05-14 v2654: attr → style に変更して実際に画面に出るように修正。
        .style('stroke', (d) => {
          if (d.data && d.data.highlight) return '#fbbf24'; // amber-400 (gold)
          const t = topReactionType(d.data);
          return t ? REACTION_COLORS[t] : null;
        })
        .style('stroke-width', (d) => {
          if (d.data && d.data.highlight) return 3.0;
          return topReactionType(d.data) ? 2.0 : null;
        })
        .style('stroke-opacity', (d) => {
          if (d.data && d.data.highlight) return 1.0;
          return topReactionType(d.data) ? 0.85 : null;
        })
        .on('mouseenter', (event, d) => showTooltip(event, d.data, self))
        .on('mousemove',  (event, d) => showTooltip(event, d.data, self))
        .on('mouseleave', () => hideTooltip())
        // クリック: tooltip を閉じてモーダル表示 (v2688: 単一モーダルに統一)
        .on('click', (event, d) => {
          hideTooltip();
          if (typeof self.showAnswerModal === 'function') {
            self.showAnswerModal(d.data.rowIndex);
          } else {
            showTooltip(event, d.data, self);  // フォールバック
          }
        });

      // dot 中央のリアクション数バッジ。
      //   AdminPanel 設定「リアクション数を表示」(state.showCounts) を尊重。
      //   非表示設定でも stroke 色 (リング) は出るので「人気の有無」は分かる。
      const showCounts = !!(this.state && this.state.showCounts);
      const reactedNodes = showCounts ? nodes.filter((n) => totalReactions(n.data) > 0) : [];
      const labelJoin = g.selectAll('.viz-dot-label').data(reactedNodes, (d) => 'l_' + d.data.rowIndex);
      labelJoin.exit().remove();
      labelJoin.enter().append('text')
        .attr('class', 'viz-dot-label')
        .attr('text-anchor', 'middle')
        .attr('pointer-events', 'none')
        .merge(labelJoin)
        .attr('x', (d) => d.x)
        .attr('y', (d) => d.y + 3.5)
        .text((d) => totalReactions(d.data));

      updateStatsPills(this, current.length);
      maybeRenderTeacherPanel(this, swings);
      // v2673: 象限キーワードは SVG 内の象限ラベル直下に統合済み。
      //   学習者の視線移動を最小化するため、旧 HTML パネル (画面下部の 2x2 grid) は廃止。
      //   過去の panel が残存している場合 (mode 切替などの中間状態) は除去。
      removeQuadrantSummary(this.elements.answersContainer);

      if (this.elements.answerCount && typeof this.getIcon === 'function') {
        this.elements.answerCount.innerHTML =
          this.getIcon('users', 'w-4 h-4 inline-block -mt-1') + '<span>' + current.length + '件</span>';
      }
      vizHeartbeat('matrix', { rowCount: rows.length, current: current.length, ghost: ghost.length });
    } catch (e) {
      console.error('renderMatrix: failed', e);
      throw e;
    }
  };

  // ---------------------------------------------------------------------
  // 象限キーワードパネル（matrix 専用）
  //   各象限 (hh/lh/hl/ll) に属する rows の reason を集計し、top-3 keyword を
  //   2x2 グリッドで表示する。aggregateWords (M3 と同じ) を再利用。
  //
  // 道徳教育観点 (DCE):
  //   - クラスタ毎の人数バッジは「多数派バイアス」を増幅するため出さず、
  //     象限単位の「価値観グループ」として keyword で表現する
  //   - N=1 の象限でもその 1 人の理由を keyword 化（少数意見の尊重）
  //   - 「どこに何人いる」より「なぜそう思うか」を前景化
  // ---------------------------------------------------------------------
  function renderQuadrantSummary(answers, rows, axis) {
    if (!answers) return;
    let panel = answers.querySelector('#vizQuadrantSummary');
    if (!panel) {
      panel = document.createElement('div');
      panel.id = 'vizQuadrantSummary';
      panel.className = 'viz-quadrant-summary';
      // teacherPanel の直前に挿入（順序: stats → svg → quadrant-summary → teacher-panel）
      const tp = answers.querySelector('#vizTeacherPanel');
      if (tp) answers.insertBefore(panel, tp);
      else answers.appendChild(panel);
    }
    panel.innerHTML = '';

    const xs = [], ys = [];
    for (const r of rows) {
      if (typeof r.numericX === 'number') xs.push(r.numericX);
      if (typeof r.numericY === 'number') ys.push(r.numericY);
    }
    if (!xs.length || !ys.length) { panel.hidden = true; return; }
    panel.hidden = false;

    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const midX = (minX + maxX) / 2;
    const midY = (minY + maxY) / 2;

    const buckets = { hh: [], lh: [], hl: [], ll: [] };
    for (const r of rows) {
      if (typeof r.numericX !== 'number' || typeof r.numericY !== 'number') continue;
      const xKey = r.numericX >= midX ? 'h' : 'l';
      const yKey = r.numericY >= midY ? 'h' : 'l';
      buckets[xKey + yKey].push(r);
    }

    const q = (axis && axis.matrixQuadrantLabels) || {};
    // 表示順は画面の 2x2 (TL, TR, BL, BR) と一致させる
    const cells = [
      { key: 'lh', cls: 'qs-tl', label: q.lh || '左上' },
      { key: 'hh', cls: 'qs-tr', label: q.hh || '右上' },
      { key: 'll', cls: 'qs-bl', label: q.ll || '左下' },
      { key: 'hl', cls: 'qs-br', label: q.hl || '右下' }
    ];

    for (const { key, cls, label } of cells) {
      const cellRows = buckets[key];
      const cell = document.createElement('div');
      cell.className = 'qs-cell ' + cls;

      const h4 = document.createElement('h4');
      h4.textContent = '📍 ' + label;
      cell.appendChild(h4);

      if (cellRows.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'qs-empty';
        empty.textContent = '（該当意見なし）';
        cell.appendChild(empty);
      } else {
        // 道徳的意見の象限 keyword として 1 文字漢字断片（「楽」「思」「間」「合」等）は
        // 意味が読み取りにくいので原則除外。「気持」「真実」「期限」のような 2+ 文字の
        // 内容語のみを top-3 として残すと keyword 品質が大幅に向上。
        //
        // ただし reason がひらがな主体（「楽したい」「早く」「終わりたい」等）の象限では
        // 2+ 字 keyword が 0 件になりがち。完全に空表示にすると教師が「データが無い」
        // と誤読する恐れがあるので、その場合のみ 1 字漢字フォールバックを許容。
        const allWords = aggregateWords(cellRows, 'reason');
        const longWords = allWords.filter(w => w.word.length >= 2).slice(0, 3);
        const words = longWords.length > 0 ? longWords : allWords.slice(0, 3);
        if (words.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'qs-empty';
          empty.textContent = '（理由が抽出できる語に当たらず）';
          cell.appendChild(empty);
        } else {
          const wrap = document.createElement('div');
          wrap.className = 'qs-keywords';
          for (const w of words) {
            const tag = document.createElement('span');
            tag.className = 'qs-tag';
            tag.textContent = '#' + w.word;
            wrap.appendChild(tag);
          }
          cell.appendChild(wrap);
        }
      }
      panel.appendChild(cell);
    }
  }
  // matrix 以外の mode に切り替えたとき panel が残らないように。
  function removeQuadrantSummary(answers) {
    if (!answers) return;
    const panel = answers.querySelector('#vizQuadrantSummary');
    if (panel) panel.remove();
  }
  // テスト用に露出 (private helper の挙動を tests/viz.helpers.test.cjs で検証)
  StudyQuestApp.prototype.__renderQuadrantSummary = renderQuadrantSummary;

  // ---------------------------------------------------------------------
  // M3: ワードランキング（道徳指導案 終末・メタ認知）
  // ---------------------------------------------------------------------

  // 日本語ストップワード（頻出する助詞・接続詞・代名詞）
  // Why: 完全な形態素解析は GAS で重い。コメントから「意味のある語」だけ残す近似戦略。
  //      kuromoji 等を使わず、句読点と助詞ベースで十分実用的な頻度集計が得られる。
  const STOPWORDS = new Set([
    'の','に','は','を','が','と','で','も','や','へ','から','まで','よ','ね','な','か','だ','です','ます',
    'です。','ます。','こと','もの','これ','それ','あれ','どれ','ここ','そこ','あそこ','どこ',
    'する','した','して','なる','なった','なって','ある','あった','ない','なく','いる','いた','いて',
    'とき','とき。','ため','よう','うえ','した。','する。','思う','思った','思います',
    'the','a','an','is','are','was','were','this','that','it','of','to','for','in','on','and','or','but','i',
    'こんにちは','ありがとう','よろしく',
  ]);

  // TinySegmenter インスタンスを singleton として保持 (初期化コストを 1 回に)。
  //   include 順序で window.TinySegmenter が先に load されていれば使う。
  //   tests や旧環境で未 load なら正規表現フォールバックに退化する。
  let _segmenterInstance = null;
  function getSegmenter() {
    if (_segmenterInstance) return _segmenterInstance;
    if (typeof TinySegmenter !== 'undefined') {
      try { _segmenterInstance = new TinySegmenter(); } catch (_) { /* fallback */ }
    } else if (typeof window !== 'undefined' && window.TinySegmenter) {
      try { _segmenterInstance = new window.TinySegmenter(); } catch (_) {}
    }
    return _segmenterInstance;
  }

  function tokenizeJapanese(text) {
    if (!text || typeof text !== 'string') return [];
    // 形態素分割: TinySegmenter (~25KB, 辞書不要) で「気持ち」「頑張る」「お楽しみ」
    //   「誠実」のような複合語/活用形を 1 トークンとして拾う。
    //   未 load 環境（tests / 旧版）では漢字/カタカナ/英字連続の正規表現にフォールバック。
    //
    //   例: 「思いやりを持って真実を伝えたい。」
    //     TinySegmenter: ["思い","やり","を","持っ","て","真実","を","伝え","たい","。"]
    //     フィルタ後:    ["持っ", "真実", "伝え"]
    //
    //   設計上の限界: TinySegmenter は「思いやり」を「思い/やり」と分割してしまう
    //     （統計モデル基準）。ただし「気持ち」「頑張る」など他の複合語は正しく拾える
    //     ので、現状の正規表現アプローチより keyword の意味性は大幅向上。
    let words;
    const seg = getSegmenter();
    if (seg) {
      words = seg.segment(text);
    } else {
      const RE = /[A-Za-z0-9_]+|[一-鿿々]+|[ァ-ヺー]+/g;
      words = [];
      let m;
      while ((m = RE.exec(text)) !== null) words.push(m[0]);
    }

    const tokens = [];
    for (const w of words) {
      const t = w.trim();
      if (!t) continue;
      if (STOPWORDS.has(t.toLowerCase())) continue;
      // 内容文字（英数/漢字/かな/カタカナ）を含まない記号・空白は除外
      if (!/[A-Za-z0-9_一-鿿々ぁ-ゖァ-ヺー]/.test(t)) continue;
      // 純ひらがな 3 文字以下は助詞・助動詞・接続詞の可能性が高い → 除外
      //   「みんな」「みたい」のような 3 文字超の内容語は残す
      if (/^[ぁ-ゖー]+$/.test(t) && t.length <= 3) continue;
      // 1 文字でカタカナでも漢字でもない (記号や長音単独など) → 除外
      if (t.length === 1 && !/[一-鿿々]/.test(t)) continue;
      // 末尾「っ」は動詞促音便連用形の典型シグナル。「思っ」「使っ」「間違っ」
      //   「行っ」「持っ」など length 関係なく断片化される傾向が強いので全除外。
      if (/っ$/.test(t)) continue;
      // 漢字 1 字 + ひらがな 1 字 の 2 字 token で、末尾が動詞活用語末/助詞なら除外。
      //   TinySegmenter が動詞活用の途中で切ると「合わ」「振り」「舞え」「思い」「伝え」
      //   「振る」「形に」のような断片が頻出語に紛れ込んでしまう。
      //   除外する末尾 (動詞活用語末/助詞): い/え/わ/り/う/る/に/け/ん
      //     - い/え/わ/り/う: 動詞活用語末 (合わ/振り/舞え/思い/伝え/使う/笑う)
      //     - る: 動詞終止形 (振る/知る ← STOPWORDS には来る/する/ある のみ)
      //     - に: 助詞付き残り (形に/心に)
      //     - け: 命令形/連用形 (書け/動け)
      //     - ん: 撥音便連用形 (学ん/読ん/飲ん) ← 学んだ/読んだ の途中切り
      //   残す末尾 (名詞化・副詞化接辞): ち/み/く/さ/き/ぎ/び/ぴ
      //     (持ち/望み/早く/高さ/動き 等は内容語として有用)
      //   設計上の妥協: 「思い」「伝え」「願い」など名詞性も持つ連用形も巻き込んで
      //   消えるが、「合わ」「振り」「舞え」断片のノイズ削減を優先する。
      if (t.length === 2 && /^[一-鿿々][いえわりうるにけん]$/.test(t)) continue;
      tokens.push(t);
    }
    return tokens;
  }

  /**
   * 単語頻度を集計。M3 ワードランキング表示用。
   *
   * Case-insensitive aggregation: 「AI」と「ai」は同じ key として 1 つにまとめる。
   *   表示形は最初に出現した原形を保持（通常は大文字「AI」）。
   *   日本語語には影響なし（lower/upper の概念がないため key === word.toLowerCase()）。
   *
   * @param {Array} rows - currentAnswers
   * @param {string} field - 集計対象列名（'reason' or 'answer'）
   * @returns {Array<{word, count}>} desc sorted, max 25 件
   */
  function aggregateWords(rows, field) {
    const counts = new Map();
    const displayForm = new Map(); // key (lowercase) → first-seen original case
    for (const r of rows || []) {
      const text = r && r[field];
      if (!text) continue;
      const tokens = tokenizeJapanese(String(text));
      // 1 投稿内の重複はカウント 1（同じ児童が同じ語を 10 回書いても 1 票）
      const seen = new Set();
      for (const t of tokens) {
        const key = t.toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key);
        counts.set(key, (counts.get(key) || 0) + 1);
        if (!displayForm.has(key)) displayForm.set(key, t);
      }
    }
    return [...counts.entries()]
      .map(([key, count]) => ({ word: displayForm.get(key) || key, count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 25);
  }

  StudyQuestApp.prototype.renderWordRanking = async function (isInitialLoad, oldRows) {
    try {
      const d3 = await this.ensureD3Loaded();
      const rows = this.state.currentAnswers || [];
      const containerRefs = getOrCreateVizContainer(this);
      if (!containerRefs) return;
      removeQuadrantSummary(this.elements.answersContainer);

      // Why: reason 列がメインの自由記述。空なら answer にフォールバック。
      const useField = rows.some(r => r.reason) ? 'reason' : 'answer';
      const words = aggregateWords(rows, useField);

      const svgEl = containerRefs.svg;
      const bounds = svgEl.getBoundingClientRect();
      const width = Math.max(320, bounds.width || 800);
      const itemH = 28;
      const margin = { top: 20, right: 80, bottom: 20, left: 110 };
      const height = Math.max(120, margin.top + margin.bottom + words.length * itemH);
      svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);

      const svg = d3.select(svgEl);
      svg.selectAll('*').remove();

      if (words.length === 0) {
        // 空状態（記述が無い）
        svg.append('text')
          .attr('class', 'viz-axis-label')
          .attr('x', width / 2).attr('y', height / 2)
          .attr('text-anchor', 'middle')
          .text('集計できる語がまだありません');
        updateStatsPills(this, 0);
        return;
      }

      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;
      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      const maxCount = words[0].count;
      const xScale = d3.scaleLinear().domain([0, maxCount]).range([0, innerW]);
      const yScale = d3.scaleBand().domain(words.map(w => w.word)).range([0, innerH]).padding(0.25);

      // バー
      const bars = g.selectAll('.word-bar').data(words, d => d.word);
      bars.exit().remove();
      const selfW = this;
      bars.enter().append('rect')
        .attr('class', 'word-bar')
        .merge(bars)
        .attr('x', 0)
        .attr('y', d => yScale(d.word))
        .attr('width', d => xScale(d.count))
        .attr('height', yScale.bandwidth())
        .attr('rx', 3)
        .style('cursor', 'pointer')
        // クリック: その単語を含む行リスト popup を開く
        // Why simple includes: tokenizeJapanese を再走させずに簡易判定。教育用途では
        //   完全一致は不要（含む単語の回答群を見せたい）。誤マッチは語の意味が近いだけ。
        .on('click', (event, d) => {
          const matched = (selfW.state.currentAnswers || []).filter(r => {
            const text = String((r[useField] || ''));
            return text.indexOf(d.word) >= 0;
          });
          showRowsPopup(selfW, '「' + d.word + '」を含む回答 (' + matched.length + '件)', matched);
        });

      // 単語ラベル（左）
      const labels = g.selectAll('.word-label').data(words, d => d.word);
      labels.exit().remove();
      labels.enter().append('text')
        .attr('class', 'word-label')
        .merge(labels)
        .attr('x', -8)
        .attr('y', d => yScale(d.word) + yScale.bandwidth() / 2)
        .attr('dy', '0.35em')
        .attr('text-anchor', 'end')
        .text(d => d.word);

      // 件数ラベル（右）
      const counts = g.selectAll('.word-count').data(words, d => d.word);
      counts.exit().remove();
      counts.enter().append('text')
        .attr('class', 'word-count')
        .merge(counts)
        .attr('x', d => xScale(d.count) + 6)
        .attr('y', d => yScale(d.word) + yScale.bandwidth() / 2)
        .attr('dy', '0.35em')
        .text(d => d.count);

      updateStatsPills(this, rows.length);
      if (this.elements.answerCount && typeof this.getIcon === 'function') {
        this.elements.answerCount.innerHTML =
          this.getIcon('users', 'w-4 h-4 inline-block -mt-1') + '<span>' + rows.length + '件</span>';
      }
      vizHeartbeat('wordcloud', { rowCount: rows.length, words: words.length });
    } catch (e) {
      console.error('renderWordRanking: failed', e);
      throw e;
    }
  };

  // expose for tests / debugging
  StudyQuestApp.prototype.__tokenize = tokenizeJapanese;
  StudyQuestApp.prototype.__aggregateWords = aggregateWords;

  // ---------------------------------------------------------------------
  // M4: 円グラフ（道徳指導案 導入・アンケート結果可視化）
  // ---------------------------------------------------------------------

  /**
   * カテゴリ列の値を集計。'answer' 列がデフォルト。
   * 空・null は除外、同一値は集計でまとめる。
   */
  function aggregateCategories(rows, field) {
    const counts = new Map();
    for (const r of rows || []) {
      const v = r && r[field];
      if (v === null || v === undefined || v === '') continue;
      const key = String(v).trim();
      if (!key) continue;
      counts.set(key, (counts.get(key) || 0) + 1);
    }
    return [...counts.entries()]
      .map(([label, count]) => ({ label, count }))
      .sort((a, b) => b.count - a.count);
  }

  StudyQuestApp.prototype.renderPie = async function (isInitialLoad, oldRows) {
    try {
      const d3 = await this.ensureD3Loaded();
      const rows = this.state.currentAnswers || [];
      const containerRefs = getOrCreateVizContainer(this);
      if (!containerRefs) return;
      removeQuadrantSummary(this.elements.answersContainer);

      // 'answer' 列を優先（Forms の選択肢設問はここに入る）
      const useField = rows.some(r => r.answer) ? 'answer' : 'reason';
      const cats = aggregateCategories(rows, useField);
      const total = cats.reduce((s, c) => s + c.count, 0);

      const svgEl = containerRefs.svg;
      // pie radius = Math.min(width, height) / 2 - 60 なので height を稼ぐと円も大きくなる。
      const { width, height } = fitSvgToViewport(svgEl, 360);

      const svg = d3.select(svgEl);
      svg.selectAll('*').remove();

      if (cats.length === 0) {
        svg.append('text')
          .attr('class', 'viz-axis-label')
          .attr('x', width / 2).attr('y', height / 2)
          .attr('text-anchor', 'middle')
          .text('集計できる回答がまだありません');
        updateStatsPills(this, 0);
        return;
      }

      const radius = Math.min(width, height) / 2 - 60;
      const g = svg.append('g').attr('transform', `translate(${width / 2},${height / 2})`);

      // Why: d3 のカテゴリカル配色を使う。色覚多様性に配慮して d3.schemeTableau10 を採用
      const palette = (d3.schemeTableau10 || d3.schemeCategory10 || []);
      const colorFor = (i) => palette[i % palette.length] || '#38bdf8';

      const pie = d3.pie().value(d => d.count).sort(null);
      const arc = d3.arc().innerRadius(0).outerRadius(radius);
      const labelArc = d3.arc().innerRadius(radius * 0.7).outerRadius(radius * 0.7);

      const slices = pie(cats);
      const arcs = g.selectAll('.pie-slice').data(slices, d => d.data.label);
      arcs.exit().remove();
      const selfP = this;
      arcs.enter().append('path')
        .attr('class', 'pie-slice')
        .merge(arcs)
        .attr('d', arc)
        .attr('fill', (d, i) => colorFor(i))
        .style('cursor', 'pointer')
        .on('mouseenter', (event, d) => {
          // tooltip にカテゴリ全体のリアクション数も含める (見ただけで人気が分かる)
          const matched = (selfP.state.currentAnswers || []).filter(r => String(r[useField] || '').trim() === d.data.label);
          const totalReact = matched.reduce((s, r) => s + totalReactions(r), 0);
          const reactSuffix = totalReact > 0 ? ` · 反応 ${totalReact}` : '';
          const item = { name: d.data.label, reason: `${d.data.count}件 (${Math.round(d.data.count / total * 100)}%)${reactSuffix}`, numericX: d.data.count };
          showTooltip(event, item, selfP);
        })
        .on('mouseleave', () => hideTooltip())
        // クリック: そのカテゴリに属する行リストの popup を開く
        .on('click', (event, d) => {
          hideTooltip();
          const matched = (selfP.state.currentAnswers || []).filter(r => String(r[useField] || '').trim() === d.data.label);
          showRowsPopup(selfP, '「' + d.data.label + '」 の回答 (' + matched.length + '件)', matched);
        });

      // ラベル
      const labels = g.selectAll('.pie-label').data(slices, d => d.data.label);
      labels.exit().remove();
      labels.enter().append('text')
        .attr('class', 'pie-label')
        .merge(labels)
        .attr('transform', d => `translate(${labelArc.centroid(d)})`)
        .attr('text-anchor', 'middle')
        .text(d => {
          const pct = Math.round(d.data.count / total * 100);
          return pct >= 5 ? `${d.data.label} ${pct}%` : '';
        });

      // 中央の合計件数
      g.append('text')
        .attr('class', 'pie-center')
        .attr('text-anchor', 'middle')
        .attr('dy', '0.35em')
        .text(`${total} 件`);

      updateStatsPills(this, rows.length);
      if (this.elements.answerCount && typeof this.getIcon === 'function') {
        this.elements.answerCount.innerHTML =
          this.getIcon('users', 'w-4 h-4 inline-block -mt-1') + '<span>' + rows.length + '件</span>';
      }
      vizHeartbeat('pie', { rowCount: rows.length, categories: cats.length });
    } catch (e) {
      console.error('renderPie: failed', e);
      throw e;
    }
  };

  StudyQuestApp.prototype.__aggregateCategories = aggregateCategories;

  // ---------------------------------------------------------------------
  // スナップショット基盤（F#2 変化の軌跡 / F#4 ビフォー・アフター 共用）
  //
  // Why: 道徳指導案の終末フェーズで「議論前後の意見変化」を見せるため、
  //      授業中の意見分布を時系列で保持する。サーバ側に永続化せず、
  //      タブ内 sessionStorage に保持（タブを閉じれば消える運用）。
  //      最大 60 件・60 sec 間隔で sampling 後、5 sec ポーリングしてもストレージ膨張なし。
  // ---------------------------------------------------------------------

  const SNAPSHOT_KEY = 'viz:snapshots:v1';
  const SNAPSHOT_BEFORE_KEY = 'viz:before:v1';
  const SNAPSHOT_MAX = 60;
  const SNAPSHOT_INTERVAL_MS = 60 * 1000; // 60秒に 1 件採取

  function loadSnapshots() {
    try {
      const raw = sessionStorage.getItem(SNAPSHOT_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (_) { return []; }
  }
  function saveSnapshots(arr) {
    try { sessionStorage.setItem(SNAPSHOT_KEY, JSON.stringify(arr)); } catch (_) {}
  }
  function loadBeforeSnapshot() {
    try {
      const raw = sessionStorage.getItem(SNAPSHOT_BEFORE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
  }
  function saveBeforeSnapshot(snap) {
    try {
      if (snap === null) sessionStorage.removeItem(SNAPSHOT_BEFORE_KEY);
      else sessionStorage.setItem(SNAPSHOT_BEFORE_KEY, JSON.stringify(snap));
    } catch (_) {}
  }

  /**
   * 現在の表示状態（currentAnswers + boardMode + axisConfig）から軽量スナップショットを構成。
   * Why: rows 全体を保持するとサイズが膨らむので、画面再現に必要な最小フィールドのみ抽出。
   */
  function buildSnapshot(app) {
    const rows = (app.state.currentAnswers || []).map(r => ({
      rowIndex: r.rowIndex,
      emailHash: r.emailHash || null,
      class: r.class || '',
      name: r.name || '',
      answer: r.answer || '',
      reason: r.reason || '',
      numericX: typeof r.numericX === 'number' ? r.numericX : null,
      numericY: typeof r.numericY === 'number' ? r.numericY : null,
      timestamp: r.timestamp || null
    }));
    return {
      capturedAt: Date.now(),
      boardMode: app.state.boardMode || 'board',
      axisConfig: app.state.axisConfig || null,
      rows
    };
  }

  /**
   * SS の rows[].timestamp を時系列ソートし、SNAPSHOT_INTERVAL_MS バケットで
   * 「各 emailHash の最新マーカー位置」を捉えた snapshot 配列を返す。
   *
   * Why: 既存 vizMaybeCaptureSnapshot は「教師がブラウザを開いている間」しか
   *   採取しないため、デモ・リハーサル・授業中の途中参加（再ロード）で
   *   timeline が空になる。SS には submit 時の timestamp 列があるので、
   *   それを使えば「授業開始時からの自分のマーカー位置とコメントの変化」
   *   (PDF p.5 終末部の意図) を初回ロード時から timeline に再現できる。
   *
   *   バケット末時刻を capturedAt に採用する（バケット内の最新 row を含めた
   *   状態 = そのバケット境界時点の状態）。emailHash がない row は rowIndex
   *   で代用してバケットに残し、表示崩れを避ける。
   *
   *   返り値は時系列昇順、最大 SNAPSHOT_MAX 件（古いバケットを切り捨てる）。
   *
   * @param {Array} rows app.state.currentAnswers と同じ形式
   * @param {string} boardMode 現在の boardMode
   * @param {Object|null} axisConfig 現在の axisConfig
   * @returns {Array} snapshot 配列
   */
  function buildHistoricalSnapshots(rows, boardMode, axisConfig) {
    if (!Array.isArray(rows) || rows.length === 0) return [];

    const dated = rows
      .map(r => {
        if (!r || !r.timestamp) return null;
        const ms = new Date(r.timestamp).getTime();
        return Number.isFinite(ms) ? { ms, row: r } : null;
      })
      .filter(Boolean)
      .sort((a, b) => a.ms - b.ms);
    if (dated.length === 0) return [];

    const bucketMs = SNAPSHOT_INTERVAL_MS;
    const startMs = dated[0].ms;
    const endMs = dated[dated.length - 1].ms;

    const keyOf = r => (r.emailHash || ('row#' + r.rowIndex));
    const latestByKey = {};
    const snapshots = [];
    let cursor = 0;
    let bucketEnd = Math.floor(startMs / bucketMs) * bucketMs + bucketMs;
    // 最後の row を含むバケット境界まで進める（end-inclusive で最終 snapshot を保証）。
    const stopMs = endMs + bucketMs;

    while (bucketEnd <= stopMs) {
      while (cursor < dated.length && dated[cursor].ms < bucketEnd) {
        const r = dated[cursor].row;
        latestByKey[keyOf(r)] = {
          rowIndex: r.rowIndex,
          emailHash: r.emailHash || null,
          class: r.class || '',
          name: r.name || '',
          answer: r.answer || '',
          reason: r.reason || '',
          numericX: typeof r.numericX === 'number' ? r.numericX : null,
          numericY: typeof r.numericY === 'number' ? r.numericY : null,
          timestamp: r.timestamp || null
        };
        cursor++;
      }
      snapshots.push({
        capturedAt: bucketEnd,
        boardMode: boardMode || 'board',
        axisConfig: axisConfig || null,
        rows: Object.values(latestByKey)
      });
      bucketEnd += bucketMs;
    }
    return snapshots.slice(-SNAPSHOT_MAX);
  }

  /**
   * loadSheetData 後に呼ぶ。
   *   - rows[].timestamp 列がある場合: 毎回 historical snapshots を rebuild → sessionStorage を上書き
   *     既存の sessionStorage に「historical 最終時刻より新しい sampling 結果」があれば末尾に保持
   *   - rows[].timestamp が無い (or 全件パース不能) 場合: 従来通り 60秒ごとに現在状態を append
   *
   * Why historical-first every time: PDF p.5 の意図は「授業開始時からの自分のマーカー位置と
   *   コメントの変化を振り返る」。sessionStorage 60秒採取だけだと「教師がブラウザを開いた瞬間」
   *   が原点になり、授業前にダミーで仕込んだ row や授業途中で再ロードした際の履歴が失われる。
   *   毎回 SS の timestamp ベースで snapshot を組み直せば、何度リロードしても 同じ historical が
   *   復元され、生徒が新規投稿するたびに新バケットが追加される。
   *
   *   初回限定 (arr.length===0) にしていた旧設計のバグ: 一度でも sampling が 1 件入ると、
   *   以降の re-load では historical hydrate がスキップされ、スライダーが動かなくなる。
   *
   * @returns {void}
   */
  // ?debug=1 で snapshot ライフサイクルログを有効化（本番ノイズを避けるため opt-in）。
  // closure キャッシュで毎フレーム URL parse を避ける（page lifetime 中に変わらない値）。
  let _vizSnapDebugCache = null;
  function vizSnapDebugEnabled() {
    if (_vizSnapDebugCache !== null) return _vizSnapDebugCache;
    try { _vizSnapDebugCache = new URLSearchParams(window.location.search).get('debug') === '1'; }
    catch (_) { _vizSnapDebugCache = false; }
    return _vizSnapDebugCache;
  }
  function vizSnapLog(msg) {
    if (!vizSnapDebugEnabled()) return;
    try { console.info('[viz/snap] ' + msg); } catch (_) {}
  }

  StudyQuestApp.prototype.vizMaybeCaptureSnapshot = function () {
    try {
      const rows = this.state.currentAnswers || [];
      vizSnapLog('called rows=' + rows.length + ' mode=' + this.state.boardMode);
      if (rows.length === 0) {
        vizSnapLog('skip: no rows');
        return;
      }

      const historical = buildHistoricalSnapshots(
        rows,
        this.state.boardMode,
        this.state.axisConfig
      );
      vizSnapLog('historical buckets=' + historical.length);

      if (historical.length > 0) {
        // historical-first hydrate: 毎回 SS timestamp で再構築して上書き。
        // 既存 sessionStorage に historical の最終時刻より新しい sampling
        // (リアルタイム追加された snapshot) があれば末尾に保持する。
        const arr = loadSnapshots();
        const histLastTs = historical[historical.length - 1].capturedAt;
        const newer = arr.filter(s => s && typeof s.capturedAt === 'number' && s.capturedAt > histLastTs);
        const merged = historical.concat(newer);
        while (merged.length > SNAPSHOT_MAX) merged.shift();
        saveSnapshots(merged);
        return;
      }

      // rows に timestamp が無い (board モード等)・既存ロジック維持: 60 秒ごとに現在状態を append
      const arr = loadSnapshots();
      const now = Date.now();
      const lastTs = arr.length ? arr[arr.length - 1].capturedAt : 0;
      if (arr.length > 0 && (now - lastTs) < SNAPSHOT_INTERVAL_MS) {
        try { console.info('[viz/snap] skip: within INTERVAL'); } catch (_) {}
        return;
      }
      const snap = buildSnapshot(this);
      arr.push(snap);
      while (arr.length > SNAPSHOT_MAX) arr.shift();
      saveSnapshots(arr);
      try { console.info('[viz/snap] live sampled, total=' + arr.length); } catch (_) {}
    } catch (e) {
      // Why: 旧コードは silent catch だったため、snapshots:0 の原因が見えなかった。
      //   error をログするだけで bubble させない（既存挙動 = ボード描画は止めない）。
      try { console.error('[viz/snap] EXCEPTION', e && e.message, e); } catch (_) {}
    }
  };

  /**
   * 「議論前」を捕獲（教師ボタン）。F#4 ビフォー・アフター用。
   * 既に保存されていても上書き許可（議論の前段階を再設定可能）。
   */
  StudyQuestApp.prototype.vizCaptureBefore = function () {
    const snap = buildSnapshot(this);
    saveBeforeSnapshot(snap);
    return snap.capturedAt;
  };
  StudyQuestApp.prototype.vizClearBefore = function () {
    saveBeforeSnapshot(null);
  };
  StudyQuestApp.prototype.vizGetBefore = function () { return loadBeforeSnapshot(); };
  StudyQuestApp.prototype.vizGetSnapshots = function () { return loadSnapshots(); };

  StudyQuestApp.prototype.vizClearAllSnapshots = function () {
    try {
      sessionStorage.removeItem(SNAPSHOT_KEY);
      sessionStorage.removeItem(SNAPSHOT_BEFORE_KEY);
    } catch (_) {}
  };

  function isTeacher(app) {
    // Why: page.js の state は isEditor / isAdminUser / showAdminFeatures フラグを持つ。
    //      これに加えて以下も認める：
    //       1. URL に ?teacher=1 が付いている（強制ON。テスト・代理閲覧用）
    //       2. wire レスポンスに profiles が含まれている（サーバ側が「この閲覧者は
    //          所有者/管理者」と判定して送ってきている）→ それを根拠にする
    if (!app || !app.state) return false;
    if (app.state.isEditor || app.state.isAdminUser || app.state.showAdminFeatures) return true;
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.get('teacher') === '1' || params.get('admin') === '1') return true;
    } catch (_) {}
    // profiles 自体は誰でも見える（buildSafePublishedDataResult が全員に送る）ため、
    // それを根拠に teacher 判定すると student にも UI が出てしまう。
    // → profiles の存在は十分条件ではない。
    return false;
  }

  /**
   * Option B: 生徒 + studentProfileNav 有り（= history が 2 件以上、または past phase 中）の
   * とき pill UI を見せるべきかの判定。
   *
   * Why: history が 1 件 (= 現在のみ) しか無いと過去 navigation の余地がないので UI を出す
   *      意味がない。教師は別経路で常に表示。
   */
  function shouldShowStudentPills(app) {
    if (!app || !app.state) return false;
    const nav = app.state.studentProfileNav;
    if (!nav || !Array.isArray(nav.history)) return false;
    return nav.history.length >= 2 || !!app.state.viewingPastProfile;
  }

  /**
   * v2674 リファクタ: profile pills と議論ツールを別 slot に分離注入。
   *   - profile pills → #vizPhaseHost (header Row 1 中央、教師/生徒共通)
   *   - 議論ツール (議論前/比較/軌跡)  → #vizToolbarSlot (header Row 3、教師専用)
   *
   * 旧設計: 両方を #vizToolbarSlot 内の 1 つの #vizToolbar に詰めていた
   * (横に長く視覚的に「タブ + 操作」が同列で混在)。
   *
   * 新設計: 役割を物理的に分離。pills は phase ナビゲーション (識別)、
   *   tools は授業中の議論支援 (操作) として bar を分けることでセマンティクス明確化。
   *
   * Option B: 生徒に対しても pills は注入する (過去フェーズ閲覧用)。
   *   tools 側は !teacher で skip。
   */
  function ensureViewToolbar(app) {
    const teacher = isTeacher(app);
    const studentPills = !teacher && shouldShowStudentPills(app);
    if (!teacher && !studentPills) return null;

    // --- 1. profile pills bar を #vizPhaseHost に注入 (教師/生徒共通) ---
    const phaseHost = document.getElementById('vizPhaseHost');
    let pillsBar = document.getElementById('vizProfilePills');
    if (!pillsBar && phaseHost) {
      pillsBar = document.createElement('div');
      pillsBar.id = 'vizProfilePills';
      pillsBar.className = 'viz-toolbar-left';
      pillsBar.setAttribute('role', 'tablist');
      pillsBar.setAttribute('aria-label', 'ボード切替');
      phaseHost.appendChild(pillsBar);
    }
    if (pillsBar) {
      // student/teacher 切り替えクラス (CSS で過去 pill のアフォーダンス差を出す用)
      pillsBar.classList.toggle('viz-toolbar--student', !teacher);
    }

    // --- 2. 議論ツール bar を #vizToolbarSlot に注入 (教師のみ) ---
    const toolsSlot = document.getElementById('vizToolbarSlot');
    let toolsBar = document.getElementById('vizToolbar');
    if (teacher && !toolsBar && toolsSlot) {
      toolsBar = document.createElement('div');
      toolsBar.id = 'vizToolbar';
      toolsBar.className = 'viz-toolbar viz-controls';
      toolsBar.setAttribute('role', 'toolbar');
      toolsBar.setAttribute('aria-label', '議論支援ツール');
      toolsBar.innerHTML = [
        '<span class="viz-toolbar-section-label">議論支援</span>',
        '<div class="viz-toolbar-center" id="vizControls">',
        '  <button type="button" id="vizCaptureBeforeBtn" class="viz-btn" ' +
        '          title="議論前として現在の分布を保存" aria-label="議論前として現在の分布を保存">',
        '    📌 議論前',
        '  </button>',
        '  <button type="button" id="vizCompareToggleBtn" class="viz-btn" ' +
        '          title="議論前と現在を2画面で対比" aria-label="議論前と現在を2画面で対比" ' +
        '          aria-pressed="false">',
        '    ⇄ 比較',
        '  </button>',
        '  <div class="viz-timeline">',
        '    <label for="vizTimelineSlider" class="viz-timeline-label">軌跡</label>',
        '    <input type="range" id="vizTimelineSlider" min="0" max="0" value="0" step="1" ' +
        '           aria-label="軌跡タイムライン: 過去の分布を再生" />',
        '    <span id="vizTimelineLabel" class="viz-timeline-time" aria-live="polite">現在</span>',
        '    <button type="button" id="vizTimelineNowBtn" class="viz-btn-small" ' +
        '            title="現在に戻る" aria-label="タイムラインを現在に戻す">↺</button>',
        '  </div>',
        '</div>'
      ].join('');
      toolsSlot.appendChild(toolsBar);
    }

    // --- 3. event listeners は initialized フラグで 1 度だけ bind ---
    if (pillsBar && !pillsBar.dataset.eventsBound) {
      pillsBar.dataset.eventsBound = '1';
      bindProfilePillsEvents(pillsBar, app);
    }
    if (toolsBar && !toolsBar.dataset.eventsBound) {
      toolsBar.dataset.eventsBound = '1';
      bindDiscussionToolsEvents(toolsBar, app);
    }

    // 互換性のため bar 相当 (pillsBar) を返す。旧コード呼び出し側は戻り値を使っていない。
    return pillsBar || toolsBar || null;
  }

  // profile pills の click/change handler (旧 ensureViewToolbar 内インラインを切り出し)
  function bindProfilePillsEvents(pillsBar, app) {
    // profile pills の click handler は event delegation で 1 度だけ登録。
    //   data-action の値で経路を厳密分岐:
    //     'load-past' → 過去フェーズ読み込み (Option B プレビュー)
    //     'switch'    → active を切替（教師が未来 profile を進めるとき）
    //     なし (current pill) → 過去閲覧中なら現在に戻る、それ以外は no-op
    //   default を 'switch' にフォールバックすると current pill click が誤って active
    //   再書込を試行して「ユーザーが見つかりません」になる罠を回避する。
    pillsBar.addEventListener('click', (e) => {
      const returnBtn = e.target.closest('.viz-profile-return');
      if (returnBtn) {
        if (typeof app.__vizReturnToCurrent === 'function') app.__vizReturnToCurrent();
        return;
      }
      const btn = e.target.closest('.viz-profile-pill');
      if (!btn) return;
      if (btn.disabled || btn.classList.contains('disabled')) return;
      const name = btn.dataset.profile;
      if (!name) return;
      const action = btn.dataset.action;
      if (!action) {
        // current pill: 過去閲覧中なら戻る、それ以外は no-op (もう current)
        if (app.state && app.state.viewingPastProfile &&
            typeof app.__vizReturnToCurrent === 'function') {
          app.__vizReturnToCurrent();
        }
        return;
      }
      // profile 切替アクション (pill click) では classFilter をリセットして「新 profile の全件」から
      //   始める。同 profile 内の filter 変更 (loadSheetData gate 経由) には影響しない。
      if (typeof resetClassFilterToAll === 'function') resetClassFilterToAll(app);
      if (action === 'load-past') {
        if (typeof app.__vizLoadPastProfile === 'function') app.__vizLoadPastProfile(name);
      } else if (action === 'switch') {
        app.__vizLoadProfile(name);
      }
    });
    // select fallback の change ハンドラ (profile 5 個以上のとき)
    pillsBar.addEventListener('change', (e) => {
      if (e.target.id !== 'vizProfileSelect') return;
      const name = e.target.value;
      if (!name) return;
      if (typeof resetClassFilterToAll === 'function') resetClassFilterToAll(app);
      app.__vizLoadProfile(name);
    });
  }

  // 議論ツール (議論前/比較/軌跡) の event listener を一括 bind。
  // v2674: 旧 ensureViewToolbar インラインから切り出し、教師 only 注入時にのみ呼ばれる。
  function bindDiscussionToolsEvents(toolsBar, app) {
    const captureBtn = toolsBar.querySelector('#vizCaptureBeforeBtn');
    if (captureBtn) {
      captureBtn.addEventListener('click', () => {
        app.vizCaptureBefore();
        captureBtn.classList.add('saved');
        setTimeout(() => captureBtn.classList.remove('saved'), 1500);
      });
    }
    const compareBtn = toolsBar.querySelector('#vizCompareToggleBtn');
    if (compareBtn) {
      compareBtn.addEventListener('click', () => {
        // 議論前スナップ未保存で比較 ON にしようとしても compareRender は普通の描画に
        // フォールバックする (loadBeforeSnapshot null) ので、UI 上「active なのに見た目が
        // 変わらない」状態になり教師が混乱する。事前ガードして警告。
        if (!app.state.vizCompareMode && !app.vizGetBefore()) {
          try { window.alert('「📌 議論前」を先に押して、議論開始時点の分布を保存してください。'); } catch (_) {}
          return;
        }
        app.state.vizCompareMode = !app.state.vizCompareMode;
        compareBtn.classList.toggle('active', !!app.state.vizCompareMode);
        compareBtn.setAttribute('aria-pressed', String(!!app.state.vizCompareMode));
        // v2683: 比較トグル時にモーダルが開いていれば閉じる。
        //   理由: ON → OFF 時は dual layout の右カードが宙ぶらりんで残り stale。
        //   OFF → ON 時は full-screen モーダルがチャートを覆ったままドロワー化が
        //   遅延する。いずれもクリーンに閉じてからレイアウト切替が安全。
        if (typeof app.hideAnswerModal === 'function') app.hideAnswerModal();
        // v2632: 比較モード中は timeline スライダーが「左ペインの時刻」を制御する。
        //   旧仕様 (compare ON で timeline reset) は廃止。スライダー位置を保持したまま
        //   左ペインがその時刻、右ペインが現在で描画される。
        app.renderBoard(false, false, []);
      });
    }
    // Timeline スライダー: rAF debounce で「ドラッグ中の連続 input → renderBoard 連発」を抑制。
    //   matrix モードでは 30+ ノードを redraw するため、無策だと 60fps で全描画が走り
    //   低スペック端末（Edge low-power mode 等）でカクつく。input 値は最新だけ採用。
    let _vizSliderRafId = null;
    let _vizSliderPendingIdx = null;
    const slider = toolsBar.querySelector('#vizTimelineSlider');
    if (slider) {
      slider.addEventListener('input', (e) => {
        _vizSliderPendingIdx = Number(e.target.value);
        if (_vizSliderRafId !== null) return;
        _vizSliderRafId = window.requestAnimationFrame(() => {
          _vizSliderRafId = null;
          const idx = _vizSliderPendingIdx;
          _vizSliderPendingIdx = null;
          if (idx === app.state.vizTimelineIndex) return;
          app.state.vizTimelineIndex = idx;
          const snaps = app.vizGetSnapshots();
          const label = document.getElementById('vizTimelineLabel');
          if (label) {
            if (idx >= snaps.length) {
              label.textContent = '現在';
            } else {
              const t = snaps[idx];
              if (t) {
                const d = new Date(t.capturedAt);
                label.textContent = d.getHours().toString().padStart(2, '0') + ':' +
                                    d.getMinutes().toString().padStart(2, '0');
              }
            }
          }
          app.renderBoard(false, false, []);
        });
      });
    }
    const nowBtn = toolsBar.querySelector('#vizTimelineNowBtn');
    if (nowBtn) {
      nowBtn.addEventListener('click', () => {
        app.state.vizTimelineIndex = null;
        const s = toolsBar.querySelector('#vizTimelineSlider');
        const snaps = app.vizGetSnapshots();
        if (s) s.value = snaps.length;
        const label = toolsBar.querySelector('#vizTimelineLabel');
        if (label) label.textContent = '現在';
        app.renderBoard(false, false, []);
      });
    }
  }

  function refreshModeBar(app) {
    // mode 切替ボタン / ⚙️ は撤去済 (profile が boardMode を決める)。本関数は
    // mode 連動 UI（議論ツール表示 / controlsFooter 表示）だけ担当する。
    const cur = app.state.boardMode || 'board';
    // 議論ツール（議論前/比較/タイムライン）は viz mode 専用。
    // board モードではカードに対して「揺らぎ」「比較」の概念が無いので非表示。
    // v2674: 「議論支援」section label を含む bar 全体を非表示にする (controls 単体ではない)。
    const toolbar = document.getElementById('vizToolbar');
    if (toolbar) toolbar.style.display = (cur === 'board') ? 'none' : '';
    // controlsFooter (画面下の「列数」スライダー) は board モード専用。
    // viz モードではカードがないので意味不明なのと、viewport の下部を占有して
    // SVG レイアウトとぶつかるので非表示にする。
    const footer = document.getElementById('controlsFooter');
    if (footer) footer.style.display = (cur === 'board') ? '' : 'none';
  }

  // mode 切替は profile 切替 (boardMode を server-resolved で決定) に統一済み。
  //   旧 __vizSetMode / __vizClearTeacherMode / 'viz:teacherMode:v1' sessionStorage は撤去。
  StudyQuestApp.prototype.__vizInjectModeBar = function () { ensureViewToolbar(this); };
  StudyQuestApp.prototype.__vizRefreshModeBar = function () { refreshModeBar(this); };

  /**
   * Profile セレクタ — multi-board の切替 UI（教師限定）。
   * 「導入アンケート」「本時の議論」「振り返り」のように 1 ユーザーが複数 Forms を
   * 切替えて運用するケース向け。profiles 0 件の場合は UI を非表示にする。
   * page.js bootstrap で state.profiles / state.activeProfile が渡される前提。
   *
   * profile 数で UI を切替: PROFILE_PILLS_MAX 以下なら pill tab（1 クリック切替、視認性◎、
   * 授業テンポに合う）、超えたら select fallback（横幅収容）。
   */
  const PROFILE_PILLS_MAX = 4;

  function injectProfileSelector(app) {
    const teacher = isTeacher(app);
    const studentMode = !teacher && shouldShowStudentPills(app);
    if (!teacher && !studentMode) return;
    const toolbar = ensureViewToolbar(app);
    if (!toolbar) return;
    const container = document.getElementById('vizProfilePills');
    if (!container) return;

    // 教師: app.state.profiles (full list)
    // 生徒: app.state.studentProfileNav.history (過去 + 現在のみ)
    let pillEntries;
    let activeName;
    let pastSet;       // teacher 用: 過去 active になった profile 名集合（教師には ✓ 付ける）
    if (teacher) {
