<script>
/* =====================================================================
 * page.viz.js — 可視化モード（M1 数直線 / M2 散布図）
 *
 * Why this file is separate:
 *   - 既存 page.js.html は 4000+ 行で、viz 専用ロジックを混ぜると見通しが落ちる
 *   - d3 は CDN 動的ロードする（依存追加 0、未使用ユーザーは読み込まない）
 *   - StudyQuestApp.prototype に method を追加するパターンなので、
 *     dispatcher（renderBoard）から typeof チェックで安全に呼べる
 *
 * Loaded after page.js so prototype mutation works.
 * Top-level side effects forbidden (CLAUDE.md): すべて関数定義のみ。
 *
 * Public methods added to StudyQuestApp.prototype:
 *   - ensureD3Loaded()       : d3 を遅延 CDN ロード
 *   - renderNumberLine()     : M1 ビーズワーム
 *   - renderMatrix()         : M2 散布図
 *   - vizComputeSwings()     : 揺らぎ計算（教師ダッシュボード用）
 *   - vizApplyProjectorMode(): URL クエリ ?display=projector のクラス付与
 * ===================================================================== */
(function () {
  'use strict';

  if (typeof window === 'undefined' || !window.StudyQuestApp) {
    // page.js が未ロードなら何もしない（テスト環境等）
    return;
  }

  /**
   * Viz レンダラの成功テレメトリ。各モードを初回描画したとき 1 回だけ Cloud Logging に
   * 送る。CLI から `npm run logs:cloud --severity INFO` で全機能が動いていることを確認可能。
   *
   * Why: ログから「全機能が使えるか」を判定するため、サイレントな fallback を可視化する。
   *      reportClientError の rate limit (30件/5min/email) を消費しないよう、初回のみ。
   */
  const _vizHeartbeatSeen = new Set();
  function vizHeartbeat(mode, extra) {
    try {
      const key = String(mode || '?');
      if (_vizHeartbeatSeen.has(key)) return;
      _vizHeartbeatSeen.add(key);
      if (window.ClientErrorReporter && typeof window.ClientErrorReporter.report === 'function') {
        window.ClientErrorReporter.report({
          level: 'log',
          message: '[viz/heartbeat] ' + mode + ' rendered',
          context: 'viz/' + mode,
          url: window.location.href,
          userAgent: navigator.userAgent.substring(0, 100),
          // 軽量メタ（個人情報なし）
          source: JSON.stringify(extra || {}).substring(0, 200)
        });
      }
      try { console.info('[viz/heartbeat]', mode, extra || {}); } catch (_) {}
    } catch (_) {}
  }

  // ---------------------------------------------------------------------
  // 4 象限ラベルを解決する。axis.matrixQuadrantLabels が明示指定されていればそれを優先、
  //   空の象限は xAxisLabels / yAxisLabels から「<xLabel>×<yLabel>」形式で自動組立する。
  //   教師が軸ラベルだけ書けば 4 象限が自動で意味を持つ。
  function __resolveQuadrantLabels(axisCfg) {
    const explicit = (axisCfg && axisCfg.matrixQuadrantLabels) || {};
    const xL = (axisCfg && axisCfg.xAxisLabels) || {};
    const yL = (axisCfg && axisCfg.yAxisLabels) || {};
    const xLow = xL.min || '', xHigh = xL.max || '';
    const yLow = yL.min || '', yHigh = yL.max || '';
    const combine = (xPart, yPart) => {
      if (!xPart && !yPart) return '';
      if (xPart && yPart) return xPart + '×' + yPart;
      return xPart || yPart;
    };
    return {
      hh: explicit.hh || combine(xHigh, yHigh),
      lh: explicit.lh || combine(xLow, yHigh),
      hl: explicit.hl || combine(xHigh, yLow),
      ll: explicit.ll || combine(xLow, yLow)
    };
  }

  // ---------------------------------------------------------------------
  // d3 v7 は src/d3.min.html で同梱しているため、すでに window.d3 が利用可能。
  // 旧 CDN 動的ロード方式は Edge のトラッキング防止 / Chrome 拡張による
  // HTMLScriptElement.src setter 干渉で「Assignment to constant variable」
  // を引き起こす環境があったため、CDN 依存を完全に排除した。
  //
  // ensureD3Loaded() は後方互換のために残し、即座に解決する Promise を返す。
  // window.d3 が無いことは通常起きないが、安全のため明示的に検査する。
  // ---------------------------------------------------------------------
  StudyQuestApp.prototype.ensureD3Loaded = function () {
    if (window.d3) return Promise.resolve(window.d3);
    return Promise.reject(new Error('d3 not bundled — src/d3.min.html include missing?'));
  };

  // ---------------------------------------------------------------------
  // 共通ヘルパ
  // ---------------------------------------------------------------------

  /**
   * 同一児童の再投稿を集約。emailHash 別に最新のみを "current" として返す。
   *
   * Why ghost を廃止: 旧設計は「最新=current(濃) + 過去=ghost(薄)」を同一画面に重ねて
   *   表示していたが、教師から「いま何が起きているのか」が読み取りにくいフィードバックを
   *   受けたため廃止。過去状態の振り返りは timeline スライダー (vizMaybeCaptureSnapshot
   *   が SS の timestamp 列から hydrate する snapshot 配列) で「時刻ごとの分布」として
   *   再生する方式に統一する。これは PDF p.5「シークバーで過去の状態を振り返る」に
   *   忠実な実装でもある。
   *
   * 後方互換: 戻り値の shape は { current, ghost } のまま（ghost は常に空配列）。
   *   呼び出し側のコードを最小変更で済ませるため。
   *
   * timestamp は string/Date 両対応。Date.parse で安全に比較し最新を採用。
   */
  // ---------------------------------------------------------------------
  // リアクション可視化ヘルパ (matrix / numberline 共通)
  //
  // Why: PDF p.5 「教師が児童間の反応を見取る」の素材として、各児童マーカーに
  //   「どんなリアクションが何件付いたか」を一目で示す。色は既存リアクション 3 種に
  //   対応 (UNDERSTAND=緑, LIKE=赤, CURIOUS=紫)。viz-dot の stroke 色を最頻 type に
  //   塗り、内部に合計数を小さく重ねる。リアクション 0 件の dot は既存挙動のまま。
  // ---------------------------------------------------------------------
  // Why: page.js の createReactionButtons と同じ Tailwind カラーに揃える
  //   (UNDERSTAND=yellow / LIKE=red / CURIOUS=green)。AdminPanel と既存カード UI に
  //   そのまま準じることで、教師・児童どちらの目線でも色のセマンティクスが統一される。
  // ───────────────────────────────────────────────────────────────────
  // 設計ガードレール（研究根拠・変更時は必ず読むこと）:
  //   ドットの色は **意見の中身（reaction / highlight / lone-voice）** だけで決める。
  //   クラスや属性で **色分けしない**。 集団(クラス)ごとに色を割り当てて隣に並べると、
  //   集団間のギャップが強調され社会的同調・分極化を誘発することが実証されている
  //   （IEEE VIS 2023 "Polarizing Political Polls": 非党派的な集約の方が分極化が小さい）。
  //   classFilter は「1 クラスに絞って注目する」単一フィルタであり、 クラスを横並びで
  //   比較する UI ではない（= 中立的な集約）。 この原則を崩す変更（クラス別カラー、
  //   クラス対比ビュー等）は導入しないこと。
  // ───────────────────────────────────────────────────────────────────
  const REACTION_TYPES = ['UNDERSTAND', 'LIKE', 'CURIOUS'];
  const REACTION_COLORS = {
    UNDERSTAND: '#eab308',  // text-yellow-500 (なるほど！)
    LIKE:       '#ef4444',  // text-red-500    (いいね！)
    CURIOUS:    '#22c55e'   // text-green-500  (もっと知りたい！)
  };
  // CVD（色覚多様性）対応の冗長符号化（v2861）:
  //   リング色だけだと LIKE(赤) と CURIOUS(緑) が **赤緑色覚（男子の約 8%）に区別不能**。
  //   そこでリアクション種別ごとに stroke の破線パターンも変え、「色 + 線パターン」の二重符号化に
  //   する（WCAG 2.1 / Color Universal Design のセオリー: "色だけに頼らずパターン/ラベルでも区別")。
  //   電子黒板に投影された dot を色覚に依らず読み分けられる。 highlight(金) は太線で既に判別可能なので
  //   実線のまま。 色そのもの(REACTION_COLORS)はブランド統一のため変えない（ボタン/カードと一致）。
  const REACTION_DASH = {
    UNDERSTAND: null,    // 実線 (なるほど)
    LIKE:       '5,3',   // 長破線 (いいね)
    CURIOUS:    '1.5,2'  // 短破線・点線風 (もっと知りたい)
  };
  function reactionDash(type) {
    return (type && REACTION_DASH[type]) || null;
  }

  function totalReactions(row) {
    if (!row || !row.reactions) return 0;
    let n = 0;
    for (const t of REACTION_TYPES) {
      n += (row.reactions[t] && row.reactions[t].count) || 0;
    }
    return n;
  }

  function topReactionType(row) {
    if (!row || !row.reactions) return null;
    let topType = null, topCount = 0;
    for (const t of REACTION_TYPES) {
      const c = (row.reactions[t] && row.reactions[t].count) || 0;
      if (c > topCount) { topCount = c; topType = t; }
    }
    return topType;
  }

  // ---------------------------------------------------------------------
  // 行リストポップアップ (pie のカテゴリ / wordcloud の単語 → 該当行群へリアクション)
  //
  // Why: pie のスライスや wordcloud のバーは「集計表現」なので、その背後にある
  //   個別行 (児童の回答) にリアクションする導線がないと board mode の機能が
  //   viz mode で失われる。スライス/バーをタップしたら関連する行の一覧 popup を
  //   出し、各行の既存リアクションボタンを押せるようにする。
  //
  //   実装方針: ボタン HTML は app.createReactionButtons(safeData) を流用 →
  //   AdminPanel ベースのカード UI と完全一致 (色・data 属性・aria 全て揃う)。
  //   click も page.js の handler と同じパターン (.reaction-btn / data-row-index /
  //   data-reaction)。これで「カードのリアクション体験を popup 内でそのまま再現」。
  // ---------------------------------------------------------------------
  function showRowsPopup(app, title, rows) {
    let popup = document.getElementById('vizRowsPopup');
    if (popup) popup.remove();

    popup = document.createElement('div');
    popup.id = 'vizRowsPopup';
    popup.className = 'viz-rows-popup';
    popup.setAttribute('role', 'dialog');
    popup.setAttribute('aria-modal', 'true');
    popup.setAttribute('aria-label', title);

    const safeTitle = escapeForTooltip(title);

    // matrix モードでは各意見にその「立場 (象限名)」を chip で併記。
    //   同じキーワード popup を全象限から集めるので、「同じ言葉が違う立場で使われている」発見が
    //   chip の色違いで visible になり、道徳的な多面性教育の核を担う。
    const axisCfg = (app.state && app.state.axisConfig) || {};
    const quadrantLabels = __resolveQuadrantLabels(axisCfg);
    const defaultMin = typeof axisCfg.defaultMin === 'number' ? axisCfg.defaultMin : 1;
    const defaultMax = typeof axisCfg.defaultMax === 'number' ? axisCfg.defaultMax : 5;
    const quadrantMid = (defaultMin + defaultMax) / 2;
    const quadrantOf = (r) => {
      if (typeof r.numericX !== 'number' || typeof r.numericY !== 'number') return '';
      const xKey = r.numericX >= quadrantMid ? 'h' : 'l';
      const yKey = r.numericY >= quadrantMid ? 'h' : 'l';
      return quadrantLabels[xKey + yKey] || '';
    };

    // displayMode 連動: profile.displaySettings.showNames=false → state.displayMode='anonymous'
    //   のとき、popup 内でも名前を出さない。教師 view (isOwnBoard/isAdmin) でも管理モード OFF
    //   なら同様に匿名扱い (showAnswerModal / renderBoardCards と整合)。
    const isNamed = (app.state && app.state.displayMode === 'named');

    // 各行のリアクションボタンを「カードと完全に同じ生成器」で作る (色 / SVG / showCounts / aria)。
    const canMakeBtns = typeof app.createReactionButtons === 'function';
    const cards = rows.map((r) => {
      const displayName = isNamed
        ? escapeForTooltip(r.name || (r.email ? r.email.split('@')[0] : '') || '匿名')
        : '匿名';
      const text = escapeForTooltip(r.reason || r.answer || '(本文なし)');
      const quadrantName = quadrantOf(r);
      const chipHtml = quadrantName
        ? '<span class="viz-rows-popup-chip">📍 ' + escapeForTooltip(quadrantName) + '</span>'
        : '';
      const safeData = { rowIndex: r.rowIndex, reactions: r.reactions || {} };
      const reactionBtns = canMakeBtns ? app.createReactionButtons(safeData) : '';
      return [
        '<div class="viz-rows-popup-row" data-row-index="' + r.rowIndex + '" tabindex="0" role="button" aria-label="意見の詳細を表示">',
        '  <div class="viz-rows-popup-name">', displayName, chipHtml, '</div>',
        '  <div class="viz-rows-popup-reason">', text, '</div>',
        '  <div class="viz-rows-popup-actions reaction-container">', reactionBtns, '</div>',
        '</div>'
      ].join('');
    }).join('');

    popup.innerHTML = [
      '<div class="viz-rows-popup-card">',
      '  <div class="viz-rows-popup-header">',
      '    <h4>', safeTitle, '</h4>',
      '    <button type="button" class="viz-rows-popup-close" aria-label="閉じる">×</button>',
      '  </div>',
      '  <div class="viz-rows-popup-body">', cards || '<p class="viz-rows-popup-empty">該当する回答がありません</p>', '</div>',
      '</div>'
    ].join('');
    document.body.appendChild(popup);

    const close = () => { popup.remove(); document.removeEventListener('keydown', onKey); };
    const onKey = (e) => { if (e.key === 'Escape') close(); };
    document.addEventListener('keydown', onKey);

    popup.addEventListener('click', (e) => {
      // overlay click or × で閉じる
      if (e.target === popup || e.target.classList.contains('viz-rows-popup-close')) {
        close();
        return;
      }
      // リアクションボタン: 既存ロジック (楽観 UI + 即時 toggle)
      const reactionBtn = e.target.closest('.reaction-btn');
      if (reactionBtn) {
        if (reactionBtn.disabled) return;
        const rowIdx = Number(reactionBtn.dataset.rowIndex);
        const type = reactionBtn.dataset.reaction;
        if (!rowIdx || !type) return;
        if (typeof app.addReaction !== 'function') return;

        const wasReacted = reactionBtn.classList.contains('reacted');
        const countSpan = reactionBtn.querySelector('.reaction-count');
        if (countSpan) {
          const cur = Number(countSpan.textContent || '0');
          countSpan.textContent = String(Math.max(0, cur + (wasReacted ? -1 : 1)));
        }
        reactionBtn.classList.toggle('reacted', !wasReacted);
        reactionBtn.setAttribute('aria-pressed', String(!wasReacted));

        app.addReaction(rowIdx, type);
        return;
      }

      // reaction-container 内の padding/隙間 click は popup を閉じない (誤動作防止)。
      if (e.target.closest('.viz-rows-popup-actions')) return;

      // 行 (reaction 以外の領域) click → 詳細モーダルを開く。
      //   popup は閉じる: 「一覧 → 個別意見の精読」という UX フローを直線化。
      const row = e.target.closest('.viz-rows-popup-row');
      if (row && typeof app.showAnswerModal === 'function') {
        const rowIdx = Number(row.dataset.rowIndex);
        if (rowIdx) {
          close();
          app.showAnswerModal(rowIdx);
        }
      }
    });

    // キーボード操作: 行に focus 時 Enter / Space で詳細モーダルを開く
    popup.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const row = e.target.closest('.viz-rows-popup-row');
      if (!row) return;
      e.preventDefault();
      const rowIdx = Number(row.dataset.rowIndex);
      if (rowIdx && typeof app.showAnswerModal === 'function') {
        close();
        app.showAnswerModal(rowIdx);
      }
    });
  }

  function groupByStudent(rows, allowResubmit) {
    if (!Array.isArray(rows)) return { current: [], ghost: [] };
    if (!allowResubmit) return { current: rows, ghost: [] };

    // emailHash 別に最新行のみ保持 (ts 比較で 1 パスで決定、sort 不要)
    const byHash = new Map();
    rows.forEach((row) => {
      const key = row.emailHash || ('row_' + row.rowIndex);
      const ts = row.timestamp ? Date.parse(row.timestamp) || 0 : 0;
      const existing = byHash.get(key);
      if (!existing || ts >= existing._ts) {
        byHash.set(key, Object.assign({}, row, { _ts: ts }));
      }
    });
    return { current: Array.from(byHash.values()), ghost: [] };
  }

  /**
   * 揺らぎ計算: 同一 emailHash の最新と過去の差分（distance）を測定。
   * Why: 教師ダッシュボードで「意見が大きく動いた児童」上位 N を提示するため。
   *      M1 は |Δx|、M2 は √(Δx² + Δy²) のユークリッド距離。
   */
  /**
   * 児童(emailHash)ごとの回答イベントを ts 昇順の配列で返す共有集計。
   *   vizComputeSwings（揺らぎ）と vizComputeOpinionShift（収束/分散）が共有する。
   *   emailHash が無い行（メアド収集 OFF）と numericX が無い行はスキップ。
   * @returns {Map<string, Array<{ts:number,x:number,y:(number|null),name:string,comment:string}>>}
   */
  function groupStudentEvents(rows) {
    const byHash = new Map();
    (rows || []).forEach((row) => {
      const key = row.emailHash;
      if (!key) return;
      const x = (typeof row.numericX === 'number') ? row.numericX : null;
      if (x === null) return;
      const ts = row.timestamp ? Date.parse(row.timestamp) || 0 : 0;
      const y = (typeof row.numericY === 'number') ? row.numericY : null;
      const list = byHash.get(key) || [];
      list.push({ ts, x, y, name: row.name || '', comment: row.reason || row.answer || '' });
      byHash.set(key, list);
    });
    byHash.forEach((list) => list.sort((a, b) => a.ts - b.ts));
    return byHash;
  }

  StudyQuestApp.prototype.vizComputeSwings = function (rows, mode) {
    if (!Array.isArray(rows) || rows.length === 0) return [];

    const byHash = groupStudentEvents(rows);

    const swings = [];
    byHash.forEach((list, key) => {
      if (list.length < 2) return;
      const first = list[0];
      const last = list[list.length - 1];
      const has2D = mode === 'matrix' && first.y !== null && last.y !== null;
      const fy = has2D ? first.y : 0;
      const ly = has2D ? last.y  : 0;
      const distance = euclidean(first.x, fy, last.x, ly);
      if (distance === 0) return;
      swings.push({
        emailHash: key,
        name: last.name,
        comment: last.comment,
        from: { x: first.x, y: first.y },
        to:   { x: last.x,  y: last.y  },
        distance,
        count: list.length
      });
    });

    swings.sort((a, b) => b.distance - a.distance);
    return swings;
  };

  /**
   * 意見変容サマリ（熟議型世論調査 Deliberative Polling, Fishkin）。
   *   児童ごとの「最初の位置」と「最新の位置」のコホート全体のばらつき(標準偏差)を比較し、
   *   議論を経て意見が **収束(ばらつき減)** したか **分散(ばらつき増)** したかを測る。
   *
   * 重要な設計判断（多数派バイアス回避）:
   *   - これは **教師端末のみ** に出す分析であり、 児童には見せない（「クラスは収束した」を
   *     児童に示すと同調圧力 = conformity を生む。 IEEE VIS 2023 / 同調研究）。
   *   - 文言は **記述的**（ばらつきが小さく/大きくなった）であり評価的（良い/悪い）にしない。
   *     収束も分散もどちらも正当な熟議の帰結（道理ある不一致 reasonable disagreement）。
   *
   * @returns {{before:number, after:number, delta:number, trend:string, movedCount:number, total:number}|null}
   */
  StudyQuestApp.prototype.vizComputeOpinionShift = function (rows, mode) {
    if (!Array.isArray(rows) || rows.length === 0) return null;
    const has2D = mode === 'matrix';
    const byHash = groupStudentEvents(rows);

    const firsts = [];
    const lasts = [];
    let movedCount = 0;
    byHash.forEach((list) => {
      const first = list[0];
      const last = list[list.length - 1];
      firsts.push(first);
      lasts.push(last);
      if (list.length >= 2) {
        const fy = has2D && first.y !== null ? first.y : 0;
        const ly = has2D && last.y !== null ? last.y : 0;
        if (euclidean(first.x, fy, last.x, ly) > 0.001) movedCount += 1;
      }
    });
    if (firsts.length < 2) return null; // 2 名未満では「ばらつき」を語れない

    const stdev = (vals) => {
      const n = vals.length;
      const mean = vals.reduce((s, v) => s + v, 0) / n;
      const variance = vals.reduce((s, v) => s + (v - mean) * (v - mean), 0) / n;
      return Math.sqrt(variance);
    };
    const spreadOf = (arr) => {
      const sx = stdev(arr.map((p) => p.x));
      if (!has2D) return sx;
      const sy = stdev(arr.map((p) => (p.y === null ? 0 : p.y)));
      return Math.sqrt(sx * sx + sy * sy);
    };
    const before = spreadOf(firsts);
    const after = spreadOf(lasts);
    const delta = after - before;
    // 閾値 0.15 (Likert 1-5 で約 3-4%) 未満は「ほぼ変化なし」とする
    let trend = 'stable';
    if (delta < -0.15) trend = 'converged';
    else if (delta > 0.15) trend = 'diverged';
    return { before, after, delta, trend, movedCount, total: firsts.length };
  };

  // ---------------------------------------------------------------------
  // ツールチップ管理（M1/M2 共通）
  // ---------------------------------------------------------------------

  function ensureTooltip() {
    let tip = document.getElementById('vizTooltip');
    if (!tip) {
      tip = document.createElement('div');
      tip.id = 'vizTooltip';
      tip.className = 'viz-tooltip';
      tip.setAttribute('role', 'tooltip');
      document.body.appendChild(tip);
    }
    return tip;
  }

  function showTooltip(event, item, app, sameCoordCount) {
    const tip = ensureTooltip();
    // Why: カード実装 (page.js createNameDisplay) と同じ振舞いに揃える。
    //   サーバは isOwnBoard=true なら name を含めて送るが、教師端末でも「管理モード OFF」のときは
    //   生徒と同じ匿名表示にする（state.displayMode を参照）。displayMode='named' になるのは
    //   showAdminFeatures=true (管理モード切替) もしくは displaySettings.showNames=true のとき。
    //
    //   discriminator: emailHash の有無で「児童レコード」か「カテゴリラベル(pie slice 等)」を判定。
    //     - 児童レコード: displayMode に従う（匿名 or 実名）
    //     - カテゴリラベル: 常に label をそのまま表示（匿名化しない）
    const showName = app && app.state && app.state.displayMode === 'named';
    const isStudentRecord = item && item.emailHash !== undefined && item.emailHash !== null;
    const valueText = (item.numericY !== null && item.numericY !== undefined)
      ? `(${item.numericX}, ${item.numericY})`
      : `${item.numericX}`;
    let headerText;
    if (isStudentRecord) {
      headerText = (showName && item.name) ? escapeForTooltip(item.name) : '匿名';
    } else {
      // pie/wordcloud などのカテゴリラベル — name フィールドは「選択肢」「語」等の意味
      headerText = item.name ? escapeForTooltip(item.name) : '';
    }
    const commentText = escapeForTooltip(item.reason || item.answer || '');

    // 同座標カウント (v2691): matrix / numberline で同じ Likert 整数値に N 名いる事実を明示。
    //   forceCollide で散らばって見えるドット塊が「実は全員同じ値」と読めるようにする
    //   （数学的 honesty: 偽 variance の誤読を防ぐ）。
    //   sameCoordCount が 2 以上で、かつ本人を含む合計なら「ほか N-1 名」と表示。
    const sameCoordText = (typeof sameCoordCount === 'number' && sameCoordCount >= 2)
      ? `<div class="tooltip-samecoord">同じ ${valueText} に ほか ${sameCoordCount - 1} 名</div>`
      : '';

    tip.innerHTML =
      `<div class="tooltip-meta">${headerText}${item.class ? ' / ' + escapeForTooltip(item.class) : ''}</div>` +
      `<div><span class="tooltip-value">${valueText}</span>${commentText || '<em class="tooltip-empty">（コメントなし）</em>'}</div>` +
      sameCoordText;
    tip.classList.add('visible');

    // 画面端ぴったりにならないよう少しオフセット
    const x = event.clientX + 14;
    const y = event.clientY + 14;
    const maxX = window.innerWidth - tip.offsetWidth - 8;
    const maxY = window.innerHeight - tip.offsetHeight - 8;
    tip.style.left = Math.min(x, Math.max(8, maxX)) + 'px';
    tip.style.top = Math.min(y, Math.max(8, maxY)) + 'px';
  }

  function hideTooltip() {
    const tip = document.getElementById('vizTooltip');
    if (tip) tip.classList.remove('visible');
  }

  // viz 要素 (dot / slice / bar) の外側をクリックしたら tooltip を消す。
  // click は capture 段階で 1 度だけ document に登録。
  if (typeof document !== 'undefined' && !document.__vizTooltipDocHandlerAttached) {
    document.__vizTooltipDocHandlerAttached = true;
    document.addEventListener('click', (e) => {
      const target = e.target;
      if (!target || !target.closest) return;
      // viz 要素 or tooltip 自体の上なら触らない
      if (target.closest('.viz-dot, .pie-slice, .word-bar, .viz-tooltip')) return;
      hideTooltip();
    });
    // Esc キーでも消えるのが UX 的に自然
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideTooltip();
    });
  }

  function escapeForTooltip(s) {
    return window.sharedUtilities.security.escapeHtml(s == null ? '' : String(s));
  }

  /**
   * SVG の幅 / viewBox を viewport にフィットさせる。matrix / pie / wordcloud
   * など 2D viz 共通。height は header 控除後 78vh 相当。
   * @returns {{width:number, height:number}}
   */
  function fitSvgToViewport(svgEl, minWidth) {
    const bounds = svgEl.getBoundingClientRect();
    const width = Math.max(minWidth, bounds.width || 800);
    const targetH = Math.max(420, Math.round(window.innerHeight * 0.78));
    const height = Math.max(targetH, bounds.height || targetH);
    svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);
    svgEl.style.height = height + 'px';
    return { width, height };
  }

  // ---------------------------------------------------------------------
  // コンテナ初期化（既存 #answers を viz 用に再利用）
  // ---------------------------------------------------------------------

  function getOrCreateVizContainer(app) {
    const answers = app.elements.answersContainer;
    if (!answers) return null;

    // Why: tooltip は body 直下に置いているため、mode 切替で SVG が消えても
    //   leftover として残ることがある（click 直後に viewport 外へカーソルが
    //   外れた、または mode 切替で hover 元の要素が消えた）。
    //   container を作り直すタイミングで明示的にクリーンアップする。
    hideTooltip();

    // Why (DOM 再利用): polling のたびに innerHTML='' で DOM を作り直すと、
    //   scroll position / tooltip / 選択 state が全リセットされる
    //   (教師フィードバック 2026-05-14「更新のたびにスクロール等がリセットされる」)。
    //   既に viz-container として初期化済みなら、子要素を再利用して参照だけ返す。
    //   SVG の中身は renderMatrix/numberline 側で `svg.selectAll('*').remove()`
    //   して再描画するため、ここでは触らない。
    //
    //   ただし比較モード描画後 (`.viz-compare-wrap` が子要素として残る) は強制再構築。
    //   そうしないと比較解除後も 2 ペイン構造の中で querySelector が「最初の svg」を
    //   返して左ペインだけが再描画され、教師は「解除されない」と感じる。
    if (answers.classList.contains('viz-container') &&
        !answers.querySelector('.viz-compare-wrap')) {
      const existingSvg = answers.querySelector('svg#vizSvg');
      const existingPanel = answers.querySelector('#vizTeacherPanel');
      if (existingSvg && existingPanel) {
        return { svg: existingSvg, teacherPanel: existingPanel };
      }
    }

    // 初回 or board mode → viz mode 切替時のみ DOM を再構築
    //   (renderBoardCards が答えカードを答え container に詰めていたケースを含む)。
    answers.className = 'viz-container';
    answers.innerHTML = '';

    // SVG
    // Why role="img" + aria-label: ビーズワーム/散布図は児童の位置プロットなのでスクリーン
    // リーダーには静的画像として扱わせ、回答件数を要約として読み上げる。本文の児童名・
    // コメントは vizTeacherPanel (下) の <ul> 経由で AT に届くので、SVG 自体は要約のみ。
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('id', 'vizSvg');
    svg.setAttribute('class', 'viz-svg');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    svg.setAttribute('role', 'img');
    svg.setAttribute('aria-label', '児童の回答分布をプロットした図');
    answers.appendChild(svg);

    // 教師パネル
    const teacherPanel = document.createElement('div');
    teacherPanel.className = 'viz-teacher-panel';
    teacherPanel.id = 'vizTeacherPanel';
    teacherPanel.innerHTML =
        '<div id="vizOpinionShift" class="viz-opinion-shift"></div>'
      + '<div class="viz-panel-section" id="vizReasonSeedsSection" style="display:none">'
      +   '<h3>議論のたねになる声<span class="viz-panel-sub">（各立場から・教師用）</span></h3>'
      +   '<p class="viz-panel-hint">人気順ではありません。立場ごとに「理由を述べている声」を手がかりとして1つずつ。読み上げる声は先生が選びます。</p>'
      +   '<ul id="vizReasonSeeds"></ul>'
      + '</div>'
      + '<div class="viz-panel-section" id="vizSwingSection" style="display:none">'
      +   '<h3>気になる児童<span class="viz-panel-sub">（意見が動いた順）</span></h3>'
      +   '<ul id="vizSwingList"></ul>'
      + '</div>';
    answers.appendChild(teacherPanel);

    return { svg, teacherPanel };
  }

  // 「最終更新 HH:MM」をヘッダー右の #lastUpdatedText に表示。
  function updateStatsPills(_app, _count) {
    const updatedEl = document.getElementById('lastUpdatedText');
    if (!updatedEl) return;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    updatedEl.textContent = '最終更新 ' + hh + ':' + mm;
  }

  function maybeRenderTeacherPanel(app, swings, rows, mode) {
    const panel = document.getElementById('vizTeacherPanel');
    if (!panel) return;

    // Why: パネルは教師端末のみ。表示する name は displayMode に合わせる
    //   （管理モード OFF のときは匿名 + emailHash で識別）。 カード実装と同じ振舞い。
    const showAdmin = Boolean(app.state.showAdminFeatures);
    const showName = app.state.displayMode === 'named';

    // (1) 意見変容サマリ（教師のみ・記述的）。 swings が空でも shift は出し得る。
    const shiftEl = document.getElementById('vizOpinionShift');
    const shift = showAdmin ? app.vizComputeOpinionShift(rows || [], mode) : null;
    if (shiftEl) {
      if (shift) {
        const b = shift.before.toFixed(1);
        const a = shift.after.toFixed(1);
        let msg;
        if (shift.trend === 'converged') {
          msg = `議論を経て、意見のばらつきは小さくなりました（${b} → ${a}）。`;
        } else if (shift.trend === 'diverged') {
          msg = `議論を経て、意見のばらつきは大きくなりました（${b} → ${a}）。`;
        } else {
          msg = `意見のばらつきはほぼ変わりませんでした（${b} → ${a}）。`;
        }
        shiftEl.textContent = `${msg} ${shift.movedCount}名が立場を動かしました。`;
        shiftEl.style.display = '';
      } else {
        shiftEl.textContent = '';
        shiftEl.style.display = 'none';
      }
    }

    // (2) 議論のたねになる声（教師のみ・各立場から1件・記述的）。
    //   人気順ではなく position coverage で選ぶ（多数派バイアス回避）。 swing と違い
    //   再投稿不要なので単一投稿のボードでも機能する = 最も広く使える教師ヒント。
    const seedsEl = document.getElementById('vizReasonSeeds');
    let seeds = [];
    if (showAdmin) {
      const groups = buildPositionGroups(rows || [], mode, app.state.axisConfig);
      seeds = representativeReasons(groups, { perBucket: 1, field: 'reason', minLen: 6 });
    }
    if (seedsEl) {
      const section = document.getElementById('vizReasonSeedsSection');
      if (seeds.length) {
        seedsEl.innerHTML = seeds.map((s) => {
          const who = (showName && s.name) ? escapeForTooltip(s.name)
                    : (s.emailHash ? '匿名(' + s.emailHash + ')' : '匿名');
          // raw を先に切ってから escape する（entity 途中切り防止）。
          const stance = s.label
            ? '<span class="viz-seed-stance">' + escapeForTooltip(String(s.label).substring(0, 24)) + '</span>'
            : '';
          const reason = escapeForTooltip(String(s.reason).substring(0, 120));
          return '<li>' + stance + '<span class="viz-seed-who">' + who + '</span>「' + reason + '」</li>';
        }).join('');
        if (section) section.style.display = '';
      } else {
        seedsEl.innerHTML = '';
        if (section) section.style.display = 'none';
      }
    }

    // (3) 気になる児童（意見が動いた順）。 swing は再投稿許可 + 複数投稿が前提。
    const list = document.getElementById('vizSwingList');
    const swingSection = document.getElementById('vizSwingSection');
    const hasSwings = showAdmin && swings.length > 0;
    if (list) {
      if (hasSwings) {
        const top = swings.slice(0, 5);
        list.innerHTML = top.map((s) => {
          const fromTo = (s.from.y !== null && s.to.y !== null)
            ? `(${s.from.x},${s.from.y}) → (${s.to.x},${s.to.y})`
            : `${s.from.x} → ${s.to.x}`;
          const name = (showName && s.name) ? escapeForTooltip(s.name) : '匿名(' + s.emailHash + ')';
          // raw を先に切ってから escape する（"&amp;" を entity 途中で切らないため）。
          const comment = s.comment ? '：' + escapeForTooltip(String(s.comment).substring(0, 60)) : '';
          return `<li><span class="swing-badge">Δ${s.distance.toFixed(1)}</span>${name} ${fromTo}${comment}</li>`;
        }).join('');
        if (swingSection) swingSection.style.display = '';
      } else {
        list.innerHTML = '';
        if (swingSection) swingSection.style.display = 'none';
      }
    }

    // パネルは shift / seeds / swing のいずれかがあれば表示。
    panel.classList.toggle('active', Boolean(shift) || seeds.length > 0 || hasSwings);
  }

  // ---------------------------------------------------------------------
  // M1: 数直線ビーズワーム
  // ---------------------------------------------------------------------

  StudyQuestApp.prototype.renderNumberLine = async function (isInitialLoad, oldRows) {
    try {
      const d3 = await this.ensureD3Loaded();
      const rows = (this.state.currentAnswers || []).filter((r) => typeof r.numericX === 'number');
      const containerRefs = getOrCreateVizContainer(this);
      if (!containerRefs) return;
      // 前回 matrix から切り替わった時のため象限パネルを除去 (numberline では使わない)
      removeQuadrantSummary(this.elements.answersContainer);

      const axis = this.state.axisConfig || {};
      const allowResubmit = Boolean(axis.allowResubmit);
      const { current, ghost } = groupByStudent(rows, allowResubmit);

      // データ範囲：実データの min/max。空なら defaultMin/Max にフォールバック。
      const xs = current.map((r) => r.numericX).concat(ghost.map((r) => r.numericX));
      const dataMin = xs.length ? Math.min(...xs) : (axis.defaultMin || 1);
      const dataMax = xs.length ? Math.max(...xs) : (axis.defaultMax || 5);
      const min = Math.min(dataMin, axis.defaultMin || 1);
      const max = Math.max(dataMax, axis.defaultMax || 5);

      const svgEl = containerRefs.svg;
      const bounds = svgEl.getBoundingClientRect();
      const width = Math.max(320, bounds.width || 800);
      const height = Math.max(280, bounds.height || 480);
      svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);

      const svg = d3.select(svgEl);
      svg.selectAll('*').remove();

      const margin = { top: 40, right: 40, bottom: 80, left: 40 };
      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;
      const yCenter = innerH / 2;

      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      const xScale = d3.scaleLinear().domain([min, max]).range([0, innerW]);

      // 軸（連続）
      const xAxis = d3.axisBottom(xScale)
        .tickValues(d3.range(min, max + 1))
        .tickFormat((d) => d);
      g.append('g')
        .attr('class', 'viz-axis')
        .attr('transform', `translate(0, ${yCenter + 70})`)
        .call(xAxis);

      // 軸ラベル（min / max）
      const xLabels = axis.xAxisLabels || {};
      g.append('text').attr('class', 'viz-axis-label')
        .attr('x', 0).attr('y', yCenter + 110)
        .attr('text-anchor', 'start')
        .text(xLabels.min || '');
      g.append('text').attr('class', 'viz-axis-label')
        .attr('x', innerW).attr('y', yCenter + 110)
        .attr('text-anchor', 'end')
        .text(xLabels.max || '');

      // 中央水平線（数直線）
      g.append('line')
        .attr('x1', 0).attr('x2', innerW)
        .attr('y1', yCenter + 70).attr('y2', yCenter + 70)
        .attr('stroke', 'rgba(148,163,184,0.4)')
        .attr('stroke-width', 1);

      // ヒストグラム（補助）：ticks の各値ごとの件数
      const counts = {};
      xs.forEach((v) => { counts[v] = (counts[v] || 0) + 1; });
      const maxCount = Math.max(1, ...Object.values(counts));
      const tickStep = innerW / Math.max(1, (max - min));
      const histH = 40;
      const histG = g.append('g').attr('class', 'viz-histogram').attr('transform', `translate(0,${yCenter + 130})`);
      for (let v = min; v <= max; v++) {
        const c = counts[v] || 0;
        const h = (c / maxCount) * histH;
        histG.append('rect')
          .attr('x', xScale(v) - tickStep * 0.3)
          .attr('y', histH - h)
          .attr('width', tickStep * 0.6)
          .attr('height', h);
        histG.append('text')
          .attr('x', xScale(v))
          .attr('y', histH + 14)
          .text(String(c));
      }

      // ゴースト点（過去投稿）— enter/exit は単純な data join。揺らぎ追跡のため。
      const ghostJoin = g.selectAll('.viz-dot.ghost').data(ghost, (d) => 'g_' + d.rowIndex);
      ghostJoin.exit().remove();
      ghostJoin.enter().append('circle')
        .attr('class', 'viz-dot ghost')
        .attr('r', 5)
        .attr('cx', (d) => xScale(d.numericX))
        .attr('cy', () => yCenter + 70);

      // Why: 揺らぎを「円の大きさ」で可視化（道徳指導案準拠）。
      //      同一児童の最初〜最新の移動距離 distance を radius に線形マップ。
      //      distance=0 (揺れなし) → base radius 7、distance>=4 → max radius 14。
      //      これにより教師が一目で「動いた児童」を判別できる。
      const swings = this.vizComputeSwings(rows, 'numberline');
      const swingByHash = new Map(swings.map(s => [s.emailHash, s.distance]));
      const BASE_R = 7, MAX_R = 14;
      const radiusFor = (d) => {
        if (!d.data || !d.data.emailHash) return BASE_R;
        const dist = swingByHash.get(d.data.emailHash) || 0;
        // 数直線の最大移動距離 = max - min = 4 (1-5 scale)
        const norm = Math.min(dist / 4, 1);
        return BASE_R + (MAX_R - BASE_R) * norm;
      };

      // 現在点（ビーズワーム配置）— force simulation で重なりを回避
      // Why: collide の半径は最大想定値で確保しないと大きい点同士が重なる。
      const COLLIDE_R = MAX_R + 1.5;
      // Why: d3.forceSimulation を 1 回 tick して final position を確定する。
      //      アニメーションは CSS の vizEnter で十分。data is static after each load。
      const nodes = current.map((r) => ({
        x: xScale(r.numericX),
        y: yCenter + 70,
        targetX: xScale(r.numericX),
        data: r
      }));
      const sim = d3.forceSimulation(nodes)
        .force('x', d3.forceX((d) => d.targetX).strength(1))
        .force('y', d3.forceY(yCenter + 70).strength(0.18))
        .force('collide', d3.forceCollide(COLLIDE_R))
        .stop();
      for (let i = 0; i < 120; i++) sim.tick();

      // 過去状態は timeline スライダーで時刻ごとの分布として再生する方式に統一
      // (PDF p.5)。trace 線/ghost マーカーを画面に重ねる UI は廃止済み。

      const dotJoin = g.selectAll('.viz-dot.current').data(nodes, (d) => d.data.rowIndex);
      dotJoin.exit().remove();
      const dotEnter = dotJoin.enter().append('circle')
        .attr('class', 'viz-dot current enter');
      const selfL = this;
      dotEnter.merge(dotJoin)
        .attr('cx', (d) => d.x)
        .attr('cy', (d) => d.y)
        .attr('r', (d) => radiusFor(d))
        .classed('swing-high', (d) => radiusFor(d) > BASE_R + 3)
        .classed('highlight', (d) => Boolean(d.data && d.data.highlight))
        // SVG presentation attribute (attr) は外部 CSS より specificity が低いため、
        //   .viz-dot { stroke: #0f172a } に上書きされて画面には出ない。
        //   インライン style (style) なら specificity 1000 相当で確実に勝てる。
        //
        //   priority: HIGHLIGHT (教師注目) > REACTION (児童間人気) > none
        //   教師が意図的に「みんな見て」した意見は金縁でリアクションリングより目立たせる。
        //   DCE: 教師の促しは同調圧力ではなく多面的視点の提示なので、強調 OK。
        .style('stroke', (d) => {
          if (d.data && d.data.highlight) return '#fbbf24'; // tailwind amber-400 (gold)
          const t = topReactionType(d.data);
          return t ? REACTION_COLORS[t] : null;
        })
        // 細く・淡く: 位置情報 (=立場) を主役のままに、リング (=人気) を脇役にする
        //   2026-05-14 道徳教育 / DCE 観点でレビュー: 太い枠線は「多数派 = 正解」の
        //   暗黙シグナル化リスクがある。細く淡くすれば視認可能性は保ちつつ威圧感を下げる。
        //   ただし HIGHLIGHT (教師注目) は意図的に目立たせる: width 3 + opacity 1.0。
        .style('stroke-width', (d) => {
          if (d.data && d.data.highlight) return 3.0;
          return topReactionType(d.data) ? 2.0 : null;
        })
        .style('stroke-opacity', (d) => {
          if (d.data && d.data.highlight) return 1.0;
          return topReactionType(d.data) ? 0.85 : null;
        })
        // CVD 冗長符号化: 種別ごとに破線パターンを変える（色 + 形）。 highlight は実線。
        .style('stroke-dasharray', (d) => {
          if (d.data && d.data.highlight) return null;
          return reactionDash(topReactionType(d.data));
        })
        .on('mouseenter', (event, d) => showTooltip(event, d.data, selfL))
        .on('mousemove',  (event, d) => showTooltip(event, d.data, selfL))
        .on('mouseleave', () => hideTooltip())
        .on('click', (event, d) => {
          hideTooltip();
          if (typeof selfL.showAnswerModal === 'function') {
            selfL.showAnswerModal(d.data.rowIndex);
          } else {
            showTooltip(event, d.data, selfL);
          }
        });

      // dot 中央のリアクション数バッジ (v2782 で showCounts ガードを追加して matrix と挙動を統一)。
      //   AdminPanel 設定「リアクション数を表示」(state.showCounts) を尊重する。
      //   非表示設定でも stroke 色 (リング) は残るので「人気の有無」は分かる。
      const showCounts = !!(this.state && this.state.showCounts);
      const reactedNodes = showCounts ? nodes.filter((n) => totalReactions(n.data) > 0) : [];
      const labelJoin = g.selectAll('.viz-dot-label').data(reactedNodes, (d) => 'l_' + d.data.rowIndex);
      labelJoin.exit().remove();
      labelJoin.enter().append('text')
        .attr('class', 'viz-dot-label')
        .attr('text-anchor', 'middle')
        .attr('pointer-events', 'none')
        .merge(labelJoin)
        .attr('x', (d) => d.x)
        .attr('y', (d) => d.y + 3.5)
        .text((d) => totalReactions(d.data));

      // 統計 + 教師パネル
      updateStatsPills(this, current.length);
      maybeRenderTeacherPanel(this, swings, rows, 'numberline');

      // 件数バッジ（既存のヘッダ表示）も更新（updateAnswerCount は board モード前提）
      if (this.elements.answerCount && typeof this.getIcon === 'function') {
        this.elements.answerCount.innerHTML =
          this.getIcon('users', 'w-4 h-4 inline-block -mt-1') + '<span>' + current.length + '件</span>';
      }
      vizHeartbeat('numberline', { rowCount: rows.length, current: current.length, ghost: ghost.length });
    } catch (e) {
      console.error('renderNumberLine: failed', e);
      throw e;
    }
  };

  // ---------------------------------------------------------------------
  // M2: 散布図（2x2 マトリクス）
  // ---------------------------------------------------------------------

  StudyQuestApp.prototype.renderMatrix = async function (isInitialLoad, oldRows) {
    try {
      const d3 = await this.ensureD3Loaded();
      const rows = (this.state.currentAnswers || []).filter((r) =>
        typeof r.numericX === 'number' && typeof r.numericY === 'number');
      const containerRefs = getOrCreateVizContainer(this);
      if (!containerRefs) return;

      const axis = this.state.axisConfig || {};
      const allowResubmit = Boolean(axis.allowResubmit);
      const { current, ghost } = groupByStudent(rows, allowResubmit);

      const all = current.concat(ghost);
      const xs = all.map((r) => r.numericX);
      const ys = all.map((r) => r.numericY);
      const minX = xs.length ? Math.min(...xs, axis.defaultMin || 1) : (axis.defaultMin || 1);
      const maxX = xs.length ? Math.max(...xs, axis.defaultMax || 5) : (axis.defaultMax || 5);
      const minY = ys.length ? Math.min(...ys, axis.defaultMin || 1) : (axis.defaultMin || 1);
      const maxY = ys.length ? Math.max(...ys, axis.defaultMax || 5) : (axis.defaultMax || 5);

      const svgEl = containerRefs.svg;
      // 散布図は 2D なので viewport を縦いっぱい使う (78vh)。CSS min-height 55vh を上書き。
      const { width, height } = fitSvgToViewport(svgEl, 320);

      const svg = d3.select(svgEl);
      svg.selectAll('*').remove();

      // bottom は対立軸サマリ + 共通の足場(consensus) の 2 行分を確保 (60 → 84)。
      const margin = { top: 24, right: 80, bottom: 84, left: 80 };
      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;
      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      const xScale = d3.scaleLinear().domain([minX, maxX]).range([0, innerW]);
      // Y は値が大きい=「高い」が上に来るよう反転
      const yScale = d3.scaleLinear().domain([minY, maxY]).range([innerH, 0]);

      // 4 象限の薄背景（X/Y 中央で分割）
      const midX = xScale((minX + maxX) / 2);
      const midY = yScale((minY + maxY) / 2);
      g.append('rect').attr('class', 'viz-quadrant hh')
        .attr('x', midX).attr('y', 0).attr('width', innerW - midX).attr('height', midY);
      g.append('rect').attr('class', 'viz-quadrant lh')
        .attr('x', 0).attr('y', 0).attr('width', midX).attr('height', midY);
      g.append('rect').attr('class', 'viz-quadrant hl')
        .attr('x', midX).attr('y', midY).attr('width', innerW - midX).attr('height', innerH - midY);
      g.append('rect').attr('class', 'viz-quadrant ll')
        .attr('x', 0).attr('y', midY).attr('width', midX).attr('height', innerH - midY);

      // 象限ラベル + 理由キーワードを SVG 内に配置 (「ドット位置 + 言葉の意味」を視線移動なしで把握)。
      //   anchor='top' → ラベルの下に配置 (hh/lh) / anchor='bottom' → ラベルの上に配置 (hl/ll)。
      const q = __resolveQuadrantLabels(axis);
      // バケット分け (renderQuadrantSummary と同じロジック)
      const buckets = { hh: [], lh: [], hl: [], ll: [] };
      for (const r of rows) {
        if (typeof r.numericX !== 'number' || typeof r.numericY !== 'number') continue;
        const xKey = r.numericX >= (minX + maxX) / 2 ? 'h' : 'l';
        const yKey = r.numericY >= (minY + maxY) / 2 ? 'h' : 'l';
        buckets[xKey + yKey].push(r);
      }
      // 各象限の reason を 1 回ずつトークン化してキャッシュ。
      //   旧: keywordsFor (4 cells) と contrastingPair (X 軸 / Y 軸) で同じ象限が
      //       6 回トークン化されていた。96 row × 6 = 576 回の冗長 TinySegmenter 呼び出しを削減。
      const cellMaps = {};
      for (const k of QUADRANT_KEYS) cellMaps[k] = _countWords(buckets[k], 'reason');

      // TF-IDF 風の象限固有度で keyword を選ぶ（v2691）。
      //   distinctiveKeywords が「この象限だけで突出する語」を選ぶ。
      // 道徳教育根拠: MEXT「一面的→多面的・多角的な見方」(2016 報告 p.10) — 象限の対比が明確に。
      const keywordsFor = (key) => {
        if (!buckets[key].length) return [];
        const otherMaps = QUADRANT_KEYS.filter((k) => k !== key).map((k) => cellMaps[k]);
        const distinctive = distinctiveKeywords(cellMaps[key], otherMaps, 'reason', 6);
        // 2+ 字の内容語を優先。全 keyword が 1 字なら fallback で 1 字も許容（v2668 と同じ）。
        const longWords = distinctive.filter((w) => w.word.length >= 2).slice(0, 3);
        const top = longWords.length > 0 ? longWords : distinctive.slice(0, 3);
        return top.map((w) => w.word);
      };
      // 各 keyword を click 可能にして「その語を含む全意見」一覧 popup を開く。
      //   多面性教育の観点: クリック象限だけでなく全象限の reason を対象にする
      //   → 「同じ言葉が違う立場で使われている」発見を最大化する。
      const selfM = this;
      const openKeywordPopup = (keyword) => {
        const allRows = (selfM.state.currentAnswers || []);
        // reason に keyword を含む行を抽出 (時系列順を維持 = 序列を作らない)
        const matched = allRows.filter(r => {
          const reason = String(r.reason || '');
          return reason.indexOf(keyword) >= 0;
        });
        showRowsPopup(selfM, '「' + keyword + '」を含む回答 (' + matched.length + '件)', matched);
      };
      const placeLabel = (text, x, y, key, anchor) => {
        if (!text) return;
        g.append('text').attr('class', 'viz-quadrant-label')
          .attr('x', x).attr('y', y).text(text);
        // Empty Chair（"The Empty Chair", 欠けている視点の提示）—
        //   誰も意見を置いていない象限を「まだ誰もいない視点」として控えめに示す。
        //   多様な視点を促し「孤立した学び」を防ぐ(中教審 2021)。 強調はしない (muted hint)。
        if (rows.length > 0 && !buckets[key].length) {
          const hintY = anchor === 'top' ? y + 22 : y - 22;
          g.append('text').attr('class', 'viz-empty-chair-hint')
            .attr('x', x).attr('y', hintY)
            .text('まだ誰もいない視点');
          return;
        }
        const kws = keywordsFor(key);
        if (kws.length > 0) {
          const kwY = anchor === 'top' ? y + 22 : y - 22;
          const kwLine = g.append('text').attr('class', 'viz-quadrant-keyword')
            .attr('x', x).attr('y', kwY);
          // 各キーワードを <tspan> で分けて、それぞれ click handler を attach
          kws.forEach((k, idx) => {
            const tspan = kwLine.append('tspan')
              .attr('class', 'viz-quadrant-keyword-pill')
              .text('#' + k)
              .on('click', (event) => {
                if (event && typeof event.stopPropagation === 'function') event.stopPropagation();
                openKeywordPopup(k);
              });
            // 視覚区切り
            if (idx < kws.length - 1) {
              kwLine.append('tspan').text('  ');
            }
            // a11y: keyboard 操作のため tabindex / role
            const node = tspan.node();
            if (node) {
              node.setAttribute('role', 'button');
              node.setAttribute('tabindex', '0');
              node.setAttribute('aria-label', k + ' を含む回答を一覧表示');
              node.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                  e.preventDefault();
                  openKeywordPopup(k);
                }
              });
            }
          });
        }
      };
      placeLabel(q.hh, midX + (innerW - midX) / 2, 24, 'hh', 'top');
      placeLabel(q.lh, midX / 2, 24, 'lh', 'top');
      placeLabel(q.hl, midX + (innerW - midX) / 2, innerH - 8, 'hl', 'bottom');
      placeLabel(q.ll, midX / 2, innerH - 8, 'll', 'bottom');

      // 整数セル格子線（v2691）— Likert 整数値ごとに薄い grid を引き、
      //   ドット集塊が「同じセルに集まっている」ことを視覚的に明示する。
      //   forceCollide によるジッターが「偽 variance」を示唆する読み違いを緩和。
      //   中央クロス線より薄く（0.15）描いて軸線との競合を避ける。
      const gridStroke = 'rgba(148,163,184,0.15)';
      for (let v = Math.ceil(minX); v <= Math.floor(maxX); v++) {
        const x = xScale(v);
        if (Math.abs(x - midX) < 1) continue; // 中央クロスと重複しない
        g.append('line').attr('class', 'viz-grid')
          .attr('x1', x).attr('x2', x).attr('y1', 0).attr('y2', innerH)
          .attr('stroke', gridStroke);
      }
      for (let v = Math.ceil(minY); v <= Math.floor(maxY); v++) {
        const y = yScale(v);
        if (Math.abs(y - midY) < 1) continue;
        g.append('line').attr('class', 'viz-grid')
          .attr('x1', 0).attr('x2', innerW).attr('y1', y).attr('y2', y)
          .attr('stroke', gridStroke);
      }

      // 軸線（中央クロス）
      g.append('line').attr('x1', midX).attr('x2', midX).attr('y1', 0).attr('y2', innerH)
        .attr('stroke', 'rgba(148,163,184,0.4)');
      g.append('line').attr('x1', 0).attr('x2', innerW).attr('y1', midY).attr('y2', midY)
        .attr('stroke', 'rgba(148,163,184,0.4)');

      // 外枠軸
      g.append('g').attr('class', 'viz-axis').attr('transform', `translate(0,${innerH})`)
        .call(d3.axisBottom(xScale).tickValues(d3.range(minX, maxX + 1)));
      g.append('g').attr('class', 'viz-axis')
        .call(d3.axisLeft(yScale).tickValues(d3.range(minY, maxY + 1)));

      // 軸ラベル
      const xL = axis.xAxisLabels || {};
      const yL = axis.yAxisLabels || {};
      g.append('text').attr('class', 'viz-axis-label')
        .attr('x', 0).attr('y', innerH + 44).attr('text-anchor', 'start').text(xL.min || '');
      g.append('text').attr('class', 'viz-axis-label')
        .attr('x', innerW).attr('y', innerH + 44).attr('text-anchor', 'end').text(xL.max || '');
      g.append('text').attr('class', 'viz-axis-label')
        .attr('transform', `translate(-44,${innerH}) rotate(-90)`).attr('text-anchor', 'start')
        .text(yL.min || '');
      g.append('text').attr('class', 'viz-axis-label')
        .attr('transform', `translate(-44,0) rotate(-90)`).attr('text-anchor', 'end')
        .text(yL.max || '');

      // 対立軸サマリ（v2691）— 児童の言葉から「議論の軸」を自動命名する。
      //   X 軸 (左 vs 右) と Y 軸 (下 vs 上) でそれぞれ対立語ペアを抽出。
      //   X で使った key を Y 抽出時に除外して「気持ち が右にも上にも」重複表示を回避。
      // 道徳教育根拠: 学術会議「道理ある不一致 reasonable disagreement」(2020 報告 p.10)。
      const leftMap  = mergeWordMaps([cellMaps.lh, cellMaps.ll]);
      const rightMap = mergeWordMaps([cellMaps.hh, cellMaps.hl]);
      const upperMap = mergeWordMaps([cellMaps.lh, cellMaps.hh]);
      const lowerMap = mergeWordMaps([cellMaps.ll, cellMaps.hl]);
      const xPair = contrastingPair(leftMap, rightMap, 'reason');
      const xExclude = xPair ? new Set([xPair.leftKey, xPair.rightKey]) : new Set();
      const yPair = contrastingPair(lowerMap, upperMap, 'reason', xExclude);
      const summaryParts = [];
      if (xPair) summaryParts.push('#' + xPair.left + ' ↔ #' + xPair.right);
      if (yPair) summaryParts.push('#' + yPair.left + ' ↔ #' + yPair.right);
      if (summaryParts.length > 0) {
        g.append('text').attr('class', 'viz-contrast-summary')
          .attr('x', innerW / 2).attr('y', innerH + 44).attr('text-anchor', 'middle')
          .text('議論の対立軸:  ' + summaryParts.join('   |   '));
      }

      // 共通の足場（consensus / bridging）— 対立軸の「補集合」を 1 行で示す。
      //   立場を越えて多くの象限で共有される語 = 協働の入口。 対立軸で使った語は除外して
      //   「分断点」と「共通点」が視覚的に別物だと分かるようにする。
      // 道徳教育根拠: 中教審答申(2021)「多様な他者と協働し新たな見方に出会う」/ Pol.is bridging。
      //   多数派の人数ではなく coverage(立場の広がり) で選ぶので多数派バイアスを生まない。
      const contrastKeys = new Set();
      if (xPair) { contrastKeys.add(xPair.leftKey); contrastKeys.add(xPair.rightKey); }
      if (yPair) { contrastKeys.add(yPair.leftKey); contrastKeys.add(yPair.rightKey); }
      const consensus = consensusKeywords(
        QUADRANT_KEYS.map((k) => cellMaps[k]), 'reason', 2, { minCoverageRatio: 0.75, exclude: contrastKeys }
      );
      if (consensus.length > 0) {
        g.append('text').attr('class', 'viz-consensus-summary')
          .attr('x', innerW / 2).attr('y', innerH + 62).attr('text-anchor', 'middle')
          .text('立場を越えた共通の言葉:  ' + consensus.map((c) => '#' + c.word).join('   '));
      }

      // ghost 配列は groupByStudent が常に空 ([]) を返すので no-op。
      // 「揺らぎ大の子だけ」の限定 ghost + trace は下の swing-trace 描画で扱う。
      g.selectAll('.viz-dot.ghost').remove();

      // M2 でも揺らぎを radius で可視化。2 軸 (1-5) の対角線最大は √(4²+4²) ≈ 5.66。
      // ドット半径は「ブロブ化」を避けるため意図的に小さめ (BASE=5, MAX=9)。
      const swings = this.vizComputeSwings(rows, 'matrix');
      const swingByHashM = new Map(swings.map(s => [s.emailHash, s.distance]));
      const BASE_R_M = 5, MAX_R_M = 9;
      const radiusForMatrix = (d) => {
        if (!d.data || !d.data.emailHash) return BASE_R_M;
        const dist = swingByHashM.get(d.data.emailHash) || 0;
        const norm = Math.min(dist / 5.66, 1);
        return BASE_R_M + (MAX_R_M - BASE_R_M) * norm;
      };

      // 現在点：軸の整数値の近傍に寄せつつ、重なりは forceCollide で押し戻し。
      //
      // Why (jitter 廃止 → 改修): 旧版は ±0.15 のランダムジッタをデータ値に加算
      //   していたが、軸の整数目盛 (1/2/3/4/5) と dot 位置が一致せず「数値が下地と
      //   完全に一致していない」フィードバック (2026-05-14) を受け、forceSimulation
      //   ベース (strength 1 + 初期位置 = target) に切替。しかし完全に同座標の
      //   ドット同士は forceCollide が「どの方向に押すか」判定できず重なったまま
      //   残るバグが発生 (70 件中 ~30 件が見えない、2026-05-14 教師フィードバック)。
      //
      //   対策:
      //   1. 初期位置に rowIndex seed の ±2px deterministic perturbation を加える。
      //      simulation の初期だけずらすので、データ値 (numericX/Y) と軸の一致は
      //      保たれる (collide が解消後は target 近傍に張り付く)。
      //      seed 由来なので polling re-render で座標がブレない。
      //   2. forceX/Y strength を 0.7 に下げ、collide が押し戻しきれるバランスに。
      //   3. tick 数 120 → 200 で収束を安定化。
      const seededOffset = (seed, salt) => {
        const s = Math.sin(seed * 9301 + salt * 49297) * 233280;
        return ((s - Math.floor(s)) - 0.5) * 4; // ±2px
      };
      const nodes = current.map((r) => {
        const seed = (r.rowIndex || 0) + 1;
        return {
          x: xScale(r.numericX) + seededOffset(seed, 1),
          y: yScale(r.numericY) + seededOffset(seed, 7919),
          targetX: xScale(r.numericX),
          targetY: yScale(r.numericY),
          data: r
        };
      });
      // マイノリティ（象限内 1 票だけの意見）の emailHash 集合を計算（v2691）。
      //   道徳教育根拠: 学術会議 2020 報告 p.14「マジョリティがマイノリティに同調を強要する
      //   ことはしばしば生じてしまう」「多様な意見が出されるやり方が中心とならなければ
      //   多様性という状態からは全く遠くなる」— 1 票の意見こそ授業で取り上げるべき素材。
      //   stroke 優先度: highlight > reaction > lone-voice > none
      //     （教師意図 > 児童間人気 > 少数派マーカー > 既定）
      const loneVoiceHashes = (function () {
        const set = new Set();
        for (const k of QUADRANT_KEYS) {
          const cell = buckets[k] || [];
          if (cell.length === 1) {
            const r = cell[0];
            if (r && r.emailHash) set.add(r.emailHash);
            else if (r && typeof r.rowIndex === 'number') set.add('rowIndex:' + r.rowIndex);
          }
        }
        return set;
      })();
      const isLoneVoice = (d) => {
        if (!d || !d.data) return false;
        if (d.data.emailHash) return loneVoiceHashes.has(d.data.emailHash);
        if (typeof d.data.rowIndex === 'number') return loneVoiceHashes.has('rowIndex:' + d.data.rowIndex);
        return false;
      };

      // 同 Likert 座標 (整数 X,Y) のドット人数を事前計算（v2691, hover tooltip 用）。
      //   forceCollide で散らばって見えるドット塊の本当の人数を hover で確認できるように。
      const sameCoordCounts = (function () {
        const m = new Map();
        for (const r of current) {
          if (typeof r.numericX !== 'number' || typeof r.numericY !== 'number') continue;
          const key = Math.round(r.numericX) + ',' + Math.round(r.numericY);
          m.set(key, (m.get(key) || 0) + 1);
        }
        return m;
      })();
      const sameCoordOf = (item) => {
        if (!item || typeof item.numericX !== 'number' || typeof item.numericY !== 'number') return 0;
        const key = Math.round(item.numericX) + ',' + Math.round(item.numericY);
        return sameCoordCounts.get(key) || 0;
      };

      // collide 半径 + spread balance:
      //   strength 0.5 + 250 tick で、(3,3) に 10 件密集しても十分に散らばる。
      //   ドット縮小 (MAX 14→9) に合わせ collide も自然に小さくなり、間ができる。
      const COLLIDE_R_M = MAX_R_M + 1.5;
      const simM = d3.forceSimulation(nodes)
        .force('x', d3.forceX((d) => d.targetX).strength(0.5))
        .force('y', d3.forceY((d) => d.targetY).strength(0.5))
        .force('collide', d3.forceCollide(COLLIDE_R_M))
        .stop();
      for (let i = 0; i < 250; i++) simM.tick();

      // 揺らぎは「現在 dot の半径 + swing-high 黄色」で十分視覚化されているので、
      // 過去位置 ghost + 黄色 trace 線は採用せず（教師フィードバック 2026-05-13）。
      // 既存 .ghost / .viz-trace 要素が前回 render 残ってないよう exit clean だけ走らせる。
      g.selectAll('.viz-dot.ghost').remove();
      g.selectAll('.viz-trace').remove();
      const dotJoin = g.selectAll('.viz-dot.current').data(nodes, (d) => d.data.rowIndex);
      dotJoin.exit().remove();
      const dotEnter = dotJoin.enter().append('circle')
        .attr('class', 'viz-dot current enter');
      const self = this;
      dotEnter.merge(dotJoin)
        .attr('cx', (d) => d.x)
        .attr('cy', (d) => d.y)
        .attr('r', (d) => radiusForMatrix(d))
        .classed('swing-high', (d) => radiusForMatrix(d) > BASE_R_M + 3)
        .classed('highlight', (d) => Boolean(d.data && d.data.highlight))
        .classed('lone-voice', (d) => isLoneVoice(d))
        // リアクション可視化: 最頻 type の色で stroke を上書き (反応 0 なら CSS 既定)
        //   細く・淡く (2.0px / opacity 0.85): 散布図の主役は「位置 = 立場」。
        //   リング (人気) はあくまで補助情報なので、教師がチラ見できる強度に抑える。
        //   道徳教育 / DCE レビュー (2026-05-14) で「多数派 = 正解」シグナルの過剰化を避ける調整。
        //
        //   priority: HIGHLIGHT (教師注目) > REACTION (児童間人気) > LONE-VOICE (少数派) > none
        //   教師の意図的な「注目」は同調圧力ではないので 3.0px / 不透明で強調 OK。
        //   lone-voice は CSS で drop-shadow を付け、stroke は触らない（reaction ring と共存）
        //
        //   重要: SVG の `.attr()` は presentation attribute (specificity 0) で
        //   外部 CSS (.viz-dot { stroke: #0f172a }) に負ける。インライン style なら勝てる。
        .style('stroke', (d) => {
          if (d.data && d.data.highlight) return '#fbbf24'; // amber-400 (gold)
          const t = topReactionType(d.data);
          return t ? REACTION_COLORS[t] : null;
        })
        .style('stroke-width', (d) => {
          if (d.data && d.data.highlight) return 3.0;
          return topReactionType(d.data) ? 2.0 : null;
        })
        .style('stroke-opacity', (d) => {
          if (d.data && d.data.highlight) return 1.0;
          return topReactionType(d.data) ? 0.85 : null;
        })
        // CVD 冗長符号化: 種別ごとに破線パターンを変える（色 + 形）。 highlight は実線。
        .style('stroke-dasharray', (d) => {
          if (d.data && d.data.highlight) return null;
          return reactionDash(topReactionType(d.data));
        })
        .on('mouseenter', (event, d) => showTooltip(event, d.data, self, sameCoordOf(d.data)))
        .on('mousemove',  (event, d) => showTooltip(event, d.data, self, sameCoordOf(d.data)))
        .on('mouseleave', () => hideTooltip())
        // クリック: tooltip を閉じてモーダル表示
        .on('click', (event, d) => {
          hideTooltip();
          if (typeof self.showAnswerModal === 'function') {
            self.showAnswerModal(d.data.rowIndex);
          } else {
            showTooltip(event, d.data, self, sameCoordOf(d.data));  // フォールバック
          }
        });

      // 議論前 → 現在 の意見の動きを ghost trail で表示 (v2777 で矢印から再設計)。
      //   研究根拠:
      //     - Heer & Robertson 2007 "Animated Transitions in Statistical Data Graphics":
      //       motion は preattentive attribute、trajectory history は認知負荷を下げる
      //     - FlowingData "Ghost Trails": fade した経路で時間の方向感を出す
      //   道徳科の配慮:
      //     - distance による強調 (旧 amber major) を廃止 → 「動いた=正解」バイアス回避
      //     - 矢頭を廃止 → 「到着点が正解」感を抑え、現在位置の dot 自体が「いまここ」を示す
      //     - 動かなかった児童は trail が無いだけ (= 等価に「保持」を表現)
      //   アニメーション:
      //     - toggle ON のときだけ `_deltaAnimateOnce` で 1.5s の stroke-dashoffset 演出
      //     - その後の再描画 (timeline スライダー等) では trail は静止表示
      if (this.state.vizShowDeltas && typeof this.vizGetBefore === 'function') {
        const before = this.vizGetBefore();
        if (before && Array.isArray(before.rows)
            && arePhasesAxisCompatible(before.axisConfig, axis)) {
          const deltas = computeMatrixDeltas(before.rows, current);
          const shouldAnimate = !!this.state._deltaAnimateOnce;
          this.state._deltaAnimateOnce = false;  // 1 回消費

          // emailHash → node の lookup を作って trail の終点を「実 dot 中心 (force-sim 後)」に合わせる。
          //   xScale(d.toX) ではなく n.x を使うので、jitter された実描画位置と完全一致する。
          const nodeByHash = new Map();
          for (const n of nodes) {
            if (n && n.data && n.data.emailHash) nodeByHash.set(n.data.emailHash, n);
          }
          for (const d of deltas) {
            const n = nodeByHash.get(d.emailHash);
            if (!n) continue;  // 現在ボードに dot が無い (匿名化等)
            const x1 = xScale(d.fromX);
            const y1 = yScale(d.fromY);
            const x2 = n.x;
            const y2 = n.y;
            const trail = g.append('path')
              .attr('class', 'viz-trail')
              .attr('d', `M ${x1} ${y1} L ${x2} ${y2}`);
            if (shouldAnimate) {
              const len = euclidean(x1, y1, x2, y2) || 1;
              trail
                .attr('stroke-dasharray', len)
                .attr('stroke-dashoffset', len)
                .transition()
                .duration(1500)
                .ease(d3.easeCubicOut)
                .attr('stroke-dashoffset', 0);
            }
          }
        }
      }

      // dot 中央のリアクション数バッジ。
      //   AdminPanel 設定「リアクション数を表示」(state.showCounts) を尊重。
      //   非表示設定でも stroke 色 (リング) は出るので「人気の有無」は分かる。
      const showCounts = !!(this.state && this.state.showCounts);
      const reactedNodes = showCounts ? nodes.filter((n) => totalReactions(n.data) > 0) : [];
      const labelJoin = g.selectAll('.viz-dot-label').data(reactedNodes, (d) => 'l_' + d.data.rowIndex);
      labelJoin.exit().remove();
      labelJoin.enter().append('text')
        .attr('class', 'viz-dot-label')
        .attr('text-anchor', 'middle')
        .attr('pointer-events', 'none')
        .merge(labelJoin)
        .attr('x', (d) => d.x)
        .attr('y', (d) => d.y + 3.5)
        .text((d) => totalReactions(d.data));

      updateStatsPills(this, current.length);
      maybeRenderTeacherPanel(this, swings, rows, 'matrix');
      // 象限キーワードは SVG 内に統合済 (旧 HTML パネルは廃止)。mode 切替で残存する panel は除去。
      removeQuadrantSummary(this.elements.answersContainer);

      if (this.elements.answerCount && typeof this.getIcon === 'function') {
        this.elements.answerCount.innerHTML =
          this.getIcon('users', 'w-4 h-4 inline-block -mt-1') + '<span>' + current.length + '件</span>';
      }
      vizHeartbeat('matrix', { rowCount: rows.length, current: current.length, ghost: ghost.length });
    } catch (e) {
      console.error('renderMatrix: failed', e);
      throw e;
    }
  };

  // ---------------------------------------------------------------------
  // 象限キーワードパネル（matrix 専用）
  //   各象限 (hh/lh/hl/ll) に属する rows の reason を集計し、top-3 keyword を
  //   2x2 グリッドで表示する。aggregateWords (M3 と同じ) を再利用。
  //
  // 道徳教育観点 (DCE):
  //   - クラスタ毎の人数バッジは「多数派バイアス」を増幅するため出さず、
  //     象限単位の「価値観グループ」として keyword で表現する
  //   - N=1 の象限でもその 1 人の理由を keyword 化（少数意見の尊重）
  //   - 「どこに何人いる」より「なぜそう思うか」を前景化
  // ---------------------------------------------------------------------
  function renderQuadrantSummary(answers, rows, axis) {
    if (!answers) return;
    let panel = answers.querySelector('#vizQuadrantSummary');
    if (!panel) {
      panel = document.createElement('div');
      panel.id = 'vizQuadrantSummary';
      panel.className = 'viz-quadrant-summary';
      // teacherPanel の直前に挿入（順序: stats → svg → quadrant-summary → teacher-panel）
      const tp = answers.querySelector('#vizTeacherPanel');
      if (tp) answers.insertBefore(panel, tp);
      else answers.appendChild(panel);
    }
    panel.innerHTML = '';

    const xs = [], ys = [];
    for (const r of rows) {
      if (typeof r.numericX === 'number') xs.push(r.numericX);
      if (typeof r.numericY === 'number') ys.push(r.numericY);
    }
    if (!xs.length || !ys.length) { panel.hidden = true; return; }
    panel.hidden = false;

    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const midX = (minX + maxX) / 2;
    const midY = (minY + maxY) / 2;

    const buckets = { hh: [], lh: [], hl: [], ll: [] };
    for (const r of rows) {
      if (typeof r.numericX !== 'number' || typeof r.numericY !== 'number') continue;
      const xKey = r.numericX >= midX ? 'h' : 'l';
      const yKey = r.numericY >= midY ? 'h' : 'l';
      buckets[xKey + yKey].push(r);
    }

    const q = (axis && axis.matrixQuadrantLabels) || {};
    // 表示順は画面の 2x2 (TL, TR, BL, BR) と一致させる
    const cells = [
      { key: 'lh', cls: 'qs-tl', label: q.lh || '左上' },
      { key: 'hh', cls: 'qs-tr', label: q.hh || '右上' },
      { key: 'll', cls: 'qs-bl', label: q.ll || '左下' },
      { key: 'hl', cls: 'qs-br', label: q.hl || '右下' }
    ];

    for (const { key, cls, label } of cells) {
      const cellRows = buckets[key];
      const cell = document.createElement('div');
      cell.className = 'qs-cell ' + cls;

      const h4 = document.createElement('h4');
      h4.textContent = '📍 ' + label;
      cell.appendChild(h4);

      if (cellRows.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'qs-empty';
        empty.textContent = '（該当意見なし）';
        cell.appendChild(empty);
      } else {
        // 道徳的意見の象限 keyword として 1 文字漢字断片（「楽」「思」「間」「合」等）は
        // 意味が読み取りにくいので原則除外。「気持」「真実」「期限」のような 2+ 文字の
        // 内容語のみを top-3 として残すと keyword 品質が大幅に向上。
        //
        // ただし reason がひらがな主体（「楽したい」「早く」「終わりたい」等）の象限では
        // 2+ 字 keyword が 0 件になりがち。完全に空表示にすると教師が「データが無い」
        // と誤読する恐れがあるので、その場合のみ 1 字漢字フォールバックを許容。
        const allWords = aggregateWords(cellRows, 'reason');
        const longWords = allWords.filter(w => w.word.length >= 2).slice(0, 3);
        const words = longWords.length > 0 ? longWords : allWords.slice(0, 3);
        if (words.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'qs-empty';
          empty.textContent = '（理由が抽出できる語に当たらず）';
          cell.appendChild(empty);
        } else {
          const wrap = document.createElement('div');
          wrap.className = 'qs-keywords';
          for (const w of words) {
            const tag = document.createElement('span');
            tag.className = 'qs-tag';
            tag.textContent = '#' + w.word;
            wrap.appendChild(tag);
          }
          cell.appendChild(wrap);
        }
      }
      panel.appendChild(cell);
    }
  }
  // matrix 以外の mode に切り替えたとき panel が残らないように。
  function removeQuadrantSummary(answers) {
    if (!answers) return;
    const panel = answers.querySelector('#vizQuadrantSummary');
    if (panel) panel.remove();
  }
  // テスト用に露出 (private helper の挙動を tests/viz.helpers.test.cjs で検証)
  StudyQuestApp.prototype.__renderQuadrantSummary = renderQuadrantSummary;

  // ---------------------------------------------------------------------
  // M3: ワードランキング（道徳指導案 終末・メタ認知）
  // ---------------------------------------------------------------------

  // 日本語ストップワード（頻出する助詞・接続詞・代名詞）
  // Why: 完全な形態素解析は GAS で重い。コメントから「意味のある語」だけ残す近似戦略。
  //      kuromoji 等を使わず、句読点と助詞ベースで十分実用的な頻度集計が得られる。
  const STOPWORDS = new Set([
    'の','に','は','を','が','と','で','も','や','へ','から','まで','よ','ね','な','か','だ','です','ます',
    'です。','ます。','こと','もの','これ','それ','あれ','どれ','ここ','そこ','あそこ','どこ',
    'する','した','して','なる','なった','なって','ある','あった','ない','なく','いる','いた','いて',
    'とき','とき。','ため','よう','うえ','した。','する。','思う','思った','思います',
    'the','a','an','is','are','was','were','this','that','it','of','to','for','in','on','and','or','but','i',
    'こんにちは','ありがとう','よろしく',
  ]);

  // TinySegmenter インスタンスを singleton として保持 (初期化コストを 1 回に)。
  //   include 順序で window.TinySegmenter が先に load されていれば使う。
  //   tests や旧環境で未 load なら正規表現フォールバックに退化する。
  let _segmenterInstance = null;
  function getSegmenter() {
    if (_segmenterInstance) return _segmenterInstance;
    if (typeof TinySegmenter !== 'undefined') {
      try { _segmenterInstance = new TinySegmenter(); } catch (_) { /* fallback */ }
    } else if (typeof window !== 'undefined' && window.TinySegmenter) {
      try { _segmenterInstance = new window.TinySegmenter(); } catch (_) {}
    }
    return _segmenterInstance;
  }

  function tokenizeJapanese(text) {
    if (!text || typeof text !== 'string') return [];
    // 形態素分割: TinySegmenter (~25KB, 辞書不要) で「気持ち」「頑張る」「お楽しみ」
    //   「誠実」のような複合語/活用形を 1 トークンとして拾う。
    //   未 load 環境（tests / 旧版）では漢字/カタカナ/英字連続の正規表現にフォールバック。
    //
    //   例: 「思いやりを持って真実を伝えたい。」
    //     TinySegmenter: ["思い","やり","を","持っ","て","真実","を","伝え","たい","。"]
    //     フィルタ後:    ["持っ", "真実", "伝え"]
    //
    //   設計上の限界: TinySegmenter は「思いやり」を「思い/やり」と分割してしまう
    //     （統計モデル基準）。ただし「気持ち」「頑張る」など他の複合語は正しく拾える
    //     ので、現状の正規表現アプローチより keyword の意味性は大幅向上。
    let words;
    const seg = getSegmenter();
    if (seg) {
      words = seg.segment(text);
    } else {
      const RE = /[A-Za-z0-9_]+|[一-鿿々]+|[ァ-ヺー]+/g;
      words = [];
      let m;
      while ((m = RE.exec(text)) !== null) words.push(m[0]);
    }

    const tokens = [];
    for (const w of words) {
      const t = w.trim();
      if (!t) continue;
      if (STOPWORDS.has(t.toLowerCase())) continue;
      // 内容文字（英数/漢字/かな/カタカナ）を含まない記号・空白は除外
      if (!/[A-Za-z0-9_一-鿿々ぁ-ゖァ-ヺー]/.test(t)) continue;
      // 純ひらがな 3 文字以下は助詞・助動詞・接続詞の可能性が高い → 除外
      //   「みんな」「みたい」のような 3 文字超の内容語は残す
      if (/^[ぁ-ゖー]+$/.test(t) && t.length <= 3) continue;
      // 1 文字でカタカナでも漢字でもない (記号や長音単独など) → 除外
      if (t.length === 1 && !/[一-鿿々]/.test(t)) continue;
      // 末尾「っ」は動詞促音便連用形の典型シグナル。「思っ」「使っ」「間違っ」
      //   「行っ」「持っ」など length 関係なく断片化される傾向が強いので全除外。
      if (/っ$/.test(t)) continue;
      // 漢字 1 字 + ひらがな 1 字 の 2 字 token で、末尾が動詞活用語末/助詞なら除外。
      //   TinySegmenter が動詞活用の途中で切ると「合わ」「振り」「舞え」「思い」「伝え」
      //   「振る」「形に」のような断片が頻出語に紛れ込んでしまう。
      //   除外する末尾 (動詞活用語末/助詞): い/え/わ/り/う/る/に/け/ん
      //     - い/え/わ/り/う: 動詞活用語末 (合わ/振り/舞え/思い/伝え/使う/笑う)
      //     - る: 動詞終止形 (振る/知る ← STOPWORDS には来る/する/ある のみ)
      //     - に: 助詞付き残り (形に/心に)
      //     - け: 命令形/連用形 (書け/動け)
      //     - ん: 撥音便連用形 (学ん/読ん/飲ん) ← 学んだ/読んだ の途中切り
      //   残す末尾 (名詞化・副詞化接辞): ち/み/く/さ/き/ぎ/び/ぴ
      //     (持ち/望み/早く/高さ/動き 等は内容語として有用)
      //   設計上の妥協: 「思い」「伝え」「願い」など名詞性も持つ連用形も巻き込んで
      //   消えるが、「合わ」「振り」「舞え」断片のノイズ削減を優先する。
      if (t.length === 2 && /^[一-鿿々][いえわりうるにけん]$/.test(t)) continue;
      tokens.push(t);
    }
    return tokens;
  }

  /**
   * 単語頻度を集計。M3 ワードランキング表示用。
   *
   * Case-insensitive aggregation: 「AI」と「ai」は同じ key として 1 つにまとめる。
   *   表示形は最初に出現した原形を保持（通常は大文字「AI」）。
   *   日本語語には影響なし（lower/upper の概念がないため key === word.toLowerCase()）。
   *
   * @param {Array} rows - currentAnswers
   * @param {string} field - 集計対象列名（'reason' or 'answer'）
   * @returns {Array<{word, count}>} desc sorted, max 25 件
   */
  /**
   * Tokenize all rows[].field once and accumulate { counts, displayForm } maps.
   *   不変条件: 1 投稿内の同じ key（lowercase）はカウント 1（同じ児童が同じ語を
   *   10 回書いても 1 票）。displayForm は最初に出現した原形を保持。
   *   aggregateWords / buildWordCountMap / distinctiveKeywords / contrastingPair の共通基盤。
   */
  function _countWords(rows, field) {
    const counts = new Map();
    const displayForm = new Map();
    for (const r of rows || []) {
      const text = r && r[field];
      if (!text) continue;
      const tokens = tokenizeJapanese(String(text));
      const seen = new Set();
      for (const t of tokens) {
        const key = t.toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key);
        counts.set(key, (counts.get(key) || 0) + 1);
        if (!displayForm.has(key)) displayForm.set(key, t);
      }
    }
    return { counts, displayForm };
  }

  function aggregateWords(rows, field) {
    const { counts, displayForm } = _countWords(rows, field);
    return [...counts.entries()]
      .map(([key, count]) => ({ word: displayForm.get(key) || key, count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 25);
  }

  // distinctiveKeywords / contrastingPair が直接食べる形式。
  const buildWordCountMap = _countWords;

  /**
   * 既に build 済の word-count map 群を 1 つにマージする（renderMatrix が 4 象限の
   * cell map を作ってから「左右」「上下」軸サマリ用に組み合わせるための O(k) ヘルパ）。
   * counts は単純加算（buckets は互いに排他なので二重カウントは起きない）。
   * displayForm は first-seen wins。
   */
  function mergeWordMaps(maps) {
    const counts = new Map();
    const displayForm = new Map();
    for (const m of maps) {
      if (!m) continue;
      for (const [k, c] of m.counts) counts.set(k, (counts.get(k) || 0) + c);
      for (const [k, w] of m.displayForm) if (!displayForm.has(k)) displayForm.set(k, w);
    }
    return { counts, displayForm };
  }

  // distinctiveKeywords / contrastingPair の入力を「rows 配列 or 既存 word map」両対応に。
  // renderMatrix が同じ象限 rows を 6 回トークン化していた hot-path を解消する。
  function _toCountMap(input, field) {
    return (input && input.counts instanceof Map) ? input : _countWords(input, field);
  }

  // 4 象限 + その派生集合 (X 軸左右 / Y 軸上下) を文字列キーで指す唯一の場所。
  const QUADRANT_KEYS = ['hh', 'lh', 'hl', 'll'];

  // 2D ユークリッド距離。vizComputeSwings / computeMatrixDeltas / 矢印 trim で共有。
  function euclidean(ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    return Math.sqrt(dx * dx + dy * dy);
  }

  /**
   * keyword の「読みやすさ品質」を 0/1/2 で返す（v2691 patch）。
   *   2 = 漢字を含む語（最も意味が読みやすい: 「真実」「気持ち」「効率」）
   *   1 = 漢字なし 2 字以上（カタカナ語含む: 「AI」「ポスター」「みんな」）
   *   0 = 1 字（基本的に断片: 「間」「何」— 表示には不適）
   * sort で score と count に並ぶ第 2 キーとして使う。soft preference なので、
   *   score が圧倒的に高い純ひらがな語は依然として勝てる。
   */
  function keywordQuality(word) {
    if (!word || word.length < 2) return 0;
    if (/[一-鿿々]/.test(word)) return 2;
    return 1;
  }

  /**
   * TF-IDF 風の象限固有度スコアで top-N keyword を返す。
   *
   * 旧 keywordsFor は単純な aggregateWords(thisCell).slice(0,3) だったため、
   *   全象限頻出語（「みんな」「思う」等）が常に上位を占め、象限の対比が弱まっていた。
   *   このヘルパーは「**この象限だけで突出して頻出する語**」を選ぶ：
   *
   *     score(w) = freq_in_this(w) - mean(freq_in_others(w))
   *
   *   ただし freq_in_this(w) === 1（1 票だけ）の語は scoring から除外しない（少数派保護）が
   *   タイブレークで頻度の高い語を優先する。
   *
   * 道徳教育観点（MEXT「一面的→多面的・多角的な見方」）：
   *   象限ラベルが「他象限と何が違うか」を端的に示すと、児童が「立場が変わると語彙も変わる」
   *   と気付ける。
   *
   * @param {Array} thisCellRows  対象象限の rows
   * @param {Array<Array>} otherCellsRows  他 3 象限それぞれの rows 配列
   * @param {string} field  集計対象列名（'reason' or 'answer'）
   * @param {number} topN  返す語数（既定 3）
   * @returns {Array<{word: string, score: number, count: number}>}
   */
  function distinctiveKeywords(thisCellInput, otherCellsInput, field, topN) {
    const N = topN || 3;
    const thisMap = _toCountMap(thisCellInput, field);
    if (thisMap.counts.size === 0) return [];
    const otherMaps = (otherCellsInput || []).map((x) => _toCountMap(x, field));

    const scored = [];
    for (const [key, count] of thisMap.counts) {
      // 他象限の平均出現数 (該当象限の rows.length 比ではなく投稿件数の生平均で十分。
      //   厳密 IDF にせず単純な差で十分なのは、象限間の rows 数が大きくは違わないため)
      let otherSum = 0;
      for (const m of otherMaps) otherSum += (m.counts.get(key) || 0);
      const otherMean = otherMaps.length ? otherSum / otherMaps.length : 0;
      const score = count - otherMean;
      const word = thisMap.displayForm.get(key) || key;
      scored.push({ word, score, count, quality: keywordQuality(word) });
    }
    // score desc → quality desc（漢字優先）→ count desc → word.length desc
    //   v2691 patch: hiragana 中途断片（「かいぜんし」「ぶぶんしょ」）が top を占める
    //   問題対策。score が同じなら漢字含む語が勝つ。
    scored.sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      if (b.quality !== a.quality) return b.quality - a.quality;
      if (b.count !== a.count) return b.count - a.count;
      return b.word.length - a.word.length;
    });
    return scored.slice(0, N);
  }

  /**
   * 2 つの行集合（軸の左 vs 右、上 vs 下）から「対立する代表語」を 1 ペア返す。
   *
   *   leftRows 側で固有度（左頻度 - 右頻度）が最大の語と、
   *   rightRows 側で固有度（右頻度 - 左頻度）が最大の語を、それぞれ 1 つずつ。
   *   両方とも score > 0 のときだけペアを返す（弱い対立はノイズ）。
   *
   * v2691 patch:
   *   - 1 文字断片（「間」「何」のような切れ端）を除外
   *   - 同 score なら漢字含有語を優先（quality bias）
   *   - excludeWords に渡された語は候補から除外（X/Y 軸間で重複した語を後段で消すため）
   *
   * 道徳教育観点（学術会議「道理ある不一致 reasonable disagreement」）：
   *   「対立する双方がそれなりの理由を持つ」状況を、児童の言葉から自動的に命名する。
   *   タイトル下の 1 行サマリ「議論の対立軸: 〇〇 ↔ 〇〇」に使う。
   *
   * @param {Array} leftRows
   * @param {Array} rightRows
   * @param {string} field
   * @param {Set<string>} [excludeWords]  これらの key（lowercase）は候補から除外
   * @returns {{left: string, right: string, leftKey: string, rightKey: string} | null}
   */
  function contrastingPair(leftInput, rightInput, field, excludeWords) {
    const leftMap = _toCountMap(leftInput, field);
    const rightMap = _toCountMap(rightInput, field);
    if (leftMap.counts.size === 0 || rightMap.counts.size === 0) return null;
    const exclude = excludeWords || new Set();

    // [score, quality, count, length] をタプル比較する固定優先度。
    //   distinctiveKeywords の sort と同じ序列で揃える（DRY）。
    function rankTuple(score, quality, count, len) {
      return [score, quality, count, len];
    }
    function tupleGreater(a, b) {
      for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return a[i] > b[i];
      }
      return false;
    }

    const pickBest = (sourceMap, otherMap) => {
      let best = null;
      let bestRank = null;
      for (const [key, count] of sourceMap.counts) {
        if (exclude.has(key)) continue;
        const word = sourceMap.displayForm.get(key) || key;
        if (word.length < 2) continue;            // 1 文字断片は表示に値しない
        const otherCount = otherMap.counts.get(key) || 0;
        const score = count - otherCount;
        if (score <= 0) continue;
        const quality = keywordQuality(word);
        const rank = rankTuple(score, quality, count, word.length);
        if (!best || tupleGreater(rank, bestRank)) {
          best = { word, key, score, count, quality };
          bestRank = rank;
        }
      }
      return best;
    };

    const bestLeft = pickBest(leftMap, rightMap);
    const bestRight = pickBest(rightMap, leftMap);
    if (!bestLeft || !bestRight) return null;
    return {
      left: bestLeft.word, leftKey: bestLeft.key,
      right: bestRight.word, rightKey: bestRight.key
    };
  }

  /**
   * 「立場を越えて共通して使われる語」= 協働の足場(common ground)を返す。
   *
   *   distinctiveKeywords / contrastingPair が「象限ごとに固有な語」= 分断点を示すのに対し、
   *   consensusKeywords は逆に「多くの象限/グループにまたがって現れる語」= bridging を示す。
   *
   *     coverage(w) = w が出現する非空グループの数
   *
   *   選定は **多数派の人数ではなく「立場の広がり(span)」** で行う。 これが核心:
   *   人数で選ぶと「多数派 = 正解」シグナルになり同調・分極化を生む(IEEE VIS 2023)。
   *   coverage で選べば、 少人数でも複数の立場で共有される語が拾われ、 多数派バイアスを避けつつ
   *   「対立する双方が実は同じ言葉を使っている」という協働の入口を提示できる。
   *
   * 学術 / 道徳教育根拠:
   *   - 中教審答申(2021)「協働的な学び = 多様な他者と協働し新たな見方に出会う」の足場
   *   - Pol.is / vTaiwan「両サイドに響く考えだけが prominence を得る」bridging 原則
   *
   * @param {Array} cellInputs  各グループ(象限/半分)の rows 配列 or 既存 word map
   * @param {string} field  集計対象列名（'reason' 等）。 入力が word map のときは無視。
   * @param {number} [topN=2]
   * @param {Object} [opts] { minCoverageRatio=0.75, exclude=Set<key> }
   * @returns {Array<{word:string, coverage:number, count:number}>}
   */
  function consensusKeywords(cellInputs, field, topN, opts) {
    const N = topN || 2;
    const maps = (cellInputs || [])
      .map((x) => _toCountMap(x, field))
      .filter((m) => m && m.counts && m.counts.size > 0);
    const groupCount = maps.length;
    if (groupCount < 2) return []; // 2 群以上ないと「またがる」概念が成立しない
    const minRatio = (opts && typeof opts.minCoverageRatio === 'number') ? opts.minCoverageRatio : 0.75;
    const exclude = (opts && opts.exclude instanceof Set) ? opts.exclude : new Set();
    const minCoverage = Math.max(2, Math.ceil(groupCount * minRatio));

    // total counts と displayForm は mergeWordMaps が作る（counts 加算 + first-seen 表示形）。
    //   coverage（= 出現した群数。 counts とは別物）だけ別途数える。
    const merged = mergeWordMaps(maps);
    const coverage = new Map();
    for (const m of maps) {
      for (const k of m.counts.keys()) coverage.set(k, (coverage.get(k) || 0) + 1);
    }

    const scored = [];
    for (const [k, cov] of coverage) {
      if (cov < minCoverage || exclude.has(k)) continue;
      const word = merged.displayForm.get(k) || k;
      if (word.length < 2) continue; // 1 字断片は表示に値しない
      scored.push({ word, coverage: cov, count: merged.counts.get(k) || 0, quality: keywordQuality(word) });
    }
    // coverage desc(広く共有)→ quality desc(漢字優先)→ count desc → length desc
    scored.sort((a, b) => {
      if (b.coverage !== a.coverage) return b.coverage - a.coverage;
      if (b.quality !== a.quality) return b.quality - a.quality;
      if (b.count !== a.count) return b.count - a.count;
      return b.word.length - a.word.length;
    });
    return scored.slice(0, N);
  }

  // ---------------------------------------------------------------------
  // 議論のたねになる声 (representative reasons) — 教師が熟議で読み上げる候補を
  //   「各立場から 1 件ずつ」拾う。 [[viz-major-update-research-grounded]] の延長。
  //
  // 設計ガードレール（多数派バイアス回避・研究根拠・変更時は必ず読むこと）:
  //   - 選定は **立場(group)ごとに 1 件ずつ** = position coverage。 人気(reaction)・
  //     頻度・多数派では絶対に選ばない。 少数の立場も等しく 1 席を得る（少数意見の保全）。
  //     consensusKeywords が coverage で選ぶのと同じ原理（人数で選ばない）。
  //   - group 内の優先は「**理由を述べているか(hasJustification)**」という *記述的* な観察。
  //     良い/悪いの評価ではなく「理由づけの言語が含まれるか」だけを見る。 これは道徳科が
  //     重視する「理由を挙げて多面的・多角的に考える」過程そのもの (MEXT 2016 報告 p.10)。
  //   - **教師端末のみ**に出す。 児童に「模範回答」として示すと同調圧力になる
  //     (opinion-shift と同じ teacher-only 原則)。 読み上げる声は最終的に教師が選ぶ。
  //
  // 学術根拠:
  //   - Stanford HCOMP 2024 (arXiv:2408.11936 "Estimating Contribution Quality…"):
  //     集団の意見変容は「理由づけのある主張の selective uptake」で起きる
  //     (justification quality が効き、 novelty 単独では効かない)。 教師が理由づけのある
  //     声を拾って議論にかけることが熟議の駆動力になる、という知見を反映。
