  //   - Pol.is: クラスタごとの代表的発言を surface（人気ではなく代表性）。
  // ---------------------------------------------------------------------

  // 「考えの筋道(理由づけ)が文に表れているか」の *記述的* 検出（良し悪しの評価ではない）。
  //   実データ検証 (2026-05-30, 沖縄県の道徳 matrix ボード 実回答 120 件) で校正した:
  //   児童の道徳的理由は「だから/から」等の因果接続を **明示しない** ことが多く、 因果語だけ
  //   では発火 3% で discrimination しなかった。 一方で「〜つつ / だけど / でも / 両方」のような
  //   **両面を weigh する譲歩・対比表現** が 22% に現れ、 これは MEXT「多面的・多角的な見方」
  //   そのもの（= 反対の考えにも触れた高い理由づけ。 Toulmin の rebuttal / 熟議研究で重視される）。
  //   因果 + 譲歩/対比 + 両面衡量 を合わせると発火 33% で、 素朴な言い切り（「確信した」等）と
  //   うまく分離できた。
  //
  //   検出は形態素解析に依らない部分一致。 過検出は許容（弱い tiebreak にすぎず、 外れても
  //   fallback で最も実質的な理由が選ばれるだけ）。 ただし時間的な「から」(明日から/これから等)
  //   は理由ではないので除去してから判定し、 誤検出を抑える。
  const REASONING_MARKERS = [
    // 因果・理由・例示
    'なぜなら', '理由は', 'というのも', 'だって', 'だから', 'ので', 'から', 'ため', 'ゆえ',
    'したがって', 'よって', 'そのため', 'それで', 'たとえば', '例えば', '具体的に', 'おかげ', 'せいで',
    // 譲歩・対比（両面を weigh する = 多面的・多角的な reasoning）
    'けど', 'けれど', 'でも', 'しかし', 'つつ', 'ながら', 'ものの', 'とはいえ', '一方', '反面',
    // 両面の衡量
    '両立', '両方', 'どちらも'
  ];
  const TEMPORAL_KARA = /(明日|今日|これ|それ|あれ|今|昔|前|普段|最初|途中|ここ|そこ|どこ)から/g;
  function hasJustification(text) {
    if (!text) return false;
    const s = String(text).replace(TEMPORAL_KARA, '');
    return REASONING_MARKERS.some((m) => s.indexOf(m) >= 0);
  }

  /**
   * rows を「立場(position) のグループ」に分割する。
   *   matrix: 4 象限 (hh/lh/hl/ll)。 ラベルは __resolveQuadrantLabels。
   *   numberline: 2 極 (low/high)。 中点で二分し、 ラベルは xAxisLabels.min/max（= 軸の両端の名前）。
   *     1D で「対立軸」を表す最も自然な構造は両極なので、 ここを立場グループとする。
   *   バケット境界は renderMatrix / renderNumberLine と整合（>= mid を high 側）。
   * @returns {Array<{key:string, label:string, rows:Array}>}
   */
  function buildPositionGroups(rows, mode, axisCfg) {
    const cfg = axisCfg || {};
    const dMin = typeof cfg.defaultMin === 'number' ? cfg.defaultMin : 1;
    const dMax = typeof cfg.defaultMax === 'number' ? cfg.defaultMax : 5;
    if (mode === 'matrix') {
      const valid = (rows || []).filter((r) => typeof r.numericX === 'number' && typeof r.numericY === 'number');
      const xs = valid.map((r) => r.numericX);
      const ys = valid.map((r) => r.numericY);
      const minX = xs.length ? Math.min(...xs, dMin) : dMin;
      const maxX = xs.length ? Math.max(...xs, dMax) : dMax;
      const minY = ys.length ? Math.min(...ys, dMin) : dMin;
      const maxY = ys.length ? Math.max(...ys, dMax) : dMax;
      const midX = (minX + maxX) / 2;
      const midY = (minY + maxY) / 2;
      const q = __resolveQuadrantLabels(cfg);
      const buckets = { hh: [], lh: [], hl: [], ll: [] };
      for (const r of valid) {
        const xk = r.numericX >= midX ? 'h' : 'l';
        const yk = r.numericY >= midY ? 'h' : 'l';
        buckets[xk + yk].push(r);
      }
      return ['hh', 'lh', 'hl', 'll'].map((k) => ({ key: k, label: q[k] || '', rows: buckets[k] }));
    }
    // numberline: low / high の 2 極
    const valid = (rows || []).filter((r) => typeof r.numericX === 'number');
    const xs = valid.map((r) => r.numericX);
    const minX = xs.length ? Math.min(...xs, dMin) : dMin;
    const maxX = xs.length ? Math.max(...xs, dMax) : dMax;
    const mid = (minX + maxX) / 2;
    const xL = cfg.xAxisLabels || {};
    const lowRows = [];
    const highRows = [];
    for (const r of valid) {
      (r.numericX >= mid ? highRows : lowRows).push(r);
    }
    return [
      { key: 'low', label: xL.min || '', rows: lowRows },
      { key: 'high', label: xL.max || '', rows: highRows }
    ];
  }

  /**
   * 各立場グループから「議論のたねになる声」を選ぶ（上のガードレール参照）。
   * @param {Array<{key,label,rows}>} groups buildPositionGroups の戻り値
   * @param {Object} [opts] { perBucket=1, field='reason', minLen=6 }
   * @returns {Array<{key,label,reason,name,emailHash,numericX,numericY,hasJustification}>}
   */
  function representativeReasons(groups, opts) {
    const perBucket = (opts && opts.perBucket) || 1;
    const field = (opts && opts.field) || 'reason';
    const minLen = (opts && typeof opts.minLen === 'number') ? opts.minLen : 6;
    const out = [];
    for (const grp of (groups || [])) {
      const cands = (grp.rows || [])
        .map((r) => ({ row: r, text: String((r && r[field]) || '').trim() }))
        .filter((c) => c.text.length >= minLen);
      if (!cands.length) continue;
      // justification 有(1) > 無(0) を最優先 → 同点は理由の情報量(長さ)を弱い tiebreak →
      //   最後に rowIndex で決定的に（毎 render 同じ声が選ばれ、 教師の認知が安定する）。
      cands.sort((a, b) => {
        const ja = hasJustification(a.text) ? 1 : 0;
        const jb = hasJustification(b.text) ? 1 : 0;
        if (ja !== jb) return jb - ja;
        if (a.text.length !== b.text.length) return b.text.length - a.text.length;
        return (a.row.rowIndex || 0) - (b.row.rowIndex || 0);
      });
      for (const c of cands.slice(0, perBucket)) {
        out.push({
          key: grp.key,
          label: grp.label,
          reason: c.text,
          name: c.row.name || '',
          emailHash: c.row.emailHash || '',
          numericX: typeof c.row.numericX === 'number' ? c.row.numericX : null,
          numericY: typeof c.row.numericY === 'number' ? c.row.numericY : null,
          hasJustification: hasJustification(c.text)
        });
      }
    }
    return out;
  }

  /**
   * 2 つの axis 設定が「同じ座標系を表すか」を判定する。
   *
   * 「議論前 → 現在」矢印を描くには (numericX, numericY) が **同じ意味の座標** を
   *   指している必要がある。具体的には Likert 軸の min/max ラベルが完全一致していること。
   *   違うフォーム（導入アンケート pie ↔ 本時 matrix）や軸ラベル変更があった場合に
   *   座標を結んでしまうと誤った可視化になる。
   *
   *   profile 切替 / 軸ラベル編集 / boardMode 変更を跨いで矢印を抑止するためのガード。
   *
   * @param {Object|null} a axisConfig 1
   * @param {Object|null} b axisConfig 2
   * @returns {boolean}
   */
  function arePhasesAxisCompatible(a, b) {
    if (!a || !b) return false;
    const ax = a.xAxisLabels || {};
    const bx = b.xAxisLabels || {};
    const ay = a.yAxisLabels || {};
    const by = b.yAxisLabels || {};
    return (ax.min || '') === (bx.min || '')
        && (ax.max || '') === (bx.max || '')
        && (ay.min || '') === (by.min || '')
        && (ay.max || '') === (by.max || '');
  }

  /**
   * 「議論前」rows と「現在」rows を emailHash で照合し、移動した児童の delta を返す。
   *
   *   each entry: { emailHash, fromX, fromY, toX, toY, distance, fromRow, toRow }
   *   - 同じ emailHash が両方にある児童だけ対象
   *   - 動かなかった児童 (distance < epsilon) は除外（矢印が点になる無意味なケース）
   *   - epsilon = 0.1 は「Likert スケール 1-5 で 0.1 = 2% 未満」= 実質同じ位置
   *
   * 道徳教育観点（MEXT 2016 報告 p.10）：
   *   「自らの生活や考えを見直している」評価観点の証拠データ。
   *   「議論を経て立場が動いた児童」を教師が即座に発見できる。
   *
   * @param {Array} beforeRows
   * @param {Array} currentRows
   * @returns {Array<Object>} 距離降順
   */
  function computeMatrixDeltas(beforeRows, currentRows) {
    if (!Array.isArray(beforeRows) || !Array.isArray(currentRows)) return [];
    const beforeByHash = new Map();
    for (const r of beforeRows) {
      if (!r || !r.emailHash) continue;
      if (typeof r.numericX !== 'number' || typeof r.numericY !== 'number') continue;
      // 同 hash で複数 row があれば最後（=最新）のものを採用
      beforeByHash.set(r.emailHash, r);
    }
    const out = [];
    const seen = new Set();
    for (const r of currentRows) {
      if (!r || !r.emailHash) continue;
      if (typeof r.numericX !== 'number' || typeof r.numericY !== 'number') continue;
      if (seen.has(r.emailHash)) continue;  // current 側でも 1 hash = 1 entry に正規化
      seen.add(r.emailHash);
      const before = beforeByHash.get(r.emailHash);
      if (!before) continue;
      const distance = euclidean(before.numericX, before.numericY, r.numericX, r.numericY);
      if (distance < 0.1) continue;  // 動いていない
      out.push({
        emailHash: r.emailHash,
        fromX: before.numericX, fromY: before.numericY,
        toX: r.numericX,         toY: r.numericY,
        distance,
        fromRow: before, toRow: r
      });
    }
    out.sort((a, b) => b.distance - a.distance);
    return out;
  }

  StudyQuestApp.prototype.renderWordRanking = async function (isInitialLoad, oldRows) {
    try {
      const d3 = await this.ensureD3Loaded();
      const rows = this.state.currentAnswers || [];
      const containerRefs = getOrCreateVizContainer(this);
      if (!containerRefs) return;
      removeQuadrantSummary(this.elements.answersContainer);

      // Why: reason 列がメインの自由記述。空なら answer にフォールバック。
      const useField = rows.some(r => r.reason) ? 'reason' : 'answer';
      const words = aggregateWords(rows, useField);

      const svgEl = containerRefs.svg;
      const bounds = svgEl.getBoundingClientRect();
      const width = Math.max(320, bounds.width || 800);
      const itemH = 28;
      const margin = { top: 20, right: 80, bottom: 20, left: 110 };
      const height = Math.max(120, margin.top + margin.bottom + words.length * itemH);
      svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);

      const svg = d3.select(svgEl);
      svg.selectAll('*').remove();

      if (words.length === 0) {
        // 空状態（記述が無い）
        svg.append('text')
          .attr('class', 'viz-axis-label')
          .attr('x', width / 2).attr('y', height / 2)
          .attr('text-anchor', 'middle')
          .text('集計できる語がまだありません');
        updateStatsPills(this, 0);
        return;
      }

      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;
      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      const maxCount = words[0].count;
      const xScale = d3.scaleLinear().domain([0, maxCount]).range([0, innerW]);
      const yScale = d3.scaleBand().domain(words.map(w => w.word)).range([0, innerH]).padding(0.25);

      // バー
      const bars = g.selectAll('.word-bar').data(words, d => d.word);
      bars.exit().remove();
      const selfW = this;
      bars.enter().append('rect')
        .attr('class', 'word-bar')
        .merge(bars)
        .attr('x', 0)
        .attr('y', d => yScale(d.word))
        .attr('width', d => xScale(d.count))
        .attr('height', yScale.bandwidth())
        .attr('rx', 3)
        .style('cursor', 'pointer')
        // クリック: その単語を含む行リスト popup を開く
        // Why simple includes: tokenizeJapanese を再走させずに簡易判定。教育用途では
        //   完全一致は不要（含む単語の回答群を見せたい）。誤マッチは語の意味が近いだけ。
        .on('click', (event, d) => {
          const matched = (selfW.state.currentAnswers || []).filter(r => {
            const text = String((r[useField] || ''));
            return text.indexOf(d.word) >= 0;
          });
          showRowsPopup(selfW, '「' + d.word + '」を含む回答 (' + matched.length + '件)', matched);
        });

      // 単語ラベル（左）
      const labels = g.selectAll('.word-label').data(words, d => d.word);
      labels.exit().remove();
      labels.enter().append('text')
        .attr('class', 'word-label')
        .merge(labels)
        .attr('x', -8)
        .attr('y', d => yScale(d.word) + yScale.bandwidth() / 2)
        .attr('dy', '0.35em')
        .attr('text-anchor', 'end')
        .text(d => d.word);

      // 件数ラベル（右）
      const counts = g.selectAll('.word-count').data(words, d => d.word);
      counts.exit().remove();
      counts.enter().append('text')
        .attr('class', 'word-count')
        .merge(counts)
        .attr('x', d => xScale(d.count) + 6)
        .attr('y', d => yScale(d.word) + yScale.bandwidth() / 2)
        .attr('dy', '0.35em')
        .text(d => d.count);

      updateStatsPills(this, rows.length);
      if (this.elements.answerCount && typeof this.getIcon === 'function') {
        this.elements.answerCount.innerHTML =
          this.getIcon('users', 'w-4 h-4 inline-block -mt-1') + '<span>' + rows.length + '件</span>';
      }
      vizHeartbeat('wordcloud', { rowCount: rows.length, words: words.length });
    } catch (e) {
      console.error('renderWordRanking: failed', e);
      throw e;

  };

  /**
   * カテゴリ列の値を集計。'answer' 列がデフォルト。
   * 空・null は除外、同一値は集計でまとめる。
   */
  function aggregateCategories(rows, field) {
    const counts = new Map();
    for (const r of rows || []) {
      const v = r && r[field];
      if (v === null || v === undefined || v === '') continue;
      const key = String(v).trim();
      if (!key) continue;
      counts.set(key, (counts.get(key) || 0) + 1);
    }
    return [...counts.entries()]
      .map(([label, count]) => ({ label, count }))
      .sort((a, b) => b.count - a.count);
  }

  StudyQuestApp.prototype.renderPie = async function (isInitialLoad, oldRows) {
    try {
      const d3 = await this.ensureD3Loaded();
      const rows = this.state.currentAnswers || [];
      const containerRefs = getOrCreateVizContainer(this);
      if (!containerRefs) return;
      removeQuadrantSummary(this.elements.answersContainer);

      // 'answer' 列を優先（Forms の選択肢設問はここに入る）
      const useField = rows.some(r => r.answer) ? 'answer' : 'reason';
      const cats = aggregateCategories(rows, useField);
      const total = cats.reduce((s, c) => s + c.count, 0);

      const svgEl = containerRefs.svg;
      // pie radius = Math.min(width, height) / 2 - 60 なので height を稼ぐと円も大きくなる。
      const { width, height } = fitSvgToViewport(svgEl, 360);

      const svg = d3.select(svgEl);
      svg.selectAll('*').remove();

      if (cats.length === 0) {
        svg.append('text')
          .attr('class', 'viz-axis-label')
          .attr('x', width / 2).attr('y', height / 2)
          .attr('text-anchor', 'middle')
          .text('集計できる回答がまだありません');
        updateStatsPills(this, 0);
        return;
      }

      const radius = Math.min(width, height) / 2 - 60;
      const g = svg.append('g').attr('transform', `translate(${width / 2},${height / 2})`);

      // Why: d3 のカテゴリカル配色を使う。色覚多様性に配慮して d3.schemeTableau10 を採用
      const palette = (d3.schemeTableau10 || d3.schemeCategory10 || []);
      const colorFor = (i) => palette[i % palette.length] || '#38bdf8';

      const pie = d3.pie().value(d => d.count).sort(null);
      const arc = d3.arc().innerRadius(0).outerRadius(radius);
      const labelArc = d3.arc().innerRadius(radius * 0.7).outerRadius(radius * 0.7);

      const slices = pie(cats);
      const arcs = g.selectAll('.pie-slice').data(slices, d => d.data.label);
      arcs.exit().remove();
      const selfP = this;
      arcs.enter().append('path')
        .attr('class', 'pie-slice')
        .merge(arcs)
        .attr('d', arc)
        .attr('fill', (d, i) => colorFor(i))
        .style('cursor', 'pointer')
        .on('mouseenter', (event, d) => {
          // tooltip にカテゴリ全体のリアクション数も含める (見ただけで人気が分かる)。
          //   v2782: state.showCounts を尊重 (numberline/matrix の dot バッジと同じ規約)。
          //   showCounts=false なら反応数 suffix は出さない (リアクション数非表示設定の徹底)。
          const matched = (selfP.state.currentAnswers || []).filter(r => String(r[useField] || '').trim() === d.data.label);
          const showCounts = !!(selfP.state && selfP.state.showCounts);
          const totalReact = showCounts ? matched.reduce((s, r) => s + totalReactions(r), 0) : 0;
          const reactSuffix = (showCounts && totalReact > 0) ? ` · 反応 ${totalReact}` : '';
          const item = { name: d.data.label, reason: `${d.data.count}件 (${Math.round(d.data.count / total * 100)}%)${reactSuffix}`, numericX: d.data.count };
          showTooltip(event, item, selfP);
        })
        .on('mouseleave', () => hideTooltip())
        // クリック: そのカテゴリに属する行リストの popup を開く
        .on('click', (event, d) => {
          hideTooltip();
          const matched = (selfP.state.currentAnswers || []).filter(r => String(r[useField] || '').trim() === d.data.label);
          showRowsPopup(selfP, '「' + d.data.label + '」 の回答 (' + matched.length + '件)', matched);
        });

      // ラベル
      const labels = g.selectAll('.pie-label').data(slices, d => d.data.label);
      labels.exit().remove();
      labels.enter().append('text')
        .attr('class', 'pie-label')
        .merge(labels)
        .attr('transform', d => `translate(${labelArc.centroid(d)})`)
        .attr('text-anchor', 'middle')
        .text(d => {
          const pct = Math.round(d.data.count / total * 100);
          return pct >= 5 ? `${d.data.label} ${pct}%` : '';
        });

      // 中央の合計件数
      g.append('text')
        .attr('class', 'pie-center')
        .attr('text-anchor', 'middle')
        .attr('dy', '0.35em')
        .text(`${total} 件`);

      updateStatsPills(this, rows.length);
      if (this.elements.answerCount && typeof this.getIcon === 'function') {
        this.elements.answerCount.innerHTML =
          this.getIcon('users', 'w-4 h-4 inline-block -mt-1') + '<span>' + rows.length + '件</span>';
      }
      vizHeartbeat('pie', { rowCount: rows.length, categories: cats.length });
    } catch (e) {
      console.error('renderPie: failed', e);
      throw e;
    }
  };

  StudyQuestApp.prototype.__aggregateCategories = aggregateCategories;

  // ---------------------------------------------------------------------
  // スナップショット基盤（F#2 変化の軌跡 / F#4 ビフォー・アフター 共用）
  //
  // Why: 道徳指導案の終末フェーズで「議論前後の意見変化」を見せるため、
  //      授業中の意見分布を時系列で保持する。サーバ側に永続化せず、
  //      タブ内 sessionStorage に保持（タブを閉じれば消える運用）。
  //      最大 60 件・60 sec 間隔で sampling 後、5 sec ポーリングしてもストレージ膨張なし。
  // ---------------------------------------------------------------------

  const SNAPSHOT_KEY = 'viz:snapshots:v2';        // v1 と非互換 (delta encoding に変更)
  const SNAPSHOT_BEFORE_KEY = 'viz:before:v1';
  const SNAPSHOT_MAX = 500;                       // 1 投稿 = 1 step、500 件で 100KB 程度

  function loadSnapshots() {
    try {
      const raw = sessionStorage.getItem(SNAPSHOT_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (_) { return []; }
  }
  function saveSnapshots(arr) {
    try { sessionStorage.setItem(SNAPSHOT_KEY, JSON.stringify(arr)); } catch (_) {}
  }
  function loadBeforeSnapshot() {
    try {
      const raw = sessionStorage.getItem(SNAPSHOT_BEFORE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
  }
  function saveBeforeSnapshot(snap) {
    try {
      if (snap === null) sessionStorage.removeItem(SNAPSHOT_BEFORE_KEY);
      else sessionStorage.setItem(SNAPSHOT_BEFORE_KEY, JSON.stringify(snap));
    } catch (_) {}
  }

  /**
   * SS の rows[].timestamp を時系列ソートし、**1 投稿 = 1 step** の delta encoding で返す。
   *
   * 各 snapshot は { timestamp, latestTimestamp, boardMode, axisConfig, addedRow } の薄い構造。
   *   - addedRow: その step で追加 / 上書きされた 1 件
   *   - 再構成は withTimelineSwap が snapshots[0..idx] を畳んで currentAnswers を生成
   *
   * Why: 60 秒バケット方式は「同分内の連続投稿が見えない」「snapshot.rows[] が肥大化」の
   *   両方を抱えていた。delta 形式に変えることで「投稿が積み重なる瞬間」を 1 step 単位で
   *   追え、メモリ使用量も rows.length に比例する軽量サイズに収まる。
   *
   * SS timestamp が無い row は無視。timestamp 列が完全に欠落する form は timeline 機能が
   * 自動的に disabled (snapshots=0) になる。
   *
   * @param {Array} rows app.state.currentAnswers と同じ形式
   * @param {string} boardMode 現在の boardMode
   * @param {Object|null} axisConfig 現在の axisConfig
   * @returns {Array} snapshot 配列 (時系列昇順、最大 SNAPSHOT_MAX 件)
   */
  function buildHistoricalSnapshots(rows, boardMode, axisConfig) {
    if (!Array.isArray(rows) || rows.length === 0) return [];

    const dated = rows
      .map(r => {
        if (!r || !r.timestamp) return null;
        const ms = new Date(r.timestamp).getTime();
        return Number.isFinite(ms) ? { ms, row: r } : null;
      })
      .filter(Boolean)
      .sort((a, b) => a.ms - b.ms);
    if (dated.length === 0) return [];

    const snapshots = dated.map(d => {
      const r = d.row;
      return {
        // 表示用: 実 SS timestamp (= 投稿時刻)
        latestTimestamp: d.ms,
        boardMode: boardMode || 'board',
        axisConfig: axisConfig || null,
        addedRow: {
          rowIndex: r.rowIndex,
          emailHash: r.emailHash || null,
          class: r.class || '',
          name: r.name || '',
          answer: r.answer || '',
          reason: r.reason || '',
          numericX: typeof r.numericX === 'number' ? r.numericX : null,
          numericY: typeof r.numericY === 'number' ? r.numericY : null,
          timestamp: r.timestamp || null
        }
      };
    });

    // 古い投稿を切り捨てる上限。授業 45 分で実用上 500 件は超えない想定。
    return snapshots.slice(-SNAPSHOT_MAX);
  }

  /**
   * loadSheetData 後に呼ぶ。
   *   - rows[].timestamp 列がある場合: 毎回 historical snapshots を rebuild → sessionStorage を上書き
   *     既存の sessionStorage に「historical 最終時刻より新しい sampling 結果」があれば末尾に保持
   *   - rows[].timestamp が無い (or 全件パース不能) 場合: 従来通り 60秒ごとに現在状態を append
   *
   * Why historical-first every time: PDF p.5 の意図は「授業開始時からの自分のマーカー位置と
   *   コメントの変化を振り返る」。sessionStorage 60秒採取だけだと「教師がブラウザを開いた瞬間」
   *   が原点になり、授業前にダミーで仕込んだ row や授業途中で再ロードした際の履歴が失われる。
   *   毎回 SS の timestamp ベースで snapshot を組み直せば、何度リロードしても 同じ historical が
   *   復元され、生徒が新規投稿するたびに新バケットが追加される。
   *
   *   初回限定 (arr.length===0) にしていた旧設計のバグ: 一度でも sampling が 1 件入ると、
   *   以降の re-load では historical hydrate がスキップされ、スライダーが動かなくなる。
   *
   * @returns {void}
   */
  // ?debug=1 で snapshot ライフサイクルログを有効化（本番ノイズを避けるため opt-in）。
  // closure キャッシュで毎フレーム URL parse を避ける（page lifetime 中に変わらない値）。
  let _vizSnapDebugCache = null;
  function vizSnapDebugEnabled() {
    if (_vizSnapDebugCache !== null) return _vizSnapDebugCache;
    try { _vizSnapDebugCache = new URLSearchParams(window.location.search).get('debug') === '1'; }
    catch (_) { _vizSnapDebugCache = false; }
    return _vizSnapDebugCache;
  }
  function vizSnapLog(msg) {
    if (!vizSnapDebugEnabled()) return;
    try { console.info('[viz/snap] ' + msg); } catch (_) {}
  }

  /**
   * Lesson review (Phase 2): reviewLesson.snapshots[] を delta-encoded 形式に flatten して
   *   sessionStorage に書き込む。これで既存の timeline スライダー / 比較モードがそのまま動く。
   *
   *   各 phase の rows を timestamp 昇順で並べ、{addedRow, latestTimestamp, boardMode, axisConfig,
   *   phaseBoundary?, phaseName?} の薄い entry に変換。phase 先頭の entry に phaseBoundary フラグを
   *   付けることで、将来 timeline UI が phase 区切りラベルを描けるようにする。
   *
   * @param {Object} reviewLesson - lessonJson (snapshots/phases を含む)
   * @returns {number} 書き込んだ entry 数
   */
  function hydrateSnapshotsFromReviewLesson(reviewLesson) {
    if (!reviewLesson || !Array.isArray(reviewLesson.snapshots)) return 0;
    const flat = [];
    const sortedPhases = reviewLesson.snapshots
      .slice()
      .sort((a, b) => Number(a.phaseIndex) - Number(b.phaseIndex));

    sortedPhases.forEach((snap) => {
      const rows = Array.isArray(snap.rows) ? snap.rows : [];
      const sorted = rows
        .slice()
        .map(r => ({ row: r, ts: r && r.timestamp ? new Date(r.timestamp).getTime() : 0 }))
        .sort((a, b) => a.ts - b.ts);
      sorted.forEach((entry, idx) => {
        flat.push({
          addedRow: entry.row,
          latestTimestamp: entry.row && entry.row.timestamp ? entry.row.timestamp : snap.capturedAt,
          boardMode: snap.boardMode || 'auto',
          axisConfig: snap.displaySettings || {},
          phaseBoundary: idx === 0,
          phaseIndex: snap.phaseIndex,
          phaseName: snap.phaseName
        });
      });
    });

    if (flat.length === 0) return 0;
    saveSnapshots(flat);
    return flat.length;
  }
  // 外部 (page.js init) から呼び出せるよう公開。
  StudyQuestApp.prototype.__vizHydrateReview = function (reviewLesson) {
    return hydrateSnapshotsFromReviewLesson(reviewLesson);
  };

  /**
   * Review mode 専用: timeline スライダー位置に応じて heading をその phase の question に更新。
   *
   * Why: review mode の heading に「レッスン名」を出すと #lesson-review-banner と重複し、
   *   かつ phase を移動しても heading が変わらないので「いま何の問いを見ているか」が分からない。
   *   reviewLesson.phases[i].question (= 元の formTitle) を slider 位置に応じて出すと、
   *   役割分離 (banner=固定文脈 / heading=動的内容) が綺麗になる。
   *
   * 呼び出し元:
   *   - init hydrate 直後 (page.js init): idx=null → 最後の phase を初期表示
   *   - slider input ハンドラ: idx=current slider value
   *   - 「↺ 現在」ボタン: idx=null → 最終 phase
   *
   * @param {number|null} timelineIdx - vizTimelineIndex (null = 全データ累積 = 最終 phase)
   */
  StudyQuestApp.prototype.__updateReviewHeading = function (timelineIdx) {
    if (!this.state || !this.state.isReviewMode) return;
    const lesson = this.state.reviewLesson;
    if (!lesson || !Array.isArray(lesson.phases) || lesson.phases.length === 0) return;
    const headingEl = this.elements && this.elements.headingLabel;
    if (!headingEl) return;

    let phaseIdx;
    if (typeof timelineIdx === 'number' && timelineIdx >= 0) {
      const snaps = this.vizGetSnapshots ? this.vizGetSnapshots() : [];
      if (timelineIdx < snaps.length && snaps[timelineIdx]) {
        phaseIdx = Number(snaps[timelineIdx].phaseIndex);
      } else {
        // slider が末尾 (= 現在) を指している
        phaseIdx = lesson.phases.length - 1;
      }
    } else {
      phaseIdx = lesson.phases.length - 1;
    }
    if (!Number.isFinite(phaseIdx) || phaseIdx < 0 || phaseIdx >= lesson.phases.length) return;
    const phase = lesson.phases[phaseIdx];
    const text = (phase && (phase.question || phase.name)) || '';
    if (text) headingEl.textContent = text;
  };

  StudyQuestApp.prototype.vizMaybeCaptureSnapshot = function () {
    try {
      const rows = this.state.currentAnswers || [];
      vizSnapLog('called rows=' + rows.length + ' mode=' + this.state.boardMode);
      if (rows.length === 0) {
        vizSnapLog('skip: no rows');
        return;
      }

      const historical = buildHistoricalSnapshots(
        rows,
        this.state.boardMode,
        this.state.axisConfig
      );
      vizSnapLog('historical steps=' + historical.length);
      // 毎回 SS timestamp ベースで再構築して上書き (delta encoding なのでマージは不要)。
      saveSnapshots(historical);
    } catch (e) {
      try { console.error('[viz/snap] EXCEPTION', e && e.message, e); } catch (_) {}
    }
  };

  /**
   * 「議論前」を捕獲（教師ボタン）。F#4 ビフォー・アフター用。
   * 議論前は「現在の全体状態」を anchor として残す full snapshot (delta ではない)。
   */
  StudyQuestApp.prototype.vizCaptureBefore = function () {
    const rows = (this.state.currentAnswers || []).map(r => ({
      rowIndex: r.rowIndex,
      emailHash: r.emailHash || null,
      class: r.class || '',
      name: r.name || '',
      answer: r.answer || '',
      reason: r.reason || '',
      numericX: typeof r.numericX === 'number' ? r.numericX : null,
      numericY: typeof r.numericY === 'number' ? r.numericY : null,
      timestamp: r.timestamp || null
    }));
    const snap = {
      capturedAt: Date.now(),
      boardMode: this.state.boardMode || 'board',
      axisConfig: this.state.axisConfig || null,
      rows
    };
    saveBeforeSnapshot(snap);
    return snap.capturedAt;
  };
  StudyQuestApp.prototype.vizClearBefore = function () {
    saveBeforeSnapshot(null);
  };
  StudyQuestApp.prototype.vizGetBefore = function () { return loadBeforeSnapshot(); };
  StudyQuestApp.prototype.vizGetSnapshots = function () { return loadSnapshots(); };

  StudyQuestApp.prototype.vizClearAllSnapshots = function () {
    try {
      sessionStorage.removeItem(SNAPSHOT_KEY);
      sessionStorage.removeItem(SNAPSHOT_BEFORE_KEY);
    } catch (_) {}
  };

  function isTeacher(app) {
    // Why: page.js の state は isEditor / isAdminUser / showAdminFeatures フラグを持つ。
    //      これに加えて以下も認める：
    //       1. URL に ?teacher=1 が付いている（強制ON。テスト・代理閲覧用）
    //       2. wire レスポンスに profiles が含まれている（サーバ側が「この閲覧者は
    //          所有者/管理者」と判定して送ってきている）→ それを根拠にする
    if (!app || !app.state) return false;
    if (app.state.isEditor || app.state.isAdminUser || app.state.showAdminFeatures) return true;
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.get('teacher') === '1' || params.get('admin') === '1') return true;
    } catch (_) {}
    // profiles 自体は誰でも見える（buildSafePublishedDataResult が全員に送る）ため、
    // それを根拠に teacher 判定すると student にも UI が出てしまう。
    // → profiles の存在は十分条件ではない。
    return false;
  }

  /**
   * Option B: 生徒 + studentProfileNav 有り（= history が 2 件以上、または past phase 中）の
   * とき pill UI を見せるべきかの判定。
   *
   * Why: history が 1 件 (= 現在のみ) しか無いと過去 navigation の余地がないので UI を出す
   *      意味がない。教師は別経路で常に表示。
   */
  function shouldShowStudentPills(app) {
    if (!app || !app.state) return false;
    const nav = app.state.studentProfileNav;
    if (!nav || !Array.isArray(nav.history)) return false;
    return nav.history.length >= 2 || !!app.state.viewingPastProfile;
  }

  /**
   * profile pills と議論ツールを別 slot に分離注入。
   *   - profile pills → #vizPhaseHost (header Row 1、教師/生徒共通、過去フェーズ閲覧用)
   *   - 議論ツール (議論前/比較/軌跡) → #vizToolbarSlot (header Row 3、教師専用)
   * 役割を物理的に分離: pills = phase 識別、tools = 授業中の議論操作。
   */
  function ensureViewToolbar(app) {
    const teacher = isTeacher(app);
    const studentPills = !teacher && shouldShowStudentPills(app);
    if (!teacher && !studentPills) return null;

    // --- 1. profile pills bar を #vizPhaseHost に注入 (教師/生徒共通) ---
    const phaseHost = document.getElementById('vizPhaseHost');
    let pillsBar = document.getElementById('vizProfilePills');
    if (!pillsBar && phaseHost) {
      pillsBar = document.createElement('div');
      pillsBar.id = 'vizProfilePills';
      pillsBar.className = 'viz-toolbar-left';
      pillsBar.setAttribute('role', 'tablist');
      pillsBar.setAttribute('aria-label', 'ボード切替');
      phaseHost.appendChild(pillsBar);
    }
    if (pillsBar) {
      // student/teacher 切り替えクラス (CSS で過去 pill のアフォーダンス差を出す用)
      pillsBar.classList.toggle('viz-toolbar--student', !teacher);
    }

    // --- 2. 議論ツール bar を #vizToolbarSlot に注入 (教師のみ) ---
    const toolsSlot = document.getElementById('vizToolbarSlot');
    let toolsBar = document.getElementById('vizToolbar');
    if (teacher && !toolsBar && toolsSlot) {
      toolsBar = document.createElement('div');
      toolsBar.id = 'vizToolbar';
      toolsBar.className = 'viz-toolbar viz-controls';
      toolsBar.setAttribute('role', 'toolbar');
      toolsBar.setAttribute('aria-label', '議論支援ツール');
      toolsBar.innerHTML = [
        '<span class="viz-toolbar-section-label">議論支援</span>',
        '<div class="viz-toolbar-center" id="vizControls">',
        '  <button type="button" id="vizCaptureBeforeBtn" class="viz-btn" ' +
        '          title="議論前として現在の分布を保存" aria-label="議論前として現在の分布を保存">',
        '    📌 議論前',
        '  </button>',
        '  <button type="button" id="vizCompareToggleBtn" class="viz-btn" ' +
        '          title="議論前と現在を2画面で対比" aria-label="議論前と現在を2画面で対比" ' +
        '          aria-pressed="false">',
        '    ⇄ 比較',
        '  </button>',
        '  <button type="button" id="vizDeltaToggleBtn" class="viz-btn" ' +
        '          title="議論前→現在の動きを軌跡で表示 (matrix のみ / クリックで再生 / Shift+クリックでOFF)" ' +
        '          aria-label="議論前から現在への意見の動きを軌跡で表示" ' +
        '          aria-pressed="false">',
        '    → 動き',
        '  </button>',
        '  <div class="viz-timeline">',
        '    <label for="vizTimelineSlider" class="viz-timeline-label">軌跡</label>',
        '    <input type="range" id="vizTimelineSlider" min="0" max="0" value="0" step="1" ' +
        '           aria-label="軌跡タイムライン: 過去の分布を再生" />',
        '    <span id="vizTimelineLabel" class="viz-timeline-time" aria-live="polite">現在</span>',
        '    <button type="button" id="vizTimelineNowBtn" class="viz-btn-small" ' +
        '            title="現在に戻る" aria-label="タイムラインを現在に戻す">↺</button>',
        '  </div>',
        '</div>'
      ].join('');
      toolsSlot.appendChild(toolsBar);
    }

    // --- 3. event listeners は initialized フラグで 1 度だけ bind ---
    if (pillsBar && !pillsBar.dataset.eventsBound) {
      pillsBar.dataset.eventsBound = '1';
      bindProfilePillsEvents(pillsBar, app);
    }
    if (toolsBar && !toolsBar.dataset.eventsBound) {
      toolsBar.dataset.eventsBound = '1';
      bindDiscussionToolsEvents(toolsBar, app);
    }

    // 互換性のため bar 相当 (pillsBar) を返す。旧コード呼び出し側は戻り値を使っていない。
    return pillsBar || toolsBar || null;
  }

  // profile pills の click/change handler (旧 ensureViewToolbar 内インラインを切り出し)
  function bindProfilePillsEvents(pillsBar, app) {
    // profile pills の click handler は event delegation で 1 度だけ登録。
    //   data-action の値で経路を厳密分岐:
    //     'load-past' → 過去フェーズ読み込み (Option B プレビュー)
    //     'switch'    → active を切替（教師が未来 profile を進めるとき）
    //     なし (current pill) → 過去閲覧中なら現在に戻る、それ以外は no-op
    //   default を 'switch' にフォールバックすると current pill click が誤って active
    //   再書込を試行して「ユーザーが見つかりません」になる罠を回避する。
    pillsBar.addEventListener('click', (e) => {
      const returnBtn = e.target.closest('.viz-profile-return');
      if (returnBtn) {
        if (typeof app.__vizReturnToCurrent === 'function') app.__vizReturnToCurrent();
        return;
      }
      const btn = e.target.closest('.viz-profile-pill');
      if (!btn) return;
      if (btn.disabled || btn.classList.contains('disabled')) return;
      const name = btn.dataset.profile;
      if (!name) return;
      const action = btn.dataset.action;
      if (!action) {
        // current pill: 過去閲覧中なら戻る、それ以外は no-op (もう current)
        if (app.state && app.state.viewingPastProfile &&
            typeof app.__vizReturnToCurrent === 'function') {
          app.__vizReturnToCurrent();
        }
        return;
      }
      // profile 切替アクション (pill click) では classFilter をリセットして「新 profile の全件」から
      //   始める。同 profile 内の filter 変更 (loadSheetData gate 経由) には影響しない。
      if (typeof resetClassFilterToAll === 'function') resetClassFilterToAll(app);
      if (action === 'load-past') {
        if (typeof app.__vizLoadPastProfile === 'function') app.__vizLoadPastProfile(name);
      } else if (action === 'switch') {
        app.__vizLoadProfile(name);
      }
    });
    // select fallback の change ハンドラ (profile 5 個以上のとき)
    pillsBar.addEventListener('change', (e) => {
      if (e.target.id !== 'vizProfileSelect') return;
      const name = e.target.value;
      if (!name) return;
      if (typeof resetClassFilterToAll === 'function') resetClassFilterToAll(app);
      app.__vizLoadProfile(name);
    });
  }

  // 議論ツール (議論前/比較/軌跡) の event listener を一括 bind (教師注入時のみ呼ばれる)。
  // CSS .saved アニメーション持続時間と一致させる (短いと残光が消える、長いと連打しづらい)。
  const CAPTURE_FLASH_MS = 1500;

  function bindDiscussionToolsEvents(toolsBar, app) {
    const captureBtn = toolsBar.querySelector('#vizCaptureBeforeBtn');
    if (captureBtn) {
      captureBtn.addEventListener('click', () => {
        app.vizCaptureBefore();
        captureBtn.classList.add('saved');
        setTimeout(() => captureBtn.classList.remove('saved'), CAPTURE_FLASH_MS);
      });
    }
    const compareBtn = toolsBar.querySelector('#vizCompareToggleBtn');
    if (compareBtn) {
      compareBtn.addEventListener('click', () => {
        // 議論前スナップ未保存で比較 ON にしようとしても compareRender は普通の描画に
        // フォールバックする (loadBeforeSnapshot null) ので、UI 上「active なのに見た目が
        // 変わらない」状態になり教師が混乱する。事前ガードして警告。
        if (!app.state.vizCompareMode && !app.vizGetBefore()) {
          try { window.alert('「📌 議論前」を先に押して、議論開始時点の分布を保存してください。'); } catch (_) {}
          return;
        }
        app.state.vizCompareMode = !app.state.vizCompareMode;
        compareBtn.classList.toggle('active', !!app.state.vizCompareMode);
        compareBtn.setAttribute('aria-pressed', String(!!app.state.vizCompareMode));
        // モーダルが開いていれば閉じる: stale な右カード残置 / 切替遅延を避ける。
        if (typeof app.hideAnswerModal === 'function') app.hideAnswerModal();
        // 比較モード中: timeline スライダーが「左ペインの時刻」を制御する設計。
        app.renderBoard(false, false, []);
      });
    }

    // 「→ 動き」: 議論前 → 現在 の動きを ghost trail で表示 (v2691, v2777 で再設計)。
    //   compare モードと違って overlay 形式なので、現在の画面構造を保ったまま追加情報を出せる。
    //   ガード:
    //     1. 議論前スナップが必要 (compare と同じ)
    //     2. matrix モードでのみ動作 (numericX/Y が無い mode では無意味)
    //     3. axisConfig が互換 (xAxisLabels.min/max + yAxisLabels.min/max 完全一致)
    //   3 は profile 切替後にも安全 — 違うフォーム間の座標を結ばない。
    //
    //   トグル動作 (v2777):
    //     - OFF → ON: ガード通過 → ON + 1.5s trail growth animation
    //     - ON → ON (もう一度 click): replay (animation を再生、ON 状態維持)
    //     - ON → OFF: shift-click で OFF (再生繰り返し中の誤クリックで消えない)
    //     - 通常の trails 消去は profile 切替 / 議論前 snapshot 削除で自動
    const deltaBtn = toolsBar.querySelector('#vizDeltaToggleBtn');
    if (deltaBtn) {
      deltaBtn.addEventListener('click', (event) => {
        if (!app.state.vizShowDeltas) {
          const before = app.vizGetBefore();
          if (!before) {
            try { window.alert('「📌 議論前」を先に押して、議論開始時点の分布を保存してください。'); } catch (_) {}
            return;
          }
          if (app.state.boardMode !== 'matrix') {
            try { window.alert('意見の動きは matrix モード（散布図）でのみ表示できます。'); } catch (_) {}
            return;
          }
          if (!arePhasesAxisCompatible(before.axisConfig, app.state.axisConfig)) {
            try {
              window.alert('議論前スナップと現在で軸が異なるため、動きを描けません。\n' +
                '同じ問い（同じ X/Y 軸ラベル）の間でのみ動きを可視化できます。');
            } catch (_) {}
            return;
          }
          app.state.vizShowDeltas = true;
          app.state._deltaAnimateOnce = true;
        } else if (event && event.shiftKey) {
          app.state.vizShowDeltas = false;
          app.state._deltaAnimateOnce = false;
        } else {
          app.state._deltaAnimateOnce = true;
        }
        deltaBtn.classList.toggle('active', !!app.state.vizShowDeltas);
        deltaBtn.setAttribute('aria-pressed', String(!!app.state.vizShowDeltas));
        app.renderBoard(false, false, []);
      });
    }
    // Timeline スライダー: rAF debounce で「ドラッグ中の連続 input → renderBoard 連発」を抑制。
    //   matrix モードでは 30+ ノードを redraw するため、無策だと 60fps で全描画が走り
    //   低スペック端末（Edge low-power mode 等）でカクつく。input 値は最新だけ採用。
    let _vizSliderRafId = null;
    let _vizSliderPendingIdx = null;
    const slider = toolsBar.querySelector('#vizTimelineSlider');
    if (slider) {
      slider.addEventListener('input', (e) => {
        _vizSliderPendingIdx = Number(e.target.value);
        if (_vizSliderRafId !== null) return;
        _vizSliderRafId = window.requestAnimationFrame(() => {
          _vizSliderRafId = null;
          const idx = _vizSliderPendingIdx;
          _vizSliderPendingIdx = null;
          if (idx === app.state.vizTimelineIndex) return;
          app.state.vizTimelineIndex = idx;
          const snaps = app.vizGetSnapshots();
          // Review mode: heading を該当 phase の question に追従させる
          if (typeof app.__updateReviewHeading === 'function') app.__updateReviewHeading(idx);
          const label = document.getElementById('vizTimelineLabel');
          if (label) {
            if (idx >= snaps.length) {
              label.textContent = '現在';
            } else {
              const t = snaps[idx];
              if (t) {
                // 表示は実 SS 投稿の最新時刻 (latestTimestamp) を優先。なければ bucket 境界。
                const tsMs = t.latestTimestamp || t.capturedAt;
                const d = new Date(tsMs);
                label.textContent = d.getHours().toString().padStart(2, '0') + ':' +
                                    d.getMinutes().toString().padStart(2, '0');
              }
            }
          }
          app.renderBoard(false, false, []);
        });
      });
    }
    const nowBtn = toolsBar.querySelector('#vizTimelineNowBtn');
    if (nowBtn) {
      nowBtn.addEventListener('click', () => {
        app.state.vizTimelineIndex = null;
        const s = toolsBar.querySelector('#vizTimelineSlider');
        const snaps = app.vizGetSnapshots();
        if (s) s.value = snaps.length;
        const label = toolsBar.querySelector('#vizTimelineLabel');
        if (label) label.textContent = '現在';
        // Review mode: heading を最終 phase に戻す
        if (typeof app.__updateReviewHeading === 'function') app.__updateReviewHeading(null);
        app.renderBoard(false, false, []);
      });
    }
  }

  function refreshModeBar(app) {
    // mode 切替ボタン / ⚙️ は撤去済 (profile が boardMode を決める)。本関数は
    // mode 連動 UI（議論ツール表示 / controlsFooter 表示）だけ担当する。
    const cur = app.state.boardMode || 'board';
    // 議論ツール（議論前/比較/タイムライン）は viz mode 専用。
    // board モードではカードに対して「揺らぎ」「比較」の概念が無いので bar 全体を非表示。
    const toolbar = document.getElementById('vizToolbar');
    if (toolbar) toolbar.style.display = (cur === 'board') ? 'none' : '';
    // controlsFooter (画面下の「列数」スライダー) は board モード専用。
    // viz モードではカードがないので意味不明なのと、viewport の下部を占有して
    // SVG レイアウトとぶつかるので非表示にする。
    const footer = document.getElementById('controlsFooter');
    if (footer) footer.style.display = (cur === 'board') ? '' : 'none';
  }

  // mode 切替は profile 切替 (boardMode を server-resolved で決定) に統一済み。
  //   旧 __vizSetMode / __vizClearTeacherMode / 'viz:teacherMode:v1' sessionStorage は撤去。
  StudyQuestApp.prototype.__vizInjectModeBar = function () { ensureViewToolbar(this); };
  StudyQuestApp.prototype.__vizRefreshModeBar = function () { refreshModeBar(this); };

  /**
   * Profile セレクタ — multi-board の切替 UI（教師限定）。
   * 「導入アンケート」「本時の議論」「振り返り」のように 1 ユーザーが複数 Forms を
   * 切替えて運用するケース向け。profiles 0 件の場合は UI を非表示にする。
   * page.js bootstrap で state.profiles / state.activeProfile が渡される前提。
   *
   * profile 数で UI を切替: PROFILE_PILLS_MAX 以下なら pill tab（1 クリック切替、視認性◎、
   * 授業テンポに合う）、超えたら select fallback（横幅収容）。
   */
  const PROFILE_PILLS_MAX = 4;

  function injectProfileSelector(app) {
    const teacher = isTeacher(app);
    const studentMode = !teacher && shouldShowStudentPills(app);
    if (!teacher && !studentMode) return;
    const toolbar = ensureViewToolbar(app);
    if (!toolbar) return;
    const container = document.getElementById('vizProfilePills');
    if (!container) return;

    // 教師: app.state.profiles (full list)
    // 生徒: app.state.studentProfileNav.history (過去 + 現在のみ)
    let pillEntries;
    let activeName;
    let pastSet;       // teacher 用: 過去 active になった profile 名集合（教師には ✓ 付ける）
    if (teacher) {
      // Why: teacher は state.profiles を root として表示。pastSet は state.profileHistory
      //   (server の profileSummary.history) から構築し、過去 active 経験を ✓ で示す。
      //   pill click は v2771 で「常に switch (active 切替)」に統一済 (詳細は下の action 行参照)。
      const profiles = (app.state && app.state.profiles) || [];
      const navHist = (app.state && Array.isArray(app.state.profileHistory))
        ? app.state.profileHistory
        : [];
      pastSet = new Set(navHist.map(h => h && h.name).filter(Boolean));
      activeName = app.state.activeProfile || '';
      const viewing = app.state.viewingPastProfile || null;

      // teacher pills も viewer と同じ時系列順で表示する。
      //   navHist (過去 active になった順 = 時系列) を base にし、
      //   未訪問 profile (future phase) は末尾に config 順で追加。
      const histOrderMap = new Map();
      navHist.forEach((h, i) => { if (h && h.name) histOrderMap.set(h.name, i); });
      const orderedProfiles = [...profiles].sort((a, b) => {
        const an = (a && a.name) || '';
        const bn = (b && b.name) || '';
        const ai = histOrderMap.has(an) ? histOrderMap.get(an) : Number.MAX_SAFE_INTEGER;
        const bi = histOrderMap.has(bn) ? histOrderMap.get(bn) : Number.MAX_SAFE_INTEGER;
        if (ai !== bi) return ai - bi;
        // 同順位 (両方とも未訪問) なら元配列順を保つため index で安定 sort
        return profiles.indexOf(a) - profiles.indexOf(b);
      });
      pillEntries = orderedProfiles.map(p => {
        const name = p && p.name ? String(p.name) : '';
        const isCurrent = name === activeName;
        const isPast = pastSet.has(name) && !isCurrent;
        return {
          name,
          formTitle: (p && p.formTitle) || '',
          isCurrent,
          isPast,
          isViewing: viewing === name || (!viewing && isCurrent),
          // Why teacher は常に 'switch': タブ click = active 切替が教師の直感的 mental model
          //   (過去 phase でも preview ではなく実 activate)。「↻ 現在に戻る」が出る困惑を解消。
          //   read-only review は AdminPanel のレッスン振り返り画面で行う。
          //   生徒 (else 経路) は権限が無いので従来通り 'load-past' (preview-only)。
          action: isCurrent ? null : 'switch'
        };
      }).filter(e => e.name);
    } else {
      const nav = app.state.studentProfileNav;
      const history = (nav && nav.history) || [];
      activeName = (nav && nav.active) || app.state.activeProfile || '';
      const viewing = app.state.viewingPastProfile || null;
      // 同名 history を末尾優先で dedup（同じ profile に何度も戻った場合の重複表示防止）
      const seen = new Set();
      const dedup = [];
      for (let i = history.length - 1; i >= 0; i--) {
        const h = history[i];
        if (!h || !h.name || seen.has(h.name)) continue;
        seen.add(h.name);
        dedup.unshift(h);
      }
      pillEntries = dedup.map(h => {
        const isCurrent = h.name === activeName;
        return {
          name: h.name,
          formTitle: h.formTitle || '',
          isCurrent,
          isPast: !isCurrent,
          isViewing: viewing === h.name || (!viewing && isCurrent),
          action: isCurrent ? null : 'load-past'
        };
      });
    }

    if (pillEntries.length === 0) {
      container.style.display = 'none';
      container.innerHTML = '';
      return;
    }
    container.style.display = '';

    // 「現在に戻る」CTA: 過去フェーズプレビュー中なら teacher / student 両方に出す。
    //   teacher も past pill click でプレビュー mode に入るので戻る手段が必要。
    const showReturnBtn = !!app.state.viewingPastProfile &&
                          app.state.viewingPastProfile !== activeName;

    const useSelect = pillEntries.length > PROFILE_PILLS_MAX && teacher;

    if (!useSelect) {
      // pill tab レイアウト
      // Why no deleted handling (v2772): sanitizeProfileHistory が profiles[] と cross-ref する
      //   ようになったため、orphan history (削除済 profile) は server 到達前に drop されている。
      //   よって client での `deleted` 分岐は不要 (常に false になるので削除済)。
      const html = ['<div class="viz-profile-pills-row">'];
      for (const e of pillEntries) {
        const safe = escapeForTooltip(e.name);
        const safeTitle = escapeForTooltip(e.formTitle || e.name);
        const classes = ['viz-profile-pill'];
        if (e.isCurrent) classes.push('current');
        if (e.isPast) classes.push('past');
        if (e.isViewing) classes.push('viewing');
        const icon = e.isCurrent ? '<span class="viz-profile-pill__dot" aria-hidden="true">●</span> '
                   : e.isPast ? '<span class="viz-profile-pill__check" aria-hidden="true">✓</span> '
                   : '';
        const ariaSel = e.isViewing ? 'true' : 'false';
        const dataAction = e.action ? ' data-action="' + e.action + '"' : '';
        html.push(
          '<button type="button" class="' + classes.join(' ') +
          '" role="tab" aria-selected="' + ariaSel +
          '" data-profile="' + safe + '"' + dataAction +
          ' title="' + safeTitle + '">' +
          icon + safe + '</button>'
        );
      }
      if (showReturnBtn) {
        html.push(
          '<button type="button" class="viz-profile-return" ' +
          'title="現在のフェーズに戻る" aria-label="現在のフェーズに戻る">' +
          '↺ 現在に戻る</button>'
        );
      }
      html.push('</div>');
      container.innerHTML = html.join('');
    } else {
      // select fallback (teacher only)
      const opts = ['<option value="">📚 ボード...</option>'];
      for (const e of pillEntries) {
        const sel = e.isCurrent ? ' selected' : '';
        opts.push('<option value="' + escapeForTooltip(e.name) + '"' + sel + '>' + escapeForTooltip(e.name) + '</option>');
      }
      container.innerHTML =
        '<select id="vizProfileSelect" class="viz-profile-select" aria-label="ボード切替" title="ボード（profile）切替">' +
        opts.join('') + '</select>';
    }
  }

  /**
   * View 画面から profile を読み込む。サーバの adminLoadProfileForView 関数を介して
   * config を実際に書き換え、loadSheetData を再実行する。
   *
   * Why: profile 切替は formUrl/spreadsheetId/columnMapping/boardMode の全てが入れ替わる
   *      大きな変更なので、サーバ側で config を上書きしてから client が再フェッチする
   *      のが整合性的に最も安全。
   */
  StudyQuestApp.prototype.__vizLoadProfile = async function (name) {
    if (!name) return;
    if (typeof google === 'undefined' || !google.script || !google.script.run) return;

    // profile 切替前に session-scoped state を reset（旧 profile の snapshot を新 profile に
    //   持ち込むと、別 SS の snapshot をスライダーで表示する等の不整合が起きるため）。
    try {
      sessionStorage.removeItem(SNAPSHOT_KEY);
      sessionStorage.removeItem(SNAPSHOT_BEFORE_KEY);
    } catch (_) {}
    this.state.vizTimelineIndex = null;
    this.state.vizCompareMode = false;
    this.state.vizShowDeltas = false;  // 別 profile では before snapshot が無効
    // class filter リセットは caller (pill click handler) で実施済み。ここでは触らない。
    // UI 側も即時反映（loadSheetData 完了を待たず空状態を見せる）
    const sliderEl = document.getElementById('vizTimelineSlider');
    if (sliderEl) {
      sliderEl.value = '0';
      sliderEl.max = '0';
      sliderEl.disabled = true;
      sliderEl.style.opacity = '0.4';
    }
    const labelEl = document.getElementById('vizTimelineLabel');
    if (labelEl) labelEl.textContent = '読み込み中…';
    const compareBtnEl = document.getElementById('vizCompareToggleBtn');
    if (compareBtnEl) compareBtnEl.classList.remove('active');
    const beforeBtnEl = document.getElementById('vizCaptureBeforeBtn');
    if (beforeBtnEl) beforeBtnEl.classList.remove('has-before', 'saved');

    // UI: 切替中フィードバック (即時)。 中央バナーで「○○ に切替中…」 を表示することで
    // pill click → 数秒の沈黙、 を防ぐ (生徒の「効いてる?」 不安を解消)。
    const select = document.getElementById('vizProfileSelect');
    if (select) select.disabled = true;
    if (typeof this.showToast === 'function') this.showToast('「' + name + '」 に切替中…');

    let res;
    try {
      // targetUserId を渡すことで、admin が他人ボードを操作するケースや、URL の userId と
      //   現在の Session email が一致しないケース（複数 Google アカウント切替）でも、対象ボードを
      //   一意に特定できる。サーバ側は targetUserId 経由で owner/admin の認可チェックを行う。
      res = await runServer('loadProfileForView', name, this.state.userId);
    } catch (err) {
      if (select) select.disabled = false;
      console.error('Profile load network error:', err);
      const msg = 'プロファイルの切替に失敗しました';
      if (typeof this.showNotification === 'function') this.showNotification(msg, 'error');
      else if (typeof this.showToast === 'function') this.showToast(msg);
      return;
    }

    if (select) select.disabled = false;
    if (!(res && res.success)) {
      console.error('Profile load failed:', res && res.message);
      const msg = 'プロファイルの読み込みに失敗しました: ' + ((res && res.message) || '不明なエラー');
      if (typeof this.showNotification === 'function') this.showNotification(msg, 'error');
      else if (typeof this.showToast === 'function') this.showToast(msg);
      return;
    }

    // ロード成功 → データ & form ボタン を両方再読み込み。
    // Why (form ボタン重複呼出): loadSheetData の formMeta 経由でも更新される
    // はずだが、ある種のキャッシュ経路で取りこぼすケースがある（user 報告）。
    // getActiveFormInfo を明示的に呼ぶことで confidence を持って同期する。
    // 自発的切替なので、 loadSheetData 内の「新しいボードに切替わりました」 中央バナーを
    // 1 回 suppress (右上 success トーストと重複しないよう)。
    this.state.__suppressBoardSwitchToast = true;
    if (typeof this.loadSheetData === 'function') {
      this.loadSheetData({ bypassCache: true, isInitialLoad: false });
    } else if (typeof window.safeReload === 'function') {
      // iframe-aware reload (cached webapp URL に _top で navigate)。
      window.safeReload({ keepParams: ['mode', 'userId'] });
    } else {
      window.location.reload();
    }
    if (typeof window.loadFormLink === 'function') {
      window.loadFormLink();
    }
    // 成功通知も右上トーストに統一 (エラーと同位置で操作-結果のペアが明示される)。
    if (typeof this.showNotification === 'function') {
      this.showNotification('「' + name + '」 に切替えました', 'success');
    }
  };

  StudyQuestApp.prototype.__vizInjectProfileSelector = function () { injectProfileSelector(this); };

  /**
   * profile を切替える前に class filter を 'すべて' にリセットする共通処理。
   *
   * Why (シンプル化): profile ごとに class カラムの値が違う ("1組" vs "6年1組") 現場ケースで、
   *   前 profile の filter を引きずると新 profile の dropdown に当該クラスが無く dropdown
   *   が silent に 'すべて' に降格、しかし API は古い filter で空結果 → UX 不整合。
   *   切替時に明示的に 'すべて' へ戻すことで「新 profile の全データから始める」状態を保証する。
   */
  function resetClassFilterToAll(app) {
    if (app.elements && app.elements.classFilter) {
      app.elements.classFilter.value = 'すべて';
    }
    if (typeof app.persistClassFilter === 'function') {
      app.persistClassFilter('すべて');
    }
  }

  StudyQuestApp.prototype.__vizLoadPastProfile = async function (name) {
    if (!name) return;
    if (typeof google === 'undefined' || !google.script || !google.script.run) return;
    if (this.state.viewingPastProfile === name) return;  // no-op

    // 切替時は viz session-scoped state を reset（current → past で snapshot 連続性が破綻するため）
    try {
      sessionStorage.removeItem(SNAPSHOT_KEY);
      sessionStorage.removeItem(SNAPSHOT_BEFORE_KEY);
    } catch (_) {}
    this.state.vizTimelineIndex = null;
    this.state.vizCompareMode = false;
    this.state.vizShowDeltas = false;  // 別 profile では before snapshot が無効
    // dropdown 現在値をそのまま採用する。pill click 経由なら caller が事前に
    //   resetClassFilterToAll() で 'すべて' に戻しているし、loadSheetData gate 経由
    //   (同 profile 内 filter 変更) なら新しい dropdown 値で fetch する。
    const filter = this.getCurrentFilterState ? this.getCurrentFilterState() : {};
    const classFilter = filter.classFilter || null;
    const sortOrder = filter.sortOrder || 'newest';

    // UI 即時反映 (loading フィードバック + 描画ペインに loading 文字)。
    this.state.viewingPastProfile = name;
    if (typeof this.__vizInjectProfileSelector === 'function') this.__vizInjectProfileSelector();
    if (typeof this.showToast === 'function') this.showToast('「' + name + '」 を読み込み中…');

    let res;
    try {
      res = await runServer('getPublishedSheetDataForProfile', this.state.userId, name, classFilter, sortOrder);
    } catch (err) {
      this.state.viewingPastProfile = null;
      if (typeof this.__vizInjectProfileSelector === 'function') this.__vizInjectProfileSelector();
      console.error('Past profile load network error:', err);
      const msg = 'フェーズ読み込みに失敗しました';
      if (typeof this.showNotification === 'function') this.showNotification(msg, 'error');
      else if (typeof this.showToast === 'function') this.showToast(msg);
      return;
    }

    if (!res || !res.success) {
      // 失敗時は viewing を解除して 統一エラー通知 (showNotification = 右上トースト)。
      this.state.viewingPastProfile = null;
      if (typeof this.__vizInjectProfileSelector === 'function') this.__vizInjectProfileSelector();
      const msg = (res && (res.error || res.message)) || 'フェーズ読み込み失敗';
      if (typeof this.showNotification === 'function') this.showNotification(msg, 'error');
      else if (typeof this.showToast === 'function') this.showToast(msg);
      return;
    }

    // 成功: result を loadSheetData が処理するのと同じ形なので state へ反映 + renderBoard。
    //   ただし getPublishedSheetData 経由ではないので、自前で state を更新する。
    try {
      const rows = Array.isArray(res.data) ? res.data : [];
      this.state.currentAnswers = rows;
      this.state.viewingPastProfile = res.viewingPastProfile || name;
      if (res.displaySettings && typeof res.displaySettings.boardMode === 'string') {
        this.state.boardMode = res.displaySettings.boardMode;
        this.state.serverBoardMode = res.displaySettings.boardMode;
      }
      if (res.axisConfig) this.state.axisConfig = res.axisConfig;
      if (res.header && this.elements && this.elements.headingLabel) {
        this.elements.headingLabel.textContent = res.header;
      }
      if (typeof this.populateClassFilter === 'function') {
        this.populateClassFilter(rows);
      }
    } catch (uiError) {
      console.warn('__vizLoadPastProfile: state update failed', uiError);
    }
    if (typeof this.__vizInjectProfileSelector === 'function') this.__vizInjectProfileSelector();
    if (typeof this.renderBoard === 'function') this.renderBoard(false, false, []);
    // トースト「過去のフェーズを表示中（読み取り専用）」
    if (typeof this.showToast === 'function') {
      this.showToast('「' + name + '」を表示中（読み取り専用）');
    }
  };

  /**
   * Option B: 過去フェーズ閲覧から現在 (active) に戻る。
   */
  StudyQuestApp.prototype.__vizReturnToCurrent = function () {
    if (!this.state.viewingPastProfile) return;
    this.state.viewingPastProfile = null;
    // 過去フェーズで適用していた class filter は active に持ち込まない（同上の理由）。
    resetClassFilterToAll(this);
    if (typeof this.__vizInjectProfileSelector === 'function') this.__vizInjectProfileSelector();
    if (typeof this.loadSheetData === 'function') {
      this.loadSheetData({ bypassCache: true, isInitialLoad: false });
    } else if (typeof window.safeReload === 'function') {
      window.safeReload({ keepParams: ['mode', 'userId'] });
    } else {
      window.location.reload();
    }
  };

  function refreshVizControlsState(app) {
    const slider = document.getElementById('vizTimelineSlider');
    if (!slider) return;
    const snaps = app.vizGetSnapshots();
    const max = snaps.length;
    slider.max = String(max);

    // disabled 条件: snapshot 0 件のときのみ。
    // 比較モード中もスライダーは active (動かすと左ペインだけ時刻に応じて変化)。
    const isCompare = !!app.state.vizCompareMode;
    const noSnaps = (max === 0);
    slider.disabled = noSnaps;
    slider.style.opacity = noSnaps ? '0.4' : '';
    slider.title = isCompare ? '比較モード中: スライダーで左ペイン（過去）が動く' : '';

    const label = document.getElementById('vizTimelineLabel');
    if (label && app.state.vizTimelineIndex == null) {
      slider.value = String(max);
      // ラベル文言:
      //  - "比較中"     → vizCompareMode、左ペインが議論前 anchor or 最古 snapshot
      //  - "軌跡なし"   → snapshot 0 件 (hydrate 失敗 or rows[].timestamp 解釈不能)
      //  - "現在"      → 通常: スライダー右端 = 現在の分布
      if (isCompare) label.textContent = '比較中（左=過去）';
      else if (noSnaps) label.textContent = '軌跡なし';
      else label.textContent = '現在';
    }

    // 議論前ボタンの状態
    const beforeBtn = document.getElementById('vizCaptureBeforeBtn');
    if (beforeBtn) {
      const has = !!app.vizGetBefore();
      beforeBtn.classList.toggle('has-before', has);
      // 議論前未保存 → compare ボタンに視覚的ヒント (compare-disabled クラスで CSS 制御)
      const compareBtn = document.getElementById('vizCompareToggleBtn');
      if (compareBtn) {
        compareBtn.classList.toggle('compare-disabled', !has && !app.state.vizCompareMode);
        // aria-pressed は state と毎回同期（クリックハンドラだけだと render 経由の変更を反映しそこねる）
        compareBtn.setAttribute('aria-pressed', String(!!app.state.vizCompareMode));
      }
    }
  }

  // expose snapshot helpers for tests
  StudyQuestApp.prototype.__vizSnapshotInternals = {
    buildHistoricalSnapshots: buildHistoricalSnapshots,
    SNAPSHOT_MAX: SNAPSHOT_MAX
  };

  // Why: タイムラインで過去 snapshot を選んでいるとき、その snapshot を
  //      currentAnswers として swap してから既存 renderer を呼ぶ。
  //      終わったら復元する。これでレンダリングロジックを変更せずタイムラインが効く。
  //
  // CRITICAL async/await: fn() は async (renderMatrix 等) なので Promise を即返す。
  //   旧コードは return fn() のまま finally に抜けたため、Promise 完了前に
  //   currentAnswers が元に戻り、レンダリング時には元の rows を参照する致命的バグ。
  //   await Promise.resolve(...).then(...).finally(...) パターンで Promise の
  //   resolve まで swap を維持する。同期 fn (例: テスト時) も Promise.resolve で
  //   同じパスを通せる。
  // 同一 emailHash の再投稿は最新で上書き。snapshots[0..idx] を累積して rows を再構成。
  function accumulateRowsUpTo(snaps, idx) {
    const latestByKey = {};
    for (let i = 0; i <= idx; i++) {
      const r = snaps[i] && snaps[i].addedRow;
      if (!r) continue;
      latestByKey[r.emailHash || ('row#' + r.rowIndex)] = r;
    }
    return Object.values(latestByKey);
  }

  function withTimelineSwap(app, fn) {
    const idx = app.state.vizTimelineIndex;
    if (idx == null) return fn();
    const snaps = app.vizGetSnapshots();
    if (idx < 0 || idx >= snaps.length) return fn();

    const rebuiltRows = accumulateRowsUpTo(snaps, idx);

    const original = app.state.currentAnswers;
    const originalAxis = app.state.axisConfig;
    app.state.currentAnswers = rebuiltRows;
    app.state.axisConfig = snaps[idx].axisConfig;
    const restore = () => {
      app.state.currentAnswers = original;
      app.state.axisConfig = originalAxis;
    };
    let result;
    try {
      result = fn();
    } catch (syncError) {
      restore();
      throw syncError;
    }
    // Promise なら resolve / reject を待ってから restore。同期戻り値ならそのまま restore。
    if (result && typeof result.then === 'function') {
      return Promise.resolve(result).finally(restore);
    }
    restore();
    return result;
  }

  // __vizInjectControls は __vizInjectModeBar と同じ ensureViewToolbar 呼び出しだったため撤去。
  //   toolbar 注入は __vizInjectModeBar / __vizInjectProfileSelector が冪等に行う。
  StudyQuestApp.prototype.__vizRefreshControls = function () { refreshVizControlsState(this); };
  StudyQuestApp.prototype.__vizWithTimelineSwap = function (fn) { return withTimelineSwap(this, fn); };
  StudyQuestApp.prototype.__vizGetBeforeSnapshot = function () { return loadBeforeSnapshot(); };

  /**
   * ビフォー・アフター 2 ペイン描画。
   *
   * 設計:
   *   - 右ペイン = 常に「現在」（最新 currentAnswers）
   *   - 左ペイン = タイムラインスライダーが指す snapshot:
   *      1. vizTimelineIndex がセットされている → snapshots[idx] を使う
   *      2. 未セット かつ 議論前 anchor (loadBeforeSnapshot) があれば → そちらを使う
   *      3. どちらもなければ → 最古の snapshot
   *      4. snapshot が 0 件なら → 普通の描画にフォールバック (compare 不可)
   *
   *   ユーザー期待「右=現在、バーで左がタイムラインに沿って変化」を直接実装。
   *   PDF p.5「シークバーを動かして、自分のマーカー位置とコメントの変化を振り返る」
   *   と完全整合。「議論前」ボタンは依然有効で、押せば左ペインがその時刻にジャンプする
   *   anchor として機能する。
   */
  StudyQuestApp.prototype.__vizRenderCompare = async function (renderOne, mode) {
    const answers = this.elements.answersContainer;
    if (!answers) return;

    const fmtHhMm = (ms) => {
      const d = new Date(ms);
      return d.getHours().toString().padStart(2, '0') + ':' +
             d.getMinutes().toString().padStart(2, '0');
    };

    // 左ペインに表示する snapshot を決定。
    const before = loadBeforeSnapshot();
    const snaps = loadSnapshots();
    let leftSource = null;
    let leftLabel = '';
    const idx = this.state.vizTimelineIndex;
    if (typeof idx === 'number' && idx >= 0 && idx < snaps.length) {
      // slider 操作中: delta 累積で「idx 時点までの状態」を再構成
      leftSource = {
        rows: accumulateRowsUpTo(snaps, idx),
        axisConfig: snaps[idx].axisConfig
      };
      leftLabel = '⏱ ' + fmtHhMm(snaps[idx].latestTimestamp);
    } else if (before) {
      // 議論前 anchor (full snapshot): rows / capturedAt をそのまま読める
      leftSource = before;
      leftLabel = '📌 議論前 (' + fmtHhMm(before.capturedAt) + ')';
    } else if (snaps.length > 0) {
      // fallback: 「議論前」未保存 → 最初の投稿だけを左に出す
      leftSource = {
        rows: accumulateRowsUpTo(snaps, 0),
        axisConfig: snaps[0].axisConfig
      };
      leftLabel = '📍 最初の投稿 (' + fmtHhMm(snaps[0].latestTimestamp) + ')';
    } else {
      // snapshot 0 件 + 議論前未保存 → 比較不能。compareMode を OFF にしてユーザーに通知。
      this.state.vizCompareMode = false;
      // ボタンの aria-pressed / active クラスも同期 (refreshVizControlsState 任せでは
      // 次の render を待つ必要があり、ボタンが「押されたまま」に見える)
      const compareBtn = document.getElementById('vizCompareToggleBtn');
      if (compareBtn) {
        compareBtn.classList.remove('active');
        compareBtn.setAttribute('aria-pressed', 'false');
      }
      if (typeof this.showToast === 'function') {
        this.showToast('比較するには「📌 議論前」を先に押すか、投稿が蓄積するまで待ってください');
      }
      return await renderOne();
    }

    // 既存内容を一旦クリア、2 ペインのラッパを構築
    answers.className = 'viz-container';
    answers.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'viz-compare-wrap';
    const rightLabel = '📊 現在';
    const beforePane = document.createElement('div');
    beforePane.className = 'viz-compare-pane';
    beforePane.innerHTML = `<h4>${leftLabel}</h4>`;
    const beforeSvgHost = document.createElement('div');
    beforeSvgHost.id = 'vizCompareLeftHost';
    beforePane.appendChild(beforeSvgHost);

    const afterPane = document.createElement('div');
    afterPane.className = 'viz-compare-pane';
    afterPane.innerHTML = `<h4>${rightLabel}</h4>`;
    const afterSvgHost = document.createElement('div');
    afterSvgHost.id = 'vizCompareRightHost';
    afterPane.appendChild(afterSvgHost);

    // 比較モード: 分布の左右並列表示のみ。ドットクリックは単一モーダルで順次表示。

    wrap.appendChild(beforePane);
    wrap.appendChild(afterPane);
    answers.appendChild(wrap);

    // Why view-swap: renderer は #vizSvg を作って書き込む実装。各ペインで
    //   currentAnswers と answersContainer を一時 swap して renderOne を 2 回呼ぶ。
    const originalAnswers = this.elements.answersContainer;
    const savedRows = this.state.currentAnswers;
    const savedAxis = this.state.axisConfig;

    // 左ペイン: leftSource の rows で描画
    this.state.currentAnswers = leftSource.rows;
    this.state.axisConfig = leftSource.axisConfig;
    this.elements.answersContainer = beforeSvgHost;
    try { await renderOne(); } catch (_) { /* keep going */ }

    // 右ペイン: 現在 rows で描画
    this.state.currentAnswers = savedRows;
    this.state.axisConfig = savedAxis;
    this.elements.answersContainer = afterSvgHost;
    try { await renderOne(); } catch (_) { /* keep going */ }

    // 復元 + controls 再構築
    this.elements.answersContainer = originalAnswers;
    ensureViewToolbar(this);
    refreshVizControlsState(this);
  };


  // ---------------------------------------------------------------------
  // Projector モード ?display=projector
  // Why: 電子黒板向け大画面表示。教師端末は通常 view URL、プロジェクタは
  //      ?display=projector で別タブで開く想定。両者は同じ Forms に向かう。
  // ---------------------------------------------------------------------

  StudyQuestApp.prototype.vizApplyProjectorMode = function () {
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.get('display') === 'projector') {
        document.body.classList.add('projector-mode');
      }
    } catch (e) {
      // URL parse 失敗は無視
    }
  };

  // 既存の init 完了タイミングで一度だけ適用（DOMContentLoaded 後の動作を想定）
  // page.js の init が console-safe であることを前提に、CLAUDE.md の
  // 「top-level side effects forbidden」原則に従い、即座に処理せず
  // DOMContentLoaded で 1 回だけフラグ付与する。
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get('display') === 'projector') {
          document.body.classList.add('projector-mode');
        }
      } catch (_) {}
    });
  } else {
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.get('display') === 'projector') {
        document.body.classList.add('projector-mode');
      }
    } catch (_) {}
  }
})();
</script>
