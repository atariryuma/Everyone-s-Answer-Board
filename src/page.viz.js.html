      // Why: teacher は state.profiles を root として表示。pastSet は studentProfileNav.history
      //   から（teacher 視点では server が null で送ってくることもあるが、その場合 pastSet は空集合）。
      //   過去 pill は preview semantics で load-past 経路（student と同じ）。未来 profile は
      //   teacher だけが見える状態なので switch（新フェーズへの進行用）。
      const profiles = (app.state && app.state.profiles) || [];
      const navHist = (app.state.studentProfileNav && app.state.studentProfileNav.history) || [];
      pastSet = new Set(navHist.map(h => h && h.name).filter(Boolean));
      activeName = app.state.activeProfile || '';
      const viewing = app.state.viewingPastProfile || null;

      // v2678: teacher pills も viewer と同じ時系列順で表示する。
      //   旧: profiles 配列 (config 編集順) をそのまま使うと「本時 → 導入 → 振り返り」
      //   のような非時系列順になり、viewer の時系列順と不整合だった。
      //   新: navHist (過去 active になった順 = 時系列) の順序を base にし、
      //   未訪問 profile (まだ active にしていない future phase) は末尾に config 順で追加。
      const histOrderMap = new Map();
      navHist.forEach((h, i) => { if (h && h.name) histOrderMap.set(h.name, i); });
      const orderedProfiles = [...profiles].sort((a, b) => {
        const an = (a && a.name) || '';
        const bn = (b && b.name) || '';
        const ai = histOrderMap.has(an) ? histOrderMap.get(an) : Number.MAX_SAFE_INTEGER;
        const bi = histOrderMap.has(bn) ? histOrderMap.get(bn) : Number.MAX_SAFE_INTEGER;
        if (ai !== bi) return ai - bi;
        // 同順位 (両方とも未訪問) なら元配列順を保つため index で安定 sort
        return profiles.indexOf(a) - profiles.indexOf(b);
      });
      pillEntries = orderedProfiles.map(p => {
        const name = p && p.name ? String(p.name) : '';
        const isCurrent = name === activeName;
        const isPast = pastSet.has(name) && !isCurrent;
        return {
          name,
          formTitle: (p && p.formTitle) || '',
          isCurrent,
          isPast,
          isViewing: viewing === name || (!viewing && isCurrent),
          deleted: false,
          action: isCurrent ? null : (isPast ? 'load-past' : 'switch')
        };
      }).filter(e => e.name);
    } else {
      const nav = app.state.studentProfileNav;
      const history = (nav && nav.history) || [];
      activeName = (nav && nav.active) || app.state.activeProfile || '';
      const viewing = app.state.viewingPastProfile || null;
      // 同名 history を末尾優先で dedup（同じ profile に何度も戻った場合の重複表示防止）
      const seen = new Set();
      const dedup = [];
      for (let i = history.length - 1; i >= 0; i--) {
        const h = history[i];
        if (!h || !h.name || seen.has(h.name)) continue;
        seen.add(h.name);
        dedup.unshift(h);
      }
      pillEntries = dedup.map(h => {
        const isCurrent = h.name === activeName;
        return {
          name: h.name,
          formTitle: h.formTitle || '',
          isCurrent,
          isPast: !isCurrent,
          isViewing: viewing === h.name || (!viewing && isCurrent),
          deleted: !!h.deleted,
          action: isCurrent ? null : 'load-past'
        };
      });
    }

    if (pillEntries.length === 0) {
      container.style.display = 'none';
      container.innerHTML = '';
      return;
    }
    container.style.display = '';

    // 「現在に戻る」CTA: 過去フェーズプレビュー中なら teacher / student 両方に出す。
    //   teacher も past pill click でプレビュー mode に入るので戻る手段が必要。
    const showReturnBtn = !!app.state.viewingPastProfile &&
                          app.state.viewingPastProfile !== activeName;

    const useSelect = pillEntries.length > PROFILE_PILLS_MAX && teacher;

    if (!useSelect) {
      // pill tab レイアウト
      const html = ['<div class="viz-profile-pills-row">'];
      for (const e of pillEntries) {
        const safe = escapeForTooltip(e.name);
        const safeTitle = escapeForTooltip(e.formTitle || e.name);
        const classes = ['viz-profile-pill'];
        if (e.isCurrent) classes.push('current');
        if (e.isPast) classes.push('past');
        if (e.isViewing) classes.push('viewing');
        if (e.deleted) classes.push('deleted');
        const icon = e.isCurrent ? '<span class="viz-profile-pill__dot" aria-hidden="true">●</span> '
                   : e.isPast ? '<span class="viz-profile-pill__check" aria-hidden="true">✓</span> '
                   : '';
        const ariaSel = e.isViewing ? 'true' : 'false';
        const dataAction = e.action ? ' data-action="' + e.action + '"' : '';
        const disabled = e.deleted ? ' disabled aria-disabled="true"' : '';
        html.push(
          '<button type="button" class="' + classes.join(' ') +
          '" role="tab" aria-selected="' + ariaSel +
          '" data-profile="' + safe + '"' + dataAction + disabled +
          ' title="' + safeTitle + (e.deleted ? '（このフェーズは削除済です）' : '') + '">' +
          icon + safe + '</button>'
        );
      }
      if (showReturnBtn) {
        html.push(
          '<button type="button" class="viz-profile-return" ' +
          'title="現在のフェーズに戻る" aria-label="現在のフェーズに戻る">' +
          '↺ 現在に戻る</button>'
        );
      }
      html.push('</div>');
      container.innerHTML = html.join('');
    } else {
      // select fallback (teacher only)
      const opts = ['<option value="">📚 ボード...</option>'];
      for (const e of pillEntries) {
        const sel = e.isCurrent ? ' selected' : '';
        opts.push('<option value="' + escapeForTooltip(e.name) + '"' + sel + '>' + escapeForTooltip(e.name) + '</option>');
      }
      container.innerHTML =
        '<select id="vizProfileSelect" class="viz-profile-select" aria-label="ボード切替" title="ボード（profile）切替">' +
        opts.join('') + '</select>';
    }
  }

  /**
   * View 画面から profile を読み込む。サーバの adminLoadProfileForView 関数を介して
   * config を実際に書き換え、loadSheetData を再実行する。
   *
   * Why: profile 切替は formUrl/spreadsheetId/columnMapping/boardMode の全てが入れ替わる
   *      大きな変更なので、サーバ側で config を上書きしてから client が再フェッチする
   *      のが整合性的に最も安全。
   */
  StudyQuestApp.prototype.__vizLoadProfile = function (name) {
    if (!name) return;
    if (typeof google === 'undefined' || !google.script || !google.script.run) return;

    // profile 切替前に session-scoped state を reset（旧 profile の snapshot を新 profile に
    //   持ち込むと、別 SS の snapshot をスライダーで表示する等の不整合が起きるため）。
    try {
      sessionStorage.removeItem(SNAPSHOT_KEY);
      sessionStorage.removeItem(SNAPSHOT_BEFORE_KEY);
    } catch (_) {}
    this.state.vizTimelineIndex = null;
    this.state.vizCompareMode = false;
    // class filter リセットは caller (pill click handler) で実施済み。ここでは触らない。
    // UI 側も即時反映（loadSheetData 完了を待たず空状態を見せる）
    const sliderEl = document.getElementById('vizTimelineSlider');
    if (sliderEl) {
      sliderEl.value = '0';
      sliderEl.max = '0';
      sliderEl.disabled = true;
      sliderEl.style.opacity = '0.4';
    }
    const labelEl = document.getElementById('vizTimelineLabel');
    if (labelEl) labelEl.textContent = '読み込み中…';
    const compareBtnEl = document.getElementById('vizCompareToggleBtn');
    if (compareBtnEl) compareBtnEl.classList.remove('active');
    const beforeBtnEl = document.getElementById('vizCaptureBeforeBtn');
    if (beforeBtnEl) beforeBtnEl.classList.remove('has-before', 'saved');

    // UI: 切替中表示
    const select = document.getElementById('vizProfileSelect');
    if (select) select.disabled = true;

    google.script.run
      .withSuccessHandler((res) => {
        if (select) select.disabled = false;
        if (res && res.success) {
          // ロード成功 → データ & form ボタン を両方再読み込み。
          // Why (form ボタン重複呼出): loadSheetData の formMeta 経由でも更新される
          // はずだが、ある種のキャッシュ経路で取りこぼすケースがある（user 報告）。
          // getActiveFormInfo を明示的に呼ぶことで confidence を持って同期する。
          if (typeof this.loadSheetData === 'function') {
            this.loadSheetData({ bypassCache: true, isInitialLoad: false });
          } else {
            window.location.reload();
          }
          if (typeof window.loadFormLink === 'function') {
            window.loadFormLink();
          }
        } else {
          console.error('Profile load failed:', res && res.message);
          alert('プロファイルの読み込みに失敗しました: ' + (res && res.message || '不明なエラー'));
        }
      })
      .withFailureHandler((err) => {
        if (select) select.disabled = false;
        console.error('Profile load network error:', err);
        alert('プロファイルの切替に失敗しました');
      })
      // targetUserId を渡すことで、admin が他人ボードを操作するケースや、URL の userId と
      //   現在の Session email が一致しないケース（複数 Google アカウント切替）でも、対象ボードを
      //   一意に特定できる。サーバ側は targetUserId 経由で owner/admin の認可チェックを行う。
      .loadProfileForView(name, this.state.userId);
  };

  StudyQuestApp.prototype.__vizInjectProfileSelector = function () { injectProfileSelector(this); };

  /**
   * Option B: 過去フェーズを read-only で閲覧する。
   *
   * Why: 生徒が「導入」「振り返り」など過去のフェーズで自分が書いた回答 / 全体の傾向を
   *   後から確認できるようにする道徳ゴール（多面的思考・自己内省）の実装。
   *   config を書き換えず、サーバの getPublishedSheetDataForProfile に snapshot を要求する。
   *
   *   read-only enforcement:
   *     - state.viewingPastProfile に profile 名を立てる
   *     - その間、reaction / highlight / submit は client 側で block + トースト表示
   *     - polling は active profile の変化検知のみ継続（data 更新は新着検知の対象外）
   *
   * @param {string} name - history に含まれる profile 名
   */
  /**
   * profile を切替える前に class filter を 'すべて' にリセットする共通処理。
   *
   * Why (シンプル化): profile ごとに class カラムの値が違う ("1組" vs "6年1組") 現場ケースで、
   *   前 profile の filter を引きずると新 profile の dropdown に当該クラスが無く dropdown
   *   が silent に 'すべて' に降格、しかし API は古い filter で空結果 → UX 不整合。
   *   切替時に明示的に 'すべて' へ戻すことで「新 profile の全データから始める」状態を保証する。
   */
  function resetClassFilterToAll(app) {
    if (app.elements && app.elements.classFilter) {
      app.elements.classFilter.value = 'すべて';
    }
    if (typeof app.persistClassFilter === 'function') {
      app.persistClassFilter('すべて');
    }
  }

  StudyQuestApp.prototype.__vizLoadPastProfile = function (name) {
    if (!name) return;
    if (typeof google === 'undefined' || !google.script || !google.script.run) return;
    if (this.state.viewingPastProfile === name) return;  // no-op

    // 切替時は viz session-scoped state を reset（current → past で snapshot 連続性が破綻するため）
    try {
      sessionStorage.removeItem(SNAPSHOT_KEY);
      sessionStorage.removeItem(SNAPSHOT_BEFORE_KEY);
    } catch (_) {}
    this.state.vizTimelineIndex = null;
    this.state.vizCompareMode = false;
    // dropdown 現在値をそのまま採用する。pill click 経由なら caller が事前に
    //   resetClassFilterToAll() で 'すべて' に戻しているし、loadSheetData gate 経由
    //   (同 profile 内 filter 変更) なら新しい dropdown 値で fetch する。
    const filter = this.getCurrentFilterState ? this.getCurrentFilterState() : {};
    const classFilter = filter.classFilter || null;
    const sortOrder = filter.sortOrder || 'newest';
    const self = this;

    // UI 即時反映（描画ペインに loading 文字を出す方法は loadSheetData 内）
    self.state.viewingPastProfile = name;
    if (typeof self.__vizInjectProfileSelector === 'function') self.__vizInjectProfileSelector();

    google.script.run
      .withSuccessHandler((res) => {
        if (!res || !res.success) {
          // 失敗時は viewing を解除して toast。
          self.state.viewingPastProfile = null;
          if (typeof self.__vizInjectProfileSelector === 'function') self.__vizInjectProfileSelector();
          const msg = (res && (res.error || res.message)) || 'フェーズ読み込み失敗';
          if (typeof self.showToast === 'function') self.showToast(msg);
          else { try { alert(msg); } catch (_) {} }
          return;
        }
        // 成功: result を loadSheetData が処理するのと同じ形なので state へ反映 + renderBoard。
        //   ただし getPublishedSheetData 経由ではないので、自前で state を更新する。
        try {
          const rows = Array.isArray(res.data) ? res.data : [];
          self.state.currentAnswers = rows;
          self.state.viewingPastProfile = res.viewingPastProfile || name;
          if (res.displaySettings && typeof res.displaySettings.boardMode === 'string') {
            self.state.boardMode = res.displaySettings.boardMode;
            self.state.serverBoardMode = res.displaySettings.boardMode;
          }
          if (res.axisConfig) self.state.axisConfig = res.axisConfig;
          if (res.header && self.elements && self.elements.headingLabel) {
            self.elements.headingLabel.textContent = res.header;
          }
          if (typeof self.populateClassFilter === 'function') {
            self.populateClassFilter(rows);
          }
        } catch (uiError) {
          console.warn('__vizLoadPastProfile: state update failed', uiError);
        }
        if (typeof self.__vizInjectProfileSelector === 'function') self.__vizInjectProfileSelector();
        if (typeof self.renderBoard === 'function') self.renderBoard(false, false, []);
        // トースト「過去のフェーズを表示中（読み取り専用）」
        if (typeof self.showToast === 'function') {
          self.showToast('「' + name + '」を表示中（読み取り専用）');
        }
      })
      .withFailureHandler((err) => {
        self.state.viewingPastProfile = null;
        if (typeof self.__vizInjectProfileSelector === 'function') self.__vizInjectProfileSelector();
        console.error('Past profile load network error:', err);
        const msg = 'フェーズ読み込みに失敗しました';
        if (typeof self.showToast === 'function') self.showToast(msg);
        else { try { alert(msg); } catch (_) {} }
      })
      .getPublishedSheetDataForProfile(this.state.userId, name, classFilter, sortOrder);
  };

  /**
   * Option B: 過去フェーズ閲覧から現在 (active) に戻る。
   */
  StudyQuestApp.prototype.__vizReturnToCurrent = function () {
    if (!this.state.viewingPastProfile) return;
    this.state.viewingPastProfile = null;
    // 過去フェーズで適用していた class filter は active に持ち込まない（同上の理由）。
    resetClassFilterToAll(this);
    if (typeof this.__vizInjectProfileSelector === 'function') this.__vizInjectProfileSelector();
    if (typeof this.loadSheetData === 'function') {
      this.loadSheetData({ bypassCache: true, isInitialLoad: false });
    } else {
      window.location.reload();
    }
  };

  function refreshVizControlsState(app) {
    const slider = document.getElementById('vizTimelineSlider');
    if (!slider) return;
    const snaps = app.vizGetSnapshots();
    const max = snaps.length;
    slider.max = String(max);

    // disabled 条件: snapshot 0 件のときのみ。
    // 比較モード中もスライダーは active のまま（左ペインを動かすため）。
    // v2632 改修: 比較モードでは「左=スライダー位置の snapshot、右=現在」となるため、
    //   スライダーを動かすと左ペインだけが時刻に応じて変化する仕様に変更。
    const isCompare = !!app.state.vizCompareMode;
    const noSnaps = (max === 0);
    slider.disabled = noSnaps;
    slider.style.opacity = noSnaps ? '0.4' : '';
    slider.title = isCompare ? '比較モード中: スライダーで左ペイン（過去）が動く' : '';

    const label = document.getElementById('vizTimelineLabel');
    if (label && app.state.vizTimelineIndex == null) {
      slider.value = String(max);
      // ラベル文言:
      //  - "比較中"     → vizCompareMode、左ペインが議論前 anchor or 最古 snapshot
      //  - "軌跡なし"   → snapshot 0 件 (hydrate 失敗 or rows[].timestamp 解釈不能)
      //  - "現在"      → 通常: スライダー右端 = 現在の分布
      //
      // v2678: 「(Nコマ)」表記は 「コマ」 が直感的でなく cluttered なので削除。
      //   スナップショット数はスライダーの max 属性で内部的に保持されており UI には不要。
      if (isCompare) label.textContent = '比較中（左=過去）';
      else if (noSnaps) label.textContent = '軌跡なし';
      else label.textContent = '現在';
    }

    // 議論前ボタンの状態
    const beforeBtn = document.getElementById('vizCaptureBeforeBtn');
    if (beforeBtn) {
      const has = !!app.vizGetBefore();
      beforeBtn.classList.toggle('has-before', has);
      // 議論前未保存 → compare ボタンに視覚的ヒント (compare-disabled クラスで CSS 制御)
      const compareBtn = document.getElementById('vizCompareToggleBtn');
      if (compareBtn) {
        compareBtn.classList.toggle('compare-disabled', !has && !app.state.vizCompareMode);
        // aria-pressed は state と毎回同期（クリックハンドラだけだと render 経由の変更を反映しそこねる）
        compareBtn.setAttribute('aria-pressed', String(!!app.state.vizCompareMode));
      }
    }
  }

  // expose snapshot helpers for tests
  StudyQuestApp.prototype.__vizSnapshotInternals = {
    buildSnapshot: function (app) { return buildSnapshot(app); },
    buildHistoricalSnapshots: buildHistoricalSnapshots,
    SNAPSHOT_MAX: SNAPSHOT_MAX,
    SNAPSHOT_INTERVAL_MS: SNAPSHOT_INTERVAL_MS
  };

  // Why: タイムラインで過去 snapshot を選んでいるとき、その snapshot を
  //      currentAnswers として swap してから既存 renderer を呼ぶ。
  //      終わったら復元する。これでレンダリングロジックを変更せずタイムラインが効く。
  //
  // CRITICAL async/await: fn() は async (renderMatrix 等) なので Promise を即返す。
  //   旧コードは return fn() のまま finally に抜けたため、Promise 完了前に
  //   currentAnswers が元に戻り、レンダリング時には元の rows を参照する致命的バグ。
  //   await Promise.resolve(...).then(...).finally(...) パターンで Promise の
  //   resolve まで swap を維持する。同期 fn (例: テスト時) も Promise.resolve で
  //   同じパスを通せる。
  function withTimelineSwap(app, fn) {
    const idx = app.state.vizTimelineIndex;
    if (idx == null) return fn();
    const snaps = app.vizGetSnapshots();
    if (idx < 0 || idx >= snaps.length) return fn();
    const original = app.state.currentAnswers;
    const originalAxis = app.state.axisConfig;
    app.state.currentAnswers = snaps[idx].rows;
    app.state.axisConfig = snaps[idx].axisConfig;
    const restore = () => {
      app.state.currentAnswers = original;
      app.state.axisConfig = originalAxis;
    };
    let result;
    try {
      result = fn();
    } catch (syncError) {
      restore();
      throw syncError;
    }
    // Promise なら resolve / reject を待ってから restore。同期戻り値ならそのまま restore。
    if (result && typeof result.then === 'function') {
      return Promise.resolve(result).finally(restore);
    }
    restore();
    return result;
  }

  // __vizInjectControls は __vizInjectModeBar と同じ ensureViewToolbar 呼び出しだったため撤去。
  //   toolbar 注入は __vizInjectModeBar / __vizInjectProfileSelector が冪等に行う。
  StudyQuestApp.prototype.__vizRefreshControls = function () { refreshVizControlsState(this); };
  StudyQuestApp.prototype.__vizWithTimelineSwap = function (fn) { return withTimelineSwap(this, fn); };
  StudyQuestApp.prototype.__vizGetBeforeSnapshot = function () { return loadBeforeSnapshot(); };

  /**
   * ビフォー・アフター 2 ペイン描画。
   *
   * 設計（v2632 改修）:
   *   - 右ペイン = 常に「現在」（最新 currentAnswers）
   *   - 左ペイン = タイムラインスライダーが指す snapshot:
   *      1. vizTimelineIndex がセットされている → snapshots[idx] を使う
   *      2. 未セット かつ 議論前 anchor (loadBeforeSnapshot) があれば → そちらを使う
   *      3. どちらもなければ → 最古の snapshot
   *      4. snapshot が 0 件なら → 普通の描画にフォールバック (compare 不可)
   *
   *   ユーザー期待「右=現在、バーで左がタイムラインに沿って変化」を直接実装。
   *   PDF p.5「シークバーを動かして、自分のマーカー位置とコメントの変化を振り返る」
   *   と完全整合。「議論前」ボタンは依然有効で、押せば左ペインがその時刻にジャンプする
   *   anchor として機能する。
   */
  StudyQuestApp.prototype.__vizRenderCompare = async function (renderOne, mode) {
    const answers = this.elements.answersContainer;
    if (!answers) return;

    // 左ペインに表示する snapshot を決定。
    const before = loadBeforeSnapshot();
    const snaps = loadSnapshots();
    let leftSource = null;
    let leftLabel = '';
    const idx = this.state.vizTimelineIndex;
    if (typeof idx === 'number' && idx >= 0 && idx < snaps.length) {
      leftSource = snaps[idx];
      const d = new Date(leftSource.capturedAt);
      leftLabel = '⏱ ' + d.getHours().toString().padStart(2, '0') + ':' +
                  d.getMinutes().toString().padStart(2, '0');
    } else if (before) {
      leftSource = before;
      const d = new Date(before.capturedAt);
      leftLabel = '📌 議論前 (' + d.getHours().toString().padStart(2, '0') + ':' +
                  d.getMinutes().toString().padStart(2, '0') + ')';
    } else if (snaps.length > 0) {
      leftSource = snaps[0];
      const d = new Date(leftSource.capturedAt);
      leftLabel = '📍 開始時 (' + d.getHours().toString().padStart(2, '0') + ':' +
                  d.getMinutes().toString().padStart(2, '0') + ')';
    } else {
      // snapshot 0 件 + 議論前未保存 → 比較不能。compareMode を OFF にして通常描画。
      this.state.vizCompareMode = false;
      return await renderOne();
    }

    // 既存内容を一旦クリア、2 ペインのラッパを構築
    answers.className = 'viz-container';
    answers.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'viz-compare-wrap';
    const rightLabel = '📊 現在';
    const beforePane = document.createElement('div');
    beforePane.className = 'viz-compare-pane';
    beforePane.innerHTML = `<h4>${leftLabel}</h4>`;
    const beforeSvgHost = document.createElement('div');
    beforeSvgHost.id = 'vizCompareLeftHost';
    beforePane.appendChild(beforeSvgHost);

    const afterPane = document.createElement('div');
    afterPane.className = 'viz-compare-pane';
    afterPane.innerHTML = `<h4>${rightLabel}</h4>`;
    const afterSvgHost = document.createElement('div');
    afterSvgHost.id = 'vizCompareRightHost';
    afterPane.appendChild(afterSvgHost);

    // v2688: 個別意見ペア比較機能は廃止。比較モードでは「分布の左右並列表示」のみ提供。
    //   ドットクリックは単一モーダル経由で「順次に1つずつ意見を読む」のみ。
    //   左側ドットクリックで snapshot 内データを表示する用途は無くなったので、
    //   data-viz-side マーカーや vizCompareLeftSource state も不要に。

    wrap.appendChild(beforePane);
    wrap.appendChild(afterPane);
    answers.appendChild(wrap);

    // Why view-swap: renderer は #vizSvg を作って書き込む実装。各ペインで
    //   currentAnswers と answersContainer を一時 swap して renderOne を 2 回呼ぶ。
    const originalAnswers = this.elements.answersContainer;
    const savedRows = this.state.currentAnswers;
    const savedAxis = this.state.axisConfig;

    // 左ペイン: leftSource の rows で描画
    this.state.currentAnswers = leftSource.rows;
    this.state.axisConfig = leftSource.axisConfig;
    this.elements.answersContainer = beforeSvgHost;
    try { await renderOne(); } catch (_) { /* keep going */ }

    // 右ペイン: 現在 rows で描画
    this.state.currentAnswers = savedRows;
    this.state.axisConfig = savedAxis;
    this.elements.answersContainer = afterSvgHost;
    try { await renderOne(); } catch (_) { /* keep going */ }

    // 復元 + controls 再構築
    this.elements.answersContainer = originalAnswers;
    ensureViewToolbar(this);
    refreshVizControlsState(this);
  };

  // v2688: __showPaneCard 廃止。比較モードでも単一モーダルで順次に意見を読む。
  //   旧 dual modal / pane card / drawer は道徳教育の自然な議論フローに合わなかった
  //   (「2 人の意見を並べて読み比べる」は授業で行われない操作)。
  //   ドットクリック → showAnswerModal で十分。

  // ---------------------------------------------------------------------
  // Projector モード ?display=projector
  // Why: 電子黒板向け大画面表示。教師端末は通常 view URL、プロジェクタは
  //      ?display=projector で別タブで開く想定。両者は同じ Forms に向かう。
  // ---------------------------------------------------------------------

  StudyQuestApp.prototype.vizApplyProjectorMode = function () {
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.get('display') === 'projector') {
        document.body.classList.add('projector-mode');
      }
    } catch (e) {
      // URL parse 失敗は無視
    }
  };

  // 既存の init 完了タイミングで一度だけ適用（DOMContentLoaded 後の動作を想定）
  // page.js の init が console-safe であることを前提に、CLAUDE.md の
  // 「top-level side effects forbidden」原則に従い、即座に処理せず
  // DOMContentLoaded で 1 回だけフラグ付与する。
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get('display') === 'projector') {
          document.body.classList.add('projector-mode');
        }
      } catch (e) {}
    });
  } else {
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.get('display') === 'projector') {
        document.body.classList.add('projector-mode');
      }
    } catch (e) {}
  }
})();
</script>
