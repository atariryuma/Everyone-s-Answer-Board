<!-- Shared TailwindCSS CDN Configuration -->
<!-- 手軽さ重視のCDN読み込み方式 - シンプル統一設定 -->
<script>
  (function () {
    const isProduction =
      window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';

    window.tailwind = {
      config: {
        mode: 'jit',
        corePlugins: { preflight: false },
        devtools: !isProduction,
        // v2800+ ライトモード移行準備:
        //   darkMode: 'class' で body の .theme-dark / .theme-light クラスに応答。
        //   既存コードは body.theme-light が存在しないので dark-class 想定の dark:bg-* 等は無効。
        //   light モード本格実装時に body class を切替えて適用していく。
        darkMode: 'class',
        theme: {
          extend: {
            // CSS 変数経由のテーマ色を Tailwind utility class として公開。
            // 使い方: `class="bg-theme-base text-theme-primary border-theme-subtle"` 等。
            //   `:root` の `--theme-*` を書き換えれば全 utility が追従する。
            colors: {
              // shadcn 風 nested theme palette — Tailwind 公式パターン
              //   `text-theme`            → theme.DEFAULT (= --theme-text-primary)
              //   `text-theme-muted`      → theme.muted (= --theme-text-muted)
              //   `bg-theme-surface`      → theme.surface (= --theme-bg-surface)
              //   `border-theme-normal`   → theme.normal (= --theme-border-normal)
              //   `text-theme-status-error` → theme.status-error
              //   1 トークン変えれば 全 utility class が追従。
              theme: {
                DEFAULT: 'var(--theme-text-primary)',
                primary: 'var(--theme-text-primary)',
                secondary: 'var(--theme-text-secondary)',
                muted: 'var(--theme-text-muted)',
                inverse: 'var(--theme-text-inverse)',
                base: 'var(--theme-bg-base)',
                surface: 'var(--theme-bg-surface)',
                elevated: 'var(--theme-bg-elevated)',
                'elevated-hover': 'var(--theme-bg-elevated-hover)',
                overlay: 'var(--theme-bg-overlay)',
                subtle: 'var(--theme-border-subtle)',
                normal: 'var(--theme-border-normal)',
                strong: 'var(--theme-border-strong)',
                spinner: 'var(--theme-spinner)',
                'accent-cyan': 'var(--theme-accent-cyan)',
                'card-1': 'var(--theme-card-1)',
                'card-2': 'var(--theme-card-2)',
                'card-3': 'var(--theme-card-3)',
                'status-error': 'var(--theme-status-error-text)',
                'status-success': 'var(--theme-status-success-text)',
                'status-warning': 'var(--theme-status-warning-text)',
                'status-info': 'var(--theme-status-info-text)',
              },
              // brand identity (theme 不変)
              brand: {
                primary: 'var(--brand-primary)',
                accent: 'var(--brand-accent)',
                like: 'var(--brand-like)',
                understand: 'var(--brand-understand)',
                curious: 'var(--brand-curious)',
                highlight: 'var(--brand-highlight)',
              },
              status: {
                success: 'var(--status-success)',
                error: 'var(--status-error)',
                warning: 'var(--status-warning)',
                info: 'var(--status-info)',
              },
            },
            // Tailwind default の font-sans は `ui-sans-serif, system-ui, sans-serif, ...`
            // で始まる。 production の `important: true` と組み合わせて body の
            // font-family CSS を上書きするため、 `system-ui` がブラウザの
            // フォント設定 (chrome://settings/fonts 等) をそのまま反映してしまい、
            // 「ボタン以外の text も browser font に化ける」 現象が発生していた (v2842 user 報告)。
            // 解決: explicit な -apple-system / Segoe UI / Roboto stack に override する。
            // これで body.font-sans が browser-font に左右されなくなる。
            fontFamily: {
              sans: [
                '-apple-system', 'BlinkMacSystemFont',
                "'Segoe UI'", 'Roboto', "'Google Sans'", "'Inter'",
                'sans-serif',
              ],
            },
          }
        },
        ...(isProduction && {
          important: true,
          purge: { enabled: true },
          experimental: { optimizeUniversalDefaults: true },
        }),
      },
    };

    // 本番: console.warnとconsole.logを抑制（errorのみ残す）
    // 開発: Tailwind CDN警告のみ抑制
    const originalWarn = console.warn;
    const originalLog = console.log;
    const tailwindPatterns = ['tailwind', 'TailwindCSS', 'cdn.tailwindcss.com', 'should not be used in production'];

    if (isProduction) {
      console.warn = function () {};
      console.log = function () {};
    } else {
      console.warn = function (...args) {
        const msg = args.join(' ');
        if (tailwindPatterns.some(p => msg.includes(p))) return;
        originalWarn.apply(console, args);
      };
      console.log = function (...args) {
        const msg = args.join(' ');
        if (tailwindPatterns.some(p => msg.includes(p))) return;
        originalLog.apply(console, args);
      };
    }
  })();
</script>
<script
  src="https://cdn.tailwindcss.com"
  onerror="console.warn('TailwindCSS failed to load from cdn.tailwindcss.com')"
></script>
