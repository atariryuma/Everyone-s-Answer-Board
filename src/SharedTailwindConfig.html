<!-- Shared TailwindCSS CDN Configuration -->
<!-- 手軽さ重視のCDN読み込み方式 - シンプル統一設定 -->
<script>
  (function () {
    const isProduction =
      window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';

    window.tailwind = {
      config: {
        mode: 'jit',
        corePlugins: { preflight: false },
        devtools: !isProduction,
        ...(isProduction && {
          important: true,
          purge: { enabled: true },
          experimental: { optimizeUniversalDefaults: true },
        }),
      },
    };

    // 本番: console.warnとconsole.logを抑制（errorのみ残す）
    // 開発: Tailwind CDN警告のみ抑制
    const originalWarn = console.warn;
    const originalLog = console.log;
    const tailwindPatterns = ['tailwind', 'TailwindCSS', 'cdn.tailwindcss.com', 'should not be used in production'];

    if (isProduction) {
      console.warn = function () {};
      console.log = function () {};
    } else {
      console.warn = function (...args) {
        const msg = args.join(' ');
        if (tailwindPatterns.some(p => msg.includes(p))) return;
        originalWarn.apply(console, args);
      };
      console.log = function (...args) {
        const msg = args.join(' ');
        if (tailwindPatterns.some(p => msg.includes(p))) return;
        originalLog.apply(console, args);
      };
    }
  })();
</script>
<script
  src="https://cdn.tailwindcss.com"
  onerror="console.warn('TailwindCSS failed to load from cdn.tailwindcss.com')"
></script>
