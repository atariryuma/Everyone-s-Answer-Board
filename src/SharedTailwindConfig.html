<!-- Shared TailwindCSS CDN Configuration -->
<!-- 手軽さ重視のCDN読み込み方式 - シンプル統一設定 -->
<script>
  (function () {
    const isProduction =
      window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';

    window.tailwind = {
      config: {
        mode: 'jit',
        corePlugins: { preflight: false },
        devtools: !isProduction,
        // v2800+ ライトモード移行準備:
        //   darkMode: 'class' で body の .theme-dark / .theme-light クラスに応答。
        //   既存コードは body.theme-light が存在しないので dark-class 想定の dark:bg-* 等は無効。
        //   light モード本格実装時に body class を切替えて適用していく。
        darkMode: 'class',
        theme: {
          extend: {
            // CSS 変数経由のテーマ色を Tailwind utility class として公開。
            // 使い方: `class="bg-theme-base text-theme-primary border-theme-subtle"` 等。
            //   `:root` の `--theme-*` を書き換えれば全 utility が追従する。
            colors: {
              // shadcn 風 nested theme palette — Tailwind 公式パターン
              //   `text-theme`            → theme.DEFAULT (= --theme-text-primary)
              //   `text-theme-muted`      → theme.muted (= --theme-text-muted)
              //   `bg-theme-surface`      → theme.surface (= --theme-bg-surface)
              //   `border-theme-normal`   → theme.normal (= --theme-border-normal)
              //   `text-theme-status-error` → theme.status-error
              //   1 トークン変えれば 全 utility class が追従。
              theme: {
                DEFAULT: 'var(--theme-text-primary)',
                primary: 'var(--theme-text-primary)',
                secondary: 'var(--theme-text-secondary)',
                muted: 'var(--theme-text-muted)',
                inverse: 'var(--theme-text-inverse)',
                base: 'var(--theme-bg-base)',
                surface: 'var(--theme-bg-surface)',
                elevated: 'var(--theme-bg-elevated)',
                'elevated-hover': 'var(--theme-bg-elevated-hover)',
                overlay: 'var(--theme-bg-overlay)',
                subtle: 'var(--theme-border-subtle)',
                normal: 'var(--theme-border-normal)',
                strong: 'var(--theme-border-strong)',
                spinner: 'var(--theme-spinner)',
                'accent-cyan': 'var(--theme-accent-cyan)',
                'accent-cyan-soft': 'var(--theme-accent-cyan-soft)',
                'accent-cyan-hover': 'var(--theme-accent-cyan-hover)',
                'accent-cyan-strong': 'var(--theme-accent-cyan-strong)',
                'accent-cyan-deep': 'var(--theme-accent-cyan-deep)',
                'accent-destructive': 'var(--theme-accent-destructive)',
                'accent-indigo': 'var(--theme-accent-indigo)',
                'card-1': 'var(--theme-card-1)',
                'card-2': 'var(--theme-card-2)',
                'card-3': 'var(--theme-card-3)',
                'status-error': 'var(--theme-status-error-text)',
                'status-success': 'var(--theme-status-success-text)',
                'status-warning': 'var(--theme-status-warning-text)',
                'status-info': 'var(--theme-status-info-text)',
                'status-detection': 'var(--theme-status-detection-text)',
                'status-highlight': 'var(--theme-status-highlight-text)',
                /* status feedback box (bg / border) — v2847+ */
                'status-success-soft': 'var(--theme-status-success-soft)',
                'status-success-strong': 'var(--theme-status-success-strong)',
                'status-error-soft': 'var(--theme-status-error-soft)',
                'status-error-strong': 'var(--theme-status-error-strong)',
                'status-warning-soft': 'var(--theme-status-warning-soft)',
                'status-warning-strong': 'var(--theme-status-warning-strong)',
                'status-info-soft': 'var(--theme-status-info-soft)',
                'status-info-strong': 'var(--theme-status-info-strong)',
                'status-accent-soft': 'var(--theme-status-accent-soft)',
                'status-accent-strong': 'var(--theme-status-accent-strong)',
                'status-detection-soft': 'var(--theme-status-detection-soft)',
                'status-detection-strong': 'var(--theme-status-detection-strong)',
                'status-highlight-soft': 'var(--theme-status-highlight-soft)',
                'status-highlight-strong': 'var(--theme-status-highlight-strong)',
                /* dark text on vibrant -soft bg (v2848 vibrant restoration) */
                'status-success-text-on-soft': 'var(--theme-status-success-text-on-soft)',
                'status-error-text-on-soft': 'var(--theme-status-error-text-on-soft)',
                'status-warning-text-on-soft': 'var(--theme-status-warning-text-on-soft)',
                'status-info-text-on-soft': 'var(--theme-status-info-text-on-soft)',
                'status-accent-text-on-soft': 'var(--theme-status-accent-text-on-soft)',
                /* pink accent (お題見出し) */
                'accent-pink': 'var(--theme-accent-pink)',
                /* scrollbar */
                'scrollbar-thumb': 'var(--theme-scrollbar-thumb)',
                'scrollbar-track': 'var(--theme-scrollbar-track)',
              },
              // brand identity (theme 不変)
              brand: {
                primary: 'var(--brand-primary)',
                'primary-light': 'var(--brand-primary-light)',
                accent: 'var(--brand-accent)',
                like: 'var(--brand-like)',
                understand: 'var(--brand-understand)',
                curious: 'var(--brand-curious)',
                highlight: 'var(--brand-highlight)',
              },
              status: {
                success: 'var(--status-success)',
                error: 'var(--status-error)',
                warning: 'var(--status-warning)',
                info: 'var(--status-info)',
              },
            }
          }
        },
        ...(isProduction && {
          important: true,
          purge: { enabled: true },
          experimental: { optimizeUniversalDefaults: true },
        }),
      },
    };

    // 本番: console.warnとconsole.logを抑制（errorのみ残す）
    // 開発: Tailwind CDN警告のみ抑制
    const originalWarn = console.warn;
    const originalLog = console.log;
    const tailwindPatterns = ['tailwind', 'TailwindCSS', 'cdn.tailwindcss.com', 'should not be used in production'];

    if (isProduction) {
      console.warn = function () {};
      console.log = function () {};
    } else {
      console.warn = function (...args) {
        const msg = args.join(' ');
        if (tailwindPatterns.some(p => msg.includes(p))) return;
        originalWarn.apply(console, args);
      };
      console.log = function (...args) {
        const msg = args.join(' ');
        if (tailwindPatterns.some(p => msg.includes(p))) return;
        originalLog.apply(console, args);
      };
    }
  })();
</script>
<script
  src="https://cdn.tailwindcss.com"
  onerror="console.warn('TailwindCSS failed to load from cdn.tailwindcss.com')"
></script>
