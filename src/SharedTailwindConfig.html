<!-- Shared TailwindCSS CDN Configuration -->
<!-- 手軽さ重視のCDN読み込み方式 - シンプル統一設定 -->
<script>
  (function () {
    const isProduction =
      window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';

    window.tailwind = {
      config: {
        mode: 'jit',
        corePlugins: { preflight: false },
        devtools: !isProduction,
        // v2800+ ライトモード移行準備:
        //   darkMode: 'class' で body の .theme-dark / .theme-light クラスに応答。
        //   既存コードは body.theme-light が存在しないので dark-class 想定の dark:bg-* 等は無効。
        //   light モード本格実装時に body class を切替えて適用していく。
        darkMode: 'class',
        theme: {
          extend: {
            // CSS 変数経由のテーマ色を Tailwind utility class として公開。
            // 使い方: `class="bg-theme-base text-theme-primary border-theme-subtle"` 等。
            //   `:root` の `--theme-*` を書き換えれば全 utility が追従する。
            colors: {
              'theme-base': 'var(--theme-bg-base)',
              'theme-surface': 'var(--theme-bg-surface)',
              'theme-elevated': 'var(--theme-bg-elevated)',
              'theme-overlay': 'var(--theme-bg-overlay)',
              'theme-text': 'var(--theme-text-primary)',
              'theme-text-secondary': 'var(--theme-text-secondary)',
              'theme-text-muted': 'var(--theme-text-muted)',
              'theme-text-inverse': 'var(--theme-text-inverse)',
              'theme-border': 'var(--theme-border-subtle)',
              'theme-border-normal': 'var(--theme-border-normal)',
              'theme-border-strong': 'var(--theme-border-strong)',
              'theme-spinner': 'var(--theme-spinner)',
              'theme-accent-cyan': 'var(--theme-accent-cyan)',
              // status text (両モード対応 — text-X-700 dark:text-X-400 pair の統一先)
              'theme-status-error': 'var(--theme-status-error-text)',
              'theme-status-success': 'var(--theme-status-success-text)',
              'theme-status-warning': 'var(--theme-status-warning-text)',
              'theme-status-info': 'var(--theme-status-info-text)',
              // brand identity (theme 不変)
              'brand-primary': 'var(--brand-primary)',
              'brand-accent': 'var(--brand-accent)',
              'brand-like': 'var(--brand-like)',
              'brand-understand': 'var(--brand-understand)',
              'brand-curious': 'var(--brand-curious)',
              'brand-highlight': 'var(--brand-highlight)',
              'status-success': 'var(--status-success)',
              'status-error': 'var(--status-error)',
              'status-warning': 'var(--status-warning)',
              'status-info': 'var(--status-info)',
            }
          }
        },
        ...(isProduction && {
          important: true,
          purge: { enabled: true },
          experimental: { optimizeUniversalDefaults: true },
        }),
      },
    };

    // 本番: console.warnとconsole.logを抑制（errorのみ残す）
    // 開発: Tailwind CDN警告のみ抑制
    const originalWarn = console.warn;
    const originalLog = console.log;
    const tailwindPatterns = ['tailwind', 'TailwindCSS', 'cdn.tailwindcss.com', 'should not be used in production'];

    if (isProduction) {
      console.warn = function () {};
      console.log = function () {};
    } else {
      console.warn = function (...args) {
        const msg = args.join(' ');
        if (tailwindPatterns.some(p => msg.includes(p))) return;
        originalWarn.apply(console, args);
      };
      console.log = function (...args) {
        const msg = args.join(' ');
        if (tailwindPatterns.some(p => msg.includes(p))) return;
        originalLog.apply(console, args);
      };
    }
  })();
</script>
<script
  src="https://cdn.tailwindcss.com"
  onerror="console.warn('TailwindCSS failed to load from cdn.tailwindcss.com')"
></script>
