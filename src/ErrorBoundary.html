<? if (typeof title !== 'undefined' && title) { ?>
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base target="_top" />
    <title><?= title || 'エラー' ?> - みんなの回答ボード</title>
    <?!= include('SharedTailwindConfig'); ?>
    <?!= include('UnifiedStyles.css'); ?>
    <script>
      var WEB_APP_URL = '<?= typeof webAppUrl !== "undefined" ? webAppUrl : "" ?>';

      function safeReload() {
        if (WEB_APP_URL) {
          window.open(WEB_APP_URL, '_top');
        } else {
          window.top.location.reload();
        }
      }

      function redirectToLogin() {
        if (WEB_APP_URL) {
          window.open(WEB_APP_URL + '?mode=login', '_top');
        } else {
          window.top.location.href = '?mode=login';
        }
      }
    </script>
  </head>
  <body style="background: var(--brand-background); color: var(--brand-text);" class="font-sans min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full text-center space-y-6">
      <div class="text-5xl" role="img" aria-label="警告">&#x26A0;&#xFE0F;</div>
      <h1 class="text-2xl font-bold text-gray-100"><?= title || 'エラーが発生しました' ?></h1>
      <p class="text-gray-300 leading-relaxed">
        <?= message || 'システムエラーが発生しました。管理者にお問い合わせください。' ?>
      </p>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-3 pt-4">
        <button type="button" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors" onclick="safeReload()">
          再読み込み
        </button>
        <? if (!hideLoginButton) { ?>
        <button type="button" class="px-5 py-2.5 bg-gray-700 hover:bg-gray-600 text-gray-200 rounded-lg font-medium transition-colors" onclick="redirectToLogin()">
          ログイン画面に戻る
        </button>
        <? } ?>
      </div>

      <p class="text-xs text-gray-500 pt-4"><?= new Date().toLocaleString('ja-JP') ?></p>
    </div>
  </body>
</html>
<? } ?>
