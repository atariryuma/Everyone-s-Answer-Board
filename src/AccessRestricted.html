<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <base target="_top" />
    <title>みんなの回答ボード</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('SharedSecurityHeaders'); ?>
    <?!= include('SharedTailwindConfig'); ?>
  <!-- FOUC 防止: paint 前に <html> へ theme class + color-scheme を設定 -->
  <?!= include('SharedThemeBoot'); ?>
    <?!= include('UnifiedStyles.css'); ?>
    <style>
      .fade-in { animation: fadeIn 0.6s ease-out; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body style="background: var(--theme-bg-base); color: var(--theme-text-primary);" class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full fade-in">
      <div class="glass-panel rounded-2xl p-8 shadow-2xl text-center">

        <!-- タイトル -->
        <h1 class="text-3xl font-bold text-theme-accent-cyan mb-2">みんなの回答ボード</h1>

        <? if (typeof userEmail !== 'undefined' && userEmail) { ?>
        <p class="text-sm text-theme-muted mb-6">
          <span class="text-theme-accent-cyan"><?= userEmail ?></span> でアクセス中
        </p>
        <? } ?>

        <? if (typeof isAppDisabled !== 'undefined' && isAppDisabled) { ?>
        <!-- ========== アプリ無効化中 ========== -->
        <div class="bg-yellow-500/10 border border-yellow-400/30 rounded-lg p-4 mb-6">
          <p class="text-theme-status-warning font-semibold mb-1">現在メンテナンス中です</p>
          <p class="text-theme-muted text-sm">管理者がシステムの設定を行っています。しばらくお待ちください。</p>
        </div>

        <? } else if (typeof message !== 'undefined' && message) { ?>
        <!-- ========== ドメイン不一致等のメッセージ ========== -->
        <div class="bg-red-500/10 border border-red-400/30 rounded-lg p-4 mb-6">
          <p class="text-theme-status-error text-sm"><?= message ?></p>
        </div>

        <? } else { ?>
        <!-- ========== 通常のアクセス制限（トップページ直アクセス等） ========== -->
        <div class="bg-theme-card-1 rounded-lg p-4 mb-6">
          <p class="text-theme-secondary text-sm">このページは管理者・登録ユーザー向けです。</p>
          <p class="text-theme-muted text-xs mt-2">回答ボードの閲覧は、先生から共有されたURLからアクセスしてください。</p>
        </div>
        <? } ?>

        <!-- ========== アクション ========== -->

        <? if (typeof isAdministrator !== 'undefined' && isAdministrator) { ?>
        <!-- 管理者 -->
        <div class="space-y-3">
          <a id="admin-login-link" target="_top"
            class="block w-full px-6 py-3 bg-theme-card-3 text-theme-muted font-semibold rounded-xl text-center pointer-events-none">
            読み込み中...
          </a>
          <a id="app-setup-link" target="_top"
            class="block w-full px-6 py-3 bg-theme-elevated text-theme-muted font-medium rounded-xl text-center pointer-events-none">
            読み込み中...
          </a>
        </div>

        <? } else if (typeof isRegisteredUser !== 'undefined' && isRegisteredUser) { ?>
        <!-- 登録済みユーザー -->
        <a id="editor-login-link" target="_top"
          class="block w-full px-6 py-3 bg-theme-card-3 text-theme-muted font-semibold rounded-xl text-center pointer-events-none">
          読み込み中...
        </a>
        <? } ?>

      </div>

      <!-- フッター -->
      <p class="text-xs text-theme-muted text-center mt-4">
        みんなの回答ボード
      </p>
    </div>

    <?!= include('SharedUtilities'); ?>
    <?!= include('SharedErrorHandling'); ?>

    <script>
      function enableLink(el, href, text) {
        if (!el) return;
        el.href = href;
        el.textContent = text;
        el.classList.remove('pointer-events-none', 'bg-theme-card-3', 'text-theme-muted');
        el.classList.add('bg-gradient-to-r', 'from-cyan-600', 'to-blue-600', 'hover:from-cyan-700', 'hover:to-blue-700', 'text-slate-900', 'dark:text-white', 'shadow-lg');
      }

      document.addEventListener('DOMContentLoaded', async function() {
        let webAppUrl;
        try {
          webAppUrl = await runServer('getWebAppUrl');
        } catch (_) {
          // URL取得失敗時はボタンをエラー表示のまま
          return;
        }
        enableLink(document.getElementById('admin-login-link'), webAppUrl + '?mode=login', 'ログイン');
        enableLink(document.getElementById('editor-login-link'), webAppUrl + '?mode=login', 'ログインしてはじめる');

        const appSetupLink = document.getElementById('app-setup-link');
        if (!appSetupLink) return;
        try {
          const userInfo = await runServer('getUser', 'full');
          const userId = (userInfo && userInfo.userId) ? userInfo.userId : '';
          enableLink(appSetupLink, webAppUrl + '?mode=appSetup' + (userId ? '&userId=' + userId : ''), 'アプリ設定');
        } catch (_) {
          enableLink(appSetupLink, webAppUrl + '?mode=appSetup', 'アプリ設定');
        }
      });
    </script>
  </body>
</html>
