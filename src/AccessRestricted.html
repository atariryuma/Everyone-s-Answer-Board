<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <base target="_top" />
    <title>みんなの回答ボード</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('SharedSecurityHeaders'); ?>
    <?!= include('SharedTailwindConfig'); ?>
    <?!= include('UnifiedStyles.css'); ?>
    <style>
      .fade-in { animation: fadeIn 0.6s ease-out; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body style="background: var(--brand-background); color: var(--brand-text);" class="font-sans min-h-screen flex items-center justify-center p-4">
    <div id="notification-container" class="fixed top-4 right-4 z-[10000] space-y-2"></div>

    <div class="max-w-lg w-full fade-in">
      <div class="glass-panel rounded-2xl p-8 shadow-2xl text-center">

        <!-- タイトル -->
        <h1 class="text-3xl font-bold text-cyan-400 mb-2">みんなの回答ボード</h1>

        <? if (typeof userEmail !== 'undefined' && userEmail) { ?>
        <p class="text-sm text-gray-400 mb-6">
          <span class="text-cyan-300"><?= userEmail ?></span> でアクセス中
        </p>
        <? } ?>

        <? if (typeof isAppDisabled !== 'undefined' && isAppDisabled) { ?>
        <!-- ========== アプリ無効化中 ========== -->
        <div class="bg-yellow-500/10 border border-yellow-400/30 rounded-lg p-4 mb-6">
          <p class="text-yellow-300 font-semibold mb-1">現在メンテナンス中です</p>
          <p class="text-gray-400 text-sm">管理者がシステムの設定を行っています。しばらくお待ちください。</p>
        </div>

        <? } else if (typeof message !== 'undefined' && message) { ?>
        <!-- ========== ドメイン不一致等のメッセージ ========== -->
        <div class="bg-red-500/10 border border-red-400/30 rounded-lg p-4 mb-6">
          <p class="text-red-300 text-sm"><?= message ?></p>
        </div>

        <? } else { ?>
        <!-- ========== 通常のアクセス制限（トップページ直アクセス等） ========== -->
        <div class="bg-gray-700/30 rounded-lg p-4 mb-6">
          <p class="text-gray-300 text-sm">このページは管理者・登録ユーザー向けです。</p>
          <p class="text-gray-400 text-xs mt-2">回答ボードの閲覧は、先生から共有されたURLからアクセスしてください。</p>
        </div>
        <? } ?>

        <!-- ========== アクション ========== -->

        <? if (typeof isAdministrator !== 'undefined' && isAdministrator) { ?>
        <!-- 管理者 -->
        <div class="space-y-3">
          <a id="admin-login-link" target="_top"
            class="block w-full px-6 py-3 bg-gradient-to-r from-gray-600 to-gray-600 text-gray-400 font-semibold rounded-xl text-center pointer-events-none">
            読み込み中...
          </a>
          <a id="app-setup-link" target="_top"
            class="block w-full px-6 py-3 bg-gray-700 text-gray-500 font-medium rounded-xl text-center pointer-events-none">
            読み込み中...
          </a>
        </div>

        <? } else if (typeof isRegisteredUser !== 'undefined' && isRegisteredUser) { ?>
        <!-- 登録済みユーザー -->
        <a id="editor-login-link" target="_top"
          class="block w-full px-6 py-3 bg-gradient-to-r from-gray-600 to-gray-600 text-gray-400 font-semibold rounded-xl text-center pointer-events-none">
          読み込み中...
        </a>
        <? } ?>

      </div>

      <!-- フッター -->
      <p class="text-xs text-gray-600 text-center mt-4">
        みんなの回答ボード
      </p>
    </div>

    <?!= include('SharedUtilities'); ?>
    <?!= include('SharedErrorHandling'); ?>

    <script>
      function enableLink(el, href, text) {
        if (!el) return;
        el.href = href;
        el.textContent = text;
        el.classList.remove('pointer-events-none', 'from-gray-600', 'to-gray-600', 'text-gray-400', 'text-gray-500');
        el.classList.add('from-cyan-600', 'to-blue-600', 'hover:from-cyan-700', 'hover:to-blue-700', 'text-white', 'hover:bg-gray-600', 'shadow-lg');
      }

      document.addEventListener('DOMContentLoaded', function() {
        google.script.run
          .withSuccessHandler(function(webAppUrl) {
            enableLink(document.getElementById('admin-login-link'), webAppUrl + '?mode=login', 'ログイン');
            enableLink(document.getElementById('editor-login-link'), webAppUrl + '?mode=login', 'ログインしてはじめる');

            var appSetupLink = document.getElementById('app-setup-link');
            if (appSetupLink) {
              google.script.run
                .withSuccessHandler(function(userInfo) {
                  var userId = (userInfo && userInfo.userId) ? userInfo.userId : '';
                  enableLink(appSetupLink, webAppUrl + '?mode=appSetup' + (userId ? '&userId=' + userId : ''), 'アプリ設定');
                })
                .withFailureHandler(function() {
                  enableLink(appSetupLink, webAppUrl + '?mode=appSetup', 'アプリ設定');
                })
                .getUser('full');
            }
          })
          .withFailureHandler(function() {
            // URL取得失敗時はボタンをエラー表示のまま
          })
          .getWebAppUrl();
      });
    </script>
  </body>
</html>
