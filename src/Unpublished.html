<body style="background: var(--theme-bg-base); color: var(--theme-text-primary);"

  <div class="w-full max-w-2xl mx-auto px-4 py-8">
    <? if (typeof isEditor !== 'undefined' && isEditor) { ?>
    <!-- 編集者用: 再公開セクション -->
    <div class="glass-panel rounded-xl p-6 md:p-8 shadow-2xl">
      <h1 class="text-2xl md:text-3xl font-bold mb-3 text-theme-status-warning">回答ボード管理</h1>
      <p class="text-theme-muted mb-5">回答ボードは現在非公開状態です</p>

      <? if (typeof editorName !== 'undefined' && editorName) { ?>
      <p class="text-xs text-theme-muted mb-4">管理者:
        <?= editorName ?>
      </p>
      <? } ?>

      <!-- 生徒用URL表示 -->
      <div class="mb-6 p-4 bg-theme-elevated rounded-lg">
        <p class="text-sm text-theme-muted mb-2">生徒用URL:</p>
        <div class="flex gap-2">
          <input type="text" id="board-url" readonly value="<?= typeof boardUrl !== 'undefined' ? boardUrl : '' ?>"
            class="flex-1 p-2 bg-theme-elevated border border-theme-strong rounded text-sm cursor-pointer hover:bg-theme-elevated-hover focus:ring-2 focus:ring-cyan-400/50 focus:outline-none"
            onclick="this.select()" aria-label="生徒用URL" title="クリックしてURLを選択" />
          <button type="button" onclick="copyBoardUrl()"
            class="px-3 py-2 bg-cyan-600 hover:bg-cyan-700 rounded text-sm">
            コピー
          </button>
        </div>
      </div>

      <!-- 再公開ボタン -->
      <button type="button" id="republish-btn" onclick="republishBoard()"
        class="w-full px-6 py-3 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white rounded-lg font-semibold text-base transition-all transform hover:scale-105 shadow-lg focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-offset-2 focus:ring-offset-gray-800">
        <span role="img" aria-label="公開">🌟</span> 回答ボードを再び公開する
      </button>

      <!-- 管理パネル遷移ボタン -->
      <a id="admin-panel-btn" target="_top"
        class="block w-full mt-3 px-6 py-3 bg-theme-elevated text-theme-muted rounded-lg font-medium text-base text-center pointer-events-none">
        読み込み中...
      </a>

    </div>

    <!-- 閲覧者用: 準備中メッセージ -->

      <h1 class="text-4xl font-bold mb-4 text-theme-status-warning">現在は準備中です</h1>
      <p class="text-theme-muted mb-4">先生が回答ボードを設定中です。しばらくお待ちください。</p>

      <? if (typeof editorName !== 'undefined' && editorName) { ?>
      <p class="text-xs text-theme-muted mb-4">管理者:
        <?= editorName ?>
      </p>
      <? } ?>

      <div class="mt-6">
        <a id="refresh-btn" target="_top"
          class="inline-block px-6 py-2 bg-theme-elevated text-theme-muted rounded-lg font-semibold text-center pointer-events-none">

  <!-- GAS推奨: JavaScript読み込みは</body>直前に集約 -->
  <?!= include('SharedUtilities'); ?>
  <?!= include('SharedErrorHandling'); ?>

  <script>
    function copyBoardUrl() {
      const urlInput = document.getElementById('board-url');
      if (urlInput) {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(urlInput.value);
          } else {
            urlInput.select();
            document.execCommand('copy');
          }
          showMessage('URLをコピーしました', 'success');
        } catch (error) {
          showMessage('コピーに失敗しました', 'error');
        }
      }
    }

    function showMessage(message, type = 'info') {
      if (window.notifications) window.notifications.showMessage(message, type);
    }

    async function republishBoard() {
      const button = document.getElementById('republish-btn');
      if (!button) return;

      const originalContent = button.innerHTML;
      button.disabled = true;
      button.innerHTML = '<span role="img" aria-label="読み込み中">⏳</span> 再び公開中...';

      try {
        const result = await runServer('republishMyBoard');
        if (result && result.success) {
          window.showRedirectModal({
            title: '再び公開しました',
            message: '公開ページへ移動します。',
            redirectUrl: result.redirectUrl,
            buttonLabel: '回答ボードを開く',
            variant: 'green'
          });
        } else {
          showMessage((result && result.message) || '再び公開できませんでした', 'error');
          button.disabled = false;
          button.innerHTML = originalContent; // lint-disable-line no-inner-html-assignment-with-variable -- 自身の readback を復元するだけ
        }
      } catch (error) {
        showMessage('再び公開する処理でエラーが発生しました: ' + (error.message || error), 'error');
        button.disabled = false;
        button.innerHTML = originalContent; // lint-disable-line no-inner-html-assignment-with-variable -- 自身の readback を復元するだけ
      }
    }

    /**
     * ページ読み込み時にURLをプリフェッチ（GAS iFrame対応）
     */
    async function prefetchNavigationUrls() {
      const userId = '<?= typeof userId !== "undefined" ? userId : "" ?>';
      const adminBtn = document.getElementById('admin-panel-btn');
      const refreshBtn = document.getElementById('refresh-btn');

      let webAppUrl;
      try {
        webAppUrl = await runServer('getWebAppUrl');
      } catch (error) {
        console.error('URL prefetch failed:', error);
        return;
      }

      // 無効なURLパターンを検証（OAuth初期化中のURL）
      if (!webAppUrl || webAppUrl.includes('userCodeAppPanel') || !webAppUrl.includes('/exec')) {
        console.warn('prefetchNavigationUrls: Invalid URL detected, skipping link setup');
        return;
      }
      if (!userId) return;

      if (adminBtn) {
        adminBtn.href = webAppUrl + '?mode=admin&userId=' + userId;
        adminBtn.textContent = '⚙️ 管理パネルを開く';
        adminBtn.classList.remove('pointer-events-none', 'text-theme-muted');
        adminBtn.classList.add('hover:bg-theme-elevated-hover', 'text-theme');
      }
      if (refreshBtn) {
        refreshBtn.href = webAppUrl + '?mode=view&userId=' + userId;
        refreshBtn.textContent = '更新';
        refreshBtn.classList.remove('pointer-events-none', 'bg-theme-elevated', 'text-theme-muted');
        refreshBtn.classList.add('bg-cyan-600', 'hover:bg-cyan-700', 'text-slate-900', 'dark:text-white');
      }
    }

    // ページ読み込み時にURLをプリフェッチ
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', prefetchNavigationUrls);
    } else {
      prefetchNavigationUrls();
    }
  </script>

</body>

</html>
