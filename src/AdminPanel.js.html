        savePhasesNow();
        return;
      }
      // 2) scalePoints radio (3/5/7 段階切替)
      //   radio の checked 状態はブラウザが自動更新、summary テキストだけ in-place で書き換える。
      //   フル再描画すると base64 imageDataUrl まで再シリアライズするので避ける。
      if (el.dataset.phaseOpt === 'scalePoints' && el.type === 'radio') {
        const idx = Number(el.dataset.phaseIndex);
        if (!currentPhases[idx]) return;
        currentPhases[idx].templateOptions = currentPhases[idx].templateOptions || {};
        currentPhases[idx].templateOptions.scalePoints = Number(el.value);
        const card = document.querySelectorAll('.lesson-phase-card')[idx];
        if (card) {
          card.querySelectorAll('.phase-detail summary').forEach((s) => {
            if (/スケールの段階/.test(s.textContent)) {
              s.textContent = '📏 スケールの段階 (' + el.value + ')';
            }
          });
        }
        savePhasesNow();
      }
    });

    document.addEventListener('click', (e) => {
      const btn = e.target && e.target.closest && e.target.closest('[data-phase-action]');
      if (!btn) return;
      if (!phaseCardsRoot() || !phaseCardsRoot().contains(btn)) return;
      const action = btn.dataset.phaseAction;
      const idx = Number(btn.dataset.phaseIndex);
      if (action === 'add') {
        if (currentPhases.length >= PHASE_MAX) return;
        const tpl = btn.dataset.phaseAddTemplate || 'numberline';
        const defaultName = ({ numberline: '新しい数直線', matrix: '新しいマトリクス', pie: '新しい円グラフ', board: '新しい掲示板' })[tpl] || '新しいフェーズ';
        currentPhases.push({
          name: defaultName, formTemplate: tpl, question: '',
          templateOptions: normalizeTemplateOptions({}, tpl)
        });
        // メニューを閉じてから再描画 (details が再生成されるので open 状態は自然リセット)
        renderPhaseCardsInner();
        savePhasesNow();
      } else if (action === 'delete') {
        if (currentPhases.length <= PHASE_MIN) return;
        currentPhases.splice(idx, 1);
        renderPhaseCardsInner();
        savePhasesNow();
      } else if (action === 'choice-add') {
        const opts = currentPhases[idx].templateOptions = currentPhases[idx].templateOptions || {};
        opts.choices = Array.isArray(opts.choices) ? opts.choices.slice() : [];
        if (opts.choices.length >= 6) return;
        opts.choices.push('選択肢 ' + (opts.choices.length + 1));
        renderPhaseCardsInner();
        savePhasesNow();
      } else if (action === 'choice-delete') {
        const ci = Number(btn.dataset.choiceIndex);
        const opts = currentPhases[idx].templateOptions = currentPhases[idx].templateOptions || {};
        opts.choices = Array.isArray(opts.choices) ? opts.choices.slice() : [];
        if (opts.choices.length <= 2) return;
        opts.choices.splice(ci, 1);
        renderPhaseCardsInner();
        savePhasesNow();
      } else if (action === 'image-clear') {
        currentPhases[idx].templateOptions = currentPhases[idx].templateOptions || {};
        delete currentPhases[idx].templateOptions.imageFileId;
        delete currentPhases[idx].templateOptions.imageDataUrl;
        delete currentPhases[idx].templateOptions.imageUrl;
        renderPhaseCardsInner();
        savePhasesNow();
      }
    });

    // ----- 画像入力: drop / file picker / paste 統合 -----
    //   1. drop zone へ画像ドロップ
    //   2. zone クリック → hidden <input type="file"> 開く
    //   3. zone フォーカス時に Cmd+V でクリップボードからペースト
    //   どれも同じ flow: File → readAsDataURL → gasRun('lesson.uploadImage') → fileId 保存
    const IMAGE_MAX_BYTES = 5 * 1024 * 1024;
    function uploadPhaseImage(idx, file) {
      if (!file || !/^image\//.test(file.type)) return;
      if (file.size > IMAGE_MAX_BYTES) {
        setAutoSaveStatus('⚠ 画像サイズが 5MB を超えています', 'error');
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        currentPhases[idx].templateOptions = currentPhases[idx].templateOptions || {};
        // Optimistic preview: render once with dataUrl visible.
        //   成功時は再 render 不要 (preview は既に DOM 上)、fileId だけ追加して save。
        //   imageDataUrl は config 保存時に stripPreviewKeys で除外される (lessonJson 肥大化防止)。
        currentPhases[idx].templateOptions.imageDataUrl = dataUrl;
        renderPhaseCardsInner();
        setAutoSaveStatus('画像アップロード中…', 'info');
        gasRun('uploadLessonImage', { imageData: dataUrl, filename: file.name || '' })
          .then((res) => {
            if (res && res.success) {
              currentPhases[idx].templateOptions.imageFileId = res.data.fileId;
              setAutoSaveStatus('✓ 画像を Drive に保存しました', 'success');
              savePhasesNow();
            } else {
              setAutoSaveStatus('⚠ 画像アップロード失敗: ' + ((res && res.message) || 'unknown'), 'error');
              delete currentPhases[idx].templateOptions.imageDataUrl;
              renderPhaseCardsInner();
            }
          })
          .catch((err) => {
            setAutoSaveStatus('⚠ 画像アップロード失敗: ' + (err && err.message || err), 'error');
            delete currentPhases[idx].templateOptions.imageDataUrl;
            renderPhaseCardsInner();
          });
      };
      reader.readAsDataURL(file);
    }
    // file picker (input change)
    document.addEventListener('change', (e) => {
      const el = e.target;
      if (!el || !el.dataset || !('phaseImageFile' in el.dataset)) return;
      const idx = Number(el.dataset.phaseIndex);
      if (!Number.isNaN(idx) && el.files && el.files[0]) {
        uploadPhaseImage(idx, el.files[0]);
      }
    });
    // drop zone click → trigger file input
    // drag / drop
    document.addEventListener('click', (e) => {
      const zone = e.target && e.target.closest && e.target.closest('[data-phase-image-zone]');
      if (!zone) return;
      // クリアボタン or プレビュー img などのクリックは除外
      if (e.target.closest('[data-phase-action="image-clear"]')) return;
      const fileInput = zone.querySelector('[data-phase-image-file]');
      if (fileInput) fileInput.click();
    });
    document.addEventListener('dragover', (e) => {
      const zone = e.target && e.target.closest && e.target.closest('[data-phase-image-zone]');
      if (!zone) return;
      e.preventDefault();
      zone.classList.add('drag-hover');
    });
    document.addEventListener('dragleave', (e) => {
      const zone = e.target && e.target.closest && e.target.closest('[data-phase-image-zone]');
      if (zone) zone.classList.remove('drag-hover');
    });
    document.addEventListener('drop', (e) => {
      const zone = e.target && e.target.closest && e.target.closest('[data-phase-image-zone]');
      if (!zone) return;
      e.preventDefault();
      zone.classList.remove('drag-hover');
      const idx = Number(zone.dataset.phaseIndex);
      const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (!Number.isNaN(idx) && file) uploadPhaseImage(idx, file);
    });
    // paste (drop zone がフォーカス時のみ反応)
    document.addEventListener('paste', (e) => {
      const active = document.activeElement;
      if (!active || !active.dataset || !('phaseImageZone' in active.dataset)) return;
      const idx = Number(active.dataset.phaseIndex);
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (let k = 0; k < items.length; k++) {
        if (items[k].kind === 'file' && /^image\//.test(items[k].type)) {
          const file = items[k].getAsFile();
          if (file && !Number.isNaN(idx)) {
            e.preventDefault();
            uploadPhaseImage(idx, file);
            return;
          }
        }
      }
    });

    function renderConfirmStep(lessonJson) {
      // Step 3 が hidden ならフルレンダーは不要 (autosave 毎の無駄を回避)。
      //   要約 (classes / phase count) は軽量なので常に更新する。
      const step3 = document.querySelector('.lesson-step[data-step="3"]');
      const step3Hidden = step3 && step3.hidden;
      const classes = (lessonJson && lessonJson.classes) || [];
      const phases = (lessonJson && lessonJson.phases) || [];
      const classesEl = document.getElementById('lesson-summary-classes');
      const phaseCountEl = document.getElementById('lesson-summary-phase-count');
      if (classesEl) classesEl.textContent = classes.length ? classes.join(', ') : '(未設定)';
      if (phaseCountEl) phaseCountEl.textContent = phases.length;
      if (step3Hidden) return;
      const phaseListEl = document.getElementById('lesson-summary-phase-list');
      const warningsEl = document.getElementById('lesson-summary-warnings');

      // 各フェーズの内容を一覧表示 (設定漏れに気づかせる)。
      if (phaseListEl) {
        const esc = window.sharedUtilities.security.escapeHtml;
        const detailFor = (p) => {
          const o = p.templateOptions || {};
          if (p.formTemplate === 'numberline') {
            return esc(o.lowLabel || '?') + ' ↔ ' + esc(o.highLabel || '?');
          }
          if (p.formTemplate === 'matrix') {
            return 'X: ' + esc(o.xLow || '?') + '↔' + esc(o.xHigh || '?') +
                   ' / Y: ' + esc(o.yLow || '?') + '↔' + esc(o.yHigh || '?');
          }
          if (p.formTemplate === 'pie' || p.formTemplate === 'board') {
            const cs = Array.isArray(o.choices) ? o.choices : [];
            return cs.length ? cs.map(c => esc(c)).join(' / ') : '(選択肢なし)';
          }
          return '';
        };
        const labelFor = (t) => {
          const opt = PHASE_TEMPLATE_OPTIONS.find((o) => o.value === t);
          return opt ? opt.label : t;
        };
        phaseListEl.innerHTML = phases.map((p, i) => (
          '<li class="confirm-phase-row">' +
            '<span class="confirm-phase-idx">フェーズ ' + (i + 1) + '</span>' +
            '<span class="confirm-phase-body">' +
              '<strong>' + esc(p.name || '(無題)') + '</strong> · ' + labelFor(p.formTemplate) + '<br>' +
              '<span class="confirm-phase-q">Q: ' + esc(p.question || '(質問未設定)') + '</span><br>' +
              '<span class="confirm-phase-detail">' + detailFor(p) + '</span>' +
            '</span>' +
          '</li>'
        )).join('');
      }

      // 設定漏れ警告
      if (warningsEl) {
        const warnings = [];
        if (classes.length === 0) warnings.push('対象クラスが選択されていません');
        phases.forEach((p, i) => {
          if (!p.name) warnings.push('フェーズ ' + (i + 1) + ' の名前が空です');
          if (!p.question) warnings.push('フェーズ ' + (i + 1) + ' の質問が空です');
          const o = p.templateOptions || {};
          if ((p.formTemplate === 'pie' || p.formTemplate === 'board') && (!Array.isArray(o.choices) || o.choices.length < 2)) {
            warnings.push('フェーズ ' + (i + 1) + ' の選択肢が 2 つ未満です');
          }
        });
        const esc = window.sharedUtilities.security.escapeHtml;
        warningsEl.innerHTML = warnings.length
          ? '<ul class="confirm-warnings">' + warnings.map(w => '<li>⚠️ ' + esc(w) + '</li>').join('') + '</ul>'
          : '<p class="confirm-ok">✓ 設定漏れはありません</p>';
      }
    }

    // ---------- Per-field autosave (data-lesson-field) ----------
    function parseFieldValue(el) {
      if (el.type === 'checkbox') return el.checked;
      if (el.dataset.lessonField === 'classes') {
        return el.value.split(/[,、\s]+/).map(s => s.trim()).filter(Boolean);
      }
      // phases は input.value 経由では運べないので __phasesValue を読む
      if (el.dataset.lessonField === 'phases' && el.__phasesValue !== undefined) {
        return el.__phasesValue;
      }
      return el.value;
    }

    // すべての lesson save を 1 本の Promise チェーンに直列化する。
    //   field 別の debounce key だと、name と phases が ~同時に fire したとき同じ etag を
    //   見て送信 → 2 番目が etag_mismatch で落ちる。saveQueue で順次実行することで
    //   後続の save は必ず直前の save 完了後の最新 etag を読む。
    let saveQueue = Promise.resolve();
    let pendingFields = {}; // fieldPath → 最新 value (debounce-fire 時の snapshot)

    function flushLessonSaves() {
      const indicator = document.getElementById('lesson-autosave-indicator');
      const fields = Object.keys(pendingFields);
      if (!fields.length || !currentLessonId) return;
      const batch = pendingFields;
      pendingFields = {};
      if (indicator) indicator.textContent = '保存中...';
      fields.forEach((fieldPath) => {
        saveQueue = saveQueue.then(() => new Promise((resolve) => {
          if (!currentLessonId) return resolve();
          gasRun('lesson.updateDraft', {
            userId,
            lessonId: currentLessonId,
            fieldPath,
            value: batch[fieldPath],
            expectedEtag: currentLessonEtag
          }).then((res) => {
            if (res && res.success) {
              currentLessonEtag = res.data.lesson.etag;
              if (indicator) indicator.textContent = '✓ 自動保存';
              renderConfirmStep(res.data.lesson.lessonJson);
            } else if (res && res.error === 'etag_mismatch') {
              // 直列化していれば原則発生しないが、念のため refetch & 1 回 retry。
              gasRun('lesson.review', { userId, lessonId: currentLessonId }).then((r2) => {
                if (r2 && r2.success) {
                  currentLessonEtag = r2.data.lesson.etag;
                  gasRun('lesson.updateDraft', {
                    userId, lessonId: currentLessonId, fieldPath,
                    value: batch[fieldPath], expectedEtag: currentLessonEtag
                  }).then((r3) => {
                    if (r3 && r3.success) {
                      currentLessonEtag = r3.data.lesson.etag;
                      if (indicator) indicator.textContent = '✓ 自動保存';
                      renderConfirmStep(r3.data.lesson.lessonJson);
                    } else if (indicator) indicator.textContent = '⚠ 保存失敗';
                  });
                }
              });
            } else if (indicator) {
              indicator.textContent = '⚠ 保存失敗';
            }
          }).catch((err) => {
            if (indicator) indicator.textContent = '⚠ 保存失敗';
            console.warn('lesson.updateDraft error:', err && err.message);
          }).then(resolve, resolve);
        }));
      });
    }

    function scheduleLessonFieldSave(el) {
      if (!currentLessonId) return;
      const fieldPath = el.dataset.lessonField;
      pendingFields[fieldPath] = parseFieldValue(el); // 上書き = coalesce
      const indicator = document.getElementById('lesson-autosave-indicator');
      if (indicator) indicator.textContent = '保存予定…';
      // 単一キー debounce → 全フィールドの編集が落ち着いてから 1 回だけ flush。
      window.sharedUtilities.debounce.debounce(flushLessonSaves, 'lesson-save', FIELD_DEBOUNCE_MS);
    }
    window.__scheduleLessonFieldSave = scheduleLessonFieldSave;

    // ---------- Start ----------
    function lessonStartNow() {
      if (!currentLessonId) return;
      const btn = document.getElementById('lesson-start-btn');
      const errBox = document.getElementById('lesson-start-error');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ 作成中...'; }
      if (errBox) { errBox.hidden = true; errBox.innerHTML = ''; }
      gasRun('lesson.start', { userId, lessonId: currentLessonId }).then((res) => {
        if (res && res.success) {
          openLessonRunner(currentLessonId, res.data.lesson);
          return;
        }
        // 失敗: backend は resumable (FORM_CREATE_FAILED 時、完了済み formId は次回 skip)。
        //   alert ではなく card 内に「再試行」ボタンを出す。
        const msg = (res && (res.message || res.error)) || 'レッスン開始失敗';
        const completed = (res && res.completedPhases) || 0;
        const esc = window.sharedUtilities.security.escapeHtml;
        if (errBox) {
          errBox.hidden = false;
          errBox.innerHTML =
            '<div class="lesson-start-error-box">' +
              '<div class="lesson-start-error-title">⚠️ 作成中にエラーが発生しました</div>' +
              '<div class="lesson-start-error-detail">' + esc(msg) + '</div>' +
              (completed
                ? '<div class="lesson-start-error-progress">✓ ' + completed + ' 個まで作成済み。残りから再開できます。</div>'
                : '') +
              '<button type="button" id="lesson-start-retry-btn" class="btn btn-primary mt-2">🔄 再試行</button>' +
            '</div>';
          const retryBtn = document.getElementById('lesson-start-retry-btn');
          if (retryBtn) retryBtn.addEventListener('click', lessonStartNow);
        }
        if (btn) { btn.disabled = false; btn.textContent = '🎬 すべて作成して開始'; }
      }).catch((err) => {
        const msg = (err && err.message) || String(err);
        if (errBox) {
          errBox.hidden = false;
          errBox.innerHTML =
            '<div class="lesson-start-error-box">' +
              '<div class="lesson-start-error-title">⚠️ ネットワークエラー</div>' +
              '<div class="lesson-start-error-detail">' +
                window.sharedUtilities.security.escapeHtml(msg) + '</div>' +
              '<button type="button" id="lesson-start-retry-btn" class="btn btn-primary mt-2">🔄 再試行</button>' +
            '</div>';
          const retryBtn = document.getElementById('lesson-start-retry-btn');
          if (retryBtn) retryBtn.addEventListener('click', lessonStartNow);
        }
        if (btn) { btn.disabled = false; btn.textContent = '🎬 すべて作成して開始'; }
      });
    }
    window.lessonStartNow = lessonStartNow;

    // ---------- Runner (実行中) ----------
    function openLessonRunner(lessonId, preloaded) {
      loadLessonThen(lessonId, preloaded, (lesson) => {
        document.body.classList.remove('mode-create-lesson');
        document.body.classList.add('mode-run-lesson');
        history.pushState({ lesson: lessonId, mode: 'run' }, '', '#lesson/' + lessonId);
        renderRunner(lesson);
      });
    }

    function renderRunner(lesson) {
      const nameEl = document.getElementById('lesson-runner-name');
      if (nameEl) nameEl.textContent = lesson.name || '授業中';
      const phases = (lesson.lessonJson && lesson.lessonJson.phases) || [];
      const trans = (lesson.lessonJson && lesson.lessonJson.profileTransitions) || [];
      const activeIdx = trans.length > 0 ? Number(trans[trans.length - 1].to) || 0 : 0;
      const container = document.getElementById('lesson-runner-phases');
      if (container) {
        container.innerHTML = phases.map((p, i) => {
          const cls = i < activeIdx ? 'completed' : i === activeIdx ? 'active' : '';
          const marker = i < activeIdx ? '✓' : i === activeIdx ? '▶' : '';
          return `<div class="lesson-phase-card ${cls}">
            <div class="phase-number">${marker} フェーズ ${i + 1}</div>
            <div class="phase-name">${window.sharedUtilities.security.escapeHtml(p.name || '')}</div>
            <div class="phase-meta">📊 ${p.formTemplate}</div>
          </div>`;
        }).join('');
      }
      const prevBtn = document.getElementById('lesson-prev-btn');
      const nextBtn = document.getElementById('lesson-next-btn');
      if (prevBtn) prevBtn.disabled = activeIdx === 0;
      if (nextBtn) nextBtn.disabled = activeIdx >= phases.length - 1;
    }

    function lessonAdvance(direction) {
      if (!currentLessonId) return;
      // Why: onclick="lessonAdvance(...)" の inline 呼出から this を渡す代わりに、
      //   既知の DOM id で button を引いて withBusy にかける (連打抑制 + spinner)。
      const btn = document.getElementById(direction === 'next' ? 'lesson-next-btn' : 'lesson-prev-btn');
      const busyText = direction === 'next' ? '切替中...' : '戻し中...';
      const task = () => gasRun('lesson.advance', { userId, lessonId: currentLessonId, direction }).then((res) => {
        if (res && res.success) {
          currentLessonEtag = res.data.lesson.etag;
          renderRunner(res.data.lesson);
        } else {
          window.showError((res && res.message) || 'フェーズ切替失敗');
        }
      });
      if (btn && window.sharedUtilities && window.sharedUtilities.buttons) {
        window.sharedUtilities.buttons.withBusy(btn, task, { busyText });
      } else {
        task();
      }
    }
    window.lessonAdvance = lessonAdvance;

    function lessonEnd() {
      if (!currentLessonId) return;
      if (!confirm('授業を終了して保存しますか？保存後は振り返り画面で再生できます。')) return;
      // lesson-end ボタンは LessonWorkspace.html の hidden 要素から呼ばれるので
      //   click event から探さず、global overlay で待機表示する (snapshot 化に時間がかかる)。
      window.setLoading(true, '授業を保存中...');
      gasRun('lesson.end', { userId, lessonId: currentLessonId }).then((res) => {
        window.setLoading(false);
        if (res && res.success) {
          window.showSuccess('授業を保存しました。レッスン一覧から振り返り画面を開けます。');
          exitLessonCreateMode();
        } else {
          window.showError((res && res.message) || '終了失敗');
        }
      }).catch((err) => {
        window.setLoading(false);
        window.showError((err && err.message) || '終了失敗');
      });
    }
    window.lessonEnd = lessonEnd;

    // ---------- Browser back/forward 連携 ----------
    window.addEventListener('popstate', (event) => {
      const st = event.state || {};
      if (!st.lesson) {
        // history で AdminPanel に戻った
        document.body.classList.remove('mode-create-lesson');
        document.body.classList.remove('mode-run-lesson');
        currentLessonId = null;
      }
    });

    // ---------- Initial bootstrap ----------
    document.addEventListener('DOMContentLoaded', () => {
      // 「使い方ガイド」と同様、ユーザーがレッスン管理セクションを開いたタイミングで
      //   lazy load することも検討したが、Phase 1 は init で 1 回だけロード。
      loadLessonList();
    });
  })();

</script>
