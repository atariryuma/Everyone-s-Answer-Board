<script>
  /* =====================================================================
   * AdminPanel.js — 教師向け管理パネル (mode=admin)
   *
   * 責任範囲:
   *   - Form 連携 (一覧選択 / URL 入力 / テンプレート Form 自動生成)
   *   - 列マッピング (自動推定 inferColumnRoles + 手動調整)
   *   - 公開 / 非公開 / 再公開 (etag 楽観ロック)
   *   - プロファイル CRUD (切替 / 保存 / 削除 / リネーム / 自動保存)
   *   - ボード設定 (boardMode / 軸ラベル / 象限ラベル / showNames / showReactions)
   *   - レッスン機能 (wizard / 開始 / 進行 / 終了 / 振り返り)
   *
   * gasRun (helper): dispatchAdminOperation を runServer 経由で呼ぶ wrapper。
   *   admin API 全 50+ operation はこの 1 経路に集約。
   * runProfileOp: profile CRUD の共通 UX (busy / status / etag retry) を集約。
   *
   * 通信は全て runServer (CLAUDE.md canonical API)。 native confirm/alert は使わず
   * modals.confirm / modals.alert を使う。 通知は notifications.X 経由のみ。
   * ===================================================================== */
  let __USER_ID__ = '';

  try {
    const appData = document.getElementById('app-data');
    if (appData) {
      __USER_ID__ = appData.getAttribute('data-user-id') || '';
    }
  } catch (error) {
    __USER_ID__ = '';
  }

  // フォーム検証成功 → 自動接続の前にメッセージを読ませる短い遅延。
  const AUTO_CONNECT_DELAY_MS = 300;

  function getUrlParameterUserId() {
    try {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('userId') || '';
    } catch (error) {
      console.warn('URL parameter extraction failed:', error);
      return '';
    }
  }

  const TARGET_USER_ID = getUrlParameterUserId() || __USER_ID__;

  window.UNIFIED_CONFIG = window.sharedUtilities.createUnifiedConfig(
    {}, // Empty config - no restoration from configJSON
    {}, // Legacy変数削除
    {
      targetUserId: TARGET_USER_ID,
      isEditor: true,
      isAdminUser: true,
      isOwnBoard: true
    }
  );

  let systemState = {
    config: null,
    initialized: false,
    initializationStep: 'not started',
  };

  const ClientMutex = {
    locks: Object.create(null),
    acquire(key) {
      if (this.locks[key]) return false;
      this.locks[key] = true;
      return true;
    },
    release(key) {
      this.locks[key] = false;
    },
  };

  function isValidFormUrl(url) {
    if (!url || typeof url !== 'string') {
      return false;
    }
    try {
      const urlObj = new URL(url);
      return urlObj.hostname === 'docs.google.com' &&
        urlObj.pathname.includes('/forms/');
    } catch {
      return false;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // ============== 公開トグル / 設定保存 wrapper ==============
  // Why: 「💾 設定を保存」+「📣 公開する/🔒 公開を終了する (state-aware)」の 2 ボタンに集約。
  //   内部では legacy save-draft / publish-now / unpublishBoardBtn を click 呼び出しする
  //   wrapper なので、既存の保存・公開・終了ロジックは変更しない。

  /**
   * 「💾 設定を保存」ボタン → 既存 save-draft の wrapper。
   * 公開状態は変えずに config + active profile を上書き保存。
   */
  function initSaveConfigWrapper() {
    const btn = document.getElementById('save-config-changes');
    const target = document.getElementById('save-draft');
    if (!btn || !target) return;
    btn.addEventListener('click', () => {
      if (!target.disabled) target.click();
    });
    // wrapper ボタンの busy state を target の disabled 状態に追従させる。
    //   saveDraft / publishApp は ClientMutex 取得時に target.disabled=true を立てるパターン。
    new MutationObserver(() => {
      btn.disabled = target.disabled;
      btn.classList.toggle('btn-busy', target.disabled);
    }).observe(target, { attributes: true, attributeFilter: ['disabled'] });
  }

  /**
   * 「📣 公開する / 🔒 公開を終了する」トグルボタン → 状態に応じて
   * publish-now or unpublishBoardBtn を click 呼び出し。
   * 文言とスタイルは MutationObserver で app-publish-status に追従する。
   */
  function initPublishToggleWrapper() {
    const btn = document.getElementById('primary-publish-toggle');
    if (!btn) return;
    const label = btn.querySelector('.primary-publish-toggle-label');
    const srcPublish = document.getElementById('app-publish-status');
    if (!label || !srcPublish) return;

    // MutationObserver は characterData / childList / attributes すべて見るので 1 回の
    //   publish 切替で数回 fire する。前回値と比較して実際に変わった時だけ refetch する。
    let lastPubState = null;
    const sync = () => {
      const isPub = srcPublish.classList.contains('published') || /公開中/.test(srcPublish.textContent || '');
      label.textContent = isPub ? '🔒 公開を終了する' : '📣 公開する';
      btn.classList.toggle('btn-primary', !isPub);
      btn.classList.toggle('btn-danger', isPub);
      btn.dataset.publishState = isPub ? 'published' : 'unpublished';
      btn.setAttribute('aria-pressed', String(isPub));
      if (lastPubState !== isPub) {
        lastPubState = isPub;
        try {
          if (typeof loadProfileList === 'function') loadProfileList();
        } catch (_) {}
      }
    };

    btn.addEventListener('click', () => {
      const state = btn.dataset.publishState;
      const target = state === 'published'
        ? document.getElementById('unpublishBoardBtn')
        : document.getElementById('publish-now');
      if (target && !target.disabled) {
        target.click();
      } else {
        console.warn('publish toggle: target not found or disabled, state=' + state);
      }
    });

    new MutationObserver(sync).observe(srcPublish, {
      childList: true, characterData: true, attributes: true, subtree: true
    });
    sync();

    // wrapper の busy state を「実体ボタン (publish-now / unpublishBoardBtn) の disabled」に
    //   追従させる。教師が toggle 押下後の数秒間に「処理中」と分かるよう btn-busy class で
    //   スピナーを表示し、二重 click を物理的に止める。
    const syncBusy = () => {
      const targets = ['publish-now', 'unpublishBoardBtn']
        .map(id => document.getElementById(id))
        .filter(Boolean);
      const busy = targets.some(t => t.disabled);
      btn.disabled = busy;
      btn.classList.toggle('btn-busy', busy);
    };
    ['publish-now', 'unpublishBoardBtn'].forEach(id => {
      const t = document.getElementById(id);
      if (t) new MutationObserver(syncBusy).observe(t, { attributes: true, attributeFilter: ['disabled'] });
    });
  }

  /**
   * テーマ選択 (dark/light/auto) の AdminPanel UI を初期化する。
   *   theme-select dropdown を themeManager と双方向 sync する。
   *   localStorage で永続化される設定なので、 user config (configJson) には保存しない。
   *   per-device 設定として位置付け (投影端末で light、 個人端末で dark など)。
   */
  function initThemeSelect() {
    const select = document.getElementById('theme-select');
    if (!select || !window.themeManager) return;

    // 現在の theme を select に反映 (init 時のみ)
    select.value = window.themeManager.get();

    // ユーザー操作で変更されたら themeManager.set() で永続化 + body class 切替
    select.addEventListener('change', () => {
      window.themeManager.set(select.value);
    });

    // 他の経路 (view ヘッダーの sun/moon toggle 等) で変更された場合に追従
    window.themeManager.subscribe((resolved, raw) => {
      // raw は localStorage 値 ('dark' | 'light' | 'auto')
      if (select.value !== raw) select.value = raw;
    });
  }

  async function init() {
    systemState.initializationStep = 'started';

    try {
      systemState.initializationStep = 'batched initialization';
      await initializeBatchedAdminPanel();

      // Why ここで prefetch: CLAUDE.md「top-level に google.script.run を置かない」ルールに
      //   従い、以前 EOF の独立 IIFE で動かしていた prefetchAppSetupUrl() を init() 内へ移す。
      //   初期化バッチが終わってからの非同期 prefetch なので、ユーザー操作の前に
      //   appSetup URL が温まる挙動は維持される (await しない fire-and-forget)。
      try { prefetchAppSetupUrl(); } catch (e) { console.warn('prefetchAppSetupUrl skipped:', e.message); }

      try { initSaveConfigWrapper(); } catch (e) { console.warn('initSaveConfigWrapper skipped:', e.message); }
      try { initPublishToggleWrapper(); } catch (e) { console.warn('initPublishToggleWrapper skipped:', e.message); }
      try { initThemeSelect(); } catch (e) { console.warn('initThemeSelect skipped:', e.message); }

      systemState.initializationStep = 'completed';
      systemState.initialized = true;
    } catch (error) {
      try {
        showError('初期化エラー: ' + systemState.initializationStep + ' - ' + error.message);
      } catch (uiError) {
        if (window.notifications) {
          window.notifications.error('管理パネルの初期化に失敗しました。ページを再読み込みしてください。', 7000);
        } else {
          alert('管理パネルの初期化に失敗しました。ページを再読み込みしてください。');
        }
      }
    }
  }

  /**
   * ✅ CLAUDE.md準拠: Batched AdminPanel initialization for 70x performance improvement
   * Combines multiple sequential operations into efficient batch processing:
   * - Panel initialization
   * - Administrator access check
   * - Footer initialization with board info
   */
  async function initializeBatchedAdminPanel() {
    try {
      window.setLoading(true, '処理中...');

      await initializePanelCore();
      await checkAdministratorAccess();

      try {
        const adminData = await loadBatchedAdminData();
        systemState.userInfo = adminData.userInfo;
        systemState.user = adminData.userInfo;
        currentBoardInfo = adminData.boardInfo;

        systemState.config = { ...systemState.config, ...adminData.config };

        updateFooterDisplay(currentBoardInfo);

        if (adminData.userInfo.email) {
          document.getElementById('current-user-email').textContent = adminData.userInfo.email;
          document.getElementById('current-user-id').textContent = adminData.userInfo.userId || 'N/A';
        }

        updatePanel(systemState.config);
      } catch (error) {
        console.warn('Batched admin data loading failed:', error);
      }

      initializeFooterUI();
      initializeEventListeners();

      // Why: applyConfig が走らない（=保存済み config 無し）新規教師でも、
      //      可視化モードの初期表示状態（auto = 数値マッピング/軸ラベル領域を見せる、
      //      象限ラベルは隠す）を正しく適用するために 1 回呼ぶ。
      try { updateVisualizationVisibility(); } catch (_) {}

      // プロファイル管理 UI を初期化（一覧表示 + イベントハンドラ）
      try { initializeProfileManagementUI(); } catch (e) { console.warn('initializeProfileManagementUI failed:', e); }

      try { setupAutoSave(); } catch (e) { console.warn('setupAutoSave failed:', e); }

      updateProgress(1);

      // ハイドレーション後の silent header restore:
      //   spreadsheetId + sheetName が config にあるなら headers fetch + 列ドロップダウン
      //   復元を実行する。connectToDataSource を使うと loading overlay / success toast /
      //   AI 再判定 / scheduleAutoSave が全部走って UI を blocking してしまうので、
      //   getColumnAnalysis を直接呼ぶ軽量パスを使う。
      try {
        const cfg = systemState.config || {};
        if (cfg.spreadsheetId && cfg.sheetName) {
          setTimeout(() => silentlyRestoreColumnMapping(cfg.spreadsheetId, cfg.sheetName, cfg.columnMapping || {}), 100);
        }
      } catch (_) {}

      // 初回アクセス時のウェルカムモーダル表示
      checkAndShowWelcomeModal();

    } catch (error) {
      console.error('Batched admin panel initialization error:', error);
      throw error;
    } finally {
      window.setLoading(false);
    }
  }

  /**
   * 初回アクセス時のウェルカムモーダル表示チェック
   */
  function checkAndShowWelcomeModal() {
    const hasSeenWelcome = systemState.config?.hasSeenWelcome;

    if (!hasSeenWelcome && window.sharedModals) {
      window.sharedModals.showWelcome({
        onStart: () => {
          // モーダルを閉じて通常フローへ (sharedModals 側で自動クローズ)
        },
        onManual: () => {
          // マニュアルを開く
          openManualGuide();
        },
        onDontShow: (checked) => {
          if (checked) {
            markWelcomeSeenOnServer();
          }
        }
      });
    }
  }

  /**
   * ウェルカムモーダルを既読にする（サーバー側保存）
   */
  function markWelcomeSeenOnServer() {
    runServer('markWelcomeSeen').then((result) => {
      if (result && result.success) {
        if (systemState.config) systemState.config.hasSeenWelcome = true;
      } else {
        console.warn('Failed to save welcome seen flag:', result && result.message);
      }
    }, (error) => {
      console.error('markWelcomeSeen error:', error);
    });
  }

  /**
   * Core panel initialization (no API calls)
   */
  async function initializePanelCore() {
    systemState.config = { ...window.UNIFIED_CONFIG };

    const urlSpreadsheet = getSpreadsheetFromUrl();
    if (urlSpreadsheet) {
      if (systemState.config) {
        systemState.config.spreadsheetId = urlSpreadsheet.spreadsheetId;
        if (urlSpreadsheet.spreadsheetUrl) {
          systemState.config.spreadsheetUrl = urlSpreadsheet.spreadsheetUrl;
        }
      } else {
        systemState.config = {
          userId: null,
          setupStatus: 'pending',
          spreadsheetId: urlSpreadsheet.spreadsheetId,
          spreadsheetUrl: urlSpreadsheet.spreadsheetUrl || null,
          isPublished: false
        };
      }
    }

    if (systemState.config) {
      updatePanel(systemState.config);
    }
  }

  // 管理パネル初期化時の board / config / publish status を一括取得 (個別 API 呼び出し回避)。
  async function loadBatchedAdminData() {
    const adminData = await runServer('getBatchedAdminData', window.UNIFIED_CONFIG.targetUserId);
    if (!(adminData && adminData.success)) {
      throw new Error((adminData && adminData.error) || 'Failed to load admin data');
    }
    const isPublished = Boolean(adminData.config?.isPublished);
    const userInfo = {
      email: adminData.user?.userEmail || '',
      userId: adminData.user?.userId || null,
      createdAt: adminData.user?.createdAt || null,
      lastModified: adminData.user?.lastModified || null
    };
    const boardInfo = {
      isPublished,
      questionText: adminData.questionText || '回答ボード',
      userEmail: adminData.user?.userEmail || '',
      spreadsheetId: adminData.config?.spreadsheetId || '',
      sheetName: adminData.config?.sheetName || '',
      lastUpdated: adminData.config?.lastModified,
      urls: adminData.config?.urls || null
    };
    return { userInfo, boardInfo, config: { ...adminData.config } };
  }

  /**
   * Footer UI initialization (no API calls)
   */
  function initializeFooterUI() {
    const unpublishBtn = document.getElementById('unpublishBoardBtn');
    if (unpublishBtn) {
      unpublishBtn.addEventListener('click', async () => {
        if (!systemState.config?.isPublished) {
          showInfo('このボードは既に非公開です');
          return;
        }

        const ok = await window.modals.confirm(
          'このボードを非公開にしますか？\n学生はボードにアクセスできなくなります。',
          { title: 'ボードの公開を終了', variant: 'danger', okLabel: '非公開にする' }
        );
        if (!ok) return;

        try {
          window.setLoading(true, 'ボードを非公開にしています...');
          const result = await runServer('unpublishBoard', window.UNIFIED_CONFIG.targetUserId);
          if (result && result.success) {
            showSuccess(result.message || 'ボードを非公開にしました');
            systemState.config.isPublished = false;
            updatePublishStatus('unpublished');
            updateFooterDisplay({ ...currentBoardInfo, isPublished: false });
          } else {
            showError((result && (result.message || result.error)) || 'ボードの非公開に失敗しました');
          }
        } catch (error) {
          console.error('公開終了エラー:', error);
          showError('ボードの非公開に失敗しました');
        } finally {
          window.setLoading(false);
        }
      });
    }

    document.body.classList.add('has-footer');
  }

  /**
   * ✅ CLAUDE.md準拠: Event listeners initialization (moved from duplicate DOMContentLoaded)
   */
  // dropdown 系 details の click-outside auto-close。
  //   要素クラスで限定 (admin-collapsible や form alternative の details は閉じない)。
  const DROPDOWN_DETAILS_SELECTORS = [
    'details.lesson-template-picker',
    'details.profile-more-menu',
    'details.phase-add-picker',
    'details.template-form-picker'
  ].join(',');

  function initializeEventListeners() {
    // dropdown 系 details の click-outside auto-close + open 中の親カード z-index 持ち上げ。
    // init() からのみ呼ばれる (1 回) ため document への委譲リスナ登録もここで行う
    // (top-level 副作用禁止ルールの遵守)。
    document.addEventListener('click', (e) => {
      document.querySelectorAll(DROPDOWN_DETAILS_SELECTORS).forEach((d) => {
        if (!d.open) return;
        if (d.contains(e.target)) return;
        d.open = false;
      });
    });

    // dropdown が開いている間だけ親カードの z-index を上げる。
    // Why: .glass-panel の backdrop-filter が各カードを独立 stacking context にするため、
    //   メニュー内の z-index では右側パネルカード (DOM 後方 = ソース順で上) を超えられない。
    //   親カード自体の z-index を持ち上げれば、その stacking context 全体が上に出る。
    document.addEventListener('toggle', (e) => {
      const d = e.target;
      if (!d || !d.matches || !d.matches(DROPDOWN_DETAILS_SELECTORS)) return;
      const card = d.closest('.card, .info-card, .glass-panel');
      if (!card) return;
      if (d.open) {
        card.style.position = card.style.position || 'relative';
        card.style.zIndex = '200';
      } else {
        card.style.zIndex = '';
      }
    }, true);

    // フォーム選択時の処理
    const formSelect = document.getElementById('form-select');
    if (formSelect) {
      // Lazy load: select を最初に開く / focus する時に一覧をロード。
      // 旧来は「🔄 一覧を更新」 ボタンを押さないと選択肢が出ず、 select 自体を
      // クリックしても 「-- クリックして読み込み --」 placeholder のままだった (user 報告)。
      let formsLoaded = false;
      const lazyLoadForms = () => {
        if (formsLoaded) return;
        formsLoaded = true;
        loadForms().catch((error) => {
          formsLoaded = false;  // 失敗時は再試行できるよう reset
          console.warn('フォーム一覧の自動読み込み失敗:', error);
        });
      };
      // mousedown: クリック直前に発火 (option 表示の前にロード完了させる)
      // focus: keyboard tab navigation 対応
      formSelect.addEventListener('mousedown', lazyLoadForms, { once: false });
      formSelect.addEventListener('focus', lazyLoadForms, { once: false });

      formSelect.addEventListener('change', function () {
        const formUrl = this.value;
        if (formUrl) {
          // フォームURLを検証して自動接続
          validateFormFromDropdown(formUrl);
        } else {
          hideFormInfo();
        }
      });
    }

    const refreshDataBtn = document.getElementById('refresh-data');
    if (refreshDataBtn) {
      refreshDataBtn.addEventListener('click', function () {
        loadForms().catch(error => {
          console.warn('フォーム一覧の読み込みに失敗:', error);
        });
      });
    }

    const createTemplateBtn = document.getElementById('create-template-form');
    if (createTemplateBtn) {
      createTemplateBtn.addEventListener('click', function () {
        createTemplateForm();
      });
    }

    // 新 UI: dropdown メニューから種別をクリック → 既存の createTemplateForm() に流す。
    //   select#template-type-select は hidden で残してあるので value を書き換えてから createTemplateForm() を呼ぶ。
    document.addEventListener('click', function (e) {
      const item = e.target && e.target.closest && e.target.closest('[data-template-create]');
      if (!item) return;
      const tpl = item.dataset.templateCreate;
      const picker = item.closest('.template-form-picker');
      if (picker) picker.open = false;
      const select = document.getElementById('template-type-select');
      if (select) select.value = tpl;
      createTemplateForm();
    });

    const saveDraftBtn = document.getElementById('save-draft');
    if (saveDraftBtn) {
      saveDraftBtn.addEventListener('click', function () {
        if (window.sharedUtilities && window.sharedUtilities.debounce) {
          window.sharedUtilities.debounce.debounce(() => saveDraft(), 'save-draft', 500);
        } else {
          saveDraft();
        }
      });
    }

    // Why: boardMode セレクトを変更したら、関連サブセクション（数値列マッピング・
    //      軸ラベル・象限ラベル）の表示状態を即時更新する。保存ボタンを押さなくても
    //      UI は反応する。
    const boardModeSelect = document.getElementById('board-mode-select');
    if (boardModeSelect) {
      boardModeSelect.addEventListener('change', function () {
        try { updateVisualizationVisibility(); } catch (e) {
          console.warn('updateVisualizationVisibility failed:', e && e.message);
        }
      });
    }

    const aiAnalyzeBtn = document.getElementById('ai-analyze-btn');
    if (aiAnalyzeBtn) {
      aiAnalyzeBtn.addEventListener('click', function () {
        if (window.sharedUtilities && window.sharedUtilities.debounce) {
          window.sharedUtilities.debounce.debounce(() => manualColumnAnalysis(), 'ai-analyze', 500);
        } else {
          manualColumnAnalysis();
        }
      });
    }

    const publishBtn = document.getElementById('publish-now');
    if (publishBtn) {
      publishBtn.addEventListener('click', function () {
        if (window.sharedUtilities && window.sharedUtilities.debounce) {
          window.sharedUtilities.debounce.debounce(() => publishApp(), 'publish-now', 800);
        } else {
          publishApp();
        }
      });
    }

  }

  /**
   * Googleフォーム一覧を読み込む
   */
  async function loadForms() {
    const select = document.getElementById('form-select');
    if (!select) throw new Error('form-select element not found');

    select.innerHTML = '<option value="">読み込み中...</option>';
    setPartialLoading(true, 'Googleフォーム一覧を読み込み中...');

    let result;
    try {
      result = await runServer('getForms');
    } catch (error) {
      select.innerHTML = '<option value="">読み込みエラー</option>';
      setPartialLoading(false);
      console.error('📝 getForms通信エラー:', error);
      throw new Error('フォーム一覧の読み込みに失敗しました: ' + error.message);
    }
    setPartialLoading(false);

    if (!result || result.success === false) {
      select.innerHTML = '<option value="">読み込みエラー</option>';
      throw new Error((result && result.error) || 'フォーム一覧の取得に失敗しました');
    }

    const forms = result.forms || [];
    select.innerHTML = '<option value="">フォームを選択...</option>';

    if (forms.length > 0) {
      forms.forEach((form) => {
        const option = document.createElement('option');
        option.value = form.url; // URLを値として保持
        option.textContent = form.name;
        option.dataset.formId = form.id;
        select.appendChild(option);
      });
    } else {
      const noDataOption = document.createElement('option');
      noDataOption.value = '';
      noDataOption.textContent = 'あなたが所有するフォームはありません';
      noDataOption.disabled = true;
      select.appendChild(noDataOption);
    }

    return forms;
  }

  function getSpreadsheetFromUrl() {
    const urlParams = new URLSearchParams(window.location.search);

    const spreadsheetId = urlParams.get('spreadsheetId');
    if (spreadsheetId) {
      return { spreadsheetId, source: 'url_param' };
    }

    const spreadsheetUrl = urlParams.get('url');
    if (spreadsheetUrl) {
      const match = spreadsheetUrl.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (match) {
        return {
          spreadsheetId: match[1],
          spreadsheetUrl: spreadsheetUrl,
          source: 'url_full'
        };
      }
    }

    return null;
  }

  function updatePanel(config) {
    if (!config) return;
    applyConfig(config);
    updateResourceButtons(config);
    updateConfigSummary(config);
  }

  function applyConfig(config) {
    if (!config) return;

    try {
      // フォーム用のデータをセット (dataset + value 両方)。
      // Why: 旧コードは dataset のみセットして value を空のままにしていたため、
      //   「プロファイル読込→ページ再表示」しても URL 欄が見た目空で、教師が「設定が壊れた」と
      //   錯覚する silent UX bug があった (2026-05-16 報告)。
      if (config.spreadsheetId && config.sheetName) {
        const formUrlInput = document.getElementById('form-url-input');
        const formSelect = document.getElementById('form-select');

        if (formUrlInput) {
          formUrlInput.dataset.spreadsheetId = config.spreadsheetId;
          formUrlInput.dataset.sheetName = config.sheetName;
          formUrlInput.dataset.formTitle = config.formTitle || '';
          formUrlInput.dataset.formUrl = config.formUrl || '';
          // 視覚的にも URL を見せる (空配信で IME や placeholder が乗らないよう value 優先)
          if (config.formUrl) formUrlInput.value = config.formUrl;
        }

        if (formSelect) {
          formSelect.dataset.spreadsheetId = config.spreadsheetId;
          formSelect.dataset.sheetName = config.sheetName;
          formSelect.dataset.formTitle = config.formTitle || '';
          formSelect.dataset.formUrl = config.formUrl || '';
        }
      }

      // Why (dead code 撤去): かつて #display-mode select が想定されていたが、現在 HTML には
      //   存在しない（実装は show-names checkbox に一本化されている）。残しても無効コード。
      //   showNames の復元は applyVisualizationConfig 内で行う（read/write 対称）。

      // 左パネル末尾の「💾 プロファイル『〇』に保存」ボタンを active profile に同期。
      //   毎 applyConfig で再生成することで row drift / textContent 読み出しの罠を回避。
      try {
        const btn = document.getElementById('save-to-profile-btn');
        const nameSpan = document.getElementById('save-to-profile-name');
        const active = config.activeProfile;
        if (btn) {
          if (active && typeof active === 'string') {
            btn.hidden = false;
            btn.dataset.profileName = active;
            if (nameSpan) nameSpan.textContent = '「' + active + '」';
          } else {
            btn.hidden = true;
            delete btn.dataset.profileName;
          }
        }
      } catch (e) { console.warn('save-to-profile-btn sync failed:', e && e.message); }

      // 「フォームを連携」セクションの検出済み表示 (purple block) を refresh。
      //   profile 切替後にも対象 form 名 / 回答先 SS が UI に反映されるよう、
      //   applyConfig の中で updateFormInfo を呼ぶ (旧コードは connectToDataSource 経由のみ)。
      if (config.formUrl || config.formTitle || config.spreadsheetId) {
        try {
          updateFormInfo({
            formUrl: config.formUrl || '',
            formTitle: config.formTitle || '',
            editUrl: config.formUrl ? config.formUrl.replace('/viewform', '/edit') : '',
            spreadsheetId: config.spreadsheetId || '',
            spreadsheetUrl: config.spreadsheetId ? ('https://docs.google.com/spreadsheets/d/' + config.spreadsheetId + '/edit') : '',
            spreadsheetName: config.formTitle ? (config.formTitle + ' (回答)') : '',
            sheetName: config.sheetName || ''
          });
        } catch (e) { console.warn('updateFormInfo from applyConfig failed:', e && e.message); }
      }

      // フォームURL表示を更新
      const formUrlDisplay = document.getElementById('form-url');
      if (formUrlDisplay) {
        if (config.formUrl) {
          formUrlDisplay.textContent = 'フォームを開く';
          formUrlDisplay.href = config.formUrl;
          formUrlDisplay.className = 'text-blue-400 hover:underline text-xs';
        } else {
          formUrlDisplay.textContent = '未設定';
          formUrlDisplay.href = '#';
          formUrlDisplay.className = 'text-sm text-theme-secondary';
        }
      }

      const formTitleDisplay = document.getElementById('form-title');
      if (formTitleDisplay) {
        if (config.formTitle) {
          formTitleDisplay.textContent = config.formTitle;
          formTitleDisplay.className = 'text-sm text-theme';
        } else {
          formTitleDisplay.textContent = '未設定';
          formTitleDisplay.className = 'text-sm text-theme-secondary';
        }
      }

      // Why: 可視化モードの保存済み値を UI に復元。
      //      DOM 要素が存在しないテンプレート（旧版）でも null safe で進める。
      applyVisualizationConfig(config);

    } catch (error) {
      console.error('❌ 設定反映エラー:', error.message);
    }
  }

  /**
   * 可視化モード関連の保存済み設定を UI に書き戻す。
   * applyConfig から呼ばれる。DOM 不在時は no-op。
   */
  function applyVisualizationConfig(config) {
    if (!config) return;

    // 1) boardMode セレクト
    //   Why: allowlist は validators.js / ConfigService.js の VALIDATOR_BOARD_MODES と整合させる。
    //   `wordcloud` / `pie` が漏れていると、当該 profile を「読み込んで編集」した際に UI が
    //   silently `auto` に downgrade し、続く autosave で profile の boardMode が破壊される
    //   (silent data loss)。
    const modeSelect = document.getElementById('board-mode-select');
    if (modeSelect) {
      const allowed = ['auto', 'board', 'numberline', 'matrix', 'wordcloud', 'pie'];
      const value = (config.displaySettings && allowed.includes(config.displaySettings.boardMode))
        ? config.displaySettings.boardMode
        : 'auto';
      modeSelect.value = value;
    }

    // 2) 軸ラベル
    const setText = (id, v) => {
      const el = document.getElementById(id);
      if (el) el.value = typeof v === 'string' ? v : '';
    };
    const x = config.xAxisLabels || {};
    const y = config.yAxisLabels || {};
    setText('x-min-label', x.min);
    setText('x-max-label', x.max);
    setText('y-min-label', y.min);
    setText('y-max-label', y.max);
    // 軸ラベル placeholder を ScaleItem 由来の値で動的に上書き (v2780)。
    //   getCurrentFormInfoSafe() が systemState から最新の formInfo を返すので、
    //   ボード復元時にも plceholder としてフォームの値が見えるようになる。
    try { applyAxisLabelPlaceholdersFromFormInfo(getCurrentFormInfoSafe()); } catch (_) {}

    // 3) 4象限ラベル
    const q = config.matrixQuadrantLabels || {};
    setText('quadrant-hh-label', q.hh);
    setText('quadrant-hl-label', q.hl);
    setText('quadrant-lh-label', q.lh);
    setText('quadrant-ll-label', q.ll);

    // 4) 再投稿許可: checkbox の状態を反映 + toggle 時に live Form の
    //    setLimitOneResponsePerUser を同期する (config だけ更新しても Form 側が
    //    1 回答制限のままだと「揺らぎ」追跡が実体としては不可能なため)。
    const allowEl = document.getElementById('allow-resubmit');
    if (allowEl) {
      allowEl.checked = !!config.allowResubmit;
      if (!allowEl.__formSyncAttached) {
        allowEl.__formSyncAttached = true;
        allowEl.addEventListener('change', () => {
          const formId = (window.UNIFIED_CONFIG && (window.UNIFIED_CONFIG.formId || window.UNIFIED_CONFIG.activeFormId)) || '';
          const formUrl = (window.UNIFIED_CONFIG && window.UNIFIED_CONFIG.formUrl) || '';
          const target = formId || formUrl;
          if (!target) return; // Form 未連携時は config 保存のみで OK (新規 Form 作成時に反映される)
          runServer('setFormAllowResubmit', target, allowEl.checked).then((res) => {
            if (res && res.success) setAutoSaveStatus('✓ Form 設定も更新しました', 'success');
            else setAutoSaveStatus('⚠ Form 設定の更新に失敗', 'error');
          }, () => setAutoSaveStatus('⚠ Form 設定の更新に失敗', 'error'));
        });
      }
    }

    // 4.5) 表示設定の checkbox 群（showNames / showReactions）
    //   Why: getDisplaySettings() の save パスは checkbox を読むのに、これまで load パスで
    //   復元していなかった。結果として「公開 → 管理パネル再表示 → checkbox 未チェック →
    //   気付かず再公開 → 設定が OFF にリセット」という silent data loss が起きていた。
    //   load 側でも明示的に復元することで、保存と読込の対称性を担保する。
    const ds = config.displaySettings || {};
    const showNamesEl = document.getElementById('show-names');
    if (showNamesEl) showNamesEl.checked = !!ds.showNames;
    const showReactionsEl = document.getElementById('show-reactions');
    if (showReactionsEl) showReactionsEl.checked = !!ds.showReactions;

    // 5) numericX/Y セレクトの値設定
    //    （オプションは fillColumnDropdowns 経由で headers から再生成されるが、
    //     その後にここで保存済み値を復元する）
    const setSelect = (id, v) => {
      const el = document.getElementById(id);
      if (!el) return;
      const val = typeof v === 'number' ? String(v) : '';
      // option が存在するかを軽くチェック（無ければ空のまま）
      const exists = Array.from(el.options).some(o => o.value === val);
      el.value = exists ? val : '';
    };
    const mapping = config.columnMapping || {};
    setSelect('numeric-x-column-select', mapping.numericX);
    setSelect('numeric-y-column-select', mapping.numericY);

    // 6) UI 表示状態を mode に合わせて更新
    updateVisualizationVisibility();
  }

  /**
   * boardMode に応じてサブセクションを表示/非表示する。
   *
   * | mode       | answer | reason | class | name | numericX | numericY | axis-X | axis-Y | 象限 | resubmit |
   * |------------|--------|--------|-------|------|----------|----------|--------|--------|------|----------|
   * | board      |   ✅   |   ✅   |  ✅   |  ✅  |    –     |    –     |   –    |   –    |  –   |    –     |
   * | pie        |   ✅   |   –    |  ✅   |  ✅  |    –     |    –     |   –    |   –    |  –   |    –     |
   * | wordcloud  |   ✅   |   ✅   |  ✅   |  ✅  |    –     |    –     |   –    |   –    |  –   |    –     |
   * | numberline |   ✅   |   ✅   |  ✅   |  ✅  |    ✅    |    –     |   ✅   |   –    |  –   |    ✅    |
   * | matrix     |   ✅   |   ✅   |  ✅   |  ✅  |    ✅    |    ✅    |   ✅   |   ✅   |  ✅  |    ✅    |
   * | auto       |   ✅   |   ✅   |  ✅   |  ✅  |    ✅    |    ✅    |   ✅   |   ✅   |  –   |    ✅    |
   *
   * answer/class/name は全モード必須。reason は pie のみ hide (集計用途で使われないため)。
   * numericX/Y は viz モード (numberline/matrix/auto) のみ。allow-resubmit は軸あるモードのみ。
   */
  function updateVisualizationVisibility() {
    const mode = document.getElementById('board-mode-select')?.value || 'auto';
    const show = (id, on) => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('hidden', !on);
    };

    const isMatrix = mode === 'matrix';
    const isViz = isMatrix || mode === 'numberline' || mode === 'auto';
    const config = COLUMN_MODE_CONFIG[mode] || COLUMN_MODE_CONFIG.auto;

    // 列 row の表示/非表示は COLUMN_MODE_CONFIG[mode] の key 有無で完全駆動。
    // 例: pie は { answer, class, name } のみ → reason / numericX/Y を hide。
    //     matrix は { numericX, numericY, reason, class, name } → answer を hide。
    Object.keys(COLUMN_SELECT_IDS).forEach(key => {
      show(`${key}-column-row`, !!config[key]);
    });

    // 数値列まわりは numericX の row 制御に加えコンテナ自体も切替 (区切り線 + 検出パネル含む)
    show('numeric-mapping-container', !!config.numericX || !!config.numericY);
    // 軸ラベル / 象限ラベル / 揺らぎ追跡 = 表示モード固有のサブ設定
    show('axis-labels-container', isViz);
    show('numeric-y-mapping-row', isMatrix || mode === 'auto');
    show('y-axis-label-row', isMatrix);
    show('quadrant-labels-container', isMatrix);
    show('allow-resubmit-row', isViz);

    applyColumnModeLabels(mode);
    if (typeof updateCompletionStatus === 'function') {
      try { updateCompletionStatus(); } catch (_) {}
    }

    const hint = document.getElementById('board-mode-hint');
    if (hint) {
      switch (mode) {
        case 'auto':
          hint.textContent = 'Forms「線形尺度」列の有無で自動判定（推奨）。';
          break;
        case 'board':
          hint.textContent = '従来のカード一覧表示に固定します。';
          break;
        case 'numberline':
          hint.textContent = '数直線（M1）で 1 軸の意見分布を可視化します。';
          break;
        case 'matrix':
          hint.textContent = 'X×Y のマトリクス（M2）で 2 軸の散布を可視化します。';
          break;
        case 'wordcloud':
          hint.textContent = 'ワードランキング（M3）：自由記述列の頻出語を棒グラフで表示。授業終末のメタ認知に。';
          break;
        case 'pie':
          hint.textContent = '円グラフ（M4）：メイン質問列の選択肢分布を円グラフで表示。授業導入時の集計に。';
          break;
      }
    }
  }

  // ハイドレーション専用の軽量列復元: loading overlay / toast / autosave をスキップして
  //   headers fetch + 保存済 mapping の dropdown 復元だけを実行する。
  //   connectToDataSource は user-triggered な「検証して接続」用 (重い + autosave 発火) なので分離。
  //   成功は silent (autosave-status は他用途で使うので noisy にしない)、失敗時のみフィードバック。
  async function silentlyRestoreColumnMapping(spreadsheetId, sheetName, savedMapping) {
    const setStatus = (typeof setAutoSaveStatus === 'function') ? setAutoSaveStatus : () => {};
    try {
      const result = await getColumnAnalysis(spreadsheetId, sheetName);
      if (!result || !result.success || !Array.isArray(result.headers)) {
        setStatus('⚠ フォーム情報取得失敗: ' + ((result && (result.message || result.error)) || '不明'), 'warning');
        return;
      }
      const mapping = (savedMapping && Object.keys(savedMapping).length > 0)
        ? savedMapping : (result.mapping || {});
      fillColumnDropdowns(result.headers, mapping, result.confidence || {});
      // 数値列 select は明示的に復元/クリア (前 profile の stale 値を必ず一掃)
      const xs = document.getElementById('numeric-x-column-select');
      const ys = document.getElementById('numeric-y-column-select');
      if (xs) xs.value = (savedMapping && typeof savedMapping.numericX === 'number') ? String(savedMapping.numericX) : '';
      if (ys) ys.value = (savedMapping && typeof savedMapping.numericY === 'number') ? String(savedMapping.numericY) : '';
    } catch (e) {
      console.warn('silentlyRestoreColumnMapping failed:', e && e.message);
      setStatus('⚠ 自動接続に失敗。「検証して接続」を押すか URL を貼り直してください', 'warning');
    }
  }

  async function getColumnAnalysis(spreadsheetId, sheetName) {
    const gateKey = `getColumnAnalysis_${spreadsheetId}_${sheetName}`;
    if (!ClientMutex.acquire(gateKey)) {
      return { success: false, error: 'Analysis already in progress' };
    }
    try {
      return await runServer('getColumnAnalysis', spreadsheetId, sheetName);
    } catch (error) {
      console.error('❌ getColumnAnalysis direct error:', error);
      throw error;
    } finally {
      ClientMutex.release(gateKey);
    }
  }

  /**
   * 外部公開 WebApp URL を構築するための SSoT helper (v2772 追加)。
   *
   * Why: GAS の HTML は script.googleusercontent.com の sandbox iframe 内で実行されるため、
   *   `window.location.origin + pathname` を取ると iframe URL
   *   (例: https://n-xxxxx.script.googleusercontent.com/userCodeAppPanel) になる。
   *   これに `?mode=...` を付けても外部から到達できず 404。
   *   親 frame の本物の URL は `getWebAppUrl()` を server で呼ばないと取得できない。
   *
   *   各 callsite で個別に `window.location` 系を呼ぶと罠を踏み続けるので、必ずこの helper
   *   経由でビルドする。`_cachedWebAppUrl` を優先、未取得時は同期 fetch + callback。
   *
   * @param {string} mode - `?mode=` の値 (review / manual / appSetup / view 等)
   * @param {Object} [params] - 追加クエリパラメータ {key: value}
   * @param {Function} onReady - URL 取得後に呼ぶコールバック (url が引数)
   * @param {Function} [onError] - 取得失敗時のコールバック
   *
   * Note: `_cachedWebAppUrl` は SharedUtilities.html で `var` 宣言済の共有グローバル。
   *   ここで let / var 再宣言すると SyntaxError で AdminPanel 全 script が停止する (v2774 regression)。
   */
  function buildWebAppUrl(mode, params, onReady, onError) {
    const buildQuery = (base) => {
      const qs = ['mode=' + encodeURIComponent(mode)];
      if (params && typeof params === 'object') {
        Object.keys(params).forEach(k => {
          if (params[k] !== undefined && params[k] !== null && params[k] !== '') {
            qs.push(encodeURIComponent(k) + '=' + encodeURIComponent(String(params[k])));
          }
        });
      }
      return base + '?' + qs.join('&');
    };
    if (_cachedWebAppUrl) {
      try { onReady(buildQuery(_cachedWebAppUrl)); } catch (e) { console.warn('buildWebAppUrl onReady error:', e && e.message); }
      return;
    }
    runServer('getWebAppUrl').then((webAppUrl) => {
      if (webAppUrl) {
        _cachedWebAppUrl = webAppUrl;
        try { onReady(buildQuery(webAppUrl)); } catch (e) { console.warn('buildWebAppUrl onReady error:', e && e.message); }
      } else if (typeof onError === 'function') {
        onError(new Error('WebApp URL not available'));
      }
    }, (err) => {
      console.warn('buildWebAppUrl fetch failed:', err && err.message);
      if (typeof onError === 'function') onError(err);
    });
  }

  function openManualGuide() {
    if (window.notifications) {
      window.notifications.info('📚 使い方ガイドを開いています...', 2000);
    }
    buildWebAppUrl('manual', null,
      (url) => { window.open(url, '_blank'); },
      () => { if (window.notifications) window.notifications.error('使い方ガイドを開けませんでした。', 3000); }
    );
  }

  function updateResourceButtons(config) {
    const spreadsheetBtn = document.getElementById('open-spreadsheet-btn');
    const formBtn = document.getElementById('open-form-btn');
    const statusDiv = document.getElementById('resource-status');

    const saveDraftBtn = document.getElementById('save-draft');
    const publishNowBtn = document.getElementById('publish-now');

    const hasColumnMapping = !!(config.columnMapping && Object.keys(config.columnMapping).length > 0);
    const hasSpreadsheetConfig = !!(config.spreadsheetId && config.sheetName);
    const isSetupComplete = config.setupStatus === 'completed' ||
      (hasSpreadsheetConfig && hasColumnMapping);

    if (saveDraftBtn) {
      if (hasSpreadsheetConfig) {
        saveDraftBtn.disabled = false;
        saveDraftBtn.textContent = hasColumnMapping ? '下書き保存' : '下書き保存（列設定推奨）';
        saveDraftBtn.classList.remove('opacity-50');
      } else {
        saveDraftBtn.disabled = true;
        saveDraftBtn.textContent = '下書き保存（データソース未接続）';
        saveDraftBtn.classList.add('opacity-50');
      }
    }

    if (publishNowBtn) {
      if (hasSpreadsheetConfig && hasColumnMapping) {
        publishNowBtn.disabled = false;
        publishNowBtn.textContent = '今すぐ公開';
        publishNowBtn.classList.remove('opacity-50');
      } else {
        publishNowBtn.disabled = true;
        if (!hasSpreadsheetConfig) {
          publishNowBtn.textContent = '今すぐ公開（データソース未接続）';
        } else {
          publishNowBtn.textContent = '今すぐ公開（列設定が必要）';
        }
        publishNowBtn.classList.add('opacity-50');
      }
    }

    const hasSpreadsheet = !!(config && config.spreadsheetId);
    if (spreadsheetBtn) {
      spreadsheetBtn.disabled = !hasSpreadsheet;
      spreadsheetBtn.dataset.spreadsheetId = hasSpreadsheet ? config.spreadsheetId : '';
      spreadsheetBtn.classList.toggle('opacity-50', !hasSpreadsheet);

      if (hasSpreadsheet) {
        spreadsheetBtn.onclick = () => {
          // 連打抑制: 新タブが複数開かないよう 800ms gate
          if (!window.sharedUtilities?.buttons?.navOnce(spreadsheetBtn)) return;
          window.open('https://docs.google.com/spreadsheets/d/' + config.spreadsheetId + '/edit', '_blank');
        };
      }
    }

    const hasForm = !!(config && config.formUrl && isValidFormUrl(config.formUrl));
    if (formBtn) {
      formBtn.disabled = !hasForm;
      formBtn.dataset.formUrl = hasForm ? config.formUrl : '';
      formBtn.classList.toggle('opacity-50', !hasForm);

      if (hasForm) {
        formBtn.onclick = () => {
          if (!window.sharedUtilities?.buttons?.navOnce(formBtn)) return;
          window.open(config.formUrl, '_blank');
        };
      }
    }

    if (statusDiv) {
      statusDiv.textContent = '';
      statusDiv.className = 'hidden';
    }

    updateAIAnalyzeButtonState(config);
    updateConfigSummary(config);
  }

  function updateAIAnalyzeButtonState(config) {
    const aiAnalyzeBtn = document.getElementById('ai-analyze-btn');
    if (!aiAnalyzeBtn) return;

    const hasSpreadsheetConfig = !!(config && config.spreadsheetId && config.sheetName);
    const hasHeaders = Array.isArray(window.currentHeaders) && window.currentHeaders.length > 0;
    const hasDropdownOptions = document.querySelectorAll('#answer-column-select option').length > 1; // "未選択"以外のオプション
    const canAnalyze = hasSpreadsheetConfig && (hasHeaders || hasDropdownOptions);

    if (canAnalyze) {
      aiAnalyzeBtn.disabled = false;
      aiAnalyzeBtn.textContent = '🤖 自動推定';
      aiAnalyzeBtn.classList.remove('opacity-50');
    } else {
      aiAnalyzeBtn.disabled = true;
      if (!hasSpreadsheetConfig) {

      } else {

  function updateSystemState(updates = {}) {
    const { spreadsheetId, sheetName, columnMapping, setupStatus, formUrl, formTitle, needsProgress = false } = updates;

    if (spreadsheetId || sheetName || columnMapping || setupStatus || formUrl || formTitle) {
      systemState.config = {
        ...systemState.config,
        ...(spreadsheetId && { spreadsheetId }),
        ...(sheetName && { sheetName }),
        ...(columnMapping && { columnMapping }),
        ...(setupStatus && { setupStatus }),
        ...(formUrl && { formUrl }),
        ...(formTitle && { formTitle })
      };
    }

    updateAIAnalyzeButtonState(systemState.config);
    updateResourceButtons(systemState.config);

    if (needsProgress) {
      const hasSpreadsheetConfig = systemState.config?.spreadsheetId && systemState.config?.sheetName;
      const hasColumnMapping = systemState.config?.columnMapping && Object.keys(systemState.config.columnMapping).length > 0;
      const step = hasSpreadsheetConfig && hasColumnMapping ? 3 : (hasSpreadsheetConfig ? 2 : 1);
      updateProgress(step);
    }
  }

  /**
   * ドロップダウンから選択されたフォームを検証
   * @param {string} formUrl - フォームURL
   */
  async function validateFormFromDropdown(formUrl) {
    const formSelect = document.getElementById('form-select');
    const formInfo = document.getElementById('form-info');
    const formTitle = document.getElementById('form-title');
    const formSpreadsheetStatus = document.getElementById('form-spreadsheet-status');
    const formUrlLink = document.getElementById('form-url');

    if (!formUrl) {
      hideFormInfo();
      return;
    }

    // ローディング表示
    if (formInfo) {
      formInfo.classList.remove('hidden');
      if (formTitle) formTitle.textContent = '検証中...';
      if (formSpreadsheetStatus) formSpreadsheetStatus.textContent = '-';
    }

    let result;
    try {
      result = await runServer('processFormUrlInput', formUrl);
    } catch (error) {
      if (formTitle) formTitle.textContent = 'エラー';
      if (formSpreadsheetStatus) formSpreadsheetStatus.textContent = error.message;
      showError(error.message || '検証エラーが発生しました');
      return;
    }

    if (!(result && result.success)) {
      if (formTitle) formTitle.textContent = 'エラー';
      if (formSpreadsheetStatus) formSpreadsheetStatus.textContent = (result && result.error) || '検証に失敗しました';
      showError((result && result.error) || '検証に失敗しました');
      return;
    }

    // フォーム情報を表示
    if (formTitle) formTitle.textContent = result.formTitle;
    if (formSpreadsheetStatus) {
      formSpreadsheetStatus.textContent = result.wasCreated ? '新規作成しました' : result.sheetName;
    }
    if (formUrlLink) {
      formUrlLink.href = result.formUrl;
      formUrlLink.textContent = 'フォームを開く';
    }
    formInfo?.classList.remove('hidden');

    // データを保持
    if (formSelect) {
      formSelect.dataset.spreadsheetId = result.spreadsheetId;
      formSelect.dataset.sheetName = result.sheetName;
      formSelect.dataset.formTitle = result.formTitle;
      formSelect.dataset.formUrl = result.formUrl;
    }

    if (result.wasCreated) showSuccess('回答先スプレッドシートを作成しました');

    // 検証完了表示を読ませる短い遅延の後に自動接続
    setTimeout(() => connectToDataSource(), AUTO_CONNECT_DELAY_MS);
  }

  /**
   * フォームURL自動解析（リアルタイム）+ 自動検証＆接続
   * @param {string} fullUrl - 入力されたフォームURL
   */
  function autoAnalyzeFormUrl(fullUrl) {
    if (!fullUrl || fullUrl.trim() === '') {
      hideFormDetectionInfo();
      updateUrlValidationMessage('💡 GoogleフォームのURLを貼り付けてください', 'info');
      return;
    }

    const urlInfo = parseFormUrlClientSide(fullUrl);

    if (!urlInfo.isValid) {
      hideFormDetectionInfo();
      updateUrlValidationMessage('⚠ GoogleフォームのURLを入力してください', 'warning');
      return;
    }

    const urlInput = document.getElementById('form-url-input');
    const trimmed = fullUrl.trim();
    if (urlInput && urlInput.dataset.lastValidatedUrl === trimmed) {
      return;
    }

    updateUrlValidationMessage('🔍 自動検証中...', 'info');
    window.sharedUtilities.debounce.debounce(
      () => validateCompleteUrl(),
      'auto-validate-url',
      600
    );
  }

  /**
   * クライアントサイドフォームURL解析
   * @param {string} url - 解析対象URL
   * @returns {Object} 解析結果
   */
  function parseFormUrlClientSide(url) {
    try {
      // フォームURL形式: /forms/d/{formId}/ または forms.gle/{shortId}
      const formMatch = url.match(/\/forms\/d\/([a-zA-Z0-9-_]+)/);
      const shortMatch = url.match(/forms\.gle\/([a-zA-Z0-9]+)/);

      if (!formMatch && !shortMatch) {
        return { isValid: false };
      }

      return {
        isValid: true,
        formId: formMatch ? formMatch[1] : shortMatch[1],
        isShortUrl: !!shortMatch
      };
    } catch (error) {
      console.warn('parseFormUrlClientSide error:', error.message);
      return { isValid: false };
    }
  }

  /**
   * URL検証メッセージを更新
   */
  function updateUrlValidationMessage(message, type) {
    const messageEl = document.getElementById('url-validation-message');
    if (messageEl) {
      messageEl.textContent = message;
      messageEl.className = 'text-xs mt-1 ';
      if (type === 'success') {
        messageEl.className += 'text-green-400';
      } else if (type === 'warning') {
        messageEl.className += 'text-yellow-400';
      } else if (type === 'error') {
        messageEl.className += 'text-red-400';
      } else {
        messageEl.className += 'text-theme-muted';
      }
    }
  }

  /**
   * フォームURL検証 - processFormUrlInput API使用
   */
  function validateCompleteUrl() {
    const urlInput = document.getElementById('form-url-input');
    const validateBtn = document.getElementById('url-validate');

    if (!urlInput) {
      console.error('form-url-input element not found');
      return;
    }

    const formUrl = urlInput.value.trim();

    if (!formUrl) {
      // 自動検証経路では showError を出さない (空入力時に呼ばれない設計)
      updateUrlValidationMessage('⚠ GoogleフォームのURLを入力してください', 'warning');
      return;
    }

    // クライアント側で簡易チェック
    const urlInfo = parseFormUrlClientSide(formUrl);
    if (!urlInfo.isValid) {
      updateUrlValidationMessage('⚠ GoogleフォームのURLを入力してください', 'warning');
      return;
    }

    if (validateBtn) {
      validateBtn.disabled = true;
      validateBtn.classList.add('btn-busy');
    }

    runServer('processFormUrlInput', formUrl).then((result) => {
      if (validateBtn) {
        validateBtn.disabled = false;
        validateBtn.classList.remove('btn-busy');
      }

      if (!(result && result.success)) {
        hideFormDetectionInfo();
        // 自動検証経路ではトーストを出さず、メッセージ欄だけに留める (URL 入力途中で
        // server が一時的に失敗するケースで連続トーストが鬱陶しくならないように)。
        updateUrlValidationMessage('⚠ ' + ((result && result.error) || '検証に失敗しました'), 'error');
        return;
      }

      // フォーム情報を表示
      showFormDetectionInfo(result);

      // データを保持
      urlInput.dataset.spreadsheetId = result.spreadsheetId;
      urlInput.dataset.sheetName = result.sheetName;
      urlInput.dataset.formTitle = result.formTitle;
      urlInput.dataset.formUrl = result.formUrl;
      // 同一 URL の再検証を抑止 (autoAnalyzeFormUrl が dataset.lastValidatedUrl を見て skip)
      urlInput.dataset.lastValidatedUrl = formUrl;

      if (result.wasCreated) showSuccess('回答先スプレッドシートを作成しました');
      updateUrlValidationMessage('✓ 接続しました', 'success');

      // 検証完了表示を読ませる短い遅延の後に自動接続
      setTimeout(() => connectToDataSource(), AUTO_CONNECT_DELAY_MS);
    }, (error) => {
      if (validateBtn) {
        validateBtn.disabled = false;
        validateBtn.classList.remove('btn-busy');
      }
      console.error('❌ processFormUrlInput error:', error);
      updateUrlValidationMessage('⚠ ' + ((error && error.message) || 'エラーが発生しました'), 'error');
    });
  }

  async function manualColumnAnalysis() {
    const spreadsheetId = getCurrentSpreadsheetId();
    const sheetName = getCurrentSheetName();

    if (!spreadsheetId || !sheetName) {
      showError('先にフォームを接続してください');
      return;
    }

    try {
      window.setLoading(true, '処理中...');
      showInfo('自動推定実行中...', 3000);

      await performColumnAnalysis(spreadsheetId, sheetName);

      const currentMapping = getColumnMapping();
      updateSystemState({
        spreadsheetId,
        sheetName,
        columnMapping: currentMapping,
        setupStatus: 'completed',
        needsProgress: true
      });

      showSuccess('自動推定完了！設定を確認してください');
      try { scheduleAutoSave(); } catch (_) {}
    } catch (error) {
      console.error('手動自動推定エラー:', error);
      showError('自動推定に失敗しました。接続を確認して再試行してください');
    } finally {
      window.setLoading(false);
    }
  }

  async function performColumnAnalysis(spreadsheetId, sheetName, retryCount = 0) {
    const maxRetries = 3;
    const retryDelay = Math.pow(2, retryCount) * 1000; // 指数バックオフ

    try {
      const analysisResult = await getColumnAnalysis(spreadsheetId, sheetName);

      const qualityCheck = validateAnalysisResult(analysisResult);

      if (!qualityCheck.isValid) {
        if (retryCount < maxRetries) {
          showInfo(`分析品質向上のため再試行中... (${retryCount + 2}/${maxRetries + 1})`, 3000);

          // setTimeout instead of microtask busy-wait loop.
          await new Promise((resolve) => setTimeout(resolve, retryDelay));

          return performColumnAnalysis(spreadsheetId, sheetName, retryCount + 1);
        } else {
          console.error('🚫 最大リトライ回数に到達、品質不足の結果を使用');
          showWarning('自動推定の精度が期待値を下回りましたが、利用可能な結果を表示します', 5000);
        }
      }

      if (!analysisResult || !analysisResult.success) {
        throw new Error('列分析に失敗しました');
      }

      if (!analysisResult.headers || !Array.isArray(analysisResult.headers) || analysisResult.headers.length === 0) {
        throw new Error('ヘッダー情報が取得できませんでした');
      }

      fillColumnDropdowns(analysisResult.headers, analysisResult.mapping, analysisResult.confidence);

      // Why: 線形尺度（Forms「リニアスケール」）列の検出結果をユーザに可視化。
      //      mapping には auto-merged numericX/Y が既に入っているが、教師には
      //      「どの列が候補と判定されたか」を見せて理解を促す。
      displayNumericCandidates(analysisResult.numericScaleCandidates, analysisResult.headers);

      // 可視化モード関連 UI を boardMode に応じて再表示。
      // mapping が変わると auto モードの効果モードも変わるため、表示状態を更新する。
      try { updateVisualizationVisibility(); } catch (_) {}

      displayAnalysisQualityReport(analysisResult, qualityCheck);

      updateCompletionStatus();

    } catch (error) {
      console.error(`❌ 列分析エラー (試行 ${retryCount + 1}):`, error);

      if (retryCount < maxRetries && isRetryableError(error)) {
        showInfo(`接続エラーのため再試行中... (${retryCount + 2}/${maxRetries + 1})`, 3000);

        await new Promise((resolve) => setTimeout(resolve, retryDelay));
        return performColumnAnalysis(spreadsheetId, sheetName, retryCount + 1);
      }

      console.error('🚫 列分析の全試行が失敗しました');

      try {
        await attemptEmergencyFallback(spreadsheetId, sheetName);
      } catch (fallbackError) {
        console.error('🚫 緊急フォールバックも失敗:', fallbackError.message);
        throw new Error(`分析に失敗しました (全${maxRetries + 1}回試行): ${error.message}`);
      }
    }
  }

  /**
   * 🔍 分析結果品質検証
   *
   * Why mode-aware: 現在の表示モード (COLUMN_MODE_CONFIG) から「必須列」を抽出する。
   *   matrix なら numericX/Y、pie なら answer のみ、と動的に変化させる。
   *   旧コード ['answer','name','class'] は board モード前提で他モードと矛盾していた。
   */
  function validateAnalysisResult(result) {
    if (!result || !result.success) {
      return { isValid: false, reason: 'API呼び出し失敗' };
    }
    const mapping = result.mapping || {};
    const confidence = result.confidence || {};
    const mode = (document.getElementById('board-mode-select') || {}).value || 'auto';
    const cfg = COLUMN_MODE_CONFIG[mode] || COLUMN_MODE_CONFIG.auto;
    const requiredFields = Object.keys(cfg).filter(k => cfg[k].required);

    const detectedCount = requiredFields.filter(field =>
      mapping[field] !== undefined && confidence[field] > 30
    ).length;
    const avgConfidence = Object.values(confidence).length > 0
      ? Object.values(confidence).reduce((sum, c) => sum + c, 0) / Object.values(confidence).length
      : 0;

    const isValid = detectedCount >= requiredFields.length && avgConfidence >= 40;

    return {
      isValid,
      reason: !isValid ? `必須列検出: ${detectedCount}/${requiredFields.length}, 平均信頼度: ${avgConfidence.toFixed(1)}%` : 'OK',
      detectedCount,
      avgConfidence
    };
  }

  /**
   * 🔄 リトライ可能エラー判定
   */
  function isRetryableError(error) {
    const retryableMessages = [
      'network', 'timeout', 'connection', '接続', 'アクセス',
      'temporary', 'busy', 'rate limit', '一時的', 'サーバー'
    ];

    const message = error.message.toLowerCase();
    return retryableMessages.some(pattern => message.includes(pattern));
  }

  /**
   * 🆘 緊急フォールバック処理
   */
  async function attemptEmergencyFallback(spreadsheetId, sheetName) {
    showWarning('自動推定に問題が発生しました。基本的なヘッダー情報のみ取得します。', 5000);

    try {
      // Why getColumnAnalysis (not getSheetHeaders): backend getSheetHeaders(sheet) takes
      // a Sheet object, not (spreadsheetId, sheetName). getColumnAnalysis extracts headers
      // directly from sheet.getRange even when downstream diagnostics fail, so it serves
      // as the correct "spreadsheetId/sheetName → headers" endpoint for this fallback path.
      const basicResult = await runServer('getColumnAnalysis', spreadsheetId, sheetName);

      if (basicResult && basicResult.headers) {
        fillColumnDropdowns(basicResult.headers, {}, {});
        showWarning('手動で列を設定してください。自動推定は利用できませんでした。', 8000);
      }

    } catch (basicError) {
      throw new Error('基本的なデータ取得も失敗しました');
    }
  }

  /**
   * 📊 分析品質レポート表示
   */
  function displayAnalysisQualityReport(result, quality) {
    const detectedFields = Object.keys(result.mapping || {}).length;
    const avgConfidence = quality.avgConfidence;

    let qualityLevel = 'excellent';
    if (avgConfidence < 60) qualityLevel = 'good';
    if (avgConfidence < 40) qualityLevel = 'fair';
    if (avgConfidence < 20) qualityLevel = 'poor';

    const qualityIcons = {
      excellent: '🎯',
      good: '✅',
      fair: '⚠️',
      poor: '🔍'
    };

    const qualityMessages = {
      excellent: `高精度分析完了 (${detectedFields}フィールド検出, 平均${avgConfidence.toFixed(1)}%信頼度)`,
      good: `良好な分析結果 (${detectedFields}フィールド検出, 平均${avgConfidence.toFixed(1)}%信頼度)`,
      fair: `分析完了 (${detectedFields}フィールド検出, 平均${avgConfidence.toFixed(1)}%信頼度) - 手動確認推奨`,
      poor: `分析結果が不十分 (${detectedFields}フィールド検出, 平均${avgConfidence.toFixed(1)}%信頼度) - 手動設定推奨`
    };

    const icon = qualityIcons[qualityLevel];
    const message = qualityMessages[qualityLevel];

    showSuccess(`${message}`, 6000);
  }

  // URL 方式 (form-url-input) を優先し、無ければ form-select の dataset にフォールバック。
  function getCurrentDataSourceField(field) {
    const urlInput = document.getElementById('form-url-input');
    if (urlInput && urlInput.dataset[field]) {
      return urlInput.dataset[field];
    }
    const formSelect = document.getElementById('form-select');
    if (formSelect && formSelect.dataset[field]) {
      return formSelect.dataset[field];
    }
    return null;
  }

  function getCurrentSpreadsheetId() {
    return getCurrentDataSourceField('spreadsheetId');
  }

  function getCurrentSheetName() {
    return getCurrentDataSourceField('sheetName');
  }

  function updateCompletionStatus() {
    // モード別の必須/任意セットを COLUMN_MODE_CONFIG から動的に取得。
    // 例: matrix なら必須=numericX/Y の 2 つ。pie なら必須=answer の 1 つ。
    const mode = (document.getElementById('board-mode-select') || {}).value || 'auto';
    const config = COLUMN_MODE_CONFIG[mode] || COLUMN_MODE_CONFIG.auto;
    const keys = Object.keys(config);
    const required = keys.filter(k => config[k].required);
    const optional = keys.filter(k => !config[k].required);

    const isFilled = (key) => {
      const select = document.getElementById(COLUMN_SELECT_IDS[key]);
      return !!(select && select.value);
    };
    const requiredCompleted = required.filter(isFilled).length;
    const optionalCompleted = optional.filter(isFilled).length;

    const statusElement = document.getElementById('completion-status');
    if (statusElement) {
      const isRequiredComplete = required.length === 0 || requiredCompleted === required.length;
      const statusIcon = isRequiredComplete
        ? (optional.length === 0 || optionalCompleted === optional.length ? '🟢' : '🟡')
        : '⚪';
      statusElement.textContent = `${statusIcon} 必須: ${requiredCompleted}/${required.length} 任意: ${optionalCompleted}/${optional.length}`;
    }
  }

  async function connectToDataSource() {
    const gateKey = 'connectToDataSource';
    if (!ClientMutex.acquire(gateKey)) {
      showInfo('現在処理中です…少し待ってから再試行してください。');
      return;
    }

    let spreadsheetId = getCurrentSpreadsheetId() || '';
    let sheetName = getCurrentSheetName() || '';
    const method = document.getElementById('form-url-input')?.dataset?.spreadsheetId ? 'URL' : 'dropdown';

    try {

      if (!spreadsheetId || !sheetName) {
        showError('GoogleフォームのURLを入力するか、一覧から選択してください');
        ClientMutex.release(gateKey);
        return;
      }

      window.setLoading(true, '処理中...');

      const result = await processBatchOperations([
        { type: 'validateAccess', spreadsheetId, sheetName },
        { type: 'getFormInfo', spreadsheetId, sheetName },
        { type: 'connectDataSource', spreadsheetId, sheetName }
      ]);

      if (result.success) {
        const successDetails = [];
        successDetails.push('✅ データソース接続完了');

        if (result.batchResults && result.batchResults.formInfo) {
          successDetails.push('📋 フォーム連携確認済み');
          displayFormInfo(result.batchResults.formInfo.formData, {
            status: 'linked',
            spreadsheetName: result.batchResults.formInfo.spreadsheetName
          });
        }

        showSuccess(successDetails.join(' | '));

        // フォーム情報を取得
        const formInfo = result.batchResults?.formInfo?.formData || getCurrentFormInfoSafe();
        const formUrl = formInfo?.formUrl || null;
        const formTitle = formInfo?.formTitle || null;

        // 軸ラベル自動補完 (v2780): ScaleItem.{getLeftLabel,getRightLabel} を空欄入力に差し込む。
        //   既存ユーザーの手入力値は壊さない (空欄のみ補完)。
        try { autofillAxisLabelsFromFormInfo(formInfo); } catch (_) { /* best effort */ }

        if (result.headers && result.mapping) {
          fillColumnDropdowns(result.headers, result.mapping, result.confidence);

          updateSystemState({
            spreadsheetId,
            sheetName,
            columnMapping: result.mapping,
            setupStatus: 'completed',
            formUrl,
            formTitle,
            needsProgress: true
          });

          showSuccess('接続と自動推定が完了しました！');
          // programmatic な fillColumnDropdowns では change が発火しないので明示 schedule する
          try { scheduleAutoSave(); } catch (_) {}
        } else {
          showInfo('自動推定実行中...', 3000);
          try {
            await performColumnAnalysis(spreadsheetId, sheetName);

            const currentMapping = getColumnMapping();
            updateSystemState({
              spreadsheetId,
              sheetName,
              columnMapping: currentMapping,
              setupStatus: 'completed',
              formUrl,
              formTitle
            });

            showSuccess('自動推定完了！設定を確認してください');
            try { scheduleAutoSave(); } catch (_) {}
          } catch (analysisError) {
            console.warn('自動推定エラー:', analysisError);
            showWarning('自動推定に失敗しました。手動で設定するか「自動推定」ボタンで再実行してください');
          }
        }
        // フォーム名で profile を自動保存。同 session の連打を防ぐため _knownProfileNames でガード。
        if (formTitle && typeof formTitle === 'string') {
          const autoProfileName = String(formTitle).trim().substring(0, 50);
          if (autoProfileName && !_knownProfileNames.has(autoProfileName)) {
            _knownProfileNames.add(autoProfileName);
            runServer('saveCurrentAsProfile', autoProfileName).then((res) => {
              if (res && res.success) {
                showSuccess(`📋 プロファイル「${autoProfileName}」として自動保存しました`, 4000);
                if (typeof loadProfileList === 'function') loadProfileList();
              }
              // 失敗時は silent (set からも削除しない: 同 session 内の連打を防ぐ)
            }, (err) => {
              console.warn('auto-save profile failed (silent):', err && err.message);
            });
          }
        }
      } else {
        handleConnectionError(result.message || result.error || 'データソース接続に失敗しました', { spreadsheetId, sheetName, method });
      }
    } catch (error) {
      console.error('connectToDataSource エラー:', error);
      handleConnectionError(error.message || error, { spreadsheetId, sheetName, method });
    } finally {
      window.setLoading(false);
      ClientMutex.release(gateKey);
    }
  }

  async function processBatchOperations(operations) {
    if (!operations || !Array.isArray(operations) || operations.length === 0) {
      throw new Error('Invalid operations array');
    }

    const firstOp = operations[0];
    const isConsistent = operations.every(op =>
      op.spreadsheetId === firstOp.spreadsheetId &&
      op.sheetName === firstOp.sheetName
    );

    if (!isConsistent) {
      throw new Error('All operations must have the same spreadsheetId and sheetName');
    }

    return runServer('connectDataSource', firstOp.spreadsheetId, firstOp.sheetName, operations);
  }

  function handleConnectionError(errorMessage, context) {
    console.error('Connection error details:', { errorMessage, context });

    let userMessage = 'データソースへの接続に失敗しました。';
    let suggestions = [];

    if (context && context.validation && context.validation.details) {
      const validationDetails = context.validation.details;

      if (validationDetails.connectionVerified === false) {
        userMessage = 'フォームの回答先への接続に失敗しました。';
        suggestions.push('フォームの編集権限があることを確認してください');
        suggestions.push('サービスアカウントに編集者権限が付与されているか確認してください');

        if (validationDetails.connectionError) {
          suggestions.push(`詳細: ${validationDetails.connectionError}`);
        }
      }

      if (validationDetails.formInfoVerified === false) {
        userMessage += ' フォーム情報の取得にも失敗しました。';
        suggestions.push('フォームとスプレッドシートの連携を確認してください');

        if (validationDetails.formInfoError) {
          suggestions.push(`フォーム詳細: ${validationDetails.formInfoError}`);
        }
      }

      if (validationDetails.formUrlMatches === false && validationDetails.detectedFormUrl) {
        userMessage += ' 入力URLとシステム検出URLが異なります。';
        suggestions.push(`検出されたURL: ${validationDetails.detectedFormUrl}`);
        suggestions.push('正しいフォームURLを使用しているか確認してください');
      }
    } else {
      if (errorMessage.includes('Permission') || errorMessage.includes('権限')) {
        suggestions.push('フォームの編集権限があることを確認してください');
        suggestions.push('回答先スプレッドシートへのアクセス権限を確認してください');
      } else if (errorMessage.includes('not found') || errorMessage.includes('見つかりません')) {
        suggestions.push('指定されたフォームまたは回答シートが存在するか確認してください');
        suggestions.push('シート名が正確か確認してください');
      } else if (errorMessage.includes('timeout') || errorMessage.includes('タイムアウト')) {
        suggestions.push('ネットワーク接続を確認してください');
        suggestions.push('しばらく時間をおいて再試行してください');
      } else {
        suggestions.push('フォームにアクセスできることを確認してください');
        suggestions.push('手動で列を設定することも可能です');
      }
    }

    const fullMessage =
      userMessage + '\n\n推奨対処法:\n' + suggestions.map((s) => '• ' + s).join('\n');
    showError(fullMessage);

    showInfo('ドロップダウンを使用して手動で列を設定できます。');
  }

  function updateProgress(step) {
    const steps = document.querySelectorAll('.step');
    steps.forEach((stepEl, index) => {
      stepEl.classList.remove('completed', 'current');
      if (index < step - 1) {
        stepEl.classList.add('completed');
      } else if (index === step - 1) {
        stepEl.classList.add('current');
      }
    });
  }

  // モード別に「どの列が必須/任意/非表示か」 + ラベルの動的差し替え定義。

  /**
   * モード別に dropdown のラベル + 必須/任意 を反映する。
   * Why: 「メイン質問列」は board では大きく表示する列、pie では選択肢集計列、
   *      matrix では X軸の数値、と意味が変わる。教師には「最終的に何になるか」が
   *      ラベルで分かることが大事 (内部 key は固定でも UI は動的)。
   */
  function applyColumnModeLabels(mode) {
    const config = COLUMN_MODE_CONFIG[mode] || COLUMN_MODE_CONFIG.auto;
    Object.keys(COLUMN_SELECT_IDS).forEach(key => {
      const selectId = COLUMN_SELECT_IDS[key];
      const labelEl = document.querySelector('label[for="' + selectId + '"]');
      const def = config[key];
      if (!labelEl || !def) return;
      while (labelEl.firstChild) labelEl.removeChild(labelEl.firstChild);
      labelEl.appendChild(document.createTextNode(def.label + ': '));
      const hintSpan = document.createElement('span');
      hintSpan.className = 'text-xs ml-2 ' + (def.required ? 'text-red-300' : 'text-theme-muted');
      hintSpan.textContent = (def.required ? '【必須】 ' : '(任意) ') + def.hint;
      labelEl.appendChild(hintSpan);
    });
  }

  // backend ColumnMappingService.__SYSTEM_HEADER_PATTERNS と同じセット。frontend では
  // dropdown から除外するために使う (タイムスタンプ + UNDERSTAND/LIKE/CURIOUS/HIGHLIGHT
  // などはどの役割にも該当しない管理列)。
  const __SYSTEM_COLUMN_PATTERNS = [
    /^タイムスタンプ$/i, /^timestamp$/i, /^日時$/i, /^日付$/i,
    /^UNDERSTAND$/i, /^LIKE$/i, /^CURIOUS$/i, /^HIGHLIGHT$/i,
    /^理解$/i, /^いいね$/i, /^気になる$/i, /^ハイライト$/i,
    /^_/
  ];
  function __isSystemColumnHeader(header) {
    if (!header || typeof header !== 'string') return false;
    const trimmed = header.trim();
    if (!trimmed) return false;
    return __SYSTEM_COLUMN_PATTERNS.some(p => p.test(trimmed));
  }

  function fillColumnDropdowns(headers, mapping, confidence = {}) {

    try {
      if (!Array.isArray(headers) || headers.length === 0) {
        return;
      }
      // Why: updateAIAnalyzeButtonState / resetToAIDetection 等が window.currentHeaders を
      //      参照する。fillColumnDropdowns は全 entry path で必ず呼ばれるので、ここで一元化。
      window.currentHeaders = headers;

      if (!mapping || typeof mapping !== 'object') {
        mapping = {};
      }
      if (!confidence || typeof confidence !== 'object') {
        confidence = {};
      }

      // Why: 可視化モード（M1/M2）用の数値列セレクトも同じ headers から構築する。
      //      DOM 不在のテンプレートでも null safe（forEach 内で skip）。
      const dropdowns = __getAllColumnDropdowns();

      // Why: numericX/Y は「（自動判定）」を空 value のプレースホルダーとして使う。
      //      他の必須列は「選択してください...」表示で UX を分ける。
      const placeholderFor = (k) => (k === 'numericX' || k === 'numericY')
        ? '<option value="">（自動判定 / 未使用）</option>'
        : '<option value="">選択してください...</option>';

      Object.keys(dropdowns).forEach((columnType) => {
        const dropdown = dropdowns[columnType];
        if (!dropdown) {
          return;
        }

        try {
          dropdown.innerHTML = placeholderFor(columnType);

          headers.forEach((header, index) => {
            if (!header || !header.trim()) return;
            // システム列 (タイムスタンプ + リアクション + HIGHLIGHT + _internal) は
            // どの役割にも該当しないので dropdown に出さない。
            // 同じ regex を backend (__SYSTEM_HEADER_PATTERNS) と同期しておく。
            if (__isSystemColumnHeader(header)) return;
            const option = document.createElement('option');
            option.value = index;
            option.textContent = `${String.fromCharCode(65 + index)}列: ${header}`;
            dropdown.appendChild(option);
          });
        } catch (error) {
          console.error(`${columnType}ドロップダウンの設定エラー:`, error);
        }
      });

      // numericX/Y は AI Detection の対象外（patterns に無いため）。
      // 既存 mapping に numericX/Y があれば、対応する dropdown に値をセット。
      const presetIfNumber = (id, v) => {
        const el = document.getElementById(id);
        if (el && typeof v === 'number') el.value = String(v);
      };
      presetIfNumber('numeric-x-column-select', mapping.numericX);
      presetIfNumber('numeric-y-column-select', mapping.numericY);

      setAIDetectionSelections(mapping, dropdowns, confidence, headers);

      setupDropdownEventListeners(dropdowns);
    } catch (error) {
      console.error('fillColumnDropdowns エラー:', error);
      showError('ドロップダウンの設定に失敗しました: ' + error.message);
    }
  }

  /**
   * Forms「線形尺度」列の自動検出結果を UI 上に表示する。
   *
   * Why: backend は detectNumericScaleColumns() で 1-N 整数の列を検出し、
   *      上位 2 件を自動で numericX/Y にマージする。教師には「どの列が
   *      候補として認識されたか」と「どの範囲（min-max）か」を見せて
   *      理解と上書きの可能性を提供する。
   *
   * candidates が空ならパネルを隠す（情報過多回避）。
   */
  function displayNumericCandidates(candidates, headers) {
    const panel = document.getElementById('numeric-candidates-info');
    const list = document.getElementById('numeric-candidates-list');
    if (!panel || !list) return;

    if (!Array.isArray(candidates) || candidates.length === 0) {
      panel.classList.add('hidden');
      list.innerHTML = '';
      return;
    }

    const colLabel = (idx) => {
      if (idx < 26) return String.fromCharCode(65 + idx) + '列';
      // 27+ は AA, AB... A1 表記で簡易対応
      return String.fromCharCode(64 + Math.floor(idx / 26)) +
             String.fromCharCode(65 + (idx % 26)) + '列';
    };
    const safe = (s) => String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    list.innerHTML = candidates.slice(0, 4).map((c, i) => {
      const role = i === 0 ? 'X軸' : (i === 1 ? 'Y軸' : '候補');
      const header = c.header || (Array.isArray(headers) ? headers[c.index] : '') || '';
      return `<div>📏 <strong>${role}</strong>: ${colLabel(c.index)}「${safe(header)}」`
           + ` (範囲 ${c.min}-${c.max}, 信頼度 ${c.confidence}%)</div>`;
    }).join('');
    panel.classList.remove('hidden');
  }

  // 列ごとの「高信頼度」閾値。種別ごとにマッチ特性が異なるため個別設定。
  // - 必須列 (answer): 低めの閾値で「自動推定で OK」と表示しやすく
  // - 識別子列 (name): 表記揺れがあるためやや高め
  // - パターン列 (class): 明確なため高め
  const COLUMN_CONFIDENCE_THRESHOLDS = {
    answer: 75,
    reason: 70,
    name: 80,
    class: 85
  };

  function setAIDetectionSelections(mapping, dropdowns, confidence = {}, headers = []) {
    if (!mapping || typeof mapping !== 'object') return;
    const hasValidMapping = Object.keys(mapping).length > 0;
    const hasConfidenceData = Object.keys(confidence || {}).length > 0;
    if (!hasValidMapping && !hasConfidenceData) return;

    window.currentAIMapping = mapping;

    Object.keys(dropdowns).forEach((columnType) => {
      const dropdown = dropdowns[columnType];
      if (!dropdown) return;
      __applyAutoDetectionForColumn({ columnType, dropdown, mapping, confidence });
    });
    updateCompletionStatus();
  }

  // 1 つの dropdown に対する自動推定結果の適用。
  // Why: columnType と backend mapping key は 1:1 (answer/reason/class/name/numericX/numericY)。
  //      mapping[columnType] が undefined ならその列は推定できなかった = badge スキップ。
  function __applyAutoDetectionForColumn({ columnType, dropdown, mapping, confidence }) {
    const selectedIndex = (mapping[columnType] !== null && mapping[columnType] !== undefined)
      ? mapping[columnType]
      : null;
    const columnConfidence = (confidence && confidence[columnType] !== undefined)
      ? confidence[columnType]
      : 0;

    if (selectedIndex !== null) {
      dropdown.value = selectedIndex;
      // Why dropdown.value 再確認: savedMapping の index が現在の headers に存在しない場合
      //   (system 列除外で消えた / 列が削除された / 範囲外) は dropdown.value が "" のまま。
      //   その状態で badge を出すと「保存済み」と表示されながら値が空という矛盾 UX になる。
      if (dropdown.value !== String(selectedIndex)) {
        // Option not found — fall through to normal "no selection" handling
      } else {
        dropdown.classList.add('has-ai-selection');
        // Why: savedMapping は存在するが backend が再推定できないヘッダー (児童独自の質問文等) では
        //      confidence=0 になる。「自動推定 0%」と出すのは紛らわしいので「保存済み」と表示。
        showConfidenceBadge(columnType, columnConfidence, columnConfidence > 0 ? 'ai' : 'saved');
        return;
      }
    }
    if (columnConfidence > 0) {
      const threshold = COLUMN_CONFIDENCE_THRESHOLDS[columnType] || 75;
      const badgeType = columnConfidence >= threshold ? 'candidate' : 'low-confidence';
      showConfidenceBadge(columnType, columnConfidence, badgeType);
    }
  }

  function setupDropdownEventListeners(dropdowns) {
    Object.keys(dropdowns).forEach((columnType) => {
      const dropdown = dropdowns[columnType];
      if (!dropdown) return;

      dropdown.addEventListener('change', function () {
        handleDropdownChange(columnType, this);
      });
    });

    const resetButton = document.getElementById('reset-to-ai');
    if (resetButton) {
      resetButton.addEventListener('click', function () {
        resetToAIDetection();
      });
    }
  }

  function handleDropdownChange(columnType, dropdown) {
    const selectedValue = dropdown.value;

    dropdown.classList.remove('has-ai-selection', 'has-manual-selection');

    if (selectedValue === '') {
      hideConfidenceBadge(columnType);
    } else {
      dropdown.classList.add('has-manual-selection');
      showConfidenceBadge(columnType, 100, 'manual');

      const resetButton = document.getElementById('reset-to-ai');
      if (resetButton) {
        resetButton.style.display = 'inline-block';
      }

      const manualInfo = document.getElementById('manual-override-info');
      if (manualInfo) {
        manualInfo.classList.remove('hidden');
      }
    }

    updateSelectionStatus();

    updateCompletionStatus();

    const currentMapping = getColumnMapping();
    if (Object.keys(currentMapping).length > 0) {
      updateSystemState({
        columnMapping: currentMapping,
        setupStatus: 'completed'
      });
    }
  }

  function showConfidenceBadge(columnType, confidence, type) {
    if (!columnType || typeof confidence !== 'number' || !type) return;

    const confidenceDiv = document.getElementById(`${columnType}-confidence`);
    if (!confidenceDiv) return;
    const badge = confidenceDiv.querySelector('.confidence-badge');
    if (!badge) return;

    let badgeClass = '';
    let badgeText = '';
    const pct = Math.round(confidence);

    switch (type) {
      case 'manual':       badgeClass = 'manual'; badgeText = '✋ 手動設定'; break;
      case 'saved':        badgeClass = 'manual'; badgeText = '📌 保存済み'; break;
      case 'ai':           badgeClass = 'high'; badgeText = `🎯 自動推定 ${pct}%`; break;
      case 'candidate':    badgeClass = 'candidate'; badgeText = `🔍 候補 ${pct}%`; break;
      case 'low-confidence': badgeClass = 'low'; badgeText = `📊 検討中 ${pct}%`; break;
      default:             badgeClass = 'low'; badgeText = `🤖 自動推定 ${pct}%`;
    }

    badge.className = `confidence-badge ${badgeClass}`;
    badge.textContent = badgeText;
    confidenceDiv.classList.remove('hidden');
  }

  function hideConfidenceBadge(columnType) {
    const confidenceDiv = document.getElementById(`${columnType}-confidence`);
    if (confidenceDiv) {
      confidenceDiv.classList.add('hidden');
    }
  }

  function updateSelectionStatus() {
    const hasManualSelection =
      document.querySelectorAll('.modern-select.has-manual-selection').length > 0;
    const hasAISelection = document.querySelectorAll('.modern-select.has-ai-selection').length > 0;

    const resetButton = document.getElementById('reset-to-ai');
    if (resetButton) {
      resetButton.style.display = hasManualSelection ? 'inline-block' : 'none';
    }
  }

  function resetToAIDetection() {
    if (!window.currentAIMapping) {
      showError('自動推定データがありません');
      return;
    }
    // __getAllColumnDropdowns で numericX/Y も含めた全 dropdown を取得 (旧コードは
    // numericX/Y を忘れていたので reset 後も matrix/numberline の軸が手動値のままになっていた)。
    const dropdowns = __getAllColumnDropdowns();
    setAIDetectionSelections(window.currentAIMapping, dropdowns, {}, window.currentHeaders || []);

    const manualInfo = document.getElementById('manual-override-info');
    if (manualInfo) {
      manualInfo.classList.add('hidden');
    }

    const resetButton = document.getElementById('reset-to-ai');
    if (resetButton) {
      resetButton.style.display = 'none';
    }

    showSuccess('自動推定にリセットしました');
  }

  function getValidatedConfig() {
    try {
      const config = getConfig();

      if (!config.spreadsheetId || !config.sheetName) {
        return {
          config: null,
          validationError: 'データソースが接続されていません。まずフォームを接続してください。'
        };
      }

      // Why: UI dropdown が未選択（空）でも、既存 active config の columnMapping を保持。
      //   「表示設定だけ変えたい」ケースで列マッピングの再選択を強要しないため。
      const uiMapping = getColumnMapping();
      const existingMapping = (config && config.columnMapping) || {};
      const columnMapping = { ...existingMapping };
      // UI で値があれば（=明示的に dropdown を変更した）上書き
      ['answer', 'reason', 'class', 'name', 'numericX', 'numericY'].forEach((key) => {
        if (typeof uiMapping[key] === 'number') {
          columnMapping[key] = uiMapping[key];
        }
      });
      if (!columnMapping.answer && columnMapping.answer !== 0) {
        return {
          config: null,
          validationError: 'メイン質問列が設定されていません。列設定でメイン質問列を選択してください。'
        };
      }

      let headers = Array.isArray(window.currentHeaders) ? window.currentHeaders : [];
      if (!headers.length) {
        const options = document.querySelectorAll('#answer-column-select option');
        headers = Array.from(options)
          .map((opt) => {
            const txt = opt.textContent || '';
            const parts = txt.split(': ');
            return parts.length > 1 ? parts.slice(1).join(': ') : '';
          })
          .filter(Boolean);
      }

      const confidence = {};
      ['answer', 'reason', 'class', 'name'].forEach((key) => {
        if (typeof columnMapping[key] === 'number') {
          const confidenceElement = document.getElementById(key + '-confidence');
