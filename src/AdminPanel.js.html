          if (confidenceElement && !confidenceElement.classList.contains('hidden')) {
            const badge = confidenceElement.querySelector('.confidence-badge');
            if (badge) {
              const confidenceText = badge.textContent;
              const match = confidenceText.match(/(\d+)%/);
              if (match) {
                confidence[key] = parseInt(match[1]);
              }
            }
          }
        }
      });

      const timestamp = new Date().toISOString();
      const validatedConfig = {
        ...config,
        headers: headers,
        columnMapping: columnMapping,
        confidence: confidence,
        verifiedAt: timestamp,
        setupComplete: true,
        setupStatus: 'completed'
      };

      // Why: ConfigService.ensureRequiredFields は `isPublished: Boolean(config.isPublished)` で
      //   強制セット。フロントが isPublished を含めずに送ると Boolean(undefined)=false で
      //   公開ボードが未公開化される。systemState の既存値を継承して送る。
      if (systemState && systemState.config) {
        if (typeof systemState.config.isPublished === 'boolean') {
          validatedConfig.isPublished = systemState.config.isPublished;
        }
        if (systemState.config.publishedAt && !validatedConfig.publishedAt) {
          validatedConfig.publishedAt = systemState.config.publishedAt;
        }
      }

      return { config: validatedConfig, validationError: null };

    } catch (error) {
      console.error('設定検証エラー:', error);
      return {
        config: null,
        validationError: '設定の検証中にエラーが発生しました: ' + error.message
      };
    }
  }

  // 自動保存トリオ。HTML 側の `data-autosave` 属性が真実の source。
  //   - attached: 同じ DOM 要素に listener を多重に貼らないための WeakSet
  //   - lastSavedHash: 直前保存時の config hash (etag 除外)。同 hash なら server 往復を skip
  const { setupAutoSave, scheduleAutoSave, autoSaveDraft } = (() => {
    const DEBOUNCE_MS = 900;        // 連続キー入力を吸収する debounce
    const STATUS_CLEAR_MS = 2500;   // 「✓ 自動保存しました」表示の自然消滅時間
    const attached = new WeakSet();
    let lastSavedHash = null;

    function setupAutoSave() {
      document.querySelectorAll('[data-autosave]').forEach((el) => {
        if (attached.has(el)) return;
        attached.add(el);
        const isTextLike = el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'url');
        const ev = isTextLike ? 'input' : 'change';
        if (el.hasAttribute('data-lesson-field')) {
          // Lesson Workspace 用 dispatch shim: 個別 field を debounce 後に
          //   lesson.updateDraft で送信。saveDraft とは独立。
          el.addEventListener(ev, () => window.__scheduleLessonFieldSave && window.__scheduleLessonFieldSave(el));
        } else {
          el.addEventListener(ev, scheduleAutoSave);
        }
      });
    }

    function scheduleAutoSave() {
      setAutoSaveStatus('保存予定…', 'info');
      window.sharedUtilities.debounce.debounce(autoSaveDraft, 'auto-save-draft', DEBOUNCE_MS);
    }

    function autoSaveDraft() {
      const sid = getCurrentSpreadsheetId();
      const sn = getCurrentSheetName();
      if (!sid || !sn) {
        setAutoSaveStatus('', 'info');
        return;
      }
      const answerSel = document.getElementById('answer-column-select');
      if (!answerSel || !answerSel.value) {
        setAutoSaveStatus('💡 メイン質問列を選んでください', 'warning');
        return;
      }
      const { config } = getValidatedConfig();
      if (config) {
        // Why: etag は保存成功で必ず更新されるので hash から除外。含めると毎回 hash mismatch
        //   になり、無変更でも server 往復が発生する (autosave 多発の真因)。
        const { etag: _etag, ...hashable } = config;
        const hash = JSON.stringify(hashable);
        if (hash === lastSavedHash) {
          setAutoSaveStatus('', 'info');
          return;
        }
        lastSavedHash = hash;
      }
      setAutoSaveStatus('保存中…', 'info');
      saveDraft({
        silent: true,
        onComplete: (ok) => {
          setAutoSaveStatus(ok ? '✓ 自動保存しました' : '⚠ 保存失敗', ok ? 'success' : 'error');
          if (!ok) lastSavedHash = null;
          if (ok) {
            setTimeout(() => {
              const el = document.getElementById('autosave-status');
              if (el && el.textContent === '✓ 自動保存しました') {
                setAutoSaveStatus('', 'info');
              }
            }, STATUS_CLEAR_MS);
          }
        }
      });
    }

    return { setupAutoSave, scheduleAutoSave, autoSaveDraft };
  })();

  function setAutoSaveStatus(msg, level) {
    const el = document.getElementById('autosave-status');
    if (!el) return;
    const next = msg || '';
    const cls = 'text-xs ' + (
      level === 'success' ? 'text-green-400'
      : level === 'warning' ? 'text-yellow-400'
      : level === 'error' ? 'text-red-400'
      : 'text-theme-muted'
    );
    if (el.textContent === next && el.className === cls) return;
    el.textContent = next;
    el.className = cls;
  }

  /**
   * 下書き保存。
   * `opts.silent=true` ではトースト/loading overlay を抑制し、`opts.onComplete(ok)` で結果通知。
   */
  function saveDraft(opts) {
    opts = opts || {};
    const silent = !!opts.silent;
    const onComplete = typeof opts.onComplete === 'function' ? opts.onComplete : null;

    function finish(ok) {
      if (!silent) window.setLoading(false);
      ClientMutex.release('saveDraft');
      if (onComplete) onComplete(ok);
    }

    if (!ClientMutex.acquire('saveDraft')) {
      if (!silent) showInfo('保存処理を実行中です…');
      if (onComplete) onComplete(false);
      return;
    }

    try {
      const { config, validationError } = getValidatedConfig();
      if (validationError) {
        if (!silent) showError(validationError);
        finish(false);
        return;
      }

      if (!silent) window.setLoading(true, '設定を保存中...');

      resolveFormUrlThen(config, executeDraftSave);

    } catch (error) {
      console.error('下書き保存準備エラー:', error);
      if (!silent) showError('設定の準備に失敗しました: ' + error.message);
      finish(false);
    }

    function executeDraftSave(finalConfig) {
      runServer('saveConfig', finalConfig, { isDraft: true }).then((result) => {
        if (result && result.success) {
          if (!silent) showSuccess('下書きを保存しました');
          systemState.config = { ...systemState.config, ...result.config };
          updateResourceButtons(systemState.config);
          updateConfigSummary(systemState.config);
          if (result.etag || result.config?.etag) {
            systemState.config.etag = result.etag || result.config.etag;
          }
          finish(true);
        } else {
          if (!silent) showError((result && (result.message || result.error)) || '設定の保存に失敗しました');
          finish(false);
        }
      }, (error) => {
        console.error('保存エラー:', error);
        if (!silent) showError('下書きの保存に失敗しました');
        finish(false);
      });
    }
  }

  // formUrl 未設定だが spreadsheetId/sheetName がある場合、 getFormInfo で formUrl/formTitle を
  //   自動解決してから next(config) を実行。 解決不要 / 失敗時もそのまま next に進む (best-effort)。
  //   saveDraft (下書き保存) と publishApp (公開) で共通の前処理だったのを集約。
  function resolveFormUrlThen(config, next) {
    if (!config.formUrl && config.spreadsheetId && config.sheetName) {
      runServer('getFormInfo', config.spreadsheetId, config.sheetName).then((formResult) => {
        if (formResult && formResult.success && formResult.formData && formResult.formData.formUrl) {
          config.formUrl = formResult.formData.formUrl;
          config.formTitle = formResult.formData.formTitle;
          systemState.config = { ...systemState.config, ...config };
          updateResourceButtons(systemState.config);
          try { autofillAxisLabelsFromFormInfo(formResult.formData); } catch (_) {}
        }
        next(config);
      }, (error) => {
        console.warn('⚠️ フォーム自動検出エラー（安全に継続）:', error.message);
        next(config);
      });
    } else {
      next(config);
    }
  }

  function publishApp() {
    if (!ClientMutex.acquire('publishApp')) {
      showInfo('公開処理を実行中です…');
      return;
    }

    // Why cancel pending autosave: publish 直後に 900ms 前のキー入力で trigger された
    //   autosave が遅延 fire すると、stale etag/publishedAt で server に send され
    //   "⚠ 保存失敗" toast や race を引き起こす (Profile lifecycle audit #c)。
    try {
      if (window.sharedUtilities && window.sharedUtilities.debounce
          && typeof window.sharedUtilities.debounce.clear === 'function') {
        window.sharedUtilities.debounce.clear('auto-save-draft');
      }
    } catch (_) { /* best effort */ }

    try {
      const { config, validationError } = getValidatedConfig();
      if (validationError) {
        showError(validationError);
        ClientMutex.release('publishApp');
        return;
      }

      window.setLoading(true, '回答ボードを公開中...');

      resolveFormUrlThen(config, executePublish);

    } catch (error) {
      console.error('公開準備エラー:', error);
      showError('公開の準備に失敗しました: ' + error.message);
      ClientMutex.release('publishApp');
    }

    function executePublish(publishConfig) {
      runServer('publishApp', publishConfig).then((result) => {
        if (result && result.success) {
          showSuccess('回答ボードを公開しました！');
          updatePublishStatus('published');
          systemState.config = {
            ...systemState.config,
            isPublished: true,
            publishedAt: result.publishedAt || new Date().toISOString(),
            setupComplete: true
          };
          updateResourceButtons(systemState.config);
          updateConfigSummary(systemState.config);
          if (result.etag || result.config?.etag) {
            systemState.config.etag = result.etag || result.config.etag;
          }
          (async () => {
            try {
              const adminData = await loadBatchedAdminData();
              if (adminData && adminData.boardInfo) {
                currentBoardInfo = adminData.boardInfo;
                updateFooterDisplay(adminData.boardInfo);
              }
            } catch (error) {
              console.warn('Footer refresh failed:', error);
            }
          })();
        } else if (result && result.error === 'etag_mismatch') {
          showInfo('設定が他で更新されました。画面を更新してから再度公開してください。');
          if (typeof loadAndApplyCurrentConfig === 'function') loadAndApplyCurrentConfig();
        } else {
          showError((result && (result.message || result.error)) || '回答ボードの公開に失敗しました');
        }
        window.setLoading(false);
        ClientMutex.release('publishApp');
      }, (error) => {
        console.error('公開エラー:', error);
        showError('回答ボードの公開に失敗しました。データソースが正しく設定されているか確認してください。');
        window.setLoading(false);
        ClientMutex.release('publishApp');
      });
    }
  }

  function getCurrentFormInfoSafe() {
    try {
      return {
        formUrl: getCurrentDataSourceField('formUrl'),
        formTitle: getCurrentDataSourceField('formTitle'),
        scaleItems: (systemState && Array.isArray(systemState.lastFormScaleItems))
          ? systemState.lastFormScaleItems
          : []
      };
    } catch (error) {
      console.warn('getCurrentFormInfoSafe error:', error.message);
      return { formUrl: null, formTitle: null, scaleItems: [] };
    }
  }

  /**
   * Form の ScaleItem ラベルを軸ラベル入力欄に「placeholder」として表示する。
   *
   * Why: 教師がフォーム連携した瞬間、空欄の placeholder が「例: 低い / 高い」(汎用) から
   *   実フォームの ScaleItem ラベル (例: 「そのまま使う / 自分で直す」) に切り替わる。
   *   値そのものは触らないので、教師が既に手入力した文字列は保護される。
   *
   * placeholder 戦略を採用した理由:
   *   - 既存ユーザーの手入力が消えない (空欄補完よりも厳格な保護)
   *   - 教師は input の中身を見るより先に「placeholder の薄い文字」を読む → 自然に
   *     「ああフォームにこう書いてあるんだ」と認知でき、自分の言葉で書き換えたいときは
   *     上書き入力するだけ
   *   - フォーム側のラベル変更が反映される (連携した瞬間に最新値が出る)
   */
  function applyAxisLabelPlaceholdersFromFormInfo(formInfo) {
    if (!formInfo || !Array.isArray(formInfo.scaleItems) || formInfo.scaleItems.length === 0) return;
    const items = formInfo.scaleItems;
    const setPh = (id, v) => {
      const el = document.getElementById(id);
      if (el && typeof v === 'string' && v.trim()) el.placeholder = v;
    };
    if (items[0]) {
      setPh('x-min-label', items[0].leftLabel);
      setPh('x-max-label', items[0].rightLabel);
    }
    if (items[1]) {
      setPh('y-min-label', items[1].leftLabel);
      setPh('y-max-label', items[1].rightLabel);
    }
  }

  /**
   * フォーム連携直後に呼ばれる: ScaleItem ラベルで空欄の軸ラベル入力欄を埋める。
   *
   * Why 空欄補完: 教師の手入力 (空でない既存値) は絶対に上書きしない。
   *   空のフィールドだけ ScaleItem 由来の値で埋めて、そのまま autosave に乗せる。
   *   placeholder 設定 (applyAxisLabelPlaceholdersFromFormInfo) も並行で行うので、
   *   将来教師が空欄に戻したときも形式値が見える。
   */
  function autofillAxisLabelsFromFormInfo(formInfo) {
    if (!formInfo) return;
    // scaleItems を systemState にキャッシュ (config 再 render 時の placeholder 復元用)
    if (Array.isArray(formInfo.scaleItems)) {
      systemState.lastFormScaleItems = formInfo.scaleItems;
    }
    applyAxisLabelPlaceholdersFromFormInfo(formInfo);

    const items = Array.isArray(formInfo.scaleItems) ? formInfo.scaleItems : [];
    if (items.length === 0) return;

    let filled = 0;
    const fillEmpty = (id, v) => {
      const el = document.getElementById(id);
      if (!el || el.value || typeof v !== 'string' || !v.trim()) return;
      el.value = v;
      filled++;
    };
    if (items[0]) {
      fillEmpty('x-min-label', items[0].leftLabel);
      fillEmpty('x-max-label', items[0].rightLabel);
    }
    if (items[1]) {
      fillEmpty('y-min-label', items[1].leftLabel);
      fillEmpty('y-max-label', items[1].rightLabel);
    }
    if (filled > 0) {
      try { showInfo('🧭 軸ラベルをフォームから自動取得しました', 4000); } catch (_) {}
      try { scheduleAutoSave(); } catch (_) {}
    }
  }

  function getDisplaySettings() {
    // Why: boardMode は backend で sanitizeDisplaySettings の allowlist 済み（VALID_BOARD_MODES）。
    //      未設定なら 'auto' を返し、サーバが列マッピングを見て実モードに解決する。
    const boardModeEl = document.getElementById('board-mode-select');
    const boardMode = boardModeEl && boardModeEl.value ? boardModeEl.value : 'auto';
    return {
      showNames: document.getElementById('show-names')?.checked || false,
      showReactions: document.getElementById('show-reactions')?.checked || false,
      boardMode
    };
  }

  /**
   * 可視化モード関連のメタデータ（軸ラベル・象限ラベル・再投稿許可）を収集。
   * Why: backend の sanitize は空オブジェクトを null として処理するので、
   *      ここで「全項目空なら undefined」を返して config 容量を節約する。
   *      入力欄が DOM に無い古い admin ページでも壊れないよう全て optional に取る。
   */
  function getVisualizationSettings() {
    const readText = (id) => {
      const el = document.getElementById(id);
      return el && typeof el.value === 'string' ? el.value.trim() : '';
    };
    const xMin = readText('x-min-label');
    const xMax = readText('x-max-label');
    const yMin = readText('y-min-label');
    const yMax = readText('y-max-label');
    const qHH = readText('quadrant-hh-label');
    const qHL = readText('quadrant-hl-label');
    const qLH = readText('quadrant-lh-label');
    const qLL = readText('quadrant-ll-label');
    const allowResubmit = !!document.getElementById('allow-resubmit')?.checked;

    const out = {};
    if (xMin || xMax) out.xAxisLabels = { min: xMin, max: xMax };
    if (yMin || yMax) out.yAxisLabels = { min: yMin, max: yMax };
    if (qHH || qHL || qLH || qLL) out.matrixQuadrantLabels = { hh: qHH, hl: qHL, lh: qLH, ll: qLL };
    out.allowResubmit = allowResubmit;
    return out;
  }

  /**
   * 現在の設定を再読み込みして適用 (in-place refresh、reload 無し)。
   *   profile 切替 / etag 不一致リカバリ / 設定再フェッチ等の共通パス。
   *   - safeReload は sessionStorage.clear() + localStorage.removeItem('current_user_info')
   *     を実行するため、ログイン session が消えてリダイレクトされる副作用がある。
   *     in-place refresh ならその副作用が無い。
   *   - 列マッピング dropdown は applyConfig だけでは復元されない (headers fetch が必要)
   *     ので silentlyRestoreColumnMapping を chain する。
   *
   * @param {Object} [opts]
   * @param {boolean} [opts.silent=false] - true なら toast 表示しない (連発時の noise 防止)
   */
  async function loadAndApplyCurrentConfig(opts) {
    const silent = Boolean(opts && opts.silent);
    try {
      const adminData = await loadBatchedAdminData();
      if (!adminData) return;
      systemState.userInfo = adminData.userInfo;
      systemState.user = adminData.userInfo;
      systemState.config = { ...systemState.config, ...adminData.config };
      currentBoardInfo = adminData.boardInfo;

      updatePanel(systemState.config);
      updateFooterDisplay(adminData.boardInfo);

      // 列マッピング dropdown: applyConfig は dataset しかセットしない (headers が必要)。
      //   保存済 spreadsheet があれば silent に headers fetch して dropdown を populate する。
      const cfg = systemState.config || {};
      if (cfg.spreadsheetId && cfg.sheetName) {
        try {
          await silentlyRestoreColumnMapping(cfg.spreadsheetId, cfg.sheetName, cfg.columnMapping || {});
        } catch (_) { /* user can retry via 検証 */ }
      }

      // profile-list / edit-bar 表示も再同期
      try { if (typeof loadProfileList === 'function') loadProfileList(); } catch (_) {}

      if (!silent) showInfo('設定を最新の状態に更新しました');
    } catch (error) {
      console.error('設定の再読み込みに失敗:', error);
      if (!silent) showError('設定の再読み込みに失敗しました。ページを更新してください。');
    }
  }

  function getConfig() {
    // フォーム検証で取得したデータを使用
    const spreadsheetId = getCurrentSpreadsheetId();
    const sheetName = getCurrentSheetName();

    const formInfo = getCurrentFormInfoSafe();
    const columnMapping = getColumnMapping();
    const vizSettings = getVisualizationSettings();

    return {
      spreadsheetId,
      sheetName,
      displaySettings: getDisplaySettings(),
      formUrl: formInfo.formUrl,
      formTitle: formInfo.formTitle,
      columnMapping,
      // Why: 可視化メタデータは spread して、未指定キーは含めない。
      //      backend の validateAndSanitizeConfig が空文字を null に正規化する。
      ...vizSettings,
      etag: (systemState?.config?.etag) || undefined,
    };
  }

  function getColumnMapping() {
    const dropdowns = __getAllColumnDropdowns();
    const columnMapping = {};

    Object.keys(dropdowns).forEach((columnType) => {
      const dropdown = dropdowns[columnType];
      const selectedValue = dropdown.value;
      if (selectedValue !== '') {
        columnMapping[columnType] = parseInt(selectedValue);
      }
    });

    // Why: UI dropdown が空のとき systemState の columnMapping を fallback。
    //   「ヘッダー読み込み未完 / dropdown 初期状態」でも表示・公開設定の保存を可能にする。
    const existingMapping = (systemState && systemState.config && systemState.config.columnMapping) || {};
    Object.keys(COLUMN_SELECT_IDS).forEach((key) => {
      if (typeof columnMapping[key] !== 'number' && typeof existingMapping[key] === 'number') {
        columnMapping[key] = existingMapping[key];
      }
    });

    // matrix / numberline では answer dropdown を hide しているため、numericX を answer にコピー。
    // viz code は answer をホバー時のラベル等で使うので、空にすると tooltip が崩れる。
    const mode = (document.getElementById('board-mode-select') || {}).value || 'auto';
    if ((mode === 'matrix' || mode === 'numberline') && typeof columnMapping.numericX === 'number') {
      columnMapping.answer = columnMapping.numericX;
    }

    return columnMapping;
  }

  function updatePublishStatus(status) {
    const badge = document.querySelector('.status-badge.unpublished') || document.querySelector('.status-badge.published');
    if (badge) {
      badge.className = 'status-badge ' + status;
      badge.textContent = status === 'published' ? '公開中' : '未公開';
    }
  }

  function updateConfigSummary(config) {
    if (!config) return;

    const isPublished = Boolean(config.isPublished);
    const publishBadge = document.getElementById('app-publish-status');
    if (publishBadge) {
      if (isPublished) {
        publishBadge.className = 'status-badge published';
        publishBadge.textContent = '公開中';
      } else {
        publishBadge.className = 'status-badge unpublished';
        publishBadge.textContent = '未公開';
      }
    }

    const sheetnameElement = document.getElementById('current-sheetname');
    if (sheetnameElement) {
      const sheetName = config.sheetName;
      if (sheetName) {
        sheetnameElement.textContent = sheetName;
        sheetnameElement.className = 'text-sm text-theme';
      } else {
        sheetnameElement.textContent = '未設定';
        sheetnameElement.className = 'text-sm text-theme-secondary';
      }
    }

    const timeElement = document.getElementById('last-updated-time');
    if (timeElement) {
      const lastModified = systemState.user?.lastModified || config.lastModified;
      if (lastModified) {
        const date = new Date(lastModified);
        timeElement.textContent = date.toLocaleString('ja-JP', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
        });
        timeElement.className = 'text-sm text-theme';
      } else {
        timeElement.textContent = '--:--';
        timeElement.className = 'text-sm text-theme-secondary';
      }
    }

    // 教師が「現在の設定がどうなっているか」を 1 ヶ所で把握できるよう
    // displaySettings / activeProfile / boardMode を summary に反映する。
    const ds = config.displaySettings || {};

    const boardModeEl = document.getElementById('current-board-mode');
    if (boardModeEl) {
      const mode = ds.boardMode || 'auto';
      boardModeEl.textContent = PROFILE_MODE_LABELS[mode] || mode;
      boardModeEl.className = 'text-sm text-theme';
    }

    const showNamesEl = document.getElementById('current-show-names');
    if (showNamesEl) {
      showNamesEl.textContent = ds.showNames ? '実名表示' : '匿名';
      showNamesEl.className = 'text-sm ' + (ds.showNames ? 'text-cyan-300' : 'text-theme-secondary');
    }

    const showReactionsEl = document.getElementById('current-show-reactions');
    if (showReactionsEl) {
      showReactionsEl.textContent = ds.showReactions ? '表示' : '非表示';
      showReactionsEl.className = 'text-sm ' + (ds.showReactions ? 'text-cyan-300' : 'text-theme-secondary');
    }

    const activeProfileEl = document.getElementById('current-active-profile');
    if (activeProfileEl) {
      const profiles = Array.isArray(config.profiles) ? config.profiles : [];
      const active = config.activeProfile;
      if (active && profiles.length > 0) {
        activeProfileEl.textContent = active + ' (' + profiles.length + ' boards)';
        activeProfileEl.className = 'text-sm text-cyan-300';
      } else {
        activeProfileEl.textContent = '単一ボード';
        activeProfileEl.className = 'text-sm text-theme-secondary';
      }
    }
  }

  // =====================================================================
  // Profile management (multi-board)
  // Why: 複数フォーム/モードを「プロファイル」として保存し、view 画面のタブで瞬時切替する。
  //   これまで CLI (npm run api) からしか管理できなかった機能を AdminPanel で操作可能に。
  // =====================================================================

  const PROFILE_MODE_LABELS = {
    auto: '自動判定', board: '掲示板', numberline: '数直線',
    matrix: '散布図', wordcloud: 'ワードランキング', pie: '円グラフ'
  };

  function setProfileActionStatus(msg, type) {
    const el = document.getElementById('profile-action-status');
    if (!el) return;
    el.textContent = msg || '';
    const colors = { success: 'text-green-400', error: 'text-red-400', info: 'text-theme-muted', warning: 'text-yellow-400' };
    el.className = 'text-xs mt-1.5 min-h-[1rem] ' + (colors[type] || colors.info);
  }

  // escapeHtml は SharedUtilities が IIFE で先に読み込む（AdminPanel.html の include 順固定）。
  const escapeProfileText = (s) => window.sharedUtilities.security.escapeHtml(s == null ? '' : String(s));

  function isCurrentlyPublished() {
    const el = document.getElementById('app-publish-status');
    if (!el) return false;
    return el.classList.contains('published') || /公開中/.test(el.textContent || '');
  }

  // 既知のプロファイル名集合 (フォーム接続時の auto-save 重複判定用)
  let _knownProfileNames = new Set();

  function renderProfileList(profiles, activeProfile) {
    _knownProfileNames = new Set((profiles || []).map(p => p && p.name).filter(Boolean));
    const container = document.getElementById('profile-list');
    const badge = document.getElementById('profile-count-badge');
    if (!container) return;

    if (badge) {
      badge.textContent = profiles.length === 0
        ? 'プロファイル未登録'
        : `${profiles.length} 件登録`;
    }

    if (profiles.length === 0) {
      container.innerHTML = '<div class="text-xs text-theme-muted italic">未登録。下のフォームから保存できます。</div>';
      return;
    }

    const published = isCurrentlyPublished();

    container.innerHTML = profiles.map(p => {
      const isActive = p.name === activeProfile;
      const modeLabel = PROFILE_MODE_LABELS[p.boardMode] || p.boardMode || 'auto';
      const safeName = escapeProfileText(p.name);
      const safeTitle = escapeProfileText(p.formTitle || '');
      // status badge: active 行は「現在」 or 「🟢 公開中」、非 active は何も出さない
      const statusBadge = isActive
        ? (published
            ? '<span class="profile-badge profile-badge-published" title="このボードが公開中">🟢 公開中</span>'
            : '<span class="profile-badge profile-badge-active" title="現在編集中（未公開）">現在</span>')
        : '';
      // インラインアイコン:
      //   - 非 active 行: 📥 切替 + 🗑 削除
      //   - active 行: 🗑 削除のみ (active への「保存」は左パネル末尾の「💾 プロファイル『〇』に保存」へ集約)
      //   右パネルは「ナビゲーション (どの profile を見るか)」、左パネルは「エディタ (編集と保存)」
      //   と役割を分担。保存系ボタンを左パネルにまとめることで「編集 → 保存」のフローが自然になる。
      const loadIcon = !isActive
        ? '<button type="button" class="profile-icon-btn profile-icon-load" data-profile-action="load" data-profile-name="' + safeName + '" title="このプロファイルに切替">📥</button>'
        : '';
      const deleteIcon = '<button type="button" class="profile-icon-btn profile-icon-delete" data-profile-action="delete" data-profile-name="' + safeName + '" title="削除">🗑</button>';
      // active 行は opaque vibrant pale cyan bg なので、 default text (slate-200) では contrast 不足
      //   → text-on-soft (cyan-900) に切り替え。 v2854 で他 status box と統一。
      const textCls = isActive ? 'text-theme-status-accent-text-on-soft' : 'text-theme';
      const mutedCls = isActive ? 'text-theme-status-accent-text-on-soft opacity-70' : 'text-theme-muted';
      const titleLine = safeTitle
        ? '<div class="text-[10px] ' + mutedCls + ' truncate" title="' + safeTitle + '">' + safeTitle + '</div>'
        : '';
      return [
        '<div class="profile-row flex items-center gap-1 p-1.5 rounded border ',
        // theme-aware: light mode で dark slate / dark cyan が出ない pairing
        isActive ? 'border-theme-status-accent-strong bg-theme-status-accent-soft' : 'border-theme-subtle bg-theme-card-1',
        '" data-profile-row="' + safeName + '">',
        '  <div class="flex-1 min-w-0">',
        '    <div class="text-xs font-semibold ' + textCls + ' truncate profile-name" data-profile-rename="' + safeName + '" title="ダブルクリックで名前を変更">',
        safeName,
        '      <span class="ml-1 text-[10px] ' + mutedCls + '">[' + modeLabel + ']</span>',
        '    </div>',
        titleLine,
        '  </div>',
        statusBadge,
        loadIcon,
        deleteIcon,
        '</div>'
      ].join('');
    }).join('');
  }

  function loadProfileList() {
    setProfileActionStatus('プロファイル一覧を取得中...', 'info');
    runServer('listMyProfiles').then((res) => {
      if (res && res.success && res.data) {
        renderProfileList(res.data.profiles || [], res.data.activeProfile || null);
        setProfileActionStatus('', 'info');
      } else {
        setProfileActionStatus(res && res.message ? res.message : 'プロファイル一覧取得に失敗しました', 'error');
      }
    }, (err) => {
      setProfileActionStatus('プロファイル一覧取得エラー: ' + ((err && err.message) || err), 'error');
    });
  }

  // =====================================================================
  // Profile CRUD 統一ハンドラ
  //   全 5 操作 (切替/削除/更新/rename/新規保存) を runProfileOp に集約。
  //   responseHandler を 1 か所にすることで status 表示・エラー処理の drift を防ぐ。
  // =====================================================================

  /**
   * @param {Object} opts
   * @param {string} opts.busyMsg        - 実行中の status 文言
   * @param {string} opts.successMsg     - 成功時の fallback 文言 (server message があれば優先)
   * @param {string} opts.failureMsg     - 失敗時の fallback 文言
   * @param {Object} [opts.btn]          - 連打抑制用の button 要素
   * @param {Function} [opts.afterSuccess] - 成功時に追加で実行する async 関数 (in-place refresh 等)
   * @param {Function} opts.invoke       - Promise を返す関数 (例: () => runServer('foo', arg))
   */
  async function runProfileOp(opts) {
    setProfileActionStatus(opts.busyMsg, 'info');
    if (opts.btn) { opts.btn.disabled = true; opts.btn.classList.add('btn-busy'); }
    try {
      const res = await opts.invoke();
      if (res && res.success) {
        setProfileActionStatus((res.message || opts.successMsg), 'success');
        if (opts.afterSuccess) {
          try { await opts.afterSuccess(res); }
          catch (err) { console.warn('afterSuccess error:', err && err.message); }
        }
        if (typeof loadProfileList === 'function') loadProfileList();
      } else if (res && res.error === 'etag_mismatch') {
        // Profile lifecycle audit recommendation #2: 別 tab で更新されていた場合、
        //   黙って失敗するのではなく config を fresh で再読込し、ユーザーに「再操作してね」と
        //   案内する (auto-retry はせず明示再操作 = 意図しない上書きを避ける)。
        setProfileActionStatus('他のタブで更新されました。最新の状態を読み込み直しました。', 'warning');
        if (typeof loadAndApplyCurrentConfig === 'function') {
          loadAndApplyCurrentConfig({ silent: true });
        } else {
          loadProfileList();
        }
      } else {
        setProfileActionStatus((res && res.message) || opts.failureMsg, 'error');
        loadProfileList();
      }
    } catch (err) {
      setProfileActionStatus(opts.failureMsg + ': ' + ((err && err.message) || err), 'error');
      loadProfileList();
    } finally {
      if (opts.btn) { opts.btn.disabled = false; opts.btn.classList.remove('btn-busy'); }
    }
  }

  // 切替 (📥): non-destructive。reload は使わず in-place で左パネルを再ハイドレートする。
  //   safeReload は sessionStorage.clear() を実行する副作用があり、ログイン session が
  //   失われてリダイレクトされる事故が起きていた。in-place refresh ならその副作用が無い。
  function handleProfileLoad(name) {
    if (!name) return;
    const row = document.querySelector('[data-profile-row="' + CSS.escape(name) + '"]');
    if (row) row.classList.add('profile-row-loading');
    runProfileOp({
      busyMsg: 'プロファイル「' + name + '」を読み込み中...',
      successMsg: 'プロファイル「' + name + '」に切り替えました',
      failureMsg: '読み込みに失敗しました',
      invoke: () => runServer('loadProfileForView', name),
      afterSuccess: async () => {
        // 設定再フェッチ → applyConfig + 列マッピング dropdown 復元
        await loadAndApplyCurrentConfig({ silent: true });
      }
    });
  }

  // 削除 (🗑): 取り消せないので confirm あり
  async function handleProfileDelete(name) {
    if (!name) return;
    const ok = await window.modals.confirm(
      'プロファイル「' + name + '」を削除しますか？\n\nこの操作は取り消せません。',
      { title: 'プロファイル削除', variant: 'danger', okLabel: '削除' }
    );
    if (!ok) return;
    runProfileOp({
      busyMsg: 'プロファイル「' + name + '」を削除中...',
      successMsg: '削除しました',
      failureMsg: '削除に失敗しました',
      invoke: () => runServer('deleteMyProfile', name)
    });
  }

  // 更新 (💾 on active row): 現在の編集内容を当該 profile snapshot に上書き。
  //   name は row の data-profile-name から渡される (旧 editBar の textContent ではないので drift 不可)。
  function handleActiveProfileUpdate(name) {
    if (!name) {
      setProfileActionStatus('プロファイルが特定できません', 'warning');
      return;
    }
    const row = document.querySelector('[data-profile-row="' + CSS.escape(name) + '"]');
    const btn = row ? row.querySelector('.profile-icon-update') : null;
    runProfileOp({
      busyMsg: 'プロファイル「' + name + '」を更新中...',
      successMsg: 'プロファイルを更新しました',
      failureMsg: '更新に失敗しました',
      btn,
      invoke: () => runServer('saveCurrentAsProfile', name)
    });
  }

  // 新規保存 (別名で保存): 既存と違う名前で新しい profile を作る
  function handleProfileSave() {
    const input = document.getElementById('new-profile-name');
    if (!input) return;
    const name = (input.value || '').trim();
    if (!name) {
      setProfileActionStatus('プロファイル名を入力してください', 'warning');
      input.focus();
      return;
    }
    runProfileOp({
      busyMsg: 'プロファイル「' + name + '」を保存中...',
      successMsg: '保存しました',
      failureMsg: '保存に失敗しました',
      btn: document.getElementById('save-current-as-profile-btn'),
      invoke: async () => {
        const res = await runServer('saveCurrentAsProfile', name);
        if (res && res.success) input.value = ''; // クリア (成功時のみ)
        return res;
      }
    });
  }

  // 名前 double-click → インライン編集 → Enter (確定) or Esc (キャンセル)
  function startProfileRename(targetEl, oldName) {
    if (!targetEl || targetEl.querySelector('input.profile-rename-input')) return;
    const input = document.createElement('input');
    input.type = 'text';
    input.value = oldName;
    input.maxLength = 50;
    input.className = 'profile-rename-input';
    input.addEventListener('click', (e) => e.stopPropagation());
    let committed = false;
    const commit = () => {
      if (committed) return;
      committed = true;
      const newName = (input.value || '').trim();
      if (!newName || newName === oldName) { loadProfileList(); return; }
      runProfileOp({
        busyMsg: 'プロファイル名を変更中...',
        successMsg: '名前を変更しました',
        failureMsg: '名前変更に失敗しました',
        invoke: () => runServer('renameMyProfile', oldName, newName)
      });
    };
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      else if (e.key === 'Escape') { e.preventDefault(); committed = true; loadProfileList(); }
    });
    input.addEventListener('blur', commit);
    targetEl.innerHTML = '';
    targetEl.appendChild(input);
    input.focus();
    input.select();
  }

  function initializeProfileManagementUI() {
    // 一覧 click のイベント委譲（load / delete + dblclick rename）
    const list = document.getElementById('profile-list');
    if (list && !list.__profileHandlerAttached) {
      list.__profileHandlerAttached = true;
      list.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-profile-action]');
        if (!btn) return;
        const action = btn.dataset.profileAction;
        const name = btn.dataset.profileName;
        if (action === 'load') handleProfileLoad(name);
        else if (action === 'delete') handleProfileDelete(name);
        // 'update' は左パネル末尾の save-to-profile-btn に集約済 (右パネルでは扱わない)
      });
      // ダブルクリックで名前を inline 編集
      list.addEventListener('dblclick', (e) => {
        const target = e.target.closest('[data-profile-rename]');
        if (!target) return;
        startProfileRename(target, target.dataset.profileRename);
      });
    }

    // 保存ボタン (新規保存)
    const saveBtn = document.getElementById('save-current-as-profile-btn');
    if (saveBtn && !saveBtn.__handlerAttached) {
      saveBtn.__handlerAttached = true;
      saveBtn.addEventListener('click', handleProfileSave);
    }

    // 左パネル末尾の「💾 プロファイル『〇』に保存」ボタン (drift-proof)。
    //   ボタンの dataset.profileName は applyConfig で activeProfile から毎回再生成される。
    const saveToProfileBtn = document.getElementById('save-to-profile-btn');
    if (saveToProfileBtn && !saveToProfileBtn.__handlerAttached) {
      saveToProfileBtn.__handlerAttached = true;
      saveToProfileBtn.addEventListener('click', () => {
        const name = saveToProfileBtn.dataset.profileName || '';
        handleActiveProfileUpdate(name);
      });
    }

    // Enter キーで保存
    const nameInput = document.getElementById('new-profile-name');
    if (nameInput && !nameInput.__handlerAttached) {
      nameInput.__handlerAttached = true;
      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleProfileSave();
        }
      });
    }

    // 初回ロード
    loadProfileList();
  }

  let currentBoardInfo = null;

  function updateFooterDisplay(boardInfo) {
    const footer = document.getElementById('boardInfoFooter');
    const questionText = document.getElementById('currentQuestionText');
    const openBtn = document.getElementById('openBoardBtn');
    const copyBtn = document.getElementById('copyViewUrlBtn');
    const unpublishBtn = document.getElementById('unpublishBoardBtn');
    const statusText = document.getElementById('boardStatus');

    const isPublished = Boolean(boardInfo?.isPublished);

    if (!isPublished) {
      footer.classList.add('hidden');
      return;
    }

    footer.classList.remove('hidden');

    questionText.textContent = boardInfo.questionText || 'エラーが発生しました';

    if (isPublished && boardInfo.urls) {
      openBtn.style.display = 'block';
      copyBtn.style.display = 'block';
      if (unpublishBtn) unpublishBtn.style.display = 'block';

      openBtn.onclick = () => {
        // 連打で新タブが複数開かないよう 800ms 内の重複 click を抑制。
        if (!window.sharedUtilities?.buttons?.navOnce(openBtn)) return;
        window.open(boardInfo.urls.view, '_blank');
      };
      copyBtn.onclick = () => copyViewUrl(boardInfo.urls.view);

      if (statusText) {
        statusText.textContent = '最終更新: ' + (boardInfo.lastUpdated || '不明');
      }
    } else {
      openBtn.style.display = 'none';
      copyBtn.style.display = 'none';
      if (unpublishBtn) unpublishBtn.style.display = 'none';
      if (statusText) {
        statusText.textContent = boardInfo.error || 'ボードが非アクティブです';
      }
    }
  }

  function copyViewUrl(url) {
    if (!url) {
      showError('コピーするURLがありません');
      return;
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard
        .writeText(url)
        .then(() => {
          showSuccess('閲覧用URLをコピーしました！');
          const btn = document.getElementById('copyViewUrlBtn');
          const originalText = btn.textContent;
          btn.textContent = '✅ コピー完了';
          btn.disabled = true;

          createPromiseDelay(2000).then(() => {
            btn.textContent = originalText;
            btn.disabled = false;
          }).catch(() => {
            btn.textContent = originalText;
            btn.disabled = false;
          });
        })
        .catch(() => {
          fallbackCopyUrl(url);
        });
    } else {
      fallbackCopyUrl(url);
    }
  }

  function fallbackCopyUrl(url) {
    const textarea = document.createElement('textarea');
    textarea.value = url;
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      showSuccess('閲覧用URLをコピーしました！');
    } catch (err) {
      prompt('以下のURLをコピーしてください:', url);
    }
    document.body.removeChild(textarea);
  }

  /**
   * アプリ設定 URL をプリフェッチして a[href] にセット。
   * v2772: buildWebAppUrl helper 経由に統一 (個別 `getWebAppUrl` 呼び出しを廃止)。
   */
  function prefetchAppSetupUrl() {
    const appSetupBtn = document.getElementById('app-setup-btn');
    if (!appSetupBtn) return;
    const targetUserId = window.UNIFIED_CONFIG && window.UNIFIED_CONFIG.targetUserId;
    buildWebAppUrl('appSetup', targetUserId ? { userId: targetUserId } : null,
      (url) => { appSetupBtn.href = url; },
      (err) => { console.warn('アプリ設定URL取得エラー:', err && err.message); }
    );
  }

  // prefetchAppSetupUrl は init() 内で呼ばれる (上記参照)。EOF の top-level kickoff は
  // CLAUDE.md「top-level google.script.run 禁止」ルールに違反するため削除。

  // =====================================================================
  // Lesson Workspace: 作成 wizard + Runner + 過去一覧。
  //   data-lesson-field を持つ要素は scheduleLessonFieldSave に dispatch される。
  //   wizard / Runner / 一覧 の DOM は LessonWorkspace.html。
  // =====================================================================
  (function setupLessonWorkspace() {
    let currentLessonId = null;          // 編集中 or 実行中の lesson ID
    let currentLessonEtag = null;        // 楽観ロック (2 タブ race 防止)
    const FIELD_DEBOUNCE_MS = 600;
    // Why: AdminPanel では UNIFIED_CONFIG.userId は空。実 owner ID は targetUserId にある
    //   (createUnifiedConfig は CONFIG empty + pageDefaults.targetUserId のみ受け取る)。
    const userId = (window.UNIFIED_CONFIG && (window.UNIFIED_CONFIG.targetUserId || window.UNIFIED_CONFIG.userId)) || '';

    function gasRun(operation, params) {
      return runServer('dispatchAdminOperation', operation, params);
    }

    // ---------- Lesson list (常時表示の一覧) ----------
    function loadLessonList() {
      const listEl = document.getElementById('lesson-list');
      const countEl = document.getElementById('lesson-list-count');
      if (!listEl) return;
      if (!userId) {
        listEl.innerHTML = '<li class="text-theme-status-error">userId 未取得 (画面再読み込みが必要)</li>';
        return;
      }
      gasRun('lesson.list', { userId }).then((res) => {
        if (!res || !res.success) {
          const msg = (res && (res.message || res.error)) || '不明なエラー';
          // 詳細を console + 画面の両方に出す (Cloud Logging にも client/error として届く)。
          console.error('[lesson.list] backend rejected:', msg, res);
          listEl.innerHTML = `<li class="text-theme-status-error">読み込み失敗: ${window.sharedUtilities.security.escapeHtml(String(msg))}</li>`;
          return;
        }
        const lessons = (res.data && res.data.lessons) || [];
        if (countEl) countEl.textContent = `(${lessons.length})`;
        // Why first-time hint: 「初見ユーザーは empty-state を first-onboarding として読む」(UX 研究結果)。
        //   lessons / profiles 両方とも 0 件のときだけ「ここから始めよう」hint を出す。
        //   1 つでも作ったら自然と非表示 (= 卒業条件)。
        const hintEl = document.getElementById('first-time-hint');
        if (hintEl) {
          const hasAnyProfile = !!(systemState && systemState.config && Array.isArray(systemState.config.profiles) && systemState.config.profiles.length > 0);
          const isFirstTime = lessons.length === 0 && !hasAnyProfile;
          hintEl.classList.toggle('hidden', !isFirstTime);
        }
        if (lessons.length === 0) {
          listEl.innerHTML = '<li class="text-theme-muted italic">まだレッスンがありません。「🎒 新しい授業を作る」から始めましょう。</li>';
          return;
        }
        listEl.innerHTML = lessons.map(l => {
          const stateLabel = l.state === 'draft' ? '下書き' : l.state === 'active' ? '実行中' : '完了';
          const dateStr = l.createdAt ? l.createdAt.slice(0, 10) : '';
          const safeName = window.sharedUtilities.security.escapeHtml(l.name || '無題');
          const safeId = window.sharedUtilities.security.escapeHtml(l.lessonId);
          const action = l.state === 'completed' ? '振り返り'
                       : l.state === 'active' ? '続きから'
                       : '編集';
          return `<li>
            <span class="lesson-state-badge state-${l.state}">${stateLabel}</span>
            <span class="flex-1">${safeName} <span class="text-theme-muted text-xs ml-1">${dateStr}</span></span>
            <button class="btn btn-secondary text-xs" data-lesson-open="${safeId}" data-lesson-state="${l.state}">${action}</button>
            <button class="btn btn-secondary text-xs" data-lesson-duplicate="${safeId}" title="このレッスンをテンプレとして複製">📋 複製</button>
            <button class="btn btn-secondary text-xs" data-lesson-delete="${safeId}" title="削除">🗑</button>
          </li>`;
        }).join('');
      }).catch((err) => {
        const msg = (err && err.message) || String(err);
        console.error('[lesson.list] network error:', msg, err);
        listEl.innerHTML = `<li class="text-theme-status-error">読み込みエラー: ${window.sharedUtilities.security.escapeHtml(msg)}</li>`;
      });
    }

    const busyBtns = () => window.sharedUtilities && window.sharedUtilities.buttons;
    document.addEventListener('click', (event) => {
      const openTarget = event.target.closest('[data-lesson-open]');
      if (openTarget) {
        if (busyBtns() && !busyBtns().navOnce(openTarget)) return;
        const lessonId = openTarget.dataset.lessonOpen;
        const state = openTarget.dataset.lessonState;
        if (state === 'completed') {
          // Why buildWebAppUrl: 旧コード `window.location.origin + pathname` は GAS sandbox
          //   iframe の URL (script.googleusercontent.com/userCodeAppPanel) を返すため、
          //   `?mode=review` を付けても 404。必ず外部公開 URL (= _cachedWebAppUrl) を使う。
          buildWebAppUrl('review', { lessonId, userId },
            (url) => { window.open(url, '_blank'); },
            () => { if (window.showError) window.showError('振り返り画面を開けませんでした'); }
          );
          return;
        }
        if (state === 'active') {
          // Runner UI で再開
          openLessonRunner(lessonId);
        } else {
          // draft → wizard で続きから編集
          openLessonWizard(lessonId);
        }
        return;
      }
      const delTarget = event.target.closest('[data-lesson-delete]');
      if (delTarget) {
        if (!confirm('このレッスンを削除しますか？')) return;
        const task = () => gasRun('lesson.delete', { userId, lessonId: delTarget.dataset.lessonDelete }).then((res) => {
          if (res && res.success) {
            window.showSuccess('レッスンを削除しました');
            loadLessonList();
          } else {
            window.showError((res && res.message) || '削除失敗');
          }
        });
        if (busyBtns()) busyBtns().withBusy(delTarget, task, { busyText: '削除中...' });
        else task();
        return;
      }
      const dupTarget = event.target.closest('[data-lesson-duplicate]');
      if (dupTarget) {
        window.modals.confirm(
          'このレッスンを「テンプレ」として新規作成します。\n\n対象クラスも引き継ぎますか？\n(OK = クラスも複製 / キャンセル = フェーズだけ複製)',
          { title: '授業の複製', okLabel: 'クラスも複製', cancelLabel: 'フェーズだけ' }
        ).then((copyClasses) => {
          const task = () => gasRun('lesson.duplicate', {
            userId, lessonId: dupTarget.dataset.lessonDuplicate, options: { copyClasses }
          }).then((res) => {
            if (res && res.success) {
              // 複製後の draft をすぐ wizard で開く
              window.showSuccess('複製しました。続けて編集できます。');
              openLessonWizard(res.data.lesson.lessonId, res.data.lesson);
            } else {
              window.showError((res && res.message) || '複製失敗');
            }
          });
          if (busyBtns()) busyBtns().withBusy(dupTarget, task, { busyText: '複製中...' });
          else task();
        });
      }
    });

    // ---------- Wizard (作成 / 編集) ----------
    // 任意で template を指定して draft 作成。dropdown 経由 / 旧 fallback の両方から呼ばれる。
    function enterLessonCreateMode(templateKey, sourceBtn) {
      const template = templateKey || 'doutoku-3phase';
      const tpl = (lessonTemplatesCache || []).find(t => t.key === template);
      const baseName = (tpl && tpl.label) ? '新しい授業 (' + tpl.label + ')' : '新しい授業';
      const task = () => gasRun('lesson.create', { userId, name: baseName, template }).then((res) => {
        if (!res || !res.success) {
          window.showError((res && res.message) || 'レッスン作成失敗');
          return;
        }
        openLessonWizard(res.data.lesson.lessonId, res.data.lesson);
      });
      if (sourceBtn && window.sharedUtilities && window.sharedUtilities.buttons) {
        window.sharedUtilities.buttons.withBusy(sourceBtn, task, { busyText: '作成中...' });
      } else {
        task();
      }
    }
    window.enterLessonCreateMode = enterLessonCreateMode;

    // テンプレートメニュー: 初回展開時に lesson.templates を取得して描画。
    let lessonTemplatesCache = null;
    document.addEventListener('click', (e) => {
      // dropdown summary を開いた瞬間にテンプレ一覧を取得 (lazy)
      const summary = e.target && e.target.closest && e.target.closest('.lesson-template-picker > summary');
      if (summary) {
        renderLessonTemplateMenu();
        return;
      }
      // メニュー内のテンプレ選択
      const tplBtn = e.target && e.target.closest && e.target.closest('[data-lesson-template]');
      if (tplBtn) {
        const picker = tplBtn.closest('.lesson-template-picker');
        if (picker) picker.open = false;
        enterLessonCreateMode(tplBtn.dataset.lessonTemplate, tplBtn);
      }
    });

    function renderLessonTemplateMenu() {
      const menu = document.getElementById('lesson-template-menu');
      if (!menu) return;
      if (lessonTemplatesCache) return; // 既に描画済み
      gasRun('lesson.templates', {}).then((res) => {
        if (!res || !res.success) {
          menu.innerHTML = '<p class="lesson-template-loading text-theme-status-error">読み込み失敗</p>';
          return;
        }
        lessonTemplatesCache = res.data.templates || [];
        const esc = window.sharedUtilities.security.escapeHtml;
        menu.innerHTML = lessonTemplatesCache.map(t => (
          '<button type="button" class="lesson-template-item" data-lesson-template="' + esc(t.key) + '">' +
            '<span class="lesson-template-label">' + esc(t.label) + '</span>' +
            '<span class="lesson-template-desc">' + esc(t.description || '') +
              ' <span class="lesson-template-phase-count">(' + t.phaseCount + ' フェーズ)</span></span>' +
          '</button>'
        )).join('');
      }).catch((err) => {
        menu.innerHTML = '<p class="lesson-template-loading text-theme-status-error">' +
          window.sharedUtilities.security.escapeHtml((err && err.message) || String(err)) + '</p>';
      });
    }

    // lesson を読込 (preloaded があればそれ、無ければ gasRun('lesson.review'))、 成功時に
    //   onLoaded(lesson) を実行。 setLoading / 成功チェック / etag セット / load 失敗の
    //   error handling を集約。 openLessonWizard (CREATE) / openLessonRunner (RUN) で共通。
    function loadLessonThen(lessonId, preloaded, onLoaded) {
      currentLessonId = lessonId;
      if (!preloaded) window.setLoading(true, 'レッスンを読込中...');
      const loader = preloaded
        ? Promise.resolve({ success: true, data: { lesson: preloaded } })
        : gasRun('lesson.review', { userId, lessonId });
      loader.then((res) => {
        if (!preloaded) window.setLoading(false);
        if (!res || !res.success) {
          window.showError((res && res.message) || 'レッスン読み込み失敗');
          return;
        }
        currentLessonEtag = res.data.lesson.etag;
        onLoaded(res.data.lesson);
      }).catch((err) => {
        if (!preloaded) window.setLoading(false);
        window.showError((err && err.message) || 'レッスン読み込み失敗');
      });
    }

    function openLessonWizard(lessonId, preloaded) {
      loadLessonThen(lessonId, preloaded, (lesson) => {
        document.body.classList.add('mode-create-lesson');
        document.body.classList.remove('mode-run-lesson');
        history.pushState({ lesson: lessonId, mode: 'create' }, '', '#lesson/' + lessonId);
        renderWizardStep(1);
        hydrateWizardFromLesson(lesson);
      });
    }

    function exitLessonCreateMode() {
      document.body.classList.remove('mode-create-lesson');
      document.body.classList.remove('mode-run-lesson');
      currentLessonId = null;
      currentLessonEtag = null;
      history.pushState({}, '', window.location.pathname + window.location.search);
      loadLessonList();
    }
    window.exitLessonCreateMode = exitLessonCreateMode;

    function hydrateWizardFromLesson(lesson) {
      const nameEl = document.getElementById('lesson-name');
      if (nameEl) nameEl.value = lesson.name || '';
      const initial = (lesson.lessonJson && lesson.lessonJson.classes) || [];
      setSelectedClasses(initial, { skipSave: true });
      renderPhaseCards(lesson.lessonJson);
      renderConfirmStep(lesson.lessonJson);
      loadKnownClasses();
    }

    // ---------- Class chip picker ----------
    // selected (= 配列 of strings) を single source of truth として保持し、
    // 描画 / hidden input / autosave すべてに同期する。
    let selectedClasses = [];
    let knownClasses = [];

    function setSelectedClasses(list, opts) {
      const dedup = [];
      const seen = new Set();
      (Array.isArray(list) ? list : []).forEach((c) => {
        const v = String(c || '').trim();
        if (!v || seen.has(v)) return;
        seen.add(v);
        dedup.push(v);
      });
      selectedClasses = dedup;
      renderSelectedChips();
      renderKnownChips();
      const hidden = document.getElementById('lesson-classes');
      if (hidden) {
        hidden.value = selectedClasses.join(', ');
        if (!(opts && opts.skipSave)) {
          scheduleLessonFieldSave(hidden);
        }
      }
      const classesEl = document.getElementById('lesson-summary-classes');
      if (classesEl) {
        classesEl.textContent = selectedClasses.length ? selectedClasses.join(', ') : '(未設定)';
      }
    }

    function addClass(value) {
      const v = String(value || '').trim();
      if (!v) return;
      if (selectedClasses.includes(v)) return;
      setSelectedClasses(selectedClasses.concat([v]));
    }
    function removeClass(value) {
      setSelectedClasses(selectedClasses.filter((c) => c !== value));
    }

    function renderSelectedChips() {
      const wrap = document.getElementById('lesson-class-selected');
      if (!wrap) return;
      if (!selectedClasses.length) {
        wrap.innerHTML = '<span class="class-chip-empty">まだ選択されていません</span>';
        return;
      }
      const esc = window.sharedUtilities.security.escapeHtml;
      wrap.innerHTML = selectedClasses.map((c) => (
        '<span class="class-chip">' + esc(c) +
          '<button type="button" class="class-chip-remove" data-class="' + esc(c) + '" aria-label="削除">×</button>' +
        '</span>'
      )).join('');
      wrap.querySelectorAll('.class-chip-remove').forEach((btn) => {
        btn.addEventListener('click', () => removeClass(btn.dataset.class));
      });
    }

    function renderKnownChips() {
      const wrap = document.getElementById('lesson-class-known-wrap');
      const inner = document.getElementById('lesson-class-known');
      if (!wrap || !inner) return;
      const remaining = knownClasses.filter((c) => !selectedClasses.includes(c));
      if (!remaining.length) {
        wrap.hidden = true;
        inner.innerHTML = '';
        return;
      }
      wrap.hidden = false;
      const esc = window.sharedUtilities.security.escapeHtml;
      inner.innerHTML = remaining.map((c) => (
        '<button type="button" class="class-chip class-chip-known" data-class="' + esc(c) + '">+ ' + esc(c) + '</button>'
      )).join('');
      inner.querySelectorAll('.class-chip-known').forEach((btn) => {
        btn.addEventListener('click', () => addClass(btn.dataset.class));
      });
    }

    function renderGradeExpand(grade) {
      const wrap = document.getElementById('lesson-class-grade-expand');
      if (!wrap) return;
      if (!grade) { wrap.hidden = true; wrap.innerHTML = ''; return; }
      wrap.hidden = false;
      const esc = window.sharedUtilities.security.escapeHtml;
      const buttons = [1, 2, 3, 4, 5, 6].map((n) => {
        const name = grade + '-' + n;
        const isSelected = selectedClasses.includes(name);
        return '<button type="button" class="class-chip class-chip-known' + (isSelected ? ' active' : '') +
          '" data-class="' + esc(name) + '">' +
          (isSelected ? '✓ ' : '+ ') + esc(name) + '</button>';
      }).join('');
      wrap.innerHTML =
        '<span class="class-preset-label">' + grade + '年:</span>' +
        buttons +
        '<button type="button" class="class-chip class-chip-known" data-action="add-all" data-grade="' + grade + '">▶ 1〜6組をまとめて追加</button>';
      wrap.querySelectorAll('[data-class]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.class;
          if (selectedClasses.includes(name)) removeClass(name);
          else addClass(name);
          renderGradeExpand(grade); // 再描画して ✓ 反映
        });
      });
      const addAllBtn = wrap.querySelector('[data-action="add-all"]');
      if (addAllBtn) {
        addAllBtn.addEventListener('click', () => {
          const allNames = [1, 2, 3, 4, 5, 6].map((n) => grade + '-' + n);
          setSelectedClasses(selectedClasses.concat(allNames));
          renderGradeExpand(grade);
        });
      }
    }

    function loadKnownClasses() {
      if (!userId) return;
      gasRun('lesson.knownClasses', { userId }).then((res) => {
        if (res && res.success && Array.isArray(res.data.classes)) {
          knownClasses = res.data.classes;
          renderKnownChips();
        }
      }).catch((err) => {
        console.warn('lesson.knownClasses load failed:', err && err.message);
      });
    }

    // Click handler 群: 学年プリセット / カスタム追加。
    // 同一 IIFE スコープ内で 1 回だけ attach。
    document.addEventListener('click', (e) => {
      const grade = e.target && e.target.closest && e.target.closest('.btn-class-preset');
      if (grade) {
        document.querySelectorAll('.btn-class-preset').forEach((b) => b.classList.remove('active'));
        grade.classList.add('active');
        renderGradeExpand(grade.dataset.grade);
        return;
      }
      if (e.target && e.target.id === 'lesson-class-custom-btn') {
        const input = document.getElementById('lesson-class-custom-input');
        if (input && input.value) {
          addClass(input.value);
          input.value = '';
          input.focus();
        }
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target && e.target.id === 'lesson-class-custom-input') {
        e.preventDefault();
        const btn = document.getElementById('lesson-class-custom-btn');
        if (btn) btn.click();
      }
    });

    function renderWizardStep(step) {
      document.querySelectorAll('.lesson-step-dot').forEach((dot) => {
        const s = Number(dot.dataset.step);
        dot.textContent = s <= step ? '●' : '○';
        dot.classList.toggle('active', s === step);
      });
      document.querySelectorAll('.lesson-step').forEach((el) => {
        el.hidden = Number(el.dataset.step) !== step;
      });
    }
    window.lessonGoToStep = renderWizardStep;

    // Phase 編集: 名前 / 形式 / 質問 を inline 編集 + 追加削除。
    //   phases 配列を currentPhases に保持して、UI 操作 → 配列更新 → renderPhaseCards 再描画 →
    //   phases 全体を 1 回 autosave、という単純な data-flow。
    const PHASE_TEMPLATE_OPTIONS = [
      { value: 'numberline', label: '📊 数直線 (1〜5 で立場)' },
      { value: 'matrix', label: '🎯 マトリクス (2 軸の散布図)' },
      { value: 'pie', label: '🥧 円グラフ (選択肢 + 理由)' },
      { value: 'board', label: '📝 掲示板 (回答を一覧)' }
    ];
    const PHASE_MIN = 1;
    const PHASE_MAX = 5;
    let currentPhases = [];

    function renderPhaseCards(lessonJson) {
      const container = document.getElementById('lesson-phase-cards');
      if (!container) return;
      currentPhases = ((lessonJson && lessonJson.phases) || []).map((p) => ({
        name: p.name || '',
        formTemplate: p.formTemplate || 'numberline',
        question: p.question || '',
        templateOptions: normalizeTemplateOptions(p.templateOptions, p.formTemplate),
        formId: p.formId,
        sheetName: p.sheetName,
        formUrl: p.formUrl
      }));
      renderPhaseCardsInner();
    }

    // formTemplate ごとの templateOptions 既定値。renderPhaseCards / 形式変更時に呼ぶ。
    const SCALE_POINTS_ALLOWED = [3, 5, 7];
    const SCALE_POINTS_HINT = { 3: '低学年', 5: '既定', 7: '高学年' };

    function normalizeTemplateOptions(opts, formTemplate) {
      const o = (opts && typeof opts === 'object') ? Object.assign({}, opts) : {};
      // 共通: 画像 URL + スケール粒度 (numberline / matrix 用)
      if (typeof o.imageUrl !== 'string') o.imageUrl = '';
      if (formTemplate === 'numberline') {
        if (typeof o.lowLabel !== 'string') o.lowLabel = 'そう思わない';
        if (typeof o.highLabel !== 'string') o.highLabel = 'とてもそう思う';
        if (!SCALE_POINTS_ALLOWED.includes(o.scalePoints)) o.scalePoints = 5;
      } else if (formTemplate === 'matrix') {
        if (typeof o.xLow !== 'string') o.xLow = '低い';
        if (typeof o.xHigh !== 'string') o.xHigh = '高い';
        if (typeof o.yLow !== 'string') o.yLow = '低い';
        if (typeof o.yHigh !== 'string') o.yHigh = '高い';
        if (!SCALE_POINTS_ALLOWED.includes(o.scalePoints)) o.scalePoints = 5;
      } else if (formTemplate === 'pie' || formTemplate === 'board') {
        if (!Array.isArray(o.choices) || o.choices.length < 2) {
          o.choices = formTemplate === 'pie'
            ? ['A', 'B', 'どちらとも言えない']
            : ['賛成', '反対', 'どちらでもない'];
        }
      }
      return o;
    }

    function renderPhaseCardsInner() {
      const container = document.getElementById('lesson-phase-cards');
      if (!container) return;
      const esc = window.sharedUtilities.security.escapeHtml;
      const canDelete = currentPhases.length > PHASE_MIN;
      const cards = currentPhases.map((p, i) => {
        const options = PHASE_TEMPLATE_OPTIONS.map((opt) => {
          const sel = opt.value === p.formTemplate ? ' selected' : '';
          return '<option value="' + opt.value + '"' + sel + '>' + esc(opt.label) + '</option>';
        }).join('');
        const deleteBtn = canDelete
          ? '<button type="button" class="phase-delete-btn" data-phase-action="delete" data-phase-index="' + i + '" title="このフェーズを削除">×</button>'
          : '';
        return (
          '<div class="lesson-phase-card">' +
            '<div class="phase-card-header">' +
              '<span class="phase-number">フェーズ ' + (i + 1) + '</span>' +
              deleteBtn +
            '</div>' +
            '<div class="phase-field">' +
              '<label class="phase-label">フェーズ名:</label>' +
              '<input type="text" class="modern-input text-sm" data-phase-field="name" data-phase-index="' + i +
                '" value="' + esc(p.name) + '" maxlength="40" placeholder="例: 導入" />' +
            '</div>' +
            '<div class="phase-field">' +
              '<label class="phase-label">形式:</label>' +
              '<select class="modern-input text-sm" data-phase-field="formTemplate" data-phase-index="' + i + '">' +
                options +
              '</select>' +
            '</div>' +
            '<div class="phase-field">' +
              '<label class="phase-label">質問:</label>' +
              '<input type="text" class="modern-input text-sm" data-phase-field="question" data-phase-index="' + i +
                '" value="' + esc(p.question) + '" maxlength="200" placeholder="生徒に問いかける文" />' +
            '</div>' +
            renderPhaseDetailFields(p, i) +
            // プレビューは「設定の結果として何が見えるか」を示すので、設定 UI の後に置く
            '<div class="phase-preview-label">📺 生徒に見える形:</div>' +
            renderPhasePreview(p) +
            renderPhaseCommonOptions(p, i) +
          '</div>'
        );
      }).join('');
      const addBtn = currentPhases.length < PHASE_MAX
        ? (
          '<details class="phase-add-picker">' +
            '<summary class="phase-add-btn">＋ フェーズを追加 ▾</summary>' +
            '<div class="phase-add-menu">' +
              PHASE_TEMPLATE_OPTIONS.map((opt) => (
                '<button type="button" class="phase-add-menu-item" data-phase-action="add" data-phase-add-template="' + opt.value + '">' +
                  esc(opt.label) +
                '</button>'
              )).join('') +
            '</div>' +
          '</details>'
        )
        : '<p class="text-xs text-theme-muted text-center">フェーズは最大 ' + PHASE_MAX + ' 個までです</p>';
      container.innerHTML = cards + '<div class="phase-add-wrap">' + addBtn + '</div>';
    }

    // ミニプレビュー: 形式ごとに「生徒に何が見えるか」を視覚化する小さなSVG/text。
    function renderPhasePreview(p) {
      const esc = window.sharedUtilities.security.escapeHtml;
      const o = p.templateOptions || {};
      if (p.formTemplate === 'numberline') {
        const lo = esc(o.lowLabel || '低');
        const hi = esc(o.highLabel || '高');
        return (
          '<div class="phase-preview phase-preview-numberline">' +
            '<span class="phase-preview-end">' + lo + '</span>' +
            '<span class="phase-preview-track">━━━●━━━</span>' +
            '<span class="phase-preview-end">' + hi + '</span>' +
          '</div>'
        );
      }
      if (p.formTemplate === 'matrix') {
        const xl = esc(o.xLow || '低'), xh = esc(o.xHigh || '高');
        const yl = esc(o.yLow || '低'), yh = esc(o.yHigh || '高');
        // ボード上に出る散布点を 2 個サンプル配置 (児童 A は右上、児童 B は左下) して
        //   軸の意味と「点が動く範囲」を直感させる。
        return (
          '<div class="phase-preview phase-preview-matrix">' +
            '<div class="matrix-y-high">' + yh + ' ↑</div>' +
            '<div class="matrix-grid">' +
              '<span class="matrix-quad q1"></span><span class="matrix-quad q2">' +
                '<span class="matrix-sample-dot" style="top:25%;right:20%;">A</span>' +
              '</span>' +
              '<span class="matrix-quad q3">' +
                '<span class="matrix-sample-dot" style="bottom:20%;left:25%;">B</span>' +
              '</span><span class="matrix-quad q4"></span>' +
            '</div>' +
            '<div class="matrix-x-axis">' + xl + ' ← X → ' + xh + '</div>' +
            '<div class="matrix-y-low">↓ ' + yl + '</div>' +
          '</div>'
        );
      }
      if (p.formTemplate === 'pie') {
        const choices = Array.isArray(o.choices) ? o.choices : [];
        // 円グラフの占有率は均等分配の見た目で「N 等分される」感を出す。
        return (
          '<div class="phase-preview phase-preview-pie">' +
            '<svg viewBox="0 0 40 40" class="phase-preview-pie-svg" aria-hidden="true">' +
              pieSliceSvgPaths(choices.length) +
            '</svg>' +
            '<div class="phase-preview-pie-list">' +
              choices.slice(0, 3).map((c, k) => (
                '<span class="phase-preview-pie-item">' +
                  '<span class="phase-preview-pie-dot phase-preview-pie-dot-' + (k % 4) + '"></span>' +
                  esc(c) +
                '</span>'
              )).join('') +
              (choices.length > 3 ? '<span class="phase-preview-pie-item">…</span>' : '') +
              (o.includeOther ? '<span class="phase-preview-pie-item">+ その他</span>' : '') +
            '</div>' +
          '</div>'
        );
      }
      // board: サンプルカード 1 枚を見せて「カード形式で答えが並ぶ」を直感させる
      const sampleChoice = (Array.isArray(o.choices) && o.choices[0]) || '賛成';
      return (
        '<div class="phase-preview phase-preview-board">' +
          '<div class="phase-preview-sample-card">' +
            '<div class="sample-card-name">5-1 山田さん</div>' +
            '<div class="sample-card-answer">' + esc(sampleChoice) + '</div>' +
            '<div class="sample-card-reason">理由: みんなで考えたい話題だから…</div>' +
          '</div>' +
          '<div class="phase-preview-board-hint">… のような回答カードが児童の数だけ並ぶ</div>' +
        '</div>'
      );
    }

    // 円グラフ preview の N 等分 SVG paths を生成。N=1 は 1 slice で埋める、N>=2 は均等分割。
    //   呼び出し側は choices.length を渡すので 2〜6 が実用範囲。1 は防御的に許可、上限 6 でクランプ。
    function pieSliceSvgPaths(n) {
      n = Math.max(1, Math.min(6, n));
      const cx = 20, cy = 20, r = 18;
      const colors = ['#60a5fa', '#34d399', '#fbbf24', '#f87171', '#a78bfa', '#fb923c'];
      if (n === 1) {
        return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + colors[0] + '" opacity="0.8" />';
      }
      const slices = [];
      for (let k = 0; k < n; k++) {
        const a1 = (k / n) * 2 * Math.PI - Math.PI / 2;
        const a2 = ((k + 1) / n) * 2 * Math.PI - Math.PI / 2;
        const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
        const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
        const large = a2 - a1 > Math.PI ? 1 : 0;
        slices.push(
          '<path d="M' + cx + ',' + cy + ' L' + x1.toFixed(2) + ',' + y1.toFixed(2) +
          ' A' + r + ',' + r + ' 0 ' + large + ',1 ' + x2.toFixed(2) + ',' + y2.toFixed(2) + ' Z"' +
          ' fill="' + colors[k % colors.length] + '" opacity="0.8" />'
        );
      }
      return slices.join('');
    }

    // 共通: 画像入力 (drop / pick / paste) + スケール粒度 (numberline/matrix のみ)
    function hasScaleForTemplate(formTemplate) {
      return formTemplate === 'numberline' || formTemplate === 'matrix';
    }

    // 任意拡張: 教材画像 + スケール粒度。形式詳細と区別するため「+ もっと細かく」で集約。
    //   画像が既に設定済なら details を open で出して preview を即見せる。
    function renderPhaseCommonOptions(p, i) {
      const esc = window.sharedUtilities.security.escapeHtml;
      const o = p.templateOptions || {};
      const hasScale = hasScaleForTemplate(p.formTemplate);
      const hasImage = Boolean(o.imageFileId || o.imageDataUrl);
      const previewSrc = o.imageDataUrl || '';
      const pts = hasScale
        ? (SCALE_POINTS_ALLOWED.includes(o.scalePoints) ? o.scalePoints : 5)
        : null;
      const imageBlock = (
        '<div class="phase-extra-section">' +
          '<div class="phase-extra-label">🖼 教材画像 (任意)</div>' +
          '<div class="phase-image-zone" data-phase-image-zone data-phase-index="' + i + '" tabindex="0" ' +
            'aria-label="画像をドラッグ&ドロップ、ペースト、またはクリックして選択">' +
            (hasImage
              ? ('<div class="phase-image-preview">' +
                  (previewSrc ? '<img src="' + esc(previewSrc) + '" alt="教材プレビュー" />' : '<span>🖼 画像登録済</span>') +
                  '<button type="button" class="phase-image-clear" data-phase-action="image-clear" data-phase-index="' + i + '">× 削除</button>' +
                '</div>')
              : ('<div class="phase-image-hint">' +
                  '<span class="phase-image-hint-icon">📂</span>' +
                  '<span class="phase-image-hint-text">画像をここにドロップ / クリックして選択 / Cmd+V でペースト</span>' +
                '</div>')
            ) +
            '<input type="file" accept="image/*" class="phase-image-file" data-phase-image-file data-phase-index="' + i + '" />' +
          '</div>' +
          '<p class="phase-image-note text-xs text-theme-muted mt-1">png / jpeg / gif / webp、5MB まで</p>' +
        '</div>'
      );
      let scaleBlock = '';
      if (hasScale) {
        scaleBlock = (
          '<div class="phase-extra-section">' +
            '<div class="phase-extra-label">📏 スケールの段階 (' + pts + ')</div>' +
            '<div class="phase-scale-grid">' +
              SCALE_POINTS_ALLOWED.map((n) => (
                '<label class="phase-scale-opt">' +
                  '<input type="radio" name="phase-scale-' + i + '" data-phase-opt="scalePoints" data-phase-index="' + i +
                    '" value="' + n + '"' + (pts === n ? ' checked' : '') + ' />' +
                  ' ' + n + ' 段階' +
                  ' <span class="phase-scale-hint">(' + (SCALE_POINTS_HINT[n] || '') + ')</span>' +
                '</label>'
              )).join('') +
            '</div>' +
          '</div>'
        );
      }
      // 画像が登録済なら open、それ以外は閉じる (画面ノイズ削減)。
      // summary に状態バッジを出すことで、閉じた状態でも「何が設定済か」が一目でわかる。
      const badges = [];
      if (hasImage) badges.push('🖼 画像あり');
      if (hasScale && pts !== 5) badges.push('📏 ' + pts + '段階');
      const summaryText = '＋ もっと細かく (任意)' +
        (badges.length ? ' <span class="phase-extra-badges">' + badges.join(' / ') + '</span>' : '');
      return (
        '<details class="phase-detail phase-extra-details"' + (hasImage ? ' open' : '') + '>' +
          '<summary>' + summaryText + '</summary>' +
          '<div class="phase-extra-list">' + imageBlock + scaleBlock + '</div>' +
        '</details>'
      );
    }

    // 形式ごとの詳細編集 (軸ラベル / 選択肢)。
    //   renderPhaseCommonOptions は呼び出し側で別途出すので、ここでは形式固有の field のみ。
    function renderPhaseDetailFields(p, i) {
      const esc = window.sharedUtilities.security.escapeHtml;
      const o = p.templateOptions || {};
      if (p.formTemplate === 'numberline') {
        return (
          '<details class="phase-detail" open>' +
            '<summary>軸の両端ラベル</summary>' +
            '<div class="phase-detail-row">' +
              '<label class="phase-detail-tag">軸:</label>' +
              '<input type="text" class="modern-input text-sm" data-phase-opt="lowLabel" data-phase-index="' + i +
                '" value="' + esc(o.lowLabel || '') + '" maxlength="20" placeholder="例: 反対" />' +
              '<span class="phase-detail-sep">↔</span>' +
              '<input type="text" class="modern-input text-sm" data-phase-opt="highLabel" data-phase-index="' + i +
                '" value="' + esc(o.highLabel || '') + '" maxlength="20" placeholder="例: 賛成" />' +
            '</div>' +
          '</details>'
        );
      }
      if (p.formTemplate === 'matrix') {
        return (
          '<details class="phase-detail" open>' +
            '<summary>X 軸 / Y 軸ラベル</summary>' +
            '<div class="phase-detail-row">' +
              '<label class="phase-detail-tag">X:</label>' +
              '<input type="text" class="modern-input text-sm" data-phase-opt="xLow" data-phase-index="' + i +
                '" value="' + esc(o.xLow || '') + '" maxlength="20" placeholder="例: 効率↓" />' +
              '<span class="phase-detail-sep">↔</span>' +
              '<input type="text" class="modern-input text-sm" data-phase-opt="xHigh" data-phase-index="' + i +
                '" value="' + esc(o.xHigh || '') + '" maxlength="20" placeholder="例: 効率↑" />' +
            '</div>' +
            '<div class="phase-detail-row">' +
              '<label class="phase-detail-tag">Y:</label>' +
              '<input type="text" class="modern-input text-sm" data-phase-opt="yLow" data-phase-index="' + i +
                '" value="' + esc(o.yLow || '') + '" maxlength="20" placeholder="例: 倫理↓" />' +
              '<span class="phase-detail-sep">↔</span>' +
              '<input type="text" class="modern-input text-sm" data-phase-opt="yHigh" data-phase-index="' + i +
                '" value="' + esc(o.yHigh || '') + '" maxlength="20" placeholder="例: 倫理↑" />' +
            '</div>' +
          '</details>'
        );
      }
      if (p.formTemplate === 'pie' || p.formTemplate === 'board') {
        const choices = Array.isArray(o.choices) ? o.choices : [];
        const includeOther = Boolean(o.includeOther);
        const items = choices.map((c, j) => (
          '<div class="phase-choice-row">' +
            '<input type="text" class="modern-input text-sm" data-phase-choice="' + j + '" data-phase-index="' + i +
              '" value="' + esc(c) + '" maxlength="40" placeholder="選択肢 ' + (j + 1) + '" />' +
            (choices.length > 2
              ? '<button type="button" class="phase-choice-del" data-phase-action="choice-delete" data-phase-index="' + i + '" data-choice-index="' + j + '" title="削除">×</button>'
              : '') +
          '</div>'
        )).join('');
        const addBtn = choices.length < 6
          ? '<button type="button" class="phase-choice-add" data-phase-action="choice-add" data-phase-index="' + i + '">＋ 選択肢</button>'
          : '<p class="text-xs text-theme-muted">最大 6 つまで</p>';
        // 「その他」(児童が自由記述で回答できる Forms 標準オプション)
        const otherToggle = (
          '<label class="phase-choice-other">' +
            '<input type="checkbox" data-phase-opt-bool="includeOther" data-phase-index="' + i +
              '"' + (includeOther ? ' checked' : '') + ' />' +
            ' 「その他」(児童が自由に書ける) を加える' +
          '</label>'
        );
        return (
          '<details class="phase-detail" open>' +
            '<summary>選択肢 (' + choices.length + (includeOther ? ' + その他' : '') + ' つ)</summary>' +
            '<div class="phase-choice-list">' + items + addBtn + '</div>' +
            otherToggle +
          '</details>'
        );
      }
      return '';
    }

    // 保存時に config に残してはいけない巨大プレビューデータ。
    //   imageDataUrl は base64 (最大 ~6.7MB) でローカル preview 用のみ。fileId が真値。
    //   lessonJson の 45000 char 上限を一発で吹き飛ばすので必ず strip する。
    const PHASE_PREVIEW_ONLY_KEYS = ['imageDataUrl'];
    function stripPreviewKeys(templateOptions) {
      if (!templateOptions || typeof templateOptions !== 'object') return templateOptions;
      const clean = {};
      Object.keys(templateOptions).forEach((k) => {
        if (PHASE_PREVIEW_ONLY_KEYS.indexOf(k) >= 0) return;
        clean[k] = templateOptions[k];
      });
      return clean;
    }

    function savePhasesNow() {
      let hidden = document.getElementById('lesson-phases-hidden');
      if (!hidden) {
        hidden = document.createElement('input');
        hidden.type = 'hidden';
        hidden.id = 'lesson-phases-hidden';
        hidden.dataset.lessonField = 'phases';
        document.body.appendChild(hidden);
      }
      hidden.value = '';
      hidden.__phasesValue = currentPhases.map((p) => ({
        name: p.name,
        formTemplate: p.formTemplate,
        question: p.question,
        templateOptions: stripPreviewKeys(p.templateOptions)
      }));
      scheduleLessonFieldSave(hidden);
    }

    // 部分更新だけプレビュー更新したいときに使う。
    //   毎入力で renderPhaseCardsInner() すると input が再生成されて caret が飛ぶので、
    //   preview と外側の選択肢サマリだけを差分更新する。
    function refreshPhasePreviewOnly(idx) {
      const card = document.querySelectorAll('.lesson-phase-card')[idx];
      if (!card) return;
      const old = card.querySelector('.phase-preview');
      if (old) {
        const tmp = document.createElement('div');
        tmp.innerHTML = renderPhasePreview(currentPhases[idx]);
        if (tmp.firstChild) old.replaceWith(tmp.firstChild);
      }
      const summary = card.querySelector('.phase-detail summary');
      if (summary && (currentPhases[idx].formTemplate === 'pie' || currentPhases[idx].formTemplate === 'board')) {
        const choices = (currentPhases[idx].templateOptions || {}).choices || [];
        summary.textContent = '選択肢 (' + choices.length + ' つ)';
      }
    }

    const phaseCardsRoot = () => document.getElementById('lesson-phase-cards');

    document.addEventListener('input', (e) => {
      const el = e.target;
      if (!el || !el.dataset) return;
      const idx = Number(el.dataset.phaseIndex);
      if (Number.isNaN(idx) || !currentPhases[idx]) return;
      // 1) 基本フィールド (name / question)
      if (el.dataset.phaseField === 'name' || el.dataset.phaseField === 'question') {
        currentPhases[idx][el.dataset.phaseField] = el.value;
        savePhasesNow();
        return;
      }
      // 2) templateOptions (lowLabel / highLabel / xLow / xHigh / yLow / yHigh)
      if (el.dataset.phaseOpt) {
        currentPhases[idx].templateOptions = currentPhases[idx].templateOptions || {};
        currentPhases[idx].templateOptions[el.dataset.phaseOpt] = el.value;
        refreshPhasePreviewOnly(idx);
        savePhasesNow();
        return;
      }
      // 3) 選択肢 (choices array index)
      if (el.dataset.phaseChoice !== undefined) {
        const ci = Number(el.dataset.phaseChoice);
        const opts = currentPhases[idx].templateOptions = currentPhases[idx].templateOptions || {};
        opts.choices = Array.isArray(opts.choices) ? opts.choices.slice() : [];
        opts.choices[ci] = el.value;
        refreshPhasePreviewOnly(idx);
        savePhasesNow();
      }
    });

    document.addEventListener('change', (e) => {
      const el = e.target;
      if (!el || !el.dataset) return;
      // 1) 形式変更
      if (el.dataset.phaseField === 'formTemplate') {
        const idx = Number(el.dataset.phaseIndex);
        if (!currentPhases[idx]) return;
        currentPhases[idx].formTemplate = el.value;
        currentPhases[idx].templateOptions = normalizeTemplateOptions(currentPhases[idx].templateOptions, el.value);
        renderPhaseCardsInner();
        savePhasesNow();
        return;
      }
      // 2.5) bool checkbox (includeOther 等)
      //   全再描画すると base64 imageDataUrl の再シリアライズや caret 飛びが発生するので、
      //   preview + summary 文言だけ in-place で書き換える。
      if (el.dataset.phaseOptBool && el.type === 'checkbox') {
        const idx = Number(el.dataset.phaseIndex);
        if (!currentPhases[idx]) return;
        currentPhases[idx].templateOptions = currentPhases[idx].templateOptions || {};
        currentPhases[idx].templateOptions[el.dataset.phaseOptBool] = el.checked;
        // 選択肢 summary に「その他」表記を反映
        if (el.dataset.phaseOptBool === 'includeOther') {
          const card = document.querySelectorAll('.lesson-phase-card')[idx];
          if (card) {
            card.querySelectorAll('.phase-detail summary').forEach((s) => {
              const t = s.textContent || '';
              if (/^選択肢/.test(t)) {
                const choices = (currentPhases[idx].templateOptions.choices || []).length;
                s.textContent = '選択肢 (' + choices + (el.checked ? ' + その他' : '') + ' つ)';
              }
            });
          }
        }
        refreshPhasePreviewOnly(idx);
