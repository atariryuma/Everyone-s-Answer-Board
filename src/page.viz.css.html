<style>
  /* =====================================================================
   * Visualization mode styles (M1 number line / M2 matrix scatter)
   *
   * Why: 既存の card grid 用 CSS (page.css) と完全に分離。
   *      .viz-container 内のスタイルは board モード時には適用されないので、
   *      既存表示への影響ゼロ。
   * ===================================================================== */

  .viz-container {
    position: relative;
    width: 100%;
    /* ヘッダ + フッタ分を控えた高さ。スマホでも横向きでまともに見えるよう min-height は控えめ。 */
    min-height: 60vh;
    padding: 1rem 0.5rem 2rem;
    background: var(--theme-bg-base);
    color: var(--theme-text-primary);
    overflow: visible;
  }

  .viz-svg {
    width: 100%;
    height: 100%;
    min-height: 55vh;
    display: block;
  }

  /* 軸線 + ラベル */
  .viz-axis line,
  .viz-axis path {
    stroke: var(--theme-border-strong);
    stroke-width: 1;
  }
  /* Light mode: slate-400 50% → slate-500 80% (slate-50 bg で軸線を見やすく) */
  body.theme-light .viz-axis line,
  body.theme-light .viz-axis path {
    stroke: rgba(100, 116, 139, 0.8);
  }
  .viz-axis text {
    fill: var(--theme-text-secondary);  /* muted → secondary で軸数字を明瞭に */
    font-size: 0.875rem;
    font-weight: 500;
  }

  .viz-axis-label {
    fill: var(--theme-text-primary);
    font-size: 1.125rem;
    font-weight: 700;  /* 600 → 700 で軸の主タイトルを強く */
  }
  /* Light mode は viz-axis-label を slate-900 で限りなく濃く (white bg 上で hierarchy 明示) */
  body.theme-light .viz-axis-label {
    fill: #0f172a;
  }

  /* データ点。暗背景でドット同士の境界を分離するため stroke は白半透明。
   *   opacity 0.85 で重なりを色味で読める (密度を透明度で表現)。
   *   リアクションリング (色 stroke) は JS インライン style で上書きされる。 */
  .viz-dot {
    cursor: pointer;
    /* stroke-opacity も transition 対象に: リアクションリング (色枠) のフェードを滑らかに */
    transition: r 120ms ease, stroke-width 120ms ease, stroke-opacity 120ms ease, opacity 200ms ease;
    fill: var(--theme-accent-cyan);
    stroke: rgba(255, 255, 255, 0.55);  /* theme:exempt - cyan dot 上の白縁取り (separator) */
    stroke-width: 1.3;
    opacity: 0.85;
  }
  .viz-dot:hover {
    stroke: #fde047;  /* yellow-300 hover (brand feedback color) */
    stroke-width: 2.5;
    stroke-opacity: 1;   /* hover 時はリングをはっきり出して判別しやすく */
  }
  /* 揺らぎが大きい点（道徳指導案：意図的指名の素材） */
  .viz-dot.swing-high {
    fill: #fde047;  /* yellow-300 */
    stroke: var(--status-warning);
    stroke-width: 2;
  }
  /* 教師注目マーク（HIGHLIGHT）: 金縁 + 微発光。
     Why: 教師が「みんなで考えたい」とマークした意見を viz でも一目で識別できるようにする。
       同調圧力 (児童間リアクション) は subtle ring で抑制しているのに対し、
       教師の意図的な促しは多面的視点の提示なので積極的に強調 OK（DCE 観点で安全）。
     stroke は JS インライン style (#fbbf24) で priority 上書きするので、CSS は drop-shadow (glow) を担当。 */
  .viz-dot.highlight {
    filter: drop-shadow(0 0 4px color-mix(in srgb, var(--brand-accent) 65%, transparent));
  }
  body.projector-mode .viz-dot.highlight {
    /* 電子黒板 / プロジェクタでも視認しやすいよう glow を強める */
    filter: drop-shadow(0 0 7px color-mix(in srgb, var(--brand-accent) 85%, transparent));
  }
  /* ghost マーカー: 揺らぎ大 (swing-trace) で「過去位置」を示す薄色 dot。
     groupByStudent は ghost を空配列にするので、画面に出るのは matrix renderer の
     swing-trace ブロックが描画する .ghost.swing（vizComputeSwings 上位 N 人だけ）。 */
  .viz-dot.ghost {
    opacity: 0.55;
    stroke: #fde047;  /* yellow-300 */
    stroke-width: 1.2;
    stroke-dasharray: 2 2;
    fill: var(--theme-accent-cyan);
  }
  /* dot 中央のリアクション数バッジ (matrix / numberline 共通)。
     stroke 色 (緑/赤/紫) で「どのリアクションが多いか」、内部数字で「合計何件」を表現。 */
  .viz-dot-label {
    font-size: 10px;
    font-weight: 700;
    fill: var(--theme-text-inverse);  /* dot 上に重ねるので背景と反転色 */
    paint-order: stroke fill;
    stroke: rgba(255, 255, 255, 0.9);  /* theme:exempt - colored dot 上の白ハロー (badge separator) */
    stroke-width: 2.5;
  }
  /* 比較モード ON 中で議論前未保存のとき、compare ボタンに「使えない」ヒント */
  .viz-btn.compare-disabled {
    opacity: 0.55;
    cursor: help;
  }

  /* 行リストポップアップ (pie のカテゴリ / wordcloud の単語クリック時) */
  .viz-rows-popup {
    position: fixed;
    inset: 0;
    background: var(--theme-bg-overlay);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9000;
    animation: vizPopupFadeIn 140ms ease;
  }
  @keyframes vizPopupFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .viz-rows-popup-card {
    background: var(--theme-bg-elevated);
    color: var(--theme-text-primary);
    border: 1px solid var(--theme-border-normal);
    border-radius: 0.625rem;
    width: min(92vw, 640px);
    max-height: 85vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
  }
  .viz-rows-popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--theme-border-normal);
    background: var(--theme-overlay-black-20);
  }
  .viz-rows-popup-header h4 { margin: 0; font-size: 1rem; font-weight: 700; }
  .viz-rows-popup-close {
    background: transparent;
    border: 0;
    color: var(--theme-text-secondary);
    cursor: pointer;
    font-size: 1.5rem;
    line-height: 1;
    padding: 0 8px;
  }
  .viz-rows-popup-close:hover { color: var(--theme-text-primary); }
  .viz-rows-popup-body {
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .viz-rows-popup-empty {
    text-align: center;
    color: var(--theme-text-muted);
  }
  .viz-rows-popup-row {
    background: var(--theme-overlay-black-60);
    border: 1px solid var(--theme-border-normal);
    border-radius: 0.5rem;
    padding: 10px 12px;
    cursor: pointer;
    transition: background var(--transition-fast) ease, border-color var(--transition-fast) ease;
  }
  .viz-rows-popup-row:hover,
  .viz-rows-popup-row:focus {
    background: color-mix(in srgb, var(--theme-accent-cyan) 8%, transparent);  /* accent-cyan の薄め */
    border-color: color-mix(in srgb, var(--theme-accent-cyan) 45%, transparent);
    outline: none;
  }
  /* 象限 chip: matrix の意見一覧で「この意見はどの立場から来たか」を示す。
     keyword popup を全象限から集めるので、chip 色違いで「同じ言葉が違う立場で」を visualize。 */
  .viz-rows-popup-chip {
    display: inline-block;
    margin-left: 0.5rem;
    font-size: 0.75rem;
    color: var(--brand-accent-light);
    background: color-mix(in srgb, var(--theme-accent-cyan) 10%, transparent);  /* accent-cyan の薄め */
    border: 1px solid color-mix(in srgb, var(--theme-accent-cyan) 30%, transparent);
    padding: 0.1rem 0.4rem;
    border-radius: 0.5rem;
    font-weight: 600;
    vertical-align: middle;
  }
  .viz-rows-popup-name {
    font-size: 0.875rem;
    color: var(--theme-text-muted);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .viz-rows-popup-reason {
    font-size: 1rem;
    line-height: 1.5;
    margin-bottom: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* Popup 内のリアクションコンテナ。
     ボタン本体は createReactionButtons() で生成された .reaction-btn を使うので
     既存カードと同じスタイル (Tailwind 経由 + page.css の .reaction-btn) が
     そのまま効く。ここでは並びのレイアウトだけ整える。 */
  .viz-rows-popup-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  /* 新規追加直後の強調（フェードイン） */
  .viz-dot.enter {
    animation: vizEnter 600ms ease-out;
  }
  @keyframes vizEnter {
    0%   { opacity: 0; r: 0; }
    60%  { opacity: 1; r: 9; }
    100% { opacity: 0.92; }
  }

  /* M2: 4 象限の薄背景 */
  .viz-quadrant {
    pointer-events: none;
  }
  .viz-quadrant.hh { fill: color-mix(in srgb, var(--status-success) 8%, transparent); }
  .viz-quadrant.hl { fill: rgba(250, 204, 21, 0.07); }
  .viz-quadrant.lh { fill: color-mix(in srgb, var(--theme-accent-cyan) 7%, transparent); }
  .viz-quadrant.ll { fill: color-mix(in srgb, var(--status-error) 7%, transparent); }
  /* Light mode: slate-50 上では 7-8% は薄すぎて消えるので倍程度に上げる (依然 subtle) */
  body.theme-light .viz-quadrant.hh { fill: rgba(22, 163, 74, 0.14); }
  body.theme-light .viz-quadrant.hl { fill: rgba(202, 138, 4, 0.13); }
  body.theme-light .viz-quadrant.lh { fill: color-mix(in srgb, var(--theme-accent-cyan-deep) 13%, transparent); }
  body.theme-light .viz-quadrant.ll { fill: rgba(220, 38, 38, 0.12); }

  .viz-quadrant-label {
    fill: rgba(226, 232, 240, 0.45);
    font-size: 1rem;
    font-weight: 700;
    pointer-events: none;
    text-anchor: middle;
  }
  /* Light mode: slate-200 45% → slate-700 (slate-50 bg で WCAG AA 確保) */
  body.theme-light .viz-quadrant-label {
    fill: rgba(51, 65, 85, 0.85);
  }
  /* 象限ラベル直下/上の理由キーワード行 (SVG 内統合配置)。
   *   ラベルより一段薄く、フォントを小さく - 階層を表現。 */
  .viz-quadrant-keyword {
    fill: rgba(199, 210, 254, 0.7);
    font-size: 0.875rem;
    font-weight: 500;
    pointer-events: none;
    text-anchor: middle;
    letter-spacing: 0.03em;
  }
  /* Light mode: indigo-200 70% → indigo-700 (slate-50 bg で AA 確保) */
  body.theme-light .viz-quadrant-keyword {
    fill: rgba(55, 48, 163, 0.85);
  }
  /* 個別キーワード (tspan) は click 可能。hover で fill 変更 + cursor pointer。
     pointer-events: auto で親 <text> の pointer-events: none を上書き。 */
  .viz-quadrant-keyword-pill {
    pointer-events: auto;
    cursor: pointer;
    transition: fill var(--transition-quick) ease;
  }
  .viz-quadrant-keyword-pill:hover,
  .viz-quadrant-keyword-pill:focus {
    fill: #fde047;  /* yellow-300 hover feedback */
    outline: none;
  }
  body.projector-mode .viz-quadrant-keyword {
    font-size: 1.125rem;
  }
  @media (max-width: 768px) {
    .viz-quadrant-keyword { font-size: 0.75rem; }
  }

  /* ホバー時のツールチップカード */
  .viz-tooltip {
    position: fixed;
    z-index: 9999;
    background: var(--theme-bg-elevated);
    color: var(--theme-text-primary);
    border: 1px solid var(--theme-border-normal);
    border-radius: 0.5rem;
    padding: 0.6rem 0.8rem;
    max-width: 22rem;
    font-size: 0.875rem;
    line-height: 1.45;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 140ms ease, transform 140ms ease;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
  }
  .viz-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .viz-tooltip .tooltip-meta {
    font-size: 0.75rem;
    color: var(--theme-text-muted);
    margin-bottom: 0.25rem;
  }
  .viz-tooltip .tooltip-value {
    font-weight: 700;
    color: var(--theme-accent-cyan);
    margin-right: 0.4rem;
  }
  .viz-tooltip .tooltip-empty {
    color: var(--theme-text-muted);
  }
  /* 同座標カウント: forceCollide で散らばって見えるドット塊の本当の人数を伝える行。
     主たる回答テキストと視覚的に分離するため上に薄い区切り線。 */
  .viz-tooltip .tooltip-samecoord {
    margin-top: 0.5rem;
    padding-top: 0.4rem;
    border-top: 1px solid var(--theme-border-subtle);
    font-size: 0.75rem;
    color: var(--theme-text-muted);
    font-style: italic;
  }

  /* 対立軸 1 行サマリ (X 軸ラベルと同列に薄く差し込み)。
     色とサイズを軸ラベルより一段抑えて、視線を軸ラベル → 対立軸 → ドットの順に誘導。
     学術会議「道理ある不一致」の可視化用 (v2691)。 */
  .viz-contrast-summary {
    fill: rgba(199, 210, 254, 0.55);
    font-size: 0.875rem;
    font-weight: 500;
    pointer-events: none;
    letter-spacing: 0.02em;
  }
  /* Light mode: indigo-200 55% → indigo-700 (slate-50 bg で AA 確保) */
  body.theme-light .viz-contrast-summary {
    fill: rgba(55, 48, 163, 0.75);
  }
  body.projector-mode .viz-contrast-summary {
    font-size: 1rem;
    fill: rgba(199, 210, 254, 0.7);
  }
  body.theme-light.projector-mode .viz-contrast-summary {
    fill: rgba(55, 48, 163, 0.9);
  }
  @media (max-width: 768px) {
    .viz-contrast-summary { font-size: 0.75rem; }
  }

  /* 共通の足場（consensus / bridging）— 対立軸の補集合。 emerald 系で「対立(indigo)」と
     色相を分け、 同じ控えめさ(weight 500, 半透明)を保つ。 多数派強調にならないトーン。 */
  .viz-consensus-summary {
    fill: rgba(110, 231, 183, 0.6);   /* emerald-300 */
    font-size: 0.875rem;
    font-weight: 500;
    pointer-events: none;
    letter-spacing: 0.02em;
  }
  /* Light mode: emerald-300 → emerald-700 (slate-50 bg で AA 確保) */
  body.theme-light .viz-consensus-summary {
    fill: rgba(4, 120, 87, 0.85);
  }
  body.projector-mode .viz-consensus-summary {
    font-size: 1rem;
    fill: rgba(110, 231, 183, 0.75);
  }
  body.theme-light.projector-mode .viz-consensus-summary {
    fill: rgba(4, 120, 87, 0.95);
  }
  @media (max-width: 768px) {
    .viz-consensus-summary { font-size: 0.75rem; }
  }

  /* Empty Chair — 誰もいない象限の控えめなヒント。 ラベルよりさらに薄く、 斜体で
     「まだ存在しない / 招き入れる」ニュアンス。 強調しない。 */
  .viz-empty-chair-hint {
    fill: rgba(148, 163, 184, 0.5);   /* slate-400 muted */
    font-size: 0.875rem;
    font-style: italic;
    font-weight: 400;
    pointer-events: none;
    text-anchor: middle;
    letter-spacing: 0.02em;
  }
  body.theme-light .viz-empty-chair-hint {
    fill: rgba(100, 116, 139, 0.8);   /* slate-500 */
  }
  body.projector-mode .viz-empty-chair-hint {
    font-size: 1rem;
  }
  @media (max-width: 768px) {
    .viz-empty-chair-hint { font-size: 0.75rem; }
  }

  /* 整数セル境界の薄い grid line: ドット塊が「同じ Likert セルにまとまっている」と読める
     ようにする補助線。pointer-events:none でクリックを邪魔しない (v2691)。 */
  .viz-grid {
    pointer-events: none;
  }

  /* 孤立意見 (lone-voice): 象限内 1 票だけの意見に control-tower 的な金色ハロー。
     学術会議 2020 報告 p.14「マジョリティのマイノリティへの同調強要」回避用 (v2691)。
     highlight (教師注目, drop-shadow 0 0 4-7px color-mix(in srgb, var(--brand-accent) 65%, transparent)) より淡く、
     1 票でも「ここに 1 つあるよ」と教師が即座に発見できる程度の glow。
     stroke は触らず drop-shadow のみで実現するので、reaction ring 色とも共存する。 */
  .viz-dot.lone-voice {
    filter: drop-shadow(0 0 3px color-mix(in srgb, var(--brand-accent) 45%, transparent));
  }
  body.projector-mode .viz-dot.lone-voice {
    filter: drop-shadow(0 0 5px color-mix(in srgb, var(--brand-accent) 60%, transparent));
  }
  /* lone-voice + highlight 同時: highlight 側の drop-shadow を優先 (cascade で後者が勝つ) */
  .viz-dot.highlight.lone-voice {
    filter: drop-shadow(0 0 5px color-mix(in srgb, var(--brand-accent) 75%, transparent));
  }

  /* 議論前 → 現在 の動き軌跡 (v2777 で矢印 overlay から ghost trail に再設計)。
     研究根拠:
       - Heer & Robertson 2007 "Animated Transitions in Statistical Data Graphics":
         trajectory history が認知負荷を下げる
       - FlowingData "Ghost Trails": 過去の経路を fade 表示して時間の方向感を出す
       - 道徳科 評価観: 「動いた=正解」バイアスを避けるため amber 強調・矢頭は廃止
     設計:
       - 全 trail 同色・同太さ (距離による強調なし)
       - 低 opacity (0.32) で「補助情報」感を出す
       - pointer-events: none で dot click を阻害しない
       - stroke-linecap: round で trail の両端を柔らかく
   */
  .viz-trail {
    stroke: rgba(125, 211, 252, 0.32);  /* sky-300 ハーフトーン */
    stroke-width: 1.3;
    stroke-linecap: round;
    fill: none;
    pointer-events: none;
  }
  body.projector-mode .viz-trail {
    stroke: rgba(125, 211, 252, 0.55);
    stroke-width: 1.8;
  }

  /* =============================================================================
   * モーダル: 軸ラベル + プログレスバー (numberline / matrix の「数字だけ」問題を解消)
   *   左端 = min ラベル、右端 = max ラベル、ドットが値の位置を示す。
   *   matrix は X/Y 2 本 + 象限名。教師の指導案を学習者に伝える視覚化。
   * ============================================================================= */
  .modal-axis-block {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    padding-bottom: 0.5rem;
  }
  .modal-axis-row {
    display: grid;
    /* 構成: [min ラベル][bar][max ラベル][値]。bar を 3fr に拡大して立場の幅を強調しつつ、
       右端の value 列は auto で 5/5 表示を固定位置に置く (視線で縦に追える)。 */
    grid-template-columns: minmax(0, 1fr) 3fr minmax(0, 1fr) auto;
    align-items: center;
    gap: 0.8rem;
    font-size: 1.125rem;
    color: var(--theme-text-primary);
  }
  .modal-axis-label-min {
    text-align: right;
    color: var(--theme-text-muted);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .modal-axis-label-max {
    text-align: left;
    color: var(--theme-text-muted);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .modal-axis-track {
    position: relative;
    height: 0.7rem;  /* ドット (1.4rem) との比率を整える */
    /* 単色 track: 「左 → 右 = 弱 → 強」誤読を避けるため、立場の対極は同等扱い。 */
    background: var(--theme-border-subtle);
    border-radius: 9999px;
    border: 1px solid var(--theme-border-subtle);
  }
  .modal-axis-dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 1.4rem;
    height: 1.4rem;
    border-radius: 50%;
    background: #fde047;  /* yellow-300 (highlight dot) */
    border: 2px solid var(--status-warning);
    box-shadow: 0 0 8px color-mix(in srgb, var(--theme-status-warning-strong) 65%, transparent);
  }
  /* 行右端の値表示 (5/5)。全行で位置が固定なので視線で縦に値を比較できる。 */
  .modal-axis-value {
    font-variant-numeric: tabular-nums;
    color: var(--theme-text-emphasis);  /* dark=yellow-300 / light=amber-700 (白modalで可読) */
    font-weight: 700;
    font-size: 1rem;
    white-space: nowrap;
  }
  .modal-axis-quadrant {
    /* 教師の指導意図の核心 = 立場の道徳的意味。少し大きめで主役感を出す。
       両モードで明瞭な hierarchy を出すため accent-cyan token + alpha 強化。 */
    font-size: 1.125rem;
    color: var(--theme-accent-cyan);
    font-weight: 700;
    text-align: center;
