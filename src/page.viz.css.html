<style>
  /* =====================================================================
   * Visualization mode styles (M1 number line / M2 matrix scatter)
   *
   * Why: 既存の card grid 用 CSS (page.css) と完全に分離。
   *      .viz-container 内のスタイルは board モード時には適用されないので、
   *      既存表示への影響ゼロ。
   * ===================================================================== */

  .viz-container {
    position: relative;
    width: 100%;
    /* ヘッダ + フッタ分を控えた高さ。スマホでも横向きでまともに見えるよう min-height は控えめ。 */
    min-height: 60vh;
    padding: 1rem 0.5rem 2rem;
    background: var(--brand-background, #0f172a);
    color: var(--brand-text, #e2e8f0);
    overflow: visible;
  }

  .viz-svg {
    width: 100%;
    height: 100%;
    min-height: 55vh;
    display: block;
  }

  /* 軸線 + ラベル */
  .viz-axis line,
  .viz-axis path {
    stroke: rgba(148, 163, 184, 0.5);
    stroke-width: 1;
  }
  .viz-axis text {
    fill: var(--brand-text-muted, #94a3b8);
    font-size: 0.9rem;
  }

  .viz-axis-label {
    fill: var(--brand-text, #e2e8f0);
    font-size: 1.05rem;
    font-weight: 600;
  }

  /* データ点 */
  .viz-dot {
    cursor: pointer;
    transition: r 120ms ease, stroke-width 120ms ease, opacity 200ms ease;
    fill: #38bdf8;
    stroke: #0f172a;
    stroke-width: 1.2;
    opacity: 0.92;
  }
  .viz-dot:hover {
    stroke: #fde047;
    stroke-width: 2.5;
  }
  /* 揺らぎが大きい点（道徳指導案：意図的指名の素材） */
  .viz-dot.swing-high {
    fill: #fde047;
    stroke: #f59e0b;
    stroke-width: 2;
  }
  /* 揺らぎ表示: 過去投稿のゴースト点 */
  .viz-dot.ghost {
    opacity: 0.28;
    stroke-width: 0;
  }
  /* 新規追加直後の強調（フェードイン） */
  .viz-dot.enter {
    animation: vizEnter 600ms ease-out;
  }
  @keyframes vizEnter {
    0%   { opacity: 0; r: 0; }
    60%  { opacity: 1; r: 9; }
    100% { opacity: 0.92; }
  }

  /* M2: 4 象限の薄背景 */
  .viz-quadrant {
    pointer-events: none;
  }
  .viz-quadrant.hh { fill: rgba(34, 197, 94, 0.08); }
  .viz-quadrant.hl { fill: rgba(250, 204, 21, 0.07); }
  .viz-quadrant.lh { fill: rgba(56, 189, 248, 0.07); }
  .viz-quadrant.ll { fill: rgba(248, 113, 113, 0.07); }

  .viz-quadrant-label {
    fill: rgba(226, 232, 240, 0.45);
    font-size: 1rem;
    font-weight: 700;
    pointer-events: none;
    text-anchor: middle;
  }

  /* ホバー時のツールチップカード */
  .viz-tooltip {
    position: fixed;
    z-index: 9999;
    background: rgba(15, 23, 42, 0.95);
    color: #f1f5f9;
    border: 1px solid rgba(148, 163, 184, 0.4);
    border-radius: 0.5rem;
    padding: 0.6rem 0.8rem;
    max-width: 22rem;
    font-size: 0.92rem;
    line-height: 1.45;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 140ms ease, transform 140ms ease;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
  }
  .viz-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .viz-tooltip .tooltip-meta {
    font-size: 0.75rem;
    color: #94a3b8;
    margin-bottom: 0.25rem;
  }
  .viz-tooltip .tooltip-value {
    font-weight: 700;
    color: #38bdf8;
    margin-right: 0.4rem;
  }

  /* M3 ワードランキング */
  .word-bar {
    fill: #38bdf8;
    transition: fill 0.2s ease;
  }
  .word-bar:hover {
    fill: #fde047;
  }
  .word-label {
    fill: var(--brand-text, #e2e8f0);
    font-size: 0.95rem;
    font-weight: 600;
  }
  .word-count {
    fill: var(--brand-text-muted, #94a3b8);
    font-size: 0.85rem;
  }

  /* M4 円グラフ */
  .pie-slice {
    stroke: #0f172a;
    stroke-width: 2;
    cursor: pointer;
    transition: opacity 0.18s ease;
  }
  .pie-slice:hover {
    opacity: 0.85;
  }
  .pie-label {
    fill: #f1f5f9;
    font-size: 0.95rem;
    font-weight: 600;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
  }
  .pie-center {
    fill: var(--brand-text, #e2e8f0);
    font-size: 1.4rem;
    font-weight: 700;
  }
  body.projector-mode .pie-label { font-size: 1.5rem; }
  body.projector-mode .pie-center { font-size: 2.2rem; }
  body.projector-mode .word-label { font-size: 1.4rem; }
  body.projector-mode .word-count { font-size: 1.2rem; }

  /* 分布ヒストグラム (M1 補助) */
  .viz-histogram rect {
    fill: rgba(56, 189, 248, 0.4);
  }
  .viz-histogram text {
    fill: var(--brand-text-muted, #94a3b8);
    font-size: 0.75rem;
    text-anchor: middle;
  }

  /* 教師用モード切替バー（道徳 45 分授業の即時切替用） */
  .viz-mode-bar {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    padding: 0.6rem 0.8rem;
    background: rgba(15, 23, 42, 0.75);
    border-bottom: 1px solid rgba(148, 163, 184, 0.25);
    position: sticky;
    top: 0;
    z-index: 30;
  }
  .viz-mode-btn {
    padding: 0.4rem 0.85rem;
    border-radius: 0.45rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    background: rgba(30, 41, 59, 0.6);
    color: var(--brand-text, #e2e8f0);
    cursor: pointer;
    font-size: 0.92rem;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .viz-mode-btn:hover {
    background: rgba(56, 189, 248, 0.18);
    border-color: rgba(56, 189, 248, 0.5);
    transform: translateY(-1px);
  }
  .viz-mode-btn.active {
    background: rgba(56, 189, 248, 0.35);
    border-color: #38bdf8;
    color: #fff;
    box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6) inset;
  }
  body.projector-mode .viz-mode-bar {
    padding: 0.8rem 1.2rem;
    background: rgba(10, 14, 26, 0.92);
  }
  body.projector-mode .viz-mode-btn {
    font-size: 1.1rem;
    padding: 0.5rem 1.1rem;
  }
  @media (max-width: 640px) {
    .viz-mode-bar { padding: 0.4rem 0.5rem; }
    .viz-mode-btn { font-size: 0.82rem; padding: 0.3rem 0.6rem; }
  }

  /* タイムライン + Before/After 操作パネル */
  .viz-controls {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin: 0.5rem 0 1rem;
    padding: 0.6rem 0.8rem;
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 0.6rem;
  }
  .viz-btn, .viz-btn-small {
    padding: 0.35rem 0.7rem;
    border-radius: 0.4rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    background: rgba(15, 23, 42, 0.7);
    color: var(--brand-text, #e2e8f0);
    cursor: pointer;
    font-size: 0.88rem;
    transition: background 0.15s, border-color 0.15s;
  }
  .viz-btn:hover, .viz-btn-small:hover {
    background: rgba(56, 189, 248, 0.18);
    border-color: rgba(56, 189, 248, 0.5);
  }
  .viz-btn.active {
    background: rgba(56, 189, 248, 0.3);
    border-color: #38bdf8;
    color: #fff;
  }
  .viz-btn.has-before::before {
    content: '✓ ';
    color: #4ade80;
  }
  .viz-btn.saved {
    background: rgba(74, 222, 128, 0.3);
    border-color: #4ade80;
  }
  .viz-btn-small { padding: 0.25rem 0.5rem; font-size: 0.78rem; }
  .viz-timeline {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex: 1;
    min-width: 220px;
  }
  .viz-timeline-label {
    color: var(--brand-text-muted, #94a3b8);
    font-size: 0.82rem;
    white-space: nowrap;
  }
  .viz-timeline-time {
    min-width: 4.5rem;
    text-align: center;
    color: #fde047;
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  #vizTimelineSlider {
    flex: 1;
    min-width: 100px;
  }

  /* Before/After 比較表示時のレイアウト */
  .viz-compare-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    min-height: 50vh;
  }
  .viz-compare-pane {
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 0.5rem;
    padding: 0.5rem;
    background: rgba(15, 23, 42, 0.3);
  }
  .viz-compare-pane h4 {
    margin: 0 0 0.5rem;
    color: var(--brand-text-muted, #94a3b8);
    font-size: 0.9rem;
    font-weight: 600;
  }
  @media (max-width: 768px) {
    .viz-compare-wrap { grid-template-columns: 1fr; }
  }

  /* 統計バッジ（接続数・更新時刻） */
  .viz-stats {
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    font-size: 0.8rem;
    color: var(--brand-text-muted, #94a3b8);
    display: flex;
    gap: 0.75rem;
  }
  .viz-stats .stat-pill {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 999px;
    padding: 0.18rem 0.6rem;
  }

  /* 教師ダッシュボード「気になる児童」 */
  .viz-teacher-panel {
    margin-top: 1rem;
    padding: 0.85rem 1rem;
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 0.6rem;
    display: none; /* JS で showAdminFeatures のときだけ表示 */
  }
  .viz-teacher-panel.active { display: block; }
  .viz-teacher-panel h3 {
    font-size: 0.95rem;
    color: #fde047;
    margin-bottom: 0.5rem;
  }
  .viz-teacher-panel ul { list-style: none; padding: 0; margin: 0; }
  .viz-teacher-panel li {
    padding: 0.35rem 0;
    border-bottom: 1px dashed rgba(148, 163, 184, 0.15);
    font-size: 0.9rem;
  }
  .viz-teacher-panel li:last-child { border-bottom: 0; }
  .viz-teacher-panel .swing-badge {
    display: inline-block;
    background: rgba(253, 224, 71, 0.2);
    color: #fde047;
    border-radius: 0.3rem;
    padding: 0 0.4rem;
    margin-right: 0.4rem;
    font-weight: 700;
    font-size: 0.78rem;
  }

  /* =====================================================================
   * Projector mode (?display=projector) — 電子黒板向け大画面
   * Why: 教室後方からも判読できる文字サイズ + 高コントラスト。
   *      UI は最小限に削り、データ密度を最大化。
   * ===================================================================== */
  body.projector-mode {
    background: #0a0e1a !important;
  }
  body.projector-mode header,
  body.projector-mode #controlsFooter,
  body.projector-mode .filter-section,
  body.projector-mode #main-header {
    display: none !important;
  }
  body.projector-mode .viz-container {
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  body.projector-mode .viz-svg {
    min-height: 88vh;
  }
  body.projector-mode .viz-axis text {
    font-size: 1.4rem;
  }
  body.projector-mode .viz-axis-label {
    font-size: 1.7rem;
  }
  body.projector-mode .viz-quadrant-label {
    font-size: 2rem;
  }
  body.projector-mode .viz-dot {
    /* d3 で radius を可変設定するので、CSS では基本値のみ */
    stroke-width: 1.6;
  }
  body.projector-mode .viz-stats {
    top: 1rem;
    right: 1.5rem;
    font-size: 1.1rem;
  }

  /* レスポンシブ: 小型端末（児童タブレット）向けの調整 */
  @media (max-width: 640px) {
    .viz-container { min-height: 70vh; padding: 0.5rem 0.25rem; }
    .viz-axis text { font-size: 0.78rem; }
    .viz-axis-label { font-size: 0.92rem; }
    .viz-quadrant-label { font-size: 0.85rem; }
  }
</style>
