<style>
  /* =====================================================================
   * Visualization mode styles (M1 number line / M2 matrix scatter)
   *
   * Why: 既存の card grid 用 CSS (page.css) と完全に分離。
   *      .viz-container 内のスタイルは board モード時には適用されないので、
   *      既存表示への影響ゼロ。
   * ===================================================================== */

  .viz-container {
    position: relative;
    width: 100%;
    /* ヘッダ + フッタ分を控えた高さ。スマホでも横向きでまともに見えるよう min-height は控えめ。 */
    min-height: 60vh;
    padding: 1rem 0.5rem 2rem;
    background: var(--brand-background, #0f172a);
    color: var(--brand-text, #e2e8f0);
    overflow: visible;
  }

  .viz-svg {
    width: 100%;
    height: 100%;
    min-height: 55vh;
    display: block;
  }

  /* 軸線 + ラベル */
  .viz-axis line,
  .viz-axis path {
    stroke: rgba(148, 163, 184, 0.5);
    stroke-width: 1;
  }
  .viz-axis text {
    fill: var(--brand-text-muted, #94a3b8);
    font-size: 0.9rem;
  }

  .viz-axis-label {
    fill: var(--brand-text, #e2e8f0);
    font-size: 1.05rem;
    font-weight: 600;
  }

  /* データ点
   * 2026-05-14 v2666: 暗背景でドット同士の境界を分離するため stroke を白半透明に。
   *   ドット縮小 (matrix BASE 7→5) と組み合わせて「クラスタがブロブ化」する問題を解消。
   *   opacity 0.92 → 0.85 で重なりが色味で読めるように（透明度で密度を表現）。
   *   リアクションリング (色 stroke) は JS インライン style で上書きされるので影響なし。 */
  .viz-dot {
    cursor: pointer;
    /* stroke-opacity も transition 対象に: リアクションリング (色枠) のフェードを滑らかに */
    transition: r 120ms ease, stroke-width 120ms ease, stroke-opacity 120ms ease, opacity 200ms ease;
    fill: #38bdf8;
    stroke: rgba(255, 255, 255, 0.55);
    stroke-width: 1.3;
    opacity: 0.85;
  }
  .viz-dot:hover {
    stroke: #fde047;
    stroke-width: 2.5;
    stroke-opacity: 1;   /* hover 時はリングをはっきり出して判別しやすく */
  }
  /* 揺らぎが大きい点（道徳指導案：意図的指名の素材） */
  .viz-dot.swing-high {
    fill: #fde047;
    stroke: #f59e0b;
    stroke-width: 2;
  }
  /* 教師注目マーク（HIGHLIGHT）: 金縁 + 微発光。
     Why: 教師が「みんなで考えたい」とマークした意見を viz でも一目で識別できるようにする。
       同調圧力 (児童間リアクション) は subtle ring で抑制しているのに対し、
       教師の意図的な促しは多面的視点の提示なので積極的に強調 OK（DCE 観点で安全）。
     stroke は JS インライン style (#fbbf24) で priority 上書きするので、CSS は drop-shadow (glow) を担当。 */
  .viz-dot.highlight {
    filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0.65));
  }
  body.projector-mode .viz-dot.highlight {
    /* 電子黒板 / プロジェクタでも視認しやすいよう glow を強める */
    filter: drop-shadow(0 0 7px rgba(251, 191, 36, 0.85));
  }
  /* ghost マーカー: 揺らぎ大 (swing-trace) で「過去位置」を示す薄色 dot。
     groupByStudent は ghost を空配列にするので、画面に出るのは matrix renderer の
     swing-trace ブロックが描画する .ghost.swing（vizComputeSwings 上位 N 人だけ）。 */
  .viz-dot.ghost {
    opacity: 0.55;
    stroke: #fde047;
    stroke-width: 1.2;
    stroke-dasharray: 2 2;
    fill: #38bdf8;
  }
  /* dot 中央のリアクション数バッジ (matrix / numberline 共通)。
     stroke 色 (緑/赤/紫) で「どのリアクションが多いか」、内部数字で「合計何件」を表現。 */
  .viz-dot-label {
    font-size: 10px;
    font-weight: 700;
    fill: #0f172a;                 /* dot 上に重ねるので暗色。stroke 黄色背景にも見える */
    paint-order: stroke fill;
    stroke: rgba(255, 255, 255, 0.9);
    stroke-width: 2.5;
  }
  /* 比較モード ON 中で議論前未保存のとき、compare ボタンに「使えない」ヒント */
  .viz-btn.compare-disabled {
    opacity: 0.55;
    cursor: help;
  }

  /* 行リストポップアップ (pie のカテゴリ / wordcloud の単語クリック時) */
  .viz-rows-popup {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9000;
    animation: vizPopupFadeIn 140ms ease;
  }
  @keyframes vizPopupFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .viz-rows-popup-card {
    background: #1e293b;
    color: #f1f5f9;
    border: 1px solid #334155;
    border-radius: 10px;
    width: min(92vw, 640px);
    max-height: 85vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
  }
  .viz-rows-popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #334155;
    background: rgba(15, 23, 42, 0.4);
  }
  .viz-rows-popup-header h4 { margin: 0; font-size: 1rem; font-weight: 700; }
  .viz-rows-popup-close {
    background: transparent;
    border: 0;
    color: #cbd5e1;
    cursor: pointer;
    font-size: 1.6rem;
    line-height: 1;
    padding: 0 8px;
  }
  .viz-rows-popup-close:hover { color: #fff; }
  .viz-rows-popup-body {
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .viz-rows-popup-row {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 10px 12px;
  }
  .viz-rows-popup-name {
    font-size: 0.82rem;
    color: #94a3b8;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .viz-rows-popup-reason {
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* Popup 内のリアクションコンテナ。
     ボタン本体は createReactionButtons() で生成された .reaction-btn を使うので
     既存カードと同じスタイル (Tailwind 経由 + page.css の .reaction-btn) が
     そのまま効く。ここでは並びのレイアウトだけ整える。 */
  .viz-rows-popup-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  /* 新規追加直後の強調（フェードイン） */
  .viz-dot.enter {
    animation: vizEnter 600ms ease-out;
  }
  @keyframes vizEnter {
    0%   { opacity: 0; r: 0; }
    60%  { opacity: 1; r: 9; }
    100% { opacity: 0.92; }
  }

  /* M2: 4 象限の薄背景 */
  .viz-quadrant {
    pointer-events: none;
  }
  .viz-quadrant.hh { fill: rgba(34, 197, 94, 0.08); }
  .viz-quadrant.hl { fill: rgba(250, 204, 21, 0.07); }
  .viz-quadrant.lh { fill: rgba(56, 189, 248, 0.07); }
  .viz-quadrant.ll { fill: rgba(248, 113, 113, 0.07); }

  .viz-quadrant-label {
    fill: rgba(226, 232, 240, 0.45);
    font-size: 1rem;
    font-weight: 700;
    pointer-events: none;
    text-anchor: middle;
  }

  /* ホバー時のツールチップカード */
  .viz-tooltip {
    position: fixed;
    z-index: 9999;
    background: rgba(15, 23, 42, 0.95);
    color: #f1f5f9;
    border: 1px solid rgba(148, 163, 184, 0.4);
    border-radius: 0.5rem;
    padding: 0.6rem 0.8rem;
    max-width: 22rem;
    font-size: 0.92rem;
    line-height: 1.45;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 140ms ease, transform 140ms ease;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
  }
  .viz-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .viz-tooltip .tooltip-meta {
    font-size: 0.75rem;
    color: #94a3b8;
    margin-bottom: 0.25rem;
  }
  .viz-tooltip .tooltip-value {
    font-weight: 700;
    color: #38bdf8;
    margin-right: 0.4rem;
  }

  /* M3 ワードランキング */
  .word-bar {
    fill: #38bdf8;
    transition: fill 0.2s ease;
  }
  .word-bar:hover {
    fill: #fde047;
  }
  .word-label {
    fill: var(--brand-text, #e2e8f0);
    font-size: 0.95rem;
    font-weight: 600;
  }
  .word-count {
    fill: var(--brand-text-muted, #94a3b8);
    font-size: 0.85rem;
  }

  /* M4 円グラフ */
  .pie-slice {
    stroke: #0f172a;
    stroke-width: 2;
    cursor: pointer;
    transition: opacity 0.18s ease;
  }
  .pie-slice:hover {
    opacity: 0.85;
  }
  .pie-label {
    fill: #f1f5f9;
    font-size: 0.95rem;
    font-weight: 600;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
  }
  .pie-center {
    fill: var(--brand-text, #e2e8f0);
    font-size: 1.4rem;
    font-weight: 700;
  }
  body.projector-mode .pie-label { font-size: 1.5rem; }
  body.projector-mode .pie-center { font-size: 2.2rem; }
  body.projector-mode .word-label { font-size: 1.4rem; }
  body.projector-mode .word-count { font-size: 1.2rem; }

  /* 分布ヒストグラム (M1 補助) */
  .viz-histogram rect {
    fill: rgba(56, 189, 248, 0.4);
  }
  .viz-histogram text {
    fill: var(--brand-text-muted, #94a3b8);
    font-size: 0.75rem;
    text-anchor: middle;
  }

  /* ボード切替トースト（生徒向け、profile 切替時に 5 秒表示） */
  .board-switched-toast {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    z-index: 9999;
    padding: 0.75rem 1.25rem;
    background: rgba(56, 189, 248, 0.18);
    border: 1px solid #38bdf8;
    border-radius: 0.6rem;
    color: #f1f5f9;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    max-width: 90vw;
    text-align: center;
    font-size: 1rem;
    line-height: 1.4;
  }
  .board-switched-toast strong { color: #38bdf8; }
  .board-switched-toast span { color: #cbd5e1; font-size: 0.92rem; }
  .board-switched-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* =====================================================================
   * B: 統合ツールバー（教師限定）— profile + mode + ⚙️ を main-header に集約
   * Why: 旧 .viz-profile-selector / .viz-mode-bar は別行で 2 段になっていた。
   *      新しい .viz-toolbar は 1 行（モバイルでは折り返し）に統合する。
   * ===================================================================== */
  .viz-toolbar-slot { width: 100%; }
  /* 生徒には toolbar が注入されないので、空のときは余白を出さない */
  .viz-toolbar-slot:empty { display: none; }
  /* Why: 親 .glass-panel が既に半透明背景＋blur を持つので、ここでは独自背景を持たず
     上端の border だけで「ヘッダー内のサブセクション」を示す。視覚ノイズを最小化。 */
  .viz-toolbar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 0.25rem 0.1rem;
    border-top: 1px solid rgba(148, 163, 184, 0.18);
    flex-wrap: wrap;
  }
  .viz-toolbar-left,
  .viz-toolbar-right { flex: 0 0 auto; }
  .viz-toolbar-center {
    flex: 1 1 auto;
    display: flex;
    justify-content: center;
    gap: 0.3rem;
    flex-wrap: wrap;
  }
  .viz-profile-select {
    max-width: 200px;
    padding: 0.3rem 0.55rem;
    border-radius: 0.4rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    background: rgba(30, 41, 59, 0.7);
    color: var(--brand-text, #e2e8f0);
    font-size: 0.88rem;
    cursor: pointer;
  }
  .viz-profile-select:disabled { opacity: 0.5; cursor: wait; }
  body.projector-mode .viz-profile-select { font-size: 1.05rem; padding: 0.45rem 0.8rem; max-width: 280px; }

  /* Profile pills (4 個以下のとき) — 授業のテンポに合わせて 1 クリック切替 */
  .viz-profile-pills-row {
    display: inline-flex;
    gap: 0.25rem;
    padding: 0.2rem;
    background: rgba(15, 23, 42, 0.5);
    border-radius: 0.45rem;
    border: 1px solid rgba(148, 163, 184, 0.2);
  }
  .viz-profile-pill {
    padding: 0.3rem 0.7rem;
    border-radius: 0.35rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--brand-text-muted, #94a3b8);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .viz-profile-pill:hover {
    background: rgba(56, 189, 248, 0.12);
    color: var(--brand-text, #e2e8f0);
  }
  .viz-profile-pill.active,
  .viz-profile-pill.current.viewing,
  .viz-profile-pill.viewing {
    background: rgba(56, 189, 248, 0.35);
    border-color: #38bdf8;
    color: #fff;
    box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6) inset;
  }
  /* Option B 状態スタイル
     - current: 現在 active な profile（cyan 枠）
     - past:    過去 active になった profile（淡 + ✓）— student の navigation target
     - viewing: いま閲覧中（current か past いずれかと併用）
     - deleted: 削除済 profile（クリック不可 + 取消線） */
  .viz-profile-pill.current:not(.viewing) {
    background: rgba(56, 189, 248, 0.2);
    border-color: rgba(56, 189, 248, 0.7);
    color: #f1f5f9;
  }
  .viz-profile-pill.past {
    color: var(--brand-text-muted, #94a3b8);
    opacity: 0.85;
  }
  .viz-profile-pill.past:hover { opacity: 1; }
  .viz-profile-pill.deleted {
    text-decoration: line-through;
    opacity: 0.45;
    cursor: not-allowed;
  }
  .viz-profile-pill__check { color: #10b981; font-size: 0.78em; margin-right: 0.1rem; }
  .viz-profile-pill__dot { color: #38bdf8; font-size: 0.62em; vertical-align: middle; }

  /* 「現在に戻る」CTA — 過去フェーズ閲覧中のみ pill 行末尾に表示 */
  .viz-profile-return {
    margin-left: 0.5rem;
    padding: 0.3rem 0.7rem;
    border-radius: 0.35rem;
    border: 1px solid rgba(251, 191, 36, 0.6);
    background: rgba(251, 191, 36, 0.18);
    color: #fbbf24;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }
  .viz-profile-return:hover {
    background: rgba(251, 191, 36, 0.3);
    transform: translateY(-1px);
  }

  /* 生徒向け toolbar — 議論ツール / timeline は非表示（pills だけ） */
  .viz-toolbar--student .viz-toolbar-center { display: none !important; }

  body.projector-mode .viz-profile-pill { font-size: 1.05rem; padding: 0.45rem 1rem; }
  @media (max-width: 640px) {
    .viz-profile-pill { font-size: 0.78rem; padding: 0.25rem 0.5rem; }
    .viz-profile-return { font-size: 0.78rem; padding: 0.22rem 0.45rem; }
  }

  /* モード切替ボタン: アイコン + 短文（アイコンのみだと用途が分かりにくいため） */
  .viz-mode-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.3rem 0.6rem;
    border-radius: 0.4rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    background: rgba(30, 41, 59, 0.6);
    color: var(--brand-text, #e2e8f0);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .viz-mode-btn .vmb-icon { font-size: 0.95rem; line-height: 1; }
  .viz-mode-btn .vmb-text { font-size: 0.82rem; }
  .viz-mode-btn:hover {
    background: rgba(56, 189, 248, 0.18);
    border-color: rgba(56, 189, 248, 0.5);
    transform: translateY(-1px);
  }
  .viz-mode-btn.active {
    background: rgba(56, 189, 248, 0.35);
    border-color: #38bdf8;
    color: #fff;
    box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6) inset;
  }
  .viz-icon-btn {
    width: 2rem;
    height: 2rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border-radius: 0.4rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    background: rgba(30, 41, 59, 0.6);
    color: var(--brand-text, #e2e8f0);
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.15s, border-color 0.15s;
  }
  .viz-icon-btn:hover { background: rgba(56, 189, 248, 0.18); border-color: rgba(56, 189, 248, 0.5); }
  .viz-icon-btn.active { background: rgba(56, 189, 248, 0.35); border-color: #38bdf8; }

  body.projector-mode .viz-toolbar { padding: 0.6rem 1rem; background: rgba(10, 14, 26, 0.92); }
  body.projector-mode .viz-mode-btn { font-size: 1rem; padding: 0.45rem 0.85rem; }
  body.projector-mode .viz-mode-btn .vmb-text { font-size: 1rem; }
  body.projector-mode .viz-icon-btn { width: 2.4rem; height: 2.4rem; font-size: 1.25rem; }

  @media (max-width: 640px) {
    .viz-toolbar { padding: 0.3rem 0.4rem; gap: 0.3rem; }
    .viz-mode-btn { font-size: 0.78rem; padding: 0.25rem 0.45rem; }
    .viz-mode-btn .vmb-text { display: none; }    /* モバイルではアイコンのみで省スペース */
    .viz-profile-select { max-width: 140px; font-size: 0.82rem; }
  }

  /* 議論ツール（議論前 / 比較 / タイムライン）は toolbar 中央に inline 配置。
     ⚙️ 折り畳みは撤廃 — 常時表示で discoverability を優先。 */
  .viz-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    /* 中央寄せ — toolbar-center の親が flex 1 で広がるので、要素は中央に並ぶ */
    justify-content: center;
  }
  .viz-btn, .viz-btn-small {
    padding: 0.3rem 0.6rem;
    border-radius: 0.4rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    background: rgba(30, 41, 59, 0.6);
    color: var(--brand-text, #e2e8f0);
    cursor: pointer;
    font-size: 0.82rem;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  .viz-btn:hover, .viz-btn-small:hover {
    background: rgba(56, 189, 248, 0.18);
    border-color: rgba(56, 189, 248, 0.5);
  }
  .viz-btn.active {
    background: rgba(56, 189, 248, 0.3);
    border-color: #38bdf8;
    color: #fff;
  }
  .viz-btn.has-before::before {
    content: '✓ ';
    color: #4ade80;
  }
  .viz-btn.saved {
    background: rgba(74, 222, 128, 0.3);
    border-color: #4ade80;
  }
  .viz-btn-small { padding: 0.25rem 0.5rem; font-size: 0.78rem; }
  .viz-timeline {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    min-width: 200px;
  }
  .viz-timeline-label {
    color: var(--brand-text-muted, #94a3b8);
    font-size: 0.82rem;
    white-space: nowrap;
  }
  .viz-timeline-time {
    min-width: 4.5rem;
    text-align: center;
    color: #fde047;
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  #vizTimelineSlider {
    flex: 1;
    min-width: 100px;
  }

  /* Before/After 比較表示時のレイアウト */
  .viz-compare-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    min-height: 50vh;
  }
  .viz-compare-pane {
    border: 1px solid rgba(148, 163, 184, 0.25);
