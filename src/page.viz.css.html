<style>
  /* =====================================================================
   * Visualization mode styles (M1 number line / M2 matrix scatter)
   *
   * Why: 既存の card grid 用 CSS (page.css) と完全に分離。
   *      .viz-container 内のスタイルは board モード時には適用されないので、
   *      既存表示への影響ゼロ。
   * ===================================================================== */

  .viz-container {
    position: relative;
    width: 100%;
    /* ヘッダ + フッタ分を控えた高さ。スマホでも横向きでまともに見えるよう min-height は控えめ。 */
    min-height: 60vh;
    padding: 1rem 0.5rem 2rem;
    background: var(--brand-background, #0f172a);
    color: var(--brand-text, #e2e8f0);
    overflow: visible;
  }

  .viz-svg {
    width: 100%;
    height: 100%;
    min-height: 55vh;
    display: block;
  }

  /* 軸線 + ラベル */
  .viz-axis line,
  .viz-axis path {
    stroke: rgba(148, 163, 184, 0.5);
    stroke-width: 1;
  }
  .viz-axis text {
    fill: var(--brand-text-muted, #94a3b8);
    font-size: 0.9rem;
  }

  .viz-axis-label {
    fill: var(--brand-text, #e2e8f0);
    font-size: 1.05rem;
    font-weight: 600;
  }

  /* データ点。暗背景でドット同士の境界を分離するため stroke は白半透明。
   *   opacity 0.85 で重なりを色味で読める (密度を透明度で表現)。
   *   リアクションリング (色 stroke) は JS インライン style で上書きされる。 */
  .viz-dot {
    cursor: pointer;
    /* stroke-opacity も transition 対象に: リアクションリング (色枠) のフェードを滑らかに */
    transition: r 120ms ease, stroke-width 120ms ease, stroke-opacity 120ms ease, opacity 200ms ease;
    fill: #38bdf8;
    stroke: rgba(255, 255, 255, 0.55);
    stroke-width: 1.3;
    opacity: 0.85;
  }
  .viz-dot:hover {
    stroke: #fde047;
    stroke-width: 2.5;
    stroke-opacity: 1;   /* hover 時はリングをはっきり出して判別しやすく */
  }
  /* 揺らぎが大きい点（道徳指導案：意図的指名の素材） */
  .viz-dot.swing-high {
    fill: #fde047;
    stroke: #f59e0b;
    stroke-width: 2;
  }
  /* 教師注目マーク（HIGHLIGHT）: 金縁 + 微発光。
     Why: 教師が「みんなで考えたい」とマークした意見を viz でも一目で識別できるようにする。
       同調圧力 (児童間リアクション) は subtle ring で抑制しているのに対し、
       教師の意図的な促しは多面的視点の提示なので積極的に強調 OK（DCE 観点で安全）。
     stroke は JS インライン style (#fbbf24) で priority 上書きするので、CSS は drop-shadow (glow) を担当。 */
  .viz-dot.highlight {
    filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0.65));
  }
  body.projector-mode .viz-dot.highlight {
    /* 電子黒板 / プロジェクタでも視認しやすいよう glow を強める */
    filter: drop-shadow(0 0 7px rgba(251, 191, 36, 0.85));
  }
  /* ghost マーカー: 揺らぎ大 (swing-trace) で「過去位置」を示す薄色 dot。
     groupByStudent は ghost を空配列にするので、画面に出るのは matrix renderer の
     swing-trace ブロックが描画する .ghost.swing（vizComputeSwings 上位 N 人だけ）。 */
  .viz-dot.ghost {
    opacity: 0.55;
    stroke: #fde047;
    stroke-width: 1.2;
    stroke-dasharray: 2 2;
    fill: #38bdf8;
  }
  /* dot 中央のリアクション数バッジ (matrix / numberline 共通)。
     stroke 色 (緑/赤/紫) で「どのリアクションが多いか」、内部数字で「合計何件」を表現。 */
  .viz-dot-label {
    font-size: 10px;
    font-weight: 700;
    fill: #0f172a;                 /* dot 上に重ねるので暗色。stroke 黄色背景にも見える */
    paint-order: stroke fill;
    stroke: rgba(255, 255, 255, 0.9);
    stroke-width: 2.5;
  }
  /* 比較モード ON 中で議論前未保存のとき、compare ボタンに「使えない」ヒント */
  .viz-btn.compare-disabled {
    opacity: 0.55;
    cursor: help;
  }

  /* 行リストポップアップ (pie のカテゴリ / wordcloud の単語クリック時) */
  .viz-rows-popup {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9000;
    animation: vizPopupFadeIn 140ms ease;
  }
  @keyframes vizPopupFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .viz-rows-popup-card {
    background: #1e293b;
    color: #f1f5f9;
    border: 1px solid #334155;
    border-radius: 10px;
    width: min(92vw, 640px);
    max-height: 85vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
  }
  .viz-rows-popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #334155;
    background: rgba(15, 23, 42, 0.4);
  }
  .viz-rows-popup-header h4 { margin: 0; font-size: 1rem; font-weight: 700; }
  .viz-rows-popup-close {
    background: transparent;
    border: 0;
    color: #cbd5e1;
    cursor: pointer;
    font-size: 1.6rem;
    line-height: 1;
    padding: 0 8px;
  }
  .viz-rows-popup-close:hover { color: #fff; }
  .viz-rows-popup-body {
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .viz-rows-popup-row {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .viz-rows-popup-row:hover,
  .viz-rows-popup-row:focus {
    background: rgba(56, 189, 248, 0.08);
    border-color: rgba(56, 189, 248, 0.45);
    outline: none;
  }
  /* 象限 chip: matrix の意見一覧で「この意見はどの立場から来たか」を示す。
     keyword popup を全象限から集めるので、chip 色違いで「同じ言葉が違う立場で」を visualize。 */
  .viz-rows-popup-chip {
    display: inline-block;
    margin-left: 0.5rem;
    font-size: 0.72rem;
    color: #8be9fd;
    background: rgba(56, 189, 248, 0.1);
    border: 1px solid rgba(56, 189, 248, 0.3);
    padding: 0.1rem 0.4rem;
    border-radius: 0.3rem;
    font-weight: 600;
    vertical-align: middle;
  }
  .viz-rows-popup-name {
    font-size: 0.82rem;
    color: #94a3b8;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .viz-rows-popup-reason {
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* Popup 内のリアクションコンテナ。
     ボタン本体は createReactionButtons() で生成された .reaction-btn を使うので
     既存カードと同じスタイル (Tailwind 経由 + page.css の .reaction-btn) が
     そのまま効く。ここでは並びのレイアウトだけ整える。 */
  .viz-rows-popup-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  /* 新規追加直後の強調（フェードイン） */
  .viz-dot.enter {
    animation: vizEnter 600ms ease-out;
  }
  @keyframes vizEnter {
    0%   { opacity: 0; r: 0; }
    60%  { opacity: 1; r: 9; }
    100% { opacity: 0.92; }
  }

  /* M2: 4 象限の薄背景 */
  .viz-quadrant {
    pointer-events: none;
  }
  .viz-quadrant.hh { fill: rgba(34, 197, 94, 0.08); }
  .viz-quadrant.hl { fill: rgba(250, 204, 21, 0.07); }
  .viz-quadrant.lh { fill: rgba(56, 189, 248, 0.07); }
  .viz-quadrant.ll { fill: rgba(248, 113, 113, 0.07); }

  .viz-quadrant-label {
    fill: rgba(226, 232, 240, 0.45);
    font-size: 1rem;
    font-weight: 700;
    pointer-events: none;
    text-anchor: middle;
  }
  /* 象限ラベル直下/上の理由キーワード行 (SVG 内統合配置)。
   *   ラベルより一段薄く、フォントを小さく - 階層を表現。 */
  .viz-quadrant-keyword {
    fill: rgba(199, 210, 254, 0.7);
    font-size: 0.85rem;
    font-weight: 500;
    pointer-events: none;
    text-anchor: middle;
    letter-spacing: 0.03em;
  }
  /* 個別キーワード (tspan) は click 可能。hover で fill 変更 + cursor pointer。
     pointer-events: auto で親 <text> の pointer-events: none を上書き。 */
  .viz-quadrant-keyword-pill {
    pointer-events: auto;
    cursor: pointer;
    transition: fill 0.15s ease;
  }
  .viz-quadrant-keyword-pill:hover,
  .viz-quadrant-keyword-pill:focus {
    fill: #fde047;
    outline: none;
  }
  body.projector-mode .viz-quadrant-keyword {
    font-size: 1.05rem;
  }
  @media (max-width: 768px) {
    .viz-quadrant-keyword { font-size: 0.72rem; }
  }

  /* ホバー時のツールチップカード */
  .viz-tooltip {
    position: fixed;
    z-index: 9999;
    background: rgba(15, 23, 42, 0.95);
    color: #f1f5f9;
    border: 1px solid rgba(148, 163, 184, 0.4);
    border-radius: 0.5rem;
    padding: 0.6rem 0.8rem;
    max-width: 22rem;
    font-size: 0.92rem;
    line-height: 1.45;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 140ms ease, transform 140ms ease;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
  }
  .viz-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .viz-tooltip .tooltip-meta {
    font-size: 0.75rem;
    color: #94a3b8;
    margin-bottom: 0.25rem;
  }
  .viz-tooltip .tooltip-value {
    font-weight: 700;
    color: #38bdf8;
    margin-right: 0.4rem;
  }
  /* 同座標カウント: forceCollide で散らばって見えるドット塊の本当の人数を伝える行。
     主たる回答テキストと視覚的に分離するため上に薄い区切り線。 */
  .viz-tooltip .tooltip-samecoord {
    margin-top: 0.5rem;
    padding-top: 0.4rem;
    border-top: 1px solid rgba(148, 163, 184, 0.25);
    font-size: 0.72rem;
    color: #94a3b8;
    font-style: italic;
  }

  /* 対立軸 1 行サマリ (X 軸ラベルと同列に薄く差し込み)。
     色とサイズを軸ラベルより一段抑えて、視線を軸ラベル → 対立軸 → ドットの順に誘導。
     学術会議「道理ある不一致」の可視化用 (v2691)。 */
  .viz-contrast-summary {
    fill: rgba(199, 210, 254, 0.55);
    font-size: 0.85rem;
    font-weight: 500;
    pointer-events: none;
    letter-spacing: 0.02em;
  }
  body.projector-mode .viz-contrast-summary {
    font-size: 1rem;
    fill: rgba(199, 210, 254, 0.7);
  }
  @media (max-width: 768px) {
    .viz-contrast-summary { font-size: 0.7rem; }
  }

  /* 整数セル境界の薄い grid line: ドット塊が「同じ Likert セルにまとまっている」と読める
     ようにする補助線。pointer-events:none でクリックを邪魔しない (v2691)。 */
  .viz-grid {
    pointer-events: none;
  }

  /* 孤立意見 (lone-voice): 象限内 1 票だけの意見に control-tower 的な金色ハロー。
     学術会議 2020 報告 p.14「マジョリティのマイノリティへの同調強要」回避用 (v2691)。
     highlight (教師注目, drop-shadow 0 0 4-7px rgba(251,191,36,0.65)) より淡く、
     1 票でも「ここに 1 つあるよ」と教師が即座に発見できる程度の glow。
     stroke は触らず drop-shadow のみで実現するので、reaction ring 色とも共存する。 */
  .viz-dot.lone-voice {
    filter: drop-shadow(0 0 3px rgba(251, 191, 36, 0.45));
  }
  body.projector-mode .viz-dot.lone-voice {
    filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.6));
  }
  /* lone-voice + highlight 同時: highlight 側の drop-shadow を優先 (cascade で後者が勝つ) */
  .viz-dot.highlight.lone-voice {
    filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.75));
  }

  /* 議論前 → 現在 矢印 (v2691)。
     淡い水色を既定とし、major (Likert 距離 > 2 = 強い意見変化) は amber で強調。
     pointer-events: none で dot click を阻害しない。MEXT 評価観点
     「自らの生活や考えを見直しているか」の証拠を視覚化。 */
  .viz-arrow {
    stroke: rgba(125, 211, 252, 0.55);  /* sky-300 alpha */
    stroke-width: 1.4;
    fill: none;
    pointer-events: none;
  }
  .viz-arrow.major {
    stroke: rgba(251, 191, 36, 0.85);   /* amber-400 — 大きく動いた児童 */
    stroke-width: 2.0;
  }
  .viz-arrow-head {
    fill: rgba(125, 211, 252, 0.65);
    stroke: none;
    pointer-events: none;
  }
  .viz-arrow-head.major {
    fill: rgba(251, 191, 36, 0.9);
  }
  body.projector-mode .viz-arrow {
    stroke-width: 1.8;
    stroke: rgba(125, 211, 252, 0.7);
  }
  body.projector-mode .viz-arrow.major {
    stroke-width: 2.6;
  }
  body.projector-mode .viz-arrow-head {
    fill: rgba(125, 211, 252, 0.85);
  }
  body.projector-mode .viz-arrow-head.major {
    fill: rgba(251, 191, 36, 1);
  }

  /* =============================================================================
   * モーダル: 軸ラベル + プログレスバー (numberline / matrix の「数字だけ」問題を解消)
   *   左端 = min ラベル、右端 = max ラベル、ドットが値の位置を示す。
   *   matrix は X/Y 2 本 + 象限名。教師の指導案を学習者に伝える視覚化。
   * ============================================================================= */
  .modal-axis-block {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    padding-bottom: 0.5rem;
  }
  .modal-axis-row {
    display: grid;
    /* 構成: [min ラベル][bar][max ラベル][値]。bar を 3fr に拡大して立場の幅を強調しつつ、
       右端の value 列は auto で 5/5 表示を固定位置に置く (視線で縦に追える)。 */
    grid-template-columns: minmax(0, 1fr) 3fr minmax(0, 1fr) auto;
    align-items: center;
    gap: 0.8rem;
    font-size: 1.05rem;
    color: var(--brand-text, #e2e8f0);
  }
  .modal-axis-label-min {
    text-align: right;
    color: var(--brand-text-muted, #94a3b8);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .modal-axis-label-max {
    text-align: left;
    color: var(--brand-text-muted, #94a3b8);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .modal-axis-track {
    position: relative;
    height: 0.7rem;  /* ドット (1.4rem) との比率を整える */
    /* 単色 track: 「左 → 右 = 弱 → 強」誤読を避けるため、立場の対極は同等扱い。 */
    background: rgba(148, 163, 184, 0.25);
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.3);
  }
  .modal-axis-dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 1.4rem;
    height: 1.4rem;
    border-radius: 50%;
    background: #fde047;
    border: 2px solid #f59e0b;
    box-shadow: 0 0 8px rgba(253, 224, 71, 0.65);
  }
  /* 行右端の値表示 (5/5)。全行で位置が固定なので視線で縦に値を比較できる。 */
  .modal-axis-value {
    font-variant-numeric: tabular-nums;
    color: #fde047;
    font-weight: 700;
    font-size: 0.95rem;
    white-space: nowrap;
  }
  .modal-axis-quadrant {
    /* 教師の指導意図の核心 = 立場の道徳的意味。少し大きめで主役感を出す。
       highlight モーダル枠 (紫) と独立した色系にして視覚階層を保つため cyan 系に。
       (emoji 📍 自体の色は CSS color で確実に変えられないので、ここでは text 色だけ管理) */
    font-size: 1.15rem;
    color: #8be9fd;
    font-weight: 600;
    text-align: center;
    padding: 0.4rem 0.6rem;
    background: rgba(56, 189, 248, 0.08);
    border-radius: 0.4rem;
    border: 1px solid rgba(56, 189, 248, 0.3);
  }
  @media (max-width: 640px) {
    .modal-axis-row { font-size: 0.85rem; gap: 0.4rem; }
    .modal-axis-track { height: 0.45rem; }
    .modal-axis-dot { width: 0.9rem; height: 0.9rem; }
  }
  body.projector-mode .modal-axis-row { font-size: 1.3rem; }
  body.projector-mode .modal-axis-value { font-size: 1.15rem; }
  body.projector-mode .modal-axis-quadrant { font-size: 1.2rem; }

  /* M3 ワードランキング */
  .word-bar {
    fill: #38bdf8;
    transition: fill 0.2s ease;
  }
  .word-bar:hover {
    fill: #fde047;
  }
  .word-label {
    fill: var(--brand-text, #e2e8f0);
    font-size: 0.95rem;
    font-weight: 600;
  }
  .word-count {
    fill: var(--brand-text-muted, #94a3b8);
    font-size: 0.85rem;
  }

  /* M4 円グラフ */
  .pie-slice {
    stroke: #0f172a;
    stroke-width: 2;
    cursor: pointer;
    transition: opacity 0.18s ease;
  }
  .pie-slice:hover {
    opacity: 0.85;
  }
  .pie-label {
    fill: #f1f5f9;
    font-size: 0.95rem;
    font-weight: 600;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
  }
  .pie-center {
    fill: var(--brand-text, #e2e8f0);
    font-size: 1.4rem;
    font-weight: 700;
  }
  body.projector-mode .pie-label { font-size: 1.5rem; }
  body.projector-mode .pie-center { font-size: 2.2rem; }
  body.projector-mode .word-label { font-size: 1.4rem; }
  body.projector-mode .word-count { font-size: 1.2rem; }

  /* 分布ヒストグラム (M1 補助) */
  .viz-histogram rect {
    fill: rgba(56, 189, 248, 0.4);
  }
  .viz-histogram text {
    fill: var(--brand-text-muted, #94a3b8);
    font-size: 0.75rem;
    text-anchor: middle;
  }

  /* ボード切替トースト（生徒向け、profile 切替時に 5 秒表示） */
  .board-switched-toast {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    z-index: 9999;
    padding: 0.75rem 1.25rem;
    background: rgba(56, 189, 248, 0.18);
    border: 1px solid #38bdf8;
    border-radius: 0.6rem;
    color: #f1f5f9;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    max-width: 90vw;
    text-align: center;
    font-size: 1rem;
    line-height: 1.4;
  }
  .board-switched-toast strong { color: #38bdf8; }
  .board-switched-toast span { color: #cbd5e1; font-size: 0.92rem; }
  .board-switched-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* =====================================================================
   * B: 統合ツールバー（教師限定）— profile + mode + ⚙️ を main-header に集約
   * Why: 旧 .viz-profile-selector / .viz-mode-bar は別行で 2 段になっていた。
   *      新しい .viz-toolbar は 1 行（モバイルでは折り返し）に統合する。
   * ===================================================================== */
  /* 議論支援ツール bar (Row 3) — section label + 操作ボタン群を 1 行に
     親 .glass-panel が背景＋blur を持つので、ここは透明＋上端 border のみ。 */
  .viz-toolbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.25rem 0;
    flex-wrap: wrap;
  }
  .viz-toolbar-section-label {
    color: var(--brand-text-muted, #94a3b8);
    font-size: 0.78rem;
    font-weight: 600;
