// Generated to address function interference issues and centralize state, events,
// asynchronous operations, and DOM handling.

  errors: {},
  ui: {},
  state: {
    current: null,
    selectedSheet: '',
    updateStatus(status) {
      this.current = status;
    }

  // Initialization state tracking to prevent redundant calls
  initialization: {
    isInProgress: false,
    isCompleted: false,
    completedPhases: new Set(),
    startTime: null,
    lastLoadStatusCall: null,
    loadStatusCallCount: 0

// -----------------------------------------------------------------------------
// State Manager
// -----------------------------------------------------------------------------
class AdminPanelStateManager {
  constructor() {
    this.state = {
      currentStatus: null,
      selectedSheet: '',
      isLoading: false
    };
    this.subscribers = new Map();
  }

  setState(key, value) {
    this.state[key] = value;
    this.notifySubscribers(key, value);
  }

  subscribe(key, callback) {
    if (!this.subscribers.has(key)) {
      this.subscribers.set(key, []);
    }
    this.subscribers.get(key).push(callback);
  }

  notifySubscribers(key, value) {
    const subs = this.subscribers.get(key) || [];
    subs.forEach(cb => {
      try {
        cb(value);
      } catch (e) {
        console.warn('Subscriber callback failed', e);
      }
    });
  }
}

// -----------------------------------------------------------------------------
// Event Manager
// -----------------------------------------------------------------------------
class AdminPanelEventManager {
  constructor() {
    this.listeners = new Map();
  }

  addListener(element, event, handler, options = {}) {
    if (!element || !event || !handler) return;
    const key = (element.id || 'anonymous') + '-' + event;
    if (this.listeners.has(key)) {
      console.warn('Duplicate listener for ' + key);
      return;
    }
    element.addEventListener(event, handler, options);
    this.listeners.set(key, { element, event, handler, options });
  }
}

// -----------------------------------------------------------------------------
// Async Manager
// -----------------------------------------------------------------------------
class AdminPanelAsyncManager {
  constructor() {
    this.runningOperations = new Map();
  }

  async executeExclusive(operationId, operation) {
    if (this.runningOperations.has(operationId)) {
      return this.runningOperations.get(operationId);
    }
    const promise = Promise.resolve().then(operation);
    this.runningOperations.set(operationId, promise);
    try {
      return await promise;
    } finally {
      this.runningOperations.delete(operationId);
    }
  }
}

// -----------------------------------------------------------------------------
// DOM Manager
// -----------------------------------------------------------------------------
class AdminPanelDOMManager {
  constructor() {
    this.elementCache = new Map();
    this.operationQueue = [];
  }

  getElement(id) {
    if (!this.elementCache.has(id)) {
      this.elementCache.set(id, document.getElementById(id));
    }
    return this.elementCache.get(id);
  }

  queueOperation(operation) {
    this.operationQueue.push(operation);
    return new Promise(resolve => {
      requestAnimationFrame(() => {
        const op = this.operationQueue.shift();
        resolve(op());
      });
    });
  }
}

// Instantiate managers and expose via namespace
window.AdminPanel.stateManager = new AdminPanelStateManager();
window.AdminPanel.eventManager = new AdminPanelEventManager();
window.AdminPanel.asyncManager = new AdminPanelAsyncManager();
window.AdminPanel.domManager = new AdminPanelDOMManager();

// Simple logging utility with conditional output based on DEBUG mode
// DEBUG_MODE is defined in constants.js.html

function adminLog(level, ...args) {
  if (!(window.DEBUG_MODE || (window.SYSTEM_CONSTANTS && window.SYSTEM_CONSTANTS.DEBUG_MODE))) return;
  
  switch (level) {
    case 'error':
      console.error('[AdminPanel]', ...args);
      break;
    case 'warn':
      console.warn('[AdminPanel]', ...args);
      break;
    case 'info':
      console.log('[AdminPanel]', ...args);
      break;
    case 'debug':
      if (window.DEBUG_MODE || (window.SYSTEM_CONSTANTS && window.SYSTEM_CONSTANTS.DEBUG_MODE)) console.log('[AdminPanel:DEBUG]', ...args);
      break;
    default:
      console.log('[AdminPanel]', ...args);
  }
}

// Convenience functions for different log levels
function logError(...args) { adminLog('error', ...args); }
function logWarn(...args) { adminLog('warn', ...args); }
function logInfo(...args) { adminLog('info', ...args); }
function logDebug(...args) { adminLog('debug', ...args); }

// マルチテナント対応: ユーザーIDの安全な初期化
var userId = '';

// マルチテナント対応: バックエンドから安全にユーザーIDを取得
function initializeUserId() {
  console.group('🔐 Initializing UserId');
  logDebug('📞 About to call getCurrentUserStatus');
  
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(response => {
        logDebug('📥 getCurrentUserStatus response:', response);
        
        if (response && response.status === 'success' && response.userInfo && response.userInfo.userId) {
          userId = response.userInfo.userId;
          logDebug('✅ AdminPanel: User authenticated, userId:', userId);
          console.groupEnd();
          resolve(userId);
        } else {
          console.error('❌ Failed to get userId from backend:', response);
          console.error('❌ Expected: {status: "success", userInfo: {userId: "..."}}');
          console.groupEnd();
          reject(new Error('ユーザーIDの取得に失敗しました'));
        }
      })
      .withFailureHandler(error => {
        console.error('❌ Backend error getting userId:', error);
        console.error('❌ Error type:', typeof error);
        console.error('❌ Error details:', error);
        console.groupEnd();
        reject(error);
      })
      .getCurrentUserStatus();
  });
}

// リトライ付きユーザーID取得
async function initializeUserIdWithRetry(maxRetries = 3, delay = 1000) {
  for (let i = 0; i < maxRetries; i++) {
    try {
      return await initializeUserId();
    } catch (error) {
      console.warn(`⚠️ UserId initialization failed (attempt ${i + 1}/${maxRetries}):`, error.message);
      if (i < maxRetries - 1) {
        console.log(`🔄 Retrying in ${delay}ms...`);
        await new Promise(resolve => setTimeout(resolve, delay));
        delay = Math.min(delay * 1.5, 5000); // 指数バックオフ（最大5秒）
      } else {
        console.error('❌ All userId initialization attempts failed');
        throw error;
      }
    }
  }
}

// ユーザーID取得の完了を待つPromise（リトライ機構付き）
const userIdPromise = initializeUserIdWithRetry();

// Setup modal character counter observers
function setupModalCharacterCounters() {
  // モーダルが表示されるたびにカウンターをセットアップ
  const observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
      if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
        const modal = document.getElementById('form-config-modal');
        if (modal && !modal.classList.contains('hidden')) {
          setTimeout(setupCharacterCounters, 100);
        }
      }
    });
  });
  
  // モーダルの監視を開始
  const modal = document.getElementById('form-config-modal');
  if (modal) {
    observer.observe(modal, { attributes: true });
  }
}

// Navigate to specific step in admin panel
function navigateToStep(step) {
  if (typeof currentStep !== 'undefined') {
    currentStep = step;
  } else {
    // Define currentStep if not already defined
    window.currentStep = step;
  }
  
  // Update step indicators
  document.querySelectorAll('.step-indicator').forEach((indicator, index) => {
    const stepNumber = index + 1;
    indicator.classList.toggle('completed', stepNumber < step);
    indicator.classList.toggle('active', stepNumber === step);
  });
  
  // Show/hide step content
  document.querySelectorAll('.step-content').forEach((content, index) => {
    const stepNumber = index + 1;
    content.classList.toggle('hidden', stepNumber !== step);
  });
  
  // Update progress bar
  const progressBar = document.querySelector('.progress-bar');
  if (progressBar) {
    progressBar.style.width = ((step / 3) * 100) + '%';
  }
  
  if (typeof validateCurrentStep === 'function') {
    validateCurrentStep();
  }
}

// Make navigateToStep globally available
window.navigateToStep = navigateToStep;

// Toggle section visibility
function toggleSection(sectionId) {
  const section = document.getElementById(sectionId);
  if (!section) {
    console.warn('Section not found:', sectionId);
    return;
  }
  
  // Find the toggle button for this section
  const toggleBtn = document.querySelector('[onclick*="' + sectionId + '"]');
  const arrow = toggleBtn ? toggleBtn.querySelector('.fa-chevron-down, .fa-chevron-up') : null;
  
  // Toggle the section visibility
  if (section.classList.contains('hidden')) {
    // Show section
    section.classList.remove('hidden');
    if (toggleBtn) {
      toggleBtn.setAttribute('aria-expanded', 'true');
    }
    if (arrow) {
      arrow.classList.remove('fa-chevron-up');
      arrow.classList.add('fa-chevron-down');
    }
  } else {
    // Hide section
    section.classList.add('hidden');
    if (toggleBtn) {
      toggleBtn.setAttribute('aria-expanded', 'false');
    }
    if (arrow) {
      arrow.classList.remove('fa-chevron-down');
      arrow.classList.add('fa-chevron-up');
    }
  }
}

// Enhanced updateUIWithNewStatus that works with both minimal and full implementations
function updateUIWithNewStatus(status) {
  if (!status) {
    console.warn('updateUIWithNewStatus: Invalid status received');
    return;
  }
  
  // Store for later use
  window.currentStatus = status;
  
  // Enhanced full implementation detection with multiple retries
  if (typeof window._fullUpdateUIWithNewStatus === 'function') {
    try {
      // 本番環境でのログ量を減らす
      if (window.DEBUG_MODE || window.location.hostname === 'localhost') {
        console.log('updateUIWithNewStatus: Using full implementation');
      }
      return window._fullUpdateUIWithNewStatus(status);
    } catch (error) {
      console.warn('Full updateUIWithNewStatus failed, using fallback:', error);
      // Continue with minimal implementation below
    }
  } else {
    // Enhanced retry mechanism with multiple attempts
    let retryCount = 0;
    const maxRetries = 3;
    const retryDelays = [200, 500, 1000]; // Progressive delays
    
    const tryFullImplementation = () => {
      if (typeof window._fullUpdateUIWithNewStatus === 'function') {
        console.log(`updateUIWithNewStatus: Full implementation now available (retry ${retryCount + 1})`);
        try {
          window._fullUpdateUIWithNewStatus(status);
          return;
        } catch (error) {
          console.warn('Retried full updateUIWithNewStatus failed:', error);
        }
      }
      
      if (retryCount < maxRetries) {
        retryCount++;
        setTimeout(tryFullImplementation, retryDelays[retryCount - 1] || 1000);
      } else {
        console.log('updateUIWithNewStatus: Max retries exceeded, using minimal implementation only');
      }
    };
    
    // Start retry sequence
    setTimeout(tryFullImplementation, retryDelays[0]);
  }
  
  // Enhanced minimal implementation for comprehensive UI updates
  console.log('updateUIWithNewStatus: Using enhanced minimal implementation');
  
  // Update essential UI elements with comprehensive information
  try {
    // 1. Update publication status with indicators
    if (status._normalized && typeof status._normalized.isPublished !== 'undefined') {
      const publishStatus = status._normalized.isPublished ? '公開中' : '停止中';
      const publishElement = document.getElementById('info-publish-text');
      if (publishElement) {
        publishElement.textContent = publishStatus;
      }
      
      // Update publish indicator
      const indicatorElement = document.getElementById('info-publish-indicator');
      const statusElement = document.getElementById('info-publish-status');
      if (status._normalized.isPublished) {
        if (statusElement) statusElement.className = 'px-2 py-1 rounded text-xs font-medium bg-green-600 text-white';
        if (indicatorElement) indicatorElement.className = 'w-2 h-2 rounded-full bg-green-400';
      } else {
        if (statusElement) statusElement.className = 'px-2 py-1 rounded text-xs font-medium bg-gray-600 text-gray-300';
        if (indicatorElement) indicatorElement.className = 'w-2 h-2 rounded-full bg-gray-400';
      }
    }
    
    // 2. Update user information section
    if (status.userInfo) {
      const adminEmailEl = document.getElementById('info-admin-email');
      const userIdEl = document.getElementById('info-user-id');
      
      if (adminEmailEl && status.userInfo.adminEmail) {
        adminEmailEl.textContent = status.userInfo.adminEmail;
      }
      if (userIdEl && status.userInfo.userId) {
        userIdEl.textContent = status.userInfo.userId;
      }
      
      // Update spreadsheet access
      if (status.userInfo.spreadsheetUrl) {
        const spreadsheetBtn = document.getElementById('open-spreadsheet-btn-step2');
        if (spreadsheetBtn) {
          spreadsheetBtn.disabled = false;
          spreadsheetBtn.onclick = () => window.open(status.userInfo.spreadsheetUrl, '_blank');
        }
      }
    }
    
    // 3. Update configuration display
    if (status.config || (status.userInfo && status.userInfo.configJson)) {
      let config = status.config;
      if (!config && status.userInfo.configJson) {
        try {
          config = typeof status.userInfo.configJson === 'string' 
            ? JSON.parse(status.userInfo.configJson) 
            : status.userInfo.configJson;
        } catch (e) {
          console.warn('Failed to parse configJson in minimal implementation');
        }
      }
      
      if (config) {
        // Update published sheet name
        const publishedSheetEl = document.getElementById('info-published-sheet');
        if (publishedSheetEl) {
          publishedSheetEl.textContent = config.publishedSheetName || status.activeSheetName || 'なし';
        }
        
        // Update display mode
        const displayModeEl = document.getElementById('info-display-mode');
        if (displayModeEl) {
          displayModeEl.textContent = config.showNames ? '名前表示' : '匿名表示';
        }
        
        // Update show counts setting
        const showCountsEl = document.getElementById('info-show-counts');
        if (showCountsEl) {
          showCountsEl.textContent = config.showCounts ? '表示' : '非表示';
        }
      }
    }
    
    // 4. Update answer count if available
    if (status.answerCount !== undefined) {
      const answerCountElement = document.getElementById('answer-count');
      if (answerCountElement) {
        answerCountElement.textContent = status.answerCount || '0';
      }
    }
    
    // 5. Update active sheet information
    if (status.activeSheetName) {
      const sheetNameElements = document.querySelectorAll('.active-sheet-name');
      sheetNameElements.forEach(element => {
        element.textContent = status.activeSheetName;
      });
    }
    
    
  } catch (error) {
    console.error('Error in enhanced minimal updateUIWithNewStatus:', error);
  }
}

// Central function availability checker
function checkFunctionAvailability(functionName) {
  const isAvailable = typeof window[functionName] === 'function';
  if (!isAvailable) {
    console.warn(`⚠️ Function ${functionName} is not available`);
  }
  return isAvailable;
}

// Safe function caller with fallback handling
function safeCallFunction(functionName, ...args) {
  try {
    if (checkFunctionAvailability(functionName)) {
      return window[functionName](...args);
    } else {
      console.warn(`⚠️ Cannot call ${functionName} - function not available`);
      return null;
    }
  } catch (error) {
    console.error(`❌ Error calling ${functionName}:`, error);
    return null;
  }
}

// Enhanced function registry with full implementation tracking
window.AdminPanel.functionRegistry = {
  available: new Set(),
  pending: new Set(),
  fullImplementations: new Set(),
  
  register(functionName) {
    if (typeof window[functionName] === 'function') {
      this.available.add(functionName);
      this.pending.delete(functionName);
    } else {
      this.pending.add(functionName);
      console.warn(`⚠️ Function pending: ${functionName}`);
    }
  },
  
  registerFullImplementation(functionName) {
    const fullFuncName = `_full${functionName.charAt(0).toUpperCase()}${functionName.slice(1)}`;
    if (typeof window[fullFuncName] === 'function') {
      this.fullImplementations.add(functionName);
      // デバッグモードのみログ出力（本番での重複ログを減らす）
      if (window.DEBUG_MODE || window.location.hostname === 'localhost') {
        console.log(`🔧 Full implementation registered: ${fullFuncName}`);
      }
    }
  },
  
  hasFullImplementation(functionName) {
    const fullFuncName = `_full${functionName.charAt(0).toUpperCase()}${functionName.slice(1)}`;
    return typeof window[fullFuncName] === 'function';
  },
  
  isAvailable(functionName) {
    return this.available.has(functionName);
  },
  
  // Enhanced full implementation detection
  checkForFullImplementations() {
    const functionsToCheck = [
      'updateUIWithNewStatus', 'populateHeaderOptions', 'populateConfig', 
      'updateFormUrlDisplay', 'validateConfig', 'updateConfigButtons'
    ];
    
    let foundCount = 0;
    functionsToCheck.forEach(funcName => {
      if (this.hasFullImplementation(funcName)) {
        this.registerFullImplementation(funcName);
        foundCount++;
      }
    });
    
    // 本番環境でのログ量を減らす
    if (window.DEBUG_MODE || window.location.hostname === 'localhost') {
      console.log(`🔍 Full implementations check: ${foundCount}/${functionsToCheck.length} available`);
    }
    return foundCount;
  },
  
  waitFor(functionName, timeout = 5000) {
    return new Promise((resolve, reject) => {
      if (this.isAvailable(functionName)) {
        resolve(window[functionName]);
        return;
      }
      
      const startTime = Date.now();
      const checkInterval = setInterval(() => {
        if (this.isAvailable(functionName)) {
          clearInterval(checkInterval);
          resolve(window[functionName]);
        } else if (Date.now() - startTime > timeout) {
          clearInterval(checkInterval);
          reject(new Error(`Function ${functionName} not available after ${timeout}ms`));
        }
      }, 100);
    });
  }
};

function initializeAdminPanelMaster() {
  // シンプル化: 重複初期化チェックを簡素化
  if (window.AdminPanel.initialization.isCompleted) {
    logDebug('✅ AdminPanel already initialized');
    return;
  }
  
  window.AdminPanel.initialization.isInProgress = true;
  logInfo('🚀 AdminPanel Master Initialization Started');
  
  // Phase 1: Core初期化
  try {
    initCore();
  } catch (error) {
    console.error('❌ Core initialization failed:', error);
  }
  
  // 公開停止後の全セクション展開処理
  checkAndExpandAllSections();
  
  // フォーム作成完了表示をクリア（新規アクセス時はデフォルトで非表示）
  setTimeout(() => {
    const formJustCreated = sessionStorage.getItem('form_just_created');
    if (formJustCreated !== 'true') {
      // 新規作成ではない場合、セクションを非表示にする
      const formUrlSection = document.getElementById('form-url-section');
      if (formUrlSection && !formUrlSection.classList.contains('hidden')) {
        formUrlSection.classList.add('hidden');
        logDebug('📋 既存アクセス時はフォーム完了セクションを非表示');
      }
    }
  }, 100);
  
  // Phase 2: 各モジュールを並列初期化 (パフォーマンス向上)
  // 遅延を最小限に抑制して即座に初期化
  setTimeout(() => {
    logDebug('🔧 Phase 2: 並列モジュール初期化開始');
    
    // Status管理初期化
    try {
      initializeMessageArea();
      logDebug('✅ Status module initialized');
    } catch (error) {
      logError('❌ Status module initialization failed:', error);
    }
    
    // API通信初期化
    try {
      logDebug('🚀 API module initialization...');
      initializeAPI();
      logDebug('✅ API module initialized');
    } catch (error) {
      console.error('❌ API initialization failed:', error);
    }
    
    // UI初期化
    try {
      initializeUI();
      logDebug('✅ UI module initialized');
    } catch (error) {
      console.error('❌ UI initialization failed:', error);
    }
    
    // フォーム管理初期化
    try {
      setupCharacterCounters();
      setupModalCharacterCounters();
      logDebug('✅ Forms module initialized');
    } catch (error) {
      logError('❌ Forms module initialization failed:', error);
    }
    
    // イベント管理初期化（最後に実行）
    setTimeout(() => {
      try {
        initializeEventListeners();
        logDebug('✅ Events module initialized');
        logInfo('🎉 AdminPanel Master Initialization Complete');
        
        // ユーザー情報の同期と最終処理
        finalizeInitialization();
        
      } catch (error) {
        updateSystemStatus('eventsInitialized', false, error);
        console.error('❌ Events initialization failed:', error);
        
        // エラーでも最終処理は実行
        finalizeInitialization();
      }
    }, 100);
    
  }, 10);
}

// Finalize initialization and enable user interaction
async function finalizeInitialization() {
  setTimeout(async () => {
    try {
      console.log('🔄 Final initialization steps...');
      
      // すべての同期が完了したらローディングオーバーレイを非表示
      if (window.unifiedLoading) {
        window.unifiedLoading.hide();
      } else {
        // フォールバック: 直接DOM操作
        const overlay = document.getElementById('loading-overlay');
        if (overlay) {
          overlay.classList.add('hidden');
        }
      }
      
      // UI要素の有効化
      enableUserInteraction();
      
      // Initialize and load history table after all initialization is complete
      try {
        console.log('🔄 Initializing HistoryManager...');
        if (window.HistoryManager) {
          window.HistoryManager.initialize();
          console.log('🔄 Loading history table after initialization...');
          window.HistoryManager.renderTable().catch(error => {
            console.error('❌ Failed to render history table during initialization:', error);
          });
        } else {
          console.warn('⚠️ HistoryManager not available yet');
        }
      } catch (historyError) {
        console.warn('⚠️ History initialization/loading failed:', historyError);
      }
      
      // Draft recovery after initialization complete
      try {
        console.log('🔄 Checking for draft recovery...');
        if (typeof recoverDraftIfAvailable === 'function') {
          recoverDraftIfAvailable();
        }
      } catch (draftError) {
        console.warn('⚠️ Draft recovery failed:', draftError);
      }
      
      // 初期化完了
      window.AdminPanel.initialization.isInProgress = false;
      window.AdminPanel.initialization.isCompleted = true;
      logInfo('✅ AdminPanel Master Initialization Completed');
      
    } catch (error) {
      console.error('❌ Final sync error:', error);
      // エラーでもローディングは解除
      if (window.unifiedLoading) {
        window.unifiedLoading.hide();
      }
      enableUserInteraction();
      
      // 初期化完了（エラーありでも）
      window.AdminPanel.initialization.isInProgress = false;
      window.AdminPanel.initialization.isCompleted = true;
      logWarn('⚠️ AdminPanel initialization completed with errors');
    }
  }, 500);
}

        return `復元データに問題があります。履歴データが破損している可能性があります。\n詳細: ${baseError}`;
      
      case 'system':
        return `システムエラーが発生しました。ページを再読み込みしてから再試行してください。\n詳細: ${baseError}`;
      
      default:
        return `予期しないエラーが発生しました。\n詳細: ${baseError}`;
    }
  },

  /**
   * Stage 2: シート復元
   */
  async _restoreSheet(item, preflightResult) {
    const maxRetries = 2;
    let lastError = null;
    
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        console.log(`📊 Restoring sheet and project (attempt ${attempt}/${maxRetries})...`);
        
        // スプレッドシート切り替えが必要かチェック
        const currentSpreadsheetId = window.AdminPanel?.currentStatus?.userInfo?.configJson?.spreadsheetId;
        if (item.spreadsheetId !== currentSpreadsheetId) {
          console.log('🔄 Switching to target spreadsheet...');
          
          // スプレッドシート切り替えにもリトライを適用
          const switchResult = await this._performSpreadsheetSwitchWithRetry(item.spreadsheetId, 2);
          if (!switchResult.success) {
            throw new Error(`スプレッドシート切り替え失敗: ${switchResult.error}`);
          }
        }
        
        // シート選択を復元
        let targetSheetName = item.sheetName;
        
        // 代替シートがある場合は最初の候補を使用
        if (preflightResult.alternatives && preflightResult.alternatives.length > 0) {
          targetSheetName = preflightResult.alternatives[0];
          console.log(`📊 Using alternative sheet: ${targetSheetName}`);
        }
        
        // シート選択UIを更新（リトライ付き）
        const uiUpdateResult = await this._restoreSheetSelectionWithRetry(targetSheetName, 2);
        if (!uiUpdateResult.success) {
          throw new Error(`シートUI更新失敗: ${uiUpdateResult.error}`);
        }
        
        console.log('✅ Sheet restoration completed');
        return { success: true, sheetName: targetSheetName };
        
      } catch (error) {
        lastError = error;
        console.warn(`⚠️ Sheet restoration attempt ${attempt} failed:`, error);
        
        // リトライ可能エラーの場合のみリトライ
        if (this._isRetryableError(error) && attempt < maxRetries) {
          const delay = attempt * 1500; // 1.5秒ずつ増加
          console.log(`⏳ Retrying sheet restoration in ${delay}ms...`);
          await new Promise(resolve => setTimeout(resolve, delay));
          continue;
        }
        
        break;
      }
    }
    
    return { 
      success: false, 
      error: `シート復元失敗 (${maxRetries}回試行): ${lastError?.message || '不明なエラー'}`,
      category: this._categorizeError(lastError)
    };
  },

  /**
   * Enhanced spreadsheet switch with retry
   */
  async _performSpreadsheetSwitchWithRetry(targetSpreadsheetId, maxRetries = 2) {
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        await this._performSpreadsheetSwitch(targetSpreadsheetId);
        return { success: true };
      } catch (error) {
        if (attempt === maxRetries) {
          return { success: false, error: error.message };
        }
        console.warn(`⚠️ Spreadsheet switch attempt ${attempt} failed:`, error);
        await new Promise(resolve => setTimeout(resolve, attempt * 1000));
      }
    }
    
    return { success: false, error: 'スプレッドシート切り替えに失敗しました' };
  },

  /**
   * Enhanced sheet selection UI update with retry
   */
  async _restoreSheetSelectionWithRetry(sheetName, maxRetries = 2) {
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        await this._restoreSheetSelection(sheetName);
        
        // UI更新の検証
        const sheetSelect = document.getElementById('sheet-select');
        if (sheetSelect && sheetSelect.value === sheetName) {
          return { success: true };
        } else if (attempt === maxRetries) {
          return { success: false, error: 'シート選択UIの更新を検証できませんでした' };
        }
        
      } catch (error) {
        if (attempt === maxRetries) {
          return { success: false, error: error.message };
        }
        console.warn(`⚠️ Sheet selection UI update attempt ${attempt} failed:`, error);
        await new Promise(resolve => setTimeout(resolve, attempt * 800));
      }
    }
    
    return { success: false, error: 'シート選択UIの更新に失敗しました' };
  },

  /**
   * Stage 3: 列マッチング
   */
  async _matchColumns(item) {
    try {
      console.log('🔍 Matching and restoring columns...');
      
      // 列選択肢が読み込まれるまで待機する関数（改良版）
      const waitForColumnOptions = async (selectId, targetValue, maxWait = 5000) => {
        const startTime = Date.now();
        const checkInterval = 300;
        let lastOptionsCount = 0;
        
        return new Promise((resolve) => {
          const checkOptions = () => {
            const select = document.getElementById(selectId);
            if (!select) {
              const elapsed = Date.now() - startTime;
              if (elapsed >= maxWait) {
                console.warn(`⚠️ Select element ${selectId} not found after ${elapsed}ms timeout`);
                resolve({ success: false, error: `要素 ${selectId} が見つかりません` });
                return;
              }
              setTimeout(checkOptions, checkInterval);
              return;
            }
            
            // 選択肢の中に目標値があるかチェック
            const options = Array.from(select.options);
            
            // オプションが読み込み中の可能性をチェック
            if (options.length !== lastOptionsCount) {
              lastOptionsCount = options.length;
              console.log(`📊 ${selectId} options updated: ${options.length} available`);
            }
            
            // 完全一致チェック
            let targetOption = options.find(option => option.value === targetValue);
            let matchType = 'exact';
            
            // 完全一致がない場合、部分一致チェック
            if (!targetOption && targetValue && targetValue.trim() !== '') {
              const normalizedTarget = targetValue.replace(/[（）()]/g, '').trim();
              if (normalizedTarget.length >= 3) {
                targetOption = options.find(option => {
                  const normalizedOption = option.value.replace(/[（）()]/g, '').trim();
                  return normalizedOption.length > 0 && 
                         (normalizedOption.includes(normalizedTarget) || normalizedTarget.includes(normalizedOption));
                });
                
                if (targetOption) {
                  matchType = 'partial';
                  console.log(`✅ Column option found via partial match for ${selectId}: ${targetValue} → ${targetOption.value}`);
                }
              }
            }
            
            if (targetOption) {
              const finalValue = targetOption.value;
              console.log(`✅ Column option found for ${selectId}: ${finalValue} (${matchType} match)`);
              
              try {
                select.value = finalValue;
                
                // 値が正しく設定されたかダブルチェック
                if (select.value === finalValue) {
                  console.log(`✅ ${selectId} value successfully set to: ${finalValue}`);
                  resolve({ success: true, value: finalValue, matchType });
                } else {
                  console.warn(`⚠️ ${selectId} value setting failed. Expected: ${finalValue}, Actual: ${select.value}`);
                  resolve({ success: false, error: '値の設定に失敗', attempted: finalValue });
                }
              } catch (setError) {
                console.warn(`⚠️ Error setting ${selectId} value:`, setError);
                resolve({ success: false, error: setError.message, attempted: finalValue });
              }
              return;
            }
            
            // タイムアウトチェック
            const elapsed = Date.now() - startTime;
            if (elapsed >= maxWait) {
              console.warn(`⚠️ Timeout waiting for column option ${selectId}:${targetValue} (${elapsed}ms). Available: ${options.map(o => o.value).join(', ')}`);

              // シンプルなフォールバック: 回答列（opinionHeader）なら既知の代表候補を優先選択
              if (selectId === 'opinionHeader') {
                const knownMainHeaders = [
                  'あなたの考えや気づいたことを教えてください',
                  'あなたの回答・意見',
                  '回答・意見'
                ];
                const fallback = options.find(o => knownMainHeaders.includes(o.value));
                if (fallback) {
                  try {
                    select.value = fallback.value;
                    if (select.value === fallback.value) {
                      console.log(`ℹ️ opinionHeader fallback selected: ${fallback.value}`);
                      resolve({ success: true, value: fallback.value, matchType: 'fallback' });
                      return;
                    }
                  } catch (e) {
                    // 続行して次の直接設定へ
                  }
                }
              }

              // 最後の試行として直接値を設定
              try {
                select.value = targetValue;
                resolve({ 
                  success: false, 
                  error: 'タイムアウト（最後の試行済み）', 
                  attempted: targetValue,
                  availableOptions: options.slice(0, 5).map(o => o.value)
                });
              } catch (finalError) {
                resolve({ 
                  success: false, 
                  error: `タイムアウトおよび直接設定失敗: ${finalError.message}`,
                  attempted: targetValue 
                });
              }
              return;
            }
            
            setTimeout(checkOptions, checkInterval);
          };
          
          checkOptions();
        });
      };
      
      // 並列で列選択を復元（タイムアウト制御）
      const columnRestorations = [];
      const restorationPromises = [];
      
      const columnMappings = [
        { key: 'opinionColumn', elementId: 'opinionHeader', type: 'opinion' },
        { key: 'nameColumn', elementId: 'name-column', type: 'name' },
        { key: 'classColumn', elementId: 'class-column', type: 'class' },
        { key: 'reasonColumn', elementId: 'reason-column', type: 'reason' }
      ];
      
      columnMappings.forEach(mapping => {
        if (item[mapping.key]) {
          const promise = waitForColumnOptions(mapping.elementId, item[mapping.key])
            .then(result => ({
              type: mapping.type,
              value: item[mapping.key],
              elementId: mapping.elementId,
              ...result
            }));
          
          restorationPromises.push(promise);
        }
      });
      
      // すべての列復元を待機（部分的失敗も許容）
      if (restorationPromises.length > 0) {
        console.log(`🔄 Waiting for ${restorationPromises.length} column selections to restore...`);
        
        try {
          // Promise.allSettledを使用して部分的失敗を許容
          const settledResults = await Promise.allSettled(restorationPromises);
          
          const results = settledResults.map((result, index) => {
            if (result.status === 'fulfilled') {
              return result.value;
            } else {
              return {
                type: columnMappings[index]?.type || 'unknown',
                value: '',
                success: false,
                error: result.reason?.message || '不明なエラー'
              };
            }
          });
          
          const successCount = results.filter(r => r.success).length;
          const failedResults = results.filter(r => !r.success);
          
          console.log(`✅ Column restoration completed: ${successCount}/${results.length} successful`);
          
          // 失敗した列の詳細をログ出力
          if (failedResults.length > 0) {
            console.warn('⚠️ Failed column restorations:', failedResults.map(r => 
              `${r.type}: ${r.error || '不明なエラー'}`
            ).join(', '));
          }
          
          // 部分的成功でも success: true とする（重要な列が復元されていれば）
          const criticalColumns = results.filter(r => r.type === 'opinion');
          const criticalSuccess = criticalColumns.length === 0 || criticalColumns.some(r => r.success);
          
          return { 
            success: criticalSuccess && successCount > 0, 
            results, 
            successCount,
            totalCount: results.length,
            partialFailure: successCount > 0 && successCount < results.length,
            failedColumns: failedResults
          };
        } catch (globalError) {
          console.error('❌ Global column restoration error:', globalError);
          return { 
            success: false, 
            error: `列復元で致命的エラー: ${globalError.message}`,
            category: this._categorizeError(globalError)
          };
        }
      }
      
      return { success: true, results: [], successCount: 0, totalCount: 0 };
      
    } catch (error) {
      console.error('❌ Column matching error:', error);
      return { 
        success: false, 
        error: error.message,
        category: this._categorizeError(error)
      };
    }
  },

  /**
   * Stage 4: 設定復元
   */
  async _restoreSettings(item, columnResult) {
    const maxRetries = 3;
    let lastError = null;
    
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        console.log(`⚙️ Restoring settings and persisting configuration (attempt ${attempt}/${maxRetries})...`);
        
        // 設定の永続化（バックエンドへ同期）with retry
        if (typeof buildConfigObject === 'function' && typeof runGasWithUserId === 'function') {
          let configToPersist;
          
          try {
            configToPersist = buildConfigObject();
          } catch (buildError) {
            throw new Error(`設定オブジェクト作成失敗: ${buildError.message}`);
          }
          
          // 復元したシート名を強制適用
          if (item.sheetName) {
            configToPersist.sheetName = item.sheetName;
          }
          
          // 列マッチング結果を反映
          if (columnResult.success && columnResult.results) {
            columnResult.results.forEach(result => {
              if (result.success && result.value) {
                switch (result.type) {
                  case 'opinion':
                    configToPersist.opinionHeader = result.value;
                    break;
                  case 'name':
                    configToPersist.nameColumn = result.value;
                    break;
                  case 'class':
                    configToPersist.classColumn = result.value;
                    break;
                  case 'reason':
                    configToPersist.reasonColumn = result.value;
                    break;
                }
              }
            });
          }
          
          console.log('📊 Configuration to persist:', {
            sheetName: configToPersist.sheetName,
            opinionHeader: configToPersist.opinionHeader,
            columnCount: Object.keys(configToPersist).filter(k => k.includes('Column')).length
          });
          
          // 復元の意図を明確化するためflowTypeは 'custom'
          const syncResult = await this._syncConfigurationWithRetry(configToPersist, attempt);
          
          if (!syncResult.success) {
            // シンプルな扱い: 権限関連のエラーは警告化して継続
            const errMsg = String(syncResult.error || '');
            const isPermission = errMsg.includes('権限') || errMsg.includes('アクセスが拒否');
            if (isPermission) {
              console.warn('⚠️ Configuration sync permission issue, continuing with warning:', errMsg);
              showMessage('⚠️ 設定の同期に権限が不足しています。管理者に確認してください。', 'warning');
            } else {
              throw new Error(syncResult.error);
            }
          }
          
        } else {
          throw new Error('設定永続化関数が見つかりません (buildConfigObject または runGasWithUserId が利用できません)');
        }

        // UI完全更新（リトライ付き）
        const uiRefreshResult = await this._refreshAfterRestoreWithRetry(item, 2);
        if (!uiRefreshResult.success) {
          console.warn('⚠️ UI refresh failed but continuing:', uiRefreshResult.error);
          // UI更新失敗は致命的ではないため継続
        }
        
        console.log('✅ Settings restoration completed');
        return { success: true };
        
      } catch (error) {
        lastError = error;
        console.warn(`⚠️ Settings restoration attempt ${attempt} failed:`, error);
        
        // リトライ可能エラーの場合のみリトライ
        if (this._isRetryableError(error) && attempt < maxRetries) {
          const delay = Math.pow(2, attempt) * 1000; // Exponential backoff
          console.log(`⏳ Retrying settings restoration in ${delay}ms...`);
          await new Promise(resolve => setTimeout(resolve, delay));
          continue;
        }
        
        break;
      }
    }
    
    return { 
      success: false, 
      error: `設定復元失敗 (${maxRetries}回試行): ${lastError?.message || '不明なエラー'}`,
      category: this._categorizeError(lastError)
    };
  },

  /**
   * Enhanced configuration sync with retry
   */
  async _syncConfigurationWithRetry(configToPersist, retryAttempt = 1) {
    const timeout = 15000 + (retryAttempt * 5000); // 段階的にタイムアウトを延長
    
    return new Promise((resolve) => {
      const timeoutId = setTimeout(() => {
        console.warn(`⚠️ Configuration sync timeout after ${timeout}ms`);
        resolve({ success: false, error: 'サーバー応答タイムアウト' });
      }, timeout);
      
      google.script.run
        .withSuccessHandler(response => {
          clearTimeout(timeoutId);
          if (response && (response.status === 'success' || response.success === true)) {
            console.log('✅ Configuration synchronized after restore');
            resolve({ success: true });
          } else {
            const errorMsg = response?.message || response || 'Unknown sync error';
            console.warn('⚠️ Configuration sync after restore failed:', errorMsg);
            resolve({ success: false, error: `設定同期失敗: ${errorMsg}` });
          }
        })
        .withFailureHandler(error => {
          clearTimeout(timeoutId);
          console.warn('⚠️ Configuration sync error:', error);
          resolve({ 
            success: false, 
            error: `同期通信エラー: ${error.message || error}` 
          });
        })
        .syncConfigurationState(configToPersist, 'custom');
    });
  },

  /**
   * Enhanced UI refresh with retry
   */
  async _refreshAfterRestoreWithRetry(item, maxRetries = 2) {
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        await this._refreshAfterRestore(item);
        
        // UI更新の検証
        const success = await this._verifyUIRefresh(item);
        if (success || attempt === maxRetries) {
          return { success };
        }
        
      } catch (error) {
        if (attempt === maxRetries) {
          return { success: false, error: error.message };
        }
        console.warn(`⚠️ UI refresh attempt ${attempt} failed:`, error);
        await new Promise(resolve => setTimeout(resolve, attempt * 1000));
      }
    }
    
    return { success: false, error: 'UI更新に失敗しました' };
  },

  /**
   * Verify UI refresh was successful
   */
  async _verifyUIRefresh(item) {
    try {
      // 基本的な要素の存在確認
      const questionInput = document.getElementById('opinionHeader');
      const sheetSelect = document.getElementById('sheet-select');
      
      if (!questionInput || !sheetSelect) {
        console.warn('⚠️ UI verification failed: missing essential elements');
        return false;
      }
      
      // 復元された値が適用されているかチェック
      if (item.questionText && questionInput.value !== item.questionText) {
        console.warn('⚠️ UI verification failed: question text mismatch');
        return false;
      }
      
      console.log('✅ UI refresh verification passed');
      return true;
      
    } catch (error) {
      console.warn('⚠️ UI verification error:', error);
      return false;
    }
  },

  /**
   * Stage 5: 検証（強化版）
   */
  async _validateRestoration(item) {
    try {
      console.log('🔍 Running comprehensive restoration validation...');
      const warnings = [];
      const recommendations = [];
      let qualityScore = 0;
      const maxScore = 100;
      
      // 1. 基本設定値の検証
      if (item.questionText) {
        const questionInput = document.getElementById('opinionHeader');
        if (!questionInput) {
          warnings.push('質問文入力欄が見つかりません');
        } else if (questionInput.value !== item.questionText) {
          warnings.push('質問文が正しく復元されていません');
          recommendations.push('質問文を手動で入力し直してください');
        } else {
          qualityScore += 25; // 25点
        }
      }
      
      // 2. シート選択の検証（強化版）
      if (item.sheetName) {
        const sheetSelect = document.getElementById('sheet-select');
        if (!sheetSelect) {
          warnings.push('シート選択欄が見つかりません');
        } else {
          const selectedValue = sheetSelect.value;
          if (selectedValue !== item.sheetName) {
            // 類似度チェック
            const similarity = this._calculateStringSimilarity(selectedValue, item.sheetName);
            if (similarity > 0.7) {
              qualityScore += 20; // 部分点
              warnings.push(`シート選択が類似のものに変更されました: ${item.sheetName} → ${selectedValue}`);
            } else {
              warnings.push('シート選択が正しく復元されていません');
              recommendations.push(`正しいシート（${item.sheetName}）を選択してください`);
            }
          } else {
            qualityScore += 25; // 25点
          }
        }
      }
      
      // 3. 列選択の検証（強化版）
      const columnChecks = [
        { id: 'opinionHeader', expected: item.opinionColumn, name: '回答列', critical: true },
        { id: 'name-column', expected: item.nameColumn, name: '名前列', critical: false },
        { id: 'class-column', expected: item.classColumn, name: 'クラス列', critical: false },
        { id: 'reason-column', expected: item.reasonColumn, name: '理由列', critical: false }
      ];
      
      let columnScore = 0;
      const columnMaxScore = 50;
      const columnWeight = columnChecks.filter(c => c.expected).length;
      
      columnChecks.forEach(check => {
        if (check.expected) {
          const element = document.getElementById(check.id);
          if (!element) {
            warnings.push(`${check.name}の選択欄が見つかりません`);
          } else {
            const selectedValue = element.value;
            if (selectedValue !== check.expected) {
              // 部分一致の品質チェック
              const similarity = this._calculateStringSimilarity(selectedValue, check.expected);
              if (similarity > 0.6) {
                columnScore += (columnMaxScore / columnWeight) * 0.7; // 部分点
                warnings.push(`${check.name}が類似のものに変更されました: ${check.expected} → ${selectedValue}`);
              } else {
                if (check.critical) {
                  warnings.push(`${check.name}が正しく復元されていません（重要）`);
                  recommendations.push(`${check.name}を手動で設定してください`);
                } else {
                  warnings.push(`${check.name}が正しく復元されていません`);
                }
              }
            } else {
              columnScore += columnMaxScore / columnWeight;
            }
          }
        }
      });
      
      qualityScore += columnScore;
      
      // 4. 高度な整合性チェック
      const integrityChecks = await this._performIntegrityChecks(item);
      if (integrityChecks.score > 0) {
        qualityScore += Math.min(integrityChecks.score, 25); // 最大25点
      }
      if (integrityChecks.warnings) {
        warnings.push(...integrityChecks.warnings);
      }
      if (integrityChecks.recommendations) {
        recommendations.push(...integrityChecks.recommendations);
      }
      
      // 5. 品質評価
      const qualityPercentage = Math.round((qualityScore / maxScore) * 100);
      let qualityLevel = 'poor';
      if (qualityPercentage >= 90) qualityLevel = 'excellent';
      else if (qualityPercentage >= 75) qualityLevel = 'good';
      else if (qualityPercentage >= 50) qualityLevel = 'fair';
      
      console.log(`📊 Restoration Quality Score: ${qualityScore}/${maxScore} (${qualityPercentage}%) - ${qualityLevel}`);
      
      // 6. 結果の判定
      const hasCriticalIssues = warnings.some(w => w.includes('重要') || w.includes('見つかりません'));
      const success = !hasCriticalIssues && qualityPercentage >= 50;
      
      const result = {
        success,
        warnings: warnings.length > 0 ? warnings : undefined,
        recommendations: recommendations.length > 0 ? recommendations : undefined,
        qualityScore: qualityPercentage,
        qualityLevel,
        details: {
          criticalIssues: hasCriticalIssues,
          totalWarnings: warnings.length,
          totalRecommendations: recommendations.length
        }
      };
      
      if (success) {
        console.log('✅ Enhanced validation passed');
      } else {
        console.warn('⚠️ Enhanced validation found issues:', warnings);
      }
      
      return result;
      
    } catch (error) {
      console.error('❌ Enhanced validation error:', error);
      return { 
        success: false, 
        warnings: [error.message],
        qualityScore: 0,

  /**

   */

      if (currentStatus?.userInfo?.configJson?.formUrl) {

        if (formUrl.includes('forms.gle') || formUrl.includes('docs.google.com/forms')) {

      } else {
        warnings.push('質問文が設定されていません');
        recommendations.push('質問文を入力してください');
      }
      
      // 4. UIの応答性チェック
      const essentialElements = [

      });

      return { score: 0, warnings: ['整合性チェックでエラーが発生しました'], recommendations: [] };
    }
  },

  /**
   * Enhanced column matching with improved similarity algorithm
   */
  _calculateEnhancedStringSimilarity(str1, str2) {
    if (!str1 || !str2) return 0;
    
    // 基本の類似度計算
    const basicSimilarity = this._calculateStringSimilarity(str1, str2);
    
    // 追加の重み付け
    let enhancedScore = basicSimilarity;
    
    // 1. 完全一致ボーナス
    if (str1 === str2) {
      return 1.0;
    }
    
    // 2. 部分的キーワード一致
    const keywords1 = str1.toLowerCase().split(/[\s（）()]/);
    const keywords2 = str2.toLowerCase().split(/[\s（）()]/);
    
    let keywordMatches = 0;
    keywords1.forEach(k1 => {
      if (k1.length > 1 && keywords2.some(k2 => k2.includes(k1) || k1.includes(k2))) {
        keywordMatches++;
      }
    });
    
    if (keywordMatches > 0) {
      enhancedScore += (keywordMatches / Math.max(keywords1.length, keywords2.length)) * 0.2;
    }
    
    // 3. 数字や記号の一致
    const numbers1 = str1.match(/\d+/g) || [];
    const numbers2 = str2.match(/\d+/g) || [];
    
    if (numbers1.length > 0 && numbers2.length > 0) {
      const numberMatch = numbers1.some(n1 => numbers2.includes(n1));
      if (numberMatch) {
        enhancedScore += 0.1;
      }
    }
    
    return Math.min(enhancedScore, 1.0);
  },

  /**
   * Stage 1: Preflight check for restore compatibility
   */
  async _preflightCheck(item) {
    const maxRetries = 3;
    let lastError = null;
    
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        console.log(`🔍 Running preflight checks (attempt ${attempt}/${maxRetries})...`);
        
        // 必須項目の確認
        if (!item.sheetName) {
          return { success: false, error: 'シート名が見つかりません', category: 'validation' };
        }
        
        if (!item.spreadsheetId) {
          return { success: false, error: 'スプレッドシートIDが見つかりません', category: 'validation' };
        }
        
        // 現在のシステム状態確認
        if (!window.AdminPanel) {
          return { success: false, error: 'システムが初期化されていません', category: 'system' };
        }
        
        // ネットワーク接続確認
        if (!navigator.onLine) {
          return { success: false, error: 'インターネット接続が必要です', category: 'network' };
        }
        
        // シート存在確認（サーバーサイド）with retry
        const sheetExists = await this._validateSheetOnServerWithRetry(item.spreadsheetId, item.sheetName, 2);
        if (!sheetExists) {
          // 代替シートを検索
          const alternatives = await this._findAlternativeSheets(item.spreadsheetId, item.sheetName);
          if (alternatives.length > 0) {
            console.log(`⚠️ Target sheet not found, alternatives available: ${alternatives.join(', ')}`);
            return { 
              success: true, 
              warnings: [`シート「${item.sheetName}」が見つかりません。類似シート: ${alternatives.join(', ')}`],
              alternatives 
            };
          } else {
            return { success: false, error: `シート「${item.sheetName}」が見つからず、代替シートもありません`, category: 'data' };
          }
        }
        
        console.log('✅ Preflight checks passed');
        return { success: true };
        
      } catch (error) {
        lastError = error;
        console.warn(`⚠️ Preflight check attempt ${attempt} failed:`, error);
        
        // ネットワークエラーの場合はリトライ
        if (this._isRetryableError(error) && attempt < maxRetries) {
          const delay = Math.pow(2, attempt) * 1000; // Exponential backoff
          console.log(`⏳ Retrying in ${delay}ms...`);
          await new Promise(resolve => setTimeout(resolve, delay));
          continue;
        }
        
        // 最終試行または非リトライ可能エラー
        break;
      }
    }
    
    return { 
      success: false, 
      error: `プリフライトチェック失敗 (${maxRetries}回試行): ${lastError?.message || '不明なエラー'}`,
      category: this._categorizeError(lastError)
    };
  },

  /**
   * Enhanced sheet validation with retry logic
   */
  async _validateSheetOnServerWithRetry(spreadsheetId, sheetName, maxRetries = 2) {
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        const result = await this._validateSheetOnServer(spreadsheetId, sheetName);
        if (result || attempt === maxRetries) {
          return result;
        }
        
        // Wait before retry
        const delay = attempt * 1000;
        console.log(`⏳ Sheet validation retry in ${delay}ms...`);
        await new Promise(resolve => setTimeout(resolve, delay));
        
      } catch (error) {
        if (attempt === maxRetries) throw error;
        console.warn(`⚠️ Sheet validation attempt ${attempt} failed:`, error);
      }
    }
    
    return false;
  },

  /**
   * Determine if an error is retryable
   */
  _isRetryableError(error) {
    if (!error) return false;
    
    const retryablePatterns = [
      /network/i,
      /timeout/i,
      /connection/i,
      /temporarily/i,
      /service.+unavailable/i,
      /rate.+limit/i,
      /quota.+exceeded/i
    ];
    
    const errorMessage = error.message || error.toString();
    return retryablePatterns.some(pattern => pattern.test(errorMessage));
  },

  /**
   * Categorize errors for better user feedback
   */
  _categorizeError(error) {
    if (!error) return 'unknown';
    
    const errorMessage = error.message || error.toString();
    
    if (/network|connection|internet/i.test(errorMessage)) return 'network';
    if (/timeout/i.test(errorMessage)) return 'timeout';
    if (/permission|auth/i.test(errorMessage)) return 'permission';
    if (/quota|limit/i.test(errorMessage)) return 'quota';
    if (/not.+found|missing/i.test(errorMessage)) return 'data';
    if (/validation|invalid/i.test(errorMessage)) return 'validation';
    
    return 'system';
  },

  /**
   * Find alternative sheets when target sheet is not found
   */
  async _findAlternativeSheets(spreadsheetId, targetSheetName) {
    try {
      // 現在利用可能なシート一覧を取得
      if (window.AdminPanel?.currentStatus?.sheetNames) {
        const availableSheets = window.AdminPanel.currentStatus.sheetNames
          .map(sheet => sheet.name || sheet)
          .filter(name => name && typeof name === 'string');
        
        // シート名の類似度チェック
        const similarities = availableSheets.map(sheetName => {
          const similarity = this._calculateStringSimilarity(targetSheetName, sheetName);
          return { name: sheetName, similarity };
        });
        
        // 類似度が高い順にソートし、閾値以上のものを返す
        return similarities
          .filter(item => item.similarity > 0.3) // 30%以上の類似度
          .sort((a, b) => b.similarity - a.similarity)
          .slice(0, 3) // 上位3つまで
          .map(item => item.name);
      }
      
      return [];
    } catch (error) {
      console.warn('⚠️ Error finding alternative sheets:', error);
      return [];
    }
  },

  /**
   * Calculate string similarity for sheet name matching
   */
  _calculateStringSimilarity(str1, str2) {
    if (!str1 || !str2) return 0;
    
    // 正規化（ひらがな、カタカナ、英数字の統一）
    const normalize = (str) => {
      return str.toLowerCase()
        .replace(/[ァ-ヶ]/g, match => String.fromCharCode(match.charCodeAt(0) - 0x60))
        .replace(/\s+/g, '')
        .replace(/[0-9０-９]/g, match => 
          match.charCodeAt(0) < 0x100 ? match : String.fromCharCode(match.charCodeAt(0) - 0xFEE0)
        );
    };
    
    const norm1 = normalize(str1);
    const norm2 = normalize(str2);
    
    if (norm1 === norm2) return 1.0;
    
    // Levenshtein距離による類似度計算
    const maxLen = Math.max(norm1.length, norm2.length);
    if (maxLen === 0) return 1.0;
    
    const distance = this._levenshteinDistance(norm1, norm2);
    return 1 - (distance / maxLen);
  },

  /**
   * Calculate Levenshtein distance
   */
  _levenshteinDistance(str1, str2) {
    const matrix = [];
    
    for (let i = 0; i <= str2.length; i++) {
      matrix[i] = [i];
    }
    
    for (let j = 0; j <= str1.length; j++) {
      matrix[0][j] = j;
    }
    
    for (let i = 1; i <= str2.length; i++) {
      for (let j = 1; j <= str1.length; j++) {
        if (str2.charAt(i - 1) === str1.charAt(j - 1)) {
          matrix[i][j] = matrix[i - 1][j - 1];
        } else {
          matrix[i][j] = Math.min(
            matrix[i - 1][j - 1] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j] + 1
          );
        }
      }
    }
    
    return matrix[str2.length][str1.length];
  },

  /**
   * Perform actual spreadsheet switching
   */
  async _performSpreadsheetSwitch(targetSpreadsheetId) {
    try {
      // 1. Update user's active spreadsheet in database
      if (typeof runGasWithUserId === 'function') {
        const updateResult = await runGasWithUserId('updateUserAPI', false, {
          spreadsheetId: targetSpreadsheetId
        });
        
        if (updateResult && updateResult.status === 'success') {
          console.log('✅ Spreadsheet switched successfully in database');
        } else {
          throw new Error('Database update failed: ' + (updateResult?.message || 'Unknown error'));
        }
      } else {
        throw new Error('runGasWithUserId function not available');
      }

      // 2. Clear caches to force reload with new spreadsheet
      if (window.unifiedCache && typeof window.unifiedCache.clear === 'function') {
        window.unifiedCache.clear();
      }
      if (window.gasOptimizer && typeof window.gasOptimizer.clearCache === 'function') {
        window.gasOptimizer.clearCache();
      }

      // 3. Reload application state with new spreadsheet
      if (typeof loadStatus === 'function') {
        await loadStatus(true); // Force reload bypassing cache
        console.log('✅ Application state reloaded with new spreadsheet');
        
        // 4. Force update currentSpreadsheetUrl after state reload
        if (window.currentStatus?.userInfo?.spreadsheetUrl) {
          currentSpreadsheetUrl = window.currentStatus.userInfo.spreadsheetUrl;
          console.log('✅ currentSpreadsheetUrl force updated after switch:', currentSpreadsheetUrl);
        } else {
          console.warn('⚠️ No spreadsheetUrl available in reloaded currentStatus');
        }
      } else {
        console.warn('⚠️ loadStatus function not available for state reload');
      }

    } catch (error) {
      console.error('❌ Spreadsheet switching failed:', error);
      if (typeof showMessage === 'function') {
        showMessage('❌ プロジェクト切り替えに失敗しました: ' + error.message, 'error');
      }
      throw error; // Re-throw to be handled by caller
    }
  },

  /**
   * Wait for sheet options to be updated with target sheet
   */
  async _waitForSheetOptionsUpdate(targetSheetName, maxWaitTime = 3000) {
    const startTime = Date.now();
    const checkInterval = 100; // Check every 100ms
    
    return new Promise((resolve, reject) => {
      const checkSheetOptions = () => {
        const select = document.getElementById('sheet-select');
        if (!select) {
          console.warn('⚠️ Sheet select element not found during wait');
          resolve(false);
          return;
        }
        
        // Check if target sheet is in options
        const options = Array.from(select.options);
        const hasTargetSheet = options.some(option => option.value === targetSheetName);
        
        if (hasTargetSheet) {
          console.log(`✅ Target sheet found in options: ${targetSheetName}`);
          resolve(true);
          return;
        }
        
        // Check timeout
        const elapsed = Date.now() - startTime;
        if (elapsed >= maxWaitTime) {
          console.warn(`⚠️ Timeout waiting for sheet options update (${elapsed}ms). Available: ${options.map(o => o.value).join(', ')}`);
          resolve(false); // Don't reject, allow fallback
          return;
        }
        
        // Continue checking
        setTimeout(checkSheetOptions, checkInterval);
      };
      
      // Start checking
      checkSheetOptions();
    });
  },
  
  /**
   * Generate unique history ID
   */
  generateId() {
    return Date.now().toString() + Math.random().toString(36).substr(2, 9);
  },
  
  /**
   * HTML escape utility
   */
  _escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }
};

// Create compatibility layer for legacy code
window.AdminPanel.historyManager = {

    window.HistoryManager.renderTable().catch(error => {
      console.error('❌ Failed to render history table from compatibility layer:', error);
    });
  },
  restoreFromSimpleHistory: (item) => window.HistoryManager._restoreHistoryItem(item)
};

// Register global functions for backward compatibility
window.loadSimpleHistoryTable = () => {
  window.HistoryManager.renderTable().catch(error => {
    console.error('❌ Failed to render history table from global function:', error);
  });
};
