name: CI

on:
  push:
    branches: [main]
    paths: ['src/**', 'tests/**', 'package.json', '.github/workflows/ci.yml']
  pull_request:
    branches: [main]
    paths: ['src/**', 'tests/**', 'package.json', '.github/workflows/ci.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print toolchain versions
        # Why: CI log exposes node + clasp version so a quiet clasp minor bump
        #   that breaks our push/deploy flow is discoverable in history.
        run: |
          node --version
          npx clasp --version

      - name: Check JavaScript syntax
        run: |
          errors=0
          for file in src/*.js; do
            if ! node --check "$file" 2>/dev/null; then
              echo "Syntax error: $file"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors file(s) with syntax errors"
            exit 1
          fi

      - name: Lint (CLAUDE.md rules, error severity)
        # Why: pre-commit hook を bypass (--no-verify) したコミットや hook 未設定環境からの
        #   push でも CLAUDE.md ルール違反 (setTimeout / getEffectiveUser 等) を CI で捕捉する。
        run: npm run lint:errors

      - name: Run unit tests
        run: npm test
